var TYPES={
freeze:{name:'完美凍結型',icon:'💎',sub:'做不到 100 分不如不做',
desc:'你的拖延不是因為懶，是因為你的品質標準高到連自己都爬不上去。「再多準備一下」「等靈感來」「先把資料看完」——這些都是你的完美主義替你編的藉口，而你每一次都信了。你的桌面有十七個「草稿_最終版_真的最終版」的檔案。你花了三小時研究怎麼開始，然後時間就用完了。最諷刺的是，你是所有拖延類型裡能力最強的那一個——正因為你知道自己做得到，所以更受不了做不好。你不是害怕失敗，你是害怕「不夠完美」的成功。',
oil:'🌿 <strong>精油處方：甜橙（打破凍結·先動再說）× 迷迭香（清晰思緒·停止過度準備）× 雪松（穩定自信·接受不完美）</strong><br><br>完美凍結型需要的是「破冰」。甜橙的柑橘香氣像一記溫柔的彈指，把你從「再想一下」的冰層裡彈出來。每次坐到桌前要開始工作時，先在手腕滴一滴甜橙，深吸一口氣，然後跟自己說：「醜版本也是版本。先做出 30 分的東西，再慢慢改。」雪松的木質底韻則提醒你：你的價值不等於你的作品分數。',
insight:'30 分的存在，永遠比 100 分的想像更有力量。'},

shield:{name:'恐懼護盾型',icon:'🛡️',sub:'不開始就不會失敗',
desc:'你的拖延是一面護盾。不開始就不會失敗，不失敗就不用面對「我果然不行」的聲音。你把「做了但沒做好」的痛苦放大到宇宙那麼大，大到你寧願選擇「什麼都不做」的空虛。你很擅長在deadline前一天跟自己說「算了，這次不算」，然後把失敗歸因於「時間不夠」而不是「能力不足」。你不是怕那件事本身，你是怕做了那件事之後被迫面對一個殘酷的真相：也許我真的沒有自己以為的那麼好。但親愛的，那個真相根本不存在。它只是你的恐懼在說謊。',
oil:'🌿 <strong>精油處方：佛手柑（勇氣的味道）× 乳香（安定核心·你不需要證明什麼）× 茉莉（喚醒行動力）</strong><br><br>恐懼護盾型需要的是「安全感」——知道即使搞砸了，你還是你。乳香的樹脂香氣直接作用於邊緣系統，讓恐懼的音量調小。每天早晨在心口滴一滴乳香，閉眼感受它溫熱地滲進去，跟自己說：「做了沒做好，我還是我。」佛手柑的柑橘酸甜則像一個深呼吸，讓你鼓起剛好夠的勇氣踏出第一步。',

rebel:{name:'叛逆靈魂型',icon:'✊',sub:'你叫我做我偏不做',
desc:'你的拖延是一場無聲的革命。越被催越不想動，越有 deadline 越想反著來。不是你懶，是你對「被控制」過敏。你小時候可能被管太多、被安排太多、被期待太多，拖延是你唯一能掌控的事：「至少什麼時候做，我說了算。」最有趣的是，如果那件事是你自己想做的，你的執行力驚人。你不是不會做，你是不願意在「被要求」的情況下做。你的叛逆不是壞事——它保護了你的自主性。但當它開始傷害你自己的目標時，就需要換個方式表達了。',
oil:'🌿 <strong>精油處方：黑胡椒（點燃自主動力）× 絲柏（邊界感·分辨「我的」和「別人的」）× 野橘（找回做事的樂趣）</strong><br><br>叛逆靈魂型需要的不是紀律，是「主權感」。黑胡椒的辛辣刺激能繞過你的反抗機制，直接點燃「我想做」的火種。當你被催促時，先在掌心搓兩滴黑胡椒，用力吸一口氣，然後把「我被要求做這件事」在心裡改寫成「我選擇做這件事」。同一件事，被叫去做和自己決定去做，能量完全不同。',
insight:'你的戰場不在外面，在你自己心裡。把「你叫我做」變成「我選擇做」。'},

bubble:{name:'夢想泡泡型',icon:'🫧',sub:'腦子裡都想好了 只是沒做',
desc:'你的腦袋是一座華麗的宮殿，裡面有十七個宏偉計畫、三十二個靈感筆記、和無數個「等我開始就會很厲害」的幻想。問題是——你的計畫一直停留在腦子裡，像一顆一顆漂亮的泡泡，碰到現實就破了。你不缺想法，你缺的是「把大夢拆成小步」的能力。一想到那件事要做多少步驟，你的大腦就直接當機。你的夢想不是假的，你的行動力也不是零——你只是被自己的宏大願景嚇到了。最殘忍的真相是：想了一千次但沒做，跟從來沒想過是一樣的。',
oil:'🌿 <strong>精油處方：檸檬（清晰·把大夢切成小塊）× 薄荷（當頭棒喝·現在就開始）× 岩蘭草（接地·從雲端回到地面）</strong><br><br>夢想泡泡型需要的是「著陸」。岩蘭草的泥土氣息像一根繩子，把你從雲端的幻想拉回此刻的書桌。每次發現自己在「想像做完的樣子」而不是「實際在做」的時候，聞一口岩蘭草，然後問自己：「這件事最小的一步是什麼？只做五分鐘就好。」薄荷的清涼感則像一巴掌（溫柔的），把你從白日夢裡打醒。',
insight:'想一千次不如做一次。先走第一步，宇宙才知道你要去哪裡。'},

desc:'你的引擎只有一種燃料：壓力。沒有 deadline 你是一灘爛泥，離 deadline 越近你越清醒。你在最後三小時完成的作品，品質可能比別人花三天做的還好。問題不在能力——你的能力在壓力下是超載的。問題在：你的身體不是永動機。每次壓線完成之後的那種虛脫感、心悸、失眠、暴飲暴食，都是你的腎上腺素帳單。你不是在管理時間，你是在透支未來。最上癮的是那種「我在最後一刻拯救了全世界」的英雄感。但英雄也需要休息啊。',
oil:'🌿 <strong>精油處方：薰衣草（降低亢奮·給神經系統喘息）× 快樂鼠尾草（打斷壓力成癮迴圈）× 甜馬鬱蘭（修復被透支的身體）</strong><br><br>腎上腺素型最需要的是「重新定義啟動」。你的大腦已經習慣用壓力當油門，需要訓練它學會用別的方式發動。試試看：把大任務拆成每天 25 分鐘的番茄鐘，用小規模的時間壓力騙大腦啟動。每個番茄鐘結束後，在手腕聞一口薰衣草，讓神經系統學會「不用瀕臨崩潰也能完成事情」的感覺。睡前一滴甜馬鬱蘭在腳底，修復你今天又透支的腎上腺素。',
insight:'壓力是燃料，但不是唯一的燃料。學會慢速啟動，才能走更遠。'}
