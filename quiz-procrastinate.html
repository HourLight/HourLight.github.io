<script>
var TYPES={perfect:{name:'完美主義型',icon:'💎',sub:'怕做不好所以不開始',desc:'您的拖延不是因為懶，是因為太在意品質。「做不到 100 分不如不做」是您的內心劇本。',detail:'完美主義型拖延者的痛苦在於：想做的事很多，但每一件都卡在「還沒準備好」。準備到什麼程度才夠？永遠不夠。\n\n破解法：跟自己約定「醜版本」。先做出一個 30 分的版本，再慢慢改。30 分的存在比 100 分的想像更有價值。'},
fear:{name:'害怕失敗型',icon:'😰',sub:'不做就不會失敗',desc:'您的拖延是一種保護機制。不開始就不會失敗，不失敗就不用面對「我不夠好」的感覺。',detail:'害怕失敗型的人內心深處覺得「失敗 = 我這個人不好」。把結果和自我價值綁在一起是最累的活法。\n\n破解法：把「失敗」重新定義為「數據」。做了沒成功 = 多了一筆數據。不做 = 什麼數據都沒有。哪個比較虧？'},
rebel:{name:'反抗型',icon:'✊',sub:'你叫我做我偏不做',desc:'您的拖延是一種無聲的抗議。被要求、被催促、被期待的時候，您的身體會自動踩煞車。',detail:'反抗型的人通常在成長過程中被管太多。拖延是您唯一能掌控的事：「至少什麼時候做，我說了算。」\n\n破解法：把「被要求做的事」改成「我選擇做的事」。同樣一件事，被叫去做和自己決定去做，能量完全不同。'},
dreamer:{name:'夢想家型',icon:'🌈',sub:'想得很大但不動',desc:'您腦子裡的計畫比誰都宏大。問題不在想像力，在於「想」跟「做」之間有一條看不見的河。',detail:'夢想家型的人不缺靈感，缺的是「把大夢拆成小步」的能力。一想到要做的事太多就癱瘓了。\n\n破解法：今天只做這件大事裡面最小的那一步。小到只需要 5 分鐘。做完就好。明天再做下一個 5 分鐘。'},
crisis:{name:'危機製造者型',icon:'🔥',sub:'deadline 是最好的動力',desc:'您不是不會做，是要等到最後一刻才做得出來。壓力是您的燃料，沒有壓力您發動不了。',detail:'危機製造者型的人其實效率很高，只是啟動方式比較刺激。您的腎上腺素是好朋友，但長期下來心臟和睡眠會抗議。\n\n破解法：自己製造假 deadline。把交期提前三天寫在日曆上，騙自己的腎上腺素。'},
overcommit:{name:'過度承諾型',icon:'🤹',sub:'答應太多做不完',desc:'您的拖延不是因為不想做，是因為答應的太多。每一件都想做好，結果每一件都在拖。',detail:'過度承諾型的人通常不太會說「不」。因為拒絕 = 讓人失望 = 不被喜歡。但答應了做不到，比一開始就拒絕更讓人失望。\n\n破解法：下次有人請您幫忙，先說「我確認一下時間再回覆您」。給自己 24 小時想清楚再答應。'}};
var QUESTIONS=[
{q:'一件重要的事一直沒開始，最可能的原因是：',opts:[{t:'覺得還沒準備好，想再研究一下',a:'perfect'},{t:'想到可能會失敗就不想動',a:'fear'},{t:'是別人要求的，我沒那麼想做',a:'rebel'},{t:'有更大的計畫要想，這件先放著',a:'dreamer'}]},
{q:'deadline 前一天，您的狀態通常是：',opts:[{t:'焦慮但效率超高，一次衝完',a:'crisis'},{t:'後悔為什麼答應這麼多事',a:'overcommit'},{t:'已經做完了，在檢查第三遍',a:'perfect'},{t:'還沒開始，在想怎麼要求延期',a:'fear'}]},
{q:'被催「這件事什麼時候可以好」，您的反應：',opts:[{t:'有點煩，覺得被壓迫',a:'rebel'},{t:'馬上答應一個時間（但心裡知道可能做不到）',a:'overcommit'},{t:'緊張，開始焦慮品質問題',a:'perfect'},{t:'說「快好了」，然後開始瘋狂趕工',a:'crisis'}]},
{q:'一個大專案，您的處理方式是：',opts:[{t:'在腦子裡規劃得很完美，但遲遲沒動手',a:'dreamer'},{t:'拆成小步驟，但每一步都想做到最好所以很慢',a:'perfect'},{t:'等到不得不做才開始',a:'crisis'},{t:'同時接了三個專案，全部在趕',a:'overcommit'}]},
{q:'做一件事做到一半發現方向可能不對：',opts:[{t:'從頭來過，寧願重做也不要將就',a:'perfect'},{t:'先放著，去做別的事',a:'fear'},{t:'覺得算了，反正也不是我自願做的',a:'rebel'},{t:'衝到底，反正 deadline 快到了',a:'crisis'}]},
{q:'最容易讓您拖延的事情類型是：',opts:[{t:'結果不確定的事（不知道做了會怎樣）',a:'fear'},{t:'需要高品質輸出的事（報告、作品）',a:'perfect'},{t:'別人分配給我的事',a:'rebel'},{t:'需要長時間專注的事',a:'dreamer'}]},

{q:'如果拖延有一句內心獨白，您的版本是：',opts:[{t:'「等我想清楚再說」',a:'dreamer'},{t:'「再等一下下就好」',a:'crisis'},{t:'「為什麼每次都是我」',a:'rebel'},{t:'「還不夠好，再改一下」',a:'perfect'}]}

function pick(a,btn){answers[currentQ]=a;btn.classList.add('selected');setTimeout(function(){currentQ++;if(currentQ>=QUESTIONS.length)showResult();else renderQ()},350)}

-bottom:16px">全部分佈</h3>';sorted.forEach(function(k){var fl=TYPES[k],pct=Math.round(scores[k]/QUESTIONS.length*100);html+='<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:4px"><span>'+fl.icon+' '+fl.name+'</span><span style="color:var(--qlt)">'+pct+'%%</span></div><div style="height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden"><div style="height:100%%;width:'+pct+'%%;background:var(--qc1);border-radius:3px;animation:hlBarGrow .8s ease both"></div></div></div>'});html+='</div>';html+='<div style="background:#fff;border-radius:16px;padding:24px;text-align:center;margin-bottom:20px;border:1.5px solid #eee"><div style="font-size:.92rem;margin-bottom:14px">想更深入了解自己？</div><div style="display:flex;flex-direction:column;gap:10px;max-width:320px;margin:0 auto"><a href="fuling-mima.html" style="display:block;padding:12px;background:var(--qc1);color:#fff;border-radius:12px;text-decoration:none;font-weight:600;font-size:.88rem">🔮 測算馥靈秘碼（免費）</a><a href="draw-hl.html" style="display:block;padding:12px;background:var(--qc2);color:#fff;border-radius:12px;text-decoration:none;font-weight:600;font-size:.88rem">🎴 抽一張馥靈指引牌</a></div></div>';html+='<div style="text-align:center;font-size:.68rem;color:var(--qlt);line-height:1.8">本測驗參考 Neil Fiore《The Now Habit》拖延類型理論設計，結果僅供自我覺察參考。<br>© 2026 馥靈之鑰國際有限公司｜hourlightkey.com</div></div>';document.getElementById('quizResult').innerHTML=html;document.getElementById('quizResult').style.display='block';document.getElementById('quizResult').scrollIntoView({behavior:'smooth',block:'start'});if(window.hlCastle)hlCastle.giveKey('key')}
