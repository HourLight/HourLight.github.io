    practice:'「今天我的泡泡多大」覺察\n\n每天早上花 30 秒感覺一下：今天的我，泡泡想要多大？吸氣 4 秒，想像你的泡泡。吐氣 6 秒，問自己：「今天誰可以靠近一點？今天我需要多一點空間？」\n\n不需要每天一樣。彈性不是妥協，是你每天都在為自己做最適合的選擇。',
    closing:'你已經擁有很多人渴望的能力：能靠近也能退後，能溫柔也能堅定。繼續信任你的彈性，它是你最好的防護。'},
  invisible:{name:'隱形圍欄',icon:'🔲',sub:'你的界線存在，但只有你自己看得到',
    desc:'你有底線，但你不說。你知道誰越線了，但你選擇沉默。你的保護方式不是拒絕，是「慢慢消失」。不吵不鬧，默默調整距離。問題是，對方根本不知道自己做錯了什麼，而你又多一筆「不被理解」的委屈。',
    keywords:['被動疏遠','情緒隱藏','非語言表達','內在消耗'],
    aroma:'迷迭香 × 薄荷',
    aromaDetail:'迷迭香的桉油醇和樟腦活化前額葉的「表達」區域，給你把那條隱形的線說出口的勇氣。薄荷的薄荷醇帶來清涼的清醒感，讓你看見：不說不等於保護，有時候不說才是最大的消耗。',
    practice:'「說出那條線」練習\n\n想一件最近讓你不舒服但沒說出來的事。吸氣 4 秒，在心裡把那句話組好。吐氣 6 秒，想像自己對那個人說了。\n\n不用真的說。先在腦子裡練習就好。感覺一下，光是「想像自己說了」，身體有什麼反應？如果有鬆了一口氣的感覺，那就是你的身體在告訴你：這條線，值得被看見。',
    closing:'隱形的圍欄保護了你的安靜，但也讓你一個人扛了太多。當你準備好的時候，試著讓那條線被看見。被看見不是軟弱，是你終於願意讓別人也有機會好好對待你。'},
  revolving:{name:'旋轉門',icon:'🔄',sub:'你的界線今天在這裡，明天在那裡。連你自己都不確定',
    desc:'有時候你很果斷地拒絕，有時候你軟得一塌糊塗。你的界線像旋轉門一樣轉來轉去，進出全看當天心情。原則有，只是那個讓它穩穩站好的位置還沒定下來。所以你常常答應了又後悔，拒絕了又焦慮。',
    keywords:['情緒驅動','一致性不足','內在拉扯','自我矛盾'],
    aroma:'乳香 × 岩蘭草',
    aromaDetail:'乳香的乳香酸穩定前額葉的決策迴路，讓你的「好」和「不好」不再跟著情緒跑。岩蘭草的岩蘭草醇是最強的接地分子，幫助你的界線找到一個穩穩的著力點。不是不能改，是改之前先站穩。',
    practice:'「這次的答案不換」練習\n\n今天做一個小決定（午餐吃什麼、要不要答應一個邀約），做了之後不改。吸氣 4 秒，感覺那個決定帶來的焦慮。吐氣 6 秒，對自己說：「這次的答案就是這個。不用完美，只要穩。」\n\n一天一個小練習。當你發現「不改主意」也不會怎樣，你的旋轉門就會慢慢停下來。',
    closing:'你的旋轉門不是弱點，是你在不同的需求之間努力協調的痕跡。現在要做的不是把門焊死，是找到一個讓它穩穩停住的位置。停在那裡，你會發現風景其實挺好的。'},
  glass:{name:'單向玻璃',icon:'🪟',sub:'你看得見所有人，但沒有人真的看見你',
    desc:'你很擅長觀察。誰越線了你知道，誰對你好你知道，誰在演戲你也知道。但你很少讓別人用同樣的精度看見你。你在人群裡是安全的，因為你永遠是那個看穿別人的人。問題是，你把自己藏得太好了，好到有一天你會忘記被看見的感覺。',
    keywords:['過度觀察','情緒隱匿','控制需求','孤獨感'],
    aroma:'玫瑰天竺葵 × 檀香',
    aromaDetail:'玫瑰天竺葵的香茅醇和香葉醇溫柔地打開你習慣緊閉的「被看見」通道。檀香的 α-檀香醇帶來深層的安全感，讓你知道：被看見不代表被攻擊。有時候被看見，是被愛的前提。',
    practice:'「讓一個人看到我」練習\n\n今天找一個你信任的人，跟他分享一件你的真實感受。不用很大的事，可以只是「今天有點累」。吸氣 4 秒，感覺說出口之前的抗拒。吐氣 6 秒，讓那句話出去。\n\n你會發現，被看見的瞬間有點赤裸。但那份赤裸裡面，也有一種久違的鬆。',
    closing:'你的觀察力是了不起的天賦。但鏡子只能照別人的時候，你自己就消失了。試著把那面單向玻璃翻轉一次，讓光從你的方向照出去。被看見不危險，你值得。'},
  selective:{name:'選擇性開放',icon:'🗝️',sub:'你有很多把鑰匙，但不是每個人都拿得到',
    desc:'你的界線不是一道單一的牆，是一棟有很多房間的房子。有些人可以到客廳，有些人可以進書房，有些人連大門都進不了。你根據信任程度決定開放程度，很聰明也很有效。但有時候你的分類系統太嚴格了，有些值得靠近的人被擋在了錯的門外。',
    keywords:['信任分級','關係分層','條件性開放','判斷依賴'],
    aroma:'佛手柑 × 乳香',
    aromaDetail:'佛手柑的乙酸沉香酯放鬆你過度運轉的「分類系統」，讓你在判斷之前先感受。乳香的乳香酸帶來一種不需要理由的安全感，讓你知道：偶爾不分類，直接用心感受，也是安全的。',
    practice:'「今天不分類」覺察\n\n選一個你平常會保持距離的人，今天跟他多聊兩句。不需要分享秘密，只是比平常多一點點。吸氣 4 秒，感覺那份「可能會後悔」的猶豫。吐氣 6 秒，提醒自己：偶爾把鑰匙放鬆一點，世界不會因此崩塌。\n\n你的分類系統很好。偶爾讓它休息一天，你可能會遇到意想不到的連結。',
    closing:'你的選擇性是一種智慧。只是偶爾問問自己：有沒有一些門，關得太久了？那些門後面也許有人已經站了很久了，在等你給一把鑰匙。'},
  fence:{name:'健康圍籬',icon:'🌻',sub:'你的界線有門、門沒鎖。你選擇打開的時候最美',
    desc:'你知道自己的底線，也知道什麼時候可以讓步。你不會因為拒絕而內疚太久，也不會因為接受而委屈太多。你的圍籬高度剛好，有花、有門、有陽光照進來。這不是完美，是你跟自己磨合了很久之後找到的平衡。',
    keywords:['自我覺察','健康邊界','內在穩定','靈活堅定'],
    aroma:'茉莉 × 甜橙',
    aromaDetail:'茉莉的吲哚帶來深層的自我肯定感，讓「我夠好了」不只是頭腦的想法，而是身體記住的節奏。甜橙的檸檬烯維持你跟世界之間那份溫暖的連結。你的圍籬不需要改建，只需要偶爾澆澆水。',
    practice:'「謝謝我自己的界線」覺察\n\n找一個安靜的時刻。吸氣 4 秒，想一件你最近很自在地說「不」的事。吐氣 6 秒，對自己說：「我做到了。」\n\n再吸氣 4 秒，想一件你很自在地說「好」的事。吐氣 6 秒，對自己說：「這也是我選的。」\n\n你的界線是你跟世界的約定。今天，謝謝你自己守住了這份約定。',
    closing:'你已經走在一條很好的路上了。圍籬不完美也沒關係，重要的是你知道門在哪裡，而且鑰匙在你手上。繼續走。'}
};

let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const sceneHTML=qd.scene?'<div class="quiz-scene">'+qd.scene+'</div>':'';
    const optsHTML='<div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 題 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一題</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一題 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看我的界線類型 🚪</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 題，共 '+questions.length+' 題';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const scores={};dims.forEach(d=>{scores[d.key]=0;});
  Object.entries(answers).forEach(([qi,oi])=>{
    const opt=questions[parseInt(qi)].opts[oi];
    if(opt.scores){Object.entries(opt.scores).forEach(([k,v])=>{scores[k]=(scores[k]||0)+v;});}
  });
  const sorted=dims.map(d=>d.key).sort((a,b)=>scores[b]-scores[a]);
  const topType=sorted[0],f=TYPES[topType],f2=TYPES[sorted[1]];
  const totalMax=questions.length*3;
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('screenshotCard').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥靈之鑰</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-tags"><span class="ss-tag">界線類型覺察</span><span class="ss-tag">'+f.name+'</span></div><div class="ss-quote">「'+f.closing+'」</div><div class="ss-footer">hourlightkey.com ✦ 讀懂自己，活對人生</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">界線類型覺察 Boundary Type</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=dims.map(d=>{var pct=Math.round(scores[d.key]/totalMax*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+TYPES[d.key].icon+' '+d.name+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:'+d.color+'"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">🚪 你的界線類型</div><div class="result-section-content">'+f.desc+'</div></div>'+'<div class="result-section"><div class="result-section-title">🔑 覺察關鍵字</div><div class="result-section-content">'+f.keywords.map(k=>'「'+k+'」').join(' ')+'</div></div>'+(f2?'<div class="result-section"><div class="result-section-title">'+f2.icon+' 副型：'+f2.name+'</div><div class="result-section-content">'+f2.desc+'</div></div>':'')+'<div class="result-section"><div class="result-section-title">🌿 認知芳療建議：'+f.aroma+'</div><div class="result-section-content">'+f.aromaDetail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🧘 60 秒覺察練習</div><div class="result-section-content">'+f.practice.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">✦ 馥靈收束語</div><div class="result-section-content" style="font-family:LXGW WenKai TC,serif;font-size:1rem;line-height:1.9">'+f.closing+'<br><br></div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ 馥靈之鑰 × 你的覺察密碼</div><div class="hour-bridge-text" style="margin-bottom:8px">你畫的每一條線，都是你跟這個世界談判的結果。有些線畫得太輕，有些線畫得太重。今天看見了，就是重新畫的起點。</div><div style="font-size:.85rem;color:#9e8a70;line-height:1.8;margin-bottom:16px">馥靈秘碼可以看到你天生的人際模式設定，跟今天的界線類型交叉比對更完整。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免費解碼馥靈秘碼 →</a>';
  try{localStorage.setItem('hl_quiz_boundary_type',JSON.stringify({type:topType,scores,ts:Date.now()}));}catch(e){}
  window._resultText=f.icon+' 我的界線類型是「'+f.name+'」：'+f.sub.substring(0,40)+'⋯ 你的界線是什麼形狀？ 👉 hourlightkey.com/quiz-boundary-type.html #馥靈之鑰 #界線類型覺察';
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz-boundary-type',toolName:'界線類型覺察'});
  if(window.HL_dropMaterial) HL_dropMaterial('quiz');
  window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
</script>
