<script>
const finishBtn='看我的五大天賦 💎';
// 20 strengths (simplified from 34), 2 questions each = 40 questions
// Grouped into 4 domains: EXE(執行力) INF(影響力) REL(關係建立) STR(策略思維)
const questions=[
  {dim:'EXE',str:'achiever',q:'你每天都需要完成一些事情才會覺得這天沒白過。'},
  {dim:'EXE',str:'achiever',q:'你的動力來自「做完」的成就感。'},
  {dim:'EXE',str:'discipline',q:'你喜歡有規律、有結構的生活。'},
  {dim:'EXE',str:'discipline',q:'沒有計畫讓你不安。'},
  {dim:'EXE',str:'focus',q:'你能長時間專注在一件事上。'},
  {dim:'EXE',str:'focus',q:'你很清楚自己現在該做什麼。'},
  {dim:'EXE',str:'responsibility',q:'答應了就一定做到，不做到你睡不著。'},
  {dim:'EXE',str:'responsibility',q:'你被形容為「最可靠的那個人」。'},
  {dim:'EXE',str:'restorative',q:'你擅長找出問題在哪然後修好它。'},
  {dim:'EXE',str:'restorative',q:'你對「哪裡不對」特別敏銳。'},
  {dim:'INF',str:'command',q:'你在關鍵時刻能做出果斷的決定。'},
  {dim:'INF',str:'command',q:'你不怕帶頭，即使別人可能不同意。'},
  {dim:'INF',str:'communication',q:'你能把複雜的事說得簡單易懂。'},
  {dim:'INF',str:'communication',q:'你善於用故事說服人。'},
  {dim:'INF',str:'competition',q:'你喜歡跟別人比較，這讓你更有動力。'},
  {dim:'INF',str:'competition',q:'你會注意自己在群體中的排名。'},
  {dim:'INF',str:'maximizer',q:'你不想修補弱點，你想把強項練到極致。'},
  {dim:'INF',str:'maximizer',q:'「差不多」不是你能接受的標準。'},
  {dim:'INF',str:'activator',q:'你等不了太久，你想趕快開始做。'},
  {dim:'INF',str:'activator',q:'「想太多不如先試試看」是你的信條。'},
  {dim:'REL',str:'empathy',q:'你能感受到別人的情緒，有時候比他們自己還早。'},
  {dim:'REL',str:'empathy',q:'有人在你面前哭，你會跟著眼眶紅。'},
  {dim:'REL',str:'harmony',q:'你不喜歡衝突，你會找到大家都能接受的方案。'},
  {dim:'REL',str:'harmony',q:'你相信共識比勝利重要。'},
  {dim:'REL',str:'developer',q:'你能看到別人還沒看到的潛力。'},
  {dim:'REL',str:'developer',q:'看到別人成長讓你比自己成功還開心。'},
  {dim:'REL',str:'connectedness',q:'你覺得事情的發生都有某種意義。'},
  {dim:'REL',str:'connectedness',q:'你相信人與人之間有看不見的連結。'},
  {dim:'REL',str:'includer',q:'你會注意到被排除在外的人。'},
  {dim:'REL',str:'includer',q:'你覺得每個人都應該有機會被看見。'},
  {dim:'STR',str:'analytical',q:'你做決定需要數據和證據。'},
  {dim:'STR',str:'analytical',q:'你不太接受「因為大家都這樣做」的理由。'},
  {dim:'STR',str:'futuristic',q:'你花很多時間想像未來的樣子。'},
  {dim:'STR',str:'futuristic',q:'你的願景常常比身邊的人超前好幾步。'},
  {dim:'STR',str:'ideation',q:'你的腦子裡永遠有新點子在冒出來。'},
  {dim:'STR',str:'ideation',q:'你享受想法之間碰撞產生的火花。'},
  {dim:'STR',str:'learner',q:'學新東西的過程讓你興奮。'},
  {dim:'STR',str:'learner',q:'你常常為了好奇而研究一個完全不相關的領域。'},
  {dim:'STR',str:'strategic',q:'你能在混亂中快速看到最佳路徑。'},
  {dim:'STR',str:'strategic',q:'你常常在別人還在分析時就看到答案了。'},
];

const likertLabels=['完全不是','大概不是','中間','大概是','完全是'];
let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const isOpt=qd.opts&&qd.opts.length>0;
    let inner='';
    if(isOpt){
      const optsHTML=qd.opts.map((opt,oi)=>`<button class="quiz-option${answers[i]===opt.v?' selected':''}" onclick="selectAnswer(${i},'${opt.v}',this)"><span style="flex-shrink:0;opacity:0.6;font-size:0.9rem">${String.fromCharCode(65+oi)}</span><span>${opt.text}</span></button>`).join('');
      inner=`<div class="quiz-options">${optsHTML}</div>`;
    } else {
      const btns=[1,2,3,4,5].map(v=>`<button class="likert-btn${answers[i]===v?' selected':''}" onclick="selectAnswer(${i},${v},this)">${v}</button>`).join('');
      inner=`<div class="likert-wrap"><div class="likert-labels">${likertLabels.map(l=>`<span>${l}</span>`).join('')}</div><div class="likert-row">${btns}</div></div>`;
    }
    card.innerHTML=`<div class="quiz-q-num">第 ${i+1} 題 / ${questions.length}</div><div class="quiz-question">${qd.q}${qd.scenario?`<span class="quiz-scenario">${qd.scenario}</span>`:''}</div>${inner}<div class="quiz-nav">${i>0?`<button class="btn-prev" onclick="goTo(${i-1})">← 上一題</button>`:'<span></span>'}${i<questions.length-1?`<button class="btn-next" id="btnNext-${i}" ${answers[i]===undefined?'disabled':''} onclick="goTo(${i+1})">下一題 →</button>`:`<button class="btn-next" id="btnNext-${i}" ${answers[i]===undefined?'disabled':''} onclick="showResult()">${finishBtn}</button>`}</div>`;
    area.appendChild(card);
  });updateProgress(idx);
}
function selectAnswer(qi,v,btn){answers[qi]=v;const card=document.getElementById('qcard-'+qi);card.querySelectorAll('.quiz-option,.likert-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent=`第 ${idx+1} 題，共 ${questions.length} 題`;document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}

function showResult(){
  const strScores={};
  questions.forEach((qd,i)=>{if(!strScores[qd.str])strScores[qd.str]=0;strScores[qd.str]+=(answers[i]||3);});
  Object.keys(strScores).forEach(k=>{strScores[k]=Math.round((strScores[k]-2)/8*100);});
  const sorted=Object.entries(strScores).sort((a,b)=>b[1]-a[1]);
  const top5=sorted.slice(0,5);

  const domScores={EXE:0,INF:0,REL:0,STR:0},domCounts={EXE:0,INF:0,REL:0,STR:0};
  questions.forEach((qd,i)=>{domScores[qd.dim]+=(answers[i]||3);domCounts[qd.dim]++;});
  Object.keys(domScores).forEach(k=>{domScores[k]=Math.round((domScores[k]-domCounts[k])/(domCounts[k]*4)*100);});
  const topDom=Object.entries(domScores).sort((a,b)=>b[1]-a[1])[0][0];

  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';

  const strNames={achiever:'成就者',discipline:'紀律者',focus:'專注者',responsibility:'責任者',restorative:'修復者',command:'統帥',communication:'溝通者',competition:'競爭者',maximizer:'完美化',activator:'啟動者',empathy:'同理者',harmony:'和諧者',developer:'伯樂',connectedness:'連結者',includer:'包容者',analytical:'分析者',futuristic:'前瞻者',ideation:'點子王',learner:'學習者',strategic:'策略家'};
