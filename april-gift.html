<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#f8dfa5;--gold2:#c8a252;--gold3:#f7e8c0;
  --rose:#f0b8cc;--dark:#050210;
  --serif:'Cormorant Garamond','Noto Serif TC',serif;
  --body:'LXGW WenKai TC','Noto Serif TC',serif;
}
html{scroll-behavior:smooth}
body{
  background:var(--dark);color:var(--gold);font-family:var(--body);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:0 0 72px;position:relative;overflow-x:hidden;
}
.bg-hero{position:fixed;inset:0;z-index:-2;background:#05030a;pointer-events:none}
.bg-veil{position:fixed;inset:0;z-index:-1;background:
  radial-gradient(ellipse 120% 60% at 50% 0%,rgba(100,40,200,.12) 0%,transparent 60%),
  radial-gradient(ellipse 80% 80% at 20% 100%,rgba(200,162,82,.06) 0%,transparent 50%),
  radial-gradient(ellipse 60% 60% at 80% 100%,rgba(5,2,20,.72) 0%,transparent 55%);
  pointer-events:none}
.hl-cosmos{z-index:0!important}

/* ── HERO ── */
.hero{
  position:relative;z-index:1;width:100%;min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 24px 40px;text-align:center;
}
.hero-brand{
  font-family:var(--serif);font-size:.72rem;letter-spacing:6px;
  color:rgba(233,194,125,.55);text-transform:uppercase;
  margin-bottom:28px;animation:fadeDown .8s ease both;
}
.hero-title{
  font-family:var(--serif);font-size:clamp(1.6rem,5vw,2.6rem);font-weight:400;
  color:var(--gold3);letter-spacing:4px;line-height:1.5;
  text-shadow:0 0 60px rgba(233,194,125,.2);
  margin-bottom:16px;animation:fadeDown .9s ease .15s both;
}
.hero-sub{
  font-size:.88rem;color:rgba(233,194,125,.65);line-height:1.9;
  letter-spacing:1px;max-width:400px;
  animation:fadeDown .9s ease .3s both;
}
.hero-sub br{display:block;content:'';margin-top:4px}

/* ── DRAW BUTTON ── */
.btn-draw{
  margin-top:36px;display:inline-flex;align-items:center;justify-content:center;
  gap:10px;padding:18px 48px;border-radius:999px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#b8922a,#d4af37,#c8a252);
  color:#1a0800;font-family:var(--body);font-size:1rem;font-weight:400;
  letter-spacing:3px;position:relative;overflow:hidden;
  box-shadow:0 0 40px rgba(233,194,125,.25),0 0 80px rgba(233,194,125,.1);
  animation:fadeDown .9s ease .5s both,pulseGlow 2.5s ease-in-out infinite;
  transition:transform .3s,box-shadow .3s;
}
.btn-draw::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.25),transparent 60%);
  opacity:0;transition:opacity .3s;
}
.btn-draw:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 0 60px rgba(233,194,125,.4)}
.btn-draw:hover::after{opacity:1}
.btn-draw:active{transform:scale(.97)}
@keyframes pulseGlow{
  0%,100%{box-shadow:0 0 40px rgba(233,194,125,.25),0 0 80px rgba(233,194,125,.1)}
  50%{box-shadow:0 0 60px rgba(233,194,125,.4),0 0 120px rgba(233,194,125,.15)}
}

/* ── EXPIRED / ALREADY DRAWN overlay ── */
.msg-expired,.msg-already{
  animation:fadeDown .6s ease both;text-align:center;padding:20px;
}
.msg-expired .exp-title,.msg-already .exp-title{
  font-family:var(--serif);font-size:1.3rem;color:var(--gold);letter-spacing:2px;margin-bottom:10px;
}
.msg-expired .exp-sub{font-size:.82rem;color:rgba(233,194,125,.6);line-height:1.8}

/* ── CARD STAGE ── */
.card-stage{
  position:relative;z-index:1;width:100%;max-width:500px;
  padding:20px 16px;display:none;flex-direction:column;align-items:center;
}
.card-stage.active{display:flex}
.cards-row{
  display:flex;gap:10px;justify-content:center;margin-bottom:30px;
  perspective:800px;
}
.lotto-card{
  width:56px;height:84px;position:relative;
  transform-style:preserve-3d;transition:transform .6s cubic-bezier(.4,0,.2,1);
  cursor:default;
}
.lotto-card .card-face{
  position:absolute;inset:0;border-radius:10px;
  backface-visibility:hidden;display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;
}
.lotto-card .card-back{
  background:linear-gradient(135deg,#1a0f3a,#2a1555);
  border:1.5px solid rgba(233,194,125,.2);
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.lotto-card .card-back::after{
  content:'';position:absolute;inset:4px;border-radius:7px;
  border:1px solid rgba(233,194,125,.1);
  background:repeating-conic-gradient(rgba(233,194,125,.04) 0% 25%,transparent 0% 50%) 0 0/12px 12px;
}
.lotto-card .card-back span{position:relative;z-index:1;color:rgba(233,194,125,.5);font-family:var(--serif)}
.lotto-card .card-front{
  transform:rotateY(180deg);
  background:linear-gradient(135deg,#0d0520,#1a0a35);
  border:1.5px solid rgba(233,194,125,.3);
  box-shadow:0 4px 24px rgba(233,194,125,.15);
}
.lotto-card .card-front span{position:relative;z-index:1}
.lotto-card.flipped{transform:rotateY(180deg)}
.lotto-card.winner .card-front{
  border-color:rgba(233,194,125,.6);
  background:linear-gradient(135deg,#1a0a35,#2a1050);
  box-shadow:0 0 40px rgba(233,194,125,.3),0 0 80px rgba(200,162,82,.15);
}

/* shuffle animation */
@keyframes shuffleLeft{0%{transform:translateX(0)}50%{transform:translateX(-20px)}100%{transform:translateX(0)}}
@keyframes shuffleRight{0%{transform:translateX(0)}50%{transform:translateX(20px)}100%{transform:translateX(0)}}
@keyframes shuffleCenter{0%{transform:translateX(0)}25%{transform:translateX(-12px)}75%{transform:translateX(12px)}100%{transform:translateX(0)}}
.lotto-card.shuffle-l{animation:shuffleLeft .3s ease}
.lotto-card.shuffle-r{animation:shuffleRight .3s ease}
.lotto-card.shuffle-c{animation:shuffleCenter .35s ease}

/* ── PRIZE RESULT ── */
.prize-result{
  width:100%;max-width:440px;margin:0 auto;
  background:rgba(10,5,30,.8);backdrop-filter:blur(20px);
  border:1px solid rgba(233,194,125,.15);border-radius:24px;
  padding:32px 24px;text-align:center;position:relative;overflow:hidden;
  animation:prizeReveal .7s cubic-bezier(.34,1.35,.64,1) both;
  display:none;
}
.prize-result.active{display:block}
.prize-result::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(233,194,125,.4),transparent);
}
.prize-result::after{
  content:'';position:absolute;inset:0;border-radius:24px;
  background:radial-gradient(circle at 50% 0%,rgba(233,194,125,.06),transparent 60%);
  pointer-events:none;
}
@keyframes prizeReveal{from{opacity:0;transform:scale(.85) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.prize-emoji{font-size:3rem;display:block;margin-bottom:12px;filter:drop-shadow(0 0 20px rgba(233,194,125,.3))}
.prize-name{
  font-family:var(--serif);font-size:1.4rem;color:var(--gold3);
  letter-spacing:2px;margin-bottom:6px;
}
.prize-value{
  font-family:var(--serif);font-size:1.8rem;font-weight:600;
  color:var(--gold);letter-spacing:1px;margin-bottom:20px;
  text-shadow:0 0 30px rgba(233,194,125,.3);
}
.prize-divider{
  width:60%;height:1px;margin:0 auto 20px;
  background:linear-gradient(90deg,transparent,rgba(233,194,125,.25),transparent);
}

/* code display */
.code-box{
  background:rgba(233,194,125,.06);border:1px dashed rgba(233,194,125,.25);
  border-radius:14px;padding:16px 20px;margin-bottom:16px;
}
.code-label{font-size:.72rem;color:rgba(233,194,125,.6);letter-spacing:2px;margin-bottom:8px}
.code-text{
  font-family:'Courier New',monospace;font-size:1.4rem;

.btn-copy{
  display:inline-flex;align-items:center;gap:6px;

  color:var(--gold);font-family:var(--body);font-size:.82rem;
  letter-spacing:1px;transition:all .3s;margin-bottom:10px;
}
.btn-copy:hover{background:rgba(233,194,125,.18);border-color:rgba(233,194,125,.4)}
.code-hint{font-size:.75rem;color:rgba(233,194,125,.55);line-height:1.8}

/* LINE CTA */
.line-cta{
  display:inline-flex;align-items:center;gap:8px;
  padding:14px 32px;border-radius:999px;border:none;cursor:pointer;
  background:#06C755;color:#fff;font-family:var(--body);font-size:.9rem;
  letter-spacing:1px;text-decoration:none;transition:all .3s;margin-bottom:10px;
}
.line-cta:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(6,199,85,.3)}
.line-hint{font-size:.75rem;color:rgba(233,194,125,.55);line-height:1.8}

/* BONUS */
.bonus-box{
  margin-top:20px;padding:16px 20px;
  background:rgba(120,50,180,.08);border:1px solid rgba(160,100,220,.2);
  border-radius:14px;text-align:center;
}
.bonus-title{font-size:.78rem;color:rgba(200,160,240,.8);letter-spacing:2px;margin-bottom:8px}
.bonus-name{font-family:var(--serif);font-size:1rem;color:#d8b8f8;letter-spacing:1.5px;margin-bottom:6px}
.bonus-code{
  font-family:'Courier New',monospace;font-size:1.2rem;color:#e0c8ff;
  letter-spacing:3px;font-weight:600;margin-bottom:8px;
}
.bonus-hint{font-size:.7rem;color:rgba(200,160,240,.6);line-height:1.8}

/* ── AFTER DRAW FOOTER ── */
.after-draw{
  width:100%;max-width:440px;margin:24px auto 0;text-align:center;
  animation:fadeDown .6s ease .3s both;
}
.deadline-pill{
  display:inline-block;
  background:rgba(233,194,125,.06);border:1px solid rgba(233,194,125,.15);
  border-radius:999px;padding:8px 20px;
  font-size:.78rem;color:rgba(233,194,125,.7);letter-spacing:1.5px;
  margin-bottom:16px;
}
.btn-share-line{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 24px;border-radius:999px;border:none;cursor:pointer;
  background:rgba(233,194,125,.06);border:1px solid rgba(233,194,125,.15);
  color:var(--gold);font-family:var(--body);font-size:.8rem;
  letter-spacing:1px;text-decoration:none;transition:all .3s;
  margin-bottom:12px;
}
.btn-share-line:hover{background:rgba(233,194,125,.12)}
.link-home{
  display:block;font-size:.78rem;color:rgba(233,194,125,.5);
  text-decoration:none;letter-spacing:1px;transition:color .3s;
}
.link-home:hover{color:var(--gold)}

/* ── CONFETTI ── */
.confetti-box{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-box i{position:absolute;animation:confettiFall 3s ease forwards}
@keyframes confettiFall{
  0%{transform:translateY(-100vh) rotate(0);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}
@keyframes particleFly{
  0%{transform:scale(1);opacity:1}
  100%{transform:scale(0) translate(var(--tx),var(--ty));opacity:0}
}

/* ── UTILITY ── */
@keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}

/* ── FOOTER ── */
.pg-footer{
  position:relative;z-index:1;width:100%;max-width:500px;
  margin-top:40px;padding:24px 20px;text-align:center;
}
.pg-footer a{color:rgba(233,194,125,.5);font-size:.72rem;text-decoration:none;letter-spacing:1px}
.pg-footer a:hover{color:var(--gold)}
.pg-footer .copy{font-size:.6rem;color:rgba(233,194,125,.3);margin-top:10px;letter-spacing:1px}

/* mobile safe area */
@supports(padding-bottom:env(safe-area-inset-bottom)){
  body{padding-bottom:calc(72px + env(safe-area-inset-bottom))}
}
</style>

<script>
(function(){
  'use strict';

  /* ═══ PRIZE POOL ═══ */
  var PRIZES = [
    {id:'card3',  name:'3 張牌深度解讀',      value:'NT$199',   weight:60, emoji:'🎴', n:3, price:199, type:'code'},
    {id:'card5',  name:'5 張牌深度解讀',      value:'NT$399',   weight:25, emoji:'✨', n:5, price:399, type:'code'},
    {id:'card7',  name:'7 張牌深度解讀',      value:'NT$599',   weight:9,  emoji:'💎', n:7, price:599, type:'code'},
    {id:'card12', name:'12 張覺察師一對一',   value:'NT$2,800', weight:5,  emoji:'👑', n:12, price:2800, type:'line'},
    {id:'card15', name:'15 張覺察師一對一',   value:'NT$3,600', weight:1,  emoji:'🌟', n:15, price:3600, type:'line'}
  ];

  // 生成隨機解鎖碼
  function generateRandomCode(n) {
    var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    var rand = '';
    for (var i = 0; i < 6; i++) rand += chars[Math.floor(Math.random() * chars.length)];
    var prefix = n <= 3 ? 'HL3' : n <= 5 ? 'HL5' : n <= 7 ? 'HL7' : n <= 9 ? 'HL9' : n <= 12 ? 'H12' : 'H15';
    return prefix + '-' + rand;
  }

  var EXPIRY = new Date('2026-04-07T23:59:59+08:00');
  var LINE_URL = 'https://lin.ee/RdQBFAN';
  var SHARE_TEXT = '馥靈之鑰送了我一份小禮物！你也來試試 👉 https://hourlightkey.com/april-gift.html';

  var _db = null, _user = null, _authReady = false;

  /* ═══ INIT FIREBASE ═══ */
  function initFirebase() {
    if (typeof firebase === 'undefined' || !window.FIREBASE_CONFIG) return;
    if (!firebase.apps.length) firebase.initializeApp(window.FIREBASE_CONFIG);
    _db = firebase.firestore();
    firebase.auth().onAuthStateChanged(function(user) {
      _user = user;
      _authReady = true;
      if (user) checkAlreadyDrawn();
    });
  }

  /* ═══ EXPIRY CHECK ═══ */
  function isExpired() {
    return new Date() > EXPIRY;
  }

  /* ═══ PAGE INIT ═══ */
  function pageInit() {
    initFirebase();

    if (isExpired()) {
      document.getElementById('btnDraw').classList.add('hidden');
      document.getElementById('msgExpired').classList.remove('hidden');
      return;
    }

    // Check localStorage for previous draw
    var cached = localStorage.getItem('hl_april_gift_drawn_r3');
    if (cached) {
      try {
        var prev = JSON.parse(cached);
        showPreviousResult(prev);
      } catch(e) {
        localStorage.removeItem('hl_april_gift_drawn_r3');
      }
    }
  }

  /* ═══ CHECK FIRESTORE FOR PREVIOUS DRAW ═══ */
  function checkAlreadyDrawn() {
    if (!_db || !_user) return;
    _db.collection('april_gifts_r3').doc(_user.uid).get().then(function(doc) {
      if (doc.exists) {
        var data = doc.data();
        var prize = findPrizeById(data.prizeId);
        if (prize) {
          var result = {id: prize.id, name: prize.name, value: prize.value, emoji: prize.emoji, code: data.code || prize.code || null, type: prize.type};
          localStorage.setItem('hl_april_gift_drawn_r3', JSON.stringify(result));
          showPreviousResult(result);
        }
      }
    }).catch(function(){});
  }

  function findPrizeById(id) {
    for (var i = 0; i < PRIZES.length; i++) {
      if (PRIZES[i].id === id) return PRIZES[i];
    }
    return null;
  }

  /* ═══ SHOW PREVIOUS RESULT (no animation) ═══ */
  function showPreviousResult(prize) {
    document.getElementById('btnDraw').classList.add('hidden');
    document.getElementById('heroSection').querySelector('.hero-sub').textContent = '你已經拆過禮物了 — 這是你的結果：';
    renderPrize(prize);
    document.getElementById('prizeResult').classList.add('active');
    document.getElementById('afterDraw').classList.remove('hidden');
    setupShare();
  }

  /* ═══ WEIGHTED RANDOM ═══ */
  function weightedRandom() {
    var totalWeight = 0;
    for (var i = 0; i < PRIZES.length; i++) {
      totalWeight += PRIZES[i].weight;
    }
    var rand = Math.random() * totalWeight;
    var cumulative = 0;
    for (var j = 0; j < PRIZES.length; j++) {
      cumulative += PRIZES[j].weight;
      if (rand < cumulative) return PRIZES[j];
    }
    return PRIZES[0]; // fallback
  }

  /* ═══ START DRAW ═══ */
  window.startDraw = function() {
    // Expiry check
    if (isExpired()) {
      document.getElementById('btnDraw').classList.add('hidden');
      document.getElementById('msgExpired').classList.remove('hidden');
      return;
    }

    // Already drawn check
    var cached = localStorage.getItem('hl_april_gift_drawn_r3');
    if (cached) {
      try { showPreviousResult(JSON.parse(cached)); } catch(e){}
      return;
    }

    // Login check
    if (!_user) {
      // Trigger hl-gate login prompt
      if (typeof firebase !== 'undefined' && firebase.auth) {
        var provider = new firebase.auth.GoogleAuthProvider();
        firebase.auth().signInWithPopup(provider).then(function(result) {
          _user = result.user;
          runDraw();
        }).catch(function(err) {
          if (err.code === 'auth/popup-blocked' || err.code === 'auth/cancelled-popup-request') {
            firebase.auth().signInWithRedirect(provider);
          } else if (err.code !== 'auth/popup-closed-by-user') {
            alert('請先登入才能拆禮物');
          }
        });
      } else {
        alert('系統載入中，請稍後再試');
      }
      return;
    }

    runDraw();
  };

  /* ═══ RUN DRAW (after auth confirmed) ═══ */
  function runDraw() {
    var prize = weightedRandom();
    var btn = document.getElementById('btnDraw');
    btn.disabled = true;
    btn.style.opacity = '0.5';
    btn.style.pointerEvents = 'none';

    // 為 code 類型獎品生成隨機碼
    if (prize.type === 'code') {
      prize.code = generateRandomCode(prize.n);
    }

    // Save to localStorage immediately to prevent double draw
    var resultObj = {id: prize.id, name: prize.name, value: prize.value, emoji: prize.emoji, code: prize.code || null, type: prize.type};
    localStorage.setItem('hl_april_gift_drawn_r3', JSON.stringify(resultObj));

    // Save to Firestore (含寫入 reading_codes)
    saveToFirestore(prize);

    // Start animation
    animateCards(prize);
  }

  /* ═══ SAVE TO FIRESTORE ═══ */
  function saveToFirestore(prize) {
    if (!_db || !_user) return;
    var ts = firebase.firestore.FieldValue.serverTimestamp();

    // Write to april_gifts_r3 collection
    _db.collection('april_gifts_r3').doc(_user.uid).set({
      uid: _user.uid,
      email: _user.email || '',
      prizeId: prize.id,
      prizeName: prize.name,
      prizeValue: prize.value,
      prizeType: prize.type,
      code: prize.code || '',
      drawnAt: ts
    }).catch(function(e){ console.warn('april_gifts_r3 write failed:', e); });

    // 如果是 code 類型，寫入 reading_codes（可在 draw-hl 兌換）
    if (prize.type === 'code' && prize.code) {
      _db.collection('reading_codes').doc(prize.code).set({
        n: prize.n,
        spreads: prize.n,
        price: prize.price || 0,
        used: false,
        memo: '感恩禮物 - ' + _user.email,
        source: 'april_gift',
        createdBy: 'system',
        createdFor: _user.email || '',
        createdAt: ts
      }).catch(function(e){ console.warn('reading_codes write failed:', e); });
    }

    // Write to promo_redemptions for tracking
    _db.collection('promo_redemptions').add({
      uid: _user.uid,
      email: _user.email || '',
      promoType: 'april_gift_2026',
      prizeId: prize.id,
      prizeName: prize.name,
      prizeValue: prize.value,
      prizeType: prize.type,
      code: prize.code || '',
      createdAt: ts
    }).catch(function(e){ console.warn('promo_redemptions write failed:', e); });
  }

  /* ═══ CARD ANIMATION ═══ */
  function animateCards(prize) {
    var stage = document.getElementById('cardStage');
    var row = document.getElementById('cardsRow');
    stage.classList.add('active');

    // Hide hero subtitle, keep title
    document.getElementById('btnDraw').classList.add('hidden');

    // Scroll to cards
    stage.scrollIntoView({behavior:'smooth', block:'center'});

    // Create 5 cards
    row.innerHTML = '';
    var cards = [];
    for (var i = 0; i < 5; i++) {
      var card = document.createElement('div');
      card.className = 'lotto-card';
      card.innerHTML = '<div class="card-face card-back"><span>?</span></div>' +
        '<div class="card-face card-front"><span>' + (i === 2 ? prize.emoji : '✦') + '</span></div>';
      row.appendChild(card);
      cards.push(card);
    }

    // Phase 1: Shuffle animation (1.5s)
    var shuffleRound = 0;
    var shuffleClasses = ['shuffle-l','shuffle-r','shuffle-c','shuffle-r','shuffle-l'];
    var shuffleInterval = setInterval(function() {
      for (var s = 0; s < cards.length; s++) {
        cards[s].classList.remove('shuffle-l','shuffle-r','shuffle-c');
        var cls = shuffleClasses[(s + shuffleRound) % shuffleClasses.length];
        cards[s].classList.add(cls);
      }
      shuffleRound++;
      if (shuffleRound >= 5) clearInterval(shuffleInterval);
    }, 300);

    // Phase 2: Flip cards one by one revealing "?" (after shuffle)
    setTimeout(function() {
      // Flip non-winner cards with "?" symbol
      var order = [0, 4, 1, 3, 2]; // outside-in, winner (2) last
      var delay = 0;
      for (var k = 0; k < order.length; k++) {
        (function(idx, d) {
          setTimeout(function() {
            cards[idx].classList.add('flipped');
            if (idx === 2) {
              // Winner card - special treatment
              cards[idx].classList.add('winner');
              // Phase 3: Prize reveal
              setTimeout(function() {
                launchConfetti();
                renderPrize(prize);
                document.getElementById('prizeResult').classList.add('active');
                document.getElementById('afterDraw').classList.remove('hidden');
                setupShare();
                // Scroll to prize
                setTimeout(function() {
                  document.getElementById('prizeResult').scrollIntoView({behavior:'smooth', block:'center'});
                }, 200);
              }, 400);
            }
          }, d);
        })(order[k], delay);
        delay += 500;
      }
    }, 1800);
  }

  /* ═══ RENDER PRIZE ═══ */
  function renderPrize(prize) {
    document.getElementById('prizeEmoji').textContent = prize.emoji;
    document.getElementById('prizeName').textContent = prize.name;
    document.getElementById('prizeValue').textContent = '價值 ' + prize.value;

    var actionEl = document.getElementById('prizeAction');

    if (prize.type === 'code' && prize.code) {
      actionEl.innerHTML =
        '<div class="code-box">' +
          '<div class="code-label">你的兌換碼</div>' +
          '<div class="code-text" id="codeText">' + prize.code + '</div>' +
        '</div>' +
        '<button class="btn-copy" onclick="copyCode()">複製兌換碼 📋</button>' +
        '<div class="code-hint">到抽牌頁面輸入此兌換碼即可使用</div>';
    } else if (prize.type === 'line') {
      actionEl.innerHTML =
        '<div style="font-size:1rem;color:var(--gold3);margin-bottom:16px;line-height:1.8">恭喜！請聯繫 LINE 預約<br>覺察師一對一服務</div>' +
        '<a class="line-cta" href="' + LINE_URL + '" target="_blank" rel="noopener">前往 LINE 預約 💬</a>' +
        '<div class="line-hint">請告知客服您的抽獎結果</div>';
    }
  }

  /* ═══ COPY CODE ═══ */
  window.copyCode = function() {
    var codeEl = document.getElementById('codeText');
    if (!codeEl) return;
    var code = codeEl.textContent;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(code).then(function() {
        showCopyFeedback();
      }).catch(function() {
        fallbackCopy(code);
      });
    } else {
      fallbackCopy(code);
    }
  };

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;left:-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showCopyFeedback(); } catch(e){}
    document.body.removeChild(ta);
  }

  function showCopyFeedback() {
    var btn = document.querySelector('.btn-copy');
    if (btn) {
      btn.textContent = '已複製 ✓';
      btn.style.borderColor = 'rgba(100,220,100,.4)';
      btn.style.color = '#8f8';
      setTimeout(function() {
        btn.innerHTML = '複製兌換碼 📋';
        btn.style.borderColor = '';
        btn.style.color = '';
      }, 2000);
    }
  }

  /* ═══ SHARE ═══ */
  function setupShare() {
    var shareUrl = 'https://social-plugins.line.me/lineit/share?url=' + encodeURIComponent('https://hourlightkey.com/april-gift.html') + '&text=' + encodeURIComponent(SHARE_TEXT);
    var btn = document.getElementById('btnShareLine');
    btn.href = shareUrl;
  }

  /* ═══ CONFETTI ═══ */
  function launchConfetti() {
    var box = document.getElementById('confettiBox');
    var colors = ['#f8dfa5','#c8a252','#f0b8cc','#d8b8f8','#FFD166','#E76F51','#2EC4B6','#FF6B7A','#fff'];

    // Falling confetti
    for (var i = 0; i < 100; i++) {
      var p = document.createElement('i');
      var w = 5 + Math.random() * 10;
      var h = 5 + Math.random() * 10;
      var shapes = [50, 20, 2];
      var br = shapes[Math.floor(Math.random() * 3)];
      p.style.cssText = 'position:absolute;left:' + Math.random() * 100 + '%;' +
        'background:' + colors[Math.floor(Math.random() * colors.length)] + ';' +
        'animation-delay:' + Math.random() * 1.5 + 's;' +
        'animation-duration:' + (2.5 + Math.random() * 2.5) + 's;' +
        'animation-name:confettiFall;animation-fill-mode:both;animation-timing-function:ease;' +
        'width:' + w + 'px;height:' + h + 'px;border-radius:' + br + '%';
      box.appendChild(p);
    }

    // Center burst particles
    for (var j = 0; j < 30; j++) {
      var pp = document.createElement('div');
      var angle = (Math.PI * 2 * j) / 30;
      var dist = 80 + Math.random() * 150;
      var tx = Math.cos(angle) * dist;
      var ty = Math.sin(angle) * dist - 60;
      pp.style.cssText = 'position:fixed;' +
        'left:' + (45 + Math.random() * 10) + '%;' +
        'top:' + (35 + Math.random() * 10) + '%;' +
        'width:' + (5 + Math.random() * 8) + 'px;' +
        'height:' + (5 + Math.random() * 8) + 'px;' +
        'background:' + colors[Math.floor(Math.random() * colors.length)] + ';' +
        'border-radius:50%;pointer-events:none;z-index:9999;' +
        '--tx:' + tx + 'px;--ty:' + ty + 'px;' +
        'animation:particleFly ' + (0.6 + Math.random() * 0.6) + 's ' + (Math.random() * 0.3) + 's ease both';
      box.appendChild(pp);
    }

    setTimeout(function() { box.innerHTML = ''; }, 6000);
  }

  /* ═══ RUN ═══ */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', pageInit);
  } else {
    pageInit();
  }

})();
</script>
