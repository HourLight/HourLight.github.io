<script>
const finishBtn='看見那個孩子 🧸';
const questions=[
  {q:'小時候你最常聽到的話，比較接近？',opts:[
    {text:'「你怎麼又做錯了」',v:'perfectionist'},{text:'「你自己玩，不要吵」',v:'abandoned'},
    {text:'「你乖一點，聽話」',v:'pleaser'},{text:'「你不要這樣，丟臉」',v:'invisible'},{text:'「你為什麼不能像別人一樣」',v:'angry'}]},
  {q:'你現在最容易被什麼情境觸發？',opts:[
    {text:'做不夠好的時候',v:'perfectionist'},{text:'被忽略或被排除的時候',v:'abandoned'},
    {text:'拒絕別人的時候',v:'pleaser'},{text:'被注意到的時候',v:'invisible'},{text:'被不公平對待的時候',v:'angry'}]},
  {q:'壓力最大時，你對自己說的話？',opts:[
    {text:'「你應該做得更好」',v:'perfectionist'},{text:'「反正沒有人在乎」',v:'abandoned'},
    {text:'「你不能讓他們失望」',v:'pleaser'},{text:'「不要引起注意」',v:'invisible'},{text:'「為什麼又是我」',v:'angry'}]},
  {q:'你在關係裡最害怕？',opts:[
    {text:'被批評、被指出錯誤',v:'perfectionist'},{text:'被丟下、被遺忘',v:'abandoned'},
    {text:'被討厭、被拒絕',v:'pleaser'},{text:'被看透、被發現真實的樣子',v:'invisible'},{text:'被控制、被壓迫',v:'angry'}]},
  {q:'你最常用什麼方式「保護自己」？',opts:[
    {text:'把每件事做到完美',v:'perfectionist'},{text:'先離開，不要等到被離開',v:'abandoned'},
    {text:'讓所有人都開心',v:'pleaser'},{text:'讓自己不被注意到',v:'invisible'},{text:'用憤怒建一道牆',v:'angry'}]},
  {q:'你最難接受的失敗是？',opts:[
    {text:'沒有達到自己的標準',v:'perfectionist'},{text:'信任的人離開了',v:'abandoned'},
    {text:'有人因為你而不開心',v:'pleaser'},{text:'被迫站到眾人面前',v:'invisible'},{text:'無法改變不公平的現狀',v:'angry'}]},
  {q:'你的哭點通常在？',opts:[
    {text:'覺得自己不夠好的時候',v:'perfectionist'},{text:'覺得孤獨的時候',v:'abandoned'},
    {text:'被誤解但不想解釋的時候',v:'pleaser'},{text:'突然被溫柔對待的時候',v:'invisible'},{text:'忍太久終於忍不住的時候',v:'angry'}]},
  {q:'你最想聽到的一句話？',opts:[
    {text:'「你已經夠好了」',v:'perfectionist'},{text:'「我不會走」',v:'abandoned'},
    {text:'「你不需要讓每個人都滿意」',v:'pleaser'},{text:'「我看見你了」',v:'invisible'},{text:'「你的憤怒是有道理的」',v:'angry'}]},
  {q:'你跟自己獨處時最常有的感覺？',opts:[
    {text:'焦慮，覺得應該在做什麼',v:'perfectionist'},{text:'空虛，好像少了什麼',v:'abandoned'},
    {text:'不安，不知道別人怎麼看我',v:'pleaser'},{text:'放鬆，終於不用演了',v:'invisible'},{text:'煩躁，有一股說不出的火',v:'angry'}]},
  {q:'你對「脆弱」的態度？',opts:[
    {text:'脆弱是失敗的證據',v:'perfectionist'},{text:'脆弱會讓人離開我',v:'abandoned'},
    {text:'脆弱會給別人添麻煩',v:'pleaser'},{text:'脆弱讓我暴露在別人面前',v:'invisible'},{text:'脆弱是危險的',v:'angry'}]},
  {q:'你小時候最渴望的是？',opts:[
    {text:'被肯定、被說「你做對了」',v:'perfectionist'},{text:'被陪伴、有人在',v:'abandoned'},
    {text:'被無條件接納',v:'pleaser'},{text:'被注意到、被記住',v:'invisible'},{text:'被保護、有人替你出頭',v:'angry'}]},
  {q:'你最不想成為的人？',opts:[
    {text:'不負責任的人',v:'perfectionist'},{text:'被遺棄的人',v:'abandoned'},
    {text:'被討厭的人',v:'pleaser'},{text:'引人注目的人',v:'invisible'},{text:'被壓在底下的人',v:'angry'}]},
  {q:'朋友突然冷淡了，你的第一反應？',opts:[
    {text:'我是不是說錯什麼了',v:'perfectionist'},{text:'他是不是要走了',v:'abandoned'},
    {text:'我是不是讓他不開心了',v:'pleaser'},{text:'算了，本來就不該太靠近',v:'invisible'},{text:'他什麼意思，有話直說',v:'angry'}]},
  {q:'你給自己打分數，通常是？',opts:[
    {text:'永遠覺得不夠，可以更好',v:'perfectionist'},{text:'不確定，要看別人怎麼看我',v:'abandoned'},
    {text:'別人滿意我就滿意',v:'pleaser'},{text:'不想被評分',v:'invisible'},{text:'我不讓別人打分，我自己來',v:'angry'}]},
  {q:'你最常做的夢是？',opts:[
    {text:'考試來不及、準備不夠',v:'perfectionist'},{text:'找不到人、被留在某個地方',v:'abandoned'},
    {text:'被追趕、來不及幫人',v:'pleaser'},{text:'在人群中但沒人看見你',v:'invisible'},{text:'在打架或逃跑',v:'angry'}]},
  {q:'你最需要什麼來開始自我修復？',opts:[
    {text:'允許自己犯錯',v:'perfectionist'},{text:'相信有人會留下來',v:'abandoned'},
    {text:'學會說「不」而不愧疚',v:'pleaser'},{text:'允許自己被看見',v:'invisible'},{text:'允許自己脆弱',v:'angry'}]},
  {q:'如果城堡裡那個房間的門打開了，你看到的孩子在做什麼？',opts:[
    {text:'在擦桌子，反覆檢查有沒有乾淨',v:'perfectionist'},{text:'坐在角落等人來',v:'abandoned'},
    {text:'在笑，但眼睛在看大人的臉色',v:'pleaser'},{text:'藏在衣櫃裡',v:'invisible'},{text:'在踢牆壁',v:'angry'}]},
  {q:'你想對那個孩子說什麼？',opts:[
    {text:'「你不需要完美，你本來就夠了」',v:'perfectionist'},{text:'「我來了，我不會走」',v:'abandoned'},
    {text:'「你不用照顧所有人，先照顧你自己」',v:'pleaser'},{text:'「我看見你了，你不用再躲了」',v:'invisible'},{text:'「你的生氣是對的，我懂」',v:'angry'}]},
];

const likertLabels=['完全不是','大概不是','中間','大概是','完全是'];
let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const isOpt=qd.opts&&qd.opts.length>0;
    let inner='';
    if(isOpt){
      const optsHTML=qd.opts.map((opt,oi)=>`<button class="quiz-option${answers[i]===opt.v?' selected':''}" onclick="selectAnswer(${i},'${opt.v}',this)"><span style="flex-shrink:0;opacity:0.6;font-size:0.8rem">${String.fromCharCode(65+oi)}</span><span>${opt.text}</span></button>`).join('');
      inner=`<div class="quiz-options">${optsHTML}</div>`;
    } else {
      const btns=[1,2,3,4,5].map(v=>`<button class="likert-btn${answers[i]===v?' selected':''}" onclick="selectAnswer(${i},${v},this)">${v}</button>`).join('');
      inner=`<div class="likert-wrap"><div class="likert-labels">${likertLabels.map(l=>`<span>${l}</span>`).join('')}</div><div class="likert-row">${btns}</div></div>`;
    }
    card.innerHTML=`<div class="quiz-q-num">第 ${i+1} 題 / ${questions.length}</div><div class="quiz-question">${qd.q}${qd.scenario?`<span class="quiz-scenario">${qd.scenario}</span>`:''}</div>${inner}<div class="quiz-nav">${i>0?`<button class="btn-prev" onclick="goTo(${i-1})">← 上一題</button>`:'<span></span>'}${i<questions.length-1?`<button class="btn-next" id="btnNext-${i}" ${answers[i]===undefined?'disabled':''} onclick="goTo(${i+1})">下一題 →</button>`:`<button class="btn-next" id="btnNext-${i}" ${answers[i]===undefined?'disabled':''} onclick="showResult()">${finishBtn}</button>`}</div>`;
    area.appendChild(card);
  });updateProgress(idx);
}
function selectAnswer(qi,v,btn){answers[qi]=v;const card=document.getElementById('qcard-'+qi);card.querySelectorAll('.quiz-option,.likert-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent=`第 ${idx+1} 題，共 ${questions.length} 題`;document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
