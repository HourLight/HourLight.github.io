<script>
const questions=[
  // SE=自我覺察 x8
  {dim:'SE',q:'朋友問你「你還好嗎？」的時候，你能馬上說出自己怎麼了，不只是「還好」。'},
  {dim:'SE',q:'考試前的心跳加速，你分得出那是「怕考砸」還是「有點期待表現」。'},
  {dim:'SE',q:'你清楚知道哪些人、哪些場景會讓你瞬間炸毛或想逃。'},
  {dim:'SE',q:'上次情緒突然爆掉的時候，你事後想想其實不太意外。'},
  {dim:'SE',q:'跟人說話說到一半突然不高興，你當下就知道是哪句話踩到你。'},
  {dim:'SE',q:'別人問「你擅長什麼、不擅長什麼」，你可以不猶豫地回答。'},
  {dim:'SE',q:'做重要決定的時候，你能分清楚「這是我想要的」還是「這是情緒在說話」。'},
  {dim:'SE',q:'跟朋友聊心事，你不會只說「就是不爽」，你能更精確地描述那個感覺。'},
  // SR=自我調節 x8
  {dim:'SR',q:'對方講了很過分的話，你能先忍住，不是馬上回嗆。'},
  {dim:'SR',q:'壓力大到快爆的時候，你有一套自己的方式可以讓自己降溫。'},
  {dim:'SR',q:'你很少講完一句重話之後，馬上想把那句話吞回去。'},
  {dim:'SR',q:'跟人吵到快要失控的時候，你能先喊暫停，讓自己冷一下。'},
  {dim:'SR',q:'有人故意激你的時候，你能沒說出那句你會後悔的話。'},
  {dim:'SR',q:'行程突然全部打亂，你能重新調整而不是整個人當機。'},
  {dim:'SR',q:'上班被氣到快炸了，你到家還能好好跟家人說話。'},
  {dim:'SR',q:'明天有個很重要的事，你今晚焦慮歸焦慮，該準備的還是能做完。'},
  // MO=內在動機 x8
  {dim:'MO',q:'就算沒人看、沒人誇，你做這件事還是覺得值得。'},
  {dim:'MO',q:'摔了一跤之後，你可以自己爬起來，不用人來拉。'},
  {dim:'MO',q:'沒人盯的時候，你還是會按照自己的計畫做事。'},
  {dim:'MO',q:'你知道自己這陣子在往哪走，不是走一步算一步。'},
  {dim:'MO',q:'學新東西的過程本身就讓你開心，不只是拿到結果那一刻。'},
  {dim:'MO',q:'遇到困難的時候，你第一反應是「怎麼辦」不是「算了」。'},
  {dim:'MO',q:'有些事你明明不想做，但你能說服自己「這是我選的」然後做完。'},
  {dim:'MO',q:'工作對你來說不只是賺錢，你覺得自己在做的事情有某種意義。'},
  // EM=同理心 x8
  {dim:'EM',q:'朋友笑著說「我沒事」的時候，你看得出來他其實有事。'},
  {dim:'EM',q:'跟你立場完全相反的人，你能理解他為什麼那樣想。'},
  {dim:'EM',q:'朋友跟你聊完之後，通常會說一句「跟你聊天好舒服」。'},
  {dim:'EM',q:'有人跑來找你訴苦，你能判斷他現在需要的是「聽我說」還是「幫我想辦法」。'},
  {dim:'EM',q:'別人在說話的時候，你的腦袋不會同時在排練等一下要說什麼。'},
  {dim:'EM',q:'走進一個房間，你馬上就感覺得到氣氛是放鬆還是緊繃。'},
  {dim:'EM',q:'朋友在哭的時候，你不會脫口而出「你想太多了」。'},
  {dim:'EM',q:'你自然而然會注意到那些被忽略的人、被排擠的人。'},
  // SO=社交技巧 x8
  {dim:'SO',q:'第一次見面的人，跟你聊幾分鐘就不會覺得尷尬了。'},
  {dim:'SO',q:'兩個人吵架，你能找到一個雙方都能接受的方案。'},
  {dim:'SO',q:'你會看對方的狀態來調整說話的方式和語氣。'},
  {dim:'SO',q:'你能讓別人改變想法，但對方不會覺得被逼迫。'},
  {dim:'SO',q:'一群人意見不同的時候，你能自然地把大家拉到同一個方向。'},
  {dim:'SO',q:'你能把難聽的話包裝成對方聽得進去的版本。'},
  {dim:'SO',q:'你身邊有好幾段維持了很多年的關係。'},
  {dim:'SO',q:'什麼時候該開口、什麼時候該閉嘴，你通常判斷得不錯。'},
];

const likertLabels=['完全不是','大概不是','中間','大概是','完全是'];
let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const btns=[1,2,3,4,5].map(v=>`<button class="likert-btn${answers[i]===v?' selected':''}" onclick="selectAnswer(${i},${v},this)">${v}</button>`).join('');
    card.innerHTML=`<div class="quiz-q-num">第 ${i+1} 題 / ${questions.length}</div><div class="quiz-question">${qd.q}</div><div class="likert-wrap"><div class="likert-labels">${likertLabels.map(l=>`<span>${l}</span>`).join('')}</div><div class="likert-row">${btns}</div></div><div class="quiz-nav">${i>0?`<button class="btn-prev" onclick="goTo(${i-1})">← 上一題</button>`:'<span></span>'}${i<questions.length-1?`<button class="btn-next" id="btnNext-${i}" ${answers[i]===undefined?'disabled':''} onclick="goTo(${i+1})">下一題 →</button>`:`<button class="btn-next" id="btnNext-${i}" ${answers[i]===undefined?'disabled':''} onclick="showResult()">看我的 EQ 雷達圖 🧭</button>`}</div>`;
    area.appendChild(card);
  });updateProgress(idx);
}
function selectAnswer(qi,v,btn){answers[qi]=v;document.getElementById('qcard-'+qi).querySelectorAll('.likert-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent=`第 ${idx+1} 題，共 ${questions.length} 題`;document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}

function showResult(){
  const raw={SE:0,SR:0,MO:0,EM:0,SO:0};
  questions.forEach((qd,i)=>{raw[qd.dim]+=(answers[i]||3);});
  const pct={};['SE','SR','MO','EM','SO'].forEach(d=>{pct[d]=Math.round((raw[d]-8)/32*100);});
  const total=Math.round(Object.values(pct).reduce((a,b)=>a+b,0)/5);
  const sorted=Object.entries(pct).sort((a,b)=>b[1]-a[1]);
  const topDim=sorted[0][0];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';

  const dimNames={SE:'自我覺察',SR:'自我調節',MO:'內在動機',EM:'同理心',SO:'社交技巧'};
  const dimIcons={SE:'🔍',SR:'🎯',MO:'🔥',EM:'💝',SO:'🤝'};

  const hlTitles={
