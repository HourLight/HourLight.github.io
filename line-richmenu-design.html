<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,viewport-fit=cover"/>
<meta name="robots" content="noindex,nofollow">
<title>LINE 圖文選單設計稿｜馥靈之鑰</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#222;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px;font-family:'Noto Serif TC','PingFang TC',serif}

.menu{
  width:2500px;height:1686px;
  display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr;
  background:#06040e;
  border:1px solid rgba(248,223,165,.1);
  overflow:hidden;
}
.cell{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border:1px solid rgba(248,223,165,.08);
  position:relative;
  transition:background .3s;
  cursor:default;
}
.cell:hover{background:rgba(248,223,165,.04)}

.cell-icon{
  width:120px;height:120px;
  border-radius:50%;
  border:2px solid rgba(248,223,165,.25);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:32px;
  background:rgba(248,223,165,.06);
}
.cell-icon svg{width:56px;height:56px;stroke:#f8dfa5;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

.cell-label{
  font-size:48px;color:#f8dfa5;letter-spacing:.15em;font-weight:500;
}
.cell-sub{
  font-size:28px;color:rgba(248,223,165,.45);letter-spacing:.08em;margin-top:12px;font-weight:300;
}

/* 品牌浮水印 */
.watermark{
  position:absolute;bottom:24px;right:32px;
  font-size:22px;color:rgba(248,223,165,.15);letter-spacing:.2em;
}

/* 縮放提示 */
.hint{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.8);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;
  font-family:sans-serif;z-index:100;
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet">

</head>
