// ══════ 測驗邏輯 ══════

var answers={}, currentQ=0;

function startQuiz(){
  answers={};currentQ=0;
  document.querySelector('.quiz-hero').style.display='none';
  document.getElementById('progressWrap').style.display='block';
  document.getElementById('questionsArea').style.display='block';
  document.getElementById('quizResult').classList.remove('active');
  renderQ();
}

function renderQ(){
  var q=QUESTIONS[currentQ];
  var opts=q.opts.sort(function(){return Math.random()-0.5});
  var html='<div class="quiz-question-card"><div class="quiz-q-number">'+(currentQ+1)+' / '+QUESTIONS.length+'</div>'
    +'<div class="quiz-q-text">'+q.q+'</div><div class="quiz-options">';
  opts.forEach(function(o,i){
    html+='<button class="quiz-option" onclick="answer(\''+o.a+'\',this)">'+o.t+'</button>';
  });
  html+='</div></div>';
  document.getElementById('questionsArea').innerHTML=html;
  document.getElementById('progressFill').style.width=((currentQ/QUESTIONS.length)*100)+'%';
  document.getElementById('progressText').textContent=(currentQ+1)+' / '+QUESTIONS.length;
}

function answer(a,btn){
  answers[currentQ]=a;
  btn.classList.add('selected');
  setTimeout(function(){
    currentQ++;
    if(currentQ>=QUESTIONS.length) showResult();
    else renderQ();
  },300);
}

function showResult(){
  // 計分
  var scores={};
  ARCHETYPES.forEach(function(a){scores[a]=0});
  Object.values(answers).forEach(function(a){scores[a]=(scores[a]||0)+1});

  // 排序
  var sorted=ARCHETYPES.slice().sort(function(a,b){return scores[b]-scores[a]});
  var top=sorted[0];
  var second=sorted[1];
  var r=DATA[top];

  document.getElementById('questionsArea').style.display='none';
  document.getElementById('progressWrap').style.display='none';

  // 稱號
  document.getElementById('hlTitleReveal').innerHTML='<div class="screenshot-card" id="screenshotCard">'
    +'<div class="ss-brand">HOUR LIGHT ✦ 馥靈之鑰</div>'

  // Hero

  // 分數條
  var dh='';
  sorted.slice(0,6).forEach(function(a){

    var d=DATA[a];

    +'<div class="cm-cards">'+r.cards.map(function(c){return '<span class="cm-chip">'+c+'</span>'}).join('')+'</div>'
    +'<div style="margin-top:14px"><a href="draw-hl.html" style="color:rgba(233,194,125,.8);font-size:.82rem">→ 去抽你的原型卡，聽聽它現在想對你說什麼</a></div>'
    +'</div>';

  // H.O.U.R.
  var h=HOUR_MAP[r.hour];

  // 轉化橋

}
