<script>
var TYPES={control:{name:'控制焦慮',icon:'🏔️',sub:'怕事情失控',desc:'您的夢境揭示了一個核心焦慮：怕失去掌控。不是控制慾，是安全感需要「知道接下來會發生什麼」。',detail:'控制焦慮的人通常很會規劃，但也因此最怕「意外」。每一個意外都像是在說「你不夠好，所以才沒預料到」。\n\n夢境在提醒您：有些事情不在您的控制範圍內。放下控制不是放棄，是相信「即使失控了我也能處理」。'},
worth:{name:'價值焦慮',icon:'💎',sub:'怕自己不夠好',desc:'您的夢境揭示了對自我價值的懷疑。不是沒有能力，是腦袋裡有一個聲音一直在說「你不夠格」。',detail:'價值焦慮的人做再多都覺得不夠。因為衡量的標尺是移動的，永遠追不上。\n\n夢境在說的是：您已經夠了。此刻的您不需要再證明什麼。那個「不夠」的聲音不是事實，是舊錄音帶。'},
connection:{name:'連結焦慮',icon:'🤝',sub:'怕被拋棄或孤立',desc:'您的夢境揭示了對關係的不安。不是缺愛，是怕「有一天愛會消失」。',detail:'連結焦慮的人很會照顧別人，但底層的動力是「如果我不付出，對方會不會離開」。\n\n夢境在說：被愛不需要條件。如果一段關係需要您永遠表現完美才能維持，那不是愛，是交易。'},
change:{name:'變化焦慮',icon:'🦋',sub:'怕改變怕未知',desc:'您的夢境揭示了對未知的恐懼。不是膽小，是現在的雖然不完美但至少熟悉。',detail:'變化焦慮的人最怕聽到「可能要換一下」這句話。換工作、搬家、結束一段關係，光是想就開始焦慮。\n\n夢境在說：每一次改變都像死一次。但死掉的是舊版本的您，新版本已經在等了。'}};

{q:'您走進一個夢境。第一個看到的場景是：',opts:[{t:'一條沒有盡頭的長走廊',a:'control'},{t:'一間考場，但您不知道考什麼',a:'worth'},{t:'一個人都沒有的廣場',a:'connection'},{t:'一扇門，門後有光但看不清楚',a:'change'}]},
{q:'夢裡有一個聲音在叫您。那個聲音聽起來像：',opts:[{t:'指令（快一點、做好一點）',a:'control'},{t:'評價（你確定嗎？你行嗎？）',a:'worth'},{t:'呼喊（不要走、等等我）',a:'connection'},{t:'邀請（過來，這裡有東西給你看）',a:'change'}]},

-bottom:16px">全部分佈</h3>';sorted.forEach(function(k){var fl=TYPES[k],pct=Math.round(scores[k]/QUESTIONS.length*100);html+='<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:4px"><span>'+fl.icon+' '+fl.name+'</span><span style="color:var(--qlt)">'+pct+'%%</span></div><div style="height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden"><div style="height:100%%;width:'+pct+'%%;background:var(--qc1);border-radius:3px;animation:hlBarGrow .8s ease both"></div></div></div>'});html+='</div>';html+='<div style="background:#fff;border-radius:16px;padding:24px;text-align:center;margin-bottom:20px;border:1.5px solid #eee"><div style="font-size:.92rem;margin-bottom:14px">想更深入了解自己？</div><div style="display:flex;flex-direction:column;gap:10px;max-width:320px;margin:0 auto"><a href="fuling-mima.html" style="display:block;padding:12px;background:var(--qc1);color:#fff;border-radius:12px;text-decoration:none;font-weight:600;font-size:.88rem">🔮 測算馥靈秘碼（免費）</a><a href="draw-hl.html" style="display:block;padding:12px;background:var(--qc2);color:#fff;border-radius:12px;text-decoration:none;font-weight:600;font-size:.88rem">🎴 抽一張馥靈指引牌</a></div></div>';html+='<div style="text-align:center;font-size:.68rem;color:var(--qlt);line-height:1.8">本測驗靈感來源為 Carl Jung 夢境分析與意象對話，結果僅供自我覺察參考。<br>© 2026 馥靈之鑰國際有限公司｜hourlightkey.com</div></div>';document.getElementById('quizResult').innerHTML=html;document.getElementById('quizResult').style.display='block';document.getElementById('quizResult').scrollIntoView({behavior:'smooth',block:'start'});if(window.hlCastle)hlCastle.giveKey('dream')}
