<script>
var TYPES={
prophet:{name:'預知夢者',icon:'🔮',cl:'#6C5CE7',sub:'夢裡藏著未來的碎片，你的潛意識比理性腦快好幾步',
desc:'你的夢境不只是回放白天的記憶，它們常常帶著一種「預感」的味道，像快樂鼠尾草那樣朦朧卻精準。你可能夢過某個場景，後來真的發生了；或者夢裡出現的人，隔天就莫名其妙聯絡你。朋友說你「太玄」，但你知道這不是巧合。Jung 稱這為「共時性」，宇宙的巧合不是巧合，是你的潛意識接收到了某些訊號，比你的理性腦早一步解讀完畢。你的夢像一台訊號接收器，頻率調得比別人靈敏。有些人睡覺是關機，你睡覺是開天線。你最適合在睡前設定一個「想問潛意識的問題」，然後帶著這個問題入睡。醒來後記錄夢境，那些看似荒謬的畫面裡藏著你還沒來得及理解的答案。',
dreamType:'你最常做的夢：突然想起一個很久沒聯絡的人，然後他就出現了。夢到某個場景後來成真。在夢裡「知道」某件事會發生，醒來後覺得不安但又很篤定。有時候你會分不清是夢還是預感。',
oil:'🌿 快樂鼠尾草：睡前滴 3 滴在枕頭旁擴香，被稱為「夢之草」，打開直覺的頻道。你的天線本來就靈敏，這支精油幫你調得更準。\n🌿 檀香：冥想時滴在眉心或胸口，深層連結高我。那些夢裡的「知道」，會變得更清晰、更有畫面。\n🌿 月桂：早晨嗅吸，預知力的放大器。古希臘的先知都用月桂。幫你把夢裡的訊息帶到白天。\n\n為什麼這個配方對你有效？\n快樂鼠尾草裡的乙酸沉香酯會溫柔地安撫你的杏仁核（大腦的情緒警報器），讓你的邊緣系統從「日間防禦模式」切換到「夜間接收模式」。檀香裡的 α-檀香醇能啟動前額葉皮質的深層連結迴路，讓潛意識的訊號傳得更清晰。月桂裡的桉油醇則在早晨幫你的海馬迴「回放」夢境記憶。簡單說：這組配方幫你的大腦從「播報新聞」切換到「收看直播」。',
med:'手邊沒有精油？試試這個：\n\n【預知夢者的訊號接收練習】\n睡前坐在床上，閉上眼睛。\n\n第一步：緩慢深呼吸 5 次（吸 4 秒、停 2 秒、吐 6 秒），每一次吐氣時想像自己的身體慢慢變透明，像一面乾淨的接收天線。\n\n第二步：在心裡對潛意識說一句話：「今晚，請讓我看見我需要看見的。」不用大聲，默念就好。重複 3 次。\n\n第三步：想像你站在一片星空下，每一顆星星都是一個訊號。你不需要去抓任何一顆，只要張開雙手，讓它們自己來。停留在這個畫面裡 60 秒。\n\n第四步：放鬆躺下，把注意力放在眉心（第三眼的位置），感受那裡微微的溫熱。帶著這個感覺入睡。\n\n醒來後的前 30 秒，不要動、不要看手機。閉著眼，讓夢的碎片像底片一樣慢慢顯影。記住任何一個畫面或感覺，立刻寫下來。你的天線已經打開了。',
awareness:'你的覺察練習：在床頭放一本「夢境日記」。醒來的前三十秒，不要看手機，先把夢的畫面寫下來，哪怕只有三個字。一個月後翻回去看，你會發現一個驚人的模式：你的夢比你以為的更準。不是每個夢都是預言，但你的潛意識一直在跟你說話。',
share:'🔮 我是預知夢者！夢裡藏著未來的碎片，朋友說我太玄，但那些「巧合」的命中率高得讓我自己都怕。你的夢在告訴你什麼？'},
emotion:{name:'修復夢者',icon:'🎭',cl:'#E17055',sub:'白天壓住的情緒，夢裡全都溫柔地播出來',
desc:'你的夢是情緒的私人放映室，空氣裡瀰漫著羅馬洋甘菊那種溫暖到讓人想哭的味道。白天你可能很會忍、很會裝沒事、很會「理性處理」，同事問你還好嗎，你說「沒事啊」，笑得很職業。但到了晚上，潛意識把所有被壓下去的感覺一次播放給你看。所以你的夢常常很濃烈：哭得很慘、怒得很兇、怕得要死、或者開心到不想醒來。你的夢在告訴你：「嘿，這些情緒白天沒有被好好感受，它們還在。不是不見了，只是被你塞到枕頭底下了。」你的夢不是問題，是出口。是你的身體替你安排的情緒回收日。如果你持續做很激烈的夢，那是潛意識在溫柔但堅定地催促你：白天也可以允許自己有感覺。你不用永遠堅強。',
dreamType:'你最常做的夢：被追趕（逃不掉的壓力）、墜落（失控感）、跟某人激烈爭吵（沒說出口的話）、跟已逝的人重逢（未完成的告別）、在夢裡大哭然後醒來枕頭是濕的。',
oil:'🌿 羅馬洋甘菊：睡前滴 2 滴在枕頭上，情緒的溶解液，最溫柔的安眠曲。讓那些白天裝不下的感覺在夢裡被輕輕接住。\n🌿 依蘭依蘭：泡澡時滴 3 滴，心門慢慢打開。允許自己感受，不用再假裝「沒事」。\n🌿 薰衣草：持續擴香整夜，安撫過度警覺的神經系統。讓夢境從暴風雨變成毛毛雨，柔軟但依然真實。\n\n為什麼這個配方對你有效？\n羅馬洋甘菊裡的酯類分子（尤其是歐白芷酸異丁酯）直接對你的杏仁核說「收工了，今天辛苦了」，讓過度警覺的邊緣系統終於可以放鬆。依蘭依蘭的沉香醇和乙酸苄酯促進血清素分泌，打開你心裡那扇一直關著的門。薰衣草的乙酸沉香酯則幫前額葉和杏仁核之間搭一條溫柔的橋，讓情緒流過去而不是堵在胸口。翻譯成白話：這組配方讓你的身體終於允許自己「有感覺」。',
med:'手邊沒有精油？試試這個：\n\n【修復夢者的情緒釋放練習】\n找一個安靜的地方坐下來（床上最好）。\n\n第一步：把雙手放在胸口，感受心跳。呼吸 5 次（吸 4 秒、吐 6 秒），每一次吐氣時輕輕嘆一口氣，像在說「呼～」。\n\n第二步：閉上眼，問自己：「今天有什麼感覺是我還沒好好感受的？」不急著回答，等 15 秒。\n\n第三步：不管浮現什麼情緒（委屈、疲倦、難過、莫名的緊繃），想像它變成一種顏色。深呼吸 3 次，每次吐氣時想像那個顏色從胸口慢慢飄出去，像煙一樣散開。\n\n第四步：最後對自己說一句話：「今天的感覺我收到了，謝謝你告訴我。」然後把手從胸口移到肚子上，再做 3 次深呼吸。\n\n躺下來入睡。今晚的夢會溫柔很多，因為你已經在醒著的時候接住了自己。',
awareness:'你的覺察練習：下次做了一個情緒很濃的夢，醒來後不要急著「甩掉」它。問自己：「這個情緒，白天有沒有被我壓下去的版本？」通常會有。那個被壓下去的瞬間，就是你的夢想要你回去看的地方。不需要處理，只需要承認：「嗯，我有這個感覺。」光是承認，夢就會變柔軟。',
share:'🎭 我是修復夢者！白天壓住的情緒，夢裡全都播出來。原來我的潛意識比我誠實太多了。有一次夢裡大哭醒來枕頭是濕的，這就是身體替我安排的情緒回收日。你呢？'},
solver:{name:'解謎夢者',icon:'🧩',cl:'#00B894',sub:'你的大腦連睡覺都在加班，夢裡自帶解題模式',
desc:'你的夢像一台後台運算的超級電腦，帶著迷迭香的清冽。白天解不開的問題、做不了的決定、卡住的企劃案，你的大腦在你以為它「關機」的時候繼續處理。你可能曾經「一覺醒來突然有了靈感」，或者在夢裡直接看到解法，像一個燈泡在黑暗中亮起來。這不是魔法，是你大腦的工作模式，把白天散落的資訊碎片重新排列組合，找到清醒時被「太努力」擋住的連結。你是天生的問題解決者，而你最強的武器不是熬夜加班，是好好睡一覺。愛因斯坦的相對論、Paul McCartney 的 Yesterday、門捷列夫的元素週期表，都是在夢裡浮現的。你是他們的同類。',
dreamType:'你最常做的夢：在夢裡工作（對，連夢都在加班）、突然想通一件卡了很久的事、夢境很有邏輯像在解一道推理題、醒來後有「啊！原來如此」的頓悟感。有時候你甚至會夢到程式碼或簡報。',
oil:'🌿 迷迭香（CT 桉油醇）：睡前嗅吸，記憶增強、幫你記住夢裡閃過的靈感。不要讓那些天才想法隨著鬧鐘響消散。\n🌿 薄荷：醒來第一件事嗅吸，清晰思路、把夢裡的解法從模糊拉到高清。\n🌿 檸檬：工作時擴香，資訊整合力提升。你的大腦白天蒐集素材，夜晚組裝成品，檸檬幫你兩班都更有效率。\n\n為什麼這個配方對你有效？\n迷迭香裡的 1,8-桉油醇會直接刺激你的海馬迴（記憶的總管），讓夢裡那些一閃而過的靈感被「存檔」而不是「清除」。薄荷的薄荷醇喚醒前額葉皮質，把模糊的夢境解法拉到高清畫質。檸檬的檸檬烯促進多巴胺分泌，讓你的大腦在「蒐集資訊」和「重組連結」之間切換得更順暢。白話翻譯：你的腦袋本來就是一台解題神機，這組配方幫它裝了更大的硬碟和更快的處理器。',
med:'手邊沒有精油？試試這個：\n\n【解謎夢者的靈感錨定練習】\n睡前坐在書桌前或床邊，準備一張白紙和筆。\n\n第一步：把今天卡住的那個問題寫在紙上。只寫一句話，越簡單越好。例如：「這個企劃的核心賣點是什麼？」\n\n第二步：閉上眼，做 6 次方塊呼吸（吸 4 秒、停 4 秒、吐 4 秒、停 4 秒）。每一輪呼吸時，想像你的大腦是一台電腦，正在後台靜靜地運算。\n\n第三步：睜開眼，在紙上隨意寫下 5 個跟這個問題完全無關的詞。例如：「雲朵、螺絲、藍莓、迴旋、口袋」。不要想，手寫就對了。\n\n第四步：把紙放在枕頭旁邊，告訴自己：「我的大腦今晚會幫我把這些碎片拼起來。」然後躺下睡覺。\n\n醒來的前 3 分鐘，不看手機。拿起筆，寫下腦中浮現的第一個念頭。很可能就是答案。你的後台運算完成了。',
awareness:'你的覺察練習：睡前對自己說一句話：「如果明天醒來，這個問題有了答案，那個答案會是什麼？」然後不要再想，直接睡。你的大腦會在你睡著的時候繼續跑。醒來的前三分鐘，先不要看手機，把腦海裡浮現的第一個念頭記下來。那個念頭，很可能就是答案。',
share:'🧩 我是解謎夢者！大腦連睡覺都在加班。最厲害的是我不用付加班費。有一次夢裡直接夢到卡了三天的企劃解法，老闆以為我熬夜想出來的。你的夢在替你做什麼？'},
creative:{name:'冒險夢者',icon:'🎨',cl:'#E58E26',sub:'你的夢是一座超現實美術館，每晚自動換展',
desc:'你的夢境像一部超現實電影，空氣裡飄著佛手柑和茉莉交織的奇幻香氣。會飛的鯨魚游過你家客廳、時鐘像達利畫的那樣融化在桌上、你站在宇宙的邊緣往下看然後覺得「嗯不錯的景色」。你的潛意識不走正常路線，它喜歡把完全不相關的東西揉在一起，創造出全新的畫面。別人的夢是「考試遲到」，你的夢是「騎著一隻透明的馬在海底的圖書館裡找一本會唱歌的書」。這些看似荒謬的夢境，是創造力最原始的形態。達利的融化時鐘、宮崎駿的龍貓、許多偉大的創作都來自夢境。你不需要「解讀」這些夢，你需要「收藏」它們。床頭放一本筆記本，醒來立刻速寫。你會發現夢裡的靈感比清醒時想出來的更精彩、更大膽、更不設限。',
dreamType:'你最常做的夢：飛翔（而且飛行方式每次不同）、身體變形或有超能力、到了一個不存在但無比華麗的地方、夢境色彩鮮豔到像開了濾鏡、出現現實中不可能存在的生物或建築。',
oil:'🌿 佛手柑：睡前擴香 3 滴，想像力的水龍頭轉到最大。讓你的夢更自由、更不設限、更敢亂來。\n🌿 天竺葵：泡澡時滴 2 滴，創意的平衡，在超現實和現實之間找到那個甜蜜的交界點。\n🌿 廣藿香：醒來後嗅吸，把夢境的靈感錨定到現實。不要只是做夢，把最好的部分帶回來用。\n\n為什麼這個配方對你有效？\n佛手柑的檸檬烯和乙酸沉香酯聯手，一邊讓前額葉放下「這不合理」的框架，一邊讓邊緣系統自由奔跑。天竺葵的香葉醇和香茅醇平衡左右腦的活躍度，讓你的創意不至於飛太遠收不回來。廣藿香的廣藿香醇直接作用在基底核，像一枚錨釘把天馬行空的靈感釘在現實的木板上。翻譯成人話：佛手柑幫你做最瘋的夢，天竺葵幫你記住最美的畫面，廣藿香幫你把畫面變成作品。',
med:'手邊沒有精油？試試這個：\n\n【冒險夢者的創意漫遊練習】\n躺在床上，關燈之後先不急著睡。\n\n第一步：閉上眼，做 4 次長呼吸（吸 5 秒、吐 7 秒）。每次吐氣時，想像你的身體正在慢慢融化成一攤溫暖的液體，流進枕頭裡。\n\n第二步：想像你站在一扇巨大的彩色門前面。門上畫著你從沒見過的圖案。用 30 秒仔細「看」那些圖案，不要嘗試認出它們是什麼，讓它們自己說話。\n\n第三步：在心裡推開門。門後面是什麼？不要想，讓第一個畫面自己跳出來。不管是海底城堡、會飛的圖書館還是紫色的沙漠，都接受它。在那個場景裡「走」60 秒。\n\n第四步：找到場景裡一個你想帶回來的東西（一朵花、一顆石頭、一個聲音都可以）。把它握在手心，然後放鬆入睡。\n\n明天醒來，花 2 分鐘用三個關鍵字記下夢裡的畫面。你的私人美術館又多了一幅新展品。',
awareness:'你的覺察練習：醒來後不要急著清醒。在半夢半醒的狀態裡停留三分鐘，用速寫或幾個關鍵字把夢境的畫面記下來。不需要完整，不需要合理，碎片就好。一個月後翻回去看，你會發現你的夢給你的素材，比 Pinterest 還豐富。你的潛意識是你最好的創意總監。',
share:'🎨 我是冒險夢者！昨晚夢到騎著透明的馬在海底圖書館找一本會唱歌的書。別人的夢是考試遲到，我的夢是自帶特效。你的夢境美術館展什麼？'},
memory:{name:'重播夢者',icon:'📚',cl:'#636E72',sub:'你的夢在幫你整理記憶，每一段過去都有意義',
desc:'你的夢境像一台記憶的老式投影機，帶著雪松和乳香那種溫暖的木質調。你常常夢到「以前的事」，小時候的學校走廊、搬過的那間老房子、很久沒見的國中同學的臉。這不是沉溺過去，是你的大腦在做非常重要的工作：記憶歸檔。神經科學研究發現，睡眠中的大腦會重新播放白天（和過去）的記憶，決定哪些存入長期記憶、哪些可以放手。你的夢之所以常常出現過去的場景，是因為你的大腦正在把新的經驗跟舊的記憶串在一起，編織成你這個人的故事。你在用過去理解現在。你是一個很重視經驗的人，你相信「走過的路都不會白費」，你的成長來自回顧，你的智慧來自那些反覆咀嚼的記憶。',
dreamType:'你最常做的夢：回到學校（教室、走廊、操場）、見到小時候的朋友或家人、重訪某個去過的城市或房間、重複某個人生轉折點的場景。有時候夢裡的記憶比真實的還清晰。',
oil:'🌿 乳香：睡前滴 2 滴在掌心嗅吸，時間穿越者的通行證。跨越記憶的長廊，讓那些畫面帶著溫度回來。\n🌿 雪松：擴香整夜，根基穩固的木質香安定你在過去與現在之間的擺盪。你不需要住在過去，只需要帶著過去的禮物走到現在。\n🌿 甜橙：醒來後嗅吸，溫暖記憶的色調。讓回顧帶著感恩而不是遺憾，帶著微笑而不是嘆息。\n\n為什麼這個配方對你有效？\n乳香裡的乳香酸和倍半萜烯能穿透血腦屏障，直接跟你的海馬迴（記憶銀行的總經理）對話，讓舊記憶帶著更完整的情緒標籤浮上來。雪松的雪松烯作用在邊緣系統的「穩定器」，讓你回憶過去的時候腳還踩在現在。甜橙的檸檬烯促進多巴胺釋放，把記憶的色溫從冷藍調調成暖黃調。白話翻譯：乳香幫你開門回去看，雪松確保你不會迷路，甜橙讓你帶著微笑回來。',
med:'手邊沒有精油？試試這個：\n\n【重播夢者的記憶溫泉練習】\n睡前找一個安靜的姿勢，坐著或躺著都可以。\n\n第一步：閉上眼，做 5 次腹式呼吸（吸氣 4 秒讓肚子鼓起來、吐氣 6 秒讓肚子凹下去）。每次吐氣時想像自己慢慢沉進一池溫暖的水裡。\n\n第二步：在心裡輕聲問自己：「有沒有一段記憶，現在想起來會讓我微笑的？」等 10 秒，讓畫面自己浮上來。\n\n第三步：找到那個畫面後，用 60 秒慢慢「放大」它的細節。那天的光線是什麼樣的？空氣裡有什麼味道？誰在你身邊？他們的表情是什麼？讓五感的記憶一層一層回來。\n\n第四步：把雙手放在肚子上，對那段記憶說：「謝謝你，你教會了我一些重要的事。」深呼吸 3 次。\n\n然後放鬆入睡。今晚的夢會帶你回到你需要回去的地方，而且帶著比往常更溫暖的色調。',
awareness:'你的覺察練習：下次夢到過去的場景，醒來後問自己：「這段記憶出現在現在，是因為它跟我最近的什麼經歷有連結？」你的大腦不會無緣無故播放舊片段，它在暗示你，過去的某個經驗裡，有你現在需要的答案。那個連結找到了，你就找到了你的夢想說的話。',
share:'📚 我是重播夢者！夢裡在幫記憶歸檔，每一段過去都有意義。昨晚又夢到國小的走廊了，原來我的大腦比我還念舊。你的夢帶你回到哪裡？'},
traveler:{name:'清醒夢者',icon:'✨',cl:'#0C2461',sub:'你的夢是另一個維度的旅行，每晚閉眼就出發',
desc:'你的夢境有一種「去了另一個地方」的真實感，帶著檀香和乳香那種超越時空的深邃。你可能會夢到從未去過的城市，但街道的細節清晰到不可思議，轉角有一棵什麼樹、牆壁是什麼顏色、空氣是什麼味道。你在夢裡遇到的人，不像是自己想像出來的，他們有自己的表情、自己的話要說。你醒來後會有一種很深的感覺，像是真的經歷了一場旅行，身體還帶著那個空間的溫度。Jung 把這類夢叫做「大夢」（Big Dreams），它們攜帶的不是個人的焦慮，而是更大的、集體潛意識層面的訊息。你是少數能在夢中觸及深層意識的人。有些人一輩子做一兩次大夢，你可能每個月都在旅行。你的夢不只是為了你自己，它們帶著某種超越個人的洞見。',
dreamType:'你最常做的夢：在夢中「知道自己在做夢」（清明夢）、到了一個不存在但感覺比現實還真實的地方、遇到不認識但感覺極其重要的人、夢裡有某種「教導」或「啟示」。你的夢有時候帶著一種莊嚴感。',
oil:'🌿 檀香：睡前塗在眉心或脈搏處，靈性的橋樑。連結那個在夢裡等你的深層意識。你的旅行需要一張安全的通行證。\n🌿 乳香：擴香整夜，神聖空間的守護者。為靈魂旅行打開一扇安全的門，也確保你能完整地回來。\n🌿 快樂鼠尾草：睡前嗅吸 3 次深呼吸，夢境深化，讓你在夢裡走得更遠、看得更清楚、記得更完整。\n\n為什麼這個配方對你有效？\n檀香的 α-檀香醇能穿過血腦屏障，直達松果體和丘腦，像幫你的意識裝上一台高倍望遠鏡。乳香的乳香酸安撫杏仁核的恐懼反應，讓你的大腦在深層意識旅行時保持「安全感」而不是「警戒狀態」。快樂鼠尾草的乙酸沉香酯則讓邊緣系統進入一種「清醒但放鬆」的狀態，這正是清明夢（知道自己在做夢）最需要的腦波頻率。簡單說：檀香幫你走得更深，乳香幫你走得更安全，鼠尾草幫你記得回來的路。',
med:'手邊沒有精油？試試這個：\n\n【清醒夢者的意識旅行練習】\n睡前坐在床上，找到一個舒服的姿勢。\n\n第一步：閉上眼，做 7 次非常緩慢的呼吸（吸 5 秒、吐 8 秒）。每一次吐氣時，想像你的身體像一層薄紗一樣變得越來越輕、越來越透明。\n\n第二步：把注意力集中在眉心。想像那裡有一扇小小的門，門的另一邊透出微微的光。不急著開門，先感受門後面傳來的溫度。停留 30 秒。\n\n第三步：在心裡默念 3 次：「今晚我會清醒地旅行，我會記得我去過的地方。」\n\n第四步：想像你慢慢穿過那扇門，來到一個空曠的平台。四面八方都是星空。你可以選擇往任何方向走。不要選，讓你的腳自己帶你去。在這個畫面裡停留 90 秒。\n\n第五步：躺下來，把注意力從眉心移到全身，感覺自己像一片葉子飄落在水面上。帶著這個輕盈的感覺入睡。\n\n醒來後先不動。花 60 秒回想：你去了哪裡？那裡的空氣是什麼溫度？你遇到了誰？把「感覺」而不只是「畫面」記下來。',
awareness:'你的覺察練習：睡前用一個簡單的儀式告訴自己：「今晚我會清醒地旅行。」然後放鬆入睡。醒來後立刻記錄，不只是記夢的「內容」，更要記夢的「感覺」：你在那個空間裡是什麼感受？那個感受，就是你的夢要帶給你的訊息。內容可能是象徵，但感受永遠是真的。',
share:'✨ 我是清醒夢者！夢是另一個維度的旅行，每晚閉上眼就出發。有一次夢到一個從沒去過的城市，連街角那棵樹的形狀都記得。你的夢帶你去哪？'}
};
