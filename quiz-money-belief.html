    practice:'「感恩流動」呼吸法\n\n找一個安靜的角落坐下來。吸氣 4 秒，想一件今天花了錢的事，不管多小。吐氣 6 秒，對那筆花費說「謝謝你讓我的一天好了一點。」\n\n做 5 輪，每輪想一件不同的事。最後一輪結束，感覺一下你胸口的溫度。那就是富足的感覺。它跟帳戶數字無關。',

let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const sceneHTML=qd.scene?'<div class="quiz-scene">'+qd.scene+'</div>':'';
    const optsHTML='<div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 題 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一題</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一題 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看我的金錢信念 💎</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 題，共 '+questions.length+' 題';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const scores={};dims.forEach(d=>{scores[d.key]=0;});
  Object.entries(answers).forEach(([qi,oi])=>{
    const opt=questions[parseInt(qi)].opts[oi];
    if(opt.scores){Object.entries(opt.scores).forEach(([k,v])=>{scores[k]=(scores[k]||0)+v;});}
  });
  const maxScore=Math.max(...Object.values(scores));
  const sorted=dims.map(d=>d.key).sort((a,b)=>scores[b]-scores[a]);
  const topType=sorted[0],f=TYPES[topType],f2=TYPES[sorted[1]];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('screenshotCard').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥靈之鑰</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-tags"><span class="ss-tag">金錢信念覺察</span><span class="ss-tag">'+f.name+'</span></div><div class="ss-quote">「'+f.closing+'」</div><div class="ss-footer">hourlightkey.com ✦ 讀懂自己，活對人生</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">金錢信念覺察 Money Belief</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  const totalMax=questions.length*3;
  document.getElementById('dimBars').innerHTML=dims.map(d=>{var pct=Math.round(scores[d.key]/totalMax*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+TYPES[d.key].icon+' '+d.name+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:'+d.color+'"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">💎 你的金錢信念</div><div class="result-section-content">'+f.desc+'</div></div>'+'<div class="result-section"><div class="result-section-title">🔑 覺察關鍵字</div><div class="result-section-content">'+f.keywords.map(k=>'「'+k+'」').join(' ')+'</div></div>'+(f2?'<div class="result-section"><div class="result-section-title">'+f2.icon+' 副型：'+f2.name+'</div><div class="result-section-content">'+f2.desc+'</div></div>':'')+'<div class="result-section"><div class="result-section-title">🌿 認知芳療建議：'+f.aroma+'</div><div class="result-section-content">'+f.aromaDetail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🧘 60 秒覺察練習</div><div class="result-section-content">'+f.practice.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">✦ 馥靈收束語</div><div class="result-section-content" style="font-family:LXGW WenKai TC,serif;font-size:1rem;line-height:1.9">'+f.closing+'<br><br></div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ 馥靈之鑰 × 你的覺察密碼</div><div class="hour-bridge-text" style="margin-bottom:8px">你跟錢的關係，是你跟自己的關係的倒影。今天看到的不是理財建議，是你從小到大那本沒人幫你翻開的信念帳本。帳本打開了，才知道哪一頁需要重新寫。</div><div style="font-size:.85rem;color:#9e8a70;line-height:1.8;margin-bottom:16px">馥靈秘碼可以看到你天生的財富能量設定，跟今天的金錢信念交叉比對更完整。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免費解碼馥靈秘碼 →</a>';
  try{localStorage.setItem('hl_quiz_money_belief',JSON.stringify({type:topType,scores,ts:Date.now()}));}catch(e){}
  window._resultText=f.icon+' 我的金錢信念是「'+f.name+'」：'+f.sub+'。'+f.desc.substring(0,60)+'⋯ 你跟錢的關係是什麼？ 👉 hourlightkey.com/quiz-money-belief.html #馥靈之鑰 #金錢信念覺察';
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz-money-belief',toolName:'金錢信念覺察'});
  if(window.HL_dropMaterial) HL_dropMaterial('quiz');
  window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
</script>
