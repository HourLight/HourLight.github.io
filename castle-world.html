<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#f0c85a;
  --gold2:#e8a830;
  --purple:#6a4aad;
  --purple2:#3a2260;
  --bg:#0a0618;
  --text:#f5dfa8;
}
html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:var(--bg);
  font-family:'Noto Serif TC',serif;
  touch-action:none;
}

/* ── Stars background ── */
#star-canvas{
  position:fixed;inset:0;
  pointer-events:none;
  z-index:0;
}

/* ── Topbar ── */
.topbar{
  position:fixed;top:0;left:0;right:0;
  height:52px;
  background:rgba(10,6,24,.85);
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(240,200,90,.15);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  z-index:500;
}
.topbar-title{
  font-size:.85rem;
  color:var(--gold);
  letter-spacing:.06em;
}
.topbar-back{
  font-size:.78rem;
  color:rgba(240,200,90,.7);
  text-decoration:none;
  display:flex;align-items:center;gap:5px;
}
.topbar-back:hover{color:var(--gold);}
.topbar-hint{
  font-size:.7rem;
  color:rgba(240,200,90,.5);
  display:none;
}
@media(min-width:480px){.topbar-hint{display:block;}}

/* ── Viewport ── */
#viewport{
  position:fixed;
  inset:52px 0 56px 0;
  overflow:hidden;
  z-index:1;
  cursor:default;
}

/* ── World container ── */
#world{
  position:absolute;
  width:2200px;height:1600px;
  will-change:transform;
  transition:transform .08s linear;
}

/* ── World background zones ── */
.world-bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 1200px 900px at 50% 45%, rgba(60,30,120,.45) 0%, transparent 70%),
             radial-gradient(ellipse 600px 400px at 20% 20%, rgba(30,20,80,.5) 0%, transparent 60%),
             radial-gradient(ellipse 500px 350px at 80% 75%, rgba(40,20,100,.4) 0%, transparent 60%),
             linear-gradient(180deg, #0a0618 0%, #0e082a 40%, #0a0618 100%);
}

/* Glow paths */
.world-path{
  position:absolute;
  background:rgba(240,200,90,.06);
  border:1px solid rgba(240,200,90,.12);
  border-radius:20px;
}

/* Zone glow areas */
.world-zone{
  position:absolute;
  border-radius:50%;
  pointer-events:none;
}

/* ── Room tiles ── */
.room-tile{
  position:absolute;
  width:110px;
  cursor:pointer;
  transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;
  transition:transform .2s, filter .2s;
  z-index:10;
}
.room-tile:hover{transform:translate(-50%,-50%) scale(1.1);}
.room-tile:hover .room-building-inner{
  box-shadow:0 0 30px rgba(240,200,90,.5), 0 6px 20px rgba(0,0,0,.4);
  border-color:rgba(240,200,90,.6);
}
.room-building{
  position:relative;
  width:80px;height:80px;
  margin-bottom:6px;
}
.room-building-inner{
  width:100%;height:100%;
  border-radius:18px;
  border:1.5px solid rgba(240,200,90,.25);
  display:flex;align-items:center;justify-content:center;
  font-size:2.2rem;
  box-shadow:0 4px 16px rgba(0,0,0,.4);
  transition:box-shadow .2s, border-color .2s;
  position:relative;overflow:hidden;
}
.room-building-inner::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,.08) 0%, transparent 60%);
  border-radius:inherit;
  pointer-events:none;
}
.room-label{
  font-size:.68rem;
  color:rgba(240,200,90,.9);
  letter-spacing:.04em;
  text-align:center;
  text-shadow:0 0 12px rgba(240,200,90,.4), 0 1px 4px rgba(0,0,0,.6);
  white-space:nowrap;
}
.room-daily-dot{
  position:absolute;
  top:-3px;right:-3px;
  width:11px;height:11px;
  background:#e8455a;
  border-radius:50%;
  border:2px solid var(--bg);
}

/* Zone color themes */
.zone-star    .room-building-inner{background:linear-gradient(135deg,#0d1b4a,#1a2f6a);}
.zone-dream   .room-building-inner{background:linear-gradient(135deg,#1a0a3a,#2d1060);}
.zone-library .room-building-inner{background:linear-gradient(135deg,#1a2a0a,#2d4a10);}
.zone-garden  .room-building-inner{background:linear-gradient(135deg,#0a2a1a,#104a30);}
.zone-mirror  .room-building-inner{background:linear-gradient(135deg,#1a1a3a,#2a2a5a);}
.zone-ground  .room-building-inner{background:linear-gradient(135deg,#2a1a0a,#4a2a10);}
.zone-key     .room-building-inner{background:linear-gradient(135deg,#2a200a,#4a380a);}
.zone-secret  .room-building-inner{background:linear-gradient(135deg,#1a0a2a,#2a1045);}
.zone-throne  .room-building-inner{background:linear-gradient(135deg,#2a1800,#503000);}
.zone-harmony .room-building-inner{background:linear-gradient(135deg,#2a0a1a,#501030);}
.zone-love    .room-building-inner{background:linear-gradient(135deg,#2a0a10,#501020);}
.zone-intuition .room-building-inner{background:linear-gradient(135deg,#001a2a,#003050);}
.zone-transform .room-building-inner{background:linear-gradient(135deg,#1a0a00,#381500);}
.zone-music   .room-building-inner{background:linear-gradient(135deg,#100a2a,#201050);}
.zone-kitchen .room-building-inner{background:linear-gradient(135deg,#0a1a0a,#103a10);}
.zone-alchemy .room-building-inner{background:linear-gradient(135deg,#1a1000,#382200);}
.zone-treasure .room-building-inner{background:linear-gradient(135deg,#1a1400,#382800);}
.zone-heal    .room-building-inner{background:linear-gradient(135deg,#1a0810,#2a1020);}
.zone-own     .room-building-inner{background:linear-gradient(135deg,#0e0818,#1a0e28);}
.zone-unlock  .room-building-inner{background:linear-gradient(135deg,#120e04,#1e1808);}
.zone-rise    .room-building-inner{background:linear-gradient(135deg,#060f0c,#0e1a16);}

/* ── Player character ── */
#player{
  position:absolute;
  width:36px;height:44px;
  transform:translate(-50%,-50%);
  z-index:20;
  pointer-events:none;
}
.player-body{
  position:absolute;
  bottom:0;left:50%;transform:translateX(-50%);
  width:28px;height:32px;
}
.player-head{
  position:absolute;
  top:0;left:50%;transform:translateX(-50%);
  width:22px;height:22px;
  background:linear-gradient(135deg,#f5dfa8,#e8c880);
  border-radius:50%;
  border:2px solid rgba(200,134,42,.4);
  box-shadow:0 0 12px rgba(240,200,90,.4);
}
.player-head::before{
  content:'';
  position:absolute;
  top:6px;left:4px;
  width:4px;height:4px;
  background:#3e2a1a;
  border-radius:50%;
  box-shadow:8px 0 0 #3e2a1a;
}
.player-torso{
  position:absolute;
  top:18px;left:50%;transform:translateX(-50%);
  width:20px;height:14px;
  background:linear-gradient(135deg,#6a3aad,#4a2a8a);
  border-radius:6px 6px 3px 3px;
  border:1.5px solid rgba(240,200,90,.3);
}
.player-shadow{
  position:absolute;
  bottom:-4px;left:50%;transform:translateX(-50%);
  width:20px;height:6px;
  background:rgba(0,0,0,.3);
  border-radius:50%;
  filter:blur(3px);
}
@keyframes player-walk{
  0%,100%{transform:translate(-50%,-50%) translateY(0);}
  50%{transform:translate(-50%,-50%) translateY(-3px);}
}
#player.walking{animation:player-walk .35s ease-in-out infinite;}

/* ── Enter popup ── */
#enter-popup{
  position:fixed;
  bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(10,6,24,.92);
  border:1.5px solid rgba(240,200,90,.35);
  border-radius:14px;
  padding:12px 20px;
  display:none;
  align-items:center;gap:10px;
  z-index:400;
  transition:transform .25s, opacity .25s;
  opacity:0;
  max-width:280px;
}
#enter-popup.show{
  display:flex;
  transform:translateX(-50%) translateY(0);
  opacity:1;
}
#enter-popup .popup-icon{font-size:1.5rem;}
#enter-popup .popup-info{flex:1;}
#enter-popup .popup-name{font-size:.88rem;color:var(--gold);font-weight:700;}
#enter-popup .popup-hint{font-size:.7rem;color:rgba(240,200,90,.5);margin-top:2px;}
#enter-popup .popup-btn{
  padding:7px 14px;
  background:linear-gradient(135deg,#c8862a,#e8b86d);
  color:#fff;border:none;border-radius:10px;
  font-size:.8rem;cursor:pointer;
  white-space:nowrap;
  font-family:'Noto Serif TC',serif;
}
#enter-popup .popup-btn:hover{opacity:.88;}

/* ── Bottom controls ── */
.controls{
  position:fixed;bottom:0;left:0;right:0;
  height:56px;
  background:rgba(10,6,24,.85);
  border-top:1px solid rgba(240,200,90,.12);
  display:flex;align-items:center;justify-content:center;
  gap:8px;
  z-index:500;
}
.ctrl-btn{
  width:42px;height:42px;
  border-radius:12px;
  background:rgba(240,200,90,.1);
  border:1px solid rgba(240,200,90,.2);
  color:rgba(240,200,90,.8);
  font-size:1.1rem;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
  -webkit-tap-highlight-color:transparent;
}
.ctrl-btn:active,.ctrl-btn.pressed{background:rgba(240,200,90,.25);}
.ctrl-btn.special{
  width:auto;padding:0 14px;
  font-size:.75rem;letter-spacing:.04em;
  color:rgba(240,200,90,.9);
}

/* ── Location display ── */
#location-display{
  position:fixed;
  top:60px;left:50%;transform:translateX(-50%);
  background:rgba(10,6,24,.75);
  border:1px solid rgba(240,200,90,.2);
  border-radius:20px;
  padding:5px 14px;
  font-size:.72rem;
  color:rgba(240,200,90,.7);
  z-index:400;
  pointer-events:none;
  letter-spacing:.04em;
  opacity:0;
  transition:opacity .4s;
}
#location-display.show{opacity:1;}

/* ── Minimap ── */
#minimap{
  position:fixed;
  top:62px;right:12px;
  width:120px;height:80px;
  background:rgba(10,6,24,.8);
  border:1px solid rgba(240,200,90,.2);
  border-radius:10px;
  z-index:400;
  overflow:hidden;
}
#minimap-canvas{width:100%;height:100%;}

/* Mobile hide minimap */
@media(max-width:480px){#minimap{display:none;}}

/* ── Particles ── */
@keyframes float-up{
  0%{transform:translateY(0) translateX(0);opacity:.8;}
  100%{transform:translateY(-80px) translateX(20px);opacity:0;}
}
.world-particle{
  position:absolute;
  width:3px;height:3px;
  background:rgba(240,200,90,.5);
  border-radius:50%;
  pointer-events:none;
  animation:float-up 4s ease-in infinite;
}
</style>

    <div class="room-tile zone-heal"   data-slug="castle-room-heal"    data-name="勇氣殿"   style="left:300px;top:1200px"  id="tile-heal">
      <div class="room-building"><div class="room-building-inner"><div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;border-radius:inherit">🔥</div></div></div>
      <div class="room-label">勇氣殿</div>
    </div>
    <div class="room-tile zone-own"    data-slug="castle-room-own"     data-name="心門宮"   style="left:600px;top:1200px"  id="tile-own">
      <div class="room-building"><div class="room-building-inner"><div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;border-radius:inherit">💜</div></div></div>
      <div class="room-label">心門宮</div>
    </div>
    <div class="room-tile zone-unlock" data-slug="castle-room-unlock"  data-name="志氣殿"   style="left:900px;top:1200px"  id="tile-unlock">
      <div class="room-building"><div class="room-building-inner"><div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;border-radius:inherit">✨</div></div></div>
      <div class="room-label">志氣殿</div>
    </div>
    <div class="room-tile zone-rise"   data-slug="castle-room-rise"    data-name="平衡室"   style="left:1200px;top:1200px" id="tile-rise">
      <div class="room-building"><div class="room-building-inner"><div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;border-radius:inherit">🧭</div></div></div>
      <div class="room-label">平衡室</div>
    </div>

    <!-- Player character -->
    <div id="player">
      <div class="player-body">
        <div class="player-head"></div>
        <div class="player-torso"></div>
      </div>
      <div class="player-shadow"></div>
    </div>
  </div>
</div>

<!-- Enter popup -->
<div id="enter-popup">
  <div class="popup-icon" id="popup-icon">🏰</div>
  <div class="popup-info">
    <div class="popup-name" id="popup-name">房間名稱</div>
    <div class="popup-hint">點擊進入</div>
  </div>
  <button class="popup-btn" id="popup-enter-btn">進入</button>
</div>

<!-- Location display -->
<div id="location-display" id="loc">城堡廣場</div>

<!-- Minimap -->
<div id="minimap"><canvas id="minimap-canvas"></canvas></div>

<!-- Controls -->
<div class="controls">
  <button class="ctrl-btn" id="btn-up">↑</button>
  <button class="ctrl-btn" id="btn-left">←</button>
  <button class="ctrl-btn" id="btn-down">↓</button>
  <button class="ctrl-btn" id="btn-right">→</button>
  <button class="ctrl-btn special" id="btn-enter">進入房間</button>
  <button class="ctrl-btn special" onclick="location.href='castle-materials.html'">材料庫</button>
</div>

<script>
(function(){
  'use strict';

  // ── Stars background ─────────────────────────────────
  var sc = document.getElementById('star-canvas');
  var sCtx = sc.getContext('2d');
  var stars = [];
  function initStars(){
    sc.width = window.innerWidth;
    sc.height = window.innerHeight;
    stars = [];
    for(var i=0; i<200; i++){
      stars.push({
        x: Math.random()*sc.width,
        y: Math.random()*sc.height,
        r: Math.random()*1.5+.3,
        a: Math.random(),
        da: (Math.random()-.5)*.01
      });
    }
  }
  function drawStars(){
    sCtx.clearRect(0,0,sc.width,sc.height);
    stars.forEach(function(s){
      s.a += s.da;
      if(s.a>1||s.a<0) s.da*=-1;
      sCtx.save();
      sCtx.globalAlpha = s.a*.6;
      sCtx.fillStyle='#f0c85a';
      sCtx.beginPath();
      sCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
      sCtx.fill();
      sCtx.restore();
    });
    requestAnimationFrame(drawStars);
  }
  initStars();
  drawStars();
  window.addEventListener('resize', initStars);

  // ── World & player state ──────────────────────────────
  var WORLD_W = 2200, WORLD_H = 1600;
  var vp = document.getElementById('viewport');
  var world = document.getElementById('world');
  var player = document.getElementById('player');

  var px = 1080, py = 640; // start near throne
  var speed = 4;
  var keys = {};
  var isWalking = false;
  var nearestRoom = null;
  var enterPopupTimeout = null;

  // Room data (matches tile positions)
  var ROOMS = [
    { slug:'castle-room-star',      name:'星象台',   icon:'🌌', x:1600,y:200  },
    { slug:'castle-room-dream',     name:'夢境殿',   icon:'🌙', x:300, y:280  },
    { slug:'castle-room-library',   name:'學院塔',   icon:'📚', x:760, y:160  },
    { slug:'castle-room-intuition', name:'直覺廳',   icon:'⚡', x:1300,y:180  },
    { slug:'castle-room-mirror',    name:'鏡之廳',   icon:'🪞', x:480, y:480  },
    { slug:'castle-room-garden',    name:'城堡庭院', icon:'🌸', x:200, y:680  },
    { slug:'castle-room-secret',    name:'秘密室',   icon:'🔮', x:1700,y:480  },
    { slug:'castle-room-transform', name:'蛻變室',   icon:'🦋', x:1900,y:680  },
    { slug:'castle-room-throne',    name:'王座廳',   icon:'👑', x:1080,y:640  },
    { slug:'castle-room-key',       name:'鑰匙廳',   icon:'🗝️', x:820, y:580  },
    { slug:'castle-room-ground',    name:'地基宮',   icon:'🏛️', x:1340,y:600  },
    { slug:'castle-room-harmony',   name:'和諧苑',   icon:'🪷', x:440, y:900  },
    { slug:'castle-room-love',      name:'愛情室',   icon:'💝', x:680, y:1000 },
    { slug:'castle-room-music',     name:'音樂廳',   icon:'🎵', x:940, y:960  },
    { slug:'castle-room-kitchen',   name:'廚房',     icon:'🌿', x:1200,y:980  },
    { slug:'castle-room-alchemy',   name:'煉金室',   icon:'⚗️', x:1460,y:900  },
    { slug:'castle-room-treasure',  name:'寶藏廳',   icon:'💎', x:1680,y:1020 }
  ];

  // Daily quest check (show red dot on rooms with pending tasks)
  try {
    var today = (function(){
      var d=new Date();
      return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    })();
    var dd = JSON.parse(localStorage.getItem('hl_castle_daily')||'{}');
    ROOMS.forEach(function(r){
      var rd = dd[today] && dd[today][r.slug];
      if(!rd || !rd.claimed){
        var tile = document.getElementById('tile-'+r.slug.replace('castle-room-',''));
        if(tile){
          var dot = document.createElement('div');
          dot.className='room-daily-dot';
          tile.querySelector('.room-building').appendChild(dot);
        }
      }
    });
  } catch(e){}

  // ── Camera & position update ──────────────────────────
  function updateCamera(){
    var vpW = vp.offsetWidth || window.innerWidth;
    var vpH = vp.offsetHeight || (window.innerHeight-108);
    var camX = -px + vpW/2;
    var camY = -py + vpH/2;
    // Clamp camera so world doesn't go out of bounds
    camX = Math.min(0, Math.max(vpW - WORLD_W, camX));
    camY = Math.min(0, Math.max(vpH - WORLD_H, camY));
    world.style.transform = 'translate('+camX+'px,'+camY+'px)';
    updateMinimap(camX, camY, vpW, vpH);
  }

  function updatePlayerPos(){
    player.style.left = px + 'px';
    player.style.top  = py + 'px';
    updateCamera();
    checkNearRoom();
  }

  // ── Movement ─────────────────────────────────────────
  function movePlayer(){
    var dx = 0, dy = 0;
    if(keys['ArrowUp']||keys['w']||keys['W'])    dy = -speed;
    if(keys['ArrowDown']||keys['s']||keys['S'])  dy =  speed;
    if(keys['ArrowLeft']||keys['a']||keys['A'])  dx = -speed;
    if(keys['ArrowRight']||keys['d']||keys['D']) dx =  speed;

    // Diagonal normalization
    if(dx && dy){ dx*=.707; dy*=.707; }

    var moving = dx!==0 || dy!==0;
    if(moving){
      px = Math.max(40, Math.min(WORLD_W-40, px+dx));
      py = Math.max(40, Math.min(WORLD_H-40, py+dy));
      updatePlayerPos();
    }

    // Walking animation
    if(moving && !isWalking){
      player.classList.add('walking');
      isWalking = true;
    } else if(!moving && isWalking){
      player.classList.remove('walking');
      isWalking = false;
    }
  }

  // Game loop
  function gameLoop(){
    movePlayer();
    requestAnimationFrame(gameLoop);
  }

  document.addEventListener('keydown', function(e){
    keys[e.key] = true;
    if(e.key===' ' || e.key==='Enter'){
      if(nearestRoom) enterRoom(nearestRoom);
      e.preventDefault();
    }
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].indexOf(e.key)!==-1) e.preventDefault();
  });
  document.addEventListener('keyup', function(e){ keys[e.key] = false; });

  // ── Touch / drag movement ─────────────────────────────
  var touchStart = null;
  var touchLast = null;
  vp.addEventListener('touchstart', function(e){
    touchStart = {x:e.touches[0].clientX, y:e.touches[0].clientY};
    touchLast = {x:e.touches[0].clientX, y:e.touches[0].clientY};
  }, {passive:true});
  vp.addEventListener('touchmove', function(e){
    if(!touchLast) return;
    var dx = e.touches[0].clientX - touchLast.x;
    var dy = e.touches[0].clientY - touchLast.y;
    touchLast = {x:e.touches[0].clientX, y:e.touches[0].clientY};
    px = Math.max(40, Math.min(WORLD_W-40, px+dx*1.5));
    py = Math.max(40, Math.min(WORLD_H-40, py+dy*1.5));
    updatePlayerPos();
    player.classList.add('walking');
    isWalking = true;
    e.preventDefault();
  }, {passive:false});
  vp.addEventListener('touchend', function(){
    touchStart = null; touchLast = null;
    player.classList.remove('walking'); isWalking=false;
  }, {passive:true});

  // ── On-screen buttons ─────────────────────────────────
  function holdKey(k, el){
    el.addEventListener('touchstart', function(e){ keys[k]=true; e.preventDefault(); }, {passive:false});
    el.addEventListener('touchend',   function(){ keys[k]=false; }, {passive:true});
    el.addEventListener('mousedown',  function(){ keys[k]=true; });
    el.addEventListener('mouseup',    function(){ keys[k]=false; });
    el.addEventListener('mouseleave', function(){ keys[k]=false; });
  }
  holdKey('ArrowUp',    document.getElementById('btn-up'));
  holdKey('ArrowDown',  document.getElementById('btn-down'));
  holdKey('ArrowLeft',  document.getElementById('btn-left'));
  holdKey('ArrowRight', document.getElementById('btn-right'));

  document.getElementById('btn-enter').addEventListener('click', function(){
    if(nearestRoom) enterRoom(nearestRoom);
  });

  // ── Room proximity & enter popup ──────────────────────
  var ENTER_DIST = 110;
  var locDisplay = document.getElementById('location-display');
  var locTimeout = null;

  function checkNearRoom(){
    var closest = null, closestDist = Infinity;
    ROOMS.forEach(function(r){
      var d = Math.hypot(px - r.x, py - r.y);
      if(d < closestDist){ closestDist = d; closest = r; }
    });

    if(closestDist < ENTER_DIST){
      if(nearest !== closest){
        nearestRoom = closest;
        showEnterPopup(closest);
        showLocation(closest.name);
      }
    } else {
      if(nearestRoom){
        nearestRoom = null;
        hideEnterPopup();
      }
    }
    nearest = closestDist < ENTER_DIST ? closest : null;
  }
  var nearest = null;

  function showEnterPopup(r){
    var ep = document.getElementById('enter-popup');
    document.getElementById('popup-icon').textContent = r.icon;
    document.getElementById('popup-name').textContent = r.name;
    ep.classList.add('show');
  }
  function hideEnterPopup(){
    document.getElementById('enter-popup').classList.remove('show');
  }
  function showLocation(name){
    locDisplay.textContent = '⬡ ' + name;
    locDisplay.classList.add('show');
    clearTimeout(locTimeout);
    locTimeout = setTimeout(function(){ locDisplay.classList.remove('show'); }, 2500);
  }

  document.getElementById('popup-enter-btn').addEventListener('click', function(){
    if(nearestRoom) enterRoom(nearestRoom);
  });

  // ── Room tile click ───────────────────────────────────
  document.querySelectorAll('.room-tile').forEach(function(tile){
    tile.addEventListener('click', function(){
      var slug = tile.dataset.slug;
      location.href = slug + '.html';
    });
  });

  // ── Enter room ────────────────────────────────────────
  function enterRoom(r){
    location.href = r.slug + '.html';
  }

  // ── Minimap ───────────────────────────────────────────
  var mm = document.getElementById('minimap-canvas');
  var mmCtx = mm.getContext('2d');
  mm.width = 120; mm.height = 80;
  var MM_SCALE = 120/WORLD_W;

  function updateMinimap(camX, camY, vpW, vpH){
    mmCtx.clearRect(0,0,120,80);
    // Background
    mmCtx.fillStyle='rgba(10,6,24,.9)';
    mmCtx.fillRect(0,0,120,80);
    // Rooms
    ROOMS.forEach(function(r){
      mmCtx.fillStyle='rgba(240,200,90,.5)';
      mmCtx.beginPath();
      mmCtx.arc(r.x*MM_SCALE, r.y*(80/WORLD_H), 3, 0, Math.PI*2);
      mmCtx.fill();
    });
    // Player
    mmCtx.fillStyle='#f5dfa8';
    mmCtx.beginPath();
    mmCtx.arc(px*MM_SCALE, py*(80/WORLD_H), 3.5, 0, Math.PI*2);
    mmCtx.fill();
    // Viewport rect
    mmCtx.strokeStyle='rgba(240,200,90,.35)';
    mmCtx.lineWidth=1;
    mmCtx.strokeRect(
      (-camX)*MM_SCALE, (-camY)*(80/WORLD_H),
      vpW*MM_SCALE, vpH*(80/WORLD_H)
    );
  }

  // ── Floating particles (ambient effect) ──────────────
  function spawnParticle(){
    var p = document.createElement('div');
    p.className='world-particle';
    p.style.left = (100+Math.random()*2000)+'px';
    p.style.top  = (100+Math.random()*1400)+'px';
    p.style.animationDelay = (Math.random()*4)+'s';
    p.style.animationDuration = (3+Math.random()*4)+'s';
    world.appendChild(p);
    setTimeout(function(){ p.parentNode && p.parentNode.removeChild(p); }, 8000);
  }
  setInterval(spawnParticle, 600);

  // ── Init ─────────────────────────────────────────────
  updatePlayerPos();
  gameLoop();

})();
</script>
