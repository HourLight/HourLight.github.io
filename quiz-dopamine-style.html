chase:{name:'多巴胺追逐者',icon:'🏎️',sub:'你的快樂系統永遠在找下一個更大的刺激',keys:['刺激追逐','快樂耐受','永不滿足'],desc:'你的大腦獎勵系統像一台永遠踩油門的跑車。新餐廳、新關係、新計畫，你一直在追下一個。不是你貪心，是你的多巴胺受體需要越來越大的刺激才能感覺到夠了。這在神經科學裡叫做多巴胺耐受。你正在吃的這頓飯不夠，因為你在想下一頓。你的人生像一場永遠不會結束的賽跑。',detail:'追逐型的你活得很精彩但也很累。你的快樂永遠在前方，從來不在腳下。\n\n問一個關鍵問題：你上一次夠了的感覺是什麼時候？如果想不起來，那就是覺察起點。\n\n覺察邀請：今天做一件事的時候完全不想下一件事。吃飯就只是吃飯，散步就只是散步。讓大腦體驗一次此刻就足夠的感覺。',oil:'薰衣草 2 滴＋檀香 2 滴＋甜橙 1 滴。薰衣草讓神經系統從追逐切換到休息。檀香帶來到了的感覺。甜橙讓停下來變愉快。',med:'坐下來。手放膝蓋上。吸氣四秒，感覺屁股坐在椅子上的重量。吐氣六秒，對自己說：「我哪裡都不用去。」重複四次。',quote:'你在逃避此刻不夠的感覺。其實此刻一直都夠。'},
savor:{name:'品味大師',icon:'🍷',sub:'你能從一杯茶裡喝出整個宇宙',keys:['當下品味','感官敏銳','知足常樂'],desc:'你的多巴胺系統很健康。你不需要很大的刺激就能感覺到快樂。一朵花開了你看得到，一口食物的味道你嚐得出。你擁有Fred Bryant教授所說的品味力（Savoring）。你的快樂不是爆炸式的，而是穩定、持續、像一條溫暖的河流。',detail:'品味型的你，挑戰可能不是如何更快樂，而是如何在高速世界裡保持節奏。\n\n覺察邀請：繼續做你在做的事。但也留意有沒有時候你用我很滿足來避開你其實想要但不敢承認的東西？品味和壓抑之間有一條很細的線。',oil:'佛手柑 2 滴＋天竺葵 1 滴＋乳香 2 滴。佛手柑維持好心情。天竺葵讓你跟情感流保持連結。乳香加深品味能力。',med:'手上拿一杯溫水。吸氣四秒感覺杯子溫度。吐氣六秒喝一小口。感覺水從嘴唇到喉嚨到胃。對自己說：「這就夠了。」',quote:'你不需要更多。你只需要更深地感覺已經有的。'},
hoard:{name:'安全感囤積者',icon:'🏦',sub:'你的快樂不是用掉了而是存起來了',keys:['收藏癖','數字安全感','擁有比使用重要'],desc:'你的多巴胺在得到和累積的時候分泌。你可能有很多收藏但很少使用。你的快樂住在擁有這件事本身裡面。這跟安全感直接相關，你的潛意識相信擁有更多等於更安全。',detail:'這可能跟小時候的經驗有關，也許你經歷過匱乏。問題是，當快樂被存起來而不是被體驗，你擁有很多但感覺什麼都沒有。\n\n覺察邀請：今天用掉一樣你捨不得用的東西。讓身體學會：用掉不代表失去。',oil:'甜橙 2 滴＋葡萄柚 1 滴＋薄荷 1 滴＋佛手柑 1 滴。甜橙讓你體驗花出去的快樂。葡萄柚帶來釋放感。',med:'找一樣收藏但從沒用過的東西。拿在手上。吸氣四秒感覺重量。吐氣六秒，打開或使用它。對自己說：「花出去的快樂也是快樂。」',quote:'你存了很多快樂，但你忘了把它們領出來用。'},
numb:{name:'快樂遲鈍型',icon:'🔇',sub:'開關還在，只是很久沒被打開了',keys:['快感缺失','情緒平坦','什麼都還好'],desc:'你的多巴胺系統好像被調到靜音。別人覺得超棒的事，你的反應是還好。臨床上叫做快感缺失（Anhedonia），可能跟長期壓力、慢性疲勞有關。你的大腦為了保護你把接收器調低了。但這不是永久的。',detail:'你的快樂迴路還在，只需要慢慢重新校準。不是用更大的刺激轟它，而是用很小的事情喚醒它。\n\n覺察邀請：這週每天做一件微小的愉快。聞一朵花、摸一隻貓、赤腳踩草地。不評判有沒有感覺到快樂，只是做。',oil:'葡萄柚 2 滴＋薄荷 1 滴＋迷迭香 1 滴＋黑胡椒 1 滴。葡萄柚重啟多巴胺系統。薄荷帶來清涼感。迷迭香喚醒前額葉。黑胡椒帶來微辣溫熱。',med:'赤腳站地板。感覺腳底溫度。吸氣四秒動腳趾頭。吐氣六秒。對自己說：「我的感覺還在。它只是睡著了。」',quote:'你的快樂沒有消失。它在等你用很溫柔的方式叫醒它。'},
chase_hoard:{name:'獵人收藏家',icon:'🎪',sub:'追到了就塞進收藏櫃然後繼續追',keys:['追逐囤積','得到不享受','永遠在蒐集'],desc:'你的多巴胺在搜尋和得到的時候分泌最多，在使用和體驗時幾乎歸零。衣櫃穿不完的衣服但每天覺得沒衣服穿。你需要的不是更多東西，是學會停在有的狀態裡。',detail:'快樂的高峰在下單那一秒。按下確認鍵的瞬間多巴胺爆發，然後就沒了。\n\n覺察邀請：下次想買什麼先加購物車不結帳。等三天。還想要就買了當天用。',oil:'薰衣草 2 滴＋檀香 2 滴＋佛手柑 1 滴。薰衣草讓追逐腳步慢下來。檀香讓你停在已經有了的感覺裡。',med:'看著手邊三樣東西。吸氣四秒認真看著第一樣。吐氣六秒，想你為什麼當初想要它。對它說：「你夠了。」',quote:'你的收藏櫃很滿，但體驗是空的。'},
chase_numb:{name:'刺激麻痹型',icon:'⚡',sub:'追了太多刺激最後連刺激都感覺不到',keys:['過度追逐','快感燃盡','高閾值'],desc:'你曾經是追逐型，但追得太猛把多巴胺受體追到麻痹了。神經科學裡叫做多巴胺受體下調。好消息是受體可以恢復，但需要時間和刻意的低刺激期。',detail:'覺察邀請：這週減少一樣高刺激活動（社群、遊戲、購物），用低刺激活動取代（散步、手寫日記、面對面聊天）。一週後觀察感受力有沒有回來。',oil:'薰衣草 3 滴＋岩蘭草 2 滴。最安靜的配方。讓過度興奮的系統休息。',med:'躺下來。什麼都不做。不聽音樂不想事情。吸氣四秒什麼都不追。吐氣六秒什麼都不要。讓空待在那裡。',quote:'你追得太快了，快到連風景都看不見。停一下。'},
savor_numb:{name:'遺忘品味者',icon:'🌫️',sub:'你曾經很會感受但不知何時開始遲鈍了',keys:['品味退化','感官關閉','想感受但感受不到'],desc:'你的基因裡有品味的天賦，但某些經歷讓感覺器官慢慢關閉了。你知道陽光很美但感受不到溫度。這通常發生在重大失落或長期壓力之後。你比快樂遲鈍型多一個優勢：你記得快樂是什麼感覺。',detail:'那個記憶本身就是恢復的路徑。\n\n覺察邀請：做一件你以前很喜歡但很久沒做的事。不帶期待地做。如果有一絲感覺浮上來，跟它說：「我看到你了。」',oil:'玫瑰 1 滴＋甜橙 2 滴＋薰衣草 2 滴。玫瑰打開被封起來的感受力。甜橙帶回一點明亮。薰衣草讓過程不太猛烈。',med:'閉上眼睛。想一個曾經覺得很美的畫面。吸氣四秒讓它清楚一點。吐氣六秒。對自己說：「我的感覺還在路上。」',quote:'你的敏銳只是睡著了。它在等一個安全的時刻醒來。'},
hoard_numb:{name:'空倉守衛',icon:'🏚️',sub:'守著倉庫但裡面什麼都提不起勁',keys:['囤積但無感','安全感空洞','擁有也不快樂'],desc:'你有囤積的習慣但沒有囤積的快樂。買了很多但不開心，存了很多但不安心。你以為問題是不夠多，其實是快樂接收器對擁有也麻痹了。',detail:'覺察邀請：這週清掉三樣不再需要的東西。感覺放手帶來的感覺，不管是焦慮還是輕盈，都是覺察的開始。',oil:'葡萄柚 2 滴＋薄荷 1 滴＋甜橙 2 滴。葡萄柚讓你體驗放手的輕盈。薄荷清除頭腦雜物。甜橙讓空出來的空間被溫暖填滿。',med:'看著房間選一樣東西。吸氣四秒問自己：它還帶給我什麼感覺嗎？吐氣六秒。如果沒有，明天帶出去。',quote:'安全感不住在東西裡。它住在你裡面。'},
chase_savor:{name:'體驗美食家',icon:'🌟',sub:'你追的是體驗不是數量但停不下來',keys:['品質追逐','精緻不停歇','體驗收藏'],desc:'你追的不是更多而是更好。品質、深度、獨一無二的體驗。你品味很好，但你把品味變成了另一種追逐。你在追更精緻的快樂而不是更深的快樂。',detail:'真正的品味不需要移動，它可以發生在你家廚房裡。\n\n覺察邀請：這週找一天不做特別的事。在家裡用平常的東西試著品味到最深。品味的深度跟環境無關跟專注力有關。',oil:'薰衣草 2 滴＋乳香 2 滴＋檀香 1 滴。不是關於更好的體驗而是更深的。薰衣草幫你停下來。乳香讓感受力往下沉。',med:'泡一杯茶。不用很好的茶。吸氣四秒聞茶味。吐氣六秒喝一小口。讓那一口在嘴裡停三秒。對自己說：「這一口就是整個宇宙。」',quote:'最好的體驗不在遠方。它在你願意真正停下來的那一刻。'}

let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';
    const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 題 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一題</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一題 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看結果 🎰</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 題，共 '+questions.length+' 題';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const dimScores={};Object.keys(DIMS).forEach(k=>{dimScores[k]=0;});
  Object.keys(answers).forEach(qi=>{const oi=answers[qi];const s=questions[qi].opts[oi].s;Object.keys(s).forEach(d=>{dimScores[d]+=s[d];});});
  const maxPossible=Object.keys(answers).length*3;
  const sorted=Object.keys(DIMS).sort((a,b)=>dimScores[b]-dimScores[a]);
  const top=sorted[0],second=sorted[1];
  const v1=dimScores[top],v2=dimScores[second];
  let topType;
  if(v1>v2*1.4) topType=top;
  else{
    const comboKey=top+'_'+second;
    topType=TYPES[comboKey]?comboKey:(TYPES[second+'_'+top]?second+'_'+top:top);
  }
  const f=TYPES[topType];
