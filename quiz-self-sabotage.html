const DIMS={perfect:'完美癱瘓',retreat:'臨門退縮',destruct:'自毀城牆',delay:'永遠在等',minimize:'自我矮化'};
const TYPES={
  perfect:{name:'完美癱瘓型',icon:'🔍',sub:'你的標準高到把自己卡死了',
    keys:['超高標準','反覆修改','害怕犯錯'],
    desc:'你的自我破壞方式是把標準拉到沒有人能達到的高度，包括你自己。事情做到八十分，你看到的不是那八十分的好，而是那二十分的缺。然後你開始修改、調整、推翻重來。改到最後，成品可能比第一版還差，但你停不下來。因為你真正害怕的不是做不好，是「被人發現你不完美」。',
    detail:'完美主義式的自我破壞特別狡猾，因為它看起來像認真、像有要求、像追求卓越。但驅動這一切的引擎不是熱愛品質，是恐懼。恐懼不夠好、恐懼被批評、恐懼如果不完美就不被愛。\n\n你可能小時候得到的訊息是「做好了是應該的，沒做好才需要被討論」。所以你學會了一件事：永遠不要讓人看到瑕疵。但問題是，當你不允許自己有瑕疵，你也不允許自己完成任何事情。因為完成就意味著要交出去、要被看見、要被評價。\n\n覺察邀請：今天試試看，做一件事情做到七十分就停手。不是因為七十分就夠了，是因為你需要體驗一次「不完美但完成了」的感覺。那個感覺比「完美但永遠交不出去」值錢太多了。',
    oil:'薰衣草 2 滴＋甜橙 2 滴＋乳香 1 滴，在你卡在修改迴圈的時候擴香。薰衣草告訴你的神經系統「夠了」。甜橙讓你回到一種輕盈的狀態，不是每件事都必須沉重。乳香帶來一種「完整感」，不是完美，是完整。',
    med:'看著你手上正在做的那件事。不管它現在幾分。吸氣四秒，對它說：「你已經夠好了。」吐氣六秒。吸氣四秒，對自己說：「我已經夠好了。」吐氣六秒。重複四次。然後把它交出去。',
    quote:'完成比完美重要。你一直在修改的那個東西，世界已經等它很久了。'},
  retreat:{name:'臨門退縮型',icon:'🚪',sub:'門開了，你卻轉身走掉',
    keys:['害怕成功','害怕被看見','最後一步消失'],
    desc:'你的自我破壞不是做不到，是在做到的前一刻退場。升遷面試前生病了、告白前先消失了、機會來了說「我再想想」然後再也沒有然後。你的能力夠，準備也夠，但到了那個「要跨過去」的臨界點，你的身體會自動踩煞車。因為比起失敗，你更怕的是站在那個位置之後不知道怎麼辦。',
    detail:'臨門退縮的核心恐懼是「成功之後的我還是我嗎？」。你已經非常熟悉「努力中」的自己，那個角色你很會演。但「成功了」的那個角色，你完全陌生。你不知道成功之後大家會怎麼看你、你會不會失去現在的朋友、你能不能維持在那個水準。\n\n所以與其面對那個未知，你選擇留在安全的「差一步」。這裡多舒服，你永遠有一個藉口：「我還沒有真正試過。」但這個藉口的代價是你永遠不知道自己真正能到哪裡。\n\n覺察邀請：下一次機會來的時候，注意你的身體。喉嚨緊了嗎？胃開始翻攪了嗎？那不是直覺告訴你「不要去」，那是你的恐懼在假裝成直覺。學著分辨這兩者的差別。',
    oil:'佛手柑 2 滴＋迷迭香 2 滴＋黑胡椒 1 滴，在你需要踏出那一步的時候擴香。佛手柑融化猶豫。迷迭香讓你的前額葉清醒到不被恐懼劫持。黑胡椒帶來一種「行動的溫度」，不是推你，是托住你。',
    med:'站在一扇門前。不管是真的門還是想像的。吸氣四秒，想像門後面是你想要的那個東西。吐氣六秒，感覺腳底踩著地板。對自己說：「我不需要知道門後面所有的事。我只需要知道下一步是什麼。」吸氣四秒，伸出手。吐氣六秒，開門。',
    quote:'讓你卻步的未必是失敗，而是成功之後不知道怎麼當那個版本的自己。但那個你，其實很期待跟你見面。'},
  destruct:{name:'自毀城牆型',icon:'💥',sub:'你親手拆掉了自己蓋的東西',
    keys:['衝動行為','自找麻煩','得到了就搞砸'],
    desc:'你的自我破壞最直接：得到了就弄壞它。找到好工作之後開始遲到、得到好感情之後開始找碴、存了錢之後衝動揮霍。不是不知道後果，是在「好事發生」的時候你的內在有一個聲音說：「這不屬於你。」然後你用行動去證明那個聲音是對的。',
    detail:'自毀行為的底層邏輯是：「如果好事一定會消失，不如由我來決定它什麼時候消失。」這種感覺跟小時候的經驗有關。可能你曾經被承諾了什麼然後落空，可能你學到的是「好的東西不會留太久」。所以你先下手為強，在失去之前主動破壞，至少這樣「主導權在你手上」。\n\n但你有沒有發現，每次你破壞完之後不是鬆了一口氣，而是更空、更難受？因為你真正渴望的是「好的東西會留下來」，但你不敢讓自己相信。所以你把每一次「好」都變成了「看吧，果然留不住」的證據。\n\n覺察邀請：下次你想做一件你知道會搞砸某件好事的行為之前，給自己十秒鐘。只要十秒。在這十秒裡問自己：「我是真的想這樣做，還是我在破壞我害怕失去的東西？」',
    oil:'岩蘭草 2 滴＋薰衣草 2 滴＋檀香 1 滴，在你感覺到衝動的時候聞。岩蘭草把你拉回地面。薰衣草讓那個內在的躁動安靜十秒鐘。檀香帶來一種深沉的「值得」感。你值得好的東西留下來。',
    med:'雙手張開，掌心朝上。想像你手上捧著一樣你很珍惜的東西。吸氣四秒，感覺它的重量。吐氣六秒，不要把它放下。對自己說：「我可以拿著好的東西不放手。它不會因為我拿著就消失。」重複四次。慢慢把手合起來，收在胸口。',
    quote:'好東西你配得起。只是你還沒學過「好東西留在手上」的感覺。'},
  delay:{name:'永恆等待型',icon:'⏳',sub:'你一直在等最好的時機，但最好的時機不會來',
    keys:['慣性拖延','等待時機','用準備取代行動'],
    desc:'你的自我破壞方式是把「開始」無限延後。我再學一個課程再說、等我準備好再開始、時機不對先不要、再想想看。你一直在「準備」，但從來沒有「出發」。你的抽屜裡有十個企劃書、五個證照、三個計畫，全部都在等你按下啟動鍵。但你就是按不下去。',
    detail:'永恆等待者的核心信念是「我還不夠」。不夠好、不夠專業、不夠有經驗、不夠有錢、不夠瘦、不夠準備好。這個「不夠」永遠不會消失，因為你在用「準備」來代替「面對」。\n\n你知道嗎，準備是會上癮的。它給你一種「我在前進」的錯覺，但你其實一步都沒有動。你在原地轉圈，只是轉得很認真、很忙碌、很有理由。\n\n問一個殘酷的問題：如果你已經夠好了，你現在馬上可以開始，你願意嗎？如果答案是「我不確定」，那你等的不是時機，你在逃避的是開始之後的未知。\n\n覺察邀請：選一件你已經「準備很久」的事情。今天就做第一步。不是做完，是做第一步。踏出去的那一刻，你會發現其實你早就準備好了。',
    oil:'葡萄柚 2 滴＋薄荷 1 滴＋迷迭香 2 滴，在你又想「再等等」的時候擴香。葡萄柚帶來啟動的能量。薄荷讓腦袋清醒到不再合理化拖延。迷迭香點燃那個「做就對了」的衝勁。',
    med:'看一下時鐘。記住現在的時間。吸氣四秒，對自己說：「如果不是現在，是什麼時候？」吐氣六秒。吸氣四秒，對自己說：「我不需要準備好。我只需要開始。」吐氣六秒。站起來。做那件事的第一步。不管多小都可以。',
    quote:'完美的時機是一個謊言。唯一的時機就是現在。'},
  minimize:{name:'自我矮化型',icon:'🔇',sub:'你把自己的音量調到最小，假裝自己不重要',
    keys:['否認成就','自我貶低','配不上感'],
    desc:'你的自我破壞方式最安靜，安靜到你自己都不覺得那是破壞。你把每一次成功都歸功於運氣、歸功於別人、歸功於「還好啦」。表面看起來像謙虛，但你心裡清楚，那是真心覺得自己不配。好事發生的時候你的第一反應是「我何德何能」，壞事發生的時候你的第一反應是「果然」。',
    detail:'自我矮化的底層是一個非常深的信念：「真正的我不值得被看到。」你可能從小就被教導要謙虛、不要出風頭、不要覺得自己很了不起。這些教導變成了你的預設程式，它不讓你往上走，每次你爬高一點，它就拉你回來。\n\n你知道自我矮化最可怕的地方在哪嗎？它會成真。當你一直告訴自己「我不夠好」，你真的會開始做出「不夠好」的行為。不是因為你真的不夠好，是你的行為在配合你的信念。你選擇低於自己能力的工作、低於自己價值的感情、低於自己真正想要的人生。\n\n覺察邀請：今天做一個練習。列出三件你做得好的事情。不准加「但是」。不准加「其實也沒什麼」。就讓那三件事好好地站在那裡。',
    oil:'玫瑰 1 滴＋茉莉 1 滴＋佛手柑 2 滴＋甜橙 1 滴，在你又想說「我哪有」的時候擴香。玫瑰告訴你的心：你配。茉莉讓你的價值感不需要外在證明。佛手柑打開你的太陽神經叢，那是自信住的地方。甜橙讓你嚐到「我很好」的甜味。',
    med:'站在鏡子前面。看著自己的眼睛。吸氣四秒，對鏡子裡的人說：「你做了很多很棒的事。」吐氣六秒。吸氣四秒，對鏡子裡的人說：「你值得被看見。」吐氣六秒。重複四次。不用笑，不用做表情。就好好看著自己。',
    quote:'你以為的謙虛，其實是你對自己最深的暴力。'},
  perfect_retreat:{name:'高標逃跑型',icon:'🎯',sub:'你設了一個達不到的標準，然後用「達不到」當理由離開',
    keys:['不合理標準','合理化放棄','用完美當退路'],
    desc:'你融合了完美癱瘓和臨門退縮的特質。你先把目標設得超級高，高到幾乎不可能達到。然後當你「果然」達不到的時候，你就可以合理地退場了。「不是我不想做，是這件事太難了。」這個劇本你演了很多遍，每次都很有說服力，連你自己都信了。',
    detail:'這種模式的精妙之處在於它看起來一點都不像自我破壞。你有高標準，這聽起來很積極。你放棄了達不到的目標，這聽起來很理性。但把兩件事合在一起看，你會發現你的高標準只是用來合理化逃跑的工具。\n\n你真正害怕的不是失敗，是在合理的標準下全力以赴之後還是做不到。那才是你真正不敢面對的。所以你把標準拉到不合理的高度，這樣你永遠可以說「不是我不行，是這件事本來就不可能」。\n\n覺察邀請：下一次設目標的時候，把它降低三成。不是降低標準，是給自己一個真的有可能達到的起點。你會發現，當成功變得真的有可能的時候，你反而更緊張。那個緊張才是你真正需要面對的東西。',
    oil:'佛手柑 2 滴＋薰衣草 2 滴＋甜橙 1 滴。佛手柑釋放你給自己的壓力。薰衣草讓你的標準鬆一點，鬆到人可以呼吸的程度。甜橙讓你記得做事情可以有樂趣，不只是考驗。',
    med:'寫下你現在最想達成的一個目標。然後問自己：「七十分的版本長什麼樣？」吸氣四秒，讓那個七十分的版本在腦海裡成形。吐氣六秒，對自己說：「七十分就夠了。先到那裡再說。」',
    quote:'你的標準不是太高。你的標準是一面牆，擋在你和「真的去試」之間。'},
  retreat_minimize:{name:'隱形能力者',icon:'👻',sub:'你把自己藏得這麼好，連機會都找不到你',
    keys:['主動隱形','拒絕舞台','能力比位置高太多'],
    desc:'你明明有能力卻選擇隱形。不是不被看見，是你主動把自己藏起來。升遷機會你往後退、發言機會你保持沉默、領功勞的時候你已經離開了。你用「我不在乎那些」來包裝你真正的恐懼：如果我被看見了，然後被發現其實沒有那麼好怎麼辦？',
    detail:'隱形能力者是臨門退縮和自我矮化的組合。你害怕被看見，同時你真心覺得自己不配。這兩者互相加強：因為覺得不配所以躲起來，因為躲起來所以沒有機會被證明你其實很好，因為沒有被證明所以更覺得不配。\n\n你身邊的人可能覺得很可惜。他們看得到你的能力，但你就是不願意站到那個位置上。你可能會說「我喜歡在幕後」，但問問自己的心：你是真的喜歡幕後，還是你不敢走到幕前？\n\n覺察邀請：這週試一次：在一個安全的場合裡，主動說出你的想法。不用很多，一句就好。感覺一下被聽見的時候，你的身體是什麼反應。',
    oil:'茉莉 1 滴＋迷迭香 2 滴＋佛手柑 2 滴。茉莉打開你的喉輪，讓你的聲音可以出來。迷迭香喚醒你的存在感。佛手柑讓被看見變成一件溫暖的事而不是危險的事。',
    med:'坐著。想像你在一個房間裡，燈光慢慢亮起來，照在你身上。吸氣四秒，讓光停在你身上。吐氣六秒，不要把光推開。對自己說：「被看見是安全的。」重複四次。',
    quote:'你把自己藏得太好了。但世界少了你那份光，真的比較暗。'},
  destruct_delay:{name:'自爆倒數型',icon:'💣',sub:'你等到最後一刻，然後用最戲劇化的方式結束一切',
    keys:['拖到不行','戲劇性結局','用危機感取代行動'],
    desc:'你是拖延和自毀的組合。你會把事情拖到最後一刻，拖到它已經變成一顆炸彈了，然後讓它爆炸。你用「時間不夠了」當理由去做一個衝動的決定，而那個決定通常比什麼都不做更糟。你的人生像一齣劇，總是在deadline前上演最激烈的劇情。',
    detail:'自爆倒數者的底層是一種矛盾：你同時害怕面對和害怕不面對。拖延是不想面對，自毀是用最激烈的方式面對。這兩者交替出現，你的人生就變成了一個永恆的緊急狀態。\n\n你可能對「平靜」感到不安。當事情太久沒有危機的時候，你反而開始製造危機。因為你已經習慣了「在壓力下運作」，平靜對你的神經系統來說反而像一種威脅。\n\n覺察邀請：下次你發現自己又在「等到最後一刻」的時候，在倒數開始前一週就動手。即使只做五分鐘。打破那個「危機才能驅動我」的模式。你不需要活在倒數裡。',
    oil:'岩蘭草 2 滴＋甜橙 2 滴＋薄荷 1 滴。岩蘭草讓你在還沒到危機的時候就落地。甜橙告訴你「平靜也可以是一種力量」。薄荷讓你的頭腦清醒到可以在不緊急的時候也做決定。',
    med:'看著日曆上某個deadline。吸氣四秒，對自己說：「我不需要等到火燒屁股才能動。」吐氣六秒。吸氣四秒，想像自己在deadline的一週前就已經完成了。那個感覺像什麼？吐氣六秒。今天就做第一步。',
    quote:'你不需要活在倒數裡。平靜的日子也值得被好好過。'},
  minimize_delay:{name:'佛系放棄型',icon:'🫥',sub:'你用「無所謂」把所有可能性都推遠了',
    keys:['假裝不在意','消極等待','用淡漠保護自己'],
    desc:'你的自我矮化和慣性等待合在一起，變成了一種很溫和的放棄。你不覺得自己在破壞什麼，你覺得你只是「比較隨緣」。但你的隨緣有一個很明確的方向：它永遠指向「不嘗試」。你用「都可以」「沒關係」「無所謂」把自己包起來，看起來很佛系，但底下是你已經放棄了為自己爭取任何東西。',
    detail:'佛系放棄的核心不是真的看開了，是你把「我不夠好所以不值得爭取」偽裝成了灑脫。真正的灑脫是經歷過之後的放下，你的灑脫是經歷之前的逃避。\n\n你可能會說「慾望越少越自在」，但你自己知道，深夜裡你還是會想那些你放棄的東西。你放棄的不是慾望，你放棄的是「相信自己可以得到」。\n\n覺察邀請：問自己一個問題：「如果我知道不會失敗，我最想做什麼？」不需要馬上去做。先讓自己承認「我其實想要」就好。那已經是很大的一步了。',
    oil:'葡萄柚 2 滴＋迷迭香 1 滴＋黑胡椒 1 滴＋甜橙 1 滴。葡萄柚喚醒你的渴望。迷迭香讓你的意志力不再裝睡。黑胡椒帶來一種微辣的行動衝勁。甜橙讓追求自己想要的東西變成一件愉快的事。',
    med:'坐著。雙手放在膝蓋上。吸氣四秒，問自己：「我真正想要什麼？」不要用腦袋回答，讓身體回答。吐氣六秒。吸氣四秒，讓那個答案浮上來。不管多小多荒謬都可以。吐氣六秒，對自己說：「我可以想要。想要不丟臉。」',
    quote:'那份無所謂是假的。你只是把「想要」鎖起來太久了。'},
  perfect_destruct:{name:'登頂墜落型',icon:'🏔️',sub:'你爬到了很高的地方，然後從山頂跳下來',
    keys:['追求極致','抵達後崩壞','得到就失去'],
    desc:'你是完美癱瘓和自毀城牆的混合。你能做到很高的成就，你的能力和毅力都是真的。但你有一個可怕的模式：到達頂端之後，你會親手把它拆掉。升遷後搞砸關係、比賽贏了之後退出圈子、賺到錢之後做出糟糕的投資。你像一個登山者，登頂之後不是下山，是往下跳。',
    detail:'登頂墜落者的核心矛盾是：你渴望成功但恐懼停留在成功裡。你可以忍受追逐的辛苦，但你忍受不了「已經到了」的安靜。因為「到了」意味著你不能再用「還在努力」來定義自己。\n\n你的身份認同綁在「奮鬥者」這個角色上。當你成功了，奮鬥結束了，你突然不知道自己是誰。所以你搞砸它，回到「需要重新開始」的狀態。在那裡你很安全，因為你又可以當那個「正在爬山的人」。\n\n覺察邀請：下次你達成了什麼，給自己一個儀式。不需要多隆重。就停下來，感覺三秒鐘。讓「我做到了」這個感覺進到身體裡。不用急著設下一個目標。',
    oil:'檀香 2 滴＋薰衣草 2 滴＋乳香 1 滴。檀香讓你跟「到達」的感覺待久一點。薰衣草告訴你的神經系統不需要馬上找下一個戰場。乳香帶來「我在這裡就好」的安定感。',
    med:'想像你站在山頂。吸氣四秒，看著周圍的風景。吐氣六秒，不要急著下山。對自己說：「我可以留在這裡。我不需要用破壞來證明什麼。」重複四次。讓自己在山頂多待一會兒。',
    quote:'你的問題不是爬不上去。你的問題是到了之後不讓自己留下來。'}
};
let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';
    const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 題 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一題</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一題 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看看我的自我破壞模式 🔧</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 題，共 '+questions.length+' 題';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const dimScores={};Object.keys(DIMS).forEach(k=>{dimScores[k]=0;});
  Object.keys(answers).forEach(qi=>{const oi=answers[qi];const s=questions[qi].opts[oi].s;Object.keys(s).forEach(d=>{dimScores[d]+=s[d];});});
  const maxPossible=Object.keys(answers).length*3;
  const sorted=Object.keys(DIMS).sort((a,b)=>dimScores[b]-dimScores[a]);
  const top=sorted[0],second=sorted[1];
  const v1=dimScores[top],v2=dimScores[second];
  let topType;
  if(v1>v2*1.4) topType=top;
  else{
    const comboKey=top+'_'+second;
    topType=TYPES[comboKey]?comboKey:(TYPES[second+'_'+top]?second+'_'+top:top);
  }
  const f=TYPES[topType];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('hlTitleReveal').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥靈之鑰</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-quote">「'+f.quote+'」</div><div class="ss-footer">hourlightkey.com ✦ </div></div><div class="hl-title-card"><div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div><div class="hl-title-eyebrow">Hour Light ✦ 自我破壞模式覺察</div><span class="hl-title-icon">'+f.icon+'</span><div class="hl-title-main">'+f.name+'</div><div class="hl-title-sub">'+f.sub+'</div><div class="hl-title-divider"></div><div class="hl-title-grid"><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 破壞模式</div><div class="hl-title-tag-value">'+f.name+'</div></div><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 覺察關鍵字</div><div class="hl-title-tag-value">'+f.keys.join(' · ')+'</div></div></div><div class="hl-title-quote">「'+f.quote+'」</div><div class="hl-title-combo-hint">'+f.name+'｜'+f.sub+'</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">Self-Sabotage Pattern</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var pct=Math.round(dimScores[k]/maxPossible*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+DIMS[k]+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">'+f.icon+' 你的自我破壞模式</div><div class="result-section-content">'+f.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度覺察</div><div class="result-section-content">'+f.detail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🌿 認知芳療配方</div><div class="result-section-content">'+f.oil+'</div></div><div class="result-section"><div class="result-section-title">🧘 60秒身體校準練習</div><div class="result-section-content">'+f.med+'</div></div><div class="result-section" style="text-align:center;font-family:LXGW WenKai TC,serif;font-size:1.05rem;color:#8b6914"><div class="result-section-content"></div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ H.O.U.R. 覺察橋接</div><div class="hour-bridge-text">自我破壞模式是「行動層」的卡住。H.O.U.R. 的 R（行動進化）就是在處理這個。<br>當你知道自己怎麼踩煞車，才能開始學著放開煞車。</div><a href="draw-hl.html" class="hour-bridge-cta">🔮 抽一張牌看看行動方向 →</a>';
  window._resultText=f.icon+' 我是「'+f.name+'」！'+f.sub+'\n「'+f.quote+'」\n\n你的自我破壞模式是什麼？👉 hourlightkey.com/quiz-self-sabotage.html';
  try{localStorage.setItem('hl_quiz_self_sabotage',JSON.stringify({type:topType,dimScores,ts:Date.now()}));}catch(e){}
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_dropMaterial) HL_dropMaterial('quiz');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz',toolName:'自我破壞模式覺察'});window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
