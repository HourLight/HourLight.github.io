chase:{name:'多巴胺追逐者',icon:'🏎️',sub:'你的快樂系统永远在找下一个更大的刺激',keys:['刺激追逐','快樂耐受','永不满足'],desc:'你的大脑奖励系统像一台永远踩油门的跑車。新餐厅、新关係、新计画，你一直在追下一个。不是你貪心，是你的多巴胺受体需要越來越大的刺激才能感觉到够了。這在神经科学裡叫做多巴胺耐受。你正在吃的這頓飯不够，因为你在想下一頓。你的人生像一场永远不会結束的賽跑。',detail:'追逐型的你活得很精彩但也很累。你的快樂永远在前方，从來不在脚下。\n\n问一个关键问题：你上一次够了的感觉是什麼時候？如果想不起來，那就是觉察起点。\n\n觉察邀请：今天做一件事的時候完全不想下一件事。吃飯就只是吃飯，散步就只是散步。让大脑体验一次此刻就足够的感觉。',oil:'薰衣草 2 滴＋檀香 2 滴＋甜橙 1 滴。薰衣草让神经系统从追逐切換到休息。檀香带來到了的感觉。甜橙让停下來变愉快。',med:'坐下來。手放膝盖上。吸气四秒，感觉屁股坐在椅子上的重量。吐气六秒，对自己说：「我哪裡都不用去。」重複四次。',quote:'你在逃避此刻不够的感觉。其實此刻一直都够。'},
savor:{name:'品味大师',icon:'🍷',sub:'你能从一杯茶裡喝出整个宇宙',keys:['当下品味','感官敏銳','知足常樂'],desc:'你的多巴胺系统很健康。你不需要很大的刺激就能感觉到快樂。一朵花开了你看得到，一口食物的味道你嚐得出。你拥有Fred Bryant教授所说的品味力（Savoring）。你的快樂不是爆炸式的，而是稳定、持續、像一条温暖的河流。',detail:'品味型的你，挑战可能不是如何更快樂，而是如何在高速世界裡保持节奏。\n\n觉察邀请：繼續做你在做的事。但也留意有没有時候你用我很满足來避开你其實想要但不敢承认的東西？品味和压抑之间有一条很细的线。',oil:'佛手柑 2 滴＋天竺葵 1 滴＋乳香 2 滴。佛手柑維持好心情。天竺葵让你跟情感流保持连結。乳香加深品味能力。',med:'手上拿一杯温水。吸气四秒感觉杯子温度。吐气六秒喝一小口。感觉水从嘴唇到喉嚨到胃。对自己说：「這就够了。」',quote:'你不需要更多。你只需要更深地感觉已经有的。'},
hoard:{name:'安全感囤积者',icon:'🏦',sub:'你的快樂不是用掉了而是存起來了',keys:['收藏癖','數字安全感','拥有比使用重要'],desc:'你的多巴胺在得到和累积的時候分泌。你可能有很多收藏但很少使用。你的快樂住在拥有這件事本身裡面。這跟安全感直接相关，你的潜意识相信拥有更多等於更安全。',detail:'這可能跟小時候的经验有关，也许你经历过匱乏。问题是，当快樂被存起來而不是被体验，你拥有很多但感觉什麼都没有。\n\n觉察邀请：今天用掉一样你捨不得用的東西。让身体学会：用掉不代表失去。',oil:'甜橙 2 滴＋葡萄柚 1 滴＋薄荷 1 滴＋佛手柑 1 滴。甜橙让你体验花出去的快樂。葡萄柚带來释放感。',med:'找一样收藏但从没用过的東西。拿在手上。吸气四秒感觉重量。吐气六秒，打开或使用它。对自己说：「花出去的快樂也是快樂。」',quote:'你存了很多快樂，但你忘了把它們領出來用。'},
numb:{name:'快樂遲鈍型',icon:'🔇',sub:'开关还在，只是很久没被打开了',keys:['快感缺失','情緒平坦','什麼都还好'],desc:'你的多巴胺系统好像被调到静音。別人觉得超棒的事，你的反应是还好。臨床上叫做快感缺失（Anhedonia），可能跟長期压力、慢性疲勞有关。你的大脑为了保护你把接收器调低了。但這不是永久的。',detail:'你的快樂迴路还在，只需要慢慢重新校准。不是用更大的刺激轟它，而是用很小的事情喚醒它。\n\n觉察邀请：這週每天做一件微小的愉快。聞一朵花、摸一隻猫、赤脚踩草地。不评判有没有感觉到快樂，只是做。',oil:'葡萄柚 2 滴＋薄荷 1 滴＋迷迭香 1 滴＋黑胡椒 1 滴。葡萄柚重啟多巴胺系统。薄荷带來清涼感。迷迭香喚醒前額葉。黑胡椒带來微辣温熱。',med:'赤脚站地板。感觉脚底温度。吸气四秒动脚趾头。吐气六秒。对自己说：「我的感觉还在。它只是睡著了。」',quote:'你的快樂没有消失。它在等你用很温柔的方式叫醒它。'},
chase_hoard:{name:'獵人收藏家',icon:'🎪',sub:'追到了就塞进收藏櫃然後繼續追',keys:['追逐囤积','得到不享受','永远在蒐集'],desc:'你的多巴胺在搜尋和得到的時候分泌最多，在使用和体验時幾乎归零。衣櫃穿不完的衣服但每天觉得没衣服穿。你需要的不是更多東西，是学会停在有的狀态裡。',detail:'快樂的高峰在下单那一秒。按下确认键的瞬间多巴胺爆发，然後就没了。\n\n觉察邀请：下次想买什麼先加购物車不結帳。等三天。还想要就买了当天用。',oil:'薰衣草 2 滴＋檀香 2 滴＋佛手柑 1 滴。薰衣草让追逐脚步慢下來。檀香让你停在已经有了的感觉裡。',med:'看著手边三样東西。吸气四秒认真看著第一样。吐气六秒，想你为什麼当初想要它。对它说：「你够了。」',quote:'你的收藏櫃很满，但体验是空的。'},
chase_numb:{name:'刺激麻痹型',icon:'⚡',sub:'追了太多刺激最後连刺激都感觉不到',keys:['过度追逐','快感燃尽','高閾值'],desc:'你曾经是追逐型，但追得太猛把多巴胺受体追到麻痹了。神经科学裡叫做多巴胺受体下调。好消息是受体可以恢复，但需要時间和刻意的低刺激期。',detail:'觉察邀请：這週减少一样高刺激活动（社群、游戏、购物），用低刺激活动取代（散步、手写日记、面对面聊天）。一週後观察感受力有没有回來。',oil:'薰衣草 3 滴＋岩兰草 2 滴。最安静的配方。让过度興奮的系统休息。',med:'躺下來。什麼都不做。不聽音樂不想事情。吸气四秒什麼都不追。吐气六秒什麼都不要。让空待在那裡。',quote:'你追得太快了，快到连风景都看不见。停一下。'},
savor_numb:{name:'遺忘品味者',icon:'🌫️',sub:'你曾经很会感受但不知何時开始遲鈍了',keys:['品味退化','感官关閉','想感受但感受不到'],desc:'你的基因裡有品味的天賦，但某些经历让感觉器官慢慢关閉了。你知道阳光很美但感受不到温度。這通常发生在重大失落或長期压力之後。你比快樂遲鈍型多一个优势：你记得快樂是什麼感觉。',detail:'那个记忆本身就是恢复的路徑。\n\n觉察邀请：做一件你以前很喜欢但很久没做的事。不带期待地做。如果有一絲感觉浮上來，跟它说：「我看到你了。」',oil:'玫瑰 1 滴＋甜橙 2 滴＋薰衣草 2 滴。玫瑰打开被封起來的感受力。甜橙带回一点明亮。薰衣草让过程不太猛烈。',med:'閉上眼睛。想一个曾经觉得很美的画面。吸气四秒让它清楚一点。吐气六秒。对自己说：「我的感觉还在路上。」',quote:'你的敏銳只是睡著了。它在等一个安全的時刻醒來。'},

chase_savor:{name:'体验美食家',icon:'🌟',sub:'你追的是体验不是數量但停不下來',keys:['品质追逐','精緻不停歇','体验收藏'],desc:'你追的不是更多而是更好。品质、深度、独一无二的体验。你品味很好，但你把品味变成了另一種追逐。你在追更精緻的快樂而不是更深的快樂。',detail:'真正的品味不需要移动，它可以发生在你家廚房裡。\n\n觉察邀请：這週找一天不做特別的事。在家裡用平常的東西试著品味到最深。品味的深度跟环境无关跟专注力有关。',oil:'薰衣草 2 滴＋乳香 2 滴＋檀香 1 滴。不是关於更好的体验而是更深的。薰衣草帮你停下來。乳香让感受力往下沉。',med:'泡一杯茶。不用很好的茶。吸气四秒聞茶味。吐气六秒喝一小口。让那一口在嘴裡停三秒。对自己说：「這一口就是整个宇宙。」',quote:'最好的体验不在远方。它在你愿意真正停下來的那一刻。'}

let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';
    const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 题 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一题</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一题 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看結果 🎰</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}

function showResult(){
  const dimScores={};Object.keys(DIMS).forEach(k=>{dimScores[k]=0;});
  Object.keys(answers).forEach(qi=>{const oi=answers[qi];const s=questions[qi].opts[oi].s;Object.keys(s).forEach(d=>{dimScores[d]+=s[d];});});
  const maxPossible=Object.keys(answers).length*3;
  const sorted=Object.keys(DIMS).sort((a,b)=>dimScores[b]-dimScores[a]);

  const v1=dimScores[top],v2=dimScores[second];

  else{
    const comboKey=top+'_'+second;

  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">Dopamine Style</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var pct=Math.round(dimScores[k]/maxPossible*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+DIMS[k]+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">'+f.icon+' 你的觉察結果</div><div class="result-section-content">'+f.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度觉察</div><div class="result-section-content">'+f.detail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🌿 认知芳疗配方</div><div class="result-section-content">'+f.oil+'</div></div><div class="result-section"><div class="result-section-title">🧘 60秒身体校准练習</div><div class="result-section-content">'+f.med+'</div></div><div class="result-section" style="text-align:center;font-family:LXGW WenKai TC,serif;font-size:1.05rem;color:#8b6914"><div class="result-section-content"></div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ H.O.U.R. 觉察橋接</div><div class="hour-bridge-text">你的多巴胺风格影响你如何感受快樂。H.O.U.R. 的 H（身心校准）帮你重新校准快樂的基准线。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免费解码馥灵秘码 →</a>';
  window._resultText=f.icon+' 我是「'+f.name+'」！'+f.sub+'\n「'+f.quote+'」\n\n你的觉察結果是什麼？👉 hourlightkey.com/sc/quiz-dopamine-style.html';
  try{localStorage.setItem('hl_quiz_dopamine_style',JSON.stringify({type:topType,dimScores,ts:Date.now()}));}catch(e){}
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_dropMaterial) HL_dropMaterial('quiz');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz',toolName:'多巴胺风格觉察'});window.scrollTo({top:0,behavior:'smooth'});
}
