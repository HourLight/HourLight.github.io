const TYPES={
  curious:{name:'3岁的好奇宝宝',icon:'🌈',sub:'你心裡住著一个对什麼都「为什麼」的小孩',
    keys:['好奇心','探索慾','不怕新事物'],
    desc:'你的內在小孩停在三岁，不是因为你幼稚，是因为你保留了大部分人長大之後丟掉的東西：对世界毫无保留的好奇心。你会因为一朵路边的花蹲下來看三分鐘，会因为一个新的概念興奮到睡不著，会问別人觉得「太基本了吧」的问题。你不太在意自己看起來聪不聪明，你在意的是「有不有趣」。',
    detail:'发展心理学裡，三岁前後是「自主探索期」。這个階段的小孩开始用自己的手去碰世界，每一样東西都要摸、聞、嚐、问。如果当時你的探索被允许、被鼓励，這个好奇心就会变成你的核心动力。\n\n好奇宝宝的风险是：你可能什麼都嚐但什麼都没有深入。你的興趣清单很長，但「真正精通的東西」那一欄可能是空的。好奇心是起点，但走到某个深度需要的是纪律和耐心，那不是三岁小孩的強項。\n\n觉察练習：从你的興趣清单裡选一件事，這个月只做這一件。不是放棄其他的，是练習「在一件事情裡越挖越深之後，发現的风景比表面更精彩」。好奇心不只可以橫著扩，也可以往下钻。',
    oil:'甜橙 3 滴＋檸檬 2 滴＋薰衣草 1 滴，在早上起床的時候扩香。甜橙維持你天生的阳光和活力，檸檬让好奇心有方向感而不是四处飞，薰衣草在你玩累了的時候温柔地把你接住。',
    med:'閉上眼睛，想像三岁的你蹲在地上看螞蟻。吸气四秒，看著那些螞蟻搬東西。吐气六秒，聽三岁的你嘰嘰喳喳地问「为什麼」。重複三次。然後大人的你蹲下來，跟三岁的自己一起看。吸气四秒，说「我也不知道欸，我們一起找答案。」吐气六秒。重複三次。张开眼睛。今天去好奇一件新的事情。',
    quote:'你的好奇心是全世界最好的望远镜。偶爾记得也用它当显微镜，往深处看。'},
  perform:{name:'5岁的小演员',icon:'🎭',sub:'你心裡住著一个随時准備好上台的小孩',
    keys:['渴望被看见','魅力十足','需要掌声'],
    desc:'你的內在小孩停在五岁，那个年纪的你发現了一件很重要的事：做某些事情的時候，大人会笑、会拍手、会说你好棒。於是你学会了「表演」。這个表演不一定是在舞台上，可能是让全桌的人笑、可能是永远是最会带气氛的那个人、可能是把每一次发言都变成一场小表演。你很有魅力，真的，但你自己可能分不清楚：你的魅力是「你本來就闪」，还是「你很害怕不闪的時候没人看你」。',
    detail:'五岁前後是「主动探索对罪惡感」的階段（Erikson 的心理社会发展理论）。小孩开始试著影响环境，如果嘗试被肯定，他就学会「我可以有影响力」。但如果肯定永远跟表現綁在一起，他也会学会「我的价值等於我的表現」。\n\n小演员的风险是：你可能已经不知道「没有观眾的自己」長什麼样了。你独处的時候会不安，安静的時候会焦慮。你需要找回那个「不需要任何人注意也可以觉得自己很好」的感觉。\n\n觉察练習：今天找一个小時，关掉所有社群。做一件不会被任何人看到的事情。画一张只有你看的画、写一篇不会发表的文字、做一道不会拍照上传的菜。感受一下：「没有观眾的時候，我还在嗎？」',
    oil:'依兰 2 滴＋甜橙 2 滴＋乳香 1 滴，在睡前扩香。依兰让你的舞台魅力不用力就有，甜橙是观眾席最温暖的掌声（來自你自己），乳香让你卸完妝之後回到最真的那个自己。',
    med:'閉上眼睛。想像五岁的你站在舞台上，灯光很亮，观眾席坐满了人。你在表演。吸气四秒，看著台下的脸。吐气六秒。观眾在鼓掌。第三次呼吸的時候，想像灯光慢慢暗下來，观眾一个一个离开。吸气四秒，舞台空了。吐气六秒。只剩你一个人站在台上。吸气四秒。安静。吐气六秒。对五岁的自己说：「就算没有人在看，你也很亮。」重複三次。张开眼睛。',
    quote:'你天生就有光。但真正的光，不需要观眾也照样亮著。'},
  perfect:{name:'7岁的完美小孩',icon:'📏',sub:'你心裡住著一个永远觉得「还不够好」的小孩',
    keys:['高标准','害怕犯错','需要认可'],
    desc:'你的內在小孩停在七岁，那是开始被打分數的年纪。考试有分數、表現有名次、连坐姿都有人管。你很早就学会了一件事：做得好才被喜欢。於是你把标准內建在身体裡了。每一件事情都要做到位，每一个环节都不能出错。你对自己的要求比任何人对你的要求都高，你以为這是自律，但那其實是七岁的你在害怕「如果我不够好，就没有人愛我」。',
    detail:'七岁前後是「勤勉对自卑」的階段。這个年纪的小孩开始跟外界比較，如果比較的結果总是跟「被愛」綁在一起，他就会把「够好」当作被愛的门票。问题是，「够好」的标准会一直提高。100分之後还有120分，120分之後还有「为什麼不是每科都120分」。\n\n完美小孩的风险是：你忘了你不需要任何门票。你被愛不是因为你表現好，是因为你存在。你的七岁小孩需要聽到的不是「你好棒」，是「你不需要好棒也值得被拥抱」。\n\n觉察练習：今天刻意做一件「80分」的事情然後交出去。不是偷懶，是练習。看看天会不会塌下來。看看80分的你，是不是还是被接受的。',
    oil:'薰衣草 3 滴＋佛手柑 2 滴＋甜橙 1 滴，在感觉「还不够好」的時候扩香。薰衣草让你的神经系统接受「這样就够了」，佛手柑降低你的焦慮閾值，甜橙给七岁的你一个甜甜的笑脸。',
    med:'閉上眼睛。想像七岁的你拿著一张考卷走过來，上面写著98分。他低著头。吸气四秒，看著那张考卷。吐气六秒。大人的你蹲下來，把考卷翻过來放在桌上。吸气四秒，抱著七岁的自己说：「不管幾分，我都愛你。」吐气六秒。重複四次。感觉七岁的你慢慢放松肩膀。最後说：「你不需要任何分數才值得被拥抱。」张开眼睛。',
    quote:'你不需要100分才值得被愛。你存在，就已经够了。'},
  adult:{name:'10岁的小大人',icon:'🧳',sub:'你心裡住著一个太早学会懂事的小孩',

    desc:'你的內在小孩停在十岁，但说實话他可能比大部分大人都「大人」。你很早就学会看大人的脸色、猜大人的需求、不添麻烦。你可能在家裡是那个「不用操心的孩子」，在学校是「老师可以放心的学生」，在朋友圈是「最可靠的那个人」。你被信任，你被依賴，你从來不让人失望。但十岁的你心裡有一句一直没说出口的话：「我也想当小孩。」',

  rebel:{name:'12岁的叛逆期',icon:'🔥',sub:'你心裡住著一个「都不对」的小孩',

    desc:'你的內在小孩停在十二岁，那个开始觉得「大人说的不一定对」的年纪。你有很多憤怒。不一定是对谁，有時候是对這个世界、对规則、对那些「不公平」的事情。你可能是人群裡最敢说真话的人，也可能是最容易翻白眼的人。你的叛逆不是为了搗亂，是因为你心裡有一把很清楚的尺，量出了太多不合理。',

    oil:'尤加利 2 滴＋薄荷 1 滴＋雪松 2 滴，在感觉怒气上升的時候扩香。尤加利打开你的呼吸通道（怒气会让你憋住），薄荷让你的头脑在情緒风暴裡保持清醒，雪松把你的根紮稳，不被自己的火燒掉。',

    quote:'你的怒气底下有一个很重要的東西。拆开來看看，那是你最在乎的事。'},
  glass:{name:'15岁的玻璃心',icon:'💧',sub:'你心裡住著一个随時可能碎掉的小孩',
    keys:['敏感易碎','害怕被拒绝','情緒放大'],
    desc:'你的內在小孩停在十五岁，那个全世界最敏感的年纪。別人的一个眼神、一句话、一个已读不回，都可能在你心裡翻起巨浪。你的感受器像调到了最大音量的收音机，所有的讯号都收得到，而且每一个都很大声。你可能经常觉得「为什麼只有我這麼在意」，是的，因为你的敏感度确實比一般人高。',

    desc:'你的內在小孩没有停在某个年纪，因为他根本不打算長大。你保留了完整的童真，看世界的方式跟大部分大人不一样。你觉得花是活的、玩具有灵魂、星星可以许愿、愛情应该像童话一样。你周圍的人可能觉得你「太天真」「不切實际」「该長大了」。但你知道，大人們丟掉的那些東西裡面，有些是最珍貴的。',

    oil:'甜橙 3 滴＋花梨木 2 滴＋岩兰草 1 滴，在需要「落地」的時候扩香。甜橙維护你天生的阳光和童真，花梨木让想像力有一个木质的稳定框架，岩兰草是地心引力的味道，温柔地把你从云端拉回地面。',

    desc:'你的內在小孩不是停在某个年纪，是他已经跟長大的你和好了。你允许自己有時候幼稚、有時候脆弱、有時候需要被照顾，你也可以在需要的時候坚強、負責、独立。你不用在「小孩」和「大人」之间选边站，因为你把兩个都带在身上了。這不是天生的，是你走过了一段路、花了一些力气、做了很多次和解之後到达的地方。',

let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';
    const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 题 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一题</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一题 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">去见你的內在小孩 🧒</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 题，共 '+questions.length+' 题';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const dimScores={};Object.keys(DIMS).forEach(k=>{dimScores[k]=0;});
  Object.keys(answers).forEach(qi=>{const oi=answers[qi];const s=questions[qi].opts[oi].s;Object.keys(s).forEach(d=>{dimScores[d]+=s[d];});});
  const maxPossible=Object.keys(answers).length*3;
  const sorted=Object.keys(DIMS).sort((a,b)=>dimScores[b]-dimScores[a]);
  const topType=sorted[0],f=TYPES[topType],f2=TYPES[sorted[1]];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
