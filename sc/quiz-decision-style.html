const DIMS={intuition:'直觉力',analysis:'分析力',emotion:'感受力',crowd:'从眾力',avoid:'迴避力',perfect:'完美力',value:'价值力',flow:'随缘力'};
const TYPES={
  intuition:{name:'直觉冲鋒型',icon:'⚡',sub:'你的身体比脑袋先知道答案',
    keys:['速度感','体感决策','相信直觉'],
    desc:'你做决定的方式像闪电，还來不及分析就已经动了。不是冲动，是你的身体有一套比理智更快的处理系统。你走进一间店，三秒內就知道要不要待下去。你看到一个人，还没说话就已经有感觉了。大部分時候，你的直觉是准的。那些事後分析出來的理由，只是帮你的直觉找到一件合理的外套。',
    detail:'认知科学裡有一个概念叫「軀体标记假说」，说的就是你的身体会在意识之前就对选項做出反应。你的心跳加速、手心微熱、胃轻微一缩，這些都是决策讯号。你只是比大多數人更会「聽身体的话」。\n\n但直觉冲鋒的风险在於：当你的身体记忆是歪的，直觉就会带你去老地方。比如你对某種类型的人有好感，可能不是因为他們真的好，是因为他們像你熟悉的人。熟悉不等於正确。\n\n觉察练習：下次做重要决定的時候，先照直觉选，然後暫停三秒，问自己一个问题：「這个感觉是新的，还是旧的？」如果是旧的，多想三十秒再动。',
    oil:'薄荷 2 滴＋迷迭香 2 滴＋甜橙 1 滴，在需要做重要决定前扩香。薄荷让你的直觉保持清醒而不是亢奮，迷迭香帮你的前額葉在直觉起跑的時候跟上节奏，甜橙软化那个「不管了直接冲」的力道。让直觉繼續带路，但旁边多一个清醒的副駕駛。',
    med:'閉上眼睛，把一隻手放在胸口。吸气四秒，感觉心跳。吐气六秒。问自己一个最近在猶豫的事情，然後注意身体的反应。胸口是紧的还是松的？胃是暖的还是涼的？吸气四秒，不分析那个感觉，只是感觉它。吐气六秒。重複四次。最後问自己：「這个感觉是新的，还是旧的？」张开眼睛。',
    quote:'你的直觉是一把好刀。但偶爾停下來磨一磨，切得更准。'},
  analysis:{name:'分析建模型',icon:'📊',sub:'你的脑袋是一台高效能运算机',
    keys:['邏輯推演','數据驅动','风险评估'],
    desc:'你做决定的方式像盖房子，地基打好、結构算好、承重测试通过之後才会动工。你不相信「感觉」，你相信「资料」。你的手机裡可能有比較表、待办清单、各種筆记App，你靠整理资讯來降低不确定性。大部分時候，你做的决定品质很高，因为你真的有想过。',
    detail:'你的大脑偏好用系统二（Daniel Kahneman 的概念）來处理决策，也就是慢思考、有意识、有邏輯的那一套。這让你在做重大决策的時候犯错率很低，但代价是速度慢、耗能高。\n\n分析建模型的风险是：你可能会掉进「分析癱瘓」的陷阱。收集资讯让你觉得安全，但资讯永远收集不完。你在等「资料够了」的那一刻其實永远不会來，因为你的安全閾值太高了。有些决定不需要 90% 的把握，60% 就够动了。\n\n觉察练習：這週找一件小事，用计時器设定五分鐘，時间到就做决定。不管资料够不够，五分鐘到就选。练習在资讯不完美的情況下行动。完美的分析加上错过的時机，等於零。',
    oil:'迷迭香 2 滴＋佛手柑 2 滴＋薰衣草 1 滴，在做决定前扩香。迷迭香維持你的邏輯清晰度，佛手柑降低你的焦慮閾值，让「还不够」的声音小一点，薰衣草告诉你的前額葉：60%的把握也可以出发了。',
    med:'坐好，閉上眼睛。想像你面前有一张很大的试算表，上面写满了數字和分析。吸气四秒，看著那张表。吐气六秒，想像那张表慢慢变透明。重複三次。第四次的時候，表格消失了，面前只有一个问题：「如果我現在就要选，我选什麼？」不分析，让第一个浮現的答案就是答案。吸气四秒，吐气六秒。对自己说：「不完美的行动，勝过完美的等待。」张开眼睛。',
    quote:'你的分析是你的超能力。但有時候，最好的數据就是你的心跳。'},
  emotion:{name:'情感导航型',icon:'💗',sub:'你做决定的羅盘是別人的感受',
    keys:['同理心','关係导向','温度优先'],
    desc:'你做决定的時候，第一个想到的不是「什麼对我最好」，是「這样做別人会怎麼样」。你的选擇天生带著温度。选餐厅的時候想著谁吃素，換工作的時候想著同事会不会不开心，连分手都在想怎麼让对方好过一点。你的世界有很多人，你把每个人都放在心上。',
    detail:'你的镜像神经元可能比一般人活躍。你真的能「感觉到」別人的情緒，不是猜的，是你的身体在同步共振。這让你成为很好的傾聽者、很暖的朋友、很体貼的伴侶。\n\n但情感导航的风险是：你可能已经很久没有纯粹为自己做一个决定了。你的「想要」跟「別人需要我想要的」已经混在一起，分不清楚了。你说「我没关係」「我都可以」的時候，有多少次是真的没关係，有多少次是你把自己的需求吞回去了？\n\n觉察练習：今天做一件事情的時候，在心裡先问：「如果這个世界上只有我一个人，我会怎麼选？」不管答案是什麼，先记下來。那个答案是你自己的声音。',
    oil:'天竺葵 2 滴＋甜橙 2 滴＋岩兰草 1 滴，在洗澡後擦在手腕上（用基底油稀释）。天竺葵让你的付出和接收回到平衡，甜橙提醒你自己的快樂也很重要，岩兰草把你的根紮回自己身上，不是紮在別人的需求裡。',
    med:'閉上眼睛，双手交疊放在心口。吸气四秒，想像你心裡住著很多人，他們都在跟你说话。吐气六秒，让那些声音慢慢变远。重複三次。第四次的時候，所有声音都退场了，只剩下你自己的心跳。吸气四秒，问自己：「我想要什麼？」吐气六秒。让答案自己浮上來，不管它聽起來有多自私。重複三次。对自己说：「照顾自己不是自私，是让我有力气繼續照顾別人。」张开眼睛。',
    quote:'你把全世界都放在心上了。現在，把自己也放上去。'},
  crowd:{name:'从眾安全型',icon:'🛡️',sub:'你的安全感來自「大家都這样」',
    keys:['群体归属','共识导向','怕犯错'],
    desc:'你做决定的時候会先看看別人怎麼做。不是没主见，是你觉得「多數人的选擇」本身就是一種很重要的资讯。你会看评价才买東西、问朋友才选餐厅、聽前輩的话才做职涯规劃。某種程度上這很聪明，群体智慧确實有用。但你心裡知道，有些時候你不是在參考意见，你是在找人帮你背书。',
    detail:'社会心理学裡的「从眾效应」不是貶义词，它是人类生存策略的一部分。在资讯不足的時候，观察別人的行为确實能降低风险。這不代表软弱，而是你的生存系统把「群体一致」当作安全信号。\n\n但从眾安全型的风险是：你可能一直在走別人的路，走了很远才发現那条路不是你的。你选了大家觉得好的工作、大家觉得该結婚的年纪、大家觉得成功的样子，但你站在那裡的時候，心裡是空的。因为那是別人的地图。\n\n觉察练習：這週做一件「只有你想做、但身边没人在做」的事。不用很大，一个人去看电影、买一件你的朋友圈没人会穿的衣服、选一条没人走过的路。练習「没有人帮我背书也可以」的勇气。',
    oil:'雪松 2 滴＋乳香 2 滴＋葡萄柚 1 滴，在需要独立做决定的時候扩香。雪松给你一棵自己的樹（不用靠別的樹），乳香让你跟自己的內在声音接上线，葡萄柚带一点阳光感让独自走路不那麼可怕。',
    med:'站起來，双脚与肩同寬。閉上眼睛，想像你站在一群人中间，大家都往同一个方向走。吸气四秒，感觉人群的流动。吐气六秒。第四次呼吸的時候，停下脚步。人群繼續走，你站在原地。吸气四秒，感觉脚底踩著地面。吐气六秒。看看四面八方，问自己：「如果没有人在前面带路，我想往哪裡走？」让答案浮現。吸气四秒，往那个方向踏出一步。吐气六秒。张开眼睛。',
    quote:'大家的路是參考，你的路要自己走。第一步最难，但那一步是你的。'},
  avoid:{name:'逃避拖延型',icon:'🐢',sub:'不是不会选，是「选了就要負責」让你害怕',
    keys:['害怕犯错','决策焦慮','拖延迴圈'],
    desc:'你做决定的方式就是不做决定。不是因为懶，是因为每一个选項在你眼裡都有风险。你看得到A的好也看得到A的坏，看得到B的好也看得到B的坏，然後你就卡在中间了。你可能会用「再想想」「等一下」「看情況」來拖延，直到环境替你做了选擇，或者选項过期。',
    detail:'决策迴避的底层通常不是能力问题，是恐懼问题。你怕的不是「选错」，你怕的是「选错之後要承受那个後果的自己」。所以不选就不会错，不选就不用面对「如果当初」。這是一種保护机制。\n\n但逃避拖延的风险你自己最清楚：不选也是一種选擇，而且通常是最差的那種。机会过期、关係冷掉、问题惡化。你的判断力其實很好。你只是不相信自己可以承担後果。\n\n觉察练習：今天做三个「5秒决定」。什麼事都行。午餐吃什麼、回哪則讯息、今晚看什麼片。數到五就选，不给自己猶豫的空间。做完之後注意一下：天塌了嗎？没有。选错了最差也就是吃了一頓不太好吃的飯，而你还活著。',
    oil:'佛手柑 2 滴＋甜橙 2 滴＋薄荷 1 滴，在早上出门前扩香或滴在手帕上带著走。佛手柑降低你的决策焦慮，甜橙给你一点「没那麼嚴重啦」的轻松感，薄荷在你又要拖延的時候给你一个清醒的小巴掌。',
    med:'閉上眼睛。想像你站在一个岔路口，左边一条路，右边一条路。你不知道哪条对。吸气四秒，看看左边。吐气六秒，看看右边。重複兩次。然後对自己说：「兩条路都可以。走错了可以回來。」吸气四秒，随便选一条，踏出去。吐气六秒，感觉脚踩在路上的触感。重複三次。对自己说：「做了就是对了。」张开眼睛。',
    quote:'不选也是一種选擇，只是通常是最貴的那種。踏出去，你比你以为的更能承担。'},
  perfect:{name:'完美主义型',icon:'🎯',sub:'你的标准很高，高到连自己都过不了',
    keys:['零容错','反覆檢查','高标准'],
    desc:'你做决定之前需要确认再确认、檢查再檢查。不是猶豫，是你的标准太高了。你要确定這是「最好」的选擇才愿意动。你会花很多時间比較、研究、推演各種可能性，就是为了那个「万无一失」。你交出去的東西品质很高，但过程很累。因为你不允许自己犯错。',
    detail:'完美主义的底层通常是「如果我不够好，就不值得被愛」。你用高标准保护自己，用零失误证明自己。但问题是，你的标准永远在提高。100分做到了就会觉得应该要120分，120分做到了又觉得不够。你追的不是完美，你追的是一个永远抓不到的安心感。\n\n完美主义型的风险是：你会错过。等你把方案改到完美的時候，机会已经被那个只有60分但先动了的人拿走了。而且你以为的「完美」，別人可能根本看不出差別。\n\n觉察练習：這週交出一个你觉得「只有80分」的東西。报告、讯息、料理、任何事。刻意不再修一次。然後观察結果：別人的反应跟你预期的落差有多大？大部分時候，你的80分已经是別人的100分了。',
    oil:'薰衣草 3 滴＋佛手柑 2 滴＋依兰 1 滴，在睡前扩香。薰衣草让你的神经系统接受「今天够了」，佛手柑降低那个「还不够好」的焦慮信号，依兰温柔地跟你说：「80分的你也很美。」',
    med:'坐下來，手掌朝上放在膝盖上。閉上眼睛。想像你手裡握著一份你觉得「还不够好」的作品。吸气四秒，握紧它。吐气六秒，慢慢松开手指。重複三次，每一次都松开一点。第四次的時候，手完全打开，作品就放在掌心裡。吸气四秒，对它说：「你够好了。」吐气六秒。重複三次。最後对自己说同一句话：「我够好了。」张开眼睛。',
    quote:'80分就交卷。你以为的不完美，在別人眼裡已经很好了。'},
  value:{name:'价值导向型',icon:'🌟',sub:'你选的不一定最好，但一定最像你',
    keys:['內在指南針','原則清楚','長期思維'],
    desc:'你做决定的時候有一把內建的尺，那把尺不是效率、不是安全、不是別人的期待，是「這件事符不符合我的价值观」。你宁可选一条难走但正确的路，也不愿意走一条轻松但違背自己的路。你可能曾经为了一个原則放棄一个好机会，別人觉得你傻，你心裡卻很踏實。',
    detail:'价值导向型在心理学裡对应的是「自主型动机」，也就是你做事的驅力來自內在信念而不是外在奖懲。研究显示，自主型动机的人長期满意度和抗压力都比較高，因为你的选擇是你自己的。\n\n价值导向型的风险是：你可能太執著於「正确」。世界不是非黑即白的，有些時候妥協不是背叛自己，是让自己在現實裡找到可行的位置。如果你的价值观让你变得僵硬、批判、没办法接受灰色地带，那值得回來看一眼：你的价值观是在保护你，还是在限制你？\n\n觉察练習：找一个你最近很坚持的立场，然後试著从对面的角度想三十秒。不是要你改变立场，是练習「理解不等於认同」。你的价值观够強壯的话，不会因为理解对方就倒塌。',
    oil:'乳香 2 滴＋雪松 2 滴＋玫瑰草 1 滴，在需要做出重大选擇的時候扩香。乳香连結你最深层的信念，雪松让你的內在指南針不被外界的杂讯干擾，玫瑰草在坚定和柔软之间找到那个点。让你的原則不变成牢籠。',
    med:'閉上眼睛。想像你的心裡有一个指南針，指針稳稳地指著一个方向。吸气四秒，看著那个方向。吐气六秒。重複三次。第四次的時候，想像有人走过來说：「那边不对，你该往這边走。」吸气四秒，感觉指南針的指針动了嗎？吐气六秒。如果没动，很好，你的方向很稳。如果动了，问自己：「是因为对方说得有道理，还是因为我害怕不被认同？」吸气四秒，吐气六秒。对自己说：「我的路我負責。」张开眼睛。',
    quote:'你选的路不一定最轻松，但你走在上面的時候，脚步是踏實的。'},
  flow:{name:'随遇而安型',icon:'🍃',sub:'你不挑路，路自己会带你去该去的地方',
    keys:['順其自然','低控制欲','活在当下'],
    desc:'你做决定的方式就是不太刻意做决定。不是逃避，是你真的觉得很多事情不需要那麼认真选。你的人生哲学接近「船到橋头自然直」，你相信事情会自己走到它该去的地方。你不太焦慮、不太糾結、不太把「选擇」当成很大的事。你身边的人可能觉得你很佛系，也可能觉得你不太上进。',
    detail:'随遇而安型在正向心理学裡其實有一个很高級的对应：接納与承諾。你能接受不确定性，不跟現實硬幹，在变动中保持平稳。這是很多人修练一輩子都学不会的東西。\n\n但随遇而安的风险是：你可能把「不在乎」当成「想通了」。真正的随遇而安是你知道自己要什麼但不執著於結果。假的随遇而安是你不知道自己要什麼所以假装什麼都好。如果你的「随便」底下有一层空虛，那就不是佛系，是失联。\n\n觉察练習：今天找一件事情「认真选」。不是因为重要，是练習「我在乎」的肌肉。选一杯你真正想喝的咖啡，不是最方便的那杯。走一条你真正想走的路，不是最短的那条。让「我选的」這三个字回到你的生活裡。',
    oil:'葡萄柚 2 滴＋薄荷 1 滴＋迷迭香 2 滴，在早上剛起來的時候扩香。葡萄柚叫醒你的多巴胺系统（让你对「想要」這件事多一点感觉），薄荷让佛系的你清醒一点点，迷迭香帮你的前額葉重新接上「主动选擇」的线路。',
    med:'閉上眼睛。想像你坐在一条河边，河水緩緩流过。吸气四秒，看著水流。吐气六秒。很舒服。重複三次。第四次的時候，看到河裡漂过一样東西。不是垃圾，是一样你想要的東西。吸气四秒，你要伸手去撈嗎？吐气六秒。试试看。伸出手，把它撈起來。吸气四秒，感觉它在你手裡的重量。吐气六秒。对自己说：「我可以随缘，但偶爾也可以伸手。」张开眼睛。',
    quote:'随遇而安是天賦，但偶爾伸手去拿你想要的東西，也是一種安。'}
};
let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';
    const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 题 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一题</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一题 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看看我的决策风格 🧭</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 题，共 '+questions.length+' 题';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const dimScores={};Object.keys(DIMS).forEach(k=>{dimScores[k]=0;});
  Object.keys(answers).forEach(qi=>{const oi=answers[qi];const s=questions[qi].opts[oi].s;Object.keys(s).forEach(d=>{dimScores[d]+=s[d];});});
  const maxPossible=Object.keys(answers).length*3;
  const sorted=Object.keys(DIMS).sort((a,b)=>dimScores[b]-dimScores[a]);
  const topType=sorted[0],f=TYPES[topType],f2=TYPES[sorted[1]];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('hlTitleReveal').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥灵之钥</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-quote">「'+f.quote+'」</div><div class="ss-footer">hourlightkey.com ✦ </div></div><div class="hl-title-card"><div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div><div class="hl-title-eyebrow">Hour Light ✦ 决策风格觉察</div><span class="hl-title-icon">'+f.icon+'</span><div class="hl-title-main">'+f.name+'</div><div class="hl-title-sub">'+f.sub+'</div><div class="hl-title-divider"></div><div class="hl-title-grid"><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 决策风格</div><div class="hl-title-tag-value">'+f.name+'</div></div><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 副风格</div><div class="hl-title-tag-value">'+f2.icon+' '+f2.name+'</div></div><div class="hl-title-tag" style="grid-column:1/-1"><div class="hl-title-tag-label">✦ 觉察关键字</div><div class="hl-title-tag-value">'+f.keys.join(' · ')+'</div></div></div><div class="hl-title-quote">「'+f.quote+'」</div><div class="hl-title-combo-hint">'+f.name+'｜'+f.sub+'</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">决策风格觉察 Decision Style</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var pct=Math.round(dimScores[k]/maxPossible*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+DIMS[k]+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">'+f.icon+' 你的决策风格</div><div class="result-section-content">'+f.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度觉察</div><div class="result-section-content">'+f.detail.replace(/\n/g,'<br>')+'</div></div>'+(f2?'<div class="result-section"><div class="result-section-title">'+f2.icon+' 副风格：'+f2.name+'</div><div class="result-section-content">'+f2.desc+'</div></div>':'')+'<div class="result-section"><div class="result-section-title">🌿 认知芳疗配方</div><div class="result-section-content">'+f.oil+'</div></div><div class="result-section"><div class="result-section-title">🧘 60秒觉察练習</div><div class="result-section-content">'+f.med+'</div></div><div class="result-section" style="text-align:center;font-family:LXGW WenKai TC,serif;font-size:1.05rem;color:#8b6914"><div class="result-section-content"></div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ H.O.U.R. 觉察橋接</div><div class="hour-bridge-text">决策风格是「表层的你」，馥灵秘码看的是「设定裡的你」。<br>兩个座标交叉比对，才能看见你为什麼总是這样选。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免费解码馥灵秘码 →</a>';
  const shareMap={intuition:'⚡ 我是直觉冲鋒型！身体比脑袋先知道答案。直觉是一把好刀，偶爾停下來磨一磨，切得更准。',analysis:'📊 我是分析建模型！我的脑袋是一台高效能运算机。但有時候，最好的數据就是心跳。',emotion:'💗 我是情感导航型！做决定的羅盘是別人的感受。把全世界放在心上了，現在把自己也放上去。',crowd:'🛡️ 我是从眾安全型！大家的路是參考，自己的路要自己走。',avoid:'🐢 我是逃避拖延型！不是不会选，是选了就要負責让我害怕。踏出去，比想像中更能承担。',perfect:'🎯 我是完美主义型！标准很高，高到连自己都过不了。80分就交卷，其實已经很好了。',value:'🌟 我是价值导向型！选的不一定最好，但一定最像我。脚步踏實就对了。',flow:'🍃 我是随遇而安型！不挑路，路自己会带我去该去的地方。'};
  window._resultText=(shareMap[topType]||'')+'\n\n你的决策风格呢？👉 hourlightkey.com/sc/quiz-decision-style.html';
  try{localStorage.setItem('hl_quiz_decision_style',JSON.stringify({type:topType,dimScores,ts:Date.now()}));}catch(e){}
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_dropMaterial) HL_dropMaterial('quiz');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz',toolName:'决策风格测验'});window.scrollTo({top:0,behavior:'smooth'});
}
