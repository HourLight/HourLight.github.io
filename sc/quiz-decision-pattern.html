const TYPES={
  gut:{name:'直觉秒决型',icon:'⚡',sub:'你的身体比脑子先知道答案',
    desc:'你做选擇的速度让身边的人佩服又害怕。「直觉」是你的导航系统，你相信身体给你的讯号。问题是，你有時候分不清楚「直觉」和「冲动」的差別。',
    detail:'直觉秒决型的人通常是经验丰富的「快速判断者」。你的大脑在意识层之下已经做完了运算，然後把結果用「感觉」的方式送到你面前。\n\n你的直觉大部分時候是准的，因为它不是亂猜，是你过去所有经验的濃缩。\n\n但要注意一件事：当你面对的是一个全新的、你没有经验值的領域時，你的「直觉」可能只是焦慮或偏见的化名。比如你第一次投资就「感觉」某支股票会漲，那不是直觉，那是幻觉。\n\n你最大的风险是：太快做决定，快到忘了问自己「我是真的有感觉，还是只是不想再想了？」\n\n试一次：下次直觉告诉你答案的時候，给自己 24 小時。如果隔天那个感觉还在，那就是真的直觉。',
    oil:'迷迭香 × 檸檬 × 岩兰草',
    oilDetail:'迷迭香的桉油醇和樟脑活化前額葉的判断功能，让你的直觉不只是快，还准。檸檬的檸檬烯带來清晰的觉察力，帮你分辨「直觉」和「急躁」。岩兰草的岩兰草醇把你的根往下扎，让你在快速决策之前多接一秒地气。\n\n调配建议：基底油 10ml＋迷迭香 2 滴＋檸檬 2 滴＋岩兰草 1 滴。檸檬有光敏性。孕婦避免使用迷迭香。',
    med:'「直觉校准呼吸」\n\n下次你要做一个决定的時候：\n\n1. 把兩个选項分別放在左手和右手（想像的就好）\n2. 吸气 4 秒：感觉哪一隻手比較重\n3. 吐气 6 秒：问自己「這个重量是直觉还是習慣？」\n4. 吸气 4 秒：如果是直觉，它会稳稳的。如果是習慣或冲动，它会有点慌\n5. 吐气 6 秒：做你的决定\n\n做 3 轮。\n\n這个练習不是让你变慢，是让你的快更精准。',
    closing:'你的直觉是一把好刀。但好刀也需要偶爾磨一下。不是每个快速的决定都是好决定，但你分得出來的。你只需要多给自己一秒的安静。'},
  data:{name:'资料控分析型',icon:'📊',sub:'你的Excel比你的心先做好决定',
    desc:'你做选擇之前一定要蒐集够多的资讯。Google、PTT、Dcard、YouTube评测，全部看过一轮才敢动。你只是觉得「资讯不足的决定不算决定」。',
    detail:'资料控型的人做出來的决定通常品质很高。你的分析能力強，风险评估到位，很少因为冲动踩雷。\n\n但你的问题是：你可能永远觉得资料不够。\n\n多看一篇评测、多比較一个选項、多问一个人的意见⋯你以为自己在「謹慎」，但也许你只是在「拖延做决定」。因为做决定意味著承担後果，而你害怕的不是选错，是「明明可以做更多研究卻没有做，然後选错」的那種自責感。\n\n另一个你可能不想承认的事：有些决定，资料是帮不了你的。选什麼工作可以分析，但要不要跟一个人在一起？那是心的事，不是Excel的事。\n\n试一次：下一次做决定的時候，设定一个截止時间。到了就选。不管资料蒐集到幾成。80%的资讯就够了，剩下20%用经验和勇气补。',
    oil:'佛手柑 × 甜橙 × 檀香',
    oilDetail:'佛手柑的乙酸沉香酯放松前額葉的「必须完美」執念，让你的大脑接受「够好」就是好。甜橙的檸檬烯打开边缘系统裡被压抑的直觉通道，让你的分析多一个維度：感觉。檀香的 α-檀香醇稳定你在「资料不足」時的焦慮感。\n\n调配建议：基底油 10ml＋佛手柑 2 滴＋甜橙 2 滴＋檀香 1 滴。佛手柑有光敏性。',
    med:'「关掉搜尋引擎」冥想\n\n找一个安静的地方。关掉手机。\n\n1. 吸气 4 秒：想像你面前有一个决定要做，但Google坏了、PTT关站了、没有任何人可以问\n2. 吐气 6 秒：只剩你自己。你身体裡的哪个地方有感觉？胸口？肚子？手心？\n3. 吸气 4 秒：那个感觉在说什麼？不用翻译成邏輯，让它用它自己的语言说\n4. 吐气 6 秒：对自己说「我已经知道答案了，我只是不敢相信自己」\n\n做 4 轮。\n\n數据是地图，但地图不会替你走路。',
    closing:'你的謹慎是一種珍貴的能力。但別让蒐集资料变成不敢做决定的藉口。有時候最重要的资料，是你心裡那个你一直忽略的声音。'},
  stuck:{name:'选擇困难症型',icon:'😵‍💫',sub:'困住你的是选错的恐懼，不是选擇的能力',
    desc:'你在火鍋店选鍋底可以选十分鐘。不是因为你没有偏好，是因为你太害怕做了一个「不是最好」的选擇。每一个选項在你眼裡都有利有弊，而你想要一个百分之百不会後悔的答案。但那个答案不存在。',
    detail:'选擇困难症型的人通常很聪明，你能看到每一个选項的好与坏。這是你的天賦，也是你的詛咒。\n\n因为你看得太清楚了，所以每个选擇都有缺陷。而你受不了缺陷。你想要完美的决定，但完美的决定根本不存在。\n\n更深的问题是：你把「选错」等於「我這个人很糟」。別人选错了可以笑著说「踩雷了」，你选错了会反覆自責三个月。所以你宁可不选，也不要面对选错之後的自己。\n\n但你知道嗎？不选也是一種选擇。而且通常是最差的那種。因为「不选」意味著你把决定权交给了時间、运气、或別人。你以为你在避免风险，但你放棄了掌控。\n\n试一次：今天午餐，5秒內决定。不管选了什麼，告诉自己「這就是最好的选擇，因为是我选的」。',
    oil:'薄荷 × 迷迭香 × 甜橙',
    oilDetail:'薄荷的薄荷醇像一记清脆的弹指，把你从「再想一下、再想一下」的迴圈裡弹出來。迷迭香的桉油醇活化前額葉的執行功能，让你从「分析」模式切換到「行动」模式。甜橙的檸檬烯降低「选错了怎麼办」的焦慮，让你的边缘系统放松一点。\n\n调配建议：基底油 10ml＋薄荷 1 滴＋迷迭香 2 滴＋甜橙 2 滴。',
    med:'「丟硬幣觉察法」\n\n不是要你用硬幣做决定。是要你用硬幣看见你的答案。\n\n1. 在心裡设定：正面是A，反面是B\n2. 吸气 4 秒：把硬幣（想像的）往上拋\n3. 在硬幣还在空中的那一秒，注意你心裡在祈禱哪一面朝上\n4. 吐气 6 秒：那个你祈禱的方向，就是你真正的答案\n\n你从來就不是不知道答案。你只是不相信自己知道。\n\n做 1 轮就够了。答案在硬幣离开你手的那一秒就出現了。',
    closing:'你不需要完美的选擇。你需要的是：选了之後把它变完美的能力。而那个能力，你早就有了。你只是被恐懼遮住了眼睛。'},
  flow:{name:'随缘佛系型',icon:'🌊',sub:'你不选，你等',
    desc:'你的人生哲学是「该來的会來」。你不太主动做选擇，你等选擇來找你。有時候這是智慧，有時候這是你把方向盘交给了全世界，除了你自己。',
    detail:'佛系型的人压力很小，因为你不把「选擇」当成一件很重要的事。你觉得大部分的事情都差不多，没什麼好糾結的。\n\n這種态度在小事上很管用。午餐吃什麼、衣服穿哪件、週末去哪玩，随缘就好。但在大事上呢？\n\n你的「随缘」有没有让你错过一些你其實很想要的東西？一个你很想但没有主动爭取的机会，一段你很喜欢但没有主动靠近的关係，一个你很嚮往但觉得「算了太麻烦」的夢想？\n\n佛系和消极只差一个念头：佛系是「我接受結果」，消极是「我放棄选擇」。你是前者还是後者，只有你自己知道。\n\n试一次：今天找一件小事，主动做选擇。不问別人、不等別人安排。你來决定。看看那種「掌控感」是什麼滋味。',
    oil:'薑 × 黑胡椒 × 葡萄柚',
    oilDetail:'薑的薑烯和薑酮是天然的「行动啟动劑」，在你的边缘系统裡点一把小火，让你的身体想动。黑胡椒的胡椒鹼活化交感神经，给你一点「我想做点什麼」的冲勁。葡萄柚的諾卡酮让你的大脑从「都可以」切換到「我要這个」。\n\n调配建议：基底油 10ml＋薑 2 滴＋黑胡椒 1 滴＋葡萄柚 2 滴。黑胡椒和薑对皮膚有温熱感，敏感肌减量。',
    med:'「我要」呼吸法\n\n坐直。眼睛张开。\n\n1. 吸气 4 秒：想一件你想要但从來没有主动爭取的事\n2. 憋气 3 秒：在心裡说「我要」。不是「也许」、不是「看看」，是「我要」\n3. 吐气 6 秒：想像你站起來，走向那个東西。你的脚踏在地上，每一步都是你自己选的\n\n做 5 轮。\n\n最後一轮的「我要」说出声來。让你的耳朵也聽到。\n\n「随缘」是一種选擇。但「随缘」本身也是你选的。既然你有选的能力，就用一次。',
    closing:'真正的自在不是不做选擇，是做了选擇之後不執著結果。你的「随缘」如果是放下，那是智慧。如果是放棄，那就值得再想想。'},
  perfect:{name:'完美主义型',icon:'🔍',sub:'你一直在等一个不存在的最佳解',
    desc:'你的标准本來就高。你的每一个决定都要经过嚴格的品质管控，任何瑕疵都是不及格。问题是，在你追求完美的路上，很多「够好」的机会已经走掉了。',
    detail:'完美主义型的人做出來的决定品质极高。但你做出决定的速度极慢。\n\n因为你心裡有一个标准是：如果不是最好的，那就不值得选。所以你一直在比較、一直在等待、一直在尋找那个100分的选項。但100分不存在。\n\n你的完美主义可能來自一个很深的信念：「如果我选了一个不完美的東西，就代表我這个人不够好。」所以每一次选擇都像一场考试，而你不允许自己考不到满分。\n\n但人生不是考试。有些最好的東西，是在你接受「不完美」的那一刻出現的。那间不完美但温暖的房子、那个不完美但真心的伴侶、那份不完美但让你有成就感的工作。\n\n试一次：下次做决定的時候，把标准从100分降到80分。然後看看80分的人生，是不是比等待100分的焦慮好活多了。',
    oil:'乳香 × 佛手柑 × 天竺葵',
    oilDetail:'乳香的乳香酸降低前額葉的「不够不够」警报，让你的大脑接受「够好就是好」。佛手柑的乙酸沉香酯放松边缘系统的焦慮感，让「不完美」這件事不再那麼让人恐懼。天竺葵的香茅醇平衡自律神经，让你从「追求完美」的紧繃裡松开。\n\n调配建议：基底油 10ml＋乳香 2 滴＋佛手柑 2 滴＋天竺葵 1 滴。',
    med:'「80分就走」冥想\n\n閉上眼睛。\n\n1. 吸气 4 秒：想像你面前有一条路，路的尽头写著「100分」\n2. 吐气 6 秒：注意看，那条路没有终点。100分永远在更远的地方\n3. 吸气 4 秒：現在看看路边，在你身旁，有一个写著「80分」的门\n4. 吐气 6 秒：打开那扇门。裡面有阳光、有笑声、有一杯温熱的咖啡。不完美，但足够好\n5. 自然呼吸 10 秒：对自己说「80分的人生比100分的等待更值得活」\n\n做 4 轮。',
    closing:'你对品质的坚持是了不起的。但不完美不是失败，是留白。最好的画作都有留白。最好的人生也是。'},
  impulse:{name:'冲动後悔型',icon:'🎢',sub:'你做选擇用感觉，後悔用理智',
    desc:'你是那个秒下单、秒报名、秒辭职的人。做的時候熱血沸騰，过了三天冷静下來开始懊悔。你的人生軌迹像云霄飞車：刺激，但也暈。',
    detail:'冲动後悔型的人活得很精彩，但也很累。因为你不只要承受选擇的後果，还要承受後悔的重量。\n\n你的决策模式是：情緒先行，理智善後。高興的時候什麼都敢说yes，冷静下來才发現自己答应了一堆做不到的事。\n\n更深一层看：你的冲动可能是一種「不想面对不确定性」的策略。与其在猶豫中煎熬，不如直接跳下去。至少跳下去之後就不用再想了。但你跳下去之後开始後悔，後悔比猶豫更痛。\n\n你最需要的不是「想清楚再做」（你做不到），而是一个简单的緩冲机制。不用很長，24小時就好。冲动來的時候先放著，明天还想做的才是真的想做。\n\n试一次：手机设一个鬧鐘，名字叫「你确定？」。每次做重大决定之前先等這个鬧鐘响。',
    oil:'薰衣草 × 雪松 × 檀香',
    oilDetail:'薰衣草的沉香醇和乙酸沉香酯是天然的「冷静键」，降低杏仁核的冲动反应，在你按下「确认购买」之前多给你三秒。雪松的倍半萜烯稳定边缘系统的情緒波动，让你的「想要」不会每次都贏过你的「需要」。檀香的 α-檀香醇活化前額葉的判断功能，让理智不只在後悔的時候才上班。\n\n调配建议：基底油 10ml＋薰衣草 2 滴＋雪松 2 滴＋檀香 1 滴。',
    med:'「明天再说」呼吸法\n\n当你突然很想做一个决定的時候（冲动來了）：\n\n1. 把手从手机/键盘/钱包上拿开\n2. 吸气 4 秒：问自己「這个感觉是持續的，还是三分鐘前才开始的？」\n3. 吐气 6 秒：如果是三分鐘前开始的，它可能只是情緒，不是决定\n4. 吸气 4 秒：对自己说「如果明天我还想做，我就做。但今天，放著」\n5. 吐气 6 秒：走开。去喝一杯水。等到明天\n\n做 3 轮。\n\n如果明天醒來还想做，那就去做。不用後悔。因为那是「你」的决定，不是「你的情緒」的决定。',
    closing:'你的行动力是很多人羨慕的。大部分人想太多做太少，你是做太多想太少。兩个都不完美，但你的版本至少比較精彩。'}
};

let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const optsHTML='<div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]===o.a?' selected':'')+'" onclick="selectOpt('+i+',\''+o.a+'\',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 题 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一题</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一题 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看我的决策风格 🎲</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,a,btn){answers[qi]=a;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 题，共 '+questions.length+' 题';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const scores={};Object.keys(TYPES).forEach(k=>{scores[k]=0;});
  Object.values(answers).forEach(a=>{scores[a]=(scores[a]||0)+1;});
  const sorted=Object.keys(TYPES).sort((a,b)=>scores[b]-scores[a]);
  const topType=sorted[0],f=TYPES[topType],f2=TYPES[sorted[1]];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('screenshotCard').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥灵之钥</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-tags"><span class="ss-tag">决策模式觉察</span><span class="ss-tag">'+f.name+'</span></div><div class="ss-quote">「'+f.closing+'」</div><div class="ss-footer">hourlightkey.com ✦ 读懂自己，活对人生</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">决策模式觉察 Decision Pattern</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var tp=TYPES[k],pct=Math.round(scores[k]/questions.length*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+tp.icon+' '+tp.name+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">🎲 你的决策模式</div><div class="result-section-content">'+f.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度解析</div><div class="result-section-content">'+f.detail.replace(/\n/g,'<br>')+'</div></div>'+(f2?'<div class="result-section"><div class="result-section-title">'+f2.icon+' 副型：'+f2.name+'（'+f2.sub+'）</div><div class="result-section-content">'+f2.desc+'</div></div>':'')+'<div class="result-section"><div class="result-section-title">🌿 认知芳疗建议：'+f.oil+'</div><div class="result-section-content">'+f.oilDetail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🧘 冥想练習（60-90秒）</div><div class="result-section-content">'+f.med.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">✦ 馥灵收束语</div><div class="result-section-content" style="font-family:LXGW WenKai TC,serif;font-size:1rem;line-height:1.9">'+f.closing+'</div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ 馥灵之钥 × 你的觉察密码</div><div class="hour-bridge-text" style="margin-bottom:8px">你做选擇的方式，是你跟自己的关係的缩影。看见你的模式，下次你才能真正「选」，而不只是「重複」。</div><div style="font-size:.85rem;color:#9e8a70;line-height:1.8;margin-bottom:16px">馥灵秘码可以揭示你天生的决策天賦设定，跟今天的結果交叉比对更有趣。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免费解码馥灵秘码 →</a>';
  try{localStorage.setItem('hl_quiz_decision',JSON.stringify({type:topType,scores,ts:Date.now()}));}catch(e){}
  window._resultText=f.icon+' 我的决策模式是「'+f.name+'」：'+f.sub+'。'+f.desc.substring(0,60)+'⋯ 你怎麼做选擇的？ 👉 hourlightkey.com/sc/quiz-decision-pattern.html #馥灵之钥 #决策模式';
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz-decision-pattern',toolName:'决策模式觉察'});window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
