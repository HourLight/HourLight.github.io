const DIMS={anxiety:'焦慮程度',action:'行动力',efficacy:'效能感'};
const TYPES={
  eco_warrior:{name:'生态行动家型',icon:'🌱',sub:'你的焦慮变成了行动的燃料',
    keys:['积极行动','系统思考','影响力'],
    desc:'你不只是担心地球，你在做事。你知道个人行动的极限，但你不会因为极限就什麼都不做。你带环保杯、减少食物浪费、支持永續品牌，不是为了炫耀，是因为你相信每一个小动作都算數。你可能也在推动更大的改变，跟身边的人聊气候议题、关注政策、參与连署。你的焦慮有一个出口，那个出口就是行动。',
    detail:'研究显示，把气候焦慮转化为行动的人，心理健康狀态通常比单纯焦慮或麻木的人好。你做的事情不只是在「拯救地球」，更是在拯救自己的心理平衡。行动给你掌控感，掌控感降低无力感。\n\n但生态行动家的风险是「行动倦怠」。你可能会把所有的力气都放在行动上，忘了休息、忘了自己也需要被照顾。你不需要一个人扛起整个地球。做你能做的，然後允许自己放松。地球的问题需要幾十亿人一起解决，不是你一个人。\n\n觉察练習：今天做一件「不是为了地球，是为了自己」的事。一杯好茶、一段音樂、一段在自然裡的散步。照顾地球的人，也需要被照顾。',
    oil:'尤加利 2 滴＋迷迭香 2 滴＋甜橙 1 滴，在行动疲倦的時候扩香。尤加利带來清新和淨化的感觉，迷迭香維持你的清醒和方向感，甜橙提醒你在拯救世界的路上不要忘记笑一下。',
    med:'閉上眼睛。想像你的脚踩在泥土上。吸气四秒，感觉泥土的濕潤和稳固。吐气六秒。你一直在做很多事。吸气四秒，对自己说：「我做的够了。」吐气六秒。不是放棄，是允许自己休息。重複四次。最後，感觉泥土的温度传上來。它在支撐你。对自己说：「我照顾地球，地球也在照顾我。」张开眼睛。',
    quote:'你的行动不会白费。但记得也照顾行动家自己。'},
  paralyzed_empath:{name:'生态共感癱瘓型',icon:'🥀',sub:'你感受到了一切，然後动不了了',
    keys:['高度共感','气候哀傷','过度負荷'],
    desc:'你对地球的痛苦有非常強的感受力。冰层融化你心裡也跟著融化，珊瑚白化你的心也跟著白化。這不是「想太多」，你是真的感觉到了。问题不是你的感受不合理，问题是這个感受太大了，大到让你癱瘓了。你想做点什麼，但每次一想到问题有多大，就觉得自己有多小。那个落差，让你什麼都做不了。',
    detail:'气候共感是一種真實的情緒反应，不是矯情。研究显示，对生态议题有高度共感的人，通常也对其他事物有高度的感受力。你的神经系统比較敏感，它在接收整个地球的讯号。问题是，你的身体不是设计來承受整个地球的痛苦的。\n\n你需要学会「有边界的共感」。你可以感受，但你不需要把整个地球的重量都扛在身上。你可以关心，但你不需要因为你「只是一个人」就觉得自己没有用。在台湾，你面对的颱风、空污、都市熱島效应，這些都是真實的。但你能做的，也是真實的。\n\n觉察练習：今天做一件「你能做完的」环保小事。不是簽一个改变世界的连署，是收好今天的垃圾分类。做完之後，对自己说：「這样就够了。」让你的大脑记住「完成」的感觉。',
    oil:'薰衣草 2 滴＋天竺葵 2 滴＋佛手柑 1 滴，在你被环境新聞淹没的時候扩香。薰衣草安撫你过度敏感的神经系统，天竺葵在你的感受和外在刺激之间建立一道温柔的边界，佛手柑让你知道悲傷是可以的但不需要住在裡面。',
    med:'閉上眼睛。想像你站在一片很大的森林裡。森林有些地方在枯萎，有些地方还綠著。吸气四秒，看看枯萎的部分。心裡会痛。吐气六秒。吸气四秒，转头看看还綠著的部分。它还在。吐气六秒。你不需要修复整片森林。你只需要澆你面前的那棵樹。吸气四秒，想像你在澆水。吐气六秒。看那棵樹的葉子亮了一点。对自己说：「一棵樹也算。」张开眼睛。',
    quote:'你感受到了整个地球的痛。但你面前那棵樹，只需要你澆一杯水。'},
  numb_protector:{name:'麻木保护型',icon:'🧊',sub:'在乎的开关暫時被关掉了，不代表你不在乎',
    keys:['情感隔离','自我保护','迴避'],
    desc:'你聽到气候相关的消息，没什麼反应。不是你冷血，是你的心理防禦系统很早就把這个频道关掉了。可能是因为资讯轟炸太多了，可能是因为你觉得自己什麼也改变不了，也可能是因为认真感受的话会太痛苦。麻木是一種自我保护。你的大脑判断這个威脅太大了，与其焦慮，不如假装它不存在。',
    detail:'环境议题的麻木是一種「慢性迴避」。资讯太多、问题太大、个人太小。你的大脑选擇了最省力的策略：不看、不聽、不想。但麻木的问题是，它不只会关掉对环境的感觉，它会慢慢关掉你对所有事情的感觉。你可能发現自己对很多事都「无感」，不只是气候。\n\n重新啟动不需要从大事开始。去一次海边、在公园裡坐十分鐘、看一棵樹从发芽到开花。让你的身体重新跟自然建立连結。连結回來了，感觉才会回來。感觉回來了，行动才可能发生。\n\n觉察练習：今天找五分鐘待在自然裡。不用很远，社区公园就好。不看手机，只是看、聽、聞。让你的感官重新开机。',
    oil:'薄荷 2 滴＋迷迭香 2 滴＋甜橙 1 滴，在你觉得「什麼都无所謂」的時候扩香。薄荷是一个温柔的巴掌，叫醒你的感觉系统。迷迭香让你重新连上「在乎」的频道。甜橙让重新感觉這件事不那麼可怕。',
    med:'走到窗边或戶外。閉上眼睛。吸气四秒，聞空气的味道。有什麼味道？不判断，只是聞。吐气六秒。吸气四秒，聽聽声音。鸟叫？車声？风？吐气六秒。张开眼睛，找一样綠色的東西看。看十秒鐘。那是活的。吸气四秒，对那个綠色的東西说：「我看到你了。」吐气六秒。你开始有感觉了嗎？一点点就好。那是你的感觉回來了。',
    quote:'麻木是保护你的方式，但你值得重新感觉到這个世界。'},
  guilty_consumer:{name:'罪惡消费型',icon:'💸',sub:'你每买一样東西都在想碳足迹',
    keys:['消费罪惡感','过度自責','完美主义环保'],
    desc:'你很在意自己的碳足迹，在意到已经变成一種压力了。买杯饮料会想塑膠杯的问题，开冷气会想电费和碳排，搭飞机会有罪惡感。你的环保意识不是行动的动力，而是一種持續的自我审判。你觉得自己做得不够好、不够环保、不够負責任。但问题是：气候变遷的責任不在你一个人身上。你把系统性的问题变成了个人的罪惡感。',
    detail:'研究显示，「碳足迹」這个概念最早是石油公司推广的，目的就是把气候責任从企业转嫁到个人身上。你的罪惡感，有一部分是被「设计」出來的。个人可以做有意义的事，但你不需要为整个系统的问题感到个人的罪惡。\n\n你的环保意识是好的。但当它变成一種持續的自我攻击，它就不再是健康的了。你需要学会分辨：什麼是我能做的，什麼是系统的问题。然後把你的力气放在前者，把後者交给政策和倡议。\n\n觉察练習：今天做一件「不环保但让你开心」的小事。一杯外带咖啡、一頓你想吃的東西、一次计程車。做完之後，对自己说：「我不需要完美。我是地球上的人，不是地球的贖罪者。」',
    oil:'佛手柑 2 滴＋甜橙 2 滴＋薰衣草 1 滴，在你又开始自責的時候扩香。佛手柑降低你的罪惡感閾值，甜橙提醒你活著本身就值得快樂，薰衣草安撫你的內在审判官。',
    med:'閉上眼睛。想像你的肩膀上扛著一个很大的袋子，裡面装著所有你觉得「做不好」的环保事項。吸气四秒，感觉那个重量。吐气六秒。把袋子放到地上。不是扔掉，是放下。吸气四秒，站直。吐气六秒。你的肩膀松了。对自己说：「我尽力了。尽力就够了。」重複三次。张开眼睛。',
    quote:'你不需要为整个地球贖罪。你是人，不是犧牲品。'},
  hopeful_pragmatist:{name:'務實樂观型',icon:'🌿',sub:'你知道问题很大，但你选擇相信',
    keys:['理性樂观','長期視角','平衡'],
    desc:'你不否认气候问题的嚴重性，但你也不会因此绝望。你有一種務實的樂观：承认问题、做能做的事、相信人类的适应力。你的心态不是「一切都会好的」那種天真，而是「问题很大，但我可以做的事情也很具体」。你环保但不偏執，关心但不崩潰，行动但不犧牲。你在环境和生活品质之间找到了一个平衡点。',
    detail:'務實的樂观是心理韌性最強的一種态度。你既不逃避現實，也不被現實压垮。你的效能感很高，代表你相信自己的行动有意义。這種信念本身就是一種资源，因为它让你能持續做事，而不是三天打鱼兩天曬网。\n\n你的功课不是修复什麼，而是扩大影响力。你的态度是最健康的那種，如果你能把這種态度传递给身边的人，那比你自己减少多少碳排放都有价值。因为气候问题的解决，需要的不是少數人做到极致，而是多數人做到基本。\n\n觉察练習：這週跟一个人聊气候议题。不是说教，是分享你的感受和行动。让对方看到「关心环境」也可以是不焦慮、不沉重的。你的存在本身就是一種示范。',
    oil:'迷迭香 2 滴＋尤加利 1 滴＋甜橙 2 滴，在你想分享和行动的時候扩香。迷迭香让你的務實保持清晰，尤加利带來清新和希望的感觉，甜橙让你的行动带著温暖而不是压力。',
    med:'閉上眼睛。想像你在一片草地上，天空很蓝。吸气四秒，感觉阳光曬在皮膚上。吐气六秒。很舒服。吸气四秒，想像你手裡有一顆種子。吐气六秒，把它種在地上。吸气四秒，想像它开始发芽。一棵小芽。不大。但它是活的。吐气六秒。对自己说：「一顆種子。一步行动。够了。」张开眼睛。',
    quote:'问题很大。但你能做的事也很真實。一顆種子，就够了。'},
  doom_scroller:{name:'末日滑手型',icon:'📱',sub:'你一直看坏消息，然後更绝望',
    keys:['资讯过载','末日感','滑手机焦慮'],
    desc:'你的气候焦慮有一个很具体的來源：螢幕。你会不自觉地滑到气候相关的坏消息，然後一則接一則看下去。每看一則，焦慮就多一层。但你停不下來。因为不看的话你觉得更焦慮，好像你需要「知道」才能掌控，但知道了之後反而更失控。你的焦慮不只來自气候本身，更來自资讯过载。你的大脑被淹没了。',
    detail:'「末日滑手」是气候焦慮裡一个很常见的模式。社群演算法知道你关注什麼，就餵你更多同类的內容。你以为你在「了解世界」，其實你在被餵养一个越來越大的焦慮迴圈。而且坏消息的呈現方式通常是为了吸引注意力，不是为了给你行动方案。你接收了最大的恐懼，卻没有接收到任何出路。\n\n你需要做的第一件事不是「做环保」，是管理你的资讯攝取。限制每天看气候新聞的時间、取消追蹤只发坏消息的帳号、追蹤一些在做實事的组织。让你的焦慮从「末日」重新对焦到「行动」。\n\n觉察练習：今天设一个鬧鐘。超过十五分鐘的气候新聞就停。然後做一件看得见的小事。你需要的不是更多资讯，是更多行动的回饋。',
    oil:'薰衣草 2 滴＋佛手柑 2 滴＋岩兰草 1 滴，在你又开始无限滑手机的時候扩香。薰衣草让你的神经系统从过度刺激中降下來，佛手柑把螢幕带來的焦慮调低，岩兰草把你的注意力拉回你脚下的現實。',
    med:'把手机螢幕朝下放在桌上。閉上眼睛。吸气四秒，感觉眼睛在休息。没有螢幕的光。吐气六秒。吸气四秒，聽聽真實的声音。不是螢幕裡的声音。吐气六秒。重複四次。张开眼睛之後，不要马上拿手机。先看看窗外。看一棵樹。看天空。吸气四秒，对自己说：「真實的世界，比螢幕裡的好。」',
    quote:'手机裡的世界是被演算法餵养的。放下螢幕，看看真正的天空。'},
  angry_advocate:{name:'憤怒倡议型',icon:'🔥',sub:'你的怒火是真的，但需要一个方向',
    keys:['正义憤怒','系统批判','行动冲勁'],
    desc:'你很生气。对企业的貪婪生气、对政府的怠惰生气、对人类的短視生气。你的憤怒是合理的，因为你看得到问题在哪裡，而问题的根源不在个人，在系统。你可能会在社群上发声、跟朋友爭论、对不环保的行为感到憤怒。你的怒火是真的，你的关心也是真的。但憤怒如果没有出口，最後会燒到你自己。',
    detail:'正义憤怒是一種很有力量的情緒，它可以推动社会改变。但持續的憤怒对身心的消耗非常大。你的压力荷爾蒙長期偏高，免疫力可能下降，人际关係可能因为你的「激进」而产生距离。\n\n你的功课是把憤怒变成策略。怒火是燃料，但你需要一个引擎來使用它。找一个具体的议题、一个具体的组织、一个具体的行动目标。把「对一切生气」聚焦成「对這件事做点什麼」。聚焦之後，你的怒火会变成力量，而不是內耗。\n\n觉察练習：今天找一件让你生气的环境议题，用三十秒写下：1. 我生气的是什麼？2. 我能做的一件事是什麼？把情緒接地。',
    oil:'薄荷 2 滴＋尤加利 2 滴＋薰衣草 1 滴，在你怒火上來的時候扩香。薄荷给你的怒火一个冷静的通道，尤加利清理被憤怒染色的思考，薰衣草在你准備好行动之前先让你稳下來。',
    med:'站起來。双手握拳。閉上眼睛。吸气四秒，握紧。感觉那个憤怒。吐气六秒，打开手掌。让怒火散出去一些。重複四次。不是要你不生气，是让怒火从失控的火变成可以使用的火。最後，张开手掌，想像手裡拿著一顆種子。把怒火的熱度传进去。那顆種子是你的行动。对自己说：「我不需要滅火。我需要用火。」张开眼睛。',
    quote:'你的怒火是真的。現在，给它一个方向。'},
  disengaged:{name:'事不关己型',icon:'😐',sub:'你活在自己的世界裡，地球的事太远了',
    keys:['低关注','日常导向','心理距离'],
    desc:'气候变遷对你來说是一个「很远的议题」。你知道它存在，但它不在你的日常考慮范圍內。关心的能力你有，只是你觉得那跟你的生活没有直接关係。你的注意力在工作、感情、家人、帳单上面，没有多餘的心力分给一个你觉得自己改变不了的事情。這不是自私，這是你的认知资源分配策略。',
    detail:'心理距离是影响环保行为最大的因素之一。如果你觉得气候问题很远（時间上在未來、空间上在北极、跟你个人没有直接关係），你就不太会把它当回事。但在台湾，气候的影响其實很近。越來越熱的夏天、越來越強的颱风、越來越差的空气品质。你已经在经历了，只是你可能没有把它跟「气候变遷」连在一起。\n\n你不需要变成一个环保人士。你只需要把一些远的東西拉近一点看。下次夏天熱到受不了的時候、颱风又破纪录的時候、AQI红色警报的時候，让自己多想十秒鐘：「這跟什麼有关？」觉察是第一步。\n\n觉察练習：今天注意一件「你已经在经历的气候影响」。可以是天气、可以是电费、可以是空气。让它从背景杂讯变成你认出來的讯号。',
    oil:'薄荷 1 滴＋迷迭香 2 滴＋甜橙 2 滴，在你觉得「跟我无关」的時候聞一下。薄荷叫醒你的注意力，迷迭香让你看到日常和环境之间的连結线，甜橙让這个觉察过程是温暖的而不是沉重的。',
    med:'閉上眼睛。想像你在你家客厅。很舒服。吸气四秒，看看窗外。窗外的世界跟你的客厅是同一个星球。吐气六秒。吸气四秒，想像窗外的风、阳光、雨、空气。它們跟你的日常生活是连在一起的。吐气六秒。你不需要改变世界。你只需要注意到它跟你是连在一起的。重複三次。对自己说：「我也是自然的一部分。」张开眼睛。',
    quote:'地球的事不远。你呼吸的空气、喝的水、曬的太阳，都是同一回事。'}
};
let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';
    const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 题 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一题</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一题 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看看我的生态情緒 🌍</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 题，共 '+questions.length+' 题';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const dimScores={};Object.keys(DIMS).forEach(k=>{dimScores[k]=0;});
  Object.keys(answers).forEach(qi=>{const oi=answers[qi];const s=questions[qi].opts[oi].s;Object.keys(s).forEach(d=>{dimScores[d]+=s[d];});});
  const maxPossible=Object.keys(answers).length*3;
  const anxPct=dimScores.anxiety/maxPossible;
  const actPct=dimScores.action/maxPossible;
  const effPct=dimScores.efficacy/maxPossible;
  let topType;
  if(actPct>0.45&&effPct>0.4) topType='eco_warrior';
  else if(anxPct>0.5&&actPct<0.15) topType='paralyzed_empath';
  else if(anxPct<0.15&&actPct<0.15) topType='disengaged';
  else if(anxPct<0.15&&actPct<0.15&&effPct<0.15) topType='numb_protector';
  else if(anxPct>0.35&&actPct>0.2) topType='angry_advocate';
  else if(anxPct>0.4&&effPct<0.15) topType='doom_scroller';
  else if(anxPct>0.3&&actPct>0.15&&effPct<0.2) topType='guilty_consumer';
  else if(effPct>0.35&&anxPct<0.3) topType='hopeful_pragmatist';
  else if(anxPct>0.3) topType='paralyzed_empath';
  else topType='numb_protector';
  const sorted=Object.keys(DIMS).sort((a,b)=>dimScores[b]-dimScores[a]);
  const f=TYPES[topType];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('hlTitleReveal').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥灵之钥</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-quote">「'+f.quote+'」</div><div class="ss-footer">hourlightkey.com ✦ </div></div><div class="hl-title-card"><div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div><div class="hl-title-eyebrow">Hour Light ✦ 气候焦慮与生态关係</div><span class="hl-title-icon">'+f.icon+'</span><div class="hl-title-main">'+f.name+'</div><div class="hl-title-sub">'+f.sub+'</div><div class="hl-title-divider"></div><div class="hl-title-grid"><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 生态情緒</div><div class="hl-title-tag-value">'+f.name+'</div></div><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 觉察关键字</div><div class="hl-title-tag-value">'+f.keys.join(' · ')+'</div></div></div><div class="hl-title-quote">「'+f.quote+'」</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">生态情緒觉察 Climate Emotional Profile</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var pct=Math.round(dimScores[k]/maxPossible*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+DIMS[k]+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">'+f.icon+' 你的生态情緒</div><div class="result-section-content">'+f.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度觉察</div><div class="result-section-content">'+f.detail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🌿 认知芳疗配方</div><div class="result-section-content">'+f.oil+'</div></div><div class="result-section"><div class="result-section-title">🧘 60秒觉察练習</div><div class="result-section-content">'+f.med+'</div></div><div class="result-section" style="text-align:center;font-family:LXGW WenKai TC,serif;font-size:1.05rem;color:#8b6914"><div class="result-section-content"></div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ H.O.U.R. 觉察橋接</div><div class="hour-bridge-text">你跟地球的关係，其實也反映了你跟自己的关係。<br>馥灵秘码看你的內在设定，交叉比对才看得完整。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免费解码馥灵秘码 →</a>';
  window._resultText=f.icon+' 我的生态情緒是「'+f.name+'」：'+f.sub+'\n\n你跟地球的关係是什麼？👉 hourlightkey.com/sc/quiz-climate-anxiety.html';
  try{localStorage.setItem('hl_quiz_climate_anxiety',JSON.stringify({type:topType,dimScores,ts:Date.now()}));}catch(e){}
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_dropMaterial) HL_dropMaterial('quiz');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz',toolName:'气候焦慮与生态关係'});window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
</script>
