  chase:{name:'追逐者',icon:'🏃‍♀️',sub:'你的愛情是一场永远追不到终点的马拉松',
    desc:'你愛上的不是那个人，是「追」的那个感觉。对方若即若离的時候你最清醒，对方稳定下來你反而觉得少了什麼。你把焦慮当成心动，把不确定当成激情。',
    detail:'追逐者的核心恐懼是被拋棄。\n\n你可能小時候的主要照顾者（不一定是父母）不太稳定。有時候很亲密、有時候很疏远、有時候甚至消失。你没有办法预测「愛什麼時候会在」，所以你学会了一件事：一直追。只要我追得够快，愛就不会跑掉。\n\n這个模式让你特別容易被「忽冷忽熱」的人吸引。因为他們的不确定性会啟动你熟悉的那个「追」的反应。稳定的人反而让你觉得无聊。\n\n但你追的不是愛，是「被确认我值得被愛」的感觉。每一次对方回讯息你就安心五分鐘，然後又开始焦慮。你的安全感不在自己手上，在对方的已读時间上。\n\n试一次：下次想传讯息确认的時候，先问自己：「我是真的想跟他聊天，还是在找安全感？」如果是後者，把手机放下，深呼吸三次。安全感要从自己身上長出來。',
    oil:'岩兰草 × 雪松 × 甜橙',
    oilDetail:'岩兰草的岩兰草醇把你从「对方在嗎？」的焦慮迴圈裡拉回自己的身体。雪松的倍半萜烯在你和焦慮之间建一道透明屏障，让你看得到焦慮但不被它带走。甜橙的檸檬烯重新啟动你边缘系统裡「自我安撫」的功能，让你不需要靠別人的回覆來呼吸。\n\n调配建议：基底油 10ml＋岩兰草 1 滴＋雪松 2 滴＋甜橙 2 滴。',
    med:'「回到自己」呼吸法\n\n当你又在焦慮地等对方回讯息的時候：\n\n1. 把手机翻面朝下。双手放在大腿上\n2. 吸气 4 秒：把注意力从「对方」拉回「自己」。感觉你的脚踩在地上\n3. 吐气 6 秒：对自己说「我在這裡。不管对方在不在，我都在」\n4. 吸气 4 秒：问自己「我現在需要什麼？」不是「对方有没有回」，是「我自己需要什麼」\n5. 吐气 6 秒：去做那件你需要的事。喝水、洗脸、走一走\n\n做 4 轮。\n\n你的安全感不应该放在別人的手机裡。它应该在你自己的胸口。',

  avoid:{name:'逃避者',icon:'🦌',sub:'你很想被愛，但更怕被困住',
    desc:'对方越靠近，你越想跑。对方越认真，你越害怕。你把「保持距离」说成「需要空间」，把「不敢投入」说成「随缘」。你心裡那扇门其實一直都开著，但你站在门後面，谁靠近你就退一步。',
    detail:'逃避者不是不想愛，是太怕愛了。\n\n你的恐懼不是被拋棄（那是追逐者的），你的恐懼是被吞噬。你害怕如果你全心投入一段关係，就会失去自己。因为也许你曾经失去过。\n\n也许小時候你的主要照顾者太侵入、太控制、或者太需要你。你学到的教训是：「跟人太靠近很危险。」所以你長大後，亲密关係变成一场拉鋸战。你想被愛的那一面不断把人拉近，怕被困住的那一面不断把人推开。\n\n你最大的盲点是：你以为你在保护自己的自由，但你被「保护自由」這件事给困住了。你无法享受一段关係裡的安定感，因为安定让你焦慮。\n\n试一次：下次对方做了一件亲密的事让你想退的時候，留在那裡多5秒。就5秒。让你的神经系统记住「靠近不一定会受傷」。',
    oil:'茉莉 × 玫瑰 × 檀香',
    oilDetail:'茉莉的吲哚穿透你的防備，让边缘系统嚐一口「被愛也是安全的」。玫瑰的苯乙醇柔化你心门的鐵锁，不是要你大开城门，只是把门稍微推开一条縫。檀香的 α-檀香醇稳定你在「靠近」時的恐慌反应。\n\n调配建议：基底油 10ml＋茉莉 1 滴＋玫瑰 1 滴＋檀香 2 滴。',
    med:'「5秒靠近练習」\n\n不需要大动作。找一个你信任的人（朋友也可以）。\n\n1. 吸气 4 秒：感觉你跟這个人之间的距离\n2. 吐气 6 秒：在心裡把這个距离缩短一点点。不用真的移动，想像就好\n3. 吸气 4 秒：注意你身体的反应。胸口紧嗎？想逃嗎？\n4. 吐气 6 秒：对自己说「靠近不等於被困住。我随時可以退回來。但現在，我选擇待在這裡」\n\n做 4 轮。\n\n你不需要一步到位。5秒就够了。明天再多5秒。',
    closing:'你的独立是真正的力量。但让一个人进來不会让你变弱，会让你完整。你不用敞开所有的门。一扇就好。就一扇。'},
  rescue:{name:'拯救者',icon:'🦸',sub:'你愛的不是人，是一个需要被拯救的故事',
    desc:'你总是被「有故事的人」吸引。他們通常不太好，有点受傷、有点迷失、有点需要你。你在照顾他們的時候觉得自己很有价值。但你有没有想过：如果他好了，你們的关係还剩什麼？',
    detail:'拯救者型的人很慷慨、很温暖、很有同理心。但你的愛裡有一个危险的成分：你把「被需要」当成「被愛」。\n\n你可能很小的時候就在照顾別人了。照顾生病的家人、安撫情緒不稳的父母、当家裡的小大人。你学到的公式是：「我照顾你 → 你离不开我 → 我就不会被拋棄。」\n\n所以你長大後，特別容易被「需要被拯救」的人吸引。不是因为你圣母心发作，是因为那个模式让你觉得安全。一个太健康、太独立的人反而让你不安，因为他不需要你。「不需要我 = 会离开我」這个等式在你脑子裡跑了很多年了。\n\n但拯救不是愛。拯救是一種控制。你用付出換取对方的依賴，但依賴不是愛。\n\n试一次：下次你想帮对方处理他自己的事的時候，问一句：「你需要我帮忙嗎？还是你想自己处理？」然後尊重他的回答。',
    oil:'天竺葵 × 乳香 × 佛手柑',
    oilDetail:'天竺葵的香茅醇和牻牛兒醇平衡你边缘系统裡「照顾別人才安全」的旧迴路。乳香的乳香酸降低杏仁核的「如果我不拯救他就会出事」的警报。佛手柑的乙酸沉香酯帮你的身体记住「不照顾別人的時候，我也是有价值的」。\n\n调配建议：基底油 10ml＋天竺葵 2 滴＋乳香 2 滴＋佛手柑 1 滴。',
    med:'「放手练習」\n\n想一个你正在照顾的人。\n\n1. 吸气 4 秒：想像你双手捧著他的问题。那些问题很重，你的手臂很酸\n2. 吐气 6 秒：慢慢把手打开。让那些问题落回地上。那是他的地，不是你的\n3. 吸气 4 秒：双手空了。感觉那个轻。那不是冷漠，是归还\n4. 吐气 6 秒：对自己说「他有他的路要走。我照顾好自己就是最大的愛」\n\n做 5 轮。\n\n你不需要拯救任何人才配被愛。你的存在本身就够了。',
    closing:'你的付出是出自真心的。但真心不需要掏到见底。你可以愛一个人，同時让他自己站起來。那才是最深的愛。'},
  perfectionist:{name:'完美主义者',icon:'💎',sub:'你在找一个不存在的人',
    desc:'你的擇偶标准很高。不是公主病或王子病，是你真的觉得「如果要在一起，就不能将就」。问题是，你的「不将就」有時候变成了「没有人够好」。',
    detail:'感情裡的完美主义者通常很优秀。你对自己要求高，所以也对伴侶要求高。\n\n你的清单很長：外表要能看、談吐要有深度、上进但不工作狂、体貼但不黏、有主见但不固執。每一条都合理，但全部加起來就变成了一个不存在的人。\n\n更深一层：你的完美主义可能是一種保护机制。因为只要「找不到完美的人」，你就不用真正进入一段关係。不进入就不会受傷。你用高标准擋住了失望的可能，但也擋住了幸福的可能。\n\n另一个盲点：你在关係裡容易「幻滅」。一开始觉得对方很好，但某天发現他有一个你受不了的毛病（也许是小事），你的濾镜就碎了。你依然在愛，只是你的完美主义不允许你愛一个有瑕疵的人。\n\n但所有人都有瑕疵。包括你。\n\n试一次：把你的擇偶清单拿出來，刪掉一半。留下最核心的三条。看看這三条以外的弹性空间裡，有没有你本來会错过的人。',
    oil:'玫瑰 × 薰衣草 × 甜橙',
    oilDetail:'玫瑰的香茅醇和苯乙醇穿透你前額葉的「完美标准」防线，让你的边缘系统记住：被愛的感觉跟完不完美无关。薰衣草的沉香醇放松你在「幻滅」時的紧繃感，让你能带著温柔看见对方的缺点。甜橙的檸檬烯在你心裡创造一个「不完美也可以」的柔软空间。\n\n调配建议：基底油 10ml＋玫瑰 1 滴＋薰衣草 2 滴＋甜橙 2 滴。',
    med:'「不完美也很好」冥想\n\n閉上眼睛。\n\n1. 吸气 4 秒：想一个你在意的人（伴侶/曖昧对象/前任）。想他最让你「幻滅」的那个缺点\n2. 吐气 6 秒：看著那个缺点。不是要你接受，是要你「看见」\n3. 吸气 4 秒：问自己「這个缺点真的不可忍受嗎？还是只是不符合我的完美劇本？」\n4. 吐气 6 秒：想像那个缺点慢慢变小，变成他身上一个小痣、一个小记号。不完美，但真實\n5. 对自己说：「完美的人不存在。真實的人才值得愛」\n\n做 4 轮。',
    closing:'你对品质的追求是因为你认真。但感情不是精品，不能退貨。那个让你偶爾皺眉的人，可能就是让你一輩子微笑的人。'},
  independent:{name:'独立过头型',icon:'🏔️',sub:'你一个人可以，但有時候半夜还是会冷',
    desc:'你的人生不需要任何人也能运转。你有自己的朋友圈、自己的興趣、自己的收入、自己的快樂。你驕傲於此。但你有没有发現，「不需要任何人」這句话说久了，连你自己都信了？',
    detail:'独立过头型的人在感情裡像一座美丽的孤島。你的风景很好，但码头太小，大部分的船靠不进來。\n\n你的独立可能來自很早的一个认知：「靠自己最安全。靠別人会失望。」也许你试过依賴，結果被辜負了。也许你从來没有过可以依賴的对象，所以你从來不知道「被接住」是什麼感觉。\n\n你最大的盲点是：你把「不需要」当成了力量。但不需要和不敢需要是兩回事。你需要愛，只是一直不敢承认。因为承认就等於脆弱，脆弱就等於危险。\n\n你在关係裡的样子是：你在，但你不太交出去。你愿意陪伴，但不太愿意融合。你的伴侶可能会说：「跟你在一起，有時候比一个人还孤独。」\n\n试一次：今天对一个你信任的人说「我需要你」。不用很嚴肅。可以是「我需要你帮我拿一下東西」。让「需要」這兩个字从你嘴巴出來一次。看看天会不会塌。',
    oil:'茉莉 × 天竺葵 × 岩兰草',
    oilDetail:'茉莉的吲哚和苯甲酸苄酯穿透你「不需要任何人」的盔甲，让边缘系统嚐一口「被连結」的感觉。天竺葵的香茅醇平衡你的自律神经，让「依賴」不再触发你的警报系统。岩兰草的岩兰草醇把你的根扎深，让你知道即使让人靠近，你也不会失去自己。\n\n调配建议：基底油 10ml＋茉莉 1 滴＋天竺葵 2 滴＋岩兰草 1 滴。',
    med:'「打开码头」冥想\n\n想像你是一座島。\n\n1. 吸气 4 秒：看看你的島。风景很美，但码头太小了。只有很小的船能靠进來\n2. 吐气 6 秒：想像你开始把码头加大一点点。不是要迎接一整支艦队，只是让一艘对的船有地方停\n3. 吸气 4 秒：看到那艘船慢慢靠近。你不用冲过去迎接，你只要站在那裡就好\n4. 吐气 6 秒：对自己说「让人靠近不会让我的島消失。它会让我的島有人陪」\n\n做 4 轮。\n\n你的独立很美。但美不需要孤独來证明。',
    closing:'你一个人也很完整。但完整跟幸福不一样。有些幸福只有在另一个人靠近的時候才会出現。你不用改变你的島。只要把码头再寬一点就好。'},

let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const optsHTML='<div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]===o.a?' selected':'')+'" onclick="selectOpt('+i+',\''+o.a+'\',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 题 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一题</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一题 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看我的愛情盲点 💕</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,a,btn){answers[qi]=a;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 题，共 '+questions.length+' 题';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const scores={};Object.keys(TYPES).forEach(k=>{scores[k]=0;});
  Object.values(answers).forEach(a=>{scores[a]=(scores[a]||0)+1;});
  const sorted=Object.keys(TYPES).sort((a,b)=>scores[b]-scores[a]);
  const topType=sorted[0],f=TYPES[topType],f2=TYPES[sorted[1]];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('screenshotCard').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥灵之钥</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-tags"><span class="ss-tag">愛情盲点觉察</span><span class="ss-tag">'+f.name+'</span></div><div class="ss-quote">「'+f.closing+'」</div><div class="ss-footer">hourlightkey.com ✦ 读懂自己，活对人生</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">愛情盲点觉察 Love Blind Spot</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var tp=TYPES[k],pct=Math.round(scores[k]/questions.length*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+tp.icon+' '+tp.name+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">💕 你的愛情盲点</div><div class="result-section-content">'+f.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度解析</div><div class="result-section-content">'+f.detail.replace(/\n/g,'<br>')+'</div></div>'+(f2?'<div class="result-section"><div class="result-section-title">'+f2.icon+' 副型：'+f2.name+'（'+f2.sub+'）</div><div class="result-section-content">'+f2.desc+'</div></div>':'')+'<div class="result-section"><div class="result-section-title">🌿 认知芳疗建议：'+f.oil+'</div><div class="result-section-content">'+f.oilDetail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🧘 冥想练習（60-90秒）</div><div class="result-section-content">'+f.med.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">✦ 馥灵收束语</div><div class="result-section-content" style="font-family:LXGW WenKai TC,serif;font-size:1rem;line-height:1.9">'+f.closing+'</div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ 馥灵之钥 × 你的觉察密码</div><div class="hour-bridge-text" style="margin-bottom:8px">你在感情裡的盲点不是缺陷，是你的心学会的保护机制。看见它，你才能选擇要不要繼續用同一套劇本。</div><div style="font-size:.85rem;color:#9e8a70;line-height:1.8;margin-bottom:16px">馥灵秘码可以揭示你天生的情感设定，跟今天的愛情盲点交叉比对会打开全新的理解。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免费解码馥灵秘码 →</a>';
  try{localStorage.setItem('hl_quiz_love',JSON.stringify({type:topType,scores,ts:Date.now()}));}catch(e){}
  window._resultText=f.icon+' 我的愛情盲点是「'+f.name+'」：'+f.sub+'。'+f.desc.substring(0,60)+'⋯ 你的盲区是什麼？ 👉 hourlightkey.com/sc/quiz-love-pattern.html #馥灵之钥 #愛情盲点';
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz-love-pattern',toolName:'愛情盲点觉察'});window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
