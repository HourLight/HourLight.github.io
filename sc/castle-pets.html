*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#FFF8F0;--peach:#FFE8D6;--warm:#5a3c22;--muted:#a08060;
  --gold:#e9a060;--gold-d:#c47a30;--navy:#1D3557;
  --teal:#2EC4B6;--rose:#E63946;
  --card:rgba(255,255,255,.92);
  --txt:#1a1a2e;--txt-l:#4a4a5a;--txt-d:#8a8a9a;
}
body{font-family:'Noto Serif TC',serif;color:var(--txt);background:linear-gradient(160deg,var(--cream) 0%,var(--peach) 60%,#f0e8d8 100%);min-height:100vh;min-height:100dvh;overflow-x:hidden}

.topbar{position:sticky;top:0;z-index:200;background:rgba(255,248,240,.92);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border-bottom:1px solid rgba(233,160,96,.15);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between}
.topbar-back{font-size:.78rem;color:var(--muted);text-decoration:none}
.topbar-title{font-size:.9rem;font-weight:700;color:var(--warm)}

/* ── 光光 ── */
.light-banner{margin:16px;background:var(--card);border-radius:16px;padding:20px;border:1px solid rgba(233,160,96,.2);display:flex;align-items:center;gap:16px}
.light-orb{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;transition:background .8s,box-shadow .8s}
.light-orb.bright{background:radial-gradient(circle,#FFD166,#e9a060);box-shadow:0 0 20px rgba(233,160,96,.5)}
.light-orb.mid{background:radial-gradient(circle,#f0c080,#c8945a);box-shadow:0 0 12px rgba(200,148,90,.3)}
.light-orb.dim{background:radial-gradient(circle,#b0a090,#887060);box-shadow:none}
.light-info{flex:1}
.light-name{font-size:.9rem;font-weight:700;color:var(--warm);margin-bottom:3px}
.light-msg{font-size:.78rem;color:var(--txt-l);line-height:1.6}
.light-pct{font-size:.7rem;color:var(--muted);margin-top:4px}

/* ── 区段标题 ── */
.section-head{margin:20px 16px 10px;display:flex;align-items:baseline;gap:8px}
.section-head h2{font-family:'Playfair Display','Noto Serif TC',serif;font-size:1.1rem;font-weight:700;color:var(--navy)}
.section-head span{font-size:.72rem;color:var(--muted)}

/* ── 元辰动物卡 ── */
.zodiac-card{margin:0 16px 16px;background:var(--card);border-radius:20px;padding:24px 20px;border:1px solid rgba(233,160,96,.25);position:relative;overflow:hidden}
.zodiac-card::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(233,160,96,.12),transparent);border-radius:50%}
.zodiac-top{display:flex;gap:16px;align-items:flex-start;margin-bottom:16px}
.zodiac-big-icon{font-size:52px;line-height:1;flex-shrink:0}
.zodiac-meta{flex:1}
.zodiac-name{font-size:1.3rem;font-weight:800;color:var(--warm);margin-bottom:2px}
.zodiac-zodiac{font-size:.75rem;color:var(--muted);margin-bottom:8px}
.zodiac-energy{font-size:.78rem;color:var(--txt-l);line-height:1.6;font-style:italic}
.mood-bar-wrap{margin-bottom:12px}
.mood-label{display:flex;justify-content:space-between;font-size:.7rem;color:var(--muted);margin-bottom:4px}
.mood-bar{height:8px;background:rgba(0,0,0,.06);border-radius:4px;overflow:hidden}
.mood-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--teal),var(--gold));transition:width .5s}
.quote-bubble{background:rgba(255,232,214,.6);border-radius:12px;padding:12px 14px;margin-bottom:14px;border-left:3px solid var(--gold)}
.quote-bubble p{font-size:.82rem;color:var(--warm);line-height:1.7;font-style:italic}
.quote-bubble::before{content:'"';font-size:1.5rem;color:var(--gold);line-height:1;display:block;margin-bottom:2px}
.zodiac-stage{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.stage-dot{font-size:.68rem;padding:3px 12px;border-radius:20px;border:1px solid rgba(0,0,0,.08);color:var(--muted)}
.stage-dot.active{background:var(--gold);border-color:var(--gold-d);color:#fff;font-weight:700}
.feed-row{display:flex;gap:8px;align-items:center}
.feed-btn{flex:1;padding:10px;border-radius:12px;background:var(--gold);color:#fff;border:none;font-size:.82rem;font-family:inherit;font-weight:700;cursor:pointer;transition:background .2s}
.feed-btn:hover{background:var(--gold-d)}
.feed-btn.fed{background:rgba(0,0,0,.07);color:var(--muted);cursor:default}
.feed-tip{font-size:.68rem;color:var(--muted)}

/* ── 龙的特别设计 ── */
.dragon-card{margin:0 16px 16px;background:linear-gradient(135deg,#EEEDFE,#f0eeff);border-radius:20px;padding:20px;border:1px solid rgba(127,119,221,.3);text-align:center}
.dragon-icon{font-size:48px;margin-bottom:8px}
.dragon-name{font-size:1.1rem;font-weight:800;color:#3C3489;margin-bottom:4px}
.dragon-story{font-size:.8rem;color:#534AB7;line-height:1.7;font-style:italic;margin-bottom:12px}
.dragon-progress{height:6px;background:rgba(127,119,221,.15);border-radius:3px;margin-bottom:8px}
.dragon-prog-fill{height:100%;background:linear-gradient(90deg,#AFA9EC,#7F77DD);border-radius:3px;transition:width .5s}
.dragon-prog-label{font-size:.68rem;color:#534AB7}

/* ── 猫咪收藏 ── */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;padding:0 16px;margin-bottom:8px}
.cat-card{background:var(--card);border:1px solid rgba(0,0,0,.06);border-radius:16px;padding:14px;text-align:center;cursor:pointer;transition:transform .15s}
.cat-card:hover{transform:scale(1.03)}
.cat-card.locked-cat{opacity:.45;cursor:default}
.cat-card.locked-cat:hover{transform:none}
.cat-big-icon{font-size:36px;margin-bottom:6px;line-height:1}
.cat-name{font-size:.9rem;font-weight:700;color:var(--warm);margin-bottom:2px}
.cat-color{font-size:.68rem;color:var(--muted);margin-bottom:6px}
.cat-mood-bar{height:4px;background:rgba(0,0,0,.06);border-radius:2px;overflow:hidden;margin-bottom:6px}
.cat-mood-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--teal),var(--gold));transition:width .5s}
.cat-quote{font-size:.68rem;color:var(--txt-l);line-height:1.5;font-style:italic;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cat-lock-msg{font-size:.65rem;color:var(--muted);line-height:1.4}
.cat-new-badge{display:inline-block;font-size:.6rem;background:var(--rose);color:#fff;padding:1px 7px;border-radius:10px;margin-bottom:4px}

/* ── 猫咪详情浮层 ── */
.cat-modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:500;align-items:flex-end;justify-content:center}
.cat-modal-bg.show{display:flex}
.cat-modal{background:var(--cream);border-radius:24px 24px 0 0;padding:28px 20px 40px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.cat-modal-top{display:flex;gap:14px;align-items:flex-start;margin-bottom:16px}
.cat-modal-icon{font-size:48px;line-height:1}
.cat-modal-meta{flex:1}
.cat-modal-name{font-size:1.2rem;font-weight:800;color:var(--warm);margin-bottom:2px}
.cat-modal-color{font-size:.75rem;color:var(--muted);margin-bottom:6px}
.cat-modal-desc{font-size:.8rem;color:var(--txt-l);line-height:1.7}
.cat-modal-room{font-size:.72rem;color:var(--muted);margin-top:8px}
.cat-modal-quote{background:rgba(255,232,214,.7);border-radius:12px;padding:12px 14px;margin:14px 0;border-left:3px solid var(--gold)}
.cat-modal-quote p{font-size:.82rem;color:var(--warm);line-height:1.7;font-style:italic}
.health-section{background:rgba(255,240,240,.7);border-radius:12px;padding:14px;margin-bottom:14px}
.health-title{font-size:.78rem;font-weight:700;color:var(--rose);margin-bottom:8px}
.health-list{font-size:.75rem;color:var(--txt-l);line-height:1.9}
.cat-feed-section{display:flex;gap:10px;align-items:center;margin-top:4px}
.cat-feed-btn{flex:1;padding:10px;border-radius:12px;background:var(--gold);color:#fff;border:none;font-size:.82rem;font-family:inherit;font-weight:700;cursor:pointer}
.cat-feed-btn.fed-btn{background:rgba(0,0,0,.07);color:var(--muted);cursor:default}
.cat-close-btn{width:100%;padding:12px;border-radius:12px;background:rgba(0,0,0,.05);border:none;font-size:.82rem;font-family:inherit;color:var(--muted);cursor:pointer;margin-top:12px}

/* ── Toast ── */
.pet-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);z-index:9999;background:linear-gradient(135deg,var(--cream),var(--peach));color:var(--warm);padding:12px 24px;border-radius:16px;font-size:.82rem;font-weight:600;box-shadow:0 6px 24px rgba(0,0,0,.15);opacity:0;transition:all .35s;pointer-events:none;text-align:center;white-space:nowrap}
.pet-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.bottom-pad{height:80px}

/* ── Mobile App Touch Feel ── */
body{-webkit-tap-highlight-color:transparent;overscroll-behavior-y:contain}
button,a,select,input[type=submit],input[type=button]{
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;

button:active,input[type=submit]:active{transform:scale(.97);transition:transform .08s}
select,input[type=text],input[type=number],input[type=date],input[type=email],textarea{font-size:16px!important}
@media(max-width:600px){
  body{padding-bottom:calc(72px + env(safe-area-inset-bottom,0px))}
  button,input[type=submit],input[type=button]{min-height:48px}
}

<script>

// 精油禁用说明（猫咪用）

var _currentCatId = null;
var _currentCatFed = false;

function init(){
  // 今日日期
  var tw = new Date(new Date().getTime() + 8*3600000);
  document.getElementById('today-date').textContent =
    (tw.getUTCMonth()+1) + '月' + tw.getUTCDate() + '日';

  // 从 Firebase 读取 birthYear
  _loadBirthYear(function(birthYear){
    if(window.hlPets) hlPets.initZodiac(birthYear);
    renderLight();
    renderZodiac();
    renderDragon(birthYear);
    renderCats();
  });
}

// 从 Firebase users/{uid}.birthYear 读取，fallback 到 localStorage，再 fallback 到询问
function _loadBirthYear(callback){
  // 先看 localStorage 有没有 cache
  var cached = localStorage.getItem('hl_birth_year');
  if(cached && parseInt(cached) > 1900){
    callback(parseInt(cached));
    return;
  }

  // 尝试从 Firebase 读取
  try{
    if(!window.FIREBASE_CONFIG || !firebase || !firebase.apps){ throw new Error('no firebase'); }
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    var auth = firebase.auth();
    var db = firebase.firestore();
    auth.onAuthStateChanged(function(user){
      if(!user){
        // 未登入：显示提示，预设用 2000（龙年边界外）
        _showBirthYearPrompt(callback);
        return;
      }
      db.doc('users/' + user.uid).get().then(function(doc){
        var data = doc.data() || {};
        var by = data.birthYear || data.birth_year || (data.profile && data.profile.birthYear) || 0;
        if(by > 1900){
          localStorage.setItem('hl_birth_year', by);
          callback(by);
        } else {
          // Firebase 有用户但没有 birthYear 栏位
          _showBirthYearPrompt(callback);
        }
      }).catch(function(){
        _showBirthYearPrompt(callback);
      });
    });
  }catch(e){
    _showBirthYearPrompt(callback);
  }
}

// 询问出生年份的 UI（轻量，嵌入页面）
function _showBirthYearPrompt(callback){
  var el = document.getElementById('zodiac-section');
  if(!el){ callback(1990); return; }
  el.innerHTML =
    '<div style="margin:0 16px 16px;background:rgba(255,255,255,.92);border-radius:16px;padding:20px 18px;border:1px solid rgba(233,160,96,.2)">'
    + '<div style="font-size:.88rem;font-weight:700;color:var(--warm);margin-bottom:8px">🐾 告诉我你的出生日期</div>'
    + '<div style="font-size:.78rem;color:var(--muted);margin-bottom:14px;line-height:1.6">元辰动物根据你的农历生肖决定。</div>'
    + '<input id="byInput" type="date" style="width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid rgba(233,160,96,.3);font-size:16px;font-family:inherit;background:#ffffff;color:#1a1714;color-scheme:light;-webkit-appearance:none;appearance:none;margin-bottom:10px;box-sizing:border-box;min-height:48px">'
    + '<button onclick="_confirmBirthYear()" '
    + 'style="width:100%;padding:11px;border-radius:10px;background:var(--gold);color:#fff;'
    + 'border:none;font-size:.88rem;font-family:inherit;font-weight:700;cursor:pointer">确认</button>'
    + '</div>';
  window._birthYearCallback = callback;
}

function _confirmBirthYear(){
  var inputVal = document.getElementById('byInput').value;
  var val;
  if(inputVal && inputVal.indexOf('-') > -1){
    // date input: YYYY-MM-DD
    var parts = inputVal.split('-');
    var y = parseInt(parts[0]), m = parseInt(parts[1]), d = parseInt(parts[2]);
    if(!y || y < 1900 || y > 2025){ document.getElementById('byInput').style.borderColor='rgba(230,57,70,.5)'; return; }
    // 用 lunar.js 精确转换农历年份取得正确生肖
    try{
      if(typeof Solar !== 'undefined'){
        var lunar = Solar.fromYmd(y, m, d).getLunar();
        val = lunar.getYear(); // 农历年份（可能跟国历不同）
      } else { val = y; }
    }catch(e){ val = y; }
  } else {
    // fallback: 纯数字年份输入
    val = parseInt(inputVal);
    if(!val || val < 1900 || val > 2025){ document.getElementById('byInput').style.borderColor='rgba(230,57,70,.5)'; return; }
  }
  localStorage.setItem('hl_birth_year', val);
  // 尝试写回 Firebase
  try{
    var auth = firebase.auth();
    var db = firebase.firestore();
    if(auth.currentUser){
      db.doc('users/' + auth.currentUser.uid).set({birthYear: val}, {merge:true}).catch(function(){});
    }
  }catch(e){}
  if(window._birthYearCallback) window._birthYearCallback(val);
}

function renderLight(){
  if(!window.hlPets) return;
  var level = hlPets.getLightLevel();
  var orb = document.getElementById('light-orb');
  var msg = document.getElementById('light-msg');
  var pct = document.getElementById('light-pct');
  orb.className = 'light-orb ' + (level >= 70 ? 'bright' : level >= 40 ? 'mid' : 'dim');
  if(level >= 80) msg.textContent = '城堡今天很有生气。你来了。';
  else if(level >= 50) msg.textContent = '城堡在等你。有什么想整理的吗？';
  else if(level >= 30) msg.textContent = '最近回来少了一些。光光一直在这里。';
  else msg.textContent = '等你回来。城堡需要你。';
  pct.textContent = '亮度 ' + level + '%';
}

function renderZodiac(){
  if(!window.hlPets) return;
  var pet = hlPets.getZodiacPet();
  var container = document.getElementById('zodiac-section');
  if(!pet){ container.innerHTML = '<div style="margin:0 16px;font-size:.82rem;color:var(--muted)">请先登入，元辰动物才会出现。</div>'; return; }

  var stages = ['幼年','少年','成年'];
  var stageDots = stages.map(function(s,i){
    return '<span class="stage-dot' + (i<=pet.stage?' active':'') + '">' + s + '</span>';
  }).join('');

  var fedToday = pet.mood >= 85; // 简易判断（实际从 lastFed 判断）

  container.innerHTML =
    '<div class="zodiac-card">' +
    '<div class="zodiac-top">' +
    '<div class="zodiac-big-icon">' + pet.icon + '</div>' +
    '<div class="zodiac-meta">' +
    '<div class="zodiac-name">' + pet.name + '</div>' +
    '<div class="zodiac-zodiac">属' + pet.zodiac + '｜元辰动物</div>' +
    '<div class="zodiac-energy">' + pet.energy + '</div>' +
    '</div></div>' +
    '<div class="mood-bar-wrap">' +
    '<div class="mood-label"><span>心情</span><span>' + pet.mood + '/100</span></div>' +
    '<div class="mood-bar"><div class="mood-fill" style="width:' + pet.mood + '%"></div></div>' +
    '</div>' +
    '<div class="quote-bubble"><p>' + pet.quote + '</p></div>' +
    '<div class="zodiac-stage">' + stageDots + '</div>' +
    '<div class="feed-row">' +
    '<button class="feed-btn' + (fedToday?' fed':'') + '" onclick="feedZodiac()">' +
    (fedToday ? '✓ 今天已喂过了' : '🌙 喂月光碎片') + '</button>' +
    '<span class="feed-tip">+15 心情</span>' +
    '</div></div>';
}

function renderDragon(birthYear){
  // 判断是否属龙（1988, 2000, 2012, 2024...）
  var dragonYears = [1916,1928,1940,1952,1964,1976,1988,2000,2012,2024];
  if(dragonYears.indexOf(birthYear) === -1) return;
  var container = document.getElementById('dragon-section');
  container.style.display = '';
  if(!window.hlPets) return;
  var dragon = hlPets.getDragon();
  if(!dragon) return;

  var state = hlPets.getState();
  var totalRooms = window.hlCastle ? hlCastle.getState().totalRooms : 0;
  var progPct = Math.min(100, Math.round(totalRooms / 100 * 100));

  container.innerHTML =
    '<div class="section-head"><h2>赋赋</h2><span>你的天赋之龙</span></div>' +
    '<div class="dragon-card">' +
    '<div class="dragon-icon">🐉</div>' +
    '<div class="dragon-name">赋赋</div>' +
    '<div class="dragon-story">' + dragon.storyText + '</div>' +
    '<div class="dragon-progress"><div class="dragon-prog-fill" style="width:' + progPct + '%"></div></div>' +
    '<div class="dragon-prog-label">探索 ' + totalRooms + ' 次，赋赋在长大中...</div>' +
    '<div class="cat-modal-quote" style="margin-top:14px"><p>' + dragon.quote + '</p></div>' +
    '</div>';
}

function renderCats(){
  if(!window.hlPets) return;
  var cats = hlPets.getCats();
  var unlocked = cats.filter(function(c){ return c.unlocked; });
  document.getElementById('cat-count-label').textContent = '收藏 ' + unlocked.length + ' 只';

  var html = '';
  cats.forEach(function(cat){
    if(cat.unlocked){
      html += '<div class="cat-card" onclick="openCatModal(\'' + cat.id + '\')">' +
        '<div class="cat-big-icon">' + cat.emoji + '</div>' +
        '<div class="cat-name">' + cat.name + '</div>' +
        '<div class="cat-color">' + cat.color + '</div>' +
        '<div class="cat-mood-bar"><div class="cat-mood-fill" style="width:' + cat.mood + '%"></div></div>' +
        '<div class="cat-quote">' + (cat.quote||'') + '</div>' +
        '</div>';
    } else {
      html += '<div class="cat-card locked-cat">' +
        '<div class="cat-big-icon" style="filter:grayscale(1)">' + cat.emoji + '</div>' +
        '<div class="cat-name" style="color:var(--muted)">' + cat.color + '</div>' +
        '<div class="cat-color">未解锁</div>' +
        '<div class="cat-lock-msg">' + cat.unlockCond + '</div>' +
        '</div>';
    }
  });
  document.getElementById('cat-grid').innerHTML = html;
}

function openCatModal(catId){
  if(!window.hlPets) return;
  var cats = hlPets.getCats();
  var cat = cats.filter(function(c){ return c.id === catId; })[0];
  if(!cat || !cat.unlocked) return;
  _currentCatId = catId;

  document.getElementById('m-icon').textContent = cat.emoji || '🐱';
  document.getElementById('m-name').textContent = cat.name;
  document.getElementById('m-color').textContent = cat.color;
  document.getElementById('m-desc').textContent = cat.desc;
  document.getElementById('m-room').textContent = '最喜欢的地方：' + cat.room;
  document.getElementById('m-quote').textContent = cat.quote || '';

  // 精油健康说明
  var healthList = CAT_HEALTH_TEXT;
  document.getElementById('m-health-list').style.whiteSpace = 'pre-line';
  document.getElementById('m-health-list').textContent = healthList;

  var fedBtn = document.getElementById('m-feed-btn');
  _currentCatFed = cat.mood >= 85;
  fedBtn.textContent = _currentCatFed ? '✓ 今天已喂过了' : '🌙 喂月光碎片';
  fedBtn.className = 'cat-feed-btn' + (_currentCatFed ? ' fed-btn' : '');

  document.getElementById('cat-modal-bg').classList.add('show');
}

function closeCatModal(e){
  if(e && e.target !== document.getElementById('cat-modal-bg')) return;
  document.getElementById('cat-modal-bg').classList.remove('show');
  _currentCatId = null;
}

function feedZodiac(){
  if(!window.hlPets) return;
  var zodiacId = hlPets.getZodiacId();
  var result = hlPets.feedPet(zodiacId, 'moonlight_shard');
  if(result.ok){
    showPetToast('🌙 ' + (hlPets.getZodiacPet()||{name:'牠'}).name + ' 心情 +15');
    renderZodiac();
  } else if(result.reason === 'already_fed'){
    showPetToast('今天已经喂过了，明天再来 ✓');
  } else {
    showPetToast('月光碎片不够。去城堡完成谜语收集。');
  }
}

function feedCat(){
  if(!_currentCatId || _currentCatFed || !window.hlPets) return;
  var result = hlPets.feedPet(_currentCatId, 'moonlight_shard');
  if(result.ok){
    _currentCatFed = true;
    var fedBtn = document.getElementById('m-feed-btn');
    fedBtn.textContent = '✓ 今天已喂过了';
    fedBtn.className = 'cat-feed-btn fed-btn';
    showPetToast('🌙 猫咪心情 +15');
    renderCats();
  } else if(result.reason === 'already_fed'){
    showPetToast('今天已经喂过了 ✓');
  } else {
    showPetToast('月光碎片不够。去城堡谜语收集。');
  }
}

function showPetToast(msg){
  var t = document.getElementById('pet-toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

document.addEventListener('DOMContentLoaded', function(){
  var tries = 0;
  var check = setInterval(function(){
    tries++;
    if((window.hlPets && window.hlMaterial) || tries > 20){
      clearInterval(check);
      init();
    }
  }, 150);
});
</script>
