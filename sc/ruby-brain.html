function getSystemPrompt() {
  return SYSTEM_BASE + '\n\n' + (MODE_PROMPTS[currentMode] || MODE_PROMPTS.general);
}

/* ── 模式切換 ── */
function setMode(btn) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentMode = btn.dataset.mode;
}

/* ── 快捷提問 ── */
function quickAsk(text) {
  const ta = document.getElementById('userInput');
  ta.value = text;
  ta.focus();
  autoResize(ta);
}

/* ── 自動調整高度 ── */
function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
}

/* ── Enter 送出 ── */
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

/* ── 清空對話 ── */
function clearChat() {
  if (!confirm('清空這次對話？')) return;
  messages = [];
  const area = document.getElementById('chatArea');
  area.innerHTML = '';
  area.appendChild(createWelcome());
}

function createWelcome() {
  const div = document.createElement('div');
  div.id = 'welcomeBlock';
  div.className = 'welcome';
  div.innerHTML = document.querySelector('.welcome').innerHTML;
  return div;
}

/* ── 渲染訊息 ── */
function appendMsg(role, text) {
  const wb = document.getElementById('welcomeBlock');
  if (wb) wb.remove();

  const area = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;

  if (role === 'ai') {
    bubble.innerHTML = `<div class="ai-label">✦ 大腦</div><div class="ai-text"></div>`;
    wrap.appendChild(bubble);
    area.appendChild(wrap);
    area.scrollTop = area.scrollHeight;
    return bubble.querySelector('.ai-text');
  } else {
    bubble.textContent = text;
    wrap.appendChild(bubble);
    area.appendChild(wrap);
    area.scrollTop = area.scrollHeight;
    return null;
  }
}

function appendTyping() {
  const wb = document.getElementById('welcomeBlock');
  if (wb) wb.remove();

  const area = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ai';
  wrap.id = 'typingIndicator';

  const bubble = document.createElement('div');
  bubble.className = 'bubble ai';
  bubble.innerHTML = `<div class="ai-label">✦ 大腦</div><div class="typing-dot"><span></span><span></span><span></span></div>`;
  wrap.appendChild(bubble);
  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

/* ── 送出訊息 ── */
async function sendMessage() {
  if (isLoading) return;
  const ta = document.getElementById('userInput');
  const text = ta.value.trim();
  if (!text) return;

  ta.value = '';
  autoResize(ta);
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  // 顯示用戶訊息
  appendMsg('user', text);

  // 加入歷史
  messages.push({ role: 'user', content: text });

  // 打字動畫
  appendTyping();

  try {
    const idToken = auth.currentUser ? await auth.currentUser.getIdToken() : '';
    const res = await fetch('https://app.hourlightkey.com/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        rubyToken: idToken,
        modePrompt: MODE_PROMPTS[currentMode] || '',
        messages: messages.slice(-20)
      })
    });

    const data = await res.json();
    removeTyping();

    const reply = data.reply || '（無回應）';
    const aiTarget = appendMsg('ai', '');
    if (aiTarget) aiTarget.textContent = reply;

    messages.push({ role: 'assistant', content: reply });

    // 存 Firestore
    saveToFirestore(text, reply);

  } catch (err) {
    removeTyping();
    const aiTarget = appendMsg('ai', '');
    if (aiTarget) aiTarget.textContent = '連線異常，請重試。';
    console.error(err);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}

/* ── 存 Firestore ── */
async function saveToFirestore(userMsg, aiReply) {
  if (!currentUid) return;
  try {
    await db.collection('ruby_brain').add({
      uid: currentUid,
      mode: currentMode,
      userMsg,
      aiReply,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch(e) { /* 靜默失敗 */ }
}
