<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,viewport-fit=cover">
<title id="pageTitle">觉察故事 — HOUR LIGHT 馥灵之钥</title>
<meta name="description" id="metaDesc" content="来自馥灵 130 张牌卡的真实故事。一则 2000 字的心灵电影，让你看见自己的那一面。">
<link rel="canonical" id="canonicalLink" href="https://hourlightkey.com/sc/angel-story.html">
<link rel="alternate" hreflang="zh-Hant" href="https://hourlightkey.com/angel-story.html">
<link rel="alternate" hreflang="zh-Hans" href="https://hourlightkey.com/sc/angel-story.html">
<meta property="og:title" id="ogTitle" content="觉察故事｜HOUR LIGHT">
<meta property="og:description" id="ogDesc" content="来自馥灵 130 张牌卡的真实故事。">
<meta property="og:type" content="article">
<meta property="og:url" id="ogUrl" content="https://hourlightkey.com/sc/angel-story.html">
<link rel="stylesheet" href="../assets/css/hourlight-global.css">
<style>
html,body{background:#faf9f7;color:#2a2420;font-family:'Noto Sans SC','Noto Sans TC',sans-serif;margin:0}
.story-wrap{max-width:720px;margin:0 auto;padding:70px 20px 50px}
.breadcrumb{font-size:13px;color:#8a6e3c;margin-bottom:20px}
.breadcrumb a{color:#8a6e3c;text-decoration:none}
.breadcrumb a:hover{text-decoration:underline}
.story-header{text-align:center;margin-bottom:44px;padding-bottom:28px;border-bottom:1px solid #e8dec5}
.story-num{font-family:'Cormorant Garamond',serif;font-size:16px;color:#b39b6f;letter-spacing:4px;margin-bottom:12px}
.story-title{font-family:'Noto Serif SC','Noto Serif TC',serif;font-size:40px;line-height:1.4;color:#2a2420;margin:0 0 18px;font-weight:600}
.story-meta{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.story-meta span{font-size:13px;padding:5px 14px;border-radius:999px;background:#f5ecd9;color:#8a6e3c}
.story-body{font-family:'Noto Serif SC','Noto Serif TC',serif;font-size:17.5px;line-height:2.2;color:#3a2f26;letter-spacing:0.3px}
.story-body p{margin:0 0 24px}
.story-nav{display:flex;justify-content:space-between;gap:14px;margin-top:60px;padding-top:30px;border-top:1px solid #e8dec5}
.nav-btn{flex:1;padding:16px 18px;background:#fff;border:1px solid #e8dec5;border-radius:10px;text-decoration:none;color:#6b5d52;transition:all .2s;text-align:center}
.nav-btn:hover{border-color:#e9c27d;background:#faf4e5}
.nav-btn .label{font-size:11px;color:#b39b6f;letter-spacing:2px;display:block;margin-bottom:4px}
.nav-btn .num{font-size:15px;color:#2a2420;font-weight:500}
.nav-btn.disabled{opacity:0.35;pointer-events:none}
.tools-cta{margin-top:60px;padding:46px 32px;background:linear-gradient(135deg,#f5ecd9 0%,#f0e8dc 100%);border-radius:20px;text-align:center}
.tools-cta h3{font-family:'Noto Serif SC','Noto Serif TC',serif;font-size:24px;color:#2a2420;margin:0 0 12px;font-weight:500}
.tools-cta p{color:#6b5d52;line-height:1.8;margin:0 0 24px}
.cta-buttons{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.cta-btn{padding:11px 22px;background:#e9c27d;color:#2a2420;text-decoration:none;border-radius:999px;font-size:14px;font-weight:500;transition:all .2s}
.cta-btn:hover{background:#d4ab64;transform:translateY(-2px)}
.cta-btn.secondary{background:transparent;border:1.5px solid #b39b6f;color:#6b5d52}
.cta-btn.secondary:hover{background:#b39b6f;color:#fff;border-color:#b39b6f}
.share-box{margin-top:30px;text-align:center;padding:24px;background:#fff;border:1px dashed #d4b88c;border-radius:12px}
.share-box p{font-size:14px;color:#6b5d52;margin:0 0 14px}
.share-btn{display:inline-block;padding:8px 18px;background:#f5ecd9;color:#8a6e3c;text-decoration:none;border-radius:999px;font-size:13px;margin:4px;transition:all .2s}
.share-btn:hover{background:#e9c27d;color:#2a2420}
.loading,.error{text-align:center;padding:80px 20px;color:#8a6e3c}
.error h2{color:#2a2420;margin-bottom:12px}
@media(max-width:640px){
  .story-title{font-size:30px}
  .story-wrap{padding:50px 18px 40px}
  .story-body{font-size:16.5px;line-height:2.1}
}
</style>
</head>
<body>
<script src="../assets/js/hl-topnav.js?v=4"></script>
<main class="story-wrap">
  <div id="content" class="loading">载入中⋯⋯</div>
</main>
<script src="../assets/js/hl-bottomnav.js?v=4"></script>
<script>
(async function() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id') || 'A00';
  const container = document.getElementById('content');

  try {
    const res = await fetch('assets/data/angel-stories.json');
    if (!res.ok) throw new Error('加载失败');
    const data = await res.json();
    const story = data[id];
    if (!story) {
      throw new Error('找不到这则故事');
    }

    const keys = Object.keys(data).sort((a, b) => {
      const isA_a = a.startsWith('A');
      const isA_b = b.startsWith('A');
      if (isA_a !== isA_b) return isA_a ? -1 : 1;
      return a.localeCompare(b);
    });
    const idx = keys.indexOf(id);
    const prevKey = idx > 0 ? keys[idx - 1] : null;
    const nextKey = idx < keys.length - 1 ? keys[idx + 1] : null;

    const title = `${story.title}｜觉察故事 ${id} — HOUR LIGHT`;
    document.title = title;
    document.getElementById('pageTitle').textContent = title;
    const firstSentence = story.fullStory.split('。')[0] + '。';
    const desc = firstSentence.length > 120 ? firstSentence.slice(0, 120) + '…' : firstSentence;
    document.getElementById('metaDesc').setAttribute('content', desc);
    document.getElementById('ogTitle').setAttribute('content', `${story.title}｜觉察故事 ${id}`);
    document.getElementById('ogDesc').setAttribute('content', desc);
    const currentUrl = `https://hourlightkey.com/sc/angel-story.html?id=${id}`;
    document.getElementById('ogUrl').setAttribute('content', currentUrl);
    document.getElementById('canonicalLink').setAttribute('href', currentUrl);

    const paragraphs = story.fullStory.split(/\n+/).filter(p => p.trim());
    const bodyHtml = paragraphs.map(p => `<p>${p.trim()}</p>`).join('');

    container.classList.remove('loading');
    container.innerHTML = `
      <div class="breadcrumb">
        <a href="index.html">首页</a> ＞ <a href="angel-stories.html">每日觉察故事</a> ＞ ${id}
      </div>
      <header class="story-header">
        <div class="story-num">${id}</div>
        <h1 class="story-title">${story.title}</h1>
        <div class="story-meta">
          <span>${story.tarot || ''}</span>
          ${story.oils ? `<span>精油：${story.oils}</span>` : ''}
        </div>
      </header>
      <article class="story-body">${bodyHtml}</article>

      <nav class="story-nav">
        <a class="nav-btn ${prevKey ? '' : 'disabled'}" href="${prevKey ? 'angel-story.html?id=' + prevKey : '#'}">
          <span class="label">← 上一则</span>
          <span class="num">${prevKey || '已是第一则'}</span>
        </a>
        <a class="nav-btn ${nextKey ? '' : 'disabled'}" href="${nextKey ? 'angel-story.html?id=' + nextKey : '#'}">
          <span class="label">下一则 →</span>
          <span class="num">${nextKey || '已是最后一则'}</span>
        </a>
      </nav>

      <section class="tools-cta">
        <h3>读完故事，抽一张你的牌</h3>
        <p>每则故事都是一扇觉察的门。今天，你想为自己翻开哪一张牌？</p>
        <div class="cta-buttons">
          <a class="cta-btn" href="draw.html">抽一张牌</a>
          <a class="cta-btn secondary" href="quiz-hub.html">做一个测验</a>
          <a class="cta-btn secondary" href="angel-stories.html">看更多故事</a>
        </div>
      </section>

      <div class="share-box">
        <p>把这则故事送给也会被打中的人</p>
        <a class="share-btn" id="shareFb" href="#">分享到 Facebook</a>
        <a class="share-btn" id="shareLine" href="#">分享到 LINE</a>
        <a class="share-btn" id="shareCopy" href="#">复制链接</a>
      </div>
    `;

    const url = encodeURIComponent(currentUrl);
    const text = encodeURIComponent(`《${story.title}》— 馥灵之钥每日觉察故事`);
    document.getElementById('shareFb').href = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
    document.getElementById('shareFb').target = '_blank';
    document.getElementById('shareLine').href = `https://line.me/R/msg/text/?${text}%0A${url}`;
    document.getElementById('shareLine').target = '_blank';
    document.getElementById('shareCopy').addEventListener('click', (e) => {
      e.preventDefault();
      navigator.clipboard.writeText(currentUrl).then(() => {
        e.target.textContent = '已复制 ✓';
        setTimeout(() => { e.target.textContent = '复制链接'; }, 2000);
      });
    });

  } catch (err) {
    container.classList.remove('loading');
    container.classList.add('error');
    container.innerHTML = `
      <h2>找不到这则故事</h2>
      <p>${err.message}</p>
      <p><a href="angel-stories.html">← 回到故事总览</a></p>
    `;
  }
})();
</script>
</body>
</html>
