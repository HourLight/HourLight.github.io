<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fdf6ef;
  --bg2:#f7ede2;
  --card:rgba(255,255,255,.92);
  --warm:#3e2a1a;
  --warm2:#6b4a30;
  --muted:#7a5a40;
  --gold:#c8862a;
  --gold-l:#e8b86d;
  --gold-ll:#f5dfa8;
  --teal:#2a8a7c;
  --teal-l:#4eb8a8;
  --rose:#c0334d;
  --rose-l:#e85a72;
  --navy:#1a3050;
  --accent:#8a6a20;
  --border:rgba(200,134,42,.15);
  --shadow:0 8px 32px rgba(62,42,26,.08);
  --shadow-lg:0 20px 60px rgba(62,42,26,.14);
}
html{scroll-behavior:smooth}
body{
  font-family:'Noto Serif TC',serif;
  color:var(--warm);
  background:var(--bg);
  min-height:100vh;min-height:100dvh;
  overflow-x:hidden;
}

/* ── Hero ── */
.hero{
  min-height:60vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  padding:80px 20px 40px;
  background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(42,138,124,.06),transparent 70%),
             radial-gradient(ellipse 60% 40% at 80% 70%,rgba(200,134,42,.05),transparent 60%),
             var(--bg);
}
.hero h1{
  font-family:'Playfair Display','Noto Serif TC',serif;
  font-size:clamp(1.8rem,5vw,2.8rem);font-weight:800;
  color:var(--navy);letter-spacing:.04em;margin-bottom:12px;
}
.hero-sub{
  font-size:clamp(.88rem,2.2vw,1rem);color:var(--muted);
  max-width:440px;margin:0 auto 28px;line-height:1.9;
}

/* ── Container ── */
.container{max-width:720px;margin:0 auto;padding:0 16px 100px}

/* ── Visitor Card ── */
.visitor-card{
  background:var(--card);border-radius:24px;padding:32px 24px;
  box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:24px;
}
.visitor-header{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.visitor-avatar{
  font-size:3rem;width:72px;height:72px;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg2);border-radius:50%;border:2px solid var(--border);
  flex-shrink:0;
}
.visitor-info h2{font-family:'Playfair Display','Noto Serif TC',serif;font-size:1.3rem;color:var(--navy);margin-bottom:4px}
.visitor-meta{font-size:.78rem;color:var(--muted)}
.visitor-story{
  font-size:.92rem;line-height:2;color:var(--warm);
  padding:20px;background:var(--bg2);border-radius:16px;
  border-left:3px solid var(--gold-l);
}
.visitor-story p{margin-bottom:12px}
.visitor-story p:last-child{margin-bottom:0}

/* ── Step Panels ── */
.step-panel{
  display:none;background:var(--card);border-radius:24px;
  padding:28px 24px;box-shadow:var(--shadow);border:1px solid var(--border);
  margin-bottom:20px;
}
.step-panel.active{display:block;animation:fadeUp .45s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.step-label{
  display:inline-block;padding:4px 14px;
  background:linear-gradient(135deg,var(--gold),var(--gold-l));
  color:#fff;border-radius:20px;font-size:.7rem;font-weight:700;
  letter-spacing:.08em;margin-bottom:14px;
}
.step-title{font-family:'Playfair Display','Noto Serif TC',serif;font-size:1.15rem;color:var(--navy);margin-bottom:16px}

/* ── Choices ── */
.choice-list{display:flex;flex-direction:column;gap:10px}
.choice-opt{
  padding:14px 18px;background:var(--bg);
  border:2px solid var(--border);border-radius:14px;
  cursor:pointer;font-size:.88rem;color:var(--warm);
  transition:all .3s;line-height:1.6;
}
.choice-opt:hover{border-color:var(--gold);background:#fff;transform:translateX(4px)}
.choice-opt.sel{border-color:var(--teal);background:rgba(42,138,124,.06);color:var(--teal);font-weight:600}
.choice-opt.disabled{pointer-events:none;opacity:.6}

/* ── Oil Grid ── */
.oil-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.oil-card{
  padding:14px 10px;background:var(--bg);
  border:2px solid var(--border);border-radius:16px;
  cursor:pointer;text-align:center;transition:all .3s;
}
.oil-card:hover{border-color:var(--teal);transform:translateY(-3px);box-shadow:0 4px 16px rgba(42,138,124,.1)}
.oil-card.sel{border-color:var(--teal);background:rgba(42,138,124,.06)}
.oil-card.disabled{pointer-events:none;opacity:.6}
.oil-icon{font-size:1.8rem;margin-bottom:4px}
.oil-name{font-size:.78rem;font-weight:700;color:var(--warm)}
.oil-note{font-size:.64rem;color:var(--muted);margin-top:2px}

/* ── Technique Options ── */
.tech-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.tech-card{
  padding:14px 12px;background:var(--bg);
  border:2px solid var(--border);border-radius:14px;
  cursor:pointer;text-align:center;transition:all .3s;font-size:.85rem;
}
.tech-card:hover{border-color:var(--gold);transform:translateY(-2px)}
.tech-card.sel{border-color:var(--gold);background:rgba(200,134,42,.06);font-weight:600}
.tech-card.disabled{pointer-events:none;opacity:.6}

/* ── Next Button ── */
.btn-next{
  display:block;width:100%;padding:14px;margin-top:16px;
  background:linear-gradient(135deg,var(--teal),var(--teal-l));
  color:#fff;font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;
  border:none;border-radius:14px;cursor:pointer;transition:all .3s;
  letter-spacing:.05em;
}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(42,138,124,.3)}
.btn-next:disabled{opacity:.35;cursor:default;transform:none}

/* ── Result Panel ── */
.result-panel{
  display:none;background:var(--card);border-radius:24px;
  padding:32px 24px;box-shadow:var(--shadow-lg);border:1px solid var(--border);
  margin-bottom:24px;
}
.result-panel.active{display:block;animation:fadeUp .5s ease}
.result-tier{text-align:center;margin-bottom:24px}
.result-tier .tier-icon{font-size:3.5rem;display:block;margin-bottom:8px}
.result-tier .tier-name{font-family:'Playfair Display','Noto Serif TC',serif;font-size:1.4rem;font-weight:800;color:var(--navy)}
.result-tier .tier-score{font-size:.85rem;color:var(--muted);margin-top:4px}

.feedback-section{margin-bottom:20px}
.feedback-section h3{font-size:.95rem;color:var(--navy);margin-bottom:10px;font-weight:700}
.feedback-item{
  padding:12px 16px;background:var(--bg);border-radius:12px;
  margin-bottom:8px;font-size:.84rem;line-height:1.7;color:var(--warm2);
}
.feedback-item .fb-label{font-weight:700;color:var(--warm)}
.feedback-good{border-left:3px solid var(--teal)}
.feedback-mid{border-left:3px solid var(--gold)}
.feedback-bad{border-left:3px solid var(--rose)}

.ideal-box{
  padding:20px;background:linear-gradient(135deg,rgba(200,134,42,.06),rgba(42,138,124,.04));
  border:1.5px solid var(--border);border-radius:16px;margin-bottom:20px;
}
.ideal-box h3{font-size:.95rem;color:var(--gold);margin-bottom:12px}
.ideal-box p{font-size:.86rem;line-height:1.8;color:var(--warm2)}

.points-award{
  text-align:center;padding:16px;
  background:linear-gradient(135deg,rgba(200,134,42,.08),rgba(200,134,42,.03));
  border-radius:14px;margin-bottom:16px;
}
.points-award .pts-num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:800;color:var(--gold)}
.points-award .pts-label{font-size:.78rem;color:var(--muted)}

.btn-back{
  display:inline-flex;align-items:center;gap:8px;padding:12px 28px;
  background:var(--gold);color:#fff;border:none;border-radius:20px;
  font-size:.88rem;font-weight:600;cursor:pointer;transition:all .3s;
  text-decoration:none;font-family:'Noto Serif TC',serif;
}
.btn-back:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(200,134,42,.3)}

/* ── Already Done ── */
.done-msg{
  text-align:center;padding:40px 20px;
  background:var(--card);border-radius:24px;
  box-shadow:var(--shadow);border:1px solid var(--border);
  margin-bottom:24px;
}
.done-msg .done-icon{font-size:3rem;margin-bottom:12px}
.done-msg p{font-size:.92rem;color:var(--muted);line-height:1.8}

/* ── Knowledge Passport ── */
.passport-bar{
  background:var(--card);border-radius:20px;padding:20px 24px;
  box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:24px;
}
.passport-title{
  font-family:'Playfair Display','Noto Serif TC',serif;
  font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.passport-stats{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.passport-count{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:800;color:var(--gold)}
.passport-rank{
  display:inline-block;padding:3px 12px;border-radius:16px;font-size:.72rem;font-weight:700;
  background:linear-gradient(135deg,var(--gold),var(--gold-l));color:#fff;letter-spacing:.05em;
}
.passport-track{
  width:100%;height:10px;background:var(--bg2);border-radius:8px;overflow:hidden;margin-bottom:8px;
}
.passport-fill{
  height:100%;border-radius:8px;transition:width .6s ease;
  background:linear-gradient(90deg,var(--teal),var(--gold-l),var(--gold));
}
.passport-milestones{display:flex;justify-content:space-between;font-size:.6rem;color:var(--muted)}
.passport-milestones span.achieved{color:var(--gold);font-weight:700}

/* ── Consultation Gate ── */
.consult-panel{
  display:none;background:var(--card);border-radius:24px;
  padding:28px 24px;box-shadow:var(--shadow);border:1px solid var(--border);
  margin-bottom:20px;
}
.consult-panel.active{display:block;animation:fadeUp .45s ease}
.consult-check{
  display:flex;align-items:center;gap:10px;padding:12px 16px;
  background:var(--bg);border:2px solid var(--border);border-radius:14px;
  cursor:pointer;font-size:.86rem;color:var(--warm);transition:all .3s;
  margin-bottom:8px;line-height:1.5;user-select:none;
}
.consult-check:hover{border-color:var(--teal);background:#fff}
.consult-check.checked{border-color:var(--teal);background:rgba(42,138,124,.06);color:var(--teal);font-weight:600}
.consult-check .check-box{
  width:22px;height:22px;border-radius:6px;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:.75rem;transition:all .3s;
}
.consult-check.checked .check-box{border-color:var(--teal);background:var(--teal);color:#fff}
.consult-feedback{
  margin-top:12px;padding:12px 16px;border-radius:12px;font-size:.84rem;
  line-height:1.7;display:none;
}
.consult-feedback.pass{display:block;background:rgba(42,138,124,.06);border:1px solid rgba(42,138,124,.2);color:var(--teal)}
.consult-feedback.fail{display:block;background:rgba(192,51,77,.06);border:1px solid rgba(192,51,77,.2);color:var(--rose)}

/* ── Star Rating ── */
.star-rating{font-size:1.5rem;letter-spacing:4px;margin:4px 0}
.star-rating .star-on{color:var(--gold)}
.star-rating .star-off{color:var(--bg2)}

/* ── Reflection Journal ── */
.reflect-panel{
  display:none;background:var(--card);border-radius:24px;
  padding:28px 24px;box-shadow:var(--shadow);border:1px solid var(--border);
  margin-bottom:20px;
}
.reflect-panel.active{display:block;animation:fadeUp .45s ease}
.reflect-opt{
  padding:14px 18px;background:var(--bg);
  border:2px solid var(--border);border-radius:14px;
  cursor:pointer;font-size:.86rem;color:var(--warm);
  transition:all .3s;line-height:1.6;margin-bottom:8px;
}
.reflect-opt:hover{border-color:var(--gold);background:#fff;transform:translateX(4px)}
.reflect-opt.sel{border-color:var(--gold);background:rgba(200,134,42,.06);font-weight:600}
.reflect-opt.disabled{pointer-events:none;opacity:.6}
.reflect-result{
  margin-top:14px;padding:14px 18px;border-radius:14px;font-size:.86rem;
  line-height:1.8;display:none;
}
.reflect-result.show{display:block}
.reflect-result.correct{background:rgba(42,138,124,.06);border:1px solid rgba(42,138,124,.2);color:var(--teal)}
.reflect-result.partial{background:rgba(200,134,42,.06);border:1px solid rgba(200,134,42,.2);color:var(--accent)}
.reflect-result.wrong{background:rgba(192,51,77,.06);border:1px solid rgba(192,51,77,.2);color:var(--rose)}

/* ── Score Breakdown ── */
.score-breakdown{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.score-item{
  padding:12px;background:var(--bg);border-radius:12px;text-align:center;
}
.score-item .si-label{font-size:.68rem;color:var(--muted);margin-bottom:4px}
.score-item .si-value{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:800;color:var(--navy)}
.score-item .si-weight{font-size:.6rem;color:var(--muted)}
.score-item.danger{border:1.5px solid var(--rose);background:rgba(192,51,77,.04)}
.score-item.danger .si-value{color:var(--rose)}

/* ── Responsive ── */
@media(max-width:520px){
  .oil-grid{grid-template-columns:repeat(2,1fr)}
  .visitor-card,.step-panel,.result-panel,.consult-panel,.reflect-panel,.passport-bar{padding:22px 16px}
  .score-breakdown{grid-template-columns:1fr}
}

/* ── Mobile App Touch Feel ── */
body{-webkit-tap-highlight-color:transparent;overscroll-behavior-y:contain}
button,a,select,input[type=submit],input[type=button]{
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
button:active,input[type=submit]:active{transform:scale(.97);transition:transform .08s}
select,input[type=text],input[type=number],input[type=date],input[type=email],textarea{font-size:16px!important}
@media(max-width:600px){
  body{padding-bottom:calc(72px + env(safe-area-inset-bottom,0px))}
  button,input[type=submit],input[type=button]{min-height:48px}
}

<body>

<!-- ── Hero ── -->

<img src="../images/page-banners-web/castle-aromatherapy.webp" alt="" width="1200" height="685" style="width:100%;max-width:600px;max-height:180px;object-fit:cover;margin:0 auto 20px;display:block;border-radius:12px" loading="eager" fetchpriority="high" decoding="async" onerror="this.style.display='none'">
<section class="hero" id="heroSection">
  <h1>🌿 芳疗实习室｜今日访客</h1>
  <p class="hero-sub">有人来敲门了。听听他的故事，用你的直觉调配一份处方。</p>
</section>

<!-- ── Main Content ── -->
<div class="container" id="mainContent">

  <!-- Knowledge Passport -->
  <div class="passport-bar" id="passportBar">
    <div class="passport-title">📜 芳疗师知识护照</div>
    <div class="passport-stats">
      <div class="passport-count" id="passportCount">0</div>
      <div style="font-size:.78rem;color:var(--muted)">个案完成</div>
      <div class="passport-rank" id="passportRank">🌱 初学者</div>
    </div>
    <div class="passport-track"><div class="passport-fill" id="passportFill" style="width:0%"></div></div>
    <div class="passport-milestones">
      <span id="pm10">🌿10</span>
      <span id="pm20">🌸20</span>
      <span id="pm30">🧪30</span>
      <span id="pm40">💎40</span>
      <span id="pm60">🏆60</span>
    </div>
  </div>

  <!-- Visitor Card -->
  <div class="visitor-card" id="visitorCard">
    <div class="visitor-header">
      <div class="visitor-avatar" id="vAvatar"></div>
      <div>
        <h2 id="vName"></h2>
        <div class="visitor-meta" id="vMeta"></div>
      </div>
    </div>
    <div class="visitor-story" id="vStory"></div>
  </div>

  <!-- Consultation Gate -->
  <div class="consult-panel" id="consultPanel">
    <span class="step-label">问诊关卡</span>
    <div class="step-title">在开始调配之前，你需要先询问哪些重要问题？</div>
    <div style="font-size:.78rem;color:var(--muted);margin-bottom:14px">请勾选你认为必须询问的项目（复选）。问对 5 题以上才能进入配方选择。</div>
    <div id="consultChecks"></div>
    <div class="consult-feedback" id="consultFeedback"></div>
    <button class="btn-next" id="btnConsult" disabled onclick="submitConsult()">确认问诊内容</button>
  </div>

  <!-- Step 1: Insight -->
  <div class="step-panel" id="step1">
    <span class="step-label">STEP 1 / 4</span>
    <div class="step-title">你觉得他真正的问题是什么？</div>
    <div class="choice-list" id="insightOpts"></div>
    <button class="btn-next" id="btn1" disabled onclick="nextStep(2)">确认，下一步</button>
  </div>

  <!-- Step 2: Oil Selection -->
  <div class="step-panel" id="step2">
    <span class="step-label">STEP 2 / 4</span>
    <div class="step-title">选择主要精油（选 1～2 支）</div>
    <div class="oil-grid" id="oilGrid"></div>
    <button class="btn-next" id="btn2" disabled onclick="nextStep(3)">确认，下一步</button>
  </div>

  <!-- Step 3: Technique -->
  <div class="step-panel" id="step3">
    <span class="step-label">STEP 3 / 4</span>
    <div class="step-title">选择辅助技法</div>
    <div class="tech-grid" id="techGrid"></div>
    <button class="btn-next" id="btn3" disabled onclick="nextStep(4)">确认，下一步</button>
  </div>

  <!-- Step 4: Awareness Reminder -->
  <div class="step-panel" id="step4">
    <span class="step-label">STEP 4 / 4</span>
    <div class="step-title">给一句觉察提醒</div>
    <div class="choice-list" id="reminderOpts"></div>
    <button class="btn-next" id="btn4" disabled onclick="submitAll()">送出处方</button>
  </div>

  <!-- Result -->
  <div class="result-panel" id="resultPanel"></div>

  <!-- Reflection Journal -->
  <div class="reflect-panel" id="reflectPanel">
    <span class="step-label">反思日志</span>
    <div class="step-title">回顾这次个案，你学到了什么？</div>
    <div id="reflectOpts"></div>
    <div class="reflect-result" id="reflectResult"></div>
    <button class="btn-next" id="btnReflect" disabled onclick="submitReflect()" style="background:linear-gradient(135deg,var(--gold),var(--gold-l))">记录反思</button>
  </div>

  <!-- Already Done Today -->
  <div class="done-msg" id="doneMsg" style="display:none">
    <div class="done-icon">🌿</div>

var PASSPORT_KEY = 'hl_aroma_passport';
function getPassport(){
  try{ return JSON.parse(localStorage.getItem(PASSPORT_KEY)||'{}'); }catch(e){ return {}; }
}
function savePassport(p){
  try{ localStorage.setItem(PASSPORT_KEY, JSON.stringify(p)); }catch(e){}
}
function getCompletedCount(){
  var p = getPassport();
  return Object.keys(p.completed||{}).length;
}
function markCompleted(npcId, data){
  var p = getPassport();
  if(!p.completed) p.completed = {};
  p.completed[npcId] = data;
  p.reflectScore = (p.reflectScore||0) + (data.reflectPts||0);
  savePassport(p);
}
function getPassportTier(count){
  var tier = PASSPORT_TIERS[0];
  for(var i=PASSPORT_TIERS.length-1;i>=0;i--){
    if(count>=PASSPORT_TIERS[i].min){ tier=PASSPORT_TIERS[i]; break; }
  }
  return tier;
}

/* ── Date-seeded NPC selection ── */
function todayKey(){
  var tw = new Date(new Date().getTime()+8*3600000);
  return tw.getUTCFullYear()+'-'+String(tw.getUTCMonth()+1).padStart(2,'0')+'-'+String(tw.getUTCDate()).padStart(2,'0');
}
function dateSeed(dateStr){
  var s=0;
  for(var i=0;i<dateStr.length;i++) s=((s<<5)-s)+dateStr.charCodeAt(i);
  return Math.abs(s);
}
function getTodayNPC(){
  var idx = dateSeed(todayKey()) % NPCS.length;
  return NPCS[idx];
}

var _sel = { insight:-1, oils:[], tech:'', reminder:-1, consultChecks:[] };

/* ── Render Passport ── */
function renderPassport(){
  var count = getCompletedCount();
  var tier = getPassportTier(count);
  var pct = Math.min(100, Math.round((count/60)*100));
  document.getElementById('passportCount').textContent = count;
  document.getElementById('passportRank').textContent = tier.name;
  document.getElementById('passportRank').style.background = 'linear-gradient(135deg,'+tier.color+','+tier.color+'cc)';
  document.getElementById('passportFill').style.width = pct+'%';
  var milestones = [{id:'pm10',n:10},{id:'pm20',n:20},{id:'pm30',n:30},{id:'pm40',n:40},{id:'pm60',n:60}];
  milestones.forEach(function(m){
    var el = document.getElementById(m.id);
    if(el){
      if(count>=m.n) el.classList.add('achieved');
      else el.classList.remove('achieved');
    }
  });
}

/* ── Render Consultation Gate ── */
function renderConsult(){
  var qs = CONSULT_QUESTIONS.slice();
  var seed = dateSeed(todayKey()+_npc.id);
  for(var i=qs.length-1;i>0;i--){
    var j = Math.abs((seed*(i+1))%qs.length);
    var tmp=qs[i]; qs[i]=qs[j]; qs[j]=tmp;
  }
  var html = '';
  qs.forEach(function(q){
    html += '<div class="consult-check" id="cq_'+q.id+'" onclick="toggleConsult(\''+q.id+'\')">' +
      '<div class="check-box" id="cb_'+q.id+'"></div>' +
      '<div>'+q.text+'</div></div>';
  });
  document.getElementById('consultChecks').innerHTML = html;
}

window.toggleConsult = function(id){
  var pos = _sel.consultChecks.indexOf(id);
  if(pos>=0) _sel.consultChecks.splice(pos,1);
  else _sel.consultChecks.push(id);
  var el = document.getElementById('cq_'+id);
  var cb = document.getElementById('cb_'+id);
  if(_sel.consultChecks.indexOf(id)>=0){
    el.classList.add('checked'); cb.textContent = '\u2713';
  } else {
    el.classList.remove('checked'); cb.textContent = '';
  }
  document.getElementById('btnConsult').disabled = _sel.consultChecks.length===0;
};

window.submitConsult = function(){
  var correctCount = 0, wrongCount = 0, explains = [];
  CONSULT_QUESTIONS.forEach(function(q){
    var selected = _sel.consultChecks.indexOf(q.id)>=0;
    if(q.correct && selected) correctCount++;
    if(!q.correct && selected){ wrongCount++; explains.push('<span style="color:var(--rose)">\u274c</span> \u300c'+q.text+'\u300d\u2014 '+q.explain); }
    if(q.correct && !selected) explains.push('<span style="color:var(--gold)">\ud83d\udca1</span> \u907a\u6f0f\uff1a\u300c'+q.text+'\u300d\u2014 '+q.explain);
  });
  var fb = document.getElementById('consultFeedback');
  if(correctCount>=5 && wrongCount===0){
    _consultPassed = true;
    fb.className = 'consult-feedback pass';
    fb.innerHTML = '\u2705 \u554f\u8a3a\u901a\u904e\uff01\u4f60\u78ba\u8a8d\u4e86 '+correctCount+' \u9805\u6b63\u78ba\u7684\u5b89\u5168\u8a55\u4f30\u9805\u76ee\u3002<br>IFA \u6a19\u6e96\u8981\u6c42\u6bcf\u4e00\u6b21\u500b\u6848\u90fd\u5fc5\u9808\u5b8c\u6210\u5b8c\u6574\u7684\u75c5\u53f2\u78ba\u8a8d\u3002';
    var checks = document.querySelectorAll('.consult-check');
    checks.forEach(function(c){ c.style.pointerEvents='none'; c.style.opacity='.7'; });
    document.getElementById('btnConsult').disabled = true;
    document.getElementById('btnConsult').textContent = '\u2713 \u554f\u8a3a\u901a\u904e';
    setTimeout(function(){
      document.getElementById('step1').classList.add('active');
      document.getElementById('step1').scrollIntoView({behavior:'smooth',block:'center'});
    }, 600);
  } else {
    fb.className = 'consult-feedback fail';
    var msg = '';
    if(wrongCount>0) msg += '\u4f60\u9078\u4e86\u4e0d\u5c6c\u65bc IFA \u6a19\u6e96\u554f\u8a3a\u7684\u9805\u76ee\u3002<br>';
    if(correctCount<5) msg += '\u4f60\u53ea\u78ba\u8a8d\u4e86 '+correctCount+'/6 \u9805\u5fc5\u8981\u7684\u5b89\u5168\u8a55\u4f30\u3002<br>';
    msg += '<br><strong>IFA \u5b89\u5168\u5b88\u5247\uff1a</strong>\u4e0d\u5b8c\u6574\u7684\u554f\u8a3a = \u4e0d\u5b89\u5168\u7684\u914d\u65b9\u3002\u8acb\u518d\u60f3\u60f3\u3002<br><br>';
    msg += explains.join('<br>');
    fb.innerHTML = msg;
    _sel.consultChecks = [];
    var checks2 = document.querySelectorAll('.consult-check');
    checks2.forEach(function(c){ c.classList.remove('checked'); });
    var cbs = document.querySelectorAll('.consult-check .check-box');
    cbs.forEach(function(c){ c.textContent=''; });
  }
};

/* ── Render Reflection ── */
function renderReflect(){
  var idx = dateSeed(todayKey()+'reflect') % REFLECT_POOL.length;
  var rq = REFLECT_POOL[idx];
  window._reflectQ = rq;
  window._reflectSel = -1;
  var html = '<div style="font-size:.88rem;color:var(--warm);margin-bottom:14px;line-height:1.8">'+rq.q+'</div>';
  rq.opts.forEach(function(opt,i){
    html += '<div class="reflect-opt" id="refopt'+i+'" onclick="selectReflect('+i+')">'+opt.text+'</div>';
  });
  document.getElementById('reflectOpts').innerHTML = html;
}

window.selectReflect = function(i){
  window._reflectSel = i;
  window._reflectQ.opts.forEach(function(_,j){
    var el = document.getElementById('refopt'+j);
    if(el) el.className = 'reflect-opt'+(j===i?' sel':'');
  });
  document.getElementById('btnReflect').disabled = false;
};

window.submitReflect = function(){
  var rq = window._reflectQ;
  var sel = window._reflectSel;
  var pts = rq.opts[sel].score;
  var fb = document.getElementById('reflectResult');
  if(pts>=2){
    fb.className = 'reflect-result show correct';
    fb.innerHTML = '\u2728 \u7cbe\u6e96\u7684\u53cd\u601d\uff01\u4f60\u5df2\u7d93\u5177\u5099 IFA \u82b3\u7642\u5e2b\u7684\u5c08\u696d\u601d\u7dad\u3002<br>+'+pts+' \u53cd\u601d\u5206\u6578';
  } else {
    fb.className = 'reflect-result show partial';
    var correctAns = '';
    rq.opts.forEach(function(o){ if(o.score>=2) correctAns=o.text; });
    fb.innerHTML = '\ud83d\udca1 \u518d\u60f3\u60f3\u770b\u3002\u6b63\u78ba\u7b54\u6848\u662f\uff1a\u300c'+correctAns+'\u300d<br>+'+pts+' \u53cd\u601d\u5206\u6578';
  }
  rq.opts.forEach(function(_,j){
    var el = document.getElementById('refopt'+j);
    if(el) el.classList.add('disabled');
  });
  document.getElementById('btnReflect').disabled = true;
  document.getElementById('btnReflect').textContent = '\u2713 \u5df2\u8a18\u9304';
  var passport = getPassport();
  passport.reflectScore = (passport.reflectScore||0) + pts;
  savePassport(passport);
  renderPassport();
};

/* ── Star HTML helper ── */
function starHtml(count, max){
  max = max || 5;
  var html = '<div class="star-rating">';
  for(var i=0;i<max;i++){
    html += '<span class="'+(i<count?'star-on':'star-off')+'">\u2605</span>';
  }
  html += '</div>';
  return html;
}

  document.getElementById('vAvatar').textContent = npc.avatar;
  document.getElementById('vName').textContent = npc.name + '（' + npc.age + '岁）';
  var cl = getCastleLevel(npc);
  var clInfo = CASTLE_LEVELS[cl] || CASTLE_LEVELS[1];
  document.getElementById('vMeta').textContent = npc.job + '｜主诉：' + npc.presenting + '｜' + clInfo.icon + ' ' + clInfo.name;
  var storyHtml = '';
  npc.story.forEach(function(p){ storyHtml += '<p>「' + p + '」</p>'; });
  document.getElementById('vStory').innerHTML = storyHtml;
}

function renderStep1(npc){
  var html = '';
  npc.insightOpts.forEach(function(opt,i){
    html += '<div class="choice-opt" onclick="selectInsight('+i+')" id="ins'+i+'">' + opt.text + '</div>';
  });
  document.getElementById('insightOpts').innerHTML = html;
}

function renderStep2(npc){
  var html = '';
  npc.oils.forEach(function(oil,i){
    var data = OIL_DATA[oil.name];
    var titleAttr = data ? oil.name+' ('+data.latin+')\n'+data.chemFamily+'｜'+data.note+'｜'+data.part : '';
    html += '<div class="oil-card" onclick="selectOil('+i+')" id="oil'+i+'" title="'+titleAttr.replace(/"/g,'&quot;')+'">' +
      '<div class="oil-icon">'+oil.icon+'</div>' +
      '<div class="oil-name">'+oil.name+'</div>' +
      '<div class="oil-note">'+oil.note+'</div>' +
      (data ? '<div style="font-size:.58rem;color:var(--muted);margin-top:1px;font-style:italic">'+data.note+'</div>' : '') +
      '</div>';
  });
  document.getElementById('oilGrid').innerHTML = html;
}

function renderStep3(){
  var html = '';
  TECHNIQUES.forEach(function(t){
    html += '<div class="tech-card" onclick="selectTech(\''+t+'\')" id="tech_'+t+'">' +
      (TECH_ICONS[t]||'') + ' ' + t + '</div>';
  });
  document.getElementById('techGrid').innerHTML = html;
}

function renderStep4(npc){
  var html = '';
  npc.reminders.forEach(function(r,i){
    html += '<div class="choice-opt" onclick="selectReminder('+i+')" id="rem'+i+'">' + r.text + '</div>';
  });
  document.getElementById('reminderOpts').innerHTML = html;
}

/* ── Selections ── */
window.selectInsight = function(i){
  _sel.insight = i;
  _npc.insightOpts.forEach(function(_,j){
    var el = document.getElementById('ins'+j);
    if(el) el.className = 'choice-opt' + (j===i?' sel':'');
  });
  document.getElementById('btn1').disabled = false;
};

window.selectOil = function(i){
  var idx = _sel.oils.indexOf(i);
  if(idx>=0){ _sel.oils.splice(idx,1); }
  else if(_sel.oils.length<2){ _sel.oils.push(i); }
  else{ return; }
  _npc.oils.forEach(function(_,j){
    var el = document.getElementById('oil'+j);
    if(el) el.className = 'oil-card' + (_sel.oils.indexOf(j)>=0?' sel':'');
  });
  document.getElementById('btn2').disabled = _sel.oils.length===0;
};

window.selectTech = function(t){
  _sel.tech = t;
  TECHNIQUES.forEach(function(tt){
    var el = document.getElementById('tech_'+tt);
    if(el) el.className = 'tech-card' + (tt===t?' sel':'');
  });
  document.getElementById('btn3').disabled = false;
};

window.selectReminder = function(i){
  _sel.reminder = i;
  _npc.reminders.forEach(function(_,j){
    var el = document.getElementById('rem'+j);
    if(el) el.className = 'choice-opt' + (j===i?' sel':'');
  });
  document.getElementById('btn4').disabled = false;
};

/* ── Step Navigation ── */
window.nextStep = function(step){
  // Disable current step choices
  var prev = document.getElementById('step'+(step-1));
  if(prev){
    var opts = prev.querySelectorAll('.choice-opt,.oil-card,.tech-card');
    opts.forEach(function(el){ el.classList.add('disabled'); });
    var btn = prev.querySelector('.btn-next');
    if(btn){ btn.disabled = true; btn.textContent = '✓ 已确认'; }
  }
  var panel = document.getElementById('step'+step);
  if(panel){
    panel.classList.add('active');
    panel.scrollIntoView({behavior:'smooth',block:'center'});
  }
};

/* ── Calculate & Show Result ── */
window.submitAll = function(){
  // Disable step 4
  var s4 = document.getElementById('step4');
  if(s4){
    var opts = s4.querySelectorAll('.choice-opt');
    opts.forEach(function(el){ el.classList.add('disabled'); });
    var btn = s4.querySelector('.btn-next');
    if(btn){ btn.disabled=true; btn.textContent='\u2713 \u5df2\u9001\u51fa'; }
  }

  var npc = _npc;

  /* ═══ New Scoring: Safety 40%, Precision 30%, Aroma 15%, Medium 15% ═══ */

  // --- Safety (40%) ---
  // Check if any selected oil has safety concerns for this NPC
  var safetyFail = false;
  var safetyIssues = [];
  _sel.oils.forEach(function(i){
    var oil = npc.oils[i];
    if(!oil.goodFor && oil.score===0){
      var data = OIL_DATA[oil.name];
      if(data && data.safety && data.safety.indexOf('\u7981\u7528')>=0){
        safetyFail = true;
        safetyIssues.push(oil.name+'\uff1a'+data.safety);
      }
    }
  });
  // Safety score: all goodFor oils = 40, some not goodFor = reduced, contraindication = 0
  var safetyRaw = 0;
  var safetyMax = 40;
  if(safetyFail){
    safetyRaw = 0; // Direct failure
  } else {
    var allGood = true;
    _sel.oils.forEach(function(i){
      if(!npc.oils[i].goodFor) allGood = false;
    });
    safetyRaw = allGood ? 40 : 20;
  }

  // --- Precision (30%) = Insight + Oil match ---
  var insightScore = npc.insightOpts[_sel.insight].score; // 0-3
  var oilScore = 0;
  _sel.oils.forEach(function(i){ oilScore += npc.oils[i].score; }); // 0-6
  var precisionRaw = Math.round(((insightScore/3)*0.4 + (Math.min(oilScore,6)/6)*0.6) * 30);

  // --- Aroma Balance (15%) = mix of note diversity ---
  var notes = {};
  _sel.oils.forEach(function(i){
    var oil = npc.oils[i];
    var data = OIL_DATA[oil.name];
    if(data) notes[data.note] = true;
  });
  var noteCount = Object.keys(notes).length;
  var aromaRaw = _sel.oils.length>=2 && noteCount>=2 ? 15 : (_sel.oils.length>=1 ? 8 : 0);

  // --- Medium/Technique (15%) ---
  var techScore = npc.techScores[_sel.tech] || 0; // 0-3
  var mediumRaw = Math.round((techScore/3)*15);

  // --- Reminder bonus (not weighted, adds to feedback quality) ---
  var reminderScore = npc.reminders[_sel.reminder].score;

  // Total
  var totalScore = safetyRaw + precisionRaw + aromaRaw + mediumRaw;
  var totalMax = 100;
  var pct = totalScore;

  // Star rating (1-5)
  var stars;
  if(safetyFail) stars = 1;
  else if(pct>=85) stars = 5;
  else if(pct>=70) stars = 4;
  else if(pct>=50) stars = 3;
  else if(pct>=30) stars = 2;
  else stars = 1;

  var tier, tierIcon, tierName;
  if(stars>=5){ tier='master'; tierIcon='\ud83c\udf1f'; tierName='\u5927\u5e2b\u7d1a\u82b3\u7642\u5e2b'; }
  else if(stars>=4){ tier='advanced'; tierIcon='\u2728'; tierName='\u9032\u968e\u82b3\u7642\u5e2b'; }
  else if(stars>=3){ tier='apprentice'; tierIcon='\ud83c\udf3f'; tierName='\u5b78\u5f92\u7d1a\u82b3\u7642\u5e2b'; }
  else{ tier='novice'; tierIcon='\ud83c\udf31'; tierName='\u898b\u7fd2\u7d1a\u82b3\u7642\u5e2b'; }

  // Build score breakdown
  var breakdownHtml = '<div class="score-breakdown">';
  breakdownHtml += '<div class="score-item'+(safetyFail?' danger':'')+'"><div class="si-label">\u5b89\u5168\u6027</div><div class="si-value">'+safetyRaw+'/40</div><div class="si-weight">'+(safetyFail?'\u26a0 \u7981\u5fcc\u75c7\u89f8\u767c\uff01':'40%\u6bd4\u91cd')+'</div></div>';
  breakdownHtml += '<div class="score-item"><div class="si-label">\u5c0d\u75c7\u7cbe\u6e96\u5ea6</div><div class="si-value">'+precisionRaw+'/30</div><div class="si-weight">30%\u6bd4\u91cd</div></div>';
  breakdownHtml += '<div class="score-item"><div class="si-label">\u9999\u6c23\u5e73\u8861</div><div class="si-value">'+aromaRaw+'/15</div><div class="si-weight">15%\u6bd4\u91cd</div></div>';
  breakdownHtml += '<div class="score-item"><div class="si-label">\u5a92\u4ecb\u9078\u64c7</div><div class="si-value">'+mediumRaw+'/15</div><div class="si-weight">15%\u6bd4\u91cd</div></div>';
  breakdownHtml += '</div>';

  // Build feedback
  var fbHtml = '';

  // Safety feedback
  if(safetyFail){
    fbHtml += '<div class="feedback-item feedback-bad"><span class="fb-label">\u26a0 \u5b89\u5168\u8b66\u544a\uff1a</span>\u914d\u65b9\u4e2d\u5b58\u5728\u7981\u5fcc\u75c7\u885d\u7a81\uff01\u5728 IFA \u6a19\u6e96\u4e2d\uff0c\u9019\u5c07\u76f4\u63a5\u5c0e\u81f4\u4e0d\u53ca\u683c\u3002<br>'+safetyIssues.join('<br>')+'</div>';
  }

  // Insight feedback
  var insClass = insightScore>=3?'feedback-good':insightScore>=1?'feedback-mid':'feedback-bad';
  fbHtml += '<div class="feedback-item '+insClass+'"><span class="fb-label">\u6d1e\u5bdf\u529b\uff1a</span>';
  if(insightScore>=3) fbHtml += '\u7cbe\u6e96\uff01\u4f60\u770b\u898b\u4e86\u8868\u8c61\u4e4b\u4e0b\u7684\u771f\u6b63\u8b70\u984c\u3002';
  else if(insightScore>=1) fbHtml += '\u65b9\u5411\u5c0d\u4e86\uff0c\u4f46\u9084\u53ef\u4ee5\u518d\u6df1\u5165\u4e00\u5c64\u3002';
  else fbHtml += '\u505c\u7559\u5728\u8868\u9762\u4e86\u3002\u8a66\u8457\u807d\u61c2\u300c\u6c92\u6709\u8aaa\u51fa\u53e3\u300d\u7684\u90a3\u4e9b\u8a71\u3002';
  fbHtml += '</div>';

  // Oil feedback
  var oilClass = oilScore>=5?'feedback-good':oilScore>=2?'feedback-mid':'feedback-bad';
  fbHtml += '<div class="feedback-item '+oilClass+'"><span class="fb-label">\u7cbe\u6cb9\u9078\u64c7\uff1a</span>';
  var oilNames = _sel.oils.map(function(i){ return npc.oils[i].name; }).join('\u3001');
  fbHtml += '\u4f60\u9078\u4e86 ' + oilNames + '\u3002';
  if(oilScore>=5) fbHtml += '\u5f88\u597d\u7684\u642d\u914d\uff01\u9019\u4e9b\u7cbe\u6cb9\u80fd\u7cbe\u6e96\u56de\u61c9\u500b\u6848\u7684\u9700\u6c42\u3002';
  else if(oilScore>=2) fbHtml += '\u6709\u4e9b\u5c0d\u4e86\uff0c\u4f46\u9084\u6709\u66f4\u9069\u5408\u7684\u9078\u64c7\u3002';
  else fbHtml += '\u9019\u4e9b\u7cbe\u6cb9\u53ef\u80fd\u4e0d\u592a\u9069\u5408\u9019\u4f4d\u500b\u6848\u7684\u72c0\u6cc1\u3002';
  fbHtml += '</div>';

  // Aroma balance feedback
  var aromaClass = aromaRaw>=15?'feedback-good':aromaRaw>=8?'feedback-mid':'feedback-bad';
  fbHtml += '<div class="feedback-item '+aromaClass+'"><span class="fb-label">\u9999\u6c23\u5e73\u8861\uff1a</span>';
  if(aromaRaw>=15) fbHtml += '\u524d\u4e2d\u5f8c\u8abf\u7684\u5e73\u8861\u5f88\u597d\uff0c\u7cbe\u6cb9\u5206\u5b50\u7684\u91cb\u653e\u7bc0\u594f\u5f88\u5354\u8abf\u3002';
  else if(aromaRaw>=8) fbHtml += '\u53ef\u4ee5\u8003\u616e\u52a0\u5165\u4e0d\u540c\u97f3\u8abf\u7684\u7cbe\u6cb9\u4f86\u63d0\u5347\u5354\u540c\u6548\u61c9\u3002';
  else fbHtml += '\u914d\u65b9\u7684\u9999\u6c23\u5c64\u6b21\u53ef\u4ee5\u518d\u8c50\u5bcc\u4e00\u4e9b\u3002';
  fbHtml += '</div>';

  // Tech feedback
  var techClass = techScore>=3?'feedback-good':techScore>=2?'feedback-mid':'feedback-bad';
  fbHtml += '<div class="feedback-item '+techClass+'"><span class="fb-label">\u6280\u6cd5\uff1a</span>';
  fbHtml += '\u4f60\u9078\u4e86\u300c' + _sel.tech + '\u300d\u3002';
  if(techScore>=3) fbHtml += '\u6700\u9069\u5408\u7684\u6280\u6cd5\uff01\u80fd\u8b93\u7cbe\u6cb9\u7684\u6548\u679c\u6700\u5927\u5316\u3002';
  else if(techScore>=2) fbHtml += '\u53ef\u4ee5\uff0c\u4f46\u6709\u66f4\u597d\u7684\u65b9\u5f0f\u3002';
  else fbHtml += '\u9019\u500b\u6280\u6cd5\u5c0d\u9019\u4f4d\u500b\u6848\u4f86\u8aaa\u4e0d\u662f\u6700\u5408\u9069\u7684\u3002';
  fbHtml += ' \u6700\u4f73\u6280\u6cd5\u662f\u300c'+npc.bestTech+'\u300d\u3002';
  fbHtml += '</div>';

  // Reminder feedback
  var remClass = reminderScore>=3?'feedback-good':reminderScore>=1?'feedback-mid':'feedback-bad';
  fbHtml += '<div class="feedback-item '+remClass+'"><span class="fb-label">\u89ba\u5bdf\u63d0\u9192\uff1a</span>';
  if(reminderScore>=3) fbHtml += '\u9019\u53e5\u8a71\u8aaa\u9032\u4e86\u500b\u6848\u7684\u5fc3\u88e1\u3002';
  else if(reminderScore>=1) fbHtml += '\u65b9\u5411\u662f\u5c0d\u7684\uff0c\u4f46\u53ef\u4ee5\u518d\u66f4\u89f8\u52d5\u4e00\u4e9b\u3002';
  else fbHtml += '\u9019\u53e5\u8a71\u6bd4\u8f03\u505c\u7559\u5728\u5efa\u8b70\u5c64\u9762\uff0c\u6c92\u6709\u89f8\u53ca\u5230\u5167\u5728\u3002';
  fbHtml += '</div>';

  // Points
  var pts = stars>=5?15:stars>=4?12:stars>=3?10:stars>=2?7:5;

  // Castle level info
  var cl = getCastleLevel(npc);
  var clInfo = CASTLE_LEVELS[cl] || CASTLE_LEVELS[1];

  // Oil chemistry info
  var oilChemHtml = '';
  _sel.oils.forEach(function(i){
    var oil = npc.oils[i];
    var data = OIL_DATA[oil.name];
    if(data){
      oilChemHtml += '<div class="feedback-item" style="border-left:3px solid var(--gold-l)">' +
        '<span class="fb-label">' + oil.name + '</span> ' +
        '<span style="font-size:.76rem;color:var(--muted);font-style:italic">' + data.latin + '</span><br>' +
        '<span style="font-size:.78rem;color:var(--warm2)">' +
        '\u79d1\u5c6c\uff1a' + data.family + '\uff5c\u8403\u53d6\u90e8\u4f4d\uff1a' + data.part + '<br>' +
        '\u5316\u5b78\u5bb6\u65cf\uff1a' + data.chemFamily + '\uff5c\u97f3\u8abf\uff1a' + data.note + '<br>' +
        '\u5b89\u5168\u63d0\u9192\uff1a' + data.safety + '</span></div>';
    }
  });

  var html = '<div class="result-tier">' +
    '<span class="tier-icon">'+tierIcon+'</span>' +
    '<div class="tier-name">'+tierName+'</div>' +
    starHtml(stars, 5) +
    '<div class="tier-score">\u7d9c\u5408\u8a55\u5206 '+totalScore+' / '+totalMax+'</div></div>' +
    breakdownHtml +
    '<div style="text-align:center;padding:12px;margin-bottom:16px;background:linear-gradient(135deg,rgba(42,138,124,.06),rgba(200,134,42,.04));border:1.5px solid var(--border);border-radius:14px">' +
    '<div style="font-size:1.6rem;margin-bottom:4px">'+clInfo.icon+'</div>' +
    '<div style="font-family:\'Playfair Display\',serif;font-size:.95rem;font-weight:700;color:var(--navy)">'+clInfo.name+'</div>' +
    '<div style="font-size:.78rem;color:var(--muted);margin-bottom:6px">'+clInfo.sub+'</div>' +
    '<div style="font-size:.76rem;color:var(--warm2);line-height:1.7">'+clInfo.desc+'</div></div>' +
    '<div class="feedback-section"><h3>\u500b\u6848\u56de\u994b</h3>'+fbHtml+'</div>' +
    (oilChemHtml ? '<div class="feedback-section"><h3>\u7cbe\u6cb9\u5b78\u7406\u7b46\u8a18\uff08IFA \u6a19\u6e96\uff09</h3>'+oilChemHtml+'</div>' : '') +
    '<div class="ideal-box"><h3>\ud83c\udf3f \u5c0f\u99a5\u7684\u8abf\u914d\u5efa\u8b70</h3><p>'+npc.idealRx+'</p></div>' +
    '<div class="points-award"><div class="pts-num">+'+pts+'</div><div class="pts-label">\u9748\u611f\u9ede\u6578</div></div>' +
    '<div style="text-align:center;margin-bottom:8px"><button class="btn-next" onclick="showReflect()" style="background:linear-gradient(135deg,var(--gold),var(--gold-l));max-width:280px;margin:0 auto">\ud83d\udcdd \u958b\u555f\u53cd\u601d\u65e5\u8a8c</button></div>' +
    '<div style="text-align:center"><a href="castle-game.html" class="btn-back">\ud83c\udff0 \u56de\u5230\u57ce\u5821</a></div>';

  var rp = document.getElementById('resultPanel');
  rp.innerHTML = html;
  rp.classList.add('active');
  rp.scrollIntoView({behavior:'smooth',block:'start'});

  // Integration: castle points
  if(window.hlCastle && typeof hlCastle.addPoints === 'function'){
    hlCastle.addPoints(pts);
  }
  // Integration: material drop
  if(window.hlMaterial && typeof hlMaterial.drop === 'function'){
    hlMaterial.drop('castle_riddle');
  }

  // Save daily completion + passport
  try{
    var saved = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    saved[todayKey()] = { npcId:npc.id, score:totalScore, pct:pct, tier:tier, stars:stars };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
  }catch(e){}
  markCompleted(npc.id, { score:totalScore, stars:stars, date:todayKey() });
  renderPassport();
};

/* ── Show Reflection Panel ── */
window.showReflect = function(){
  renderReflect();
  document.getElementById('reflectPanel').classList.add('active');
  document.getElementById('reflectPanel').scrollIntoView({behavior:'smooth',block:'center'});
};

/* ── Init ── */
function init(){
  _npc = getTodayNPC();

  // Always render passport
  renderPassport();

  // Check if already completed today
  try{
    var saved = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    if(saved[todayKey()]){
      document.getElementById('visitorCard').style.display = 'none';
      document.getElementById('doneMsg').style.display = '';
      return;
    }
  }catch(e){}

  renderVisitor(_npc);
  renderConsult();
  renderStep1(_npc);
  renderStep2(_npc);
  renderStep3();
  renderStep4(_npc);

  // Show consultation gate first (step1 is shown after passing)
  document.getElementById('consultPanel').classList.add('active');
}

document.addEventListener('DOMContentLoaded', function(){
  var tries = 0;
  var check = setInterval(function(){
    tries++;
    if((window.hlCastle) || tries > 25){
      clearInterval(check);
      init();
    }
  }, 150);
});

})();
</script>
