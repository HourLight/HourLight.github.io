const TYPES={
  pastPos:{name:'温暖回望者',icon:'🕯️',sub:'你的根扎在回忆的土壤裡，从过去汲取养分',
    keys:['传统','感恩','连結感'],hour:'H（Heal 身心校准）',
    desc:'你跟过去的关係是温暖的。那些老照片、旧歌、已经搬走的老家，在你心裡都有一个专属的位置。你重視传统、重視承諾、重視那些跟你一起走过的人。过去对你來说不是負担，是根。你的幸福感有很大一部分來自「回味」。吃到某道菜想起某个人，聽到某首歌想起某段日子，你会觉得：「啊，我的人生是有重量的。」',
    detail:'Zimbardo的研究显示，过去正向型的人通常有較高的生活满意度和較稳定的人际关係。你之所以能从回忆裡感受到温暖，代表你的记忆系统擅長保留正面经验。這是一種天賦。\n\n但过去正向的风险在於「美化」。你可能记住了那段关係裡的好，忘了它为什麼結束。你可能留恋以前的工作环境，卻忽略了你是自己辭职的。回忆是有濾镜的，你的濾镜偏暖。\n\n另一个风险是「抗拒变化」。当你太依賴过去的美好，現在的任何改变都会让你不安。新的城市不如老家、新朋友不如老朋友、現在的自己不如以前的自己。你的時间感停在一个黃金時代，而那个時代回不去了。\n\n觉察邀请：這週找一件「以前不会做的新事」去试试。不是要你放棄回忆，是让你的時间感往前流动。过去可以是根，但不要变成錨。',
    oil:'檀香 2 滴＋甜橙 2 滴＋佛手柑 1 滴。檀香连結你的根，让那份温暖感踏實。甜橙把你从回忆裡带回到「此刻也很好」。佛手柑让你对新经验保持开放。',
    med:'閉上眼睛。想像你手裡捧著一盞温暖的小灯。那盞灯裡装著你最珍貴的回忆。吸气四秒，感觉它的温度。吐气六秒。現在把這盞灯轻轻放在身後。吸气四秒，看看前面。前面也有光。吐气六秒。对自己说：「过去的美好不会消失，而前面还有新的在等。」张开眼睛。',
    quote:'你的回忆是一座花园。繼續澆水，但也记得往前面的空地種点新的。'},
  pastNeg:{name:'時光困獸',icon:'🔗',sub:'你的時鐘停在了某一天，一直在那裡繞圈',
    keys:['反芻','自責','难以放下'],hour:'H（Heal 身心校准）',
    desc:'你跟过去的关係是糾纏的。不是所有过去都痛，但那些痛的部分太大声了，盖过了其他所有声音。你会反覆回想某段关係裡自己做错的事、某次机会自己没把握住的遺憾、某句话说出口的瞬间。你知道「过去了就过去了」，你也知道「往前看」，但你的內在時鐘不聽话。它一直停在那一天。',
    detail:'反芻思維是过去負向型最核心的特徵。你的大脑会自动把过去的負面事件拿出來「重播」，而且每次重播的時候，身体的感觉也会跟著重新來一次。心跳加速、胸口悶、眼眶发熱。与其说在「想」过去，不如说你在「重新经历」过去。\n\n這種模式通常有兩个來源。一種是真正经历过重大的挫折或傷害，记忆还没有被好好处理。另一種是你的自我评价系统把「犯错」等同於「我很糟」，所以每一次回想都在強化「我果然不够好」的信念。\n\n让這个模式更难的是：你知道自己在繞圈，但停不下來。就像手机後台跑了一个你关不掉的App，一直耗电。你累不是因为現在发生了什麼，是因为你一直在跑昨天的程式。\n\n觉察邀请：下次回想起那件事的時候，不要叫自己「不要想」。這不管用。改成问自己：「這件事裡面，有什麼是我已经学到的？」把反芻变成提取。同样是回头看，一个是困住，一个是取经。',
    oil:'乳香 2 滴＋薰衣草 2 滴＋佛手柑 1 滴。乳香帮你跟过去的自己和解。薰衣草让那些反覆重播的画面安静下來。佛手柑是一道光，让你看到回忆的出口不只是那个入口。',
    med:'坐下來。閉上眼睛。想像那件一直在你脑海裡回放的事情。這一次不要推开它。吸气四秒，让它在那裡。吐气六秒，对那段记忆说：「我看到你了。」吸气四秒，问它：「你想告诉我什麼？」吐气六秒，聽。不管聽到什麼。第四次呼吸，对自己说：「那个時候的我，已经尽力了。」张开眼睛。',
    quote:'你不需要忘记。你需要的是允许自己把那件事放在一个可以走开的地方。'},
  preHed:{name:'此刻冒险家',icon:'🌊',sub:'你活在一个永恆的「現在」，每一刻都是新的',
    keys:['即時满足','感官享受','自由奔放'],hour:'U（Unlock 潜能解锁）',
    desc:'你跟時间的关係是「現在」。过去的事情不太回头，未來的事情不太操心，你要的是這一秒的感受。你吃東西讲究味道、旅行讲究体验、选擇人际关係讲究「跟這个人在一起的時候我舒不舒服」。你的人生像冲浪，站在浪头上，不知道下一波是什麼，但你不怕。',
    detail:'当下享樂型在Zimbardo的框架裡有一个很有趣的特徵：你的多巴胺系统可能比一般人活躍。你对新刺激的反应更強烈，对延遲满足的容忍度更低。這不是缺陷，這是你的神经系统让你活得更鮮活的方式。你真的能「品嚐」到這一刻的美好，不是每个人都做得到。\n\n但当下享樂的风险你大概也感觉到了：後果。今天的快樂可能是明天的麻烦。刷了那筆不该刷的卡、喝了那杯不该喝的酒、答应了那个不该答应的承諾。後果你心裡清楚，只是在决策的当下，「現在」的声音太大了，「以後」的声音聽不见。\n\n另一个隐藏的风险：你可能一直在用「享樂」來逃避某些你不想面对的事。如果你把每一个安静的空檔都填满了娛樂、社交、刺激，问问自己：我在跑的是什麼？\n\n觉察邀请：今天找十分鐘什麼都不做、不滑手机、不聽音樂。就坐著。让安静进來。看看那个安静裡面住著什麼。',
    oil:'薄荷 2 滴＋迷迭香 2 滴＋檸檬 1 滴。薄荷維持你的「活著」的感觉。迷迭香帮你的前額葉多想一步。檸檬在享樂裡加入一点清醒。不是要你停止享受，是让享受带著一点觉察。',
    med:'站著。赤脚。閉上眼睛。感觉脚底踩在地板上。吸气四秒，感觉空气进入鼻腔。吐气六秒，感觉空气从嘴巴出去。你很会感受「現在」。這一次，在「現在」裡面多留一秒。吸气四秒，问自己：「我現在的感觉从哪裡來？」吐气六秒。不用回答，感觉就好。张开眼睛。',
    quote:'你比任何人都会活在当下。只是偶爾抬头看一眼前面的路，不会让你的浪变小。'},
  preFat:{name:'時间漂流者',icon:'🌫️',sub:'你觉得不管做什麼，結局都已经写好了',
    keys:['无力感','宿命观','被动等待'],hour:'R（Rise 行动进化）',
    desc:'你跟時间的关係是被动的。不是不想努力，是你看不到努力的意义。过去的经验让你觉得很多事情不是你能控制的，未來也一样。你可能不会主动去爭取什麼，不会花太多力气做计画，因为你心裡有一个声音一直在说：「反正到头來都一样。」這不是懶，是你对「我的行动能改变結果」這件事，已经失去信心了。',
    detail:'心理学裡有一个概念叫「習得无助」，说的就是当一个人反覆经历「我做什麼都没有用」的情境，最後他会停止嘗试。不是因为学会了什麼，是因为「嘗试」這件事跟「成功」之间的连結被切断了。\n\n宿命型的時间观通常跟成長经验有关。如果你在一个「你的意见不重要」的环境裡長大，或者你的人生裡有过太多「我很努力了但結果还是很差」的经验，你的大脑就会开始节省资源，不再投入期待。\n\n你可能会觉得這样也没什麼不好，至少不会失望。但代价是你把自己的人生交给了「命运」來操控。你不做选擇，选擇就会替你做。到头來你过的不是你的人生，是被环境推著走的人生。\n\n觉察邀请：今天做一件「你选的」事。不用大，买一杯你自己挑的饮料、走一条你自己决定的路。让你的大脑重新感受「我选了，然後有一个属於我的結果」。',
    oil:'葡萄柚 2 滴＋薄荷 1 滴＋迷迭香 2 滴。葡萄柚喚醒你的多巴胺系统，让你对「想要」這件事恢复一点感觉。薄荷是一个清醒的提醒：你还在這裡，你还有选擇。迷迭香帮你的前額葉重新接上「主动决策」的线路。',

let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';
    const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 题 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一题</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一题 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看看我的時间人格 ⏳</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 题，共 '+questions.length+' 题';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const dimScores={};Object.keys(DIMS).forEach(k=>{dimScores[k]=0;});
  Object.keys(answers).forEach(qi=>{const oi=answers[qi];const s=questions[qi].opts[oi].s;Object.keys(s).forEach(d=>{dimScores[d]+=s[d];});});
  const maxPossible=Object.keys(answers).length*3;
  const sorted=Object.keys(DIMS).sort((a,b)=>dimScores[b]-dimScores[a]);
  const top=sorted[0],sec=sorted[1];
  const t1=dimScores[top],t2=dimScores[sec];
  let topType;
  if(t1>t2*1.4) topType=top;
  else{
    const combo={
      'pastPos_preHed':'pastPos_preHed','preHed_pastPos':'pastPos_preHed',
      'pastNeg_preFat':'pastNeg_preFat','preFat_pastNeg':'pastNeg_preFat',
      'pastPos_future':'future_pastPos','future_pastPos':'future_pastPos',
      'preHed_future':'preHed_future','future_preHed':'preHed_future'
    };
    const key=top+'_'+sec;
    topType=combo[key]||top;
  }
  if(!TYPES[topType]) topType=top;
  const f=TYPES[topType];
  const pureKeys=Object.keys(DIMS);
  const secType=TYPES[pureKeys.filter(k=>k!==sorted[0]).sort((a,b)=>dimScores[b]-dimScores[a])[0]];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
