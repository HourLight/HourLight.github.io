<script>
var TYPES={
freeze:{name:'完美凍結型',icon:'💎',sub:'做不到 100 分不如不做',
desc:'你的拖延不是因为懶，是因为你的品质标准高到连自己都爬不上去。「再多准備一下」「等灵感來」「先把资料看完」，這些都是你的完美主义替你编的藉口，而你每一次都信了。你的桌面有十七个「草稿_最终版_真的最终版」的檔案。你花了三小時研究怎麼开始，然後時间就用完了。最諷刺的是，你是所有拖延类型裡能力最強的那一个，正因为你知道自己做得到，所以更受不了做不好。你害怕的是「不够完美」的成功。',
oil:'🌿 <strong>精油处方：甜橙（打破凍結·先动再说）× 迷迭香（清晰思緒·停止过度准備）× 雪松（稳定自信·接受不完美）</strong><br><br>完美凍結型需要的是「破冰」。甜橙的柑橘香气像一记温柔的弹指，把你从「再想一下」的冰层裡弹出來。每次坐到桌前要开始工作時，先在手腕滴一滴甜橙，深吸一口气，然後跟自己说：「醜版本也是版本。先做出 30 分的東西，再慢慢改。」雪松的木质底韻則提醒你：你的价值不等於你的作品分數。\n\n为什麼這个配方对你有效？\n甜橙裡的檸檬烯（limonene）含量高达 90%，它能直接跟你的边缘系统聊天，温柔地繞过前額葉那个「不够完美不准动」的守门员，帮你啟动「先做再说」的行动迴路。迷迭香的 1,8-桉油醇能给你的前額葉來一杯 espresso，让「分析该怎麼做」的能量转換成「現在就开始做」的清晰指令。雪松裡的雪松烯直接安撫你的杏仁核，把「做不好怎麼办」的恐懼音量调到最小。三支精油一起用，就像帮你的完美主义装了一个音量旋鈕，让它不再大声到把你凍住。',
med:'手边没有精油？试试這个：\n\n【破冰五分鐘仪式】\n打开你一直拖著的那个檔案或任務，然後设定手机计時器 5 分鐘。在這 5 分鐘裡，你唯一的规則是：不准刪除。打错字不管、格式醜不管、邏輯不通不管，就是一直往前写或往前做。\n\n开始之前先做 3 次「破冰呼吸」：用力吸气 2 秒，然後像吹蠟燭一样「呼，」地用力吐出去，同時双手从胸前往外推出去，像在推开一面玻璃墙。每次推的時候在心裡说「够了」（对完美主义说的）。\n\n5 分鐘結束後，看看你做出來的東西。它一定很醜，但它存在了。存在就是勝利。如果做完 5 分鐘你想繼續，就繼續。如果不想，至少你今天打破了凍結。每天做一次「醜陋的 5 分鐘」，你会发現完美主义的音量会一天比一天小。',
insight:'30 分的存在，永远比 100 分的想像更有力量。'},

shield:{name:'恐懼护盾型',icon:'🛡️',sub:'不开始就不会失败',
desc:'你的拖延是一面护盾。不开始就不会失败，不失败就不用面对「我果然不行」的声音。你把「做了但没做好」的痛苦放大到宇宙那麼大，大到你宁愿选擇「什麼都不做」的空虛。你很擅長在deadline前一天跟自己说「算了，這次不算」，然後把失败归因於「時间不够」而不是「能力不足」。你怕的是做了那件事之後被迫面对一个殘酷的真相：也许我真的没有自己以为的那麼好。但亲愛的，那个真相根本不存在。它只是你的恐懼在说謊。',
oil:'🌿 <strong>精油处方：佛手柑（勇气的味道）× 乳香（安定核心·你不需要证明什麼）× 茉莉（喚醒行动力）</strong><br><br>恐懼护盾型需要的是「安全感」，知道即使搞砸了，你还是你。乳香的樹脂香气直接作用於边缘系统，让恐懼的音量调小。每天早晨在心口滴一滴乳香，閉眼感受它温熱地滲进去，跟自己说：「做了没做好，我还是我。」佛手柑的柑橘酸甜則像一个深呼吸，让你鼓起剛好够的勇气踏出第一步。\n\n为什麼這个配方对你有效？\n佛手柑裡的檸檬烯和乙酸沉香酯是你的「微勇气製造机」，它們能刺激迷走神经释放一点点剛好够用的勇气，不是逼你上战场，是牽著你的手往门口走一步。乳香的乳香酸直接跟你的杏仁核对话，跟那个一直喊「不要做！做了会失败！」的声音说：「失败了也没关係，你还是你。」茉莉裡的乙酸苄酯和吲哚則像一记温暖的鬧鐘，叫醒你沉睡的行动力，让前額葉从「分析风险」的迴圈裡跳出來，切換成「好，我试试看」。',
med:'手边没有精油？试试這个：\n\n【安全著陸想像练習】\n閉上眼睛，想像你面前有一扇门，门後是你一直在逃避的那件事。現在想像门上貼了一张纸条，写著：「做得不好也可以回來。」\n\n做 4 次安全呼吸：吸气 4 秒，hold 2 秒，吐气 6 秒。每次吸气時想像地板变得越來越稳固，像一塊怎麼踩都不会碎的厚石板。\n\n然後在心裡练習「最坏劇本」：如果做了那件事、搞砸了，最坏会怎样？具体想像那个场景（被批评、成果不好、让人失望），然後问自己：「然後呢？」持續问 3 次「然後呢」，你会发現最坏的結果通常是「有点丟脸，然後生活繼續」，而不是世界末日。\n\n最後睜开眼，找到那件事最小的第一步（打开檔案、写第一行字、撥一通电话），在 10 秒內做掉它。速度是关键，因为恐懼需要時间醞釀，你比它快就贏了。',
insight:'失败不等於你不好。不做才等於零。'},

rebel:{name:'叛逆灵魂型',icon:'✊',sub:'你叫我做我偏不做',
desc:'你的拖延是一场无声的革命。越被催越不想动，越有 deadline 越想反著來。不是你懶，是你对「被控制」过敏。你小時候可能被管太多、被安排太多、被期待太多，拖延是你唯一能掌控的事：「至少什麼時候做，我说了算。」最有趣的是，如果那件事是你自己想做的，你的執行力驚人。你不愿意在「被要求」的情況下做。你的叛逆不是坏事，它保护了你的自主性。但当它开始傷害你自己的目标時，就需要換个方式表达了。',
oil:'🌿 <strong>精油处方：黑胡椒（点燃自主动力）× 絲柏（边界感·分辨「我的」和「別人的」）× 野橘（找回做事的樂趣）</strong><br><br>叛逆灵魂型需要的不是纪律，是「主权感」。黑胡椒的辛辣刺激能繞过你的反抗机制，直接点燃「我想做」的火種。当你被催促時，先在掌心搓兩滴黑胡椒，用力吸一口气，然後把「我被要求做這件事」在心裡改写成「我选擇做這件事」。同一件事，被叫去做和自己决定去做，能量完全不同。\n\n为什麼這个配方对你有效？\n黑胡椒裡的胡椒鹼（piperine）是天然的「自主开关」，它能刺激你的前額葉释放多巴胺，但走的是「我选擇」而不是「我被迫」的神经路徑，直接繞过你对「被控制」的过敏反应。絲柏的 α-蒎烯能帮你的边缘系统画出清楚的界线，分辨「這件事是別人要我做的」跟「這件事做了对我自己有好处」的差別。野橘满满的檸檬烯則偷偷在你的杏仁核裡種下「做這件事其實很好玩」的種子，让原本的抗拒感变成一点点好奇心。三支精油合作，不是压制你的叛逆，是帮你把叛逆的能量导到对的方向。',
med:'手边没有精油？试试這个：\n\n【主权奪回宣言练習】\n当你发現自己因为「被要求」而不想动的時候，暫停 60 秒做這个练習：\n\n站起來，双脚与肩同寬，双手插腰（是的，就是那个超級英雄的姿势）。保持這个姿势 30 秒，做 3 次深呼吸。這个「力量姿势」能微妙地改变你体內的皮质醇和睪固酮比例，让你从「被逼迫」的感觉切換成「我说了算」。\n\n然後在心裡把那件被要求的事重新改写。例如：「主管叫我交报告」改成「我选擇写這份报告，因为写完之後我就自由了」。找到一个对你自己有利的理由，哪怕那个理由是「做完就可以光明正大追劇」也行。\n\n最後做一个「啟动仪式」：倒數 5-4-3-2-1，數到 1 的時候立刻坐下开始做。不要给大脑反駁的時间，5 秒倒數法能打断你的抗拒迴路，趁叛逆的声音还没组织好论点之前就动手。',
insight:'你的战场不在外面，在你自己心裡。把「你叫我做」变成「我选擇做」。'},

bubble:{name:'夢想泡泡型',icon:'🫧',sub:'脑子裡都想好了 只是没做',
desc:'你的脑袋是一座华丽的宮殿，裡面有十七个宏偉计画、三十二个灵感筆记、和无數个「等我开始就会很厲害」的幻想。问题是，你的计画一直停留在脑子裡，像一顆一顆漂亮的泡泡，碰到現實就破了。你不缺想法，你缺的是「把大夢拆成小步」的能力。一想到那件事要做多少步驟，你的大脑就直接当机。你的夢想不是假的，你的行动力也不是零，你只是被自己的宏大愿景嚇到了。最殘忍的真相是：想了一千次但没做，跟从來没想过是一样的。',
oil:'🌿 <strong>精油处方：檸檬（清晰·把大夢切成小塊）× 薄荷（当头棒喝·現在就开始）× 岩兰草（接地·从云端回到地面）</strong><br><br>夢想泡泡型需要的是「著陸」。岩兰草的泥土气息像一根繩子，把你从云端的幻想拉回此刻的书桌。每次发現自己在「想像做完的样子」而不是「實际在做」的時候，聞一口岩兰草，然後问自己：「這件事最小的一步是什麼？只做五分鐘就好。」薄荷的清涼感則像一巴掌（温柔的），把你从白日夢裡打醒。\n\n为什麼這个配方对你有效？\n檸檬裡的檸檬烯和檸檬醛是前額葉的「对焦镜头」，它們能帮助你那台散焦的攝影机从「宏大远景」切換成「近距离特写」，让大脑从「想像做完的感觉多好」转成「現在這一步要做什麼」。薄荷的薄荷醇直接刺激三叉神经，像用冰水潑脸一样把你从白日夢裡拽出來，同時提升前額葉的多巴胺利用效率，让「啟动」這件事变得容易一点。岩兰草的岩兰草醇分子量很大、很重，就像泥土的味道，能把你过度活躍的边缘系统往下拉，从云端拉回椅子上。',
med:'手边没有精油？试试這个：\n\n【泡泡著陸三步驟】\n当你发現自己又在脑中盖城堡（想了很多但一步都没做）的時候，拿出一张纸和筆。\n\n第一步「戳破泡泡」（30 秒）：写下你脑中最大的那个计画，然後在下面写：「這件事最最最小的第一步是什麼？」只写一步，而且要小到「5 分鐘內一定做得完」的程度。例如：「开一个新文件然後打上标题」。\n\n第二步「接地呼吸」（60 秒）：双脚踩地，吸气 4 秒想像自己从云端往下降，吐气 6 秒想像屁股稳稳地坐在椅子上。做 6 次。每次吐气時用手指敲桌面 3 下，感受硬硬的桌面，那是現實，不是想像。\n\n第三步「5 分鐘實验」（5 分鐘）：立刻做那个最小的第一步。设定计時器 5 分鐘，這 5 分鐘裡不准想第二步，只专注在第一步。做完之後，你会发現：真正做了一件小事的成就感，比想像做完一件大事的幻想感更真實、更过癮。',
insight:'想一千次不如做一次。先走第一步，宇宙才知道你要去哪裡。'},

adrenaline:{name:'腎上腺素型',icon:'⚡',sub:'deadline 前才是我的主场',
desc:'你的引擎只有一種燃料：压力。没有 deadline 你是一灘爛泥，离 deadline 越近你越清醒。你在最後三小時完成的作品，品质可能比別人花三天做的还好。问题不在能力，你的能力在压力下是超载的。问题在：你的身体不是永动机。每次压线完成之後的那種虛脫感、心悸、失眠、暴饮暴食，都是你的腎上腺素帳单。你在透支未來。最上癮的是那種「我在最後一刻拯救了全世界」的英雄感。但英雄也需要休息啊。',
oil:'🌿 <strong>精油处方：薰衣草（降低亢奮·给神经系统喘息）× 快樂鼠尾草（打断压力成癮迴圈）× 甜马鬱兰（修复被透支的身体）</strong><br><br>腎上腺素型最需要的是「重新定义啟动」。你的大脑已经習慣用压力当油门，需要训练它学会用別的方式发动。试试看：把大任務拆成每天 25 分鐘的番茄鐘，用小规模的時间压力騙大脑啟动。每个番茄鐘結束後，在手腕聞一口薰衣草，让神经系统学会「不用瀕臨崩潰也能完成事情」的感觉。睡前一滴甜马鬱兰在脚底，修复你今天又透支的腎上腺素。\n\n为什麼這个配方对你有效？\n薰衣草裡的沉香醇和乙酸沉香酯是你过度亢奮的腎上腺素的「消防员」，它們能直接安撫杏仁核和下視丘，把你的压力荷爾蒙皮质醇拉回正常值，让你的身体学会「不在崩潰边缘也能有产出」這件事。快樂鼠尾草的乙酸沉香酯含量是所有精油裡數一數二高的，它能模擬你的 GABA 受体反应，温柔地打断「压力→腎上腺素→完成→上癮→需要更多压力」的迴圈。甜马鬱兰的萜品烯-4-醇則是你疲憊的副交感神经最好的修复师，让你的身体在压线完成後不是直接崩潰，而是慢慢著陸。',
med:'手边没有精油？试试這个：\n\n【微压力替代训练】\n你的大脑已经对「大压力才能啟动」上癮了，需要训练它学会用小压力也能开机。\n\n每天选一件你在拖的事，设定 15 分鐘的计時器（不是在 deadline 前一天，是現在）。在计時开始前，做 3 次「刺激呼吸」：快速用鼻子吸吐 10 次（像在模擬跑步的喘气），然後一次長長的吐气 8 秒。這会给你的身体一个微量的腎上腺素脈冲，够用來啟动，但不会透支。\n\n计時开始後全力做 15 分鐘。結束時不管做到哪裡都停下來，做 5 次慢呼吸（吸 4 秒、吐 8 秒），然後把右手放在心口，感受心跳。跟自己说：「不用瀕臨崩潰也能完成事情。」\n\n连續做 7 天，你的大脑会开始建立新的迴路：「原來 15 分鐘的小压力也能让我动起來。」当這个迴路建立之後，你对 deadline 前一天才冲刺的依賴会慢慢松开。',
insight:'压力是燃料，但不是唯一的燃料。学会慢速啟动，才能走更远。'}
};
