const DIMS={guilt:'健康內疚',intShame:'內在羞愧',extShame:'外在羞愧'};
const TYPES={
  healthy:{name:'內疚导航者',icon:'🧭',sub:'你的自責是建设性的，它推著你往前走而不是往下沉',
    keys:['行为导向','修复意愿','自我接納'],
    desc:'你的自責模式以健康內疚为主。当你做错事的時候，你感受到的是「我做了一件不好的事」，而不是「我是一个不好的人」。這个差別聽起來很小，但它决定了你的自責会把你带去哪裡。健康的內疚像GPS的重新导航，告诉你「偏了，往這边修正」，然後你就修正了。它不会让你停在原地自我毀滅。',
    detail:'Brene Brown 的研究发現，能区分內疚和羞愧的人在心理健康、人际关係和面对失败的能力上都显著更好。你的大脑有一个很重要的迴路是暢通的：「犯错 → 感觉不好 → 想办法修正 → 繼續走」。這条路不卡在「感觉不好」那一站。\n\n你之所以能做到這件事，可能跟你的成長经验有关。也许你在犯错的時候，身边有人对你说的是「這个行为不好」而不是「你這个人不好」。這让你的大脑学会了把「我」和「我做的事」分开。\n\n觉察邀请：你的模式很健康。但留意一件事：在台湾的面子文化裡，有時候你可能需要帮身边的人也区分內疚和羞愧。当你的朋友因为犯错而觉得「我是一个很糟的人」的時候，你可以提醒他：「你做了一件不太好的事。但你还是你。」',
    oil:'佛手柑 2 滴＋薰衣草 2 滴＋甜橙 1 滴。這是保养配方。佛手柑維持你对自己的温柔。薰衣草让你的神经系统保持稳定。甜橙是你跟自己之间的温暖连結。',
    quote:'你知道怎麼对自己说「這件事我做错了」但不加上「所以我很爛」。這是很少人有的能力。'},
  intShame_mild:{name:'內在批评者',icon:'🗣️',sub:'你心裡住了一个对你很嚴格的声音',
    keys:['自我苛責','完美标准','冒牌者感'],
    desc:'你的自責模式以內在羞愧为主，程度温和。你心裡有一个声音，它很嚴格、很挑剔、从來不满意。你做了90分的事，它会说「还差10分」。你被称讚了，它会说「他們不知道真正的你」。這个声音不是你的敵人，它一开始是想帮你变更好。但它的方法是貶低你而不是鼓励你。',
    detail:'內在批评者通常是在童年時期被「安装」的。也许是父母的高标准、也许是老师的嚴厲评价、也许是一次被嘲笑的经验。你的大脑把那些外部的声音內化了，变成了自己对自己说话的方式。\n\n在台湾的文化裡，這特別常见。「虛心使人进步」「做人要謙卑」這些观念让你觉得对自己嚴格是美德。但对自己嚴格和对自己殘忍是兩回事。你的內在批评者不是在帮你进步，它是在用羞愧感控制你。\n\n好消息是你的內在羞愧还在温和的范圍。你能辨识出那个声音，偶爾也能不被它影响。\n\n觉察邀请：下次那个声音出現的時候，给它取一个名字。「喔，是小明又來了」。把它从「我的想法」变成「一个角色的台词」。你就能跟它拉开一点距离。',
    oil:'薰衣草 2 滴＋天竺葵 2 滴＋乳香 1 滴。薰衣草安撫那个嚴厲的声音。天竺葵让你对自己的态度从苛責回到平衡。乳香帮你找到一个比那个声音更深的自己。',
    quote:'你心裡那个声音很大声。但那不是你。那是你小時候学会的一段录音。你可以按暫停。'},
  intShame_mod:{name:'自我撕裂者',icon:'🪞',sub:'你看著镜子的時候，看到的不是自己，是所有你觉得不够好的地方',
    keys:['深层自我否定','反覆反芻','情感麻痺'],
    desc:'你的內在羞愧已经不只是一个「声音」了，它变成了一个「世界观」。你大部分時候都觉得自己不够好。不够聪明、不够漂亮、不够努力、不够值得。這个感觉滲透在你的日常裡。你可能表面上过得不错，但心裡一直有一塊地方在说：「如果他們知道真正的我，他們就不会喜欢我了。」',
    detail:'這个程度的內在羞愧通常跟早期经验有很深的关联。不一定是「大事件」，很多時候是累积的。一次又一次的「你怎麼這麼笨」「你看看人家」「你让我很失望」。每一次都像在你的自我价值上劃一道小傷口。单独一道不会怎样，但幾百道加起來就成了一个你无法忽視的傷疤。\n\n在台湾的面子文化裡，這種羞愧会被放大。因为你的价值不只是你自己定义的，还有家族的期待、社会的标准、別人的眼光。你背的不只是自己的羞愧，还有「你代表了你的家庭」的压力。\n\n觉察邀请：今天找一面镜子。看著自己的眼睛。不用微笑。只是看。然後对自己说：「你够好了。不是因为你做了什麼，是因为你就是你。」也许你不相信。那就先假装相信。重複说幾次。让那句话进到身体裡。如果眼淚掉了，让它掉。那是你一直没有聽到的话。',
    oil:'乳香 2 滴＋玫瑰 1 滴＋薰衣草 2 滴。乳香连結你最深层的自我价值。玫瑰是你对自己的一份温柔，你很少给自己的那種。薰衣草安撫那些反覆撕裂你的想法。',
    quote:'你在镜子裡看到的不是真相。真相是：你比你以为的完整得多。'},
  intShame_sev:{name:'羞愧风暴',icon:'🌑',sub:'你的羞愧已经不是一个想法了，它变成了你呼吸的空气',
    keys:['存在性羞愧','自我厭惡','无法接受善意'],
    desc:'你的內在羞愧非常強烈。它不是偶爾出現的念头，它是你的预设狀态。你不觉得自己做了什麼坏事，你觉得自己的「存在」本身就是一个问题。別人对你好的時候你会困惑甚至害怕，因为你觉得自己不配。被称讚让你不安，被关心让你想逃，被愛让你觉得那一定是误会。',
    detail:'存在性羞愧是羞愧最深的形式。它不再是「我做了坏事所以我不好」，而是「我不需要做任何事就已经不好了」。這種程度的羞愧通常來自非常早期的经验，可能是婴兒時期的忽視、成長过程中持續的否定、或者是一个让你觉得「我的存在是多餘的」的环境。\n\n這很痛。而且因为它太深了，你可能已经習慣了。你以为「觉得自己不够好」就是正常的，因为你从來没有体验过其他的可能。你把羞愧当成了空气，你已经不觉得它在了，但它一直在影响你的每一个决定、每一段关係。\n\n觉察邀请：你值得被专业的人陪伴。這不是你一个人用觉察就能走出來的。如果你愿意，找一个你信任的专业陪伴者。不是因为你有问题，是因为你的痛值得被好好看见。安心专线 1925。你在的话就好。',
    oil:'檀香 2 滴＋乳香 2 滴＋薰衣草 1 滴。這不是修复你的配方，是陪你的。檀香让你感觉到自己的身体，你还在這裡。乳香在你最深的地方点一盞小小的灯。薰衣草告诉你的神经系统：你可以休息了。',
    quote:'你的羞愧不是真相。它是你学來的一副很重的盔甲。你可以把它脫下來。慢慢來。'},
  extShame_mild:{name:'面子偵测器',icon:'📡',sub:'你的雷达一直在扫描別人怎麼看你',
    keys:['在意他人评价','形象管理','社交焦慮'],
    desc:'你的自責模式以外在羞愧为主，程度温和。你很在意別人怎麼看你。不是虛榮，是你的自我价值有一部分建立在「別人的眼光」上。你出门前会照很久的镜子，发文前会反覆修改，说了什麼话回家会反覆回想。你的脑袋裡有一个即時的「社交评分系统」，一直在计算你在別人心目中的分數。',
    detail:'外在羞愧跟台湾文化有很深的关联。面子文化让「被別人怎麼看」变成一件攸关生存的事。你爸媽可能不会说「你這样做不好」，他們会说「人家会怎麼看」。這让你的羞愧感不是來自內在的自我评价，而是來自你想像中別人的评价。\n\n温和程度的外在羞愧其實是一種社交智慧。你很会读空气、很会維护关係、很会让场面不尷尬。但问题是你做這些事的动力不是「我想要」，而是「我怕別人怎麼想」。当恐懼是驅动力的時候，你会活得很累。\n\n觉察邀请：這週做一件「別人可能觉得奇怪但你想做」的事。不用很大。穿一件跟你平常风格不同的衣服。在社群上发一則你通常不会发的感想。让你的大脑体验一次：別人的目光不会殺死你。',
    oil:'佛手柑 2 滴＋迷迭香 2 滴＋薰衣草 1 滴。佛手柑降低你的社交焦慮。迷迭香帮你回到自己的判断而不是別人的判断。薰衣草让你在不完美的時候也能放松。',
    quote:'別人的目光是一面镜子。但你不需要每一面镜子都照。'},
  extShame_mod:{name:'面具匠人',icon:'🎭',sub:'你打造了一个完美的形象，但在面具後面快要窒息了',
    keys:['表裡落差','持續表演','真我藏匿'],
    desc:'你的外在羞愧已经让你养成了一種生存策略：戴面具。你在不同的场合有不同的面具。在公司是能幹的那个、在朋友面前是有趣的那个、在家人面前是乖巧的那个。每一个面具都維护得很好，但面具底下的那个你，已经很久没有被任何人看到了。',
    detail:'面具匠人的底层邏輯是：「如果我展現真正的自己，我会被拒绝。」這个信念來自你过去的经验。也许你曾经展現过真正的自己，然後被嘲笑了、被否定了、被忽視了。你的結论是：真正的我不够好，我需要一个更好的版本。\n\n在台湾社会裡，這種模式被高度鼓励。「在外面要有样子」「不要让人看笑话」「家醜不可外揚」。你被教导要管理形象，但没有人教你怎麼在面具底下呼吸。\n\n長期下來，你可能已经分不清楚哪个是面具、哪个是你了。如果有人问你「你到底想要什麼」，你可能会愣住。因为你太久没有问过自己這个问题了。\n\n觉察邀请：找一个你觉得最安全的人。跟他说一件「你从來没有告诉过別人」的事。不用很大，一个小秘密就好。让面具裂开一条縫，看看阳光照进來的時候你的感觉是什麼。',
    oil:'玫瑰 1 滴＋天竺葵 2 滴＋檀香 2 滴。玫瑰帮你看到面具底下的那个人。天竺葵让「表演」和「真我」之间的落差不那麼痛。檀香连結你跟最原始的自己。',
    quote:'你的面具做得很好。但面具底下的那个人，也值得被看见。'},
  extShame_sev:{name:'透明人',icon:'👁️',sub:'你觉得所有人都看穿你了，而他們看到的東西很糟糕',
    keys:['极度社交恐懼','被凝視的恐懼','公开曝光感'],
    desc:'你的外在羞愧非常強烈。你觉得自己是透明的，別人一看就知道你不行、你不好、你是假的。你走进一个房间的時候，会觉得所有人都在看你、在评判你、在看穿你的偽装。你的身体在公开场合会紧缩、心跳加速、手心冒汗，因为你的神经系统把「被看到」等同於「被攻击」。',
    detail:'這个程度的外在羞愧已经不只是「在意別人怎麼看」了，它更接近一種被凝視的恐懼。你的神经系统把「他人的目光」处理成一種威脅。這可能跟你过去被公开羞辱、被当眾批评、或者在群体中被排擠的经验有关。\n\n在台湾的校园和职场文化裡，這種经验並不罕见。被老师在全班面前罵、被同学的笑声淹没、被家人在亲戚面前比較。每一次公开的羞辱都在告诉你的身体：「被看见是危险的。」\n\n觉察邀请：你的恐懼是真實的，但「所有人都在看你」不是真的。大部分人其實太忙了，忙著担心自己被別人怎麼看。如果這个感觉嚴重影响了你的日常生活，专业的陪伴可以帮助你。安心专线 1925。',
    oil:'薰衣草 3 滴＋岩兰草 2 滴。薰衣草是你的安全毯。岩兰草把你从「所有人都在看我」的恐慌裡拉回脚底。先回到身体。先感觉脚踩在地上。其他的慢慢來。',
    quote:'你觉得所有人都在看你。但你不需要他們的允许才能存在。你已经在這裡了。'},
  guilt_intShame:{name:'修复型自責者',icon:'🔧',sub:'你想修好事情，但內在的声音一直说你修不好',
    keys:['想行动又自我怀疑','修复意愿vs能力感低'],
    desc:'你同時有健康內疚和內在羞愧。你犯错之後的第一反应是想修复，但紧接著第二个声音就会说：「你修什麼修，你就是這麼差勁。」你知道该道歉，但你怕道歉了对方会觉得你更差。你知道该改进，但你觉得改了也没用，因为你本质上就有问题。修复的意愿和自我怀疑在你心裡拉扯。',
    detail:'這種模式在高自我要求的人身上很常见。你有一套很高的道德标准（所以你会內疚），同時你也有一个很嚴格的自我评价系统（所以你会羞愧）。你想做一个好人，但你不相信自己做得到。\n\n在台湾的教育环境裡，這很常见。你被教导要「知错能改」（內疚系统），但你同時也被教导「你怎麼又犯错了」（羞愧系统）。兩个系统同時运作，你就卡在中间了。\n\n觉察邀请：下次犯错的時候，先只做一件事：修复行为。道歉就道歉，改正就改正。不要在修复的过程中同時跟自己的自我价值辯论。先做，做完再想。让「修复」的行为去覆盖「我不行」的念头。',
    oil:'佛手柑 2 滴＋迷迭香 2 滴＋薰衣草 1 滴。佛手柑降低你的羞愧閾值。迷迭香让你的「修复模式」不被自我怀疑干擾。薰衣草在你修好事情之後说：「你做到了。」',
    quote:'你想修好事情的心是真的。那个说你修不好的声音是假的。去修吧。'},
  intShame_extShame:{name:'双面镜囚',icon:'🪞',sub:'对內你觉得自己不够好，对外你觉得別人也觉得你不够好',
    keys:['內外夾击','无处可逃','全方位自我否定'],
    desc:'你同時受到內在羞愧和外在羞愧的影响。你自己觉得自己不好（对內），同時你也觉得別人认为你不好（对外）。你被困在兩面镜子中间，不管往哪边看，看到的都是你不想看到的自己。你没有一个可以逃的方向，因为连你自己都不站在你這边。',
    detail:'這是最消耗能量的羞愧模式。因为你没有「安全地带」。通常，如果只有內在羞愧，你至少可以在外面得到一些肯定來平衡。如果只有外在羞愧，你至少可以在心裡知道「我其實没那麼差」。但当兩个同時存在的時候，你找不到任何一个角度是对自己好的。\n\n在台湾的文化脈络裡，這種模式跟「家族期待」和「社会比較」有很深的关联。你不只是你自己，你还代表了你的家庭。你的羞愧不只是个人的，是系统性的。\n\n觉察邀请：你現在最需要的是一个「即使看到你全部的样子也不会离开」的人。不管是朋友、伴侶、还是专业的陪伴者。让一个人看到你觉得最不好的部分。然後观察：他还在嗎？如果他还在，那面镜子就裂开了一条縫。光会从那裡进來。安心专线 1925。',
    oil:'乳香 2 滴＋玫瑰 1 滴＋薰衣草 2 滴。乳香在你最暗的地方点一盞灯。玫瑰是你很久没有收到的温柔。薰衣草让你的身体记住一件事：你可以休息了。不用再跑了。',
    quote:'兩面镜子裡的你都不是全部的你。有一个你是镜子照不到的。那个你值得被愛。'}
};
let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 题 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一题</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一题 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看看我的自責模式 🪞</button>')+'</div>';area.appendChild(card);});updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 题，共 '+questions.length+' 题';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const dimScores={};Object.keys(DIMS).forEach(k=>{dimScores[k]=0;});
  Object.keys(answers).forEach(qi=>{const oi=answers[qi];const s=questions[qi].opts[oi].s;Object.keys(s).forEach(d=>{dimScores[d]+=s[d];});});
  const maxPossible=Object.keys(answers).length*3;
  const g=dimScores.guilt,is=dimScores.intShame,es=dimScores.extShame;
  let topType;
  if(g>is&&g>es) topType='healthy';
  else if(is>es*1.3&&is>g){
    if(is>30) topType='intShame_sev';
    else if(is>18) topType='intShame_mod';
    else topType='intShame_mild';
  } else if(es>is*1.3&&es>g){
    if(es>30) topType='extShame_sev';
    else if(es>18) topType='extShame_mod';
    else topType='extShame_mild';
  } else if(g>0&&is>es&&is>=g) topType='guilt_intShame';
  else if(is>0&&es>0&&is<=es*1.3&&es<=is*1.3) topType='intShame_extShame';
  else if(is>=es) topType='intShame_mild';
  else topType='extShame_mild';
  if(!TYPES[topType]) topType='intShame_mild';
  const f=TYPES[topType];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('hlTitleReveal').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥灵之钥</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-quote">「'+f.quote+'」</div><div class="ss-footer">hourlightkey.com ✦ </div></div><div class="hl-title-card"><div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div><div class="hl-title-eyebrow">Hour Light ✦ 內疚vs羞愧觉察</div><span class="hl-title-icon">'+f.icon+'</span><div class="hl-title-main">'+f.name+'</div><div class="hl-title-sub">'+f.sub+'</div><div class="hl-title-divider"></div><div class="hl-title-grid"><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 自責模式</div><div class="hl-title-tag-value">'+f.name+'</div></div><div class="hl-title-tag" style="grid-column:1/-1"><div class="hl-title-tag-label">✦ 觉察关键字</div><div class="hl-title-tag-value">'+f.keys.join(' · ')+'</div></div></div><div class="hl-title-quote">「'+f.quote+'」</div><div class="hl-title-combo-hint">'+f.name+'｜'+f.sub+'</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">內疚vs羞愧觉察 Guilt vs Shame</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  const sorted=Object.keys(DIMS).sort((a,b)=>dimScores[b]-dimScores[a]);
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var pct=Math.round(dimScores[k]/maxPossible*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+DIMS[k]+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">'+f.icon+' 你的自責模式</div><div class="result-section-content">'+f.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度觉察</div><div class="result-section-content">'+f.detail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🌿 认知芳疗配方</div><div class="result-section-content">'+f.oil+'</div></div><div class="result-section" style="text-align:center;font-family:LXGW WenKai TC,serif;font-size:1.05rem;color:#8b6914"><div class="result-section-content"></div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ H.O.U.R. 觉察橋接</div><div class="hour-bridge-text">你的自責模式是「情緒层的你」，馥灵秘码看的是「设定层的你」。<br>当你知道自己的羞愧从哪裡來，你才能决定要不要繼續扛著它。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免费解码馥灵秘码 →</a>';
  window._resultText=f.icon+' 我是「'+f.name+'」！'+f.sub+'\n「'+f.quote+'」\n\n你的自責是哪一種？👉 hourlightkey.com/sc/quiz-guilt-shame.html';
  try{localStorage.setItem('hl_quiz_guilt_shame',JSON.stringify({type:topType,dimScores,ts:Date.now()}));}catch(e){}
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_dropMaterial) HL_dropMaterial('quiz');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz',toolName:'內疚vs羞愧识別器'});window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
</script>
