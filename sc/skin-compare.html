/* 区塊标题 */

<script>
'use strict';
(function(){

  var API_ENDPOINT = 'https://app.hourlightkey.com/api/reading-services?type=skin-compare';
  var currentUid = null;
  var allReports = [];        // 所有报告
  var clientGroups = {};       // { '客人名': [report, ...] }
  var currentClient = null;    // 当前选的客戶名
  var selectedOld = null;      // 选的前次报告
  var selectedNew = null;      // 选的本次报告

  var stateBox = document.getElementById('stateBox');
  var clientSection = document.getElementById('clientSection');
  var reportSection = document.getElementById('reportSection');
  var compareView = document.getElementById('compareView');
  var resultBox = document.getElementById('resultBox');

  function toast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'sc-toast on';
    setTimeout(function(){ t.className = 'sc-toast'; }, 2400);
  }

  function setState(emoji, text, actionHtml) {
    stateBox.innerHTML = '<span class="emoji">' + emoji + '</span>' + text + (actionHtml || '');
    stateBox.style.display = 'block';
  }

  function hideState() { stateBox.style.display = 'none'; }

  // 日期格式化
  function fmtDate(ts) {
    if (!ts) return '—';
    var d = ts.toDate ? ts.toDate() : new Date(ts);
    if (isNaN(d.getTime())) return '—';
    return d.toISOString().slice(0, 10);
  }

  function daysBetween(a, b) {
    var da = a.toDate ? a.toDate() : new Date(a);
    var db = b.toDate ? b.toDate() : new Date(b);
    return Math.abs(Math.round((db - da) / (1000 * 60 * 60 * 24)));
  }

  // 等 Firebase 登录
  function waitForAuth() {
    if (typeof firebase === 'undefined' || !firebase.auth) {
      setTimeout(waitForAuth, 200);
      return;
    }
    firebase.auth().onAuthStateChanged(function(user){
      if (!user) {
        setState('🔐', '需要先登录才能看你的报告纪录', '<a href="member-login.html">前往登录</a>');
        return;
      }
      currentUid = user.uid;
      loadReports();
    });
  }

  // 读报告清单
  function loadReports() {
    setState('⏳', '正在读取你的焕颜报告...');
    firebase.firestore()
      .collection('users').doc(currentUid)
      .collection('skin_reports')
      .orderBy('createdAt', 'desc')
      .limit(200)
      .get()
      .then(function(snap){
        allReports = [];
        snap.forEach(function(doc){
          var d = doc.data();
          d._id = doc.id;
          allReports.push(d);
        });

        if (allReports.length < 2) {
          setState('📋',
            '你目前只有 ' + allReports.length + ' 份报告。<br>前后对比至少需要两份同一位客人的报告。',
            '<a href="skin-diagnosis.html">去做铂金智慧焕颜</a>');
          return;
        }

        groupByClient();
        renderClients();
        hideState();
        clientSection.style.display = 'block';
      })
      .catch(function(err){
        console.error('loadReports error:', err);
        setState('⚠️', '读取失败：' + err.message);
      });
  }

  // 依客戶分组
  function groupByClient() {
    clientGroups = {};
    allReports.forEach(function(r){
      var name = (r.clientName || '').trim() || '（未填客戶名）';
      if (!clientGroups[name]) clientGroups[name] = [];
      clientGroups[name].push(r);
    });
  }

  function renderClients() {
    var list = document.getElementById('clientList');
    list.innerHTML = '';
    var names = Object.keys(clientGroups);
    // 只显示至少 2 份报告的客戶
    names = names.filter(function(n){ return clientGroups[n].length >= 2; });

    if (names.length === 0) {
      list.innerHTML = '<div class="sc-state"><span class="emoji">📋</span>' +
        '目前還沒有哪位客戶有两份以上的报告。<br>' +
        '先多做几次焕颜，累積不同时期的资料再回来对比。</div>';
      return;
    }

    names.forEach(function(name){
      var reports = clientGroups[name];
      var latest = reports[0];  // orderBy desc 后最新在前
      var card = document.createElement('div');
      card.className = 'sc-client-card';
      card.innerHTML =
        '<div class="name">' + escapeHtml(name) + '</div>' +
        '<div class="meta">' + reports.length + ' 份报告 · 最新 ' + fmtDate(latest.createdAt) + '</div>';
      card.addEventListener('click', function(){ selectClient(name, card); });
      list.appendChild(card);
    });
  }

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, function(c){
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }

  function selectClient(name, cardEl) {
    currentClient = name;
    selectedOld = null;
    selectedNew = null;
    compareView.classList.remove('on');
    resultBox.classList.remove('on');

    // 更新客戶卡 active 状态
    var cards = document.querySelectorAll('.sc-client-card');
    cards.forEach(function(c){ c.classList.remove('active'); });
    if (cardEl) cardEl.classList.add('active');

    renderReports(clientGroups[name]);
    reportSection.style.display = 'block';
    reportSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderReports(reports) {
    var list = document.getElementById('reportList');
    list.innerHTML = '';

    reports.forEach(function(r){
      var item = document.createElement('div');
      item.className = 'sc-report-item';
      item.dataset.reportId = r._id;
      var excerpt = (r.report || '').replace(/\s+/g, ' ').slice(0, 80);
      item.innerHTML =
        '<div class="date">' + fmtDate(r.createdAt) + '</div>' +
        '<div class="excerpt">' + escapeHtml(excerpt) + (excerpt.length >= 80 ? '...' : '') + '</div>' +
        '<span class="tag"></span>';
      item.addEventListener('click', function(){ toggleReport(r, item); });
      list.appendChild(item);
    });
  }

  function toggleReport(report, el) {
    var rid = report._id;

    // 已是 old → 取消
    if (selectedOld && selectedOld._id === rid) {
      selectedOld = null;
      el.classList.remove('selected-old');
      updateCompareView();
      return;
    }
    // 已是 new → 取消
    if (selectedNew && selectedNew._id === rid) {
      selectedNew = null;
      el.classList.remove('selected-new');
      updateCompareView();
      return;
    }

    // 沒选 old → 先填 old
    if (!selectedOld) {
      selectedOld = report;
      el.classList.add('selected-old');
      updateCompareView();
      return;
    }

    // 已有 old，沒选 new → 填 new
    if (!selectedNew) {
      selectedNew = report;
      el.classList.add('selected-new');
      updateCompareView();
      return;
    }

    // 两个都满 → 提醒
    toast('已经选满两份，点已选的可以取消');
  }

  function updateCompareView() {
    if (!selectedOld || !selectedNew) {
      compareView.classList.remove('on');
      return;
    }

    // 确保 old 比 new 早（如果反过来自动对调）
    var oldT = selectedOld.createdAt.toDate ? selectedOld.createdAt.toDate() : new Date(selectedOld.createdAt);
    var newT = selectedNew.createdAt.toDate ? selectedNew.createdAt.toDate() : new Date(selectedNew.createdAt);
    if (oldT > newT) {
      var tmp = selectedOld;
      selectedOld = selectedNew;
      selectedNew = tmp;
      // 重新 render 选擇状态
      document.querySelectorAll('.sc-report-item').forEach(function(el){
        el.classList.remove('selected-old', 'selected-new');
        if (el.dataset.reportId === selectedOld._id) el.classList.add('selected-old');
        if (el.dataset.reportId === selectedNew._id) el.classList.add('selected-new');
      });
    }

    document.getElementById('oldDate').textContent = fmtDate(selectedOld.createdAt) + '（' + daysBetween(selectedOld.createdAt, selectedNew.createdAt) + ' 天前）';
    document.getElementById('newDate').textContent = fmtDate(selectedNew.createdAt);
    document.getElementById('oldText').textContent = selectedOld.report || '（无报告內容）';
    document.getElementById('newText').textContent = selectedNew.report || '（无报告內容）';

    renderPhotos(selectedOld.storagePaths || [], 'oldPhotos');
    renderPhotos(selectedNew.storagePaths || [], 'newPhotos');

    compareView.classList.add('on');
    setTimeout(function(){
      compareView.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }

  function renderPhotos(paths, containerId) {
    var container = document.getElementById(containerId);
    container.innerHTML = '';
    if (!paths || paths.length === 0) {
      container.innerHTML = '<div style="flex:1;text-align:center;font-size:.78rem;color:var(--ink-soft);padding:24px 0">无照片纪录</div>';
      return;
    }
    paths.forEach(function(path){
      var img = document.createElement('img');
      img.alt = '报告照片';
      container.appendChild(img);
      // Firebase Storage 拿 download URL
      try {
        firebase.storage().ref(path).getDownloadURL().then(function(url){
          img.src = url;
        }).catch(function(err){
          console.error('Storage URL failed:', err);
          img.style.opacity = '0.3';
        });
      } catch (e) {
        console.warn('Storage SDK not ready:', e);
      }
    });
  }

  // 产生分析
  document.getElementById('btnAnalyze').addEventListener('click', function(){
    if (!selectedOld || !selectedNew) {
      toast('请先选两份报告');
      return;
    }

    var btn = this;
    btn.disabled = true;
    btn.textContent = '分析中...';

    fetch(API_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        uid: currentUid,
        oldReportId: selectedOld._id,
        newReportId: selectedNew._id
      })
    })
    .then(function(res){ return res.json(); })
    .then(function(data){
      if (!data.ok) throw new Error(data.error || '分析失败');
      document.getElementById('resultText').textContent = data.comparison || '';
      document.getElementById('resultMeta').textContent =
        '对比：' + fmtDate(selectedOld.createdAt) + ' → ' + fmtDate(selectedNew.createdAt) +
        '　时距：' + daysBetween(selectedOld.createdAt, selectedNew.createdAt) + ' 天';
      resultBox.classList.add('on');
      setTimeout(function(){
        resultBox.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
      if (typeof gtag === 'function') {
        gtag('event', 'skin_compare_success', {});
      }
    })
    .catch(function(err){
      console.error('Analyze error:', err);
      toast('分析失败：' + err.message);
    })
    .finally(function(){
      btn.disabled = false;
      btn.textContent = '产生 28 天变化分析';
    });
  });

  // 列印
  document.getElementById('btnPrint').addEventListener('click', function(){
    window.print();
  });

  // 复制
  document.getElementById('btnCopy').addEventListener('click', function(){
    var text = document.getElementById('resultText').textContent;
    var meta = document.getElementById('resultMeta').textContent;
    var full = meta + '\n\n' + text;
    // iOS Safari 安全写法（參考 hl-ai-copy.js _syncCopy）
    try {
      var ta = document.createElement('textarea');
      ta.value = full;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.top = '50%'; ta.style.left = '50%';
      ta.style.opacity = '.01';
      document.body.appendChild(ta);
      if (/iP(hone|ad|od)/.test(navigator.userAgent)) {
        var range = document.createRange();
        range.selectNodeContents(ta);
        var sel = window.getSelection();
        sel.removeAllRanges(); sel.addRange(range);
        ta.setSelectionRange(0, full.length);
      } else {
        ta.select();
      }
      var ok = document.execCommand('copy');
      document.body.removeChild(ta);
      toast(ok ? '已复制到剪貼簿' : '复制失败，请手动选取');
    } catch (e) {
      toast('复制失败：' + e.message);
    }
  });

  // 换一组
  document.getElementById('btnNew').addEventListener('click', function(){
    selectedOld = null;
    selectedNew = null;
    compareView.classList.remove('on');
    resultBox.classList.remove('on');
    document.querySelectorAll('.sc-report-item').forEach(function(el){
      el.classList.remove('selected-old', 'selected-new');
    });
    reportSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  // 开工
  waitForAuth();

})();
</script>

</body>
</html>
