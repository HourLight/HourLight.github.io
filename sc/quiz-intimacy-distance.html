const DIMS={close:'靠近需求',mid:'平衡感',far:'距离需求',push:'推拉掙扎'};
const TYPES={
  island:{name:'孤島型',icon:'🏝️',sub:'你在自己的島上活得挺好的，海水就是你的城墙',
    keys:['独立自足','不需要人','情感隔离'],
    desc:'你跟人之间的距离是最远的那種。不是故意冷漠，是你真的觉得一个人比較自在。你有自己的节奏、自己的世界、自己的方式。別人靠近的時候你会本能地退後，不是討厭他們，是你的个人空间比大多數人大很多。你的島很舒服，有书有音樂有你喜欢的一切。你只是不太需要另一个人出現在島上。',
    detail:'孤島型的底层通常有兩種可能。一種是「迴避依附」，你在成長过程中学到了「需要別人是危险的」。也许你表达需求的時候被忽略了，也许你靠近的時候被推开了。你的身体记住了那个经验，所以它选擇不再靠近。另一種可能是你真的天生需要比較多的独处空间，這不是问题，只是你的出廠设定。\n\n但值得留意的是：你的「不需要」是真的不需要，还是「需要了会失望所以不如不需要」？如果你在一个人待久了会有一阵空虛，那就不是不需要，是你把那个开关关掉了。\n\n觉察邀请：這週主动跟一个人约一杯咖啡。不聊什麼嚴肅的事。只是练習「有人在旁边也是可以的」。你的島不会因为有人來访就沉掉。',
    oil:'玫瑰 1 滴＋佛手柑 2 滴＋甜橙 2 滴。玫瑰轻轻打开你的心。佛手柑降低你对靠近的防備。甜橙让「有人在旁边」变得不那麼有压力。',
    med:'閉上眼睛。想像你的島，海水环繞。吸气四秒，感觉脚下的沙。吐气六秒，不用改变什麼，就坐在這裡。远远的海平线上有一艘船，它只是路过。吸气四秒，你对它点个头。吐气六秒，它繼續往前走了。重複三次。张开眼睛。今天有没有一个人，你可以传一句「我想到你了」？不用解释，只是传。',
    quote:'你的島很美。但偶爾让一艘船靠岸，不会让島变小。'},
  fortress:{name:'城堡型',icon:'🏰',sub:'你盖了一座很坚固的城堡，但忘了留一扇门',
    keys:['高度防衛','情感压抑','自给自足'],
    desc:'你跟孤島型有点像，但不同的是你的距离不是天生的，是你盖出來的。你的城墙是一塊一塊用过去的傷痕堆起來的。你知道亲密关係是什麼感觉，你嚐过，然後你受傷了。所以你决定盖一座城堡，把自己保护起來。城堡很安全，但也很寂寞。',
    detail:'城堡型通常跟过去的关係创傷有关。被背叛、被拋棄、被忽視、被利用。你的身体从那些经验裡学到了一件事：「靠近的人都会傷你。」所以你的解决方案是不让任何人靠近到可以傷你的距离。\n\n你可能看起來很独立、很坚強、什麼都不缺。但你知道那面墙後面有什麼。你知道你半夜三点醒來的時候，城堡裡有多空曠。你只是怕让人进來之後又被留在空城堡裡。\n\n觉察邀请：你不需要拆掉城墙。但也许可以开一扇小窗。让一个你信任的人看到裡面。不是把门打开，只是让光透进來。一扇窗就好。',
    oil:'乳香 2 滴＋檀香 2 滴＋玫瑰 1 滴。乳香帮你跟过去的傷和解。檀香让你在安全的情境裡放下戒備。玫瑰是你心裡那扇窗的第一道光。',
    med:'閉上眼睛。你在城堡裡，墙很厚，但你找到一扇窗。吸气四秒，把窗子推开一点。外面有光。吐气六秒，让那道光照在你的手上。不用开门，只是开一扇窗。吸气四秒，感觉光的温度。吐气六秒，说：「我让光进來了，城堡还在。」重複四次。张开眼睛。今天，让一个你信任的人多看到一点点真實的你。',
    quote:'你的城堡保护了你。但裡面那个人也需要阳光。'},
  satellite:{name:'衛星型',icon:'🛰️',sub:'你繞著別人转，但永远不降落',
    keys:['观察者','保持距离','怕被吞噬'],
    desc:'你跟人的距离很奇妙。你很在乎，在乎到你会观察对方的一举一动、记住对方说过的每句话、默默替对方做很多事。但你永远維持在一个「軌道」上，繞著转但不降落。你怕的不是靠近，你怕的是「靠近之後失去自己」。',
    detail:'衛星型的人通常有很強的观察力和同理心。你能「读」懂別人的情緒，知道他們需要什麼。但你选擇在安全距离观察，而不是进入。因为你有一个深层的恐懼：「如果我完全进入一段关係，我会消失。」\n\n這可能跟你的成長经验有关。也许你在家裡是那个「为別人的情緒負責」的小孩。也许你经历过一段让你失去自我的关係。你的衛星軌道是你找到的平衡：既能看见对方，又不会被对方的引力拉垮。\n\n觉察邀请：這週试著「降落」一次。跟一个安全的人分享你真正的感受。不是你观察到的「他的」感受，是你自己的。让你的存在不只是环繞，而是著陸。',
    oil:'岩兰草 2 滴＋薰衣草 2 滴＋甜橙 1 滴。岩兰草把你从軌道上拉回地面。薰衣草让降落的过程是柔软的。甜橙告诉你地面上也有好東西。',
    med:'閉上眼睛。想像你在軌道上繞著地球转。吸气四秒，感觉那个速度。吐气六秒，开始慢下來。第三次呼吸的時候，軌道慢慢降低，地面越來越近。吸气四秒，你轻轻降落了，脚踩在地上。吐气六秒，说：「我落地了，我还是我。」重複三次。张开眼睛。今天说一件只关於你自己的感受，不是你观察到別人的事。',
    quote:'你观察得很仔细。但他們也想看到你。不只是你的关心，是你這个人。'},
  elastic:{name:'弹性安全型',icon:'🌿',sub:'你知道什麼時候靠近、什麼時候退开，而且都是自在的',
    keys:['安全依附','弹性调节','关係舒适'],
    desc:'恭喜你，你的刺蝟距离是最健康的那種。你能靠近也能离开，而且兩種狀态你都不焦慮。你想跟人在一起的時候就在一起，想要空间的時候也能温柔地表达。你不怕被拋棄，也不怕被吞噬。你在关係裡是松的、流动的、有弹性的。',
    detail:'弹性安全型对应的是心理学裡的「安全依附」。這通常意味著你在成長过程中有过至少一个「稳定的、可预测的、回应你需求的」照顾者。你的身体学到了一件很重要的事：「靠近是安全的，离开也是安全的。」\n\n但安全依附不代表你永远不会焦慮。压力大的時候、遇到重大失落的時候，你也可能暫時偏向某一端。你的优势是你有「回到中间」的能力。你知道那个平衡点在哪裡，而且你能找到路回去。\n\n觉察邀请：你的关係模式很好。你要做的是維护它，以及理解不是每个人都有這麼好的出发点。当你身边有人过度黏或过度远，不是他們故意的，是他們的刺蝟距离跟你不同。',
    oil:'薰衣草 2 滴＋甜橙 2 滴＋乳香 1 滴。這是保养配方不是修复配方。薰衣草維持你的安全基调。甜橙保持你的温暖连結。乳香让你在安全裡繼續深化。',
    med:'閉上眼睛。感觉今天的你。吸气四秒，想一个你在乎的人。吐气六秒，感觉這份在乎是轻的，流动的，不是压著你的。再一次。吸气四秒，问自己：「今天我想靠近谁？」吐气六秒，让名字自然浮現。重複三次。张开眼睛。不用做什麼大的事，今天任何一个小动作都可以是一種靠近。',
    quote:'你找到了那个剛好的距离。繼續在那裡。偶爾帮別人也找到他們的。'},
  magnet:{name:'磁鐵型',icon:'🧲',sub:'你渴望连結到幾乎要把对方吸进來',
    keys:['渴望亲密','分离焦慮','怕被拋棄'],
    desc:'你跟人之间的距离是最近的那種。你喜欢黏在一起、随時联络、分享一切。你的愛很濃烈，你的需要很直接。当对方回讯息慢了、取消约会了、跟別人比較亲了，你会焦慮。不是你不独立，是「跟重要的人连在一起」对你來说等於「安全」。断线就像断氧。',
    detail:'磁鐵型对应的是「焦慮依附」。你的身体在成長过程中经历了一種不确定性：照顾者有時候在、有時候不在。你不知道他什麼時候会回应你、什麼時候会消失。所以你的策略是「靠得越近越好」，因为距离等於危险。\n\n你的愛不是「太多」。你的愛是你确认安全的方式。但问题是你的安全感建立在「对方的回应」上，而不是你自己的內在。当对方已读不回，你的安全感就碎了。這让你在关係裡很累，也让对方很有压力。\n\n觉察邀请：下次你想传第三則讯息的時候，暫停。把手放在胸口，做三次呼吸。问自己：「我現在是在表达愛，还是在确认他还在？」如果是後者，先安撫自己，再决定要不要传。',
    oil:'薰衣草 3 滴＋岩兰草 2 滴。薰衣草直接安撫你的分离焦慮。岩兰草让你的安全感从外在挪回內在。不是不让你靠近別人，是让你在自己身上也找得到温暖。',
    med:'閉上眼睛。把双手放在胸口。吸气四秒，感觉手掌貼著胸口的温度。吐气六秒，对自己说：「我在這裡。」再一次。吸气四秒，感觉那个温度。吐气六秒，说：「在得到任何回应之前，我就已经存在了。」重複四次。每次吐气，那个等待的焦慮就小一点点。不是消失，是小了一点。张开眼睛。你剛才在陪自己，這也是一種愛。',
    quote:'你的愛很真很濃。但你不需要对方的每一个回应來证明自己值得被愛。'},
  pushpull:{name:'推拉型',icon:'🌊',sub:'你想靠近又想逃，想逃又想靠近，在兩端之间不停擺盪',
    keys:['矛盾依附','忽冷忽熱','自我保护'],
    desc:'你在关係裡的距离一直在变。有時候你想跟对方黏在一起、想被拥抱、想全然地信任。但靠近到某个点的時候，你会突然害怕，然後推开。推开之後又觉得空虛，於是又想靠近。你的伴侶可能觉得你忽冷忽熱很难捉摸，但你自己也很累，因为你同時想要又害怕你想要的東西。',
    detail:'推拉型对应的是「矛盾依附」（fearful-avoidant）。你同時拥有靠近的渴望和远离的恐懼。這通常源自一種矛盾的早期经验：给你愛的人同時也是让你受傷的人。你学到了一件很困惑的事：「愛和痛是綁在一起的。」\n\n所以你的每一次靠近都伴随著预期的傷害。你在伸手的同時已经在准備缩回去。這不是你故意的，是你的身体记住了「靠近之後会发生坏事」的模式。\n\n觉察邀请：你需要的不是「决定要靠近还是远离」。你需要的是一个「靠近了之後不会受傷」的经验。一次就好。找一个安全的人（可以是朋友、可以是专业的陪伴者），练習靠近了之後待在那裡。不逃。让你的身体学到新的模式：靠近也可以是安全的。',
    oil:'天竺葵 2 滴＋薰衣草 2 滴＋乳香 1 滴。天竺葵平衡你推和拉的兩股力量。薰衣草安撫你靠近時的恐懼。乳香让你在矛盾裡找到一个暫時的落脚点。',
    med:'閉上眼睛。想像你站在门口，门一半开著。吸气四秒，不用决定要进去还是出來，就在门口站著。吐气六秒，感觉兩脚踩在地上，门口的地也是實的。吸气四秒，说：「我可以在中间待一下。」吐气六秒。重複三次。最後一次说：「靠近和远离，都不是一輩子的事。」张开眼睛。今天找一个你可以待住的距离，哪怕只有五分鐘。',
    quote:'同時渴望又害怕，慢慢來。找到一个你敢停下來的地方。'},
  chameleon:{name:'变色龍型',icon:'🦎',sub:'你的距离取决於对方想要多近，你会自动调整',
    keys:['过度配合','失去自我','怕被嫌棄'],
    desc:'你在每段关係裡的距离都不一样，不是因为你很有弹性，是因为你在配合对方。对方想黏你就黏，对方想要空间你就退。你的距离感不是从自己內在長出來的，是从对方的需求反推出來的。你很会读空气、很会调整、很会让对方舒服。但你可能不知道「自己」最舒服的距离是什麼。',
    detail:'变色龍型的底层通常是「如果我不配合，对方就会离开」的恐懼。你学会了用「让別人舒服」來确保关係的存續。這很累。因为你一直在做翻译的工作：翻译对方想要什麼，然後把自己翻译成那个样子。\n\n你可能在不同的朋友面前是不同的人。跟外向的朋友在一起你变得很嗨，跟安静的朋友在一起你变得很沉稳。你以为這是适应力好，但如果你一个人的時候不知道自己是什麼样子，那就不是适应，是消失。\n\n觉察邀请：這週跟一个信任的朋友约出來，然後什麼都不配合。不去猜他想聊什麼、不去调整你的语速和音量。就做你自己。看看結果是什麼。大部分時候，結果会比你想的好得多。',
    oil:'迷迭香 2 滴＋雪松 2 滴＋佛手柑 1 滴。迷迭香帮你找到自己的声音。雪松让你長出自己的根，不用攀附在別人身上。佛手柑让做自己的过程不那麼可怕。',
    med:'閉上眼睛。這次，问的不是別人想要什麼。吸气四秒，问自己：「今天，我想要什麼？」吐气六秒，让答案慢慢浮出來。再一次。吸气四秒，如果答案是空白的，也没关係。吐气六秒，那个空白也是讯号，你还不習慣问自己。重複三次。张开眼睛。今天说一次「我比較想要，」，完整说出你自己的偏好，不用配合任何人。',
    quote:'你很会读別人。現在练習读自己。你想要什麼距离？'},
  bridge:{name:'橋樑型',icon:'🌉',sub:'你擅長拉近人跟人之间的距离，但常常忘了自己也需要被拉近',
    keys:['连結者','忽略自我需求','关係推手'],
    desc:'你是人群裡的橋樑。你擅長让不同的人靠近、让关係变好、让气氛变温暖。你可能是那个在群组裡主动约聚会的人、在朋友之间传话和解的人、在家族裡把大家连在一起的人。你的刺蝟距离在帮別人的時候很完美，但在面对自己的亲密关係時就会出问题。',
    detail:'橋樑型的人通常把注意力放在「別人的关係」而不是「自己的关係」。你帮別人修复了十段友情，但你自己最深的孤独没有人知道。因为你永远是那个帮忙的人，不是被帮的人。你不習慣说「我需要」，你習慣说「你需要什麼」。\n\n你的关係裡可能有一種微妙的不平衡：你付出很多，但接收很少。不是別人不给你，是你不太会接。有人想靠近你的時候，你会不自觉地把角色切換成「服務模式」，帮对方解决问题而不是让对方看到你的脆弱。\n\n觉察邀请：這週让一个人帮你一件事。不是大事，可以是帮你倒杯水、聽你抱怨五分鐘、陪你走一段路。练習从「橋」变成「走在橋上的人」。',
    oil:'天竺葵 2 滴＋薰衣草 1 滴＋檀香 2 滴。天竺葵平衡你的给予和接收。薰衣草提醒你也可以被照顾。檀香连結你跟自己最深的需求。',
    med:'閉上眼睛。想像你站在一座橋上，這次有个人从对面走來，要帮你。吸气四秒，让他靠近，你不用側身让路。吐气六秒，他把手放在你肩上。吸气四秒，感觉那个重量被接住了。吐气六秒，说：「我也可以被照顾。」重複三次。张开眼睛。今天让一个人帮你一件小事，说「谢谢」而不是「不用了」。',
    quote:'你连接了很多人。但谁在连接你？让別人也走到你這一边來。'}
};
let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 题 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一题</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一题 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看看我的刺蝟距离 🦔</button>')+'</div>';area.appendChild(card);});updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 题，共 '+questions.length+' 题';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const dimScores={};Object.keys(DIMS).forEach(k=>{dimScores[k]=0;});
  Object.keys(answers).forEach(qi=>{const oi=answers[qi];const s=questions[qi].opts[oi].s;Object.keys(s).forEach(d=>{dimScores[d]+=s[d];});});
  const maxPossible=Object.keys(answers).length*3;
  const c=dimScores.close,m=dimScores.mid,f=dimScores.far,p=dimScores.push;
  let topType;
  if(m>c&&m>f&&m>p) topType='elastic';
  else if(p>c&&p>m&&p>f) topType='pushpull';
  else if(c>f*1.5&&c>m&&c>p) topType='magnet';
  else if(f>c*1.5&&f>m&&f>p) topType=(f>20)?'island':'fortress';
  else if(f>c&&f>m&&p>c) topType='fortress';
  else if(c>f&&c>m&&p>0&&p>=m) topType='chameleon';
  else if(c>f&&m>p) topType='bridge';
  else if(f>c) topType='satellite';
  else topType='elastic';
  const ft=TYPES[topType];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('hlTitleReveal').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥灵之钥</div><div class="ss-icon">'+ft.icon+'</div><div class="ss-title">'+ft.name+'</div><div class="ss-sub">'+ft.sub+'</div><div class="ss-quote">「'+ft.quote+'」</div><div class="ss-footer">hourlightkey.com ✦ </div></div><div class="hl-title-card"><div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div><div class="hl-title-eyebrow">Hour Light ✦ 刺蝟距离觉察</div><span class="hl-title-icon">'+ft.icon+'</span><div class="hl-title-main">'+ft.name+'</div><div class="hl-title-sub">'+ft.sub+'</div><div class="hl-title-divider"></div><div class="hl-title-grid"><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 距离类型</div><div class="hl-title-tag-value">'+ft.name+'</div></div><div class="hl-title-tag" style="grid-column:1/-1"><div class="hl-title-tag-label">✦ 觉察关键字</div><div class="hl-title-tag-value">'+ft.keys.join(' · ')+'</div></div></div><div class="hl-title-quote">「'+ft.quote+'」</div><div class="hl-title-combo-hint">'+ft.name+'｜'+ft.sub+'</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+ft.icon+'</span><div class="result-type-label">刺蝟距离觉察 Hedgehog Dilemma</div><div class="result-combo-name">'+ft.name+'</div><div class="result-subtitle">'+ft.sub+'</div>';
  const sorted=Object.keys(DIMS).sort((a,b)=>dimScores[b]-dimScores[a]);
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var pct=Math.round(dimScores[k]/maxPossible*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+DIMS[k]+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">'+ft.icon+' 你的刺蝟距离</div><div class="result-section-content">'+ft.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度觉察</div><div class="result-section-content">'+ft.detail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🌿 认知芳疗配方</div><div class="result-section-content">'+ft.oil+'</div></div>'+(ft.med?'<div class="result-section"><div class="result-section-title">🧘 随時可做的觉察冒想</div><div class="result-section-content">'+ft.med.replace(/\n/g,'<br>')+'</div></div>':'')+'<div class="result-section" style="text-align:center;font-family:LXGW WenKai TC,serif;font-size:1.05rem;color:#8b6914"><div class="result-section-content"></div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ H.O.U.R. 觉察橋接</div><div class="hour-bridge-text">你的刺蝟距离是「关係裡的你」，馥灵秘码看的是「设定裡的你」。<br>你跟人的距离，跟你对自己的距离，其實是同一个答案。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免费解码馥灵秘码 →</a>';
  window._resultText=ft.icon+' 我是「'+ft.name+'」！'+ft.sub+'\n「'+ft.quote+'」\n\n你的刺蝟距离是多少？👉 hourlightkey.com/sc/quiz-intimacy-distance.html';
  try{localStorage.setItem('hl_quiz_intimacy_distance',JSON.stringify({type:topType,dimScores,ts:Date.now()}));}catch(e){}
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_dropMaterial) HL_dropMaterial('quiz');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz',toolName:'亲密距离量表'});window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
</script>
