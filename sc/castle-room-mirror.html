<html lang="zh-Hans-CN">

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>镜之厅｜你的内在城堡｜馥灵之钥 Hour Light</title>
<meta name="description" content="镜之厅是你最诚实的空间。每天来看看镜子里的自己，留下一份觉察。"/>
<link rel="canonical" href="https://hourlightkey.com/sc/castle-room-mirror.html"/>
<link rel="icon" href="../favicon.ico"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&family=LXGW+WenKai+TC&family=Noto+Serif+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fdf6ef;
  --bg2:#f7ede2;
  --card:rgba(255,255,255,.92);
  --warm:#3e2a1a;
  --warm2:#6b4a30;
  --muted:#9a7a60;
  --gold:#c8862a;
  --gold-l:#e8b86d;
  --gold-ll:#f5dfa8;
  --teal:#2a8a7c;
  --teal-l:#4eb8a8;
  --rose:#c0334d;
  --rose-l:#e85a72;
  --navy:#1a3050;
  --accent:#c0334d;
  --border:rgba(200,134,42,.15);
  --shadow:0 8px 32px rgba(62,42,26,.08);
  --shadow-lg:0 20px 60px rgba(62,42,26,.14);
}
html{scroll-behavior:smooth}
body{
  font-family:'Noto Serif TC',serif;
  color:var(--warm);
  background:var(--bg);
  min-height:100vh;min-height:100dvh;
  overflow-x:hidden;
}

/* ── Topbar ── */
.topbar{
  position:sticky;top:0;z-index:300;
  height:52px;
  background:rgba(253,246,239,.94);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;
}
@media(min-width:521px){.topbar{-webkit-backdrop-filter:none;backdrop-filter:none;background:#fdf6ef}}
.topbar-back{
  display:flex;align-items:center;gap:6px;
  font-size:.78rem;color:var(--muted);text-decoration:none;
  transition:color .2s;
}
.topbar-back:hover{color:var(--warm)}
.topbar-title{
  font-family:'Playfair Display',serif;
  font-size:.95rem;font-weight:700;color:var(--warm);
  letter-spacing:.06em;
}
.topbar-right{display:flex;align-items:center;gap:10px}
.room-completeness{
  font-size:.7rem;color:var(--muted);
  display:flex;align-items:center;gap:5px;
}
.completeness-bar{
  width:48px;height:4px;
  background:rgba(200,134,42,.15);
  border-radius:2px;overflow:hidden;
}
.completeness-fill{
  height:100%;
  background:linear-gradient(90deg,var(--gold),var(--gold-l));
  border-radius:2px;
  transition:width .6s cubic-bezier(.16,1,.3,1);
}

/* ── 页首装饰条 ── */
.room-header{
  padding:20px 18px 0;
  display:flex;align-items:baseline;gap:10px;
}
.room-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:.68rem;letter-spacing:.12em;color:var(--muted);
  background:rgba(200,134,42,.08);
  border:1px solid var(--border);
  border-radius:20px;padding:3px 12px;
  text-transform:uppercase;
}
.room-phase{
  font-size:.68rem;color:var(--gold);letter-spacing:.1em;
}
.servant-greeting{margin:8px 18px 0;padding:12px 16px;background:linear-gradient(135deg,rgba(200,134,42,.06),rgba(42,138,124,.04));border:1px solid var(--border);border-radius:14px;font-size:.82rem;color:var(--warm2);line-height:1.6;text-align:center}

/* ══════════════════════════════
   SVG 房间场景
══════════════════════════════ */
.room-scene-wrap{
  margin:12px 16px 0;
  border-radius:24px;
  overflow:hidden;
  border:1.5px solid var(--border);
  box-shadow:var(--shadow-lg);
  background:#1a0e08;
  position:relative;
  cursor:pointer;
}
.room-scene-wrap:hover .scene-hint{opacity:1}
.scene-hint{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.55);color:rgba(255,248,235,.85);
  font-size:.68rem;padding:5px 14px;border-radius:20px;
  letter-spacing:.08em;white-space:nowrap;
  opacity:0;transition:opacity .3s;pointer-events:none;
  -webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);
}

/* ── 家具插槽浮层 ── */
.furniture-slot{
  cursor:pointer;
  transition:filter .25s;
}
.furniture-slot:hover{filter:brightness(1.25) drop-shadow(0 0 8px rgba(232,184,109,.6))}
.furniture-slot.occupied{cursor:default}
.furniture-slot.occupied:hover{filter:drop-shadow(0 0 6px rgba(232,184,109,.4))}
.slot-empty{
  opacity:.35;
  transition:opacity .25s;
}
.furniture-slot:hover .slot-empty{opacity:.6}

/* ══════════════════════════════
   今日状态区
══════════════════════════════ */
.status-strip{
  margin:14px 16px 0;
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:8px;
}
.status-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px 10px;
  text-align:center;
}
.status-icon{font-size:18px;margin-bottom:3px;display:block}
.status-label{font-size:.62rem;color:var(--muted);letter-spacing:.06em;display:block;margin-bottom:2px}
.status-val{font-size:.88rem;font-weight:700;color:var(--warm);display:block}

/* ══════════════════════════════
   照料动作区
══════════════════════════════ */
.care-section{
  margin:14px 16px 0;
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:20px;
  padding:18px 16px;
}
.care-title{
  font-family:'Playfair Display',serif;
  font-size:.88rem;font-weight:700;color:var(--warm);
  letter-spacing:.06em;margin-bottom:14px;
  display:flex;align-items:center;gap:7px;
}
.care-title::after{
  content:'';flex:1;height:1px;
  background:var(--border);
}
.care-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.care-btn{
  display:flex;flex-direction:column;align-items:center;
  gap:5px;padding:14px 8px;
  border-radius:14px;border:1.5px solid var(--border);
  background:rgba(200,134,42,.04);
  cursor:pointer;transition:all .22s;
  font-family:'Noto Serif TC',serif;
  position:relative;overflow:hidden;
}
.care-btn::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 110%,rgba(200,134,42,.18),transparent 70%);
  opacity:0;transition:opacity .3s;
}
.care-btn:hover{
  border-color:rgba(200,134,42,.45);
  background:rgba(200,134,42,.08);
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(200,134,42,.12);
}
.care-btn:hover::before{opacity:1}
.care-btn.done{
  border-color:rgba(42,138,124,.4);
  background:rgba(42,138,124,.06);
  cursor:default;
  opacity:.7;
}
.care-btn.done:hover{transform:none;box-shadow:none}
.care-btn-icon{font-size:22px;line-height:1}
.care-btn-label{font-size:.68rem;color:var(--warm2);font-weight:500;text-align:center;line-height:1.3}
.care-btn-done-mark{
  position:absolute;top:6px;right:6px;
  width:16px;height:16px;
  background:var(--teal);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:#fff;font-weight:700;
  opacity:0;transform:scale(0);
  transition:all .3s cubic-bezier(.16,1,.3,1);
}
.care-btn.done .care-btn-done-mark{opacity:1;transform:scale(1)}
.care-result{
  margin-top:12px;padding:12px 14px;
  background:rgba(42,138,124,.06);
  border:1px solid rgba(42,138,124,.2);
  border-radius:12px;
  font-family:'LXGW WenKai TC','Noto Serif TC',serif;
  font-size:.82rem;color:var(--warm2);line-height:1.8;
  display:none;
  animation:fadeSlideUp .4s ease;
}
.care-result.show{display:block}

/* ══════════════════════════════
   谜语（觉察问答）区
══════════════════════════════ */
.riddle-section{
  margin:14px 16px 0;
}
.section-label{
  font-size:.68rem;letter-spacing:.12em;color:var(--muted);
  text-transform:uppercase;margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.riddle-card{
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:20px;
  padding:20px 16px;
  box-shadow:var(--shadow);
}
.riddle-type-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:.63rem;letter-spacing:.1em;color:var(--gold);
  border:1px solid rgba(200,134,42,.25);
  border-radius:20px;padding:3px 10px;
  margin-bottom:12px;background:rgba(200,134,42,.05);
}
.riddle-q{
  font-family:'LXGW WenKai TC','Noto Serif TC',serif;
  font-size:1rem;color:var(--warm);line-height:1.75;
  margin-bottom:16px;
}
.riddle-opts{display:flex;flex-direction:column;gap:8px}
.riddle-opt{
  padding:12px 14px;
  border:1.5px solid var(--border);
  border-radius:12px;
  background:rgba(200,134,42,.03);
  cursor:pointer;
  font-size:.88rem;color:var(--warm2);
  line-height:1.55;
  transition:all .2s;
  position:relative;
}
.riddle-opt::before{
  content:'';position:absolute;left:0;top:0;
  width:3px;height:100%;
  background:var(--rose);
  border-radius:3px 0 0 3px;
  transform:scaleY(0);transition:transform .22s;
}
.riddle-opt:hover{
  border-color:rgba(200,134,42,.4);
  background:rgba(200,134,42,.07);
  transform:translateX(3px);
}
.riddle-opt:hover::before,.riddle-opt.sel::before{transform:scaleY(1)}
.riddle-opt.sel{
  border-color:rgba(192,51,77,.4);
  background:rgba(192,51,77,.06);
  color:var(--warm);font-weight:500;
}
/* 香气选卡 */
.aroma-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.aroma-card{
  padding:14px 10px;
  border:1.5px solid var(--border);
  border-radius:14px;
  background:rgba(200,134,42,.03);
  cursor:pointer;text-align:center;
  transition:all .22s;
}
.aroma-card:hover{border-color:rgba(200,134,42,.4);background:rgba(200,134,42,.07);transform:translateY(-2px)}
.aroma-card.sel{border-color:rgba(42,138,124,.45);background:rgba(42,138,124,.07)}
.aroma-icon{font-size:24px;margin-bottom:5px;display:block}
.aroma-name{font-size:.75rem;font-weight:700;color:var(--warm);margin-bottom:2px}
.aroma-note{font-size:.65rem;color:var(--muted);line-height:1.4}
/* 洞见 */
.insight-box{
  margin-top:14px;
  padding:16px;
  background:linear-gradient(135deg,rgba(26,48,80,.04),rgba(42,138,124,.04));
  border:1px solid rgba(42,138,124,.2);
  border-radius:14px;
  display:none;
  animation:fadeSlideUp .5s ease;
}
.insight-box.show{display:block}
.insight-txt{
  font-family:'LXGW WenKai TC','Noto Serif TC',serif;
  font-size:.88rem;color:var(--warm2);line-height:1.9;
}
.insight-txt strong{color:var(--warm);font-weight:700}
/* 完成按钮 */
.btn-complete{
  display:block;width:100%;
  margin-top:16px;padding:14px;
  background:linear-gradient(135deg,var(--teal),var(--teal-l));
  color:#fff;border:none;border-radius:14px;
  font-family:'Playfair Display','Noto Serif TC',serif;
  font-size:.95rem;font-weight:700;letter-spacing:.06em;
  cursor:pointer;transition:all .25s;
  position:relative;overflow:hidden;
}
.btn-complete::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
  transform:translateX(-100%);transition:transform .5s;
}
.btn-complete:hover::after{transform:translateX(100%)}
.btn-complete:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(42,138,124,.3)}
.btn-complete:disabled{opacity:.35;cursor:default;transform:none;box-shadow:none}
.btn-complete:disabled::after{display:none}

/* ══════════════════════════════
   家具清单
══════════════════════════════ */
.furniture-section{
  margin:14px 16px 0;
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:20px;
  padding:18px 16px;
}
.furniture-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.furniture-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;
  border-radius:12px;
  background:rgba(200,134,42,.04);
  border:1px solid var(--border);
}
.furniture-item.placed{
  border-color:rgba(200,134,42,.3);
  background:rgba(200,134,42,.07);
}
.furniture-item-icon{font-size:20px;flex-shrink:0}
.furniture-item-info{flex:1;min-width:0}
.furniture-item-name{font-size:.82rem;font-weight:700;color:var(--warm)}
.furniture-item-desc{font-size:.68rem;color:var(--muted);line-height:1.4;margin-top:1px}
.furniture-item-action{
  padding:5px 12px;border-radius:20px;
  font-size:.68rem;font-weight:700;
  border:1px solid;cursor:pointer;
  transition:all .2s;font-family:inherit;
}
.btn-place{
  border-color:var(--gold);color:var(--gold);background:transparent;
}
.btn-place:hover{background:var(--gold);color:#fff}
.btn-placed{
  border-color:rgba(42,138,124,.4);color:var(--teal);
  background:rgba(42,138,124,.06);cursor:default;
}
.furniture-empty{
  text-align:center;padding:20px;
  font-size:.78rem;color:var(--muted);line-height:1.8;
}

/* ══════════════════════════════
   照料完成 Overlay
══════════════════════════════ */
.care-overlay{
  display:none;
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.45);
  align-items:center;justify-content:center;
  -webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);
}
.care-overlay.show{display:flex;animation:fadeIn .3s ease}
.care-modal{
  background:var(--bg);
  border:1.5px solid var(--border);
  border-radius:28px;
  padding:32px 24px 28px;
  max-width:340px;width:90%;
  text-align:center;
  box-shadow:var(--shadow-lg);
  animation:modalPop .5s cubic-bezier(.16,1,.3,1);
}
.care-modal-icon{font-size:3.2rem;margin-bottom:12px;display:block}
.care-modal-title{
  font-family:'Playfair Display',serif;
  font-size:1.25rem;font-weight:700;color:var(--warm);
  margin-bottom:6px;letter-spacing:.04em;
}
.care-modal-pts{
  display:inline-block;
  background:linear-gradient(135deg,var(--gold),var(--gold-l));
  color:#fff;padding:4px 16px;border-radius:20px;
  font-size:.78rem;font-weight:700;letter-spacing:.06em;
  margin-bottom:12px;
}
.care-modal-insight{
  font-family:'LXGW WenKai TC','Noto Serif TC',serif;
  font-size:.85rem;color:var(--warm2);line-height:1.85;
  margin-bottom:20px;
  padding:12px 14px;
  background:rgba(200,134,42,.06);
  border-radius:12px;
  border-left:3px solid var(--gold-l);
  text-align:left;
}
.care-modal-close{
  width:100%;padding:12px;
  border:1.5px solid var(--border);border-radius:12px;
  background:transparent;color:var(--warm2);
  font-size:.88rem;cursor:pointer;
  font-family:'Noto Serif TC',serif;transition:all .2s;
}
.care-modal-close:hover{background:rgba(200,134,42,.07);border-color:rgba(200,134,42,.35)}

/* ══════════════════════════════
   城堡完整度浮条
══════════════════════════════ */
.completion-banner{
  margin:14px 16px 0;
  background:linear-gradient(135deg,var(--navy),#2a4060);
  border-radius:16px;
  padding:14px 16px;
  display:flex;align-items:center;gap:12px;
}
.completion-pct{
  font-family:'Playfair Display',serif;
  font-size:1.5rem;font-weight:800;color:var(--gold-l);
  flex-shrink:0;
}
.completion-info{flex:1}
.completion-label{font-size:.72rem;color:rgba(245,223,168,.65);margin-bottom:4px;letter-spacing:.06em}
.completion-track{height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.completion-prog{
  height:100%;
  background:linear-gradient(90deg,var(--gold),var(--gold-l));
  border-radius:3px;
  transition:width .8s cubic-bezier(.16,1,.3,1);
}
.completion-sub{font-size:.65rem;color:rgba(245,223,168,.5);margin-top:4px}

/* ── 底部 ── */
.bottom-nav-row{
  margin:20px 16px 8px;
  display:flex;gap:8px;
}
.room-nav-btn{
  flex:1;padding:11px;
  border-radius:12px;
  font-size:.75rem;font-weight:700;
  border:1.5px solid var(--border);
  background:var(--card);
  color:var(--warm2);
  cursor:pointer;
  font-family:'Noto Serif TC',serif;
  transition:all .2s;text-decoration:none;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.room-nav-btn:hover{border-color:rgba(200,134,42,.4);background:rgba(200,134,42,.06)}
.room-nav-btn.primary{
  background:linear-gradient(135deg,var(--gold),var(--gold-l));
  border-color:transparent;color:#fff;
}
.room-nav-btn.primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(200,134,42,.25)}
.bottom-pad{height:80px}

/* ── 动画 ── */
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes modalPop{from{opacity:0;transform:scale(.88) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes candleFlicker{0%,100%{transform:scaleY(1) scaleX(1)}25%{transform:scaleY(1.08) scaleX(.93)}50%{transform:scaleY(.95) scaleX(1.04)}75%{transform:scaleY(1.05) scaleX(.96)}}
@keyframes glowPulse{0%,100%{opacity:.5}50%{opacity:.85}}
@keyframes dustFloat{0%{transform:translateY(0) translateX(0);opacity:0}20%{opacity:.6}80%{opacity:.3}100%{transform:translateY(-40px) translateX(8px);opacity:0}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes heartbeat{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
/* ── Story Intro ── */
.story-intro{
  margin:12px 16px 0;
  padding:14px 18px;
  background:linear-gradient(135deg,rgba(255,255,255,.6),rgba(255,255,255,.3));
  border-left:3px solid var(--accent, var(--gold));
  border-radius:0 14px 14px 0;
  font-size:.85rem;color:var(--warm2, var(--warm));
  line-height:1.8;
  animation:storyFadeIn .8s ease both;
}
@keyframes storyFadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){
  .room-scene-wrap,.furniture-section,.diary-section,.aroma-section{margin-left:8px;margin-right:8px}
  .aroma-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .furniture-grid{grid-template-columns:repeat(2,1fr)}
  body{padding-bottom:72px}
}
@media(min-width:1024px){
  .room-scene-wrap,.furniture-section,.diary-section,.aroma-section{max-width:640px;margin-left:auto;margin-right:auto}
}

/* ── Mobile App Touch Feel ── */
body{-webkit-tap-highlight-color:transparent;overscroll-behavior-y:contain}
button,a,.riddle-opt,.aroma-card,.diary-entry,.aroma-item,.furniture-card{
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;min-height:44px;
}
button:active,a:active{transform:scale(.97);transition:transform .08s}
.riddle-opt:active,.aroma-card:active{transform:scale(.96);transition:transform .1s}
@media(max-width:600px){
  body{padding-bottom:calc(72px + env(safe-area-inset-bottom,0px))}
  .topbar{padding:0 14px}
  .topbar-back{min-height:44px;display:flex;align-items:center}
}
</style>

<script>
'use strict';

var ROOM_ID = 'mirror';
// 仆人问候
(function(){function showServant(){if(window.hlCastle&&hlCastle.getServant){var s=hlCastle.getServant(ROOM_ID);if(s){var el=document.getElementById('servantGreeting');if(el)el.innerHTML=s.emoji+' '+s.name+'：「'+s.greeting+'」';}}else{setTimeout(showServant,300);}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',showServant);}else{showServant();}})();
var ROOM_STORAGE = 'hl_room_mirror_v1';

// ── 照料动作设定 ──
var CARE_ACTS = {
  candle: {
    icon:'🕯️',
    label:'点燃蜡烛',
    pts: 2,
    svgEffect: function(){ animateCandleBright(); },
    insights:[
      '烛光是最诚实的光。它不美化，也不批判，只是静静照著你本来的样子。\n\n今天你坐在这束光里，已经是一份勇气。',
      '乳香（Boswellia sacra）燃烧时释放α-松烯，这个成分能跨越血脑屏障，让静坐的脑袋真正安静下来。\n\n几千年前的人就知道，点一根蜡烛，有些事就想通了。',
      '火焰往上，从来不往下。这是它的天性。\n\n你也有你的天性，你知道的。'
    ]
  },
  mirror: {
    icon:'🪞',
    label:'擦亮镜子',
    pts: 2,
    svgEffect: function(){ animateMirrorSheen(); },
    insights:[
      '镜子只照出你允许它照的部分。\n\n有多久没有认真看著镜子里的自己说一句「辛苦了」了？',
      '迷迭香（Rosmarinus officinalis）的1,8-桉叶素能改善工作记忆。「迷迭香是为了记忆」，莎士比亚说过。\n\n擦亮镜子，也是让记忆更清晰地看见自己。',
      '你怕看见的那个角落，正是最需要光的地方。\n\n不用一次全照，今天先让一点光进去就够了。'
    ]
  },
  flower: {
    icon:'🌿',
    label:'换一束花',
    pts: 2,
    svgEffect: function(){ animateFlowerAppear(); },
    insights:[
      '你为这个空间带来了生命。\n\n为自己做一件小事的人，才知道怎么照顾别人。',
      '薰衣草的主成分芳香醇（linalool）透过嗅觉直接作用在杏仁核，让紧绷的状态松下来。\n\n换花这个动作，是告诉自己：我值得被好好对待的空间。',
      '花不需要理由就开了。\n\n你也不需要理由就可以让自己好一点。'
    ]
  }
};

// ── 房间谜语（从 castle-riddles.js 的 ROOMS 取镜之厅）──
var _roomRiddle = null;

function todayKey(){
  var tw = new Date(new Date().getTime() + 8*3600000);
  return tw.getUTCFullYear() + '-' +
    String(tw.getUTCMonth()+1).padStart(2,'0') + '-' +
    String(tw.getUTCDate()).padStart(2,'0');
}

function getTodayRiddle(){
  if(_roomRiddle) return _roomRiddle;
  if(!window.ROOMS) return null;
  var room = ROOMS.find(function(r){ return r.id === ROOM_ID; });
  if(!room) return null;
  var today = todayKey();
  var seed = 0;
  for(var i=0;i<today.length;i++) seed = ((seed<<5)-seed) + today.charCodeAt(i);
  seed = Math.abs(seed) + 99; // offset 让房间页和主城堡不同题
  _roomRiddle = room.riddles[seed % room.riddles.length];
  return _roomRiddle;
}

// ── 状态管理 ──
function loadRoomState(){
  var def = {
    totalVisits: 0,
    care: {},        // { date: { candle:true, mirror:true, flower:true } }
    riddleDone: {},  // { date: true }
    furniture: [],   // [{ id, slot, icon, name }]
    completeness: 0
  };
  try{
    var raw = localStorage.getItem(ROOM_STORAGE);
    if(!raw) return def;
    return Object.assign(def, JSON.parse(raw));
  }catch(e){ return def; }
}
function saveRoomState(st){
  try{ localStorage.setItem(ROOM_STORAGE, JSON.stringify(st)); }catch(e){}
}

function getTodayCare(st){
  if(!st || !st.care) return {};
  return st.care[todayKey()] || {};
}
function isCareDone(st, act){
  return !!(getTodayCare(st)[act]);
}
function isRiddleDone(st){
  return !!st.riddleDone[todayKey()];
}

// ── 完整度计算 ──
// 公式：家具 × 15分 + 每次照料 × 2分 + 每次谜语 × 3分，满分100
function calcCompleteness(st){
  var furniturePts = Math.min(45, st.furniture.length * 15); // 最多3件家具45分
  var careCount = Object.values(st.care).reduce(function(sum, day){
    return sum + Object.keys(day).length;
  }, 0);
  var carePts = Math.min(30, careCount * 2);
  var riddleCount = Object.keys(st.riddleDone).length;
  var riddlePts = Math.min(25, riddleCount * 3);
  return Math.min(100, furniturePts + carePts + riddlePts);
}

// ── 初始化 ──
var _state = null;
var _furnitureModeItem = null; // 待放置的家具

function init(){
  // 等依赖载入
  if(!window.ROOMS || !window.hlCastle){
    setTimeout(init, 200);
    return;
  }
  hlCastle.giveKey(ROOM_ID);
  _state = loadRoomState();
  _state.totalVisits = (_state.totalVisits || 0) + 1;
  saveRoomState(_state);

  renderStatus();
  renderCareSection();
  renderRiddle();
  renderFurnitureList();
  renderCompleteness();
  renderPlacedFurniture();
}

// ── 状态列 ──
function renderStatus(){
  var today = getTodayCare(_state);
  var careCount = Object.keys(today).length;
  document.getElementById('care-status').textContent = careCount >= 3 ? '✓ 完成' : careCount + '/3 项';
  document.getElementById('riddle-status').textContent = isRiddleDone(_state) ? '✓ 完成' : '待完成';
  document.getElementById('visit-count').textContent = _state.totalVisits + ' 次';
  // topbar 完整度
  var c = calcCompleteness(_state);
  document.getElementById('comp-bar').style.width = c + '%';
  document.getElementById('comp-pct').textContent = c + '%';
}

// ── 照料区 ──
function renderCareSection(){
  ['candle','mirror','flower'].forEach(function(act){
    var btn = document.getElementById('care-' + act);
    if(!btn) return;
    if(isCareDone(_state, act)){
      btn.classList.add('done');
    }
  });
}

function doCarAct(act){
  if(isCareDone(_state, act)) return;
  var today = todayKey();
  if(!_state.care[today]) _state.care[today] = {};
  _state.care[today][act] = true;
  saveRoomState(_state);

  var cfg = CARE_ACTS[act];
  if(!cfg) return;

  // SVG 动画
  cfg.svgEffect();

  // 加点数
  if(window.hlCastle) hlCastle.addPoints(cfg.pts);

  // 今日洞见（用日期+动作当种子）
  var seed = 0;
  var key = todayKey() + act;
  for(var i=0;i<key.length;i++) seed = ((seed<<5)-seed) + key.charCodeAt(i);
  var insight = cfg.insights[Math.abs(seed) % cfg.insights.length];

  // 显示完成 overlay
  document.getElementById('co-icon').textContent = cfg.icon;
  document.getElementById('co-title').textContent = cfg.label + '完成';
  document.getElementById('co-pts').textContent = '+' + cfg.pts + ' 灵感';
  document.getElementById('co-insight').textContent = insight;
  document.getElementById('careOverlay').classList.add('show');

  // 更新 UI
  var btn = document.getElementById('care-' + act);
  if(btn) btn.classList.add('done');
  renderStatus();
  renderCompleteness();
}

function closeCareOverlay(e){
  if(e && e.target !== document.getElementById('careOverlay') && e.type === 'click') return;
  document.getElementById('careOverlay').classList.remove('show');
}

// ── 谜语区 ──
function renderRiddle(){
  var rd = getTodayRiddle();
  var done = isRiddleDone(_state);
  var box = document.getElementById('riddle-content');
  if(!rd){ box.innerHTML = '<p style="color:var(--muted);font-size:.82rem">今日谜语载入中…</p>'; return; }

  var typeLabel = rd.type==='aroma' ? '🌿 认知芳疗' : rd.type==='fuyu' ? '🌿 馥灵馥语' : '💭 觉察问答';
  var h = '<div class="riddle-type-badge">' + typeLabel + '</div>';
  h += '<div class="riddle-q">' + rd.q + '</div>';

  if(done){
    // 已完成，显示答案
    h += '<div class="insight-box show"><div class="insight-txt">✓ 今日觉察已完成。明天有新的问题等著你。</div></div>';
  } else if(rd.isAroma && rd.aromas){
    h += '<div class="aroma-grid">';
    rd.aromas.forEach(function(a,i){
      h += '<div class="aroma-card" onclick="selAroma('+i+')" id="a'+i+'">';
      h += '<span class="aroma-icon">'+a.icon+'</span>';
      h += '<div class="aroma-name">'+a.name+'</div>';
      h += '<div class="aroma-note">'+a.note+'</div>';
      h += '</div>';
    });
    h += '</div>';
    h += '<div class="insight-box" id="ins"></div>';
    h += '<button class="btn-complete" id="btnDone" disabled onclick="finishRiddle()">✦ 收下这份觉察</button>';
  } else {
    h += '<div class="riddle-opts">';
    rd.opts.forEach(function(o,i){
      h += '<div class="riddle-opt" onclick="selOpt('+i+')" id="o'+i+'">'+o.text+'</div>';
    });
    h += '</div>';
    h += '<div class="insight-box" id="ins"></div>';
    h += '<button class="btn-complete" id="btnDone" disabled onclick="finishRiddle()">✦ 收下这份觉察</button>';
  }
  box.innerHTML = h;
}

function selOpt(i){
  var rd = getTodayRiddle(); if(!rd||rd.isAroma) return;
  rd.opts.forEach(function(_,j){
    var e=document.getElementById('o'+j);
    if(e) e.className='riddle-opt'+(j===i?' sel':'');
  });
  showInsight(rd.opts[i].insight);
}
function selAroma(i){
  var rd = getTodayRiddle(); if(!rd||!rd.aromas) return;
  rd.aromas.forEach(function(_,j){
    var e=document.getElementById('a'+j);
    if(e) e.className='aroma-card'+(j===i?' sel':'');
  });
  showInsight(rd.aromas[i].insight);
}
function showInsight(t){
  var el=document.getElementById('ins');
  if(!el) return;
  el.innerHTML='<div class="insight-txt">'+t.replace(/\\n/g,'<br>').replace(/\n/g,'<br>')+'</div>';
  el.classList.add('show');
  var btn=document.getElementById('btnDone');
  if(btn) btn.disabled=false;
  el.scrollIntoView({behavior:'smooth',block:'center'});
}

function finishRiddle(){
  var insEl = document.getElementById('ins');
  var insight = insEl ? insEl.textContent : '';
  var qEl = document.querySelector('.riddle-q');
  var question = qEl ? qEl.textContent : '';
  var selEl = document.querySelector('.riddle-opt.sel, .aroma-card.sel');
  var answer = selEl ? selEl.textContent : '';

  // 完成城堡房间
  if(window.hlCastle && hlCastle.hasKey(ROOM_ID)){
    hlCastle.completeRoom(ROOM_ID, question, answer, insight);
  }
  // 掉材料
  if(window.hlMaterial) hlMaterial.drop('castle_riddle');

  _state.riddleDone[todayKey()] = true;
  saveRoomState(_state);
  renderStatus();
  renderCompleteness();

  // 更新显示
  var btn = document.getElementById('btnDone');
  if(btn){ btn.disabled=true; btn.textContent='✓ 已收下'; }
  setTimeout(function(){
    renderRiddle(); // 重新渲染显示完成状态
  }, 800);
  // 导航提示（完成后 2 秒显示）
  setTimeout(function(){
    var nav = document.createElement('div');
    nav.style.cssText='text-align:center;margin-top:20px;padding:16px;background:rgba(200,134,42,.06);border:1px solid rgba(200,134,42,.15);border-radius:16px';
    nav.innerHTML='<div style="font-size:.88rem;color:var(--warm);margin-bottom:12px">✨ 今天的觉察完成了</div><div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap"><a href="castle-game.html" style="padding:10px 20px;background:var(--gold);color:#fff;border-radius:20px;text-decoration:none;font-size:.85rem;font-weight:600">🏰 回城堡看变化</a><button onclick="this.parentElement.parentElement.remove()" style="padding:10px 20px;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:20px;font-size:.85rem;cursor:pointer;font-family:inherit">留在这个房间</button></div>';
    var riddleBox = document.querySelector('.riddle-box')||document.querySelector('.room-card');
    if(riddleBox) riddleBox.appendChild(nav);
  }, 2000);
}

// ── 家具系统 ──
function renderFurnitureList(){
  var container = document.getElementById('furniture-list');
  // 找镜之厅的家具（materials 里 zone=镜之厅家具）
  var mirrorFurniture = getMirrorFurniture();
  var placed = _state.furniture.map(function(f){ return f.id; });

  if(!mirrorFurniture.length){
    container.innerHTML = '<div class="furniture-empty">还没有适合镜之厅的家具。<br>去材料库合成「<strong>自省灯</strong>」，可以放在这里。</div>';
    return;
  }

  var html = '';
  mirrorFurniture.forEach(function(item){
    var isPlaced = placed.indexOf(item.id) > -1;
    html += '<div class="furniture-item' + (isPlaced?' placed':'') + '">';
    html += '<span class="furniture-item-icon">' + item.icon + '</span>';
    html += '<div class="furniture-item-info">';
    html += '<div class="furniture-item-name">' + item.name + '</div>';
    html += '<div class="furniture-item-desc">' + (item.desc||'') + '</div>';
    html += '</div>';
    if(isPlaced){
      html += '<button class="furniture-item-action btn-placed">✓ 已放入</button>';
    } else {
      html += '<button class="furniture-item-action btn-place" onclick="openFurniturePlace(\'' + item.id + '\')">放入房间</button>';
    }
    html += '</div>';
  });
  container.innerHTML = html;
}

function getMirrorFurniture(){
  if(!window.hlMaterial) return [];
  var furniture = hlMaterial.getFurniture();
  // 取得在镜之厅相关的家具（自省灯）
  var mirrorIds = ['reflection_lamp'];
  return furniture.filter(function(f){ return mirrorIds.indexOf(f.id) > -1; });
}

function openFurniturePlace(itemId){
  if(!window.hlMaterial) return;
  var recipes = hlMaterial.getRecipes();
  var recipe = recipes.find(function(r){ return r.id === itemId; });
  if(!recipe) return;
  _furnitureModeItem = recipe;

  document.getElementById('fo-icon').textContent = recipe.icon;
  document.getElementById('fo-name').textContent = recipe.name;
  document.getElementById('fo-desc').textContent = '「' + (recipe.desc||'') + '」';

  // 显示可用插槽
  var placedSlots = _state.furniture.map(function(f){ return f.slot; });
  var slotsHtml = '';
  [1,2,3].forEach(function(s){
    var occupied = placedSlots.indexOf(s) > -1;
    slotsHtml += '<button onclick="placeFurniture(\'' + itemId + '\',' + s + ')" ' +
      (occupied ? 'disabled style="opacity:.4;cursor:default"' : '') +
      ' style="width:100%;padding:10px;border-radius:10px;border:1.5px solid var(--border);' +
      'background:' + (occupied?'rgba(0,0,0,.04)':'rgba(200,134,42,.06)') + ';' +
      'color:var(--warm2);font-size:.82rem;cursor:pointer;font-family:inherit;transition:all .2s">' +
      (occupied ? '槽位 ' + s + '（已占用）' : '放入槽位 ' + s) +
      '</button>';
  });
  document.getElementById('fo-slots').innerHTML = slotsHtml;
  document.getElementById('furnitureOverlay').classList.add('show');
}

function placeFurniture(itemId, slot){
  if(!_furnitureModeItem) return;
  // 移除同槽位旧家具
  _state.furniture = _state.furniture.filter(function(f){ return f.slot !== slot; });
  _state.furniture.push({
    id: itemId,
    slot: slot,
    icon: _furnitureModeItem.icon,
    name: _furnitureModeItem.name
  });
  saveRoomState(_state);
  closeFurnitureOverlay();
  renderFurnitureList();
  renderPlacedFurniture();
  renderCompleteness();
  renderStatus();
  // 小庆祝
  showToast(_furnitureModeItem.icon + ' ' + _furnitureModeItem.name + ' 已放入镜之厅！');
}

function closeFurnitureOverlay(e){
  if(e && e.target !== document.getElementById('furnitureOverlay') && e.type === 'click') return;
  document.getElementById('furnitureOverlay').classList.remove('show');
  _furnitureModeItem = null;
}

function toggleFurnitureMode(){ /* 点场景时若有待放家具才作用 */ }

function clickSlot(slotNum){
  // 点 SVG 插槽 → 找已放置的家具或提示去合成
  var placed = _state.furniture.find(function(f){ return f.slot === slotNum; });
  if(placed){
    showToast(placed.icon + ' ' + placed.name + ' 正放在这里。');
    return;
  }
  showToast('这个位置还空著。去材料库合成家具，就能放在这里。');
}

// ── SVG 动画效果 ──
function animateCandleBright(){
  var svg = document.getElementById('roomSvg');
  // 让光晕暂时更亮
  var glows = svg.querySelectorAll('ellipse[fill*="candleGlow"]');
  glows.forEach(function(g){
    g.style.opacity = '1';
    setTimeout(function(){ g.style.opacity = ''; }, 2000);
  });
  // 加一个闪光盖层
  var flash = document.createElementNS('http://www.w3.org/2000/svg','rect');
  flash.setAttribute('x','0');flash.setAttribute('y','0');
  flash.setAttribute('width','420');flash.setAttribute('height','280');
  flash.setAttribute('fill','rgba(255,204,68,.06)');
  flash.style.transition='opacity 1.5s';flash.style.opacity='1';
  svg.appendChild(flash);
  setTimeout(function(){ flash.style.opacity='0'; setTimeout(function(){ flash.remove(); },1500); },100);
}

function animateMirrorSheen(){
  var svg = document.getElementById('roomSvg');
  // 镜面反光动画
  var sheen = document.createElementNS('http://www.w3.org/2000/svg','rect');
  sheen.setAttribute('x','163');sheen.setAttribute('y','33');
  sheen.setAttribute('width','94');sheen.setAttribute('height','142');
  sheen.setAttribute('rx','47');
  sheen.setAttribute('fill','rgba(255,255,255,.22)');
  sheen.style.transition='opacity 1.2s';sheen.style.opacity='1';
  svg.appendChild(sheen);
  setTimeout(function(){ sheen.style.opacity='0'; setTimeout(function(){ sheen.remove(); },1200); },200);
}

function animateFlowerAppear(){
  var svg = document.getElementById('roomSvg');
  // 在梳妆台上出现小花动画
  var g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.style.transition = 'opacity .8s, transform .8s';
  g.style.opacity = '0';
  g.style.transform = 'translateY(8px)';
  var circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
  circle.setAttribute('cx','198');circle.setAttribute('cy','188');
  circle.setAttribute('r','5');circle.setAttribute('fill','#e8607a');circle.setAttribute('opacity','.8');
  var stem = document.createElementNS('http://www.w3.org/2000/svg','line');
  stem.setAttribute('x1','198');stem.setAttribute('y1','193');
  stem.setAttribute('x2','198');stem.setAttribute('y2','202');
  stem.setAttribute('stroke','#4a8040');stem.setAttribute('stroke-width','1.5');
  g.appendChild(stem);g.appendChild(circle);
  svg.appendChild(g);
  setTimeout(function(){ g.style.opacity='1'; g.style.transform='translateY(0)'; },50);
  setTimeout(function(){ g.style.opacity='0'; setTimeout(function(){ g.remove(); },800); },2500);
}

// ── 已放置家具显示在 SVG ──
function renderPlacedFurniture(){
  _state.furniture.forEach(function(f){
    var iconEl = document.getElementById('slot' + f.slot + '-icon');
    var emptyEls = document.querySelectorAll('#slot' + f.slot + ' .slot-empty');
    if(iconEl){
      iconEl.textContent = f.icon;
      iconEl.style.display = '';
    }
    emptyEls.forEach(function(e){ e.style.display='none'; });
    var slotEl = document.getElementById('slot' + f.slot);
    if(slotEl) slotEl.classList.add('occupied');
  });
}

// ── 城堡完整度 ──
function renderCompleteness(){
  var c = calcCompleteness(_state);
  var sub = c >= 100 ? '🎉 镜之厅已完整！' :
            c >= 60  ? '继续探索，越来越完整了' :
            c >= 30  ? '每天回来，完整度慢慢上升' :
                       '放置家具，提升完整度';
  document.getElementById('total-pct').textContent = c + '%';
  document.getElementById('total-prog').style.width = c + '%';
  document.getElementById('total-sub').textContent = sub;
  document.getElementById('comp-bar').style.width = c + '%';
  document.getElementById('comp-pct').textContent = c + '%';
}

// ── Toast ──
var _toastTimeout = null;
function showToast(msg){
  var t = document.getElementById('hlToast');
  if(!t){
    t = document.createElement('div');
    t.id = 'hlToast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);' +
      'background:rgba(62,42,26,.97);color:#f5dfa8;padding:10px 20px;' +
      'border-radius:12px;font-size:.82rem;z-index:9999;' +
      'border:1px solid rgba(200,134,42,.35);pointer-events:none;' +
      'opacity:0;transition:all .3s;white-space:nowrap;max-width:88vw;text-align:center;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1'; t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(_toastTimeout);
  _toastTimeout = setTimeout(function(){
    t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(12px)';
  }, 2600);
}

// ── 启动 ──
document.addEventListener('DOMContentLoaded', function(){
  var tries = 0;
  var check = setInterval(function(){
    tries++;
    if((window.ROOMS && window.hlCastle) || tries > 25){
      clearInterval(check);
      init();
    }
  }, 150);
});
</script>
