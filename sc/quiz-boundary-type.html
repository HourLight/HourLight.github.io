    practice:'「這次的答案不換」练習\n\n今天做一个小决定（午餐吃什麼、要不要答应一个邀约），做了之後不改。吸气 4 秒，感觉那个决定带來的焦慮。吐气 6 秒，对自己说：「這次的答案就是這个。不用完美，只要稳。」\n\n一天一个小练習。当你发現「不改主意」也不会怎样，你的旋转门就会慢慢停下來。',
    closing:'你的旋转门不是弱点，是你在不同的需求之间努力協调的痕迹。現在要做的不是把门焊死，是找到一个让它稳稳停住的位置。停在那裡，你会发現风景其實挺好的。'},
  glass:{name:'单向玻璃',icon:'🪟',sub:'你看得见所有人，但没有人真的看见你',
    desc:'你很擅長观察。谁越线了你知道，谁对你好你知道，谁在演戏你也知道。但你很少让別人用同样的精度看见你。你在人群裡是安全的，因为你永远是那个看穿別人的人。问题是，你把自己藏得太好了，好到有一天你会忘记被看见的感觉。',
    keywords:['过度观察','情緒隐匿','控制需求','孤独感'],
    aroma:'玫瑰天竺葵 × 檀香',
    aromaDetail:'玫瑰天竺葵的香茅醇和香葉醇温柔地打开你習慣紧閉的「被看见」通道。檀香的 α-檀香醇带來深层的安全感，让你知道：被看见不代表被攻击。有時候被看见，是被愛的前提。',
    practice:'「让一个人看到我」练習\n\n今天找一个你信任的人，跟他分享一件你的真實感受。不用很大的事，可以只是「今天有点累」。吸气 4 秒，感觉说出口之前的抗拒。吐气 6 秒，让那句话出去。\n\n你会发現，被看见的瞬间有点赤裸。但那份赤裸裡面，也有一種久違的松。',
    closing:'你的观察力是了不起的天賦。但镜子只能照別人的時候，你自己就消失了。试著把那面单向玻璃翻转一次，让光从你的方向照出去。被看见不危险，你值得。'},
  selective:{name:'选擇性开放',icon:'🗝️',sub:'你有很多把钥匙，但不是每个人都拿得到',
    desc:'你的界线不是一道单一的墙，是一棟有很多房间的房子。有些人可以到客厅，有些人可以进书房，有些人连大门都进不了。你根据信任程度决定开放程度，很聪明也很有效。但有時候你的分类系统太嚴格了，有些值得靠近的人被擋在了错的门外。',
    keywords:['信任分級','关係分层','条件性开放','判断依賴'],
    aroma:'佛手柑 × 乳香',
    aromaDetail:'佛手柑的乙酸沉香酯放松你过度运转的「分类系统」，让你在判断之前先感受。乳香的乳香酸带來一種不需要理由的安全感，让你知道：偶爾不分类，直接用心感受，也是安全的。',
    practice:'「今天不分类」觉察\n\n选一个你平常会保持距离的人，今天跟他多聊兩句。不需要分享秘密，只是比平常多一点点。吸气 4 秒，感觉那份「可能会後悔」的猶豫。吐气 6 秒，提醒自己：偶爾把钥匙放松一点，世界不会因此崩塌。\n\n你的分类系统很好。偶爾让它休息一天，你可能会遇到意想不到的连結。',
    closing:'你的选擇性是一種智慧。只是偶爾问问自己：有没有一些门，关得太久了？那些门後面也许有人已经站了很久了，在等你给一把钥匙。'},
  fence:{name:'健康圍籬',icon:'🌻',sub:'你的界线有门、门没锁。你选擇打开的時候最美',
    desc:'你知道自己的底线，也知道什麼時候可以让步。你不会因为拒绝而內疚太久，也不会因为接受而委屈太多。你的圍籬高度剛好，有花、有门、有阳光照进來。這不是完美，是你跟自己磨合了很久之後找到的平衡。',
    keywords:['自我觉察','健康边界','內在稳定','灵活坚定'],
    aroma:'茉莉 × 甜橙',
    aromaDetail:'茉莉的吲哚带來深层的自我肯定感，让「我够好了」不只是头脑的想法，而是身体记住的节奏。甜橙的檸檬烯維持你跟世界之间那份温暖的连結。你的圍籬不需要改建，只需要偶爾澆澆水。',
    practice:'「谢谢我自己的界线」觉察\n\n找一个安静的時刻。吸气 4 秒，想一件你最近很自在地说「不」的事。吐气 6 秒，对自己说：「我做到了。」\n\n再吸气 4 秒，想一件你很自在地说「好」的事。吐气 6 秒，对自己说：「這也是我选的。」\n\n你的界线是你跟世界的约定。今天，谢谢你自己守住了這份约定。',
    closing:'你已经走在一条很好的路上了。圍籬不完美也没关係，重要的是你知道门在哪裡，而且钥匙在你手上。繼續走。'}
};

let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const sceneHTML=qd.scene?'<div class="quiz-scene">'+qd.scene+'</div>':'';
    const optsHTML='<div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 题 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一题</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一题 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看我的界线类型 🚪</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 题，共 '+questions.length+' 题';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const scores={};dims.forEach(d=>{scores[d.key]=0;});
  Object.entries(answers).forEach(([qi,oi])=>{
    const opt=questions[parseInt(qi)].opts[oi];
    if(opt.scores){Object.entries(opt.scores).forEach(([k,v])=>{scores[k]=(scores[k]||0)+v;});}
  });
  const sorted=dims.map(d=>d.key).sort((a,b)=>scores[b]-scores[a]);
  const topType=sorted[0],f=TYPES[topType],f2=TYPES[sorted[1]];
  const totalMax=questions.length*3;
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('screenshotCard').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥灵之钥</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-tags"><span class="ss-tag">界线类型觉察</span><span class="ss-tag">'+f.name+'</span></div><div class="ss-quote">「'+f.closing+'」</div><div class="ss-footer">hourlightkey.com ✦ 读懂自己，活对人生</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">界线类型觉察 Boundary Type</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=dims.map(d=>{var pct=Math.round(scores[d.key]/totalMax*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+TYPES[d.key].icon+' '+d.name+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:'+d.color+'"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">🚪 你的界线类型</div><div class="result-section-content">'+f.desc+'</div></div>'+'<div class="result-section"><div class="result-section-title">🔑 觉察关键字</div><div class="result-section-content">'+f.keywords.map(k=>'「'+k+'」').join(' ')+'</div></div>'+(f2?'<div class="result-section"><div class="result-section-title">'+f2.icon+' 副型：'+f2.name+'</div><div class="result-section-content">'+f2.desc+'</div></div>':'')+'<div class="result-section"><div class="result-section-title">🌿 认知芳疗建议：'+f.aroma+'</div><div class="result-section-content">'+f.aromaDetail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🧘 60 秒觉察练習</div><div class="result-section-content">'+f.practice.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">✦ 馥灵收束语</div><div class="result-section-content" style="font-family:LXGW WenKai TC,serif;font-size:1rem;line-height:1.9">'+f.closing+'<br><br></div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ 馥灵之钥 × 你的觉察密码</div><div class="hour-bridge-text" style="margin-bottom:8px">你画的每一条线，都是你跟這个世界談判的結果。有些线画得太轻，有些线画得太重。今天看见了，就是重新画的起点。</div><div style="font-size:.85rem;color:#9e8a70;line-height:1.8;margin-bottom:16px">馥灵秘码可以看到你天生的人际模式设定，跟今天的界线类型交叉比对更完整。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免费解码馥灵秘码 →</a>';
  try{localStorage.setItem('hl_quiz_boundary_type',JSON.stringify({type:topType,scores,ts:Date.now()}));}catch(e){}
  window._resultText=f.icon+' 我的界线类型是「'+f.name+'」：'+f.sub.substring(0,40)+'⋯ 你的界线是什麼形狀？ 👉 hourlightkey.com/sc/quiz-boundary-type.html #馥灵之钥 #界线类型觉察';
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz-boundary-type',toolName:'界线类型觉察'});
  if(window.HL_dropMaterial) HL_dropMaterial('quiz');
  window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
</script>
