  {q:'你跟伴侶/好友吵架吵到一半，对方突然说「算了，随便你」。你的下一步是？',opts:[

    detail:'迴避型的人不是没有话想说，是觉得「说了也没用」或「说了会更糟」。\n\n你可能试过说，結果被否定了、被忽略了、或是引发了一场你不想面对的冲突。从此你学会了：閉嘴是最安全的。\n\n但沉默不是和平，是冷战。你不说，不代表你不在意。你的在意全部压在胸口，像一顆吃了消音器的炸弹。表面上什麼事都没有，裡面的计時器一直在倒數。\n\n然後有一天，因为一件很小的事，你爆了。对方会觉得你反应过度，但他不知道你已经忍了三百件小事了。那一次爆炸的威力，其實是三百次沉默的总和。\n\n试一次：今天找一件很小的不满，在它还很小的時候说出來。「這个我不太喜欢。」就這七个字。小事说出來了，大事才不用爆。',

    oilDetail:'薄荷的薄荷醇像一记温柔的鬧鐘，喚醒被你按了静音键的喉轮。尤加利的桉油醇打通呼吸道，让「把话说出來」這个动作从物理层面开始变順暢。甜橙的檸檬烯在边缘系统裡製造安全感，让你的身体记住「说话不等於危险」。\n\n调配建议：基底油 10ml＋薄荷 1 滴＋尤加利 2 滴＋甜橙 2 滴。薄荷不建议用於脸部。',
    med:'「一句话练習」\n\n這个练習超短，因为你最怕的就是長篇大论。\n\n1. 想一件你最近想说但没说的事（很小的就好）\n2. 吸气 4 秒：把那句话在心裡组好\n3. 吐气的時候，轻声说出來。可以对著空气说、对著宠物说、对著镜子说\n4. 说完之後，吸气 4 秒：注意，天花板没有塌下來。世界还在\n5. 吐气 6 秒：对自己说「我的声音值得被聽见」\n\n做 3 轮。\n\n第一次不敢出声也没关係，在心裡说也算。但明天试著让声音出來。你的喉嚨不只是拿來吞声的。',
    closing:'你的安静裡有一整个宇宙。那个宇宙值得被聽见。不需要一次傾瀉而出，只要一句一句、慢慢的。你说的每一句话，都在告诉世界：我在。'},
  humor:{name:'幽默化解型',icon:'😄',sub:'你用笑话盖住了你的眼淚',
    desc:'你是朋友圈裡的开心果，气氛殺手的剋星，永远知道怎麼用一句话让场面不尷尬。但你有没有注意到，你笑的時候，有時候眼睛是没有在笑的？',
    detail:'幽默化解型的人社交能力极強，EQ看起來很高。你用笑话拆除冲突、用自嘲化解尷尬、用玩笑包装你认真的话。\n\n但幽默是你的盾牌。\n\n每次你用开玩笑带过一个认真的時刻，你其實是在说：「我不敢让你看到我认真的样子。」因为认真就意味著暴露，暴露就意味著可能被拒绝。笑话是一层保护膜，让你可以说你想说的，但如果对方反应不好，你可以退回去说「我开玩笑的啦」。\n\n你是不是很少有人知道你真正在想什麼？因为你的幽默太成功了，成功到大家都以为你永远没事。但你有事。你只是从來不让人看到。\n\n试一次：找一个你信任的人，说一句你一直想说但用笑话带过的话。這次不搞笑。看看会怎样。',
    oil:'茉莉 × 檀香 × 薰衣草',

    med:'「不搞笑的30秒」\n\n找一面镜子。看著自己。\n\n1. 吸气 4 秒：忍住不要对自己擠出任何表情\n2. 吐气 6 秒：看著镜子裡那个没有在表演的自己。那个素颜的、安静的、不需要让任何人笑的自己\n3. 吸气 4 秒：问「你好嗎？」认真问。不是寒暄，是真的想知道\n4. 吐气 6 秒：如果眼眶有点熱，让它熱。不用用笑话擋回去\n\n做 4 轮。\n\n這个练習的重点是让你跟「不搞笑的自己」待在一起。那个人也很好。也许更好。因为那才是完整的你。',

let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const optsHTML='<div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]===o.a?' selected':'')+'" onclick="selectOpt('+i+',\''+o.a+'\',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 题 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一题</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一题 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看我的溝通风格 🗣️</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,a,btn){answers[qi]=a;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 题，共 '+questions.length+' 题';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const scores={};Object.keys(TYPES).forEach(k=>{scores[k]=0;});
  Object.values(answers).forEach(a=>{scores[a]=(scores[a]||0)+1;});
  const sorted=Object.keys(TYPES).sort((a,b)=>scores[b]-scores[a]);
  const topType=sorted[0],f=TYPES[topType],f2=TYPES[sorted[1]];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('screenshotCard').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥灵之钥</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-tags"><span class="ss-tag">溝通风格解码</span><span class="ss-tag">'+f.name+'</span></div><div class="ss-quote">「'+f.closing+'」</div><div class="ss-footer">hourlightkey.com ✦ 读懂自己，活对人生</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">溝通风格解码 Communication Style</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var tp=TYPES[k],pct=Math.round(scores[k]/questions.length*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+tp.icon+' '+tp.name+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">🗣️ 你的溝通风格</div><div class="result-section-content">'+f.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度解析</div><div class="result-section-content">'+f.detail.replace(/\n/g,'<br>')+'</div></div>'+(f2?'<div class="result-section"><div class="result-section-title">'+f2.icon+' 副型：'+f2.name+'（'+f2.sub+'）</div><div class="result-section-content">'+f2.desc+'</div></div>':'')+'<div class="result-section"><div class="result-section-title">🌿 认知芳疗建议：'+f.oil+'</div><div class="result-section-content">'+f.oilDetail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🧘 冥想练習（60-90秒）</div><div class="result-section-content">'+f.med.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">✦ 馥灵收束语</div><div class="result-section-content" style="font-family:LXGW WenKai TC,serif;font-size:1rem;line-height:1.9">'+f.closing+'</div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ 馥灵之钥 × 你的觉察密码</div><div class="hour-bridge-text" style="margin-bottom:8px">你说话的方式不是性格，是一套你很早就学会的生存策略。看见它，你才能选擇：繼續用，还是換一套。</div><div style="font-size:.85rem;color:#9e8a70;line-height:1.8;margin-bottom:16px">馥灵秘码可以看到你天生的溝通天賦设定，跟今天的测验交叉比对，会发現有趣的落差。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免费解码馥灵秘码 →</a>';
  try{localStorage.setItem('hl_quiz_comm',JSON.stringify({type:topType,scores,ts:Date.now()}));}catch(e){}
  window._resultText=f.icon+' 我的溝通风格是「'+f.name+'」：'+f.sub+'。'+f.desc.substring(0,60)+'⋯ 你说话暴露了什麼？ 👉 hourlightkey.com/sc/quiz-communication-style.html #馥灵之钥 #溝通风格';
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz-communication-style',toolName:'溝通风格解码'});window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
