<script>
var TYPES={
rational:{name:'超級理性脑',icon:'📐',cl:'#00B4D8',sub:'數据是你的母语，分析是你的本能',
desc:'你的大脑是一台高精度的分析机器，带著一股清涼的薄荷调。看到任何事情，你的第一反应是「拆解它」，为什麼？怎麼发生的？有没有數据支持？你不太相信「感觉」，因为感觉不能量化。你做决定的速度可能不是最快的，但做出的决定通常很少後悔，因为每一步都是算过的。你的人际关係裡偶爾会遇到挑战，有些人觉得你「太冷」或「不够浪漫」，但其實你的关心方式就是帮对方把问题分析清楚。朋友崩潰的時候你会说「先別哭，我帮你列一下利弊」，然後他們会先翻你白眼，最後又承认你说得对。你最大的超能力是在混亂中找到邏輯；最大的盲点是，有些事不需要邏輯，需要的是被看见。',
oil:'🌿 迷迭香（CT 桉油醇）：滴 2 滴在掌心搓熱嗅吸，思緒更清晰、邏輯更犀利，像给大脑装了 SSD。\n🌿 薄荷：会议前滴 1 滴在太阳穴，专注力加倍，別人还在暖机你已经完成分析。\n🌿 薰衣草：睡前扩香 3 滴，让理性脑偶爾关机。你值得不用思考的八小時。\n\n为什麼這个配方对你有效？\n迷迭香裡的 1,8-桉油醇直接提升前額葉皮质的血流量和乙醯膽鹼濃度，让你的分析引擎从「渦轮」升級到「超級渦轮」。薄荷的薄荷醇刺激三叉神经，瞬间喚醒你的专注力迴路，就像帮大脑按下 Ctrl+Shift+T 把所有分页都拉回來。薰衣草的乙酸沉香酯則温柔地关閉前額葉的「分析停不下來」模式，让你的杏仁核终於可以不被數据淹没地休息。翻译：迷迭香是你的 CPU 超频器，薄荷是你的 RAM 扩充，薰衣草是你的关机键。',
med:'手边没有精油？试试這个：\n\n【超級理性脑的感觉切換练習】\n每天找一个 5 分鐘的空檔，练習「不分析」。\n\n第一步：坐下來，閉上眼。做 5 次深呼吸（吸 4 秒、吐 6 秒）。\n\n第二步：把注意力放在身体上。不是「分析」身体的狀态（不要想「是不是肩颈痠痛代表筋膜沾黏」），只是「感觉」。从头顶到脚底扫一遍，花 60 秒。\n\n第三步：想一个你在乎的人。不要想「我們的关係好不好」「上次是不是我说错话了」。只是想著他。感觉心裡浮現的第一个情緒是什麼。停在那个情緒裡 30 秒。\n\n第四步：对自己说：「不是所有東西都需要分析。有些事，感觉到就够了。」\n\n第五步：做 3 次深呼吸。睜开眼。\n\n你的理性是超能力，但超能力也需要休息時间。每天练習 5 分鐘「只感觉不分析」，你会发現：有些事用感觉理解的速度，比用分析快得多。',
awareness:'你的觉察练習：每天找一件事，刻意用「感觉」而不是「分析」去回应。比如朋友说「今天好累」，试著先说「辛苦了」而不是「你的時间管理可以优化」。你会发現，有時候一句废话比一份分析报告更有力量。',
share:'📐 我是超級理性脑！數据是我的母语，感性是我的外语。朋友崩潰時我会说「先別哭，帮你列利弊」。你呢？'},
creative:{name:'创意煉金师',icon:'🎨',cl:'#FF6B6B',sub:'脑袋裡住著一座游樂园，灵感是门票',
desc:'你的大脑不走直线，它走的是蜿蜒的、充满彩色泡泡的曲线，空气裡飄著佛手柑的甜。別人在想 A 的時候，你已经跳到 Z 了，而且那个 Z 居然还挺有道理的。你有一種天生的能力：把不相关的東西连結在一起，创造出全新的東西。开会的時候你是那个丟出「欸，如果反过來做呢？」的人，大家先愣住，然後五分鐘後说「等等，好像真的可以」。你的挑战是執行力，你的点子多到用不完，但真正做到底的可能只有十分之一。不是你不认真，是你的大脑太容易被新的灵感吸引走了。就像一个永远走不到結帳的人，因为每条走道都有新東西。学会在创意和執行之间找到平衡，你就是无敵的。',
oil:'🌿 佛手柑：早晨扩香 3 滴，创意更自由、框架自动碎裂。灵感像佛手柑的皮一样，轻轻一压就噴发。\n🌿 天竺葵：工作時滴 2 滴在手腕，想像力跟執行力找到甜蜜平衡点。\n🌿 广藿香：收工前嗅吸，把今天最好的灵感錨定到現實，真的做出來，而不只是想出來。\n\n为什麼這个配方对你有效？\n佛手柑的檸檬烯让你的前額葉放下「這合不合理」的框架限制，同時乙酸沉香酯安撫杏仁核的焦慮，让大脑的「创意区」不再被「评判区」綁架。天竺葵的香葉醇平衡你大脑的前額葉和基底核之间的讯号传递，翻译成白话就是「想得到也做得到」。广藿香的广藿香醇作用在基底核，帮你把飄在空中的灵感拉回地面变成行动方案。简单说：佛手柑解除框架，天竺葵调和行动力，广藿香把点子变成成品。',
med:'手边没有精油？试试這个：\n\n【创意煉金师的收束练習】\n每天选一个你今天想到的点子，用 10 分鐘动手做。\n\n第一步：坐下來，閉上眼。做 3 次深呼吸（吸 4 秒、吐 6 秒）。想像你的脑袋裡有一座游樂园，裡面所有的设施都在同時运转。很熱鬧，但也很吵。\n\n第二步：在心裡按下「暫停」键。所有的设施都停下來了。安静了。花 20 秒享受這个安静。\n\n第三步：问自己：「今天所有的点子裡面，如果只能挑一个带出去，我选哪一个？」等 15 秒，让第一个浮上來的答案成为你的选擇。不要換，不要想「是不是另一个更好」。就是這个了。\n\n第四步：花 60 秒在心裡「预演」你动手做這个点子的前 3 步。第一步做什麼？第二步做什麼？第三步做什麼？不需要完美，只需要开始。\n\n第五步：做 3 次深呼吸。睜开眼。马上去做第一步。\n\n你的创意不缺灵感，缺的是「先完成一个再说」。完美主义是灵感的天敵。先做出來，再慢慢变好。',
awareness:'你的觉察练習：每週选一个点子，不管它「完不完美」，先花 30 分鐘动手做。创意不是想出來的，是做出來的。你最大的敵人不是没灵感，是太多灵感让你选擇障礙。先完成，再完美。',
share:'🎨 我是创意煉金师！脑袋裡住著游樂园，点子多到用不完。问题是我永远走不到結帳，因为每条走道都有新東西。你呢？'},
balanced:{name:'全脑指揮官',icon:'🌐',cl:'#6C5CE7',sub:'左右开弓的全能选手，什麼场都接得住',
desc:'你的大脑像一台自动切換的双系统电脑，带著甜橙的圓融香调。需要分析的時候可以很理性，需要创意的時候也能天马行空。你是天生的翻译者，理性派说的你懂，感性派说的你也懂，而且你能把兩边的话翻译给对方聽。团队裡有你，吵架的机率少一半。你最強的地方是「适应力」：不管在什麼场合、面对什麼类型的人，你都能找到合适的频道。你的挑战是，太会切換了，有時候不确定「真正的自己」偏好哪边。你可能需要的不是更多能力，而是更清楚的自我认识。你到底享受分析，还是享受创造？答案可能是都享受，但你要允许自己承认：「我就是比較貪心，兩边都要。」',
oil:'🌿 甜橙：随時嗅吸，整合的愉悅感让左右脑和諧运作，像一顆小太阳住在你的嗅觉裡。\n🌿 依兰依兰：静心時滴 2 滴在心口，找到你真正的核心偏好。不是「都可以」，是「你最想要什麼」。\n🌿 檸檬草：猶豫不决時嗅吸，清晰自我认知、不再当墙头草。选了就走，走了就不回头。\n\n为什麼這个配方对你有效？\n甜橙的檸檬烯促进多巴胺和血清素的平衡分泌，让你的左脑（邏輯）和右脑（感知）之间的胼胝体通讯更順暢，像帮兩个部门装了一条专用光纖。依兰依兰的沉香醇和苯甲酸苄酯安撫杏仁核的「兩边都好」焦慮，让你的前額葉有空间去感知「我真正偏好什麼」。檸檬草的檸檬醛是嗅觉的鬧鈴，直接喚醒你的决策迴路。翻译：甜橙让左右脑好好聊天，依兰依兰帮你聽到心底的偏好，檸檬草帮你下决定然後不回头。',
med:'手边没有精油？试试這个：\n\n【全脑指揮官的核心偏好练習】\n任何你觉得「什麼都可以」但其實很猶豫的時候。\n\n第一步：閉上眼，做 5 次深呼吸（吸 4 秒、吐 6 秒）。\n\n第二步：想像你的大脑是一棟兩层樓的房子。一樓住著「感觉」（颜色、温度、情緒），二樓住著「邏輯」（數字、步驟、分析）。花 20 秒在這棟房子裡走一圈。\n\n第三步：问自己一个问题：「如果今天只能住一层樓，我选一樓还是二樓？」不要想太久，5 秒內做选擇。\n\n第四步：不管你选了哪一层，在心裡走进去。坐下來。感觉一下：這层樓的空气是什麼样的？涼爽的还是温暖的？明亮的还是昏暗的？那个感觉，就是你的核心偏好。\n\n第五步：做 3 次呼吸。每次吐气默念：「我可以什麼都会，但我也允许自己有偏好。」\n\n你的全能是天賦，但全能裡面也有主角和配角。找到主角，其他的就是豪华阵容。',
awareness:'你的觉察练習：這週做三个小决定的時候，注意自己第一个冒出來的是「想法」还是「感觉」。不是兩个都注意，是注意哪个先來。那个先來的，就是你的核心模式。允许自己有偏好，不代表失去平衡。',
share:'🌐 我是全脑指揮官！左右开弓，理性派和感性派的话我都聽得懂。团队有我，吵架的机率少一半。你呢？'},
intuitive:{name:'直觉导航员',icon:'🔮',cl:'#A29BFE',sub:'你的第六感比 GPS 还准，常常跳过过程直达答案',
desc:'你的大脑有一个別人没有的雷达：直觉。带著快樂鼠尾草那種朦朧卻精准的气息，你常常「就是知道」某件事会怎麼发展，说不出邏輯但結果是对的。你读人也很准，有些人你第一眼就知道「不太对」，後來果然被你说中。你的直觉不是玄学，是你的大脑在无意识中处理了大量的微表情、语调、肢体语言等资讯，只是結论直接跳出來了，过程你没有察觉而已。你最大的挑战是「说服別人」，在会议室裡说「我就是觉得不对」通常不太有说服力。老闆要的是數据，不是你的第六感。但你私底下知道，那些让你「不对勁」的感觉，准确率高得可怕。学会把直觉翻译成邏輯和數据，你的洞察力就是真正的超能力。',
oil:'🌿 快樂鼠尾草：睡前扩香 2 滴，直觉的频道打得更开、第六感更清晰。夢裡可能会收到讯号。\n🌿 檀香：冥想時滴在眉心，深层感知力啟动，连結那个「你就是知道」的內在。\n🌿 月桂：需要开口的時候嗅吸，自信表达、把直觉翻译成別人聽得懂的语言。\n\n为什麼這个配方对你有效？\n快樂鼠尾草的乙酸沉香酯让杏仁核的「噪音」安静下來，這样你的前額葉才能接收到那些微弱但精准的直觉讯号。檀香的 α-檀香醇穿透血脑屏障啟动丘脑和松果体的深层连結，让你的「无意识运算」結果浮到意识表面。月桂的桉油醇和丁香酚啟动布洛卡区（语言中樞），帮你把那些「就是知道但说不出來」的直觉翻译成有結构的语言。翻译：鼠尾草把你的讯号接收器调到最敏感，檀香让讯号浮上來，月桂帮你开口说出來。',
med:'手边没有精油？试试這个：\n\n【直觉导航员的讯号放大练習】\n每天花 5 分鐘训练你的直觉表达能力。\n\n第一步：閉上眼，做 5 次深呼吸（吸 4 秒、吐 7 秒）。每次吐气想像你的大脑裡有一片宁静的湖面，所有的波紋都慢慢平息。\n\n第二步：等湖面完全平静後，问自己一个小问题。可以是「今天中午吃什麼」也可以是「這个案子哪裡不对」。问完之後什麼都不要想。等 10 秒。\n\n第三步：注意湖面上冒出的第一个泡泡。那个泡泡可能是一个画面、一个词、一種感觉、甚至是一个味道。不管是什麼，记住它。那就是你的直觉在说话。\n\n第四步：現在练習「翻译」。在心裡用一句完整的话描述那个泡泡：「我的直觉告诉我 _______，因为 _______。」「因为」後面不需要真正的邏輯，只要你的感觉就好。\n\n第五步：做 3 次呼吸。睜开眼。\n\n练習一週後你会发現：你的直觉不但越來越准，而且越來越会「说话」了。直觉不是玄学，是你大脑的快速运算系统。它只需要你给它一个安静的空间和一个表达的出口。',
awareness:'你的觉察练習：每天记录一次你的「直觉闪过」，那个第一秒冒出的念头是什麼？一週後回头看，你会发現它的命中率。同時练習用一句话解释你的直觉：「我觉得這个方案有风险，因为___。」因为後面的空格，就是你直觉的翻译。',
share:'🔮 我是直觉导航员！第六感比 GPS 还准，常常说不出为什麼但結果都是对的。老闆要數据，我只有第六感，但第六感的准确率高得可怕。你呢？'},
logic:{name:'邏輯建筑师',icon:'🏗️',cl:'#1A3A5C',sub:'脑袋裡有一座蓝图，複杂的事都能拆成清楚的步驟',
desc:'你是系统思考者，带著迷迭香的清澈与雪松的稳重。看到一个问题，你不只看到问题本身，你看到整个系统，它的結构、它的因果关係、它的漏洞在哪裡。你很擅長「搭框架」：不管是企劃案、流程设计还是规劃旅行，你都能把複杂的事情拆成清楚的步驟，而且步驟之间还有邏輯关係。你的大脑像是一位建筑师，先画蓝图再动工。同事丟给你一堆亂七八糟的需求，你能在十分鐘內整理成一张流程图。你的挑战是，有時候蓝图太完美了，导致遲遲不敢开工。你在等「所有条件都到位」的那一刻，但那一刻可能永远不会來。完美的计画不如先开始的勇气。有時候先盖再说，边盖边改，效率反而更高。',
oil:'🌿 迷迭香：工作前嗅吸，系统思考更犀利、全局观更清晰。你的脑內流程图解析度直接升到 4K。\n🌿 雪松：執行階段滴 2 滴在掌心，稳定的力量从想法推进到行动，不再只是漂亮的蓝图。\n🌿 黑胡椒：拖延的時候嗅吸一下，行动力点火。別再等了，先开始，完美可以路上修。\n\n为什麼這个配方对你有效？\n迷迭香的 1,8-桉油醇提升乙醯膽鹼濃度，让你的前額葉（大脑的 CEO 办公室）看到的系统全景图解析度更高。雪松的大西洋酮和雪松烯作用在基底核的「執行迴路」，把你从「画蓝图」推进到「盖房子」。黑胡椒的胡椒鹼促进正腎上腺素分泌，直接点燃你的行动力引擎，让前額葉不再用「还没准備好」当拖延的藉口。翻译：迷迭香把你的蓝图升級到 4K，雪松帮你拿起工具开工，黑胡椒在你说「再想想」的時候踹你一脚。',
med:'手边没有精油？试试這个：\n\n【邏輯建筑师的先开工练習】\n每当你发現自己又在「完善计画」而遲遲不动手的時候。\n\n第一步：站起來。对，站起來。做 3 次快速深呼吸（用力吸、用力吐）。每次吐气時跺一下脚。让身体的动能打破脑袋的停滯。\n\n第二步：坐下來。閉上眼。做 3 次方塊呼吸（吸 4 秒、停 4 秒、吐 4 秒、停 4 秒）。方塊呼吸的对称感很适合你的大脑，它会觉得「嗯，這很有結构」。\n\n第三步：在心裡把你現在卡住的那件事想成一棟大樓。问自己：「如果今天只盖第一层樓，第一塊磚要放在哪裡？」找到那塊磚。花 15 秒。\n\n第四步：睜开眼。不要想第二塊磚。拿起那第一塊磚。马上。就是現在。\n\n第五步：做完第一步之後，回來呼吸 3 次。告诉自己：「蓝图的 70% 已经够了。剩下的 30% 边盖边画。」\n\n你的计画能力是世界級的。但世界級的蓝图如果永远停在纸上，就只是一张纸。开工吧。',
awareness:'你的觉察练習：下次做计画的時候，刻意把「开始執行」设在计画完成度 70% 的時候，而不是 100%。留 30% 给「边做边调整」。你会发現，那 30% 的空隙反而让成果更好，因为現實会教你蓝图裡看不到的東西。',
share:'🏗️ 我是邏輯建筑师！脑袋裡有一座蓝图，同事丟亂七八糟的需求，我十分鐘整理成流程图。唯一的问题是蓝图太完美，永远在等「准備好」的那天。你是哪款？'},
artistic:{name:'感性詩人',icon:'🦋',cl:'#E58E26',sub:'你用五感理解世界，別人看數据你看光影',
desc:'你的大脑不是用「想」的，是用「感觉」的，飄著依兰依兰和茉莉交织的花香。你走进一个空间，第一个注意到的是光线、气味、温度、氛圍，不是「這裡有幾张桌子」而是「這裡让我想起小時候外婆家的下午」。你读一段文字，先感受到的是情緒而不是资讯。你聽音樂的時候整个人会被带走，看一部好电影会哭到不行。你的感知力是你最大的天賦，你能察觉到別人忽略的细节：一朵花瓣边缘微微泛红的层次、一个人笑的時候眼睛裡那一闪而过的疲倦。你的挑战是，這个世界大部分是为「理性脑」设计的，你有時候会觉得自己格格不入。会议上大家在討论 KPI，你在想「這个办公室的光线让人好压抑」。但请记得：那些最动人的作品、最深刻的连結，都來自你這種大脑。',
oil:'🌿 依兰依兰：随時嗅吸，感知力的花朵綻放、五感更敏銳。世界在你的鼻尖变成一首詩。\n🌿 茉莉：创作前滴在手腕，美感的流动被啟动，把內心的感受变成別人看得见的表达。\n🌿 乳香：感觉太满的時候，滴 2 滴在掌心深呼吸。接地、在感知的海洋裡找到錨。不是麻痹感觉，是让感觉有著陸的地方。\n\n为什麼這个配方对你有效？\n依兰依兰的沉香醇和苯甲酸苄酯同時啟动你的嗅觉皮层和边缘系统，让你本來就敏銳的五感再开放一层。茉莉裡的吲哚和茉莉酮啟动布洛卡区和运动皮层之间的连結，让你的內在感受能够流暢地转化成文字、画面、旋律。乳香的乳香酸和倍半萜烯則像一枚錨，稳住你过度活躍的边缘系统，让感觉不会多到把你淹没。翻译：依兰依兰把你的五感天线从 HD 升到 8K，茉莉帮你把感觉变成作品，乳香在你快要被感觉淹没的時候拉你一把。',
med:'手边没有精油？试试這个：\n\n【感性詩人的校准练習】\n当你因为感觉太多而疲倦的時候，或者需要安静下來的時候。\n\n第一步：找一个安静的空间。坐下來。閉上眼。做 5 次深呼吸（吸 5 秒、吐 8 秒）。\n\n第二步：想像你的五感都有各自的音量旋鈕。視觉、聽觉、嗅觉、触觉、味觉。花 30 秒感觉一下，哪个的音量現在开得最大？\n\n第三步：把那个最大的旋鈕慢慢转小。不是关掉，是从 10 转到 6。感觉一下，安静了一点嗎？\n\n第四步：現在把所有的旋鈕都转到 3。整个世界安静下來了。在這个安静裡待 60 秒。聽你自己的呼吸声。它像什麼？海浪？风？一首很慢的歌？\n\n第五步：做 3 次深呼吸。每次吐气默念：「我的敏銳不是脆弱，是天賦。但天賦也需要休息。」\n\n你不需要关掉你的天线。你只需要学会在需要的時候把音量转小。這个世界不是为你的频率设计的，但那正是你的珍貴之处。',
awareness:'你的觉察练習：当你因为「太敏感」而疲倦的時候，不要怪自己。那不是脆弱，是天线太強。你需要的不是关掉天线，而是学会篩选，不是所有讯号都需要接收。每天花五分鐘安静嗅聞一支精油，专注在這一个气味上，就是最好的校准练習。'}
};
