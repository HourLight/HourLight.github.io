<script>
var TYPES={
invisible:{name:'隐形人型',icon:'👻',sub:'存在感越低越安全',
desc:'你的社交策略是「让自己消失」。不是不喜欢人，而是被注意到這件事本身就让你全身不自在。你可以在咖啡厅待一整天，但前提是没有人跟你讲话。你的存在感刻意调到最低，彷彿一隻想融入墙壁花紋的变色龍。朋友约你出门時，你最先想的不是「好不好玩」，而是「会有多少人」。你把「不被看见」当成一種保护，但其實你內心深处渴望被温柔地发現。你的焦慮不在表演，而在「暴露」，怕被看穿自己其實没有那麼从容。',
oil:'🌿 <strong>精油处方：乳香（安定存在感）× 甜橙（温暖打开心门）× 檀香（根植自我价值）</strong><br><br>隐形人型的焦慮來自「存在本身」。乳香的木质樹脂香气能稳定你的神经系统，让「被看见」不再那麼可怕。每天早晨在胸口滴一滴乳香，深呼吸三次，跟自己说：「我在這裡，這样就够了。」出门前手腕抹一点甜橙，让柑橘的明亮感为你打开一扇小窗。\n\n为什麼這个配方对你有效？\n乳香裡的乳香酸（boswellic acid）能温柔地安撫你过度警觉的杏仁核，把「被注意到＝危险」的警报音量调小。甜橙富含的檸檬烯（limonene）則直接跟你的边缘系统说悄悄话，像一杯温熱的可可，让你的神经从「隐形模式」慢慢切換到「我在這裡也可以」模式。檀香裡的 α-檀香醇能活化前額葉皮质，帮你建立「存在本身就有价值」的新迴路。三支精油一起工作，就像帮你的灵魂装了一盞柔和的夜灯，不刺眼，但足够让別人温柔地看见你。',
med:'手边没有精油？试试這个：\n\n【存在感呼吸法】\n找一个安静的角落坐下，双脚平放在地面。閉上眼睛，用 4 秒鐘慢慢吸气，想像空气是一层淡淡的金色光暈，从头顶开始往下包覆你的身体。hold 住 4 秒，感受這层光暈让你的轮廓变得清晰。然後用 6 秒鐘慢慢吐气，想像這层光暈不会消失，只是变得更柔和。重複 5 次。\n\n做完之後，睜开眼睛，环顾四周，找到 3 个你喜欢的颜色、2 个你聽到的声音、1 个你聞到的味道。這个 3-2-1 著陸法会把你从「隐形狀态」拉回「我在這裡」的真實感。每天早上出门前做一次，或是到达社交场合的前 3 分鐘在洗手间偷偷做，效果很好。',
insight:'你不需要变得外向，只需要允许自己「被看见也没关係」。'},

actor:{name:'完美演员型',icon:'🎭',sub:'台上满分台下崩潰',
desc:'你在人前的表現堪称完美，笑容到位、应对得体、谁都觉得你「很会社交」。但只有你知道，每一场社交都是一场消耗巨大的舞台劇。回到家的瞬间，你像被拔掉电池的机器人，什麼都不想动。你的焦慮不在「能不能做好」，而在「如果有一次没做好怎麼办」。你对自己的社交表現有著近乎苛刻的标准，一句说错的话可以让你反覆回想三天。你演得太好了，好到没有人发現你在演。而這，才是最累的部分。',
oil:'🌿 <strong>精油处方：薰衣草（卸下面具）× 羅马洋甘菊（允许不完美）× 佛手柑（真實的自信）</strong><br><br>完美演员型需要的不是更好的演技，而是「允许NG」。薰衣草的鎮静酯类能直接松开你紧繃的杏仁核，让神经系统从「備战」切換到「安全」。社交結束後，泡一个加了三滴薰衣草的熱水澡，让那些反覆回想的对话随著蒸气散去。佛手柑則帮你找回不靠表演也能自在的底气。\n\n为什麼這个配方对你有效？\n薰衣草裡的沉香醇（linalool）和乙酸沉香酯是你的卸妝水，它們直接作用在杏仁核和边缘系统，温柔地跟你过度亢奮的「社交表演监控中心」说：「今天的戏份結束了，可以休息了。」羅马洋甘菊的酯类分子則像一条柔软的毛毯，裹住你那个在脑中不断回放「剛才那句话是不是说错了」的焦慮迴圈，让前額葉从「覆盘模式」安静下來。佛手柑的檸檬烯和呋喃香豆素能刺激迷走神经，帮你的身体记住「不演的時候也很安全」這个新感觉。',
med:'手边没有精油？试试這个：\n\n【卸下面具呼吸法】\n找一个独处的空间（浴室、車裡都可以）。先做一个誇张的表情：把眼睛睜到最大、嘴巴张到最开，hold 住 5 秒，然後瞬间放松，让脸上所有肌肉垮下來。重複 3 次。這是在帮你的脸部肌肉记住「不用維持表情」的感觉。\n\n接著閉眼，用鼻子吸气 4 秒，想像自己正在脫掉一件很重的戏服。嘴巴吐气 6 秒，发出「哈，」的声音（越大声越好），想像那件戏服掉在地上。重複 6 次。\n\n最後把右手放在心口，左手放在肚子上，对自己说三次：「今天的我已经够好了。」感受手掌下心跳慢慢变稳的节奏。整个过程约 3 分鐘，适合每次社交活动後马上做。',
insight:'完美不是目标，真實才是。允许自己偶爾「不那麼好」，才是真正的強大。'},

mindreader:{name:'读心术型',icon:'🔮',sub:'瘋狂猜测別人在想什麼',
desc:'你的大脑有一个內建的「他人想法模擬器」，而且永远往最坏的方向跑。对方皺了一下眉，你已经在脑中上演一齣「他是不是討厭我」的小劇场。別人少回你一个表情符号，你就开始回顾过去七天有没有做错什麼。你只是太擅長「读出不存在的惡意」了。你的共感力是天賦，但当它过载的時候，別人的每一个表情都会变成一把瞄准你的箭。最累的是，你永远无法验证自己的猜测，所以焦慮永远不会結束。',
oil:'🌿 <strong>精油处方：岩兰草（停止脑內小劇场）× 快樂鼠尾草（松开思緒糾結）× 葡萄柚（回到当下）</strong><br><br>读心术型的焦慮核心是「过度解读」。岩兰草厚重的泥土气息像一个錨，把你从「他是不是討厭我」的漩渦裡拉回來。在手帕上滴兩滴岩兰草，焦慮发作時聞一聞。睡前在太阳穴抹一滴快樂鼠尾草，让那些今天读错的「心」安静下來。\n\n为什麼這个配方对你有效？\n岩兰草裡的岩兰草醇和岩兰草酮是天然的「脑內小劇场断电器」，它們的大分子結构能放慢你过度运转的边缘系统，让杏仁核那个瘋狂按警报的小人安静下來。快樂鼠尾草的乙酸沉香酯直接跟你的前額葉溝通，帮你把「分析別人表情」的频寬让一点出來给「活在当下」用。葡萄柚满满的檸檬烯像一桶冰水，把你从脑內的第八百集小劇场裡潑醒，让迷走神经重新校准，回到「此時此刻对方只是皺了一下眉而已」的現實。',
med:'手边没有精油？试试這个：\n\n【小劇场暫停键练習】\n当你发現自己又在瘋狂猜测「他剛才那个表情是什麼意思」的時候，马上做這件事：双脚用力踩地板 3 下（真的踩出声音），然後大声在心裡喊「暫停！」。\n\n接著做 5 次「方塊呼吸」：吸气 4 秒、hold 4 秒、吐气 4 秒、hold 4 秒。每次吐气的時候，想像脑中的小劇场螢幕慢慢变暗、关机。\n\n最後做一个「事實查核」：在心裡列出 3 件你「确定知道」的事（例如：我現在坐在咖啡厅、外面在下雨、我的咖啡还是熱的），用确定的事實把猜测的小劇场擠出去。整个过程不到 2 分鐘，在任何场合都能偷偷做。每天睡前也可以做一次，把今天所有「读错的心」打包丟进想像中的碎纸机。',
insight:'你猜测的那个「別人的想法」，99%是你自己的恐懼投影。'},

runner:{name:'逃跑专家型',icon:'🏃',sub:'能闪就闪 闪不了就撐',
desc:'你的社交焦慮直接反映在行为上，能不去就不去，能早走就早走，能躲就躲。你有一整套精密的「社交迴避系统」：假装没看到讯息、突然身体不舒服、剛好那天有事。不是不想跟人连結，是光想到要面对一群人，你的身体就先替你踩了煞車。心跳加速、手心冒汗、脑袋一片空白，這些不是你在演，是你的自律神经真的在拉警报。你的逃跑不是懦弱，是身体在保护一个曾经在社交中受过傷的你。',
oil:'🌿 <strong>精油处方：甜马鬱兰（安撫自律神经）× 橙花（修复社交创傷）× 黑云杉（勇气的气味）</strong><br><br>逃跑专家型的身体反应很真實，所以需要从身体层面去安撫。甜马鬱兰能直接作用於副交感神经，降低「战或逃」的警报等級。出门前在後颈和手腕各滴一滴，让它成为你的「安全結界」。橙花的花香則像一双温柔的手，撫平你过去在社交场合裡留下的皺褶。\n\n为什麼這个配方对你有效？\n甜马鬱兰裡的沉香醇和萜品烯-4-醇是你的自律神经安撫师，它們能直接啟动副交感神经（就是那个負責「放松、没事的」的系统），把你的杏仁核从「红色警戒」调回「黃灯注意」。橙花裡的橙花叔醇（nerolidol）温柔得不讲道理，它能穿过血脑屏障跟你的边缘系统直接对话，慢慢修复那些「上次社交搞砸了」的记忆檔案，让它們不再自动触发逃跑反应。黑云杉的乙酸龍脑酯則像一双稳稳的手扶住你的腎上腺，让你的身体记住：「站在原地不跑，天也不会塌下來。」',
med:'手边没有精油？试试這个：\n\n【安全結界身体扫描】\n当你感觉到「想逃」的冲动升起來的時候（心跳加速、手心冒汗、脑袋空白），先不要动。把双手交叉放在胸前，像在抱住自己。\n\n然後做「蝴蝶拍」：左右手轮流轻拍自己的上臂，左、右、左、右，每秒一下的节奏，持續 30 秒。這个动作能直接刺激迷走神经，帮你的身体从「逃跑模式」切換回來。\n\n接著做 4 次深呼吸：鼻子吸气 3 秒，嘴巴吐气 7 秒（吐气比吸气長是关键，這会啟动你的副交感神经）。每次吐气時，想像你的脚下長出樹根，深深扎进地板裡，让你稳稳地站在原地。\n\n做完之後跟自己说：「我可以待 5 分鐘看看。」不用承諾待一整晚，只要 5 分鐘就好。通常 5 分鐘之後你会发現：其實没有想像中那麼可怕。',
insight:'你不需要变勇敢，只需要一次「没逃跑但也没事」的经验。'},

slowwarm:{name:'暖机慢熱型',icon:'🐢',sub:'不是不行 是需要時间',
desc:'你只是需要比別人多三倍的暖机時间。剛到一个场合的前三十分鐘你是一塊木头，但如果有人愿意等你，一个小時後你可能是全场最好聊的那个。你的问题不在「不会社交」，而在「啟动太慢」。這个世界对慢熱的人不太友善，聚会通常在你剛暖好的時候結束，面试通常在你最紧张的前十分鐘决定一切。你需要的不是改变自己，而是找到愿意等你开机的人和场合。你一旦打开，温度比谁都暖。',
oil:'🌿 <strong>精油处方：薑（加速暖机）× 肉桂葉（点燃內在火焰）× 玫瑰天竺葵（柔化社交稜角）</strong><br><br>暖机慢熱型需要的是「加速开机」的配方。薑的辛辣温熱能活化你的循环系统，让身体的能量从「省电模式」切換到「正常运作」。出门前三十分鐘，在腹部順時鐘按摩兩滴薑精油，让温熱感从核心往外扩散。到了現场如果还是卡卡的，聞一下手腕上的玫瑰天竺葵，让花香替你打开话匣子。\n\n为什麼這个配方对你有效？\n薑裡的薑辣素和薑烯能像一杯熱拿鐵一样暖开你的循环系统，同時刺激你的前額葉皮质加速开机。慢熱的人不是不想互动，是身体的「社交引擎」啟动比較慢，薑就是那根点火的火柴。肉桂葉的肉桂醛能轻轻推一把你的腎上腺，释放恰到好处的去甲腎上腺素，让你从「省电模式」順暢切換到「我准備好了」。玫瑰天竺葵的香茅醇和牻牛兒醇則温柔地打开你的边缘系统，像春天的暖风一样融化你剛到场時那层薄薄的冰。三支精油合作，就像帮你的暖机時间从 30 分鐘压缩到 10 分鐘。',
med:'手边没有精油？试试這个：\n\n【加速暖机运动】\n到达社交场合之前，找一个没人的地方（电梯裡、停車场、洗手间都行），做這套 90 秒暖机操：\n\n第一步（30 秒）：原地快速踏步，膝盖尽量抬高，同時双手用力甩动。這会让你的血液循环加速、体温上升，身体暖了，嘴巴就比較容易打开。\n\n第二步（30 秒）：停下來，双手搓熱，捂住脸頰 10 秒，然後移到耳朵 10 秒，最後放在後颈 10 秒。每个位置都深呼吸一次，想像温度从手掌传进去。\n\n第三步（30 秒）：张开嘴巴做 5 次誇张的「啊」的嘴型（不用出声），放松你的下巴肌肉。然後用舌头快速舔上下嘴唇各 3 圈。這是在喚醒你的口腔肌肉，让等等开口说话变得更容易。\n\n暖好之後走进场合，给自己一个任務：「到场後 5 分鐘內，对任何一个人微笑点头就好。」从最小的互动开始暖，不用急著变成全场焦点。',
insight:'慢熱不是缺陷，是你在确认安全後才交出真心的方式。'}
};
