const DIMS={perfect:'完美癱瘓',retreat:'臨门退缩',destruct:'自毀城墙',delay:'永远在等',minimize:'自我矮化'};
const TYPES={
  perfect:{name:'完美癱瘓型',icon:'🔍',sub:'你的标准高到把自己卡死了',
    keys:['超高标准','反覆修改','害怕犯错'],
    desc:'你的自我破坏方式是把标准拉到没有人能达到的高度，包括你自己。事情做到八十分，你看到的不是那八十分的好，而是那二十分的缺。然後你开始修改、调整、推翻重來。改到最後，成品可能比第一版还差，但你停不下來。因为你真正害怕的不是做不好，是「被人发現你不完美」。',
    detail:'完美主义式的自我破坏特別狡猾，因为它看起來像认真、像有要求、像追求卓越。但驅动這一切的引擎不是熱愛品质，是恐懼。恐懼不够好、恐懼被批评、恐懼如果不完美就不被愛。\n\n你可能小時候得到的讯息是「做好了是应该的，没做好才需要被討论」。所以你学会了一件事：永远不要让人看到瑕疵。但问题是，当你不允许自己有瑕疵，你也不允许自己完成任何事情。因为完成就意味著要交出去、要被看见、要被评价。\n\n觉察邀请：今天试试看，做一件事情做到七十分就停手。不是因为七十分就够了，是因为你需要体验一次「不完美但完成了」的感觉。那个感觉比「完美但永远交不出去」值钱太多了。',
    oil:'薰衣草 2 滴＋甜橙 2 滴＋乳香 1 滴，在你卡在修改迴圈的時候扩香。薰衣草告诉你的神经系统「够了」。甜橙让你回到一種轻盈的狀态，不是每件事都必须沉重。乳香带來一種「完整感」，不是完美，是完整。',
    med:'看著你手上正在做的那件事。不管它現在幾分。吸气四秒，对它说：「你已经够好了。」吐气六秒。吸气四秒，对自己说：「我已经够好了。」吐气六秒。重複四次。然後把它交出去。',
    quote:'完成比完美重要。你一直在修改的那个東西，世界已经等它很久了。'},
  retreat:{name:'臨门退缩型',icon:'🚪',sub:'门开了，你卻转身走掉',
    keys:['害怕成功','害怕被看见','最後一步消失'],
    desc:'你的自我破坏不是做不到，是在做到的前一刻退场。升遷面试前生病了、告白前先消失了、机会來了说「我再想想」然後再也没有然後。你的能力够，准備也够，但到了那个「要跨过去」的臨界点，你的身体会自动踩煞車。因为比起失败，你更怕的是站在那个位置之後不知道怎麼办。',
    detail:'臨门退缩的核心恐懼是「成功之後的我还是我嗎？」。你已经非常熟悉「努力中」的自己，那个角色你很会演。但「成功了」的那个角色，你完全陌生。你不知道成功之後大家会怎麼看你、你会不会失去現在的朋友、你能不能維持在那个水准。\n\n所以与其面对那个未知，你选擇留在安全的「差一步」。這裡多舒服，你永远有一个藉口：「我还没有真正试过。」但這个藉口的代价是你永远不知道自己真正能到哪裡。\n\n觉察邀请：下一次机会來的時候，注意你的身体。喉嚨紧了嗎？胃开始翻攪了嗎？那不是直觉告诉你「不要去」，那是你的恐懼在假装成直觉。学著分辨這兩者的差別。',
    oil:'佛手柑 2 滴＋迷迭香 2 滴＋黑胡椒 1 滴，在你需要踏出那一步的時候扩香。佛手柑融化猶豫。迷迭香让你的前額葉清醒到不被恐懼劫持。黑胡椒带來一種「行动的温度」，不是推你，是托住你。',
    med:'站在一扇门前。不管是真的门还是想像的。吸气四秒，想像门後面是你想要的那个東西。吐气六秒，感觉脚底踩著地板。对自己说：「我不需要知道门後面所有的事。我只需要知道下一步是什麼。」吸气四秒，伸出手。吐气六秒，开门。',
    quote:'让你卻步的未必是失败，而是成功之後不知道怎麼当那个版本的自己。但那个你，其實很期待跟你见面。'},
  destruct:{name:'自毀城墙型',icon:'💥',sub:'你亲手拆掉了自己盖的東西',
    keys:['冲动行为','自找麻烦','得到了就搞砸'],
    desc:'你的自我破坏最直接：得到了就弄坏它。找到好工作之後开始遲到、得到好感情之後开始找碴、存了钱之後冲动揮霍。不是不知道後果，是在「好事发生」的時候你的內在有一个声音说：「這不属於你。」然後你用行动去证明那个声音是对的。',
    detail:'自毀行为的底层邏輯是：「如果好事一定会消失，不如由我來决定它什麼時候消失。」這種感觉跟小時候的经验有关。可能你曾经被承諾了什麼然後落空，可能你学到的是「好的東西不会留太久」。所以你先下手为強，在失去之前主动破坏，至少這样「主导权在你手上」。\n\n但你有没有发現，每次你破坏完之後不是松了一口气，而是更空、更难受？因为你真正渴望的是「好的東西会留下來」，但你不敢让自己相信。所以你把每一次「好」都变成了「看吧，果然留不住」的证据。\n\n觉察邀请：下次你想做一件你知道会搞砸某件好事的行为之前，给自己十秒鐘。只要十秒。在這十秒裡问自己：「我是真的想這样做，还是我在破坏我害怕失去的東西？」',
    oil:'岩兰草 2 滴＋薰衣草 2 滴＋檀香 1 滴，在你感觉到冲动的時候聞。岩兰草把你拉回地面。薰衣草让那个內在的躁动安静十秒鐘。檀香带來一種深沉的「值得」感。你值得好的東西留下來。',
    med:'双手张开，掌心朝上。想像你手上捧著一样你很珍惜的東西。吸气四秒，感觉它的重量。吐气六秒，不要把它放下。对自己说：「我可以拿著好的東西不放手。它不会因为我拿著就消失。」重複四次。慢慢把手合起來，收在胸口。',
    quote:'好東西你配得起。只是你还没学过「好東西留在手上」的感觉。'},
  delay:{name:'永恆等待型',icon:'⏳',sub:'你一直在等最好的時机，但最好的時机不会來',
    keys:['慣性拖延','等待時机','用准備取代行动'],
    desc:'你的自我破坏方式是把「开始」无限延後。我再学一个课程再说、等我准備好再开始、時机不对先不要、再想想看。你一直在「准備」，但从來没有「出发」。你的抽屜裡有十个企劃书、五个证照、三个计画，全部都在等你按下啟动键。但你就是按不下去。',
    detail:'永恆等待者的核心信念是「我还不够」。不够好、不够专业、不够有经验、不够有钱、不够瘦、不够准備好。這个「不够」永远不会消失，因为你在用「准備」來代替「面对」。\n\n你知道嗎，准備是会上癮的。它给你一種「我在前进」的错觉，但你其實一步都没有动。你在原地转圈，只是转得很认真、很忙碌、很有理由。\n\n问一个殘酷的问题：如果你已经够好了，你現在马上可以开始，你愿意嗎？如果答案是「我不确定」，那你等的不是時机，你在逃避的是开始之後的未知。\n\n觉察邀请：选一件你已经「准備很久」的事情。今天就做第一步。不是做完，是做第一步。踏出去的那一刻，你会发現其實你早就准備好了。',
    oil:'葡萄柚 2 滴＋薄荷 1 滴＋迷迭香 2 滴，在你又想「再等等」的時候扩香。葡萄柚带來啟动的能量。薄荷让脑袋清醒到不再合理化拖延。迷迭香点燃那个「做就对了」的冲勁。',
    med:'看一下時鐘。记住現在的時间。吸气四秒，对自己说：「如果不是現在，是什麼時候？」吐气六秒。吸气四秒，对自己说：「我不需要准備好。我只需要开始。」吐气六秒。站起來。做那件事的第一步。不管多小都可以。',
    quote:'完美的時机是一个謊言。唯一的時机就是現在。'},
  minimize:{name:'自我矮化型',icon:'🔇',sub:'你把自己的音量调到最小，假装自己不重要',
    keys:['否认成就','自我貶低','配不上感'],
    desc:'你的自我破坏方式最安静，安静到你自己都不觉得那是破坏。你把每一次成功都归功於运气、归功於別人、归功於「还好啦」。表面看起來像謙虛，但你心裡清楚，那是真心觉得自己不配。好事发生的時候你的第一反应是「我何德何能」，坏事发生的時候你的第一反应是「果然」。',
    detail:'自我矮化的底层是一个非常深的信念：「真正的我不值得被看到。」你可能从小就被教导要謙虛、不要出风头、不要觉得自己很了不起。這些教导变成了你的预设程式，它不让你往上走，每次你爬高一点，它就拉你回來。\n\n你知道自我矮化最可怕的地方在哪嗎？它会成真。当你一直告诉自己「我不够好」，你真的会开始做出「不够好」的行为。不是因为你真的不够好，是你的行为在配合你的信念。你选擇低於自己能力的工作、低於自己价值的感情、低於自己真正想要的人生。\n\n觉察邀请：今天做一个练習。列出三件你做得好的事情。不准加「但是」。不准加「其實也没什麼」。就让那三件事好好地站在那裡。',
    oil:'玫瑰 1 滴＋茉莉 1 滴＋佛手柑 2 滴＋甜橙 1 滴，在你又想说「我哪有」的時候扩香。玫瑰告诉你的心：你配。茉莉让你的价值感不需要外在证明。佛手柑打开你的太阳神经叢，那是自信住的地方。甜橙让你嚐到「我很好」的甜味。',
    med:'站在镜子前面。看著自己的眼睛。吸气四秒，对镜子裡的人说：「你做了很多很棒的事。」吐气六秒。吸气四秒，对镜子裡的人说：「你值得被看见。」吐气六秒。重複四次。不用笑，不用做表情。就好好看著自己。',
    quote:'你以为的謙虛，其實是你对自己最深的暴力。'},
  perfect_retreat:{name:'高标逃跑型',icon:'🎯',sub:'你设了一个达不到的标准，然後用「达不到」当理由离开',
    keys:['不合理标准','合理化放棄','用完美当退路'],
    desc:'你融合了完美癱瘓和臨门退缩的特质。你先把目标设得超級高，高到幾乎不可能达到。然後当你「果然」达不到的時候，你就可以合理地退场了。「不是我不想做，是這件事太难了。」這个劇本你演了很多遍，每次都很有说服力，连你自己都信了。',
    detail:'這種模式的精妙之处在於它看起來一点都不像自我破坏。你有高标准，這聽起來很积极。你放棄了达不到的目标，這聽起來很理性。但把兩件事合在一起看，你会发現你的高标准只是用來合理化逃跑的工具。\n\n你真正害怕的不是失败，是在合理的标准下全力以赴之後还是做不到。那才是你真正不敢面对的。所以你把标准拉到不合理的高度，這样你永远可以说「不是我不行，是這件事本來就不可能」。\n\n觉察邀请：下一次设目标的時候，把它降低三成。不是降低标准，是给自己一个真的有可能达到的起点。你会发現，当成功变得真的有可能的時候，你反而更紧张。那个紧张才是你真正需要面对的東西。',
    oil:'佛手柑 2 滴＋薰衣草 2 滴＋甜橙 1 滴。佛手柑释放你给自己的压力。薰衣草让你的标准松一点，松到人可以呼吸的程度。甜橙让你记得做事情可以有樂趣，不只是考验。',
    med:'写下你現在最想达成的一个目标。然後问自己：「七十分的版本長什麼样？」吸气四秒，让那个七十分的版本在脑海裡成形。吐气六秒，对自己说：「七十分就够了。先到那裡再说。」',
    quote:'你的标准不是太高。你的标准是一面墙，擋在你和「真的去试」之间。'},
  retreat_minimize:{name:'隐形能力者',icon:'👻',sub:'你把自己藏得這麼好，连机会都找不到你',
    keys:['主动隐形','拒绝舞台','能力比位置高太多'],
    desc:'你明明有能力卻选擇隐形。不是不被看见，是你主动把自己藏起來。升遷机会你往後退、发言机会你保持沉默、領功勞的時候你已经离开了。你用「我不在乎那些」來包装你真正的恐懼：如果我被看见了，然後被发現其實没有那麼好怎麼办？',
    detail:'隐形能力者是臨门退缩和自我矮化的组合。你害怕被看见，同時你真心觉得自己不配。這兩者互相加強：因为觉得不配所以躲起來，因为躲起來所以没有机会被证明你其實很好，因为没有被证明所以更觉得不配。\n\n你身边的人可能觉得很可惜。他們看得到你的能力，但你就是不愿意站到那个位置上。你可能会说「我喜欢在幕後」，但问问自己的心：你是真的喜欢幕後，还是你不敢走到幕前？\n\n觉察邀请：這週试一次：在一个安全的场合裡，主动说出你的想法。不用很多，一句就好。感觉一下被聽见的時候，你的身体是什麼反应。',
    oil:'茉莉 1 滴＋迷迭香 2 滴＋佛手柑 2 滴。茉莉打开你的喉轮，让你的声音可以出來。迷迭香喚醒你的存在感。佛手柑让被看见变成一件温暖的事而不是危险的事。',
    med:'坐著。想像你在一个房间裡，灯光慢慢亮起來，照在你身上。吸气四秒，让光停在你身上。吐气六秒，不要把光推开。对自己说：「被看见是安全的。」重複四次。',
    quote:'你把自己藏得太好了。但世界少了你那份光，真的比較暗。'},
  destruct_delay:{name:'自爆倒數型',icon:'💣',sub:'你等到最後一刻，然後用最戏劇化的方式結束一切',
    keys:['拖到不行','戏劇性結局','用危机感取代行动'],
    desc:'你是拖延和自毀的组合。你会把事情拖到最後一刻，拖到它已经变成一顆炸弹了，然後让它爆炸。你用「時间不够了」当理由去做一个冲动的决定，而那个决定通常比什麼都不做更糟。你的人生像一齣劇，总是在deadline前上演最激烈的劇情。',
    detail:'自爆倒數者的底层是一種矛盾：你同時害怕面对和害怕不面对。拖延是不想面对，自毀是用最激烈的方式面对。這兩者交替出現，你的人生就变成了一个永恆的紧急狀态。\n\n你可能对「平静」感到不安。当事情太久没有危机的時候，你反而开始製造危机。因为你已经習慣了「在压力下运作」，平静对你的神经系统來说反而像一種威脅。\n\n觉察邀请：下次你发現自己又在「等到最後一刻」的時候，在倒數开始前一週就动手。即使只做五分鐘。打破那个「危机才能驅动我」的模式。你不需要活在倒數裡。',
    oil:'岩兰草 2 滴＋甜橙 2 滴＋薄荷 1 滴。岩兰草让你在还没到危机的時候就落地。甜橙告诉你「平静也可以是一種力量」。薄荷让你的头脑清醒到可以在不紧急的時候也做决定。',
    med:'看著日曆上某个deadline。吸气四秒，对自己说：「我不需要等到火燒屁股才能动。」吐气六秒。吸气四秒，想像自己在deadline的一週前就已经完成了。那个感觉像什麼？吐气六秒。今天就做第一步。',
    quote:'你不需要活在倒數裡。平静的日子也值得被好好过。'},
  minimize_delay:{name:'佛系放棄型',icon:'🫥',sub:'你用「无所謂」把所有可能性都推远了',
    keys:['假装不在意','消极等待','用淡漠保护自己'],
    desc:'你的自我矮化和慣性等待合在一起，变成了一種很温和的放棄。你不觉得自己在破坏什麼，你觉得你只是「比較随缘」。但你的随缘有一个很明确的方向：它永远指向「不嘗试」。你用「都可以」「没关係」「无所謂」把自己包起來，看起來很佛系，但底下是你已经放棄了为自己爭取任何東西。',
    detail:'佛系放棄的核心不是真的看开了，是你把「我不够好所以不值得爭取」偽装成了灑脫。真正的灑脫是经历过之後的放下，你的灑脫是经历之前的逃避。\n\n你可能会说「慾望越少越自在」，但你自己知道，深夜裡你还是会想那些你放棄的東西。你放棄的不是慾望，你放棄的是「相信自己可以得到」。\n\n觉察邀请：问自己一个问题：「如果我知道不会失败，我最想做什麼？」不需要马上去做。先让自己承认「我其實想要」就好。那已经是很大的一步了。',
    oil:'葡萄柚 2 滴＋迷迭香 1 滴＋黑胡椒 1 滴＋甜橙 1 滴。葡萄柚喚醒你的渴望。迷迭香让你的意志力不再装睡。黑胡椒带來一種微辣的行动冲勁。甜橙让追求自己想要的東西变成一件愉快的事。',
    med:'坐著。双手放在膝盖上。吸气四秒，问自己：「我真正想要什麼？」不要用脑袋回答，让身体回答。吐气六秒。吸气四秒，让那个答案浮上來。不管多小多荒謬都可以。吐气六秒，对自己说：「我可以想要。想要不丟脸。」',
    quote:'那份无所謂是假的。你只是把「想要」锁起來太久了。'},
  perfect_destruct:{name:'登顶墜落型',icon:'🏔️',sub:'你爬到了很高的地方，然後从山顶跳下來',
    keys:['追求极致','抵达後崩坏','得到就失去'],
    desc:'你是完美癱瘓和自毀城墙的混合。你能做到很高的成就，你的能力和毅力都是真的。但你有一个可怕的模式：到达顶端之後，你会亲手把它拆掉。升遷後搞砸关係、比賽贏了之後退出圈子、赚到钱之後做出糟糕的投资。你像一个登山者，登顶之後不是下山，是往下跳。',
    detail:'登顶墜落者的核心矛盾是：你渴望成功但恐懼停留在成功裡。你可以忍受追逐的辛苦，但你忍受不了「已经到了」的安静。因为「到了」意味著你不能再用「还在努力」來定义自己。\n\n你的身份认同綁在「奮鬥者」這个角色上。当你成功了，奮鬥結束了，你突然不知道自己是谁。所以你搞砸它，回到「需要重新开始」的狀态。在那裡你很安全，因为你又可以当那个「正在爬山的人」。\n\n觉察邀请：下次你达成了什麼，给自己一个仪式。不需要多隆重。就停下來，感觉三秒鐘。让「我做到了」這个感觉进到身体裡。不用急著设下一个目标。',
    oil:'檀香 2 滴＋薰衣草 2 滴＋乳香 1 滴。檀香让你跟「到达」的感觉待久一点。薰衣草告诉你的神经系统不需要马上找下一个战场。乳香带來「我在這裡就好」的安定感。',
    med:'想像你站在山顶。吸气四秒，看著周圍的风景。吐气六秒，不要急著下山。对自己说：「我可以留在這裡。我不需要用破坏來证明什麼。」重複四次。让自己在山顶多待一会兒。',
    quote:'你的问题不是爬不上去。你的问题是到了之後不让自己留下來。'}
};
let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';
    const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 题 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一题</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一题 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看看我的自我破坏模式 🔧</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 题，共 '+questions.length+' 题';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const dimScores={};Object.keys(DIMS).forEach(k=>{dimScores[k]=0;});
  Object.keys(answers).forEach(qi=>{const oi=answers[qi];const s=questions[qi].opts[oi].s;Object.keys(s).forEach(d=>{dimScores[d]+=s[d];});});
  const maxPossible=Object.keys(answers).length*3;
  const sorted=Object.keys(DIMS).sort((a,b)=>dimScores[b]-dimScores[a]);
  const top=sorted[0],second=sorted[1];
  const v1=dimScores[top],v2=dimScores[second];
  let topType;
  if(v1>v2*1.4) topType=top;
  else{
    const comboKey=top+'_'+second;
    topType=TYPES[comboKey]?comboKey:(TYPES[second+'_'+top]?second+'_'+top:top);
  }
  const f=TYPES[topType];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('hlTitleReveal').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥灵之钥</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-quote">「'+f.quote+'」</div><div class="ss-footer">hourlightkey.com ✦ </div></div><div class="hl-title-card"><div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div><div class="hl-title-eyebrow">Hour Light ✦ 自我破坏模式觉察</div><span class="hl-title-icon">'+f.icon+'</span><div class="hl-title-main">'+f.name+'</div><div class="hl-title-sub">'+f.sub+'</div><div class="hl-title-divider"></div><div class="hl-title-grid"><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 破坏模式</div><div class="hl-title-tag-value">'+f.name+'</div></div><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 觉察关键字</div><div class="hl-title-tag-value">'+f.keys.join(' · ')+'</div></div></div><div class="hl-title-quote">「'+f.quote+'」</div><div class="hl-title-combo-hint">'+f.name+'｜'+f.sub+'</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">Self-Sabotage Pattern</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var pct=Math.round(dimScores[k]/maxPossible*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+DIMS[k]+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">'+f.icon+' 你的自我破坏模式</div><div class="result-section-content">'+f.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度觉察</div><div class="result-section-content">'+f.detail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🌿 认知芳疗配方</div><div class="result-section-content">'+f.oil+'</div></div><div class="result-section"><div class="result-section-title">🧘 60秒身体校准练習</div><div class="result-section-content">'+f.med+'</div></div><div class="result-section" style="text-align:center;font-family:LXGW WenKai TC,serif;font-size:1.05rem;color:#8b6914"><div class="result-section-content"></div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ H.O.U.R. 觉察橋接</div><div class="hour-bridge-text">自我破坏模式是「行动层」的卡住。H.O.U.R. 的 R（行动进化）就是在处理這个。<br>当你知道自己怎麼踩煞車，才能开始学著放开煞車。</div><a href="draw-hl.html" class="hour-bridge-cta">🔮 抽一张牌看看行动方向 →</a>';
  window._resultText=f.icon+' 我是「'+f.name+'」！'+f.sub+'\n「'+f.quote+'」\n\n你的自我破坏模式是什麼？👉 hourlightkey.com/sc/quiz-self-sabotage.html';
  try{localStorage.setItem('hl_quiz_self_sabotage',JSON.stringify({type:topType,dimScores,ts:Date.now()}));}catch(e){}
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_dropMaterial) HL_dropMaterial('quiz');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz',toolName:'自我破坏模式觉察'});window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
</script>
