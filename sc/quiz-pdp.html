oil:'黑胡椒 3 滴 + 雪松 2 滴',oilMethod:'滴在手腕，深呼吸三次再出门',oilScene:'开重要会议前、做大决定前',
oilText:'黑胡椒的辛辣跟你的果断同频，雪松的木质沉稳在你全速冲刺時轻轻踩一下剎車。快是你的天賦，稳是你的功课。\n\n为什麼這个配方对你有效？\n黑胡椒裡的胡椒鹼和 β-石竹烯能跟你天生高速运转的前額葉同频共振，不是让你慢下來，而是帮你的决策系统多装一个「品质檢查站」。雪松裡的雪松烯和大西洋酮則温柔地安撫你那个总是全速运转的杏仁核，像一隻稳稳的手按住方向盘，让你在冲刺的時候不会甩尾。老虎不需要更多油门，需要的是更好的煞車系统。',
med:'手边没有精油？试试這个：\n\n【策略暫停呼吸法】\n在你准備做一个快速决定之前（你一天大概做 87 个），強制自己暫停 90 秒。\n\n双手握拳放在桌上，用力握 5 秒，然後瞬间放开，感受手指展开的感觉。重複 3 次。這是在教你的身体「收放之间」的节奏。\n\n接著做 4 次「獵豹呼吸」：快速用鼻子吸气 2 秒（像獵豹锁定獵物），然後慢慢用嘴巴吐气 8 秒（像獵豹埋伏等待最佳時机）。重点在吐气要長，让你習慣「等一下再出手」的节奏。\n\n最後问自己兩个问题：「這件事一定要現在决定嗎？」和「我身边的人跟上了嗎？」如果答案是「其實可以等」或「他們还在消化」，就再给自己和团队 30 分鐘。老虎最厲害的不是冲得快，是知道什麼時候出手最精准。',

peacock:{name:'孔雀',icon:'🦚',sub:'自带聚光灯的溝通者',color:'#f39c12',
desc:'您像孔雀：走到哪裡都自带聚光灯，而且不是您故意开的，是您的能量就是這样，暖的、亮的、让人忍不住往您那边看。一个眼神就能让整个房间从冷调变暖调。您的表达力和感染力是天賦等級的，客戶本來要殺价的，被您三句话说得心甘情愿加购。但有時候太在意观眾反应了，忘了台下那个真正的自己。回到家关上门的時候，那个在眾人面前笑得最燦爛的您，真的还笑得出來嗎？您最珍貴的不是舞台上的光芒，是愿意把光关掉让人看见真實的那个瞬间。',
oil:'依兰 2 滴 + 佛手柑 3 滴',oilMethod:'睡前扩香 30 分鐘',oilScene:'需要回到自己、不用表演的夜晚',
oilText:'依兰的甜潤像你最真實的笑容，佛手柑的阳光提醒你：关掉舞台灯之後的你，才是最迷人的版本。\n\n为什麼這个配方对你有效？\n依兰裡的乙酸苄酯和沉香醇是你的「卸妝油」，能温柔地告诉你过度活躍的边缘系统：「今天的表演結束了，可以回到後台了。」它直接安撫你因为長時间維持社交能量而疲憊不堪的杏仁核。佛手柑的檸檬烯和呋喃香豆素則像一盞温暖的床头灯，刺激迷走神经慢慢降频，让你的前額葉从「观眾反应监控模式」切換到「只有我自己」的安静模式。聚光灯很亮很美，但你的眼睛也需要休息。',
med:'手边没有精油？试试這个：\n\n【关灯独处仪式】\n回到家或找到独处空间後，做這个 3 分鐘的「关灯练習」。\n\n第一步（60 秒）：站在镜子前面，刻意做出你今天对別人笑过的那種笑容。hold 住 5 秒，然後慢慢让嘴角放下來，放到完全没有表情。重複 3 次。這是在告诉你的脸部肌肉：「下班了。」\n\n第二步（60 秒）：閉上眼睛，双手轻轻盖住耳朵。用鼻子吸气 4 秒，嘴巴吐气 6 秒，聽自己呼吸的声音。重複 6 次。盖住耳朵能屏蔽外界的声音，让你从「对外广播」模式切回「只聽自己」模式。\n\n第三步（60 秒）：问自己一个今天没有人问过你的问题：「你今天真正的感觉是什麼？」不用回答得漂亮，不用正能量，说實话就好。就算答案是「累到想消失」也是一个誠實的好答案。孔雀最需要练習的，是在没有观眾的時候也能舒服地存在。',

koala:{name:'无尾熊',icon:'🐨',sub:'温暖稳定的守护者',color:'#27ae60',
desc:'您像无尾熊：温暖、耐心、让人觉得安全。您是那種「没有您這个团队根本撐不起來，但大家可能要等您离开才会发現」的人。新人第一天不知所措，是您默默带他去吃飯。同事吵架，兩边都來找您说。老闆压力大的時候，也是您在旁边稳住局面。但您的功勞总是被当成理所当然。您不搶风头，但少了您整个团队会垮。您的存在就像空气，不出声，但没有了所有人都会窒息。您太容易妥協，把自己的需求往後排。「大家开心就好」是您的口头禪，但一直退让的您，到最後连自己想要什麼都不确定了。',

med:'手边没有精油？试试這个：\n\n【自我照顾边界练習】\n每天睡前花 3 分鐘做這个练習，帮自己充电。\n\n第一步（60 秒）：把双手放在心口，閉眼，做 5 次温暖的呼吸。吸气 4 秒時想像吸进來的空气是温暖的粉红色，吐气 6 秒時想像這个温暖填满你自己的身体（不是送给別人，是留给自己）。\n\n第二步（60 秒）：回想今天你为別人做的 3 件事。然後问自己：「如果是別人为我做了這些事，我会怎麼对他说？」把那句话（通常是「谢谢你」或「你辛苦了」）在心裡对自己说 3 遍。\n\n第三步（60 秒）：想像明天有一件事你可以说「不」或「等一下」。不需要拒绝所有人，一天只练習一次就好。在心裡预演那个场景：有人拜託你，你微笑著说「我今天没办法耶，明天可以嗎？」然後感受一下，世界没有毀滅，对方也没有因此討厭你。温柔的人最需要学的，不是如何更温柔，是如何温柔地守住自己的空间。',
insight:'「你的温柔不是软弱，但你的沉默不该是習慣。你的需求，也是需求。」',
share:'我是无尾熊型🐨！默默撐起全场但大家要等我离开才发現😢 「温柔的人也需要被照顾啊。」你的职场灵魂是哪隻动物？'},
owl:{name:'猫头鷹',icon:'🦉',sub:'精准冷静的分析者',color:'#2980b9',
desc:'您像猫头鷹：看得仔细、想得深、不会轻易下結论。当別人都在喊「差不多就好」的時候，您心裡知道差不多根本不够好。报告您会改三遍才交，每个數字都核对过。email 您会斟酌措辭才送出。您是团队最需要的品质守门人。但完美主义的阴影是：永远觉得还不够好。您花了三天分析出最佳方案的時候，老虎型的人已经做了、错了、改了、又做了，而且結果可能不比您差。這会让您很不甘心对吧？您最痛苦的同事是那種「先做再说」的人，您不懂他們怎麼能对品质這麼随便。但有時候，80 分出发真的比 100 分永远不出门更有用。',
oil:'迷迭香 3 滴 + 薄荷 2 滴',oilMethod:'滴在扩香石放在桌上',oilScene:'需要从分析模式切換到行动模式時',
oilText:'迷迭香維持你的清晰思維，薄荷的涼意像一声哨音：「分析到這裡就够了，出发吧。」\n\n为什麼這个配方对你有效？\n迷迭香裡的 1,8-桉油醇和樟脑是前額葉的「增幅器」，能让你本來就很強的分析能力保持清晰，但同時加速「从分析到行动」的传导速度。猫头鷹的问题从來不是想得不够清楚，而是想太清楚了反而走不出去。薄荷的薄荷醇直接刺激三叉神经和前額葉，像一声清脆的哨音穿透你的分析迴圈，在你的神经系统裡建立一条新的捷徑：「80 分已经够好了，現在出发。」兩支精油合作，不是要你放棄品质，是让你的大脑学会「分析有截止時间」這件事。',
med:'手边没有精油？试试這个：\n\n【80 分出发倒數法】\n当你发現自己又在反覆檢查、修改、觉得还不够好的時候，做這个练習。\n\n拿出手机设定 3 分鐘的计時器。在這 3 分鐘裡，快速写下：「如果現在就交出去，最坏会怎样？」然後写下 3 个最坏的後果。通常你会发現最坏的後果是「需要再修改一次」，而不是「世界末日」。\n\n接著做 5 次「哨音呼吸」：用鼻子快速吸气 2 秒，然後嘟起嘴巴慢慢吐气 6 秒，发出像吹口哨一样的「呼，」声。這个特殊的吐气方式能刺激你的迷走神经，帮你的前額葉从「分析迴圈」裡跳出來。\n\n吐完最後一口气之後，心裡默念「够了」，然後在 5 秒內按下送出键。不要给自己再檢查一次的机会。你的 80 分已经是大多數人的 120 分了，你只是不知道而已。每天练習一次「刻意交出不完美的東西」，你的完美主义就会慢慢学会让路。',
insight:'「完美不是终点，它是你用來逃避『开始』的藉口。够好就出发。」',
share:'我是猫头鷹型🦉！差不多？差不多根本不够好好嗎📊 「报告改三遍才交是基本尊重。」你的职场灵魂是哪隻动物？'},
chameleon:{name:'变色龍',icon:'🦎',sub:'灵活切換的适应者',color:'#9b59b6',
desc:'您像变色龍：在任何环境都能生存，跟任何人都能相处。跟业務部开会您讲业绩，跟设计部开会您讲美学，跟老闆談话您讲策略。每个部门都觉得您是自己人。您的适应力是最大资产，老闆要什麼风格您就切什麼风格，客戶什麼脾气您都接得住。但下班之後您累到不想说话，因为一整天都在演別人。您不是没有立场，是您能看见每个角度。但「每个角度都懂」有時候会让別人觉得您没有主见。因为太会配合，没有人真正认识那个「不配合的您」。包括您自己。脫掉所有角色之後，您到底是谁？那个才是最值得认识的人。',
oil:'天竺葵 3 滴 + 岩兰草 2 滴',oilMethod:'睡前塗在脚底',oilScene:'一整天演了太多角色、需要回到自己的夜晚',
oilText:'天竺葵帮你平衡所有切換过的频率，岩兰草把你从百变模式拉回土地。脫掉角色之後的你，才是最珍貴的。\n\n为什麼這个配方对你有效？\n天竺葵裡的香茅醇和牻牛兒醇是你的「频率归零键」，能帮你的边缘系统把一整天切換了七八種角色所累积的混亂讯号统统整理归檔。你的杏仁核很累，因为每換一个场合它就要重新评估「在這裡要展現什麼样的我才安全」，天竺葵能让它好好休息。岩兰草的岩兰草醇和岩兰草酮是最重的精油分子之一，像一根深入泥土的錨，把你从「百变适应」的漂浮狀态拉回地面，让你的前額葉有空间问自己：「脫掉所有角色之後，我到底喜欢什麼？」',
med:'手边没有精油？试试這个：\n\n【找回原色冥想】\n睡前花 3 分鐘做這个练習，帮自己从一天的角色切換中回到原廠设定。\n\n第一步（60 秒）：閉眼，想像你的身体被塗满了各種颜色。每種颜色代表你今天扮演过的角色（跟主管说话是蓝色、跟客戶聊天是金色、跟朋友相处是橘色）。吸气 4 秒，吐气 6 秒時想像這些颜色像水彩一样慢慢被洗掉，露出底下你本來的颜色。做 5 次。\n\n第二步（60 秒）：问自己三个问题，不用回答得漂亮，只要誠實：「今天哪一个场合的我，最接近真正的我？」「今天哪一个场合，我演得最累？」「如果明天可以少演一个角色，我要拿掉哪一个？」\n\n第三步（60 秒）：把双手放在肚子上，做 5 次深呼吸。每次吐气時在心裡说：「我不需要每个场合都完美适应。」感受肚子在手掌下起伏的节奏，那个最基本的、不用切換的生理节奏，就是你最真實的频率。带著這个频率入睡。',
insight:'「你不需要在每个场合都变色。找到一件不管环境怎麼变都不让步的事，那就是你的芯。」',
share:'我是变色龍型🦎！跟谁都能聊、在哪都能活，但有時候连自己都忘了原本的颜色是什麼🌈 「脫掉角色之後的我，到底是谁？」你的职场灵魂是哪隻动物？'}
};
