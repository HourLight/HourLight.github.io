function startQuiz(){
  answers={};currentQ=0;

  document.getElementById('progressWrap').style.display='block';
  document.getElementById('questionsArea').style.display='block';
  document.getElementById('quizResult').style.display='none';
  renderQ();
}

function renderQ(){
  var q=QUESTIONS[currentQ];
  // 不随机排列选項，保持设计的順序
  var html='<div class="quiz-question-card" style="padding:28px 22px;margin-bottom:16px">'
    +'<div class="quiz-q-number" style="margin-bottom:10px">'+(currentQ+1)+' / '+QUESTIONS.length+'</div>'
    +'<div class="quiz-q-text" style="margin-bottom:20px">'+q.q+'</div>'
    +'<div class="quiz-options" style="display:flex;flex-direction:column;gap:10px">';
  q.opts.forEach(function(o){
    html+='<button class="quiz-option" onclick="pick(\''+o.a+'\',this)">'+o.t+'</button>';
  });
  html+='</div></div>';
  document.getElementById('questionsArea').innerHTML=html;
  document.getElementById('progressFill').style.width=((currentQ/QUESTIONS.length)*100)+'%';
  document.getElementById('progressText').textContent=(currentQ+1)+' / '+QUESTIONS.length;
}

function pick(a,btn){
  answers[currentQ]=a;
  btn.classList.add('selected');
  setTimeout(function(){
    currentQ++;
    if(currentQ>=QUESTIONS.length) showResult();
    else renderQ();
  },350);
}
