<div class="result-wrap" id="resultWrap">
  <div class="result-icon" id="resultIcon">⏳</div>
  <h1 class="result-title" id="resultTitle">载入中⋯⋯</h1>
  <div class="result-msg" id="resultMsg"></div>
  <div class="result-detail" id="resultDetail" style="display:none">
    <div class="row"><span class="label">订单编号</span><span class="value" id="detailOrder"></span></div>
    <div class="row"><span class="label">付款金額</span><span class="value" id="detailAmount"></span></div>
  </div>
  <div id="resultActions"></div>
</div>

<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var status = params.get('status') || 'unknown';
  var order = params.get('order') || '';
  var amount = params.get('amount') || '';

  var icon = document.getElementById('resultIcon');
  var title = document.getElementById('resultTitle');
  var msg = document.getElementById('resultMsg');
  var detail = document.getElementById('resultDetail');
  var actions = document.getElementById('resultActions');

  if (status === 'success') {
    icon.textContent = '✨';
    title.textContent = '付款成功';
    msg.innerHTML = '感謝您的支持！您的服務已經開通。<br>如有任何問題，歡迎透過 LINE 聯繫我們。';
    if (order || amount) {
      detail.style.display = 'block';
      document.getElementById('detailOrder').textContent = order;
      document.getElementById('detailAmount').textContent = amount ? 'NT$ ' + Number(amount).toLocaleString() : '';
    }
    actions.innerHTML = '<a href="index.html" class="result-btn">回到首頁</a><a href="https://lin.ee/RdQBFAN" class="result-btn-outline" target="_blank" rel="noopener noreferrer">LINE 聯繫</a>';

    // 顯示對應覺察師聯繫方式（推薦碼系統）
    setTimeout(function() {
      if (typeof window.hlReferral !== 'undefined') {
        var pd = document.createElement('div');
        pd.id = 'partner-contact';
        document.getElementById('resultWrap').appendChild(pd);
        window.hlReferral.showPartnerContact('partner-contact');
      }
    }, 500);

  } else if (status === 'fail') {
    icon.textContent = '😔';
    title.textContent = '付款未完成';
    msg.innerHTML = '付款過程中遇到問題。<br>您可以重新嘗試，或透過 LINE 聯繫我們協助處理。';
    actions.innerHTML = '<a href="javascript:history.back()" class="result-btn">重新嘗試</a><a href="https://lin.ee/RdQBFAN" class="result-btn-outline" target="_blank" rel="noopener noreferrer">LINE 聯繫</a>';

  } else {
    icon.textContent = '🔍';
    title.textContent = '查詢付款狀態';
    msg.innerHTML = '正在確認您的付款結果⋯⋯<br>如果已完成付款，系統會在幾分鐘內自動開通。<br>若有問題，歡迎透過 LINE 聯繫我們。';
    actions.innerHTML = '<a href="index.html" class="result-btn">回到首頁</a><a href="https://lin.ee/RdQBFAN" class="result-btn-outline" target="_blank" rel="noopener noreferrer">LINE 聯繫</a>';
  }
})();
</script>
