<script>
var TYPES={
self:{name:'自我鞭策型',icon:'💎',sub:'对自己最嚴格的人',
  desc:'您的完美主义來自內在。不是別人要求您，是您自己要求自己。做到 95 分还是觉得不够。那个「不够好」的声音，24 小時全年无休。',
  detail:'自我鞭策型的完美主义者是最累的那種。因为裁判和选手是同一个人，永远不可能贏。\n\n這不是坏事。您的高标准让您产出的品质确實比別人好。但代价是：慢性疲勞、拖延（因为怕做不好所以不敢开始）、以及一種「什麼都不够」的空虛感。\n\n您可能是那種作业交出去之後还想收回來改的人。email 发出去三秒後就在想有没有错字。\n\n一个练習：今天故意交出一份 80 分的東西。看看世界有没有塌。',
  oil:'佛手柑（放松标准·自我接納）× 乳香（看见全局·放下细节）× 甜马鬱兰（肌肉紧繃释放·允许不完美）\n\n为什麼這个配方对你有效？\n佛手柑的乙酸沉香酯和檸檬烯直接作用在你前額葉的「标准设定区」，温柔地把那把尺从 100 分松到 85 分。你的杏仁核一直在说「不够好就会被拋棄」，佛手柑告诉它：「80 分也值得被愛。」乳香的乳香酸穿越血脑屏障，帮你的大脑从「盯著瑕疵」切換到「看见全局」。甜马鬱兰的萜品烯-4-醇同時放松肌肉和神经，因为自我鞭策型的身体永远是紧繃的。\n调配建议：基底油（荷荷芭油）10ml＋佛手柑 2 滴＋乳香 2 滴＋甜马鬱兰 1 滴，约 2.5%。佛手柑有光敏性，塗抹後 12 小時避免日曬。IFA 建议成人全身 1~3%。',
  med:'手边没有精油？试试這个：\n\n「故意 80 分呼吸」\n你的每一口呼吸都想做到完美。這次，不要。\n\n1. 先做一次你的「标准呼吸」：吸到最飽、吐到最乾淨、姿势完美\n2. 現在，故意做一次「80 分呼吸」：吸气只吸八成（约 3 秒），吐气随便吐（约 4 秒），姿势歪一点也行\n3. 用 80 分的方式呼吸 8 轮。每一轮在吐气時默唸：「80 分就够了」\n4. 注意你的身体：那个不安是什麼？那个「不够好」的焦慮，住在身体的哪裡？\n5. 最後 2 轮：对那个焦慮说「我知道你在。但今天 80 分就够了。世界没有崩塌。」\n\n做完後，故意交出一件 80 分的東西。观察：真的有人在意嗎？\n\n這个练習直接挑战你的前額葉裡「完美才安全」的迴路，让你的杏仁核体验「不完美也不会被拋棄」的新记忆。'},
others:{name:'外在标准型',icon:'🔍',sub:'对別人标准很高的人',
  desc:'您的完美主义投射在別人身上。您对品质的要求很高，這让您是很好的品管者，但也让身边的人压力很大。別人觉得 OK 的，您觉得可以更好。',
  detail:'外在标准型的人通常是主管、父母、或团队裡的品质把关者。您的标准确實让事情做得更好。\n\n但要注意：不是每个人都跟您一样在意细节。当您觉得「为什麼他們做不好」的時候，问自己：「我的标准是唯一正确的标准嗎？」\n\n這種完美主义最傷的不是自己，是关係。因为身边的人会觉得「怎麼做都不对」，久了就不敢靠近。\n\n一个练習：今天对一个人说「這样就很好了」。说出口，然後忍住不加「但是」。',
  oil:'甜橙（接納不完美的暖意）× 天竺葵（平衡对他人的期待）× 佛手柑（松开控制的手）\n\n为什麼這个配方对你有效？\n甜橙的檸檬烯在边缘系统裡创造「温暖的接納感」，让你看到別人的 80 分時，不会自动切換到「修正模式」。天竺葵的香茅醇和牻牛兒醇平衡你前額葉的「标准校准器」，让你对別人的期待从「我的标准」放寬到「对方的最佳水准」。佛手柑的乙酸沉香酯直接作用在杏仁核，松开你那隻「想帮每个人改到完美」的手。\n调配建议：基底油（甜杏仁油）10ml＋甜橙 2 滴＋天竺葵 2 滴＋佛手柑 1 滴，约 2.5%。佛手柑有光敏性，塗抹後避免日曬。IFA 建议成人全身 1~3%。',
  med:'手边没有精油？试试這个：\n\n「松手呼吸练習」\n你对別人的标准很高，因为你真的在乎品质。但不是每个人都需要被你改。\n\n1. 把双手握拳，像你在抓住「标准」不放。用力握 5 秒\n2. 吸气 4 秒：想一个你最近想帮別人「改」的事情\n3. 吐气 6 秒：松开一根手指。对自己说「他的方式也可以」\n4. 吸气 4 秒：你的大脑会反駁「可是那样不够好」。聽见了。但繼續松手\n5. 吐气 6 秒：再松一根。「不是每件事都需要达到我的标准」\n\n做 5 轮，每轮松一根手指。直到手完全打开。\n\n最後，把双手掌心朝上放在膝盖上。感受「不抓」的感觉。你的手很轻，但那件事没有变糟。\n\n這个练習帮你的前額葉区分「我的标准」和「唯一正确的标准」，让你从「控制者」变成「支持者」。'},
social:{name:'社会比較型',icon:'🎭',sub:'怕达不到別人标准的人',
  desc:'您的完美主义來自外在。不是您对自己要求高，是您觉得「別人对我要求高」。不管做到什麼程度，都担心不被认可。IG 上看到別人的生活，就觉得自己不够好。',
  detail:'社会比較型的完美主义最痛苦。因为标准不在自己手上，您永远在猜「這样够不够好」。\n\n真相是：大部分人没有您想的那麼在意。您的完美主义可能是小時候「做好才被愛」的信念延伸。\n\n社群媒体让這種比較加劇了十倍。每次滑手机都是一次「我不够好」的确认。但您看到的是別人的精华，跟自己的日常比，永远输。\n\n一个练習：今天问自己「如果没有人在看，我还会在意這件事嗎？」答案是不会的话，那件事可以放了。',
  oil:'薰衣草（回到自己的节奏）× 岩兰草（不被外在标准带走）× 玫瑰（找回自我价值感）\n\n为什麼這个配方对你有效？\n薰衣草的沉香醇是最温柔的「节奏重设劑」，让你的边缘系统从「別人的标准」回到「自己的频率」。你的杏仁核一直在扫描「別人怎麼看我」，薰衣草帮它把扫描范圍缩回自己。岩兰草的岩兰草醇是精油界最重的「錨」，把你的自我价值从「別人的评分表」拉回「脚下的土地」。玫瑰的苯乙醇在前額葉裡種下一句话：「我的价值不需要別人打分數。」\n调配建议：基底油（荷荷芭油）10ml＋薰衣草 2 滴＋岩兰草 1 滴＋玫瑰 1 滴，约 2%。玫瑰精油珍貴，1 滴即可。IFA 建议成人全身 1~3%。',
  med:'手边没有精油？试试這个：\n\n「內在评审退场练習」\n你的脑子裡一直有一排评审在举牌。這个练習帮你请他們下班。\n\n1. 閉上眼睛。想像你站在舞台上，面前坐著一排「评审」。他們手裡举著分數牌。有些是你认识的人，有些是想像中「社会」的样子\n2. 吸气 4 秒：看著他們。承认他們在那裡\n3. 吐气 6 秒：走到第一位评审面前。对他说「谢谢你，但今天你可以下班了。」想像他站起來，走出去\n4. 每一轮呼吸，送走一位评审。吸气看著他，吐气送他离开\n5. 做 5 轮，直到评审席空了\n\n最後，在空蕩蕩的评审席上，只剩你自己。坐到那个位置上。\n\n拿起分數牌，举起「100 分」。不是因为你完美，是因为你本來就值得。\n\n這个练習利用內在意象重塑，帮助前額葉减少对「外在评价」的依賴，把价值感的來源从外在移回內在。'},
procrastinate:{name:'拖延完美型',icon:'🐌',sub:'因为怕不完美所以不开始的人',
  desc:'您的完美主义表現在，不开始。因为「开始」就意味著有可能「做不好」。与其交出一个不完美的東西，不如⋯先不交。明天再说。下週再做。等准備好了再开始。',
  detail:'拖延完美型是最弔詭的完美主义。表面看是「拖延」，底层其實是「害怕不完美」。\n\n您可能花了三天在想怎麼开始，卻一个字都没写。或者研究了 50 个工具，卻一个都没用。因为在脑海中，那个「完美的成品」已经存在了，而現實一定达不到，所以不如不做。\n\n這是一種自我保护：没有嘗试就没有失败。但代价是：也没有任何東西完成。\n\n一个练習：给自己一个「爛开始」的许可。今天写 100 字的垃圾初稿。不管品质，先打破那道心理的墙。',
  oil:'迷迭香（啟动行动力）× 葡萄柚（切断过度思考）× 薑（推一把的温暖力量）\n\n为什麼這个配方对你有效？\n迷迭香的桉油醇和樟脑是前額葉的「啟动键」，不是让你想得更多（你已经想太多了），而是把「想」切換成「做」。葡萄柚的檸檬烯和諾卡酮像一把利剪，咔嚓一声剪断你「再想一下」的迴圈。薑的薑烯在身体裡创造温熱感，那是一種「推你一把」的物理力量，让你的脚从「黏在地上」变成「可以踏出去」。\n调配建议：基底油（甜杏仁油）10ml＋迷迭香 2 滴＋葡萄柚 2 滴＋薑 1 滴，约 2.5%。葡萄柚有光敏性，塗抹後避免日曬。孕婦避免使用迷迭香。IFA 建议成人全身 1~3%。',
  med:'手边没有精油？试试這个：\n\n「爛开始呼吸法」\n你怕的是做不好。這个练習帮你跨过「开始」那道墙。\n\n1. 想一件你一直拖著没开始的事。感受想到它時身体的反应（胸口紧？肩膀缩？）\n2. 吸气 4 秒：承认「我在怕」。不批判，只是看见\n3. 吐气 6 秒：对自己说「我允许自己做一个爛开始」\n4. 吸气 4 秒：想像那件事的「最醜版本」。不完美的初稿、歪歪的线条、语法错误的第一段。它很醜，但它存在了\n5. 吐气 6 秒：「存在比完美重要。」\n\n做 5 轮。\n\n做完後，立刻打开那件事。不管是打开文件、拿起筆、还是按下录音键。花 5 分鐘，做一个「爛开始」。\n\n5 分鐘之後你可以停。但通常你不会想停。因为最难的从來不是做得好，是「开始」。\n\n這个练習利用「暴露法」的原理，让你的杏仁核体验「不完美的开始没有带來災难」，慢慢瓦解「不做就不会失败」的迴避迴路。'},
hidden:{name:'隐性完美型',icon:'🦢',sub:'表面随性內心挑剔的人',
  desc:'您看起來很随和、很好相处、什麼都行。但只有您自己知道，脑子裡有一个小人一直在打分數。嘴上说「都可以」，心裡想「這哪裡可以」。',
  detail:'隐性完美型是最难被发現的。因为您学会了用「无所謂」包装「非常在意」。\n\n您不会像自我鞭策型那样明显焦慮，也不会像外在标准型那样挑剔別人。您的完美主义是安静的、內缩的、只有您自己知道的。\n\n表面上接受了 80 分，心裡一直在想那缺少的 20 分。表面说「没关係」，夜深人静的時候反覆回想。\n\n最大的代价：因为不表达，所以没人知道您在意。没人知道，就没人能帮忙。\n\n一个练習：今天对一个人坦白说「其實我有点在意這件事」。让隐性的变成看得见的。',
  oil:'茉莉（让真實的自己被看见）× 橙花（卸下「没关係」的面具）× 檀香（允许自己有感觉）\n\n为什麼這个配方对你有效？\n茉莉的吲哚和苯甲酸苄酯是「真實自我显影劑」，穿透边缘系统裡那层「没关係」的保护膜，让真正的感受浮出水面。你的杏仁核学会了用「无所謂」包装「非常在意」，茉莉温柔地拆开包装。橙花的橙花叔醇和沉香醇卸下你前額葉裡「表演毫不费力」的程式。檀香的 α-檀香醇给你一个安全的空间，让你可以承认「其實我很在意」而不觉得丟脸。\n调配建议：基底油（荷荷芭油）10ml＋茉莉原精 1 滴＋橙花 1 滴＋檀香 2 滴，约 2%。茉莉原精和橙花都是珍貴精油，各 1 滴即足。IFA 建议成人全身 1~3%。',
  med:'手边没有精油？试试這个：\n\n「其實我在意呼吸」\n你最擅長的事是让別人以为你不在意。但你在意。這个练習帮你把那个「在意」说出來。\n\n1. 閉上眼睛。想一件最近你嘴上说「没关係」但心裡一直在想的事\n2. 吸气 4 秒：感受那个「在意」住在身体的哪裡。胸口？喉嚨？胃？\n3. 吐气 6 秒：出声说「其實我在意。」（真的出声，不是在心裡说）\n4. 吸气 4 秒：你的身体可能会抗拒。嘴上说出「我在意」的時候，哪裡缩紧了？\n5. 吐气 6 秒：让那个缩紧慢慢松开。再说一次：「其實我在意，而且這没什麼不好。」\n\n做 5 轮。\n\n做完之後，找一个人，把那件「其實我在意」的事告诉他。不需要很深，就说「其實我有点在意那件事」。\n\n這个练習利用言语化（verbalization）啟动前額葉的情緒标籤功能，帮你的杏仁核学会「表达在意不等於软弱」。隐性完美主义最大的突破，就是把隐性变成可见的。'}
};
