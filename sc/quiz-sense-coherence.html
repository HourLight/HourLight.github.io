const questions=[
  {q:'你觉得你的人生到目前为止，是「有脈络的」嗎？',scene:'如果要跟一个陌生人解释你怎麼走到今天，你说得出來嗎？',opts:[
    {t:'说得出來。每一步都有原因，雖然不一定是计画好的',s:{comp:3,manage:1,meaning:2}},
    {t:'大概说得出來，但有些段落我自己也搞不懂',s:{comp:2,manage:1,meaning:1}},
    {t:'说不太出來。感觉很多事情是随机发生的',s:{comp:0,manage:0,meaning:1}},
    {t:'不想解释。过去的事不重要',s:{comp:0,manage:1,meaning:0}}]},
  {q:'遇到突发狀況的時候，你的第一反应是？',scene:'计画被打亂了。旅行航班取消、重要会议突然改期。',opts:[
    {t:'马上开始想替代方案，通常能找到出路',s:{comp:1,manage:3,meaning:1}},
    {t:'会慌一下，但冷静下來之後可以处理',s:{comp:1,manage:2,meaning:0}},
    {t:'会卡住一段時间，不知道该怎麼办',s:{comp:0,manage:0,meaning:0}},
    {t:'觉得「又來了」，有点无力感',s:{comp:1,manage:0,meaning:0}}]},
  {q:'你觉得你正在做的事情（工作、学业、生活的重心）「值得」嗎？',scene:'每天起床的那个动力，來自哪裡？',opts:[
    {t:'值得。雖然不轻松，但我知道這对我有意义',s:{comp:1,manage:1,meaning:3}},
    {t:'大部分時候觉得值得，偶爾会怀疑',s:{comp:1,manage:1,meaning:2}},
    {t:'其實不太确定。但也不知道还能做什麼',s:{comp:0,manage:0,meaning:0}},
    {t:'不值得。但目前没有更好的选擇',s:{comp:1,manage:0,meaning:0}}]},
  {q:'你觉得「坏事」发生的時候，你能看懂它为什麼发生嗎？',scene:'失恋、失业、生病、被背叛。那些不好的经历。',opts:[
    {t:'不一定马上能懂，但回头看通常都找得到原因',s:{comp:3,manage:1,meaning:1}},
    {t:'有些可以，有些真的就是莫名其妙',s:{comp:2,manage:0,meaning:0}},
    {t:'我觉得坏事就是坏事，没有为什麼',s:{comp:0,manage:0,meaning:0}},
    {t:'坏事发生的時候我通常忙著应对，没時间想为什麼',s:{comp:0,manage:2,meaning:0}}]},
  {q:'你的日常生活有没有一些固定的节奏或仪式感？',scene:'早上一杯咖啡、睡前十分鐘阅读、每週跑一次步，這種。',opts:[
    {t:'有，而且我蠻需要這些规律的',s:{comp:2,manage:3,meaning:1}},
    {t:'有一些，但常常被打断也没关係',s:{comp:1,manage:2,meaning:0}},
    {t:'很想有，但一直没办法維持',s:{comp:1,manage:0,meaning:1}},

    {t:'大部分是。我能辨认情緒的來源',s:{comp:3,manage:2,meaning:1}},

    {t:'很多時候搞不清楚。情緒像天气一样说变就变',s:{comp:0,manage:0,meaning:0}},
    {t:'我不太注意自己的情緒。有事做就好了',s:{comp:0,manage:1,meaning:0}}]},

    {t:'焦慮。不确定的事太多了',s:{comp:0,manage:0,meaning:0}},

    {t:'有幾个，但最近比較少做了',s:{comp:1,manage:0,meaning:2}},

  {q:'你跟你的身体关係好嗎？',scene:'身体发出讯号的時候，你聽得到嗎？',opts:[

  {q:'你觉得你跟這个世界之间，有没有一種「连結感」？',scene:'不是社交连結，是一種「我属於這裡」的感觉。',opts:[

const DIMS={comp:'理解力',manage:'掌控力',meaning:'意义感'};
const TYPES={
  navigator:{name:'人生导航型',icon:'🧭',sub:'你活得像一个有地图的人',
    keys:['方向清晰','自我理解','內在稳定'],
    desc:'你的生活连貫感很高。你能理解发生在自己身上的事情，有办法应对大部分的挑战，而且你觉得這一切是值得的。這不代表你的人生没有困难。你只是有一種能力，能把困难放进一个更大的脈络裡看。坏事不只是坏事，它是故事的一部分。你的人生不是随机的，它有一条你能看见的线。這条线不是命运给的，是你自己在每一次经历中、每一次选擇中，一針一线縫出來的。',
    detail:'Antonovsky的健康生成论指出，高连貫感的人不是「幸运」，而是他們有一套內在的处理系统：遇到事情先看懂（理解力）→ 找到应对的方式（掌控力）→ 把它放进人生的意义裡（意义感）。這三步你做得很自然，可能自然到你不觉得這是一種能力。但這就是为什麼同样的压力，有些人会被压垮，你卻能消化。\n\n你現在的功课不是修复什麼，而是持續維护。高连貫感不是永久的，它需要持續的经验來滋养。保持跟有深度的人交流、保持做让你觉得有意义的事、保持对自己誠實。\n\n觉察练習：今天花三分鐘写下「过去一年教会我最重要的一件事」。不用多，一件就好。這个动作在強化你的意义建构能力。',
    oil:'乳香 2 滴＋甜橙 2 滴＋雪松 1 滴，在需要沉澱的時候扩香。乳香維持你跟深层自我的连結，甜橙让你的稳定感带著温度而不是距离感，雪松像你的根一样稳稳地紮在土裡。',
    med:'閉上眼睛。想像你站在一座山的中间。往下看，能看到你走过的路。往上看，能看到你要去的方向。吸气四秒，感觉脚下的地面。吐气六秒。吸气四秒，对自己说：「我知道我在哪裡。」吐气六秒。重複三次。最後，看看四周的风景。风景很好。你走到這裡，风景是你赚到的。张开眼睛。',
    quote:'你的人生不是随机的。每一步，都是你自己走出來的路。'},
  quiet_steady:{name:'静水深流型',icon:'🌊',sub:'你不激动，但你的稳定有很深的根',
    keys:['沉稳','低调掌控','不张揚'],
    desc:'你的生活连貫感像一条不急不徐的河，表面看起來平静，但底下有很稳定的水流。你不太会大起大落地感叹人生的意义，也不太需要別人來告诉你方向。你就是默默地走，默默地做，遇到问题默默地解决。你的力量不在於有多激昂的信念，而在於你能在没有掌声的時候，也稳稳地做自己觉得对的事。',
    detail:'你的掌控力和理解力都不错，意义感可能处於中等。意义你当然在乎，只是你觉得意义不需要特別拿出來讲。你的意义藏在日常裡：做好一頓飯、陪一个人走一段路、把一件事做到位。這種意义感是非常實在的，不虛。\n\n但静水深流的风险是：你可能太久没有问自己「我想要什麼」了。你很会应对、很会处理，但你会不会忘了退一步想：「這条河要流向哪裡？」如果你的稳定开始让你觉得有一点空，那可能是時候加一点意义的调味了。\n\n觉察练習：今天做一件「不是因为该做，而是因为想做」的事。可以很小。但那件事是你自己的，不是为了任何人。',
    oil:'佛手柑 2 滴＋薰衣草 2 滴＋依兰 1 滴，在下午需要安静的時候扩香。佛手柑带一点阳光进你的沉稳裡，薰衣草让你的安静带著温柔而不是冷漠，依兰打开你心裡那个「想要」的閥门，让你允许自己多感受一点。',
    med:'閉上眼睛。想像你是一条河。水稳稳地流著。吸气四秒，感觉水流的速度。吐气六秒。很稳。重複三次。第四次的時候，问你的河：「你想流向哪裡？」吸气四秒，等答案浮現。吐气六秒。不管答案是什麼，记住那个方向。对自己说：「稳是好的。但偶爾加速一下也是好的。」张开眼睛。',
    quote:'稳定是你的超能力。偶爾加一点方向，稳定会变成力量。'},
  meaning_seeker:{name:'意义追尋型',icon:'🔍',sub:'你不缺能力，缺的是「为什麼要用」',
    keys:['追问意义','存在焦慮','深度需求'],
    desc:'你的理解力和掌控力都不差，但意义感是你最不稳定的那一塊。你很能看懂事情、也有办法处理问题，但你会反覆问自己：「然後呢？」「這一切到底是为了什麼？」能力绝对够，只是你不确定做了值不值得。這让你有時候很有动力（找到意义的時候），有時候很虛无（意义消失的時候），像一台引擎很好但油箱時有時无的車。',
    detail:'意义感不是一个开关，不是「有」或「没有」，而是一个需要持續維护的连結。研究发現，意义感最稳定的來源不是工作成就或被需要，而是「一致性」。就是你的行为和你的价值观是对齐的。当你做的事情跟你相信的東西吻合的時候，意义感就自然生成了。反过來，如果你一直在做你不认同的事，意义感就会像沙漏一样漏掉。\n\n你的功课不是「找到人生的意义」（這个命题太大了），而是「在每一天裡做一件有意义的小事」。意义是累积的，不是頓悟的。\n\n觉察练習：今天睡前写下一件「今天让我觉得值得」的事。可以很小。一杯好喝的咖啡、一段有品质的对话、完成了一件拖很久的事。每天写一件，一週之後你会开始看到一条线。',
    oil:'乳香 2 滴＋迷迭香 2 滴＋薰衣草 1 滴，在你开始问「然後呢？」的時候扩香。乳香连結你跟更大的東西之间的关係，迷迭香让你的追问保持方向而不是变成漩渦，薰衣草在找不到答案的夜晚陪著你。',
    med:'閉上眼睛。想像你手裡拿著一盞灯，但灯忽明忽暗。吸气四秒，看著那盞灯。吐气六秒。它不稳，但它在亮。那盞灯是你的意义。吸气四秒，问它：「你需要什麼才能稳定？」吐气六秒。让答案慢慢浮現。第四次呼吸的時候，把那盞灯放在胸口。吸气四秒，感觉它的温度。吐气六秒。对自己说：「我不需要找到答案。我只需要让這盞灯不滅。」张开眼睛。',
    quote:'意义不是找到的，是一天一天做出來的。你的引擎很好，只需要加油。'},
  overwhelmed:{name:'浪裡浮沉型',icon:'🌀',sub:'你觉得什麼都在动，就你站不稳',
    keys:['失控感','混亂','消耗'],
    desc:'你現在的生活连貫感比較低，三个維度都不太稳。你觉得事情看不懂、处理不了、也不太知道意义在哪裡。這不代表你不好或者你有什麼问题，這代表你現在可能正在经历一段超出你目前资源的压力期。你的系统在过载。能力从來不是问题，是同時要处理的事情太多了。',
    detail:'低连貫感不是一个永久狀态。Antonovsky的研究也指出，连貫感会随著人生经历而波动。你現在在低谷，不代表你会一直在這裡。你需要做的不是「变好」，是先减少消耗。把不必要的事情放下，把可以求助的事情交出去，把你仅剩的力气用在最重要的事上。\n\n如果你觉得自己真的撐不住了，请尋求专业協助。這不是软弱，是聪明。你不需要独自面对所有的事情。\n\n觉察练習：今天只做三件事。不是三件「大事」，是三件「你能做完」的事。哪怕是刷牙、吃一頓飯、回一則讯息。完成了就好。其他的，明天再说。',
    oil:'薰衣草 3 滴＋甜橙 2 滴，在你觉得撐不住的時候扩香或滴在枕头上。薰衣草是最直接的安撫信号，不需要你分析什麼，只是让你的神经系统慢下來。甜橙给你一个很小但真實的好感觉。先稳住，其他的慢慢來。',
    med:'找一个安全的地方坐下來。閉上眼睛。什麼都不想。吸气四秒。吐气六秒。就這样。重複十次。什麼都不想，只是呼吸。如果有念头跑进來，让它跑。你不需要追著它。你現在唯一的工作就是呼吸。做完十次之後，对自己说：「今天，這样就够了。」张开眼睛。',
    quote:'你現在在浪裡面。浪会退的。你的工作是先浮著。'},
  competent_hollow:{name:'外強內虛型',icon:'🏗️',sub:'你什麼都能处理，就是觉得空空的',
    keys:['能力強','意义缺失','高功能空虛'],
    desc:'你的掌控力很高，你很会做事、很会解决问题、別人遇到事情第一个想到你。但你心裡有一塊空的。不是不开心，是你不太确定为什麼要做這些。你的日子过得「不错」，薪水够用、生活稳定、朋友也有，但你就是觉得少了什麼。那个「少了什麼」不是物质，是一種「這一切对我來说到底重不重要」的感觉。你像一棟盖得很好的房子，結构完整、装潢到位，但裡面没有人住。',
    detail:'高掌控力加低意义感是一个很現代的组合。社会教我們「能力」比「意义」重要。你在這套系统裡表現得很好，但你的內心开始问一些系统回答不了的问题。「薪水高然後呢？」「升遷然後呢？」「然後呢？」這不是矯情，這是你的系统在升級。它在告诉你：你已经不只是要生存了，你开始需要意义。\n\n意义不是你在目前的生活以外去找一个新東西。它可能就在你現在做的事情裡面，只是你太忙了没有看到。放慢一点，问自己：「在我做的所有事情裡面，哪一件让我有一丁点的满足感？」那一丁点就是线索。\n\n觉察练習：這週每天问自己一个问题：「今天做的事情裡面，有哪一件就算没人付我钱我也会做？」答案可能很意外。',
    oil:'迷迭香 2 滴＋乳香 2 滴＋甜橙 1 滴，在你开始觉得「然後呢」的時候扩香。迷迭香让你从「做事模式」切換到「感受模式」，乳香带你碰触更深层的東西，甜橙在那个深层的地方放了一盞温暖的灯。',
    med:'閉上眼睛。想像你站在你盖的那棟很好的房子裡面。吸气四秒，看看四周。很完整。吐气六秒。但房子裡面是空的。吸气四秒，走到窗边，打开窗。吐气六秒。风吹进來了。带著外面的声音、气味、温度。吸气四秒，问自己：「我想在這个房子裡放什麼？」吐气六秒。让画面慢慢出現。重複三次。那些你想放进去的東西，就是你的意义。张开眼睛。',
    quote:'房子盖好了。現在，你想让谁住进去？'},
  rebuilding:{name:'重建中型',icon:'🔨',sub:'你正在一片废墟上重新盖',
    keys:['从破碎到整合','重新定义','过渡期'],
    desc:'你的生活连貫感曾经不错，但某些事情发生之後，它碎了。可能是一次重大的失去、一次关係的断裂、一次人生方向的大转彎。你現在正在重建。不是回到原來的样子，是在用新的眼光重新理解自己和世界。這个过程会混亂、会痛、会觉得看不到尽头。但你已经在做了。',
    detail:'重建期的连貫感波动是正常的。你可能某天觉得「啊，我好像想通了」，隔天又觉得「算了什麼都不重要」。這不是退步，是你的系统在重新校准。就像手机更新一样，过程中会卡頓，但更新完了会比以前更好。\n\n在重建的过程中，最重要的不是速度，是方向。不需要急著把所有的碎片拼回去，先撿你能认出來的那幾塊。其他的，時间到了自然会归位。\n\n觉察练習：找一张纸，画一条线。左边写「以前的我」，右边写「現在的我」。中间的距离，就是你正在走的路。看看那段距离，你会发現你已经走了很多了。',
    oil:'尤加利 2 滴＋薄荷 1 滴＋薰衣草 2 滴，在重建的过程中随時可以用。尤加利清理旧的，给新的騰出空间。薄荷让你在混亂裡保持一点清醒。薰衣草在你累了的時候接住你。',
    med:'閉上眼睛。想像你面前是一片空地。這裡曾经有東西，但現在是空的。吸气四秒，看看那片空地。吐气六秒。地上有些碎片，有些你认得出來，有些不认得。吸气四秒，撿起一塊你认得的。吐气六秒。那是什麼？是一段记忆？一个价值观？一種能力？吸气四秒，把它放在新的地基上。吐气六秒。重複四次。你不需要一天盖好。今天放一塊磚就够了。对自己说：「我在盖的，比以前的更好。」张开眼睛。',
    quote:'碎了不可怕。可怕的是拼都不拼就放棄了。你已经在盖了。'},
  analyst_drift:{name:'理性漂流型',icon:'🧮',sub:'你什麼都看得懂，但身体不在這裡',
    keys:['过度理性','体感断裂','知道但做不到'],
    desc:'你的理解力很強。別人的问题你看得比谁都清楚，社会的結构、关係的动态、自己的模式，你都分析得头头是道。但问题是，知道归知道，你的日常生活好像跟你的理解是分开的。你知道该运动但不运动，知道该放下但放不下，知道该跟某个人談但就是不开口。你活在脑子裡，身体只是载具。',
    detail:'过度理性是一種微型的情感隔离。你用分析來取代感受，用「理解」來避免「面对」。這不是智商的问题，是你的感受通道可能在某个時候被关小了。也许是因为环境不允许你有感觉，也许是因为有感觉太痛苦了。理解是好的，但理解不能取代体验。你需要让身体追上你的脑袋。\n\n觉察练習：今天做一件事的時候，刻意不分析它，只是感觉它。吃飯的時候感觉食物的温度和口感。走路的時候感觉脚底的触感。让感官先於思考。',
    oil:'薰衣草 2 滴＋甜橙 2 滴＋岩兰草 1 滴，在你又开始「想」而忘了「感觉」的時候扩香。薰衣草把你从脑袋拉回身体，甜橙喚醒你的感官（不是想法，是感觉），岩兰草让你的脚重新踩在地上。',
    med:'站起來。閉上眼睛。感觉脚底踩著地面。吸气四秒，注意脚掌的压力分布。前脚掌比較多还是後脚跟比較多？吐气六秒。不分析，只是感觉。吸气四秒，注意空气碰触皮膚的感觉。吐气六秒。吸气四秒，聽聽周圍的声音。不判断，只是聽。吐气六秒。重複四次。对自己说：「我不只是脑袋。我也有身体。身体也知道很多事。」张开眼睛。',
    quote:'你什麼都看得懂。但人生不是看懂就好了，还要活进去。'},
  fragile_hope:{name:'微光搖曳型',icon:'🕯️',sub:'你的意义感很脆弱，但它还在亮',
    keys:['意义薄弱','但在努力','需要支持'],
    desc:'你的连貫感整体偏低，但有一个很重要的東西：你还在意。你还在想「這一切有什麼意义」，你还在做這份测验，你还没有完全放棄去理解自己的人生。那个「还在意」就是你最重要的资源。它可能很微弱，像一根蠟燭在风裡搖。但它在亮。只要它在亮，一切就还有机会。',
    detail:'低连貫感加上「还在找」的态度，通常是一个即将转折的狀态。你已经触底了，但你在抬头。研究显示，意义感的重建通常不是來自一个大的頓悟，而是來自很多个小的「啊，原來這样」。一次被理解的对话、一个做完之後觉得「不错」的小事、一段触动你的文字。這些小的意义碎片会慢慢累积成一条线。\n\n你不需要現在就看到全貌。你只需要让那根蠟燭不滅。擋风的方式可以是：找一个安全的人聊聊、做一件很小但你觉得值得的事、允许自己今天只做到「还活著」就好。\n\n觉察练習：今天找一个让你有一丁点感觉的東西。一首歌、一个画面、一句话。记下來。那是你的意义碎片。明天再找一个。慢慢撿。',
    oil:'玫瑰 1 滴＋薰衣草 2 滴＋甜橙 2 滴，在你觉得那根蠟燭快滅的時候扩香。玫瑰非常轻柔地碰触你心裡那个「还在乎」的部分。薰衣草确保你不会在脆弱的時候被情緒淹没。甜橙给你一个很小但真實的温暖。先暖著。',
    med:'坐在一个安全的地方。閉上眼睛。想像你手裡有一根蠟燭，火在搖。吸气四秒，用你的双手圍住它，擋风。吐气六秒，轻轻地，不要把它吹熄。重複四次。每一次呼吸，火都稳一点点。第五次呼吸的時候，火稳了。小小的，但稳了。吸气四秒，看著那个火光。那是你的。吐气六秒。对自己说：「小小的也没关係。还亮著就够了。」张开眼睛。',
    quote:'你的火很小，但它还在亮。只要还亮著，一切就还有可能。'}
};
let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';
    const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 题 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一题</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一题 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看看我的连貫感 🧿</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 题，共 '+questions.length+' 题';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const dimScores={};Object.keys(DIMS).forEach(k=>{dimScores[k]=0;});
  Object.keys(answers).forEach(qi=>{const oi=answers[qi];const s=questions[qi].opts[oi].s;Object.keys(s).forEach(d=>{dimScores[d]+=s[d];});});
  const maxPossible=Object.keys(answers).length*3;
  const compPct=dimScores.comp/maxPossible;
  const managePct=dimScores.manage/maxPossible;
  const meaningPct=dimScores.meaning/maxPossible;
  const total=compPct+managePct+meaningPct;
  let topType;
  if(total>2.0) topType='navigator';
  else if(managePct>0.5&&meaningPct<0.3) topType='competent_hollow';
  else if(compPct>0.5&&managePct<0.3) topType='analyst_drift';
  else if(managePct>0.4&&compPct>0.3&&meaningPct>0.2) topType='quiet_steady';
  else if(compPct>0.3&&meaningPct<0.3&&managePct<0.3) topType='meaning_seeker';
  else if(total>1.0&&meaningPct>0.1) topType='rebuilding';
  else if(meaningPct>0.15||compPct>0.15) topType='fragile_hope';
  else topType='overwhelmed';
  // Handle meaning_seeker: good comp+manage but low meaning
  if(compPct>0.35&&managePct>0.3&&meaningPct<0.35) topType='meaning_seeker';
  const sorted=Object.keys(DIMS).sort((a,b)=>dimScores[b]-dimScores[a]);
  const f=TYPES[topType];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('hlTitleReveal').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥灵之钥</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-quote">「'+f.quote+'」</div><div class="ss-footer">hourlightkey.com ✦ </div></div><div class="hl-title-card"><div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div><div class="hl-title-eyebrow">Hour Light ✦ 意义感与生活连貫性</div><span class="hl-title-icon">'+f.icon+'</span><div class="hl-title-main">'+f.name+'</div><div class="hl-title-sub">'+f.sub+'</div><div class="hl-title-divider"></div><div class="hl-title-grid"><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 连貫样态</div><div class="hl-title-tag-value">'+f.name+'</div></div><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 觉察关键字</div><div class="hl-title-tag-value">'+f.keys.join(' · ')+'</div></div></div><div class="hl-title-quote">「'+f.quote+'」</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">意义感觉察 Sense of Coherence</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var pct=Math.round(dimScores[k]/maxPossible*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+DIMS[k]+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">'+f.icon+' 你的连貫样态</div><div class="result-section-content">'+f.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度觉察</div><div class="result-section-content">'+f.detail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🌿 认知芳疗配方</div><div class="result-section-content">'+f.oil+'</div></div><div class="result-section"><div class="result-section-title">🧘 60秒觉察练習</div><div class="result-section-content">'+f.med+'</div></div><div class="result-section" style="text-align:center;font-family:LXGW WenKai TC,serif;font-size:1.05rem;color:#8b6914"><div class="result-section-content"></div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ H.O.U.R. 觉察橋接</div><div class="hour-bridge-text">生活连貫感是「你跟人生的关係」，馥灵秘码看的是「人生给你的出廠设定」。<br>兩个座标交叉，找到你的意义感从哪裡來。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免费解码馥灵秘码 →</a>';
  window._resultText=f.icon+' 我的生活连貫感是「'+f.name+'」：'+f.sub+'\n\n你的人生有一条看得见的线嗎？👉 hourlightkey.com/sc/quiz-sense-coherence.html';
  try{localStorage.setItem('hl_quiz_sense_coherence',JSON.stringify({type:topType,dimScores,ts:Date.now()}));}catch(e){}
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_dropMaterial) HL_dropMaterial('quiz');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz',toolName:'意义感与生活连貫性'});window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
</script>
