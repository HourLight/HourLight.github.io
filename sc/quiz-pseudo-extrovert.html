oilText:'天竺葵帮你在「享受人群」和「保护电量」之间找到甜蜜点。薰衣草的泡脚仪式快速修复社交损耗。你值得享受人群，也值得享受安静。\n\n为什麼這个配方对你有效？\n天竺葵的香葉醇和香茅醇会温柔地调节你的自律神经平衡，让交感神经（社交的油门）和副交感神经（休息的煞車）找到甜蜜的比例。薰衣草的沉香醇直接降低皮质醇（压力荷爾蒙），泡脚時温水带动血液循环，把堆在头部的疲勞往下带走。翻译：天竺葵帮你的社交电池装上智慧型充电管理，薰衣草帮你用泡脚這个快充模式回血。',
med:'手边没有精油？试试這个：\n\n【社交型內向的快充练習】\n社交結束回到家，或是感觉电量快见底的時候。\n\n第一步：坐下來，把鞋子脫掉。双脚踩在地板上（如果有地毯更好）。閉上眼。\n\n第二步：做 5 次「4-7-8 呼吸」：用鼻子吸 4 秒、停住 7 秒、用嘴巴吐 8 秒。這个呼吸法会直接啟动你的副交感神经，跟身体说「安全了，可以休息了」。\n\n第三步：想像你的身体是一台手机。現在电量 15%。每一次呼吸，电量就升 5%。慢慢地，15%、20%、25%……你不需要充到 100%，充到 50% 就够了。\n\n第四步：把双手搓熱，轻轻盖在眼睛上。在這个黑暗裡待 30 秒。问自己：「今天最有品质的一刻是什麼？」记住那个画面。\n\n第五步：睜开眼。喝一口水。你的快充完成了。\n\n這个练習只要 5 分鐘。每次社交後做一次，你会发現：你的电池雖然小，但充电效率很高。',
insight:'「你的电池容量不是缺陷，是品质管控。充满电的你，比任何人都温暖。」',
share:'🌤️ 我是社交型內向！喜欢跟人在一起，但社交完需要充电時间🔋 电池容量有限但出品品质很高，少而精是我的风格。'},
true_i:{name:'真內向',icon:'🌙',sub:'独处就是我的能量來源',color:'#636e72',
desc:'您是真的內向。独处是充电，社交是耗电。這不是缺陷，是能量管理方式不同。您的內在世界丰富到可以自给自足，一本书、一杯茶、一个安静的下午，就是您最奢侈的享受。別人在聊天的時候，您在观察；別人在社交的時候，您在消化。您不是慢，您是在用不同的速度处理世界。您的脑袋在安静的時候运转得最好，深度思考是您的超能力。那些最深刻的洞察、最精准的判断，往往來自一个人安静想出來的結果。您的挑战不是「变外向」，是找到不需要假装的社交方式。一对一比一群人舒服，对嗎？那就多安排一对一。',
oil:'檀香 3 滴 + 薰衣草 2 滴',oilMethod:'独处時扩香，社交前在手腕点一滴薰衣草当結界',oilScene:'享受独处的品质時间、不得不社交之前',
oilText:'檀香是你的灵魂精油，让安静的時光更有深度。薰衣草在手腕上像一层温柔的結界，提醒你：在人群裡也可以保有一个属於自己的角落。\n\n为什麼這个配方对你有效？\n檀香的 α-檀香醇是少數能穿过血脑屏障的分子，它会温柔地啟动前額葉的「深度思考」模式，让你的內在世界更有层次、更有深度。薰衣草的乙酸沉香酯則像给你的杏仁核套上一层隔音棉，让外界的噪音被过濾掉，你的神经系统终於可以只聽「自己的声音」。白话翻译：檀香帮你的独处時光升級到 VIP 包廂，薰衣草是你随身攜带的隐形結界。',
med:'手边没有精油？试试這个：\n\n【真內向的深度独处练習】\n找一个你最舒服的角落。可以是床上、书桌前、阳台、任何属於你的地方。\n\n第一步：关掉所有螢幕。手机静音、电脑闔上。做 5 次深呼吸（吸 5 秒、吐 8 秒）。每次吐气想像身边有一个透明的泡泡正在慢慢形成，把你轻轻包在裡面。\n\n第二步：花 60 秒，用「五感扫描」感受你現在的空间：看到什麼？聽到什麼？皮膚感觉到什麼？空气裡有什麼味道？嘴裡是什麼味道？\n\n第三步：現在把注意力完全转向內在。问自己：「此刻我的身体哪裡最放松？」找到那个地方，把注意力停在那裡 30 秒。\n\n第四步：再问：「此刻我的脑袋裡最亮的一个念头是什麼？」不管是什麼，不评判，只是看著它。像看一隻蝴蝶飞过。\n\n第五步：做最後 3 次呼吸，每次吐气默念：「我在這裡。這样就够了。」\n\n這 5 分鐘的安静，比任何社交都更能充满你。因为你的能量來源，一直都是你自己。',
insight:'「你的安静不是冷漠，是你在用最深的方式感受這个世界。」',
share:'🌙 我是真內向！独处不是孤僻，是我最強大的充电方式🔌 一个人安静的下午，比十场聚会更让我开心。'},
context:{name:'情境切換型',icon:'🔄',sub:'看场合决定內外向',color:'#00cec9',
desc:'您不是固定的外向或內向，而是根据场合、对象、心情灵活切換。跟对的人在一起您可以嗨到天亮，跟不对的人在一起您五分鐘就想回家。您是社交界的双声道喇叭，可以很大声，也可以很安静，全看播的是什麼歌。您在老闆面前专业、在閨蜜面前搞笑、在独处時深沉，這三个都是真的您。別人可能觉得您「很难定义」，但您知道自己不是没有个性，是个性太多了装不进一个标籤。但要注意：太灵活有時候会让自己搞不清楚「真正的我到底是什麼样子」。找到那些让您完全不用切換的人和场合，那就是最接近真實的您。',
oil:'佛手柑 3 滴 + 快樂鼠尾草 2 滴',oilMethod:'每天早上一滴佛手柑在手腕，需要回归自我時用快樂鼠尾草',oilScene:'在不同角色之间切換的日子、感觉「我到底是谁」的時刻',
oilText:'佛手柑像一个內在錨点，不管外面的角色怎麼变，裡面的你不会散。快樂鼠尾草在你需要回归的時候，温柔地提醒你：所有的你都是真的。\n\n为什麼這个配方对你有效？\n佛手柑的檸檬烯和乙酸沉香酯在你的边缘系统裡種下一顆「不管外面怎麼变我都稳」的錨，前額葉在不同场景切換時依然維持稳定的自我感知。快樂鼠尾草的乙酸沉香酯让你的杏仁核暫時放下「察言观色」的任務，让那个「真正的我」有空间冒出來。翻译：佛手柑是你的 GPS 原点，不管你切換到哪个版本，它帮你记得「家」在哪裡。快樂鼠尾草是让你愿意回家的那盞灯。',
med:'手边没有精油？试试這个：\n\n【情境切換型的核心定位练習】\n一天結束的時候，或是感觉「我到底是谁」的時候。\n\n第一步：坐下來，双手放在大腿上。閉上眼，做 5 次呼吸（吸 4 秒、吐 6 秒）。\n\n第二步：想像今天你扮演过的所有角色，像一件件衣服一样掛在面前的衣架上。工作上的你、朋友面前的你、家人面前的你、独处時的你。花 30 秒看看這些衣服。\n\n第三步：現在问自己：「如果把所有的衣服都脫掉，裡面站著的那个人是什麼样子的？」不要想，让第一个浮現的画面或感觉出來。\n\n第四步：不管那个画面是什麼（可能是一个小孩、一道光、一个安静的房间），在心裡走过去，跟他说：「嘿，我看到你了。所有版本的我都是从你這裡出发的。」\n\n第五步：做 3 次深呼吸。每次吐气時，感觉那些「衣服」都还在衣架上，但你知道它們都是你选的，而不是被迫穿的。\n\n這个练習帮你记得：你的核心很大，大到可以長出很多版本。但根，只有一个。',
insight:'「找到那些让你完全不用切換的人，在他們面前的你，就是最真的你。」',
