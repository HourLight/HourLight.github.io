const DIMS={filter:'心理过濾',catastrophe:'災难化思維',personal:'过度个人化',blackwhite:'黑白思考'};
const TYPES={
filter:{name:'負面濾镜型',icon:'🕶️',sub:'你戴著一副只看得见坏事的眼镜',keys:['选擇性注意','忽略正面','放大負面'],desc:'你的大脑有一个非常強的負面过濾器。十件事情裡有九件好的一件坏的，你只记得那一件。不是你悲观，是你的注意力系统对負面讯号特別敏感。這在演化上曾经帮你避开危险，但現在它让你活在一个比現實更灰暗的世界裡。',detail:'Aaron Beck 教授把這个叫做心理过濾（Mental Filter）。你的大脑像一个漏斗，只让負面的讯息通过。好的评价从旁边流走了，不好的卡在漏斗裡反覆被你看到。\n\n觉察邀请：今天睡前写下三件今天发生的好事。不用很大的事，微小的就好。连續做一週，你会发現你的过濾器慢慢在调整。',oil:'甜橙 2 滴＋佛手柑 2 滴＋薰衣草 1 滴。甜橙打开你看见好事的通道。佛手柑让你的心情往上提。薰衣草让你的注意力不再只黏在坏事上。',med:'閉上眼睛。吸气四秒，想一件今天发生的好事。吐气六秒，让它停留。对自己说：「好的也是真的。」重複四次。',quote:'你看到的坏事是真的。但你漏掉的好事也是。'},
catastrophe:{name:'末日预言家',icon:'🌋',sub:'你的脑袋擅長把小事变成世界末日',keys:['災难化想像','最坏結果','焦慮放大器'],desc:'你的认知系统擅長从一件小事推导出最坏的結果。朋友没回讯息等於他不喜欢你了。工作犯一个错等於你会被开除。身体有一点不舒服等於你得了重病。你的大脑有一台災难化放大器，每一个小讯号都会被放到最大。',detail:'David Burns 教授把這个叫做災难化思維（Catastrophizing）。你的前額葉很擅長模擬各種情境，但它只模擬最坏的。結果你活在一个充满假想危机的世界裡，而那些危机大部分从來不会发生。\n\n觉察邀请：下次你的脑袋开始说「完蛋了」的時候，问自己：「最坏的結果真的发生的机率是多少？」然後问：「如果真的发生了我能怎麼办？」你会发現，即使最坏的結果也是可以处理的。',oil:'薰衣草 2 滴＋岩兰草 2 滴＋乳香 1 滴。薰衣草降低焦慮的音量。岩兰草把你从想像的未來拉回此刻。乳香带來一種稳定的安全感。',med:'吸气四秒，问自己：「我現在害怕的事，发生的机率是多少？」吐气六秒。吸气四秒，问：「即使发生了，我可以怎麼办？」吐气六秒。重複四次。',quote:'你的脑袋在说世界末日。但你往窗外看一眼，太阳还在。'},
personal:{name:'宇宙中心承受者',icon:'🎯',sub:'你觉得所有坏事都跟你有关',keys:['过度归因','自我責備','他人情緒背鍋'],desc:'別人心情不好是因为你。案子出问题是因为你。路上遇到塞車都觉得是自己的问题。你的认知系统有一个过度个人化的机制，把所有事情的原因都归到自己身上。你把太多不属於你的責任揹在背上了。',detail:'过度个人化（Personalization）是 CBT 裡最常见的认知偏误之一。你的大脑会自动把你放在每一件事的因果鏈上。但很多事情跟你真的没有关係。朋友心情差可能是他自己的事，老闆脸臭可能是昨天没睡好。\n\n觉察邀请：下次你觉得是自己的错的時候，列出三个跟你无关的可能原因。让你的大脑练習看到其他可能性。',oil:'佛手柑 2 滴＋天竺葵 2 滴＋薰衣草 1 滴。佛手柑把你从自責裡拉出來。天竺葵让你跟自己的情緒边界回到平衡。薰衣草让你的神经系统不再过度警觉。',med:'吸气四秒，想一件你觉得是自己的错的事。吐气六秒，问自己：「有没有可能跟我无关？」吸气四秒，想一个不是你的原因。吐气六秒。对自己说：「不是每件事都是我的責任。」',quote:'你把太多不是你的東西揹在背上了。放下一些。天不会塌的。'},
blackwhite:{name:'二元对立者',icon:'⬛',sub:'你的世界只有全好和全坏，没有灰色地带',keys:['非黑即白','完美或失败','极端评价'],desc:'你的认知系统像一个只有兩个选項的开关：好或坏、成功或失败、完美或垃圾。没有中间值。一件事只要有一点瑕疵就是失败，一个人只要犯了一个错就不值得信任。你的世界非常清晰，但也非常殘酷。因为没有人和事能通过你的全有或全无标准。',detail:'黑白思考（All-or-Nothing Thinking）是最強的认知偏误之一。它让你没办法接受不完美，不管是对自己还是对別人。你的标准只有一百分和零分，而現實世界大部分的事情在七十分左右。\n\n觉察邀请：下次你想说「完蛋了」或「太棒了」的時候，给它一个分數。不是一百也不是零，是一个中间的數字。让你的大脑练習看到灰色地带。',oil:'薰衣草 2 滴＋天竺葵 1 滴＋甜橙 2 滴。薰衣草让兩个极端之间出現空间。天竺葵带來平衡感。甜橙让七十分也可以是一種美好。',med:'吸气四秒，想一件你觉得很糟的事。给它打个分數。吐气六秒。吸气四秒，问自己：「有没有一部分其實还好？」吐气六秒。让那个分數往中间移动一点。',quote:'世界不是非黑即白的。灰色的地方才是真正住人的。'},
filter_personal:{name:'自責型灰镜',icon:'🪞',sub:'你只看到坏事而且都是你的错',keys:['負面注意＋自我归因','双重打击','慣性自責'],desc:'你同時有負面过濾和过度个人化的傾向。你不只看到坏的，你还把坏的全部归因到自己身上。這是一个双重打击：世界看起來很糟，而且全是你的错。你活在一个你自己建造的牢籠裡。',detail:'觉察邀请：今天试一个练習。每次你觉得是自己的错的時候，问兩个问题：「這真的跟我有关嗎？」然後「如果跟我有关，我能做什麼？」把自責转化成行动。',oil:'佛手柑 2 滴＋甜橙 2 滴＋薰衣草 1 滴。让你从自責的迴圈裡走出來。',med:'吸气四秒，把一件你在自責的事想出來。吐气六秒，对自己说：「這不全是我的错。」重複四次。',quote:'你的濾镜是灰色的，而且你把所有灰色都当成自己的影子。但那些灰色不全是你的。'},
catastrophe_blackwhite:{name:'极端災难型',icon:'🔥',sub:'你的脑袋只有兩个劇本：一切很好或世界末日',keys:['非好即坏','災难预演','极端劇情'],desc:'你把災难化思維和黑白思考結合在一起了。事情稍微不順就直接跳到最坏的結局，中间的过程完全被跳过。你的人生像一部只有兩个画面的电影：太阳或地震。中间的日常被你的认知系统跳过了。',detail:'觉察邀请：下次你的脑袋开始播放末日电影的時候，按暫停。问自己：「中间那些画面長什麼样？」让你的想像力不只停在最坏的那一格。',oil:'岩兰草 2 滴＋薰衣草 2 滴＋甜橙 1 滴。岩兰草把你拉回当下。薰衣草降低焦慮。甜橙在兩个极端之间加一点温度。',med:'吸气四秒，想像最坏的結果。吐气六秒。吸气四秒，想像最好的結果。吐气六秒。吸气四秒，想像中间的結果。停在那裡。那才是最有可能发生的。',quote:'你的脑袋只播兩集：天堂和地獄。但你的人生大部分在中间那集。'},
filter_catastrophe:{name:'末日放大镜',icon:'🔍',sub:'你找到坏事然後把它放到无限大',keys:['負面搜尋','放大災难','焦慮螺旋'],desc:'你先用負面过濾找到那一件坏事，然後用災难化思維把它放大到整个人生。一件小事可以让你焦慮整晚。你的认知系统是一个会自动放大負面讯号的系统，从一点噪音到一场风暴。',detail:'觉察邀请：写一本焦慮日记。每天记录你焦慮的事，一週後回头看。你会发現大部分你焦慮的事情都没有发生。让证据來告诉你的大脑：你的预测系统需要校准了。',oil:'薰衣草 3 滴＋佛手柑 2 滴。最简单也最有效的抗焦慮配方。让你的放大镜缩小一点。',med:'吸气四秒，把焦慮的那件事想出來。吐气六秒，想像它在你面前。吸气四秒，想像它慢慢缩小。吐气六秒，缩到手掌大小。对自己说：「它没有我想的那麼大。」',quote:'你手上拿著一个放大镜对著一顆灰塵。放下放大镜，它就只是一顆灰塵。'},
personal_blackwhite:{name:'完美自責型',icon:'⚖️',sub:'你要不就是全对要不就是全是你的错',keys:['完美主义','自我审判','极端归因'],desc:'你对自己的评价只有兩種：完美无缺或一无是处。犯了一个小错就觉得自己整个人都是失败的，同時把所有问题都归因到自己身上。你既是被告也是法官，而你的法庭从來不判无罪。',detail:'觉察邀请：今天对自己说一次：「我做了一件不太好的事。但我這个人不坏。」把行为跟人分开。你犯的错不等於你這个人。',oil:'薰衣草 2 滴＋玫瑰 1 滴＋佛手柑 2 滴。薰衣草让內在法庭休庭。玫瑰让你对自己温柔一点。佛手柑让不完美也可以是可以的。',med:'吸气四秒，想一件你在責備自己的事。吐气六秒，对自己说：「我做了一件不够好的事。但我這个人值得被原諒。」重複四次。',quote:'你的法庭太嚴了。偶爾让自己无罪释放。'}
};
let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';
    const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 题 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一题</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一题 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看結果 🤔</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 题，共 '+questions.length+' 题';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const dimScores={};Object.keys(DIMS).forEach(k=>{dimScores[k]=0;});
  Object.keys(answers).forEach(qi=>{const oi=answers[qi];const s=questions[qi].opts[oi].s;Object.keys(s).forEach(d=>{dimScores[d]+=s[d];});});
  const maxPossible=Object.keys(answers).length*3;
  const sorted=Object.keys(DIMS).sort((a,b)=>dimScores[b]-dimScores[a]);
  const top=sorted[0],second=sorted[1];
  const v1=dimScores[top],v2=dimScores[second];
  let topType;
  if(v1>v2*1.4) topType=top;
  else{
    const comboKey=top+'_'+second;
    topType=TYPES[comboKey]?comboKey:(TYPES[second+'_'+top]?second+'_'+top:top);
  }
  const f=TYPES[topType];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
