<html lang="zh-Hans-CN">

<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>直觉阁｜你的内在城堡｜馥灵之钥 Hour Light</title>
<meta name="description" content="直觉阁是您倾听内在声音的空间。每天来这里练习直觉，让灵感带路。"/>
<link rel="canonical" href="https://hourlightkey.com/sc/castle-room-intuition.html"/>
<link rel="icon" href="../favicon.ico"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&family=LXGW+WenKai+TC&family=Noto+Serif+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f8f0ff;
  --bg2:#f0e6f8;
  --card:rgba(255,255,255,.92);
  --warm:#2a1a3e;
  --warm2:#5a3a7a;
  --muted:#8a6aaa;
  --gold:#9a6fd0;
  --gold-l:#b090cc;
  --gold-ll:#dcc8f0;
  --teal:#7a50b0;
  --teal-l:#9a70d0;
  --rose:#a040c0;
  --rose-l:#c060e0;
  --navy:#2a1050;
  --accent:#9a40c0;
  --border:rgba(154,111,208,.18);
  --shadow:0 8px 32px rgba(42,26,62,.08);
  --shadow-lg:0 20px 60px rgba(42,26,62,.14);
}
html{scroll-behavior:smooth}
body{
  font-family:'Noto Serif TC',serif;
  color:var(--warm);
  background:var(--bg);
  min-height:100vh;min-height:100dvh;
  overflow-x:hidden;
}

/* ── Topbar ── */
.topbar{
  position:sticky;top:0;z-index:300;
  height:52px;
  background:rgba(248,240,255,.94);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;
}
@media(min-width:521px){.topbar{-webkit-backdrop-filter:none;backdrop-filter:none;background:#fdf6ef}}
.topbar-back{
  display:flex;align-items:center;gap:6px;
  font-size:.78rem;color:var(--muted);text-decoration:none;
  transition:color .2s;
}
.topbar-back:hover{color:var(--warm)}
.topbar-title{
  font-family:'Playfair Display',serif;
  font-size:.95rem;font-weight:700;color:var(--warm);
  letter-spacing:.06em;
}
.topbar-right{display:flex;align-items:center;gap:10px}
.room-completeness{
  font-size:.7rem;color:var(--muted);
  display:flex;align-items:center;gap:5px;
}
.completeness-bar{
  width:48px;height:4px;
  background:rgba(154,111,208,.15);
  border-radius:2px;overflow:hidden;
}
.completeness-fill{
  height:100%;
  background:linear-gradient(90deg,var(--gold),var(--gold-l));
  border-radius:2px;
  transition:width .6s cubic-bezier(.16,1,.3,1);
}

/* ── 页首装饰条 ── */
.room-header{
  padding:20px 18px 0;
  display:flex;align-items:baseline;gap:10px;
}
.room-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:.68rem;letter-spacing:.12em;color:var(--muted);
  background:rgba(154,111,208,.08);
  border:1px solid var(--border);
  border-radius:20px;padding:3px 12px;
  text-transform:uppercase;
}
.room-phase{
  font-size:.68rem;color:var(--gold);letter-spacing:.1em;
}
.servant-greeting{margin:8px 18px 0;padding:12px 16px;background:linear-gradient(135deg,rgba(154,111,208,.06),rgba(122,80,176,.04));border:1px solid var(--border);border-radius:14px;font-size:.82rem;color:var(--warm2);line-height:1.6;text-align:center}

/* ══════════════════════════════
   SVG 房间场景
══════════════════════════════ */
.room-scene-wrap{
  margin:12px 16px 0;
  border-radius:24px;
  overflow:hidden;
  border:1.5px solid var(--border);
  box-shadow:var(--shadow-lg);
  background:#12081e;
  position:relative;
  cursor:pointer;
}
.room-scene-wrap:hover .scene-hint{opacity:1}
.scene-hint{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.55);color:rgba(248,240,255,.85);
  font-size:.68rem;padding:5px 14px;border-radius:20px;
  letter-spacing:.08em;white-space:nowrap;
  opacity:0;transition:opacity .3s;pointer-events:none;
  -webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);
}

/* ── 家具插槽浮层 ── */
.furniture-slot{cursor:pointer;transition:filter .25s}
.furniture-slot:hover{filter:brightness(1.25) drop-shadow(0 0 8px rgba(154,111,208,.6))}
.furniture-slot.occupied{cursor:default}
.furniture-slot.occupied:hover{filter:drop-shadow(0 0 6px rgba(154,111,208,.4))}
.slot-empty{opacity:.35;transition:opacity .25s}
.furniture-slot:hover .slot-empty{opacity:.6}

/* ══════════════════════════════
   今日状态区
══════════════════════════════ */
.status-strip{
  margin:14px 16px 0;
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:8px;
}
.status-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px 10px;
  text-align:center;
}
.status-icon{font-size:18px;margin-bottom:3px;display:block}
.status-label{font-size:.62rem;color:var(--muted);letter-spacing:.06em;display:block;margin-bottom:2px}
.status-val{font-size:.88rem;font-weight:700;color:var(--warm);display:block}

/* ══════════════════════════════
   照料动作区
══════════════════════════════ */
.care-section{
  margin:14px 16px 0;
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:20px;
  padding:18px 16px;
}
.care-title{
  font-family:'Playfair Display',serif;
  font-size:.88rem;font-weight:700;color:var(--warm);
  letter-spacing:.06em;margin-bottom:14px;
  display:flex;align-items:center;gap:7px;
}
.care-title::after{
  content:'';flex:1;height:1px;
  background:var(--border);
}
.care-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.care-btn{
  display:flex;flex-direction:column;align-items:center;
  gap:5px;padding:14px 8px;
  border-radius:14px;border:1.5px solid var(--border);
  background:rgba(154,111,208,.04);
  cursor:pointer;transition:all .22s;
  font-family:'Noto Serif TC',serif;
  position:relative;overflow:hidden;
}
.care-btn::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 110%,rgba(154,111,208,.18),transparent 70%);
  opacity:0;transition:opacity .3s;
}
.care-btn:hover{
  border-color:rgba(154,111,208,.45);
  background:rgba(154,111,208,.08);
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(154,111,208,.12);
}
.care-btn:hover::before{opacity:1}
.care-btn.done{
  border-color:rgba(122,80,176,.4);
  background:rgba(122,80,176,.06);
  cursor:default;
  opacity:.7;
}
.care-btn.done:hover{transform:none;box-shadow:none}
.care-btn-icon{font-size:22px;line-height:1}
.care-btn-label{font-size:.68rem;color:var(--warm2);font-weight:500;text-align:center;line-height:1.3}
.care-btn-done-mark{
  position:absolute;top:6px;right:6px;
  width:16px;height:16px;
  background:var(--teal);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:#fff;font-weight:700;
  opacity:0;transform:scale(0);
  transition:all .3s cubic-bezier(.16,1,.3,1);
}
.care-btn.done .care-btn-done-mark{opacity:1;transform:scale(1)}
.care-result{
  margin-top:12px;padding:12px 14px;
  background:rgba(122,80,176,.06);
  border:1px solid rgba(122,80,176,.2);
  border-radius:12px;
  font-family:'LXGW WenKai TC','Noto Serif TC',serif;
  font-size:.82rem;color:var(--warm2);line-height:1.8;
  display:none;
  animation:fadeSlideUp .4s ease;
}
.care-result.show{display:block}

/* ══════════════════════════════
   直觉力练习区
══════════════════════════════ */
.intuition-section{
  margin:14px 16px 0;
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:20px;
  padding:18px 16px;
}
.intuition-prompt{
  font-family:'LXGW WenKai TC','Noto Serif TC',serif;
  font-size:.92rem;color:var(--warm);line-height:1.7;
  margin-bottom:14px;text-align:center;
}
.intuition-opts{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.intuition-opt{
  padding:18px 10px;
  border:1.5px solid var(--border);
  border-radius:14px;
  background:rgba(154,111,208,.03);
  cursor:pointer;text-align:center;
  transition:all .25s;
  font-family:'Noto Serif TC',serif;
  font-size:.88rem;color:var(--warm2);
}
.intuition-opt:hover{border-color:rgba(154,111,208,.45);background:rgba(154,111,208,.08);transform:translateY(-2px)}
.intuition-opt.sel{border-color:rgba(160,64,192,.5);background:rgba(160,64,192,.08);color:var(--warm);font-weight:600}
.intuition-opt.correct{border-color:rgba(80,180,80,.5);background:rgba(80,180,80,.08)}
.intuition-opt.wrong{border-color:rgba(200,80,80,.3);background:rgba(200,80,80,.05);opacity:.6}
.intuition-result{
  margin-top:14px;padding:14px 16px;
  background:linear-gradient(135deg,rgba(154,111,208,.06),rgba(122,80,176,.04));
  border:1px solid rgba(154,111,208,.2);
  border-radius:14px;
  font-family:'LXGW WenKai TC','Noto Serif TC',serif;
  font-size:.85rem;color:var(--warm2);line-height:1.8;
  display:none;text-align:center;
  animation:fadeSlideUp .5s ease;
}
.intuition-result.show{display:block}
.intuition-streak{
  margin-top:10px;
  font-size:.72rem;color:var(--muted);
  text-align:center;
}

/* ══════════════════════════════
   每日直觉语
══════════════════════════════ */
.daily-word{
  margin:14px 16px 0;
  padding:18px 20px;
  background:linear-gradient(135deg,rgba(154,111,208,.08),rgba(122,80,176,.04));
  border:1px solid var(--border);
  border-radius:16px;
  text-align:center;
}
.daily-word-label{font-size:.65rem;color:var(--muted);letter-spacing:.12em;margin-bottom:8px;text-transform:uppercase}
.daily-word-text{
  font-family:'LXGW WenKai TC','Noto Serif TC',serif;
  font-size:1rem;color:var(--warm);line-height:1.85;
  font-weight:500;
}

/* ══════════════════════════════
   精油氛围
══════════════════════════════ */
.aroma-section{
  margin:14px 16px 0;
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:20px;
  padding:18px 16px;
}
.aroma-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.aroma-card{
  padding:14px 10px;
  border:1.5px solid var(--border);
  border-radius:14px;
  background:rgba(154,111,208,.03);
  cursor:pointer;text-align:center;
  transition:all .22s;
}
.aroma-card:hover{border-color:rgba(154,111,208,.4);background:rgba(154,111,208,.07);transform:translateY(-2px)}
.aroma-card.sel{border-color:rgba(122,80,176,.45);background:rgba(122,80,176,.07)}
.aroma-icon{font-size:24px;margin-bottom:5px;display:block}
.aroma-name{font-size:.75rem;font-weight:700;color:var(--warm);margin-bottom:2px}
.aroma-note{font-size:.65rem;color:var(--muted);line-height:1.4}
.aroma-insight{
  margin-top:12px;padding:14px 16px;
  background:linear-gradient(135deg,rgba(42,16,80,.04),rgba(122,80,176,.04));
  border:1px solid rgba(122,80,176,.2);
  border-radius:14px;
  font-family:'LXGW WenKai TC','Noto Serif TC',serif;
  font-size:.85rem;color:var(--warm2);line-height:1.85;
  display:none;
  animation:fadeSlideUp .5s ease;
}
.aroma-insight.show{display:block}

/* ══════════════════════════════
   谜语（觉察问答）区
══════════════════════════════ */
.riddle-section{margin:14px 16px 0}
.section-label{
  font-size:.68rem;letter-spacing:.12em;color:var(--muted);
  text-transform:uppercase;margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.riddle-card{
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:20px;
  padding:20px 16px;
  box-shadow:var(--shadow);
}
.riddle-type-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:.63rem;letter-spacing:.1em;color:var(--gold);
  border:1px solid rgba(154,111,208,.25);
  border-radius:20px;padding:3px 10px;
  margin-bottom:12px;background:rgba(154,111,208,.05);
}
.riddle-q{
  font-family:'LXGW WenKai TC','Noto Serif TC',serif;
  font-size:1rem;color:var(--warm);line-height:1.75;
  margin-bottom:16px;
}
.riddle-opts{display:flex;flex-direction:column;gap:8px}
.riddle-opt{
  padding:12px 14px;
  border:1.5px solid var(--border);
  border-radius:12px;
  background:rgba(154,111,208,.03);
  cursor:pointer;
  font-size:.88rem;color:var(--warm2);
  line-height:1.55;
  transition:all .2s;
  position:relative;
}
.riddle-opt::before{
  content:'';position:absolute;left:0;top:0;
  width:3px;height:100%;
  background:var(--rose);
  border-radius:3px 0 0 3px;
  transform:scaleY(0);transition:transform .22s;
}
.riddle-opt:hover{
  border-color:rgba(154,111,208,.4);
  background:rgba(154,111,208,.07);
  transform:translateX(3px);
}
.riddle-opt:hover::before,.riddle-opt.sel::before{transform:scaleY(1)}
.riddle-opt.sel{
  border-color:rgba(160,64,192,.4);
  background:rgba(160,64,192,.06);
  color:var(--warm);font-weight:500;
}
.insight-box{
  margin-top:14px;
  padding:16px;
  background:linear-gradient(135deg,rgba(42,16,80,.04),rgba(122,80,176,.04));
  border:1px solid rgba(122,80,176,.2);
  border-radius:14px;
  display:none;
  animation:fadeSlideUp .5s ease;
}
.insight-box.show{display:block}
.insight-txt{
  font-family:'LXGW WenKai TC','Noto Serif TC',serif;
  font-size:.88rem;color:var(--warm2);line-height:1.9;
}
.insight-txt strong{color:var(--warm);font-weight:700}
.btn-complete{
  display:block;width:100%;
  margin-top:16px;padding:14px;
  background:linear-gradient(135deg,var(--teal),var(--teal-l));
  color:#fff;border:none;border-radius:14px;
  font-family:'Playfair Display','Noto Serif TC',serif;
  font-size:.95rem;font-weight:700;letter-spacing:.06em;
  cursor:pointer;transition:all .25s;
  position:relative;overflow:hidden;
}
.btn-complete::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
  transform:translateX(-100%);transition:transform .5s;
}
.btn-complete:hover::after{transform:translateX(100%)}
.btn-complete:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(122,80,176,.3)}
.btn-complete:disabled{opacity:.35;cursor:default;transform:none;box-shadow:none}
.btn-complete:disabled::after{display:none}

/* ══════════════════════════════
   家具清单
══════════════════════════════ */
.furniture-section{
  margin:14px 16px 0;
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:20px;
  padding:18px 16px;
}
.furniture-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.furniture-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;
  border-radius:12px;
  background:rgba(154,111,208,.04);
  border:1px solid var(--border);
}
.furniture-item.placed{
  border-color:rgba(154,111,208,.3);
  background:rgba(154,111,208,.07);
}
.furniture-item-icon{font-size:20px;flex-shrink:0}
.furniture-item-info{flex:1;min-width:0}
.furniture-item-name{font-size:.82rem;font-weight:700;color:var(--warm)}
.furniture-item-desc{font-size:.68rem;color:var(--muted);line-height:1.4;margin-top:1px}
.furniture-item-action{
  padding:5px 12px;border-radius:20px;
  font-size:.68rem;font-weight:700;
  border:1px solid;cursor:pointer;
  transition:all .2s;font-family:inherit;
}
.btn-place{border-color:var(--gold);color:var(--gold);background:transparent}
.btn-place:hover{background:var(--gold);color:#fff}
.btn-placed{border-color:rgba(122,80,176,.4);color:var(--teal);background:rgba(122,80,176,.06);cursor:default}
.furniture-empty{text-align:center;padding:20px;font-size:.78rem;color:var(--muted);line-height:1.8}

/* ══════════════════════════════
   照料完成 Overlay
══════════════════════════════ */
.care-overlay{
  display:none;
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.45);
  align-items:center;justify-content:center;
  -webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);
}
.care-overlay.show{display:flex;animation:fadeIn .3s ease}
.care-modal{
  background:var(--bg);
  border:1.5px solid var(--border);
  border-radius:28px;
  padding:32px 24px 28px;
  max-width:340px;width:90%;
  text-align:center;
  box-shadow:var(--shadow-lg);
  animation:modalPop .5s cubic-bezier(.16,1,.3,1);
}
.care-modal-icon{font-size:3.2rem;margin-bottom:12px;display:block}
.care-modal-title{
  font-family:'Playfair Display',serif;
  font-size:1.25rem;font-weight:700;color:var(--warm);
  margin-bottom:6px;letter-spacing:.04em;
}
.care-modal-pts{
  display:inline-block;
  background:linear-gradient(135deg,var(--gold),var(--gold-l));
  color:#fff;padding:4px 16px;border-radius:20px;
  font-size:.78rem;font-weight:700;letter-spacing:.06em;
  margin-bottom:12px;
}
.care-modal-insight{
  font-family:'LXGW WenKai TC','Noto Serif TC',serif;
  font-size:.85rem;color:var(--warm2);line-height:1.85;
  margin-bottom:20px;
  padding:12px 14px;
  background:rgba(154,111,208,.06);
  border-radius:12px;
  border-left:3px solid var(--gold-l);
  text-align:left;
}
.care-modal-close{
  width:100%;padding:12px;
  border:1.5px solid var(--border);border-radius:12px;
  background:transparent;color:var(--warm2);
  font-size:.88rem;cursor:pointer;
  font-family:'Noto Serif TC',serif;transition:all .2s;
}
.care-modal-close:hover{background:rgba(154,111,208,.07);border-color:rgba(154,111,208,.35)}

/* ══════════════════════════════
   城堡完整度浮条
══════════════════════════════ */
.completion-banner{
  margin:14px 16px 0;
  background:linear-gradient(135deg,var(--navy),#3a2060);
  border-radius:16px;
  padding:14px 16px;
  display:flex;align-items:center;gap:12px;
}
.completion-pct{
  font-family:'Playfair Display',serif;
  font-size:1.5rem;font-weight:800;color:var(--gold-ll);
  flex-shrink:0;
}
.completion-info{flex:1}
.completion-label{font-size:.72rem;color:rgba(220,200,240,.65);margin-bottom:4px;letter-spacing:.06em}
.completion-track{height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.completion-prog{
  height:100%;
  background:linear-gradient(90deg,var(--gold),var(--gold-l));
  border-radius:3px;
  transition:width .8s cubic-bezier(.16,1,.3,1);
}
.completion-sub{font-size:.65rem;color:rgba(220,200,240,.5);margin-top:4px}

/* ── 底部 ── */
.bottom-nav-row{
  margin:20px 16px 8px;
  display:flex;gap:8px;
}
.room-nav-btn{
  flex:1;padding:11px;
  border-radius:12px;
  font-size:.75rem;font-weight:700;
  border:1.5px solid var(--border);
  background:var(--card);
  color:var(--warm2);
  cursor:pointer;
  font-family:'Noto Serif TC',serif;
  transition:all .2s;text-decoration:none;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.room-nav-btn:hover{border-color:rgba(154,111,208,.4);background:rgba(154,111,208,.06)}
.room-nav-btn.primary{
  background:linear-gradient(135deg,var(--gold),var(--gold-l));
  border-color:transparent;color:#fff;
}
.room-nav-btn.primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(154,111,208,.25)}

// ── 房间谜语 ──
var _roomRiddle = null;

function todayKey(){
  var tw = new Date(new Date().getTime() + 8*3600000);
  return tw.getUTCFullYear() + '-' +
    String(tw.getUTCMonth()+1).padStart(2,'0') + '-' +
    String(tw.getUTCDate()).padStart(2,'0');
}

function todaySeed(){
  var today = todayKey();
  var seed = 0;
  for(var i=0;i<today.length;i++) seed = ((seed<<5)-seed) + today.charCodeAt(i);
  return Math.abs(seed);
}

function getTodayRiddle(){
  if(_roomRiddle) return _roomRiddle;
  if(!window.ROOMS) return null;
  var room = ROOMS.find(function(r){ return r.id === ROOM_ID; });
  if(!room) return null;
  var seed = todaySeed() + 99;
  _roomRiddle = room.riddles[seed % room.riddles.length];
  return _roomRiddle;
}

// ── 状态管理 ──
function loadRoomState(){
  var def = {
    totalVisits: 0,
    care: {},
    riddleDone: {},
    furniture: [],
    completeness: 0,
    intuitionDone: {}
  };
  try{
    var raw = localStorage.getItem(ROOM_STORAGE);
    if(!raw) return def;
    return Object.assign(def, JSON.parse(raw));
  }catch(e){ return def; }
}
function saveRoomState(st){
  try{ localStorage.setItem(ROOM_STORAGE, JSON.stringify(st)); }catch(e){}
}

function getTodayCare(st){
  if(!st || !st.care) return {};
  return st.care[todayKey()] || {};
}
function isCareDone(st, act){
  return !!(getTodayCare(st)[act]);
}
function isRiddleDone(st){
  return !!st.riddleDone[todayKey()];
}
function isIntuitionDone(st){
  return !!(st.intuitionDone && st.intuitionDone[todayKey()]);
}

// ── 完整度计算 ──
function calcCompleteness(st){
  var furniturePts = Math.min(45, st.furniture.length * 15);
  var careCount = Object.values(st.care).reduce(function(sum, day){
    return sum + Object.keys(day).length;
  }, 0);
  var carePts = Math.min(30, careCount * 2);
  var riddleCount = Object.keys(st.riddleDone).length;
  var riddlePts = Math.min(25, riddleCount * 3);
  return Math.min(100, furniturePts + carePts + riddlePts);
}

// ── 初始化 ──
var _state = null;
var _furnitureModeItem = null;

function init(){
  if(!window.ROOMS || !window.hlCastle){
    setTimeout(init, 200);
    return;
  }
  hlCastle.giveKey(ROOM_ID);
  _state = loadRoomState();
  _state.totalVisits = (_state.totalVisits || 0) + 1;
  saveRoomState(_state);

  renderDailyWord();
  renderStatus();
  renderCareSection();
  renderIntuitionArea();
  renderAromaToday();
  renderRiddle();
  renderFurnitureList();
  renderCompleteness();
  renderPlacedFurniture();
}

// ── 每日直觉语 ──
function renderDailyWord(){
  var seed = todaySeed() + 42;
  var word = DAILY_WORDS[seed % DAILY_WORDS.length];
  document.getElementById('dailyWord').textContent = word;
}

// ── 状态列 ──
function renderStatus(){
  var today = getTodayCare(_state);
  var careCount = Object.keys(today).length;
  document.getElementById('care-status').textContent = careCount >= 3 ? '✓ 完成' : careCount + '/3 项';
  document.getElementById('riddle-status').textContent = isRiddleDone(_state) ? '✓ 完成' : '待完成';
  document.getElementById('visit-count').textContent = _state.totalVisits + ' 次';
  var c = calcCompleteness(_state);
  document.getElementById('comp-bar').style.width = c + '%';
  document.getElementById('comp-pct').textContent = c + '%';
}

// ── 照料区 ──
function renderCareSection(){
  ['crystal','incense','cards'].forEach(function(act){
    var btn = document.getElementById('care-' + act);
    if(!btn) return;
    if(isCareDone(_state, act)){
      btn.classList.add('done');
    }
  });
}

function doCarAct(act){
  if(isCareDone(_state, act)) return;
  var today = todayKey();
  if(!_state.care[today]) _state.care[today] = {};
  _state.care[today][act] = true;
  saveRoomState(_state);

  var cfg = CARE_ACTS[act];
  if(!cfg) return;

  cfg.svgEffect();
  if(window.hlCastle) hlCastle.addPoints(cfg.pts);

  var seed = 0;
  var key = todayKey() + act;
  for(var i=0;i<key.length;i++) seed = ((seed<<5)-seed) + key.charCodeAt(i);
  var insight = cfg.insights[Math.abs(seed) % cfg.insights.length];

  document.getElementById('co-icon').textContent = cfg.icon;
  document.getElementById('co-title').textContent = cfg.label + '完成';
  document.getElementById('co-pts').textContent = '+' + cfg.pts + ' 灵感';
  document.getElementById('co-insight').textContent = insight;
  document.getElementById('careOverlay').classList.add('show');

  var btn = document.getElementById('care-' + act);
  if(btn) btn.classList.add('done');
  renderStatus();
  renderCompleteness();
}

function closeCareOverlay(e){
  if(e && e.target !== document.getElementById('careOverlay') && e.type === 'click') return;
  document.getElementById('careOverlay').classList.remove('show');
}

// ── 直觉力练习 ──
function renderIntuitionArea(){
  var area = document.getElementById('intuitionArea');
  if(isIntuitionDone(_state)){
    area.innerHTML = '<div class="intuition-result show" style="display:block">✓ 今天的直觉练习已完成。明天再来试试，看看直觉有没有变得更敏锐。</div>';
    return;
  }
  var seed = todaySeed() + 77;
  var test = INTUITION_TESTS[seed % INTUITION_TESTS.length];
  var h = '<div class="intuition-prompt">' + test.q + '</div>';
  h += '<div class="intuition-opts">';
  test.opts.forEach(function(opt, i){
    h += '<div class="intuition-opt" onclick="pickIntuition('+i+')" id="iopt'+i+'">' + opt + '</div>';
  });
  h += '</div>';
  h += '<div class="intuition-result" id="intuitionResult"></div>';
  area.innerHTML = h;
}

function pickIntuition(i){
  if(isIntuitionDone(_state)) return;
  var seed = todaySeed() + 77;
  var test = INTUITION_TESTS[seed % INTUITION_TESTS.length];
  // 标记选中
  test.opts.forEach(function(_, j){
    var e = document.getElementById('iopt'+j);
    if(e) e.className = 'intuition-opt' + (j===i ? ' sel' : '');
  });
  // 显示回馈
  var rSeed = todaySeed() + i;
  var response = INTUITION_RESPONSES[rSeed % INTUITION_RESPONSES.length];
  response = response.replace('{choice}', test.opts[i]);
  var resultEl = document.getElementById('intuitionResult');
  if(resultEl){
    resultEl.textContent = response;
    resultEl.classList.add('show');
    resultEl.style.display = 'block';
  }
  // 记录完成
  if(!_state.intuitionDone) _state.intuitionDone = {};
  _state.intuitionDone[todayKey()] = true;
  saveRoomState(_state);
  if(window.hlCastle) hlCastle.addPoints(1);
}

// ── 精油氛围 ──
function renderAromaToday(){
  var container = document.getElementById('aromaToday');
  var seed = todaySeed() + 33;
  var todayAroma = AROMAS[seed % AROMAS.length];

  var h = '<div style="text-align:center;margin-bottom:12px">';
  h += '<span style="font-size:2rem;display:block;margin-bottom:6px">' + todayAroma.icon + '</span>';
  h += '<span style="font-size:.92rem;font-weight:700;color:var(--warm)">' + todayAroma.name + '</span>';
  h += '<span style="font-size:.68rem;color:var(--muted);margin-left:6px;font-style:italic">' + todayAroma.latin + '</span>';
  h += '<div style="font-size:.75rem;color:var(--muted);margin-top:4px">' + todayAroma.note + '</div>';
  h += '</div>';
  h += '<button onclick="showAromaInsight()" id="aromaBtn" style="display:block;width:100%;padding:12px;border-radius:12px;border:1.5px solid var(--border);background:rgba(154,111,208,.06);color:var(--warm2);font-size:.85rem;cursor:pointer;font-family:inherit;transition:all .2s">✦ 感受这个氛围</button>';
  h += '<div class="aroma-insight" id="aromaInsightBox"></div>';
  container.innerHTML = h;
}

function showAromaInsight(){
  var seed = todaySeed() + 33;
  var todayAroma = AROMAS[seed % AROMAS.length];
  var box = document.getElementById('aromaInsightBox');
  if(!box) return;
  box.innerHTML = todayAroma.insight.replace(/\n/g,'<br>');
  box.classList.add('show');
  box.style.display = 'block';
  var btn = document.getElementById('aromaBtn');
  if(btn){ btn.textContent = '✓ 已感受'; btn.disabled = true; btn.style.opacity = '.6'; }
  box.scrollIntoView({behavior:'smooth',block:'center'});
}

// ── 谜语区 ──
function renderRiddle(){
  var rd = getTodayRiddle();
  var done = isRiddleDone(_state);
  var box = document.getElementById('riddle-content');
  if(!rd){ box.innerHTML = '<p style="color:var(--muted);font-size:.82rem">今日谜语载入中…</p>'; return; }

  var typeLabel = rd.type==='aroma' ? '🌿 认知芳疗' : rd.type==='fuyu' ? '🌿 馥灵馥语' : '💭 觉察问答';
  var h = '<div class="riddle-type-badge">' + typeLabel + '</div>';
  h += '<div class="riddle-q">' + rd.q + '</div>';

  if(done){
    h += '<div class="insight-box show"><div class="insight-txt">✓ 今日觉察已完成。明天有新的问题等著您。</div></div>';
  } else if(rd.isAroma && rd.aromas){
    h += '<div class="aroma-grid">';
    rd.aromas.forEach(function(a,i){
      h += '<div class="aroma-card" onclick="selAroma('+i+')" id="a'+i+'">';
      h += '<span class="aroma-icon">'+a.icon+'</span>';
      h += '<div class="aroma-name">'+a.name+'</div>';
      h += '<div class="aroma-note">'+a.note+'</div>';
      h += '</div>';
    });
    h += '</div>';
    h += '<div class="insight-box" id="ins"></div>';
    h += '<button class="btn-complete" id="btnDone" disabled onclick="finishRiddle()">✦ 收下这份觉察</button>';
  } else {
    h += '<div class="riddle-opts">';
    rd.opts.forEach(function(o,i){
      h += '<div class="riddle-opt" onclick="selOpt('+i+')" id="o'+i+'">'+o.text+'</div>';
    });
    h += '</div>';
    h += '<div class="insight-box" id="ins"></div>';
    h += '<button class="btn-complete" id="btnDone" disabled onclick="finishRiddle()">✦ 收下这份觉察</button>';
  }
  box.innerHTML = h;
}

function selOpt(i){
  var rd = getTodayRiddle(); if(!rd||rd.isAroma) return;
  rd.opts.forEach(function(_,j){
    var e=document.getElementById('o'+j);
    if(e) e.className='riddle-opt'+(j===i?' sel':'');
  });
  showInsight(rd.opts[i].insight);
}
function selAroma(i){
  var rd = getTodayRiddle(); if(!rd||!rd.aromas) return;
  rd.aromas.forEach(function(_,j){
    var e=document.getElementById('a'+j);
    if(e) e.className='aroma-card'+(j===i?' sel':'');
  });
  showInsight(rd.aromas[i].insight);
}
function showInsight(t){
  var el=document.getElementById('ins');
  if(!el) return;
  el.innerHTML='<div class="insight-txt">'+t.replace(/\\n/g,'<br>').replace(/\n/g,'<br>')+'</div>';
  el.classList.add('show');
  var btn=document.getElementById('btnDone');
  if(btn) btn.disabled=false;
  el.scrollIntoView({behavior:'smooth',block:'center'});
}

function finishRiddle(){
  var insEl = document.getElementById('ins');
  var insight = insEl ? insEl.textContent : '';
  var qEl = document.querySelector('.riddle-q');
  var question = qEl ? qEl.textContent : '';
  var selEl = document.querySelector('.riddle-opt.sel, .aroma-card.sel');
  var answer = selEl ? selEl.textContent : '';

  if(window.hlCastle && hlCastle.hasKey(ROOM_ID)){
    hlCastle.completeRoom(ROOM_ID, question, answer, insight);
  }
  if(window.hlMaterial) hlMaterial.drop('castle_riddle');

  _state.riddleDone[todayKey()] = true;
  saveRoomState(_state);
  renderStatus();
  renderCompleteness();

  var btn = document.getElementById('btnDone');
  if(btn){ btn.disabled=true; btn.textContent='✓ 已收下'; }
  setTimeout(function(){ renderRiddle(); }, 800);
  setTimeout(function(){
    var nav = document.createElement('div');
    nav.style.cssText='text-align:center;margin-top:20px;padding:16px;background:rgba(154,111,208,.06);border:1px solid rgba(154,111,208,.15);border-radius:16px';
    nav.innerHTML='<div style="font-size:.88rem;color:var(--warm);margin-bottom:12px">✨ 今天的觉察完成了</div><div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap"><a href="castle-game.html" style="padding:10px 20px;background:var(--gold);color:#fff;border-radius:20px;text-decoration:none;font-size:.85rem;font-weight:600">🏰 回城堡看变化</a><button onclick="this.parentElement.parentElement.remove()" style="padding:10px 20px;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:20px;font-size:.85rem;cursor:pointer;font-family:inherit">留在这个房间</button></div>';
    var riddleBox = document.querySelector('.riddle-section');
    if(riddleBox) riddleBox.appendChild(nav);
  }, 2000);
}

// ── 家具系统 ──
function renderFurnitureList(){
  var container = document.getElementById('furniture-list');
  var roomFurniture = getRoomFurniture();
  var placed = _state.furniture.map(function(f){ return f.id; });

  if(!roomFurniture.length){
    container.innerHTML = '<div class="furniture-empty">还没有适合直觉阁的家具。<br>去材料库合成家具，就能放在这里。</div>';
    return;
  }

  var html = '';
  roomFurniture.forEach(function(item){
    var isPlaced = placed.indexOf(item.id) > -1;
    html += '<div class="furniture-item' + (isPlaced?' placed':'') + '">';
    html += '<span class="furniture-item-icon">' + item.icon + '</span>';
    html += '<div class="furniture-item-info">';
    html += '<div class="furniture-item-name">' + item.name + '</div>';
    html += '<div class="furniture-item-desc">' + (item.desc||'') + '</div>';
    html += '</div>';
    if(isPlaced){
      html += '<button class="furniture-item-action btn-placed">✓ 已放入</button>';
    } else {
      html += '<button class="furniture-item-action btn-place" onclick="openFurniturePlace(\'' + item.id + '\')">放入房间</button>';
    }
    html += '</div>';
  });
  container.innerHTML = html;
}

function getRoomFurniture(){
  if(!window.hlMaterial) return [];
  var furniture = hlMaterial.getFurniture();
  var roomIds = ['intuition_orb'];
  return furniture.filter(function(f){ return roomIds.indexOf(f.id) > -1; });
}

function openFurniturePlace(itemId){
  if(!window.hlMaterial) return;
  var recipes = hlMaterial.getRecipes();
  var recipe = recipes.find(function(r){ return r.id === itemId; });
  if(!recipe) return;
  _furnitureModeItem = recipe;

  document.getElementById('fo-icon').textContent = recipe.icon;
  document.getElementById('fo-name').textContent = recipe.name;
  document.getElementById('fo-desc').textContent = '「' + (recipe.desc||'') + '」';

  var placedSlots = _state.furniture.map(function(f){ return f.slot; });
  var slotsHtml = '';
  [1,2,3].forEach(function(s){
    var occupied = placedSlots.indexOf(s) > -1;
    slotsHtml += '<button onclick="placeFurniture(\'' + itemId + '\',' + s + ')" ' +
      (occupied ? 'disabled style="opacity:.4;cursor:default"' : '') +
      ' style="width:100%;padding:10px;border-radius:10px;border:1.5px solid var(--border);' +
      'background:' + (occupied?'rgba(0,0,0,.04)':'rgba(154,111,208,.06)') + ';' +
      'color:var(--warm2);font-size:.82rem;cursor:pointer;font-family:inherit;transition:all .2s">' +
      (occupied ? '槽位 ' + s + '（已占用）' : '放入槽位 ' + s) +
      '</button>';
  });
  document.getElementById('fo-slots').innerHTML = slotsHtml;
  document.getElementById('furnitureOverlay').classList.add('show');
}

function placeFurniture(itemId, slot){
  if(!_furnitureModeItem) return;
  _state.furniture = _state.furniture.filter(function(f){ return f.slot !== slot; });
  _state.furniture.push({
    id: itemId,
    slot: slot,
    icon: _furnitureModeItem.icon,
    name: _furnitureModeItem.name
  });
  saveRoomState(_state);
  closeFurnitureOverlay();
  renderFurnitureList();
  renderPlacedFurniture();
  renderCompleteness();
  renderStatus();
  showToast(_furnitureModeItem.icon + ' ' + _furnitureModeItem.name + ' 已放入直觉阁！');
}

function closeFurnitureOverlay(e){
  if(e && e.target !== document.getElementById('furnitureOverlay') && e.type === 'click') return;
  document.getElementById('furnitureOverlay').classList.remove('show');
  _furnitureModeItem = null;
}

function toggleFurnitureMode(){}

function clickSlot(slotNum){
  var placed = _state.furniture.find(function(f){ return f.slot === slotNum; });
  if(placed){
    showToast(placed.icon + ' ' + placed.name + ' 正放在这里。');
    return;
  }
  showToast('这个位置还空著。去材料库合成家具，就能放在这里。');
}

// ── SVG 动画效果 ──
function animateCrystalBright(){
  var svg = document.getElementById('roomSvg');
  var flash = document.createElementNS('http://www.w3.org/2000/svg','circle');
  flash.setAttribute('cx','210');flash.setAttribute('cy','140');
  flash.setAttribute('r','40');
  flash.setAttribute('fill','rgba(192,160,255,.15)');
  flash.style.transition='opacity 1.5s';flash.style.opacity='1';
  svg.appendChild(flash);
  setTimeout(function(){ flash.style.opacity='0'; setTimeout(function(){ flash.remove(); },1500); },100);
}

function animateIncenseSmoke(){
  var svg = document.getElementById('roomSvg');
  for(var i=0;i<4;i++){
    (function(delay){
      setTimeout(function(){
        var smoke = document.createElementNS('http://www.w3.org/2000/svg','circle');
        smoke.setAttribute('cx', String(35 + Math.random()*6));
        smoke.setAttribute('cy','168');
        smoke.setAttribute('r', String(2 + Math.random()*2));
        smoke.setAttribute('fill','rgba(192,160,255,.25)');
        smoke.style.transition='all 2s';smoke.style.opacity='1';
        svg.appendChild(smoke);
        setTimeout(function(){
          smoke.setAttribute('cy','130');
          smoke.setAttribute('r','6');
          smoke.style.opacity='0';
          setTimeout(function(){ smoke.remove(); },2000);
        },50);
      }, delay);
    })(i*300);
  }
}

function animateCardsGlow(){
  var svg = document.getElementById('roomSvg');
  var glow = document.createElementNS('http://www.w3.org/2000/svg','rect');
  glow.setAttribute('x','168');glow.setAttribute('y','161');
  glow.setAttribute('width','36');glow.setAttribute('height','24');
  glow.setAttribute('rx','4');
  glow.setAttribute('fill','rgba(192,160,255,.2)');
  glow.style.transition='opacity 1.2s';glow.style.opacity='1';
  svg.appendChild(glow);
  setTimeout(function(){ glow.style.opacity='0'; setTimeout(function(){ glow.remove(); },1200); },200);
}

// ── 已放置家具显示在 SVG ──
function renderPlacedFurniture(){
  _state.furniture.forEach(function(f){
    var iconEl = document.getElementById('slot' + f.slot + '-icon');
    var emptyEls = document.querySelectorAll('#slot' + f.slot + ' .slot-empty');
    if(iconEl){
      iconEl.textContent = f.icon;
      iconEl.style.display = '';
    }
    emptyEls.forEach(function(e){ e.style.display='none'; });
    var slotEl = document.getElementById('slot' + f.slot);
    if(slotEl) slotEl.classList.add('occupied');
  });
}

// ── 城堡完整度 ──
function renderCompleteness(){
  var c = calcCompleteness(_state);
  var sub = c >= 100 ? '🎉 直觉阁已完整！' :
            c >= 60  ? '继续探索，越来越完整了' :
            c >= 30  ? '每天回来，完整度慢慢上升' :
                       '放置家具，提升完整度';
  document.getElementById('total-pct').textContent = c + '%';
  document.getElementById('total-prog').style.width = c + '%';
  document.getElementById('total-sub').textContent = sub;
  document.getElementById('comp-bar').style.width = c + '%';
  document.getElementById('comp-pct').textContent = c + '%';
}

// ── Toast ──
var _toastTimeout = null;
function showToast(msg){
  var t = document.getElementById('hlToast');
  if(!t){
    t = document.createElement('div');
    t.id = 'hlToast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);' +
      'background:rgba(42,26,62,.97);color:#dcc8f0;padding:10px 20px;' +
      'border-radius:12px;font-size:.82rem;z-index:9999;' +
      'border:1px solid rgba(154,111,208,.35);pointer-events:none;' +
      'opacity:0;transition:all .3s;white-space:nowrap;max-width:88vw;text-align:center;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1'; t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(_toastTimeout);
  _toastTimeout = setTimeout(function(){
    t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(12px)';
  }, 2600);
}

// ── 启动 ──
document.addEventListener('DOMContentLoaded', function(){
  var tries = 0;
  var check = setInterval(function(){
    tries++;
    if((window.ROOMS && window.hlCastle) || tries > 25){
      clearInterval(check);
      init();
    }
  }, 150);
});
</script>
