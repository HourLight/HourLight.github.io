const DIMS={hedgehog:'刺蝟',ostrich:'鴕鸟',bee:'蜜蜂',cat:'猫',dog:'狗',chameleon:'变色龍',eagle:'老鷹',sloth:'樹懶'};
const TYPES={
  hedgehog:{name:'刺蝟（缩成一团）',icon:'🦔',sub:'压力來的時候，你豎起全身的刺',
    keys:['自我保护','退缩','內耗嚴重'],
    desc:'你面对压力的方式就是把自己蜷起來。不是躲，是你的身体会自动啟动防禦模式。肩膀缩起來、社交减到最少、把自己关在一个小空间裡。你的刺不是要傷人，是你在保护一个很柔软的自己。问题是你缩著的時候，別人碰不到你，但你也碰不到任何可以帮你的東西。',
    detail:'刺蝟反应在神经科学裡对应的是「凍結反应（freeze response）」，是战或逃之外的第三種压力回应。你的自律神经系统选擇关机而不是战鬥或逃跑。這不是软弱，是你的系统在用「最低功耗模式」保护你。\n\n刺蝟的风险是：你会在自己的殼裡越待越久。压力没有消失，只是被你隔在刺的外面。但那些被隔开的東西裡面，可能有人想帮你、有资源可以用、有出路你没看到。\n\n觉察练習：下次压力來的時候，注意你的肩膀。它是不是已经快碰到耳朵了？做三次深呼吸，然後把肩膀刻意往下放。跟自己说：「我可以保护自己，但不用把所有人都关在外面。」然後做一件很小的事：回一則讯息、走出房间倒一杯水。一次打开一根刺就好。',
    oil:'薰衣草 2 滴＋佛手柑 2 滴＋甜橙 1 滴，在你缩起來的時候滴在手帕上深吸三次。薰衣草跟你的杏仁核说「安全了，可以松开」，佛手柑降低那个「外面很危险」的警报音量，甜橙像阳光从你的殼縫裡照进來。',
    med:'閉上眼睛。想像你是一隻刺蝟，蜷成一顆球。吸气四秒，感觉你的刺豎起來。吐气六秒。重複兩次。第三次呼吸的時候，想像有一隻很温暖的手轻轻放在你旁边，没有碰你，只是在旁边。吸气四秒，感觉那份温度。吐气六秒，让一根刺放下來。重複三次，每次多放下一根。最後对自己说：「我可以保护自己，也可以被靠近。」张开眼睛。',
    quote:'你的刺是你的保护，但偶爾放下幾根，让阳光照到你柔软的肚子。'},
  ostrich:{name:'鴕鸟（假装没事）',icon:'🪶',sub:'压力來的時候，你把头埋进沙子裡',
    keys:['逃避現實','拖延','表面平静'],
    desc:'你面对压力的方式就是不面对。帳单不看就不存在，讯息不读就还没发生，问题不想就不是问题。你是「假装没事」的高手，表面上你看起來好好的，但你心裡知道，沙子底下那些東西越积越多。你只是觉得「再等一下就好」。這个「一下」，有時候是一天，有時候是一年。',
    detail:'逃避是人类最常见的压力反应之一，心理学叫「迴避式因应（avoidant coping）」。短期來看它真的有效，至少你今天不用痛。但長期來看，那些被你埋起來的问题会生利息。小问题变大问题、简单的事变複杂的事、可以修的关係变成修不了的裂痕。\n\n鴕鸟的风险你自己比谁都清楚：你知道，只是不敢动。那份「不敢动」的底层是什麼？可能是害怕面对之後的結果、可能是觉得自己处理不來、也可能只是太累了。\n\n觉察练習：今天面对一件你一直在逃避的小事。不用是最大的那件，选一件小的就好。回一封你一直没回的讯息、打开你一直没看的帳单、处理一件你放了超过一週的事。做完之後注意一下：那个你以为会很恐怖的東西，真的有那麼恐怖嗎？',
    oil:'薄荷 2 滴＋迷迭香 2 滴＋葡萄柚 1 滴，在你开始「假装没事」的時候扩香。薄荷是一个清醒的小巴掌（温柔的那種），迷迭香让你的前額葉重新上线，葡萄柚给你一点面对現實的勇气。你聞到這个味道的時候会想：「好吧，來面对吧。」',
    med:'閉上眼睛。想像你的头埋在沙子裡，很暗，聽不到外面的声音。吸气四秒。吐气六秒。重複兩次。第三次的時候，慢慢把头抬起來。吸气四秒，感觉光线照到你的脸。吐气六秒，眼睛适应了。看看周圍，那些你一直不想看的東西其實都还在。吸气四秒，对自己说：「我看见了。它没有比我想像的可怕。」吐气六秒。重複三次。张开眼睛。',
    quote:'你看得见，只是选擇不看。把头抬起來，外面的阳光比你以为的温柔。'},
  bee:{name:'蜜蜂（拼命忙碌）',icon:'🐝',sub:'压力來的時候，你用「忙」來盖过「慌」',
    keys:['过度行动','停不下來','用忙麻痺'],
    desc:'你面对压力的方式就是让自己更忙。別人压力大的時候癱在沙发上，你压力大的時候加班、接更多案子、把行程排得更满。你的邏輯是：只要我在动，问题就追不上我。你确實很厲害，你的产能在压力最大的時候反而最高。但你心裡知道，有些忙碌不是在解决问题，是在逃避那个停下來之後会浮上來的東西。',
    detail:'过度行动型压力反应在心理学裡叫「功能性逃避」。你用生产力來证明自己还好、用忙碌來覆盖焦慮。你的系统选擇了「战鬥模式」，但你打的不是敵人，是你自己的安静。\n\n蜜蜂的风险是：你会燒完。蠟燭兩头燒，中间燒得最快。你的身体遲早会替你按下暫停键，可能是一场感冒、一次失眠、或是某天早上突然完全不想起床。那不是你当机了，是你的身体在说「够了」。\n\n觉察练習：今天刻意留一个「什麼都不做」的空檔。不是「做轻松的事」，是真的什麼都不做。坐著，看著窗外，让脑袋放空。你会发現那个空白让你很不舒服。那个不舒服的感觉，就是你一直在用忙碌盖住的東西。看它一眼就好，不用处理。',
    oil:'薰衣草 3 滴＋佛手柑 2 滴＋雪松 1 滴，在你觉得「停不下來」的時候扩香。薰衣草是一个温柔的制动器，佛手柑让你不需要「做了什麼」也能感觉到自己的价值，雪松是一棵不动的樹，提醒你：不动也是一種力量。',
    med:'閉上眼睛。想像你是一隻蜜蜂，翅膀嗡嗡响，一直在飞。吸气四秒，感觉翅膀的震动。吐气六秒。飞了好久好累了。第三次呼吸的時候，想像你降落在一朵花上。翅膀停了。吸气四秒，安静。吐气六秒，安静。什麼都不用做。花会托住你。重複四次。对自己说：「停下來不是偷懶，是充电。」张开眼睛。',
    quote:'你的勤勞是天賦。但蜜蜂也需要回巢休息。停下來，花会等你。'},
  cat:{name:'猫（独处充电）',icon:'🐱',sub:'压力來的時候，你需要一个人安静待著',
    keys:['独处需求','自我调节','界限清楚'],
    desc:'你面对压力的方式很像一隻猫：自己找一个安静的角落，蜷起來，不要任何人打擾。你不需要別人來安慰你，你需要的是空间。给你足够的時间和安静，你会自己消化、自己处理、自己恢复。你的充电方式就是「一个人」。不是孤僻，是你的系统就是這样设计的。',

  dog:{name:'狗（找人取暖）',icon:'🐕',sub:'压力來的時候，你需要有人在旁边',

  chameleon:{name:'变色龍（看场合演）',icon:'🦎',sub:'压力來的時候，你会变成別人需要的样子',

    oil:'乳香 2 滴＋岩兰草 2 滴＋薰衣草 1 滴，在你觉得自己「抽离太远」的時候扩香。乳香維持你的高空視野，岩兰草把你拉回身体裡（让你记得自己也是棋盘上的一个人），薰衣草让理性和感性之间有一个柔软的过渡带。',

let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';
    const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 题 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一题</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一题 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看看你的压力动物 🦔</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 题，共 '+questions.length+' 题';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){

  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">压力动物觉察 Stress Animal</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
