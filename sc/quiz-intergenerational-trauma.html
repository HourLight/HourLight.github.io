const DIMS={legacy:'传承印记',suppress:'情緒压抑',vigilance:'高度警觉',resilience:'韌性修复'};
const TYPES={
  deep_echo:{name:'深层回声型',icon:'🪞',sub:'家族的故事，一直在你身上重播',
    keys:['家族劇本','无意识重複','情緒记忆'],
    desc:'你身上带著很深的家族印记。那些你以为是「我的个性」的東西，很多其實是上一代没有处理完的情緒，透过日常相处滲进你的身体裡。你可能会发現自己在亲密关係裡重複父母的模式，在职场上複製家裡的权力結构，在面对冲突的時候用跟小時候一模一样的方式反应。這不是你的错。当一个模式在家族裡运行了兩三代，它的慣性大到你不特別去看，根本不会发現自己在裡面。',
    detail:'代际创傷传递研究（Bekes & Starrs, 2024）发現，创傷的传递不只是心理层面的。它会影响基因表現（表观遺传学），影响你的压力荷爾蒙基准值，影响你的依附模式。你的「过度反应」可能不是你反应过度，而是你的神经系统从小就被校准在一个比較高的警戒水平。\n\n但看见本身就是改变的起点。你愿意做這份测验，代表你已经不想再无意识地演那个劇本了。打破循环不需要一次到位，每一次你意识到「啊，這是家裡的模式，不是我的选擇」，就已经在松动那个慣性了。\n\n觉察练習：這週找一个让你情緒起伏的時刻，暫停三秒，问自己：「這个反应是我的，还是家裡的？」不需要答案，问本身就是觉察。',
    oil:'乳香 2 滴＋薰衣草 2 滴＋岩兰草 1 滴，睡前扩香。乳香帮你跟深层记忆建立一个比較安全的连結通道，薰衣草降低被翻攪的不安感，岩兰草让你的根重新紮在「現在的我」而不是「家族的我」。',
    med:'閉上眼睛。想像你站在一条很長的家族队伍裡，你的前面站著爸媽，爸媽前面站著阿公阿嬤。吸气四秒，感觉這条线的重量。吐气六秒。第四次呼吸的時候，你往旁边踏出一步。你还是這个家族的一份子，但你站在自己的位置上了。吸气四秒，对家族的队伍说：「谢谢你們撐到了我這一代。接下來，我会用我的方式走。」吐气六秒。张开眼睛。',
    quote:'你身上带著的，不全是你的。看见了，就有机会放下。'},
  silent_bearer:{name:'沉默承担型',icon:'🤐',sub:'你把情緒吞下去的姿势，跟家裡人一模一样',
    keys:['情緒压抑','独自消化','忍耐慣性'],
    desc:'你从小就学会了一件事：不要说。不要让人知道你不开心、不要让人看到你的脆弱、不要成为別人的負担。你可能是家裡最懂事的那一个，最早开始帮忙做家事的那一个，成绩不用人催的那一个。因为你很早就知道，家裡的容量已经不够了，你的情緒如果也加进去，整个系统会崩潰。所以你学会了压住。压久了，你可能已经不太记得「表达情緒」是什麼感觉了。不是不想说，是不知道怎麼开口。',
    detail:'情緒压抑不是你的选擇，是你的生存策略。在你成長的环境裡，压住情緒是最安全的做法。但現在你已经長大了，环境变了，這个策略反而在傷害你。長期压抑跟很多身心狀況有关：慢性疲勞、莫名的身体疼痛、人际关係裡的疏离感、突然爆发然後极度自責的循环。\n\n你身体裡有一个巨大的情緒冰庫，什麼都塞进去了但从來没有整理过。不需要一次全部打开。找一个安全的出口就好，可以是一个值得信任的人、可以是写日记、可以是哭一场。\n\n觉察练習：今天找一个你信任的人，跟他说一句真话。可以很小。「今天有点累。」「那件事我其實有点介意。」不需要解释太多，让出口先打开一个縫。',
    oil:'玫瑰 1 滴＋天竺葵 2 滴＋佛手柑 2 滴，泡澡或泡脚的時候滴入。玫瑰很轻柔地碰触你的心墙，不是要你拆掉，是让你知道墙後面的東西还活著。天竺葵让压抑的情緒有一个安全的流动方式。佛手柑降低「说出來会怎样」的恐懼。',
    med:'閉上眼睛，把手放在喉嚨的位置。吸气四秒，感觉喉嚨是紧的还是松的。吐气六秒。大部分時候可能是紧的，因为那裡锁了很多没说出口的话。吸气四秒，想像喉嚨裡有一扇很小的门。吐气六秒，让那扇门打开一条縫。不需要有東西出來，先让空气流通就好。重複四次。对自己说：「我的感受值得被聽见。」张开眼睛。',
    quote:'你吞下的那些，身体都记得。允许自己说出口，不是软弱，是勇敢。'},
  sentinel:{name:'高度警戒型',icon:'🦅',sub:'你的雷达一直开著，因为你不能再被嚇到了',
    keys:['过度警觉','环境扫描','安全需求'],
    desc:'你对环境的感知能力非常強。谁的脸色变了、谁的语气不对、空气裡的气压是不是降了，你都会第一時间偵测到。這不是敏感，這是你的神经系统被训练过的結果。在你的成長过程中，可能有一些「不可预测」的事情反覆发生，大人的情緒不稳、家裡的气氛随時可能翻盘、你不知道今天回家等著你的是笑脸还是暴风雨。所以你的身体学会了提前偵测危险。那个雷达，从來没有关过。',
    detail:'持續的高度警觉会消耗大量的心理资源。你可能会觉得自己「很容易累」，不是因为做了什麼，而是你的神经系统一直在运作，像一台从來不关机的电脑。你可能睡眠品质不太好、容易驚醒、在人多的地方会不舒服、需要一个安全的角落才能放松。\n\n這个模式在童年是保护你的。但現在的你已经有能力保护自己了，那个雷达可以调低一点。不是关掉，是从最大音量调到适当音量。\n\n觉察练習：找一个你觉得安全的空间，设定十分鐘的鬧鐘。在這十分鐘裡，刻意告诉自己：「現在是安全的。」如果雷达又啟动了，温柔地对它说：「我知道你在保护我。但現在不需要。」练習让身体记住「安全」的感觉。',
    oil:'薰衣草 3 滴＋甜橙 1 滴＋雪松 1 滴，在睡前或需要安定的時候扩香。薰衣草是最温柔的安全信号，甜橙把你从警戒模式裡拉回來，雪松像一棵稳定的大樹让你靠著。让你的神经系统知道：可以休息了。',
    med:'坐在一张有靠背的椅子上，让背靠著。閉上眼睛。感觉背後是稳固的。吸气四秒，问自己：「現在有危险嗎？」吐气六秒。答案通常是没有。吸气四秒，感觉椅子在支撐你。吐气六秒。重複三次。第四次的時候，让肩膀往下沉兩公分。对你的身体说：「谢谢你一直保护我。現在可以休息一下了。」张开眼睛。',
    quote:'你的警觉让你活了下來。但你現在已经安全了，可以让雷达歇一歇。'},
  resilient_breaker:{name:'韌性破局型',icon:'🌱',sub:'你看见了模式，而且你正在改写它',
    keys:['觉察力高','主动转化','打破循环'],
    desc:'你的家族印记不比別人少，但你有一个很了不起的能力：你看得见。你能辨认出哪些反应是自己的，哪些是家族遺留的。而且你不只是看见，你还在做。在每一个「差点又重複旧模式」的瞬间裡，你选擇了暫停、选擇了不同的反应、选擇了一条新的路。這不容易。打破慣性需要的力气，比順著慣性走大十倍。但你正在做。',
    detail:'韌性不是「不受影响」，是「受了影响之後有能力恢复和转化」。研究显示，能够打破代际创傷循环的人，通常有幾个共同特质：愿意面对真實（即使很痛）、有至少一个安全的人际连結、有持續反思的習慣。你可能不是每一条都有，但你一定有其中至少一条，否則你不会走到這裡。\n\n你正在做的事情，不只是为自己。每一个你打破的模式，都会让你的下一代少繼承一个不属於他們的包袱。你是家族裡的转折点。\n\n觉察练習：写下一个你已经成功打破的家族模式，不管多小。然後写下一个你还在努力的。前者提醒你已经走了多远，後者让你知道下一步在哪裡。',
    oil:'尤加利 2 滴＋薄荷 1 滴＋乳香 2 滴，在早上或需要力量的時候扩香。尤加利清理旧的、不属於你的能量殘留，薄荷让你的决心保持清醒，乳香连結你最深层的智慧，提醒你打破循环的能力一直都在。',
    med:'站起來，双脚踩稳。閉上眼睛。想像你脚下有一个圓圈，圈裡是「你的」，圈外是「家族的」。吸气四秒，把属於你的收进圈裡。吐气六秒，把不属於你的放到圈外。重複四次。不需要扔掉，只是分清楚。最後，看著圈外的東西，说：「谢谢你教会我的，但我选擇不带走你。」张开眼睛。',
    quote:'你是家族故事的转折点。从你开始，劇本改写了。'},
  invisible_child:{name:'隐形小孩型',icon:'👻',sub:'你从小就学会了不佔空间',
    keys:['自我消除','过度配合','存在感焦慮'],
    desc:'你在家裡的位置，不是被看见的那一个。可能是因为有一个特別需要关注的手足，可能是因为父母自己都顾不了自己，可能是因为「乖的小孩不需要担心」。你很早就学会了缩小自己，不添麻烦、不提要求、不佔空间。你把「不被注意到」当成一種安全策略。但長大之後你发現，你好像不太知道自己「想要什麼」。因为你花了太多年把自己的需求藏起來，藏到连自己都找不到了。',
    detail:'「隐形小孩」在家族系统裡其實是一个非常重要的角色。你的存在让家庭系统可以运作下去，因为你不增加負担。但代价是你的內在有一个持續在问「我重要嗎？我存在嗎？」的声音。你可能在人际关係裡过度付出（因为你觉得要做些什麼才配得上被看见），或者反过來，你不太敢靠近人（因为靠近了也不一定会被看见）。\n\n你值得被看见。不是因为你做了什麼，是因为你存在。這句话你可能聽过很多次了，但身体不一定相信。身体的相信需要新的经验來累积，不是一句话就能改变的。\n\n觉察练習：今天做一件「让自己被看见」的小事。在群组裡表达一个意见、在餐厅裡指定你想坐的位子、跟一个人说「我今天想要...」。让「佔空间」這件事慢慢变得安全。',
    oil:'甜橙 2 滴＋茉莉 1 滴＋佛手柑 2 滴，在需要勇气的早上扩香。甜橙是存在感的气味，暖暖的告诉你你在這裡。茉莉喚醒你內在那个值得被看见的部分。佛手柑降低「佔空间是不对的」那个旧信念的音量。',
    med:'坐好，閉上眼睛。想像你在一个很大的房间裡，房间裡有很多人，但没有人看到你。吸气四秒，感觉那个隐形的感觉。吐气六秒。第四次呼吸的時候，你对自己说：「我在這裡。」声音不需要大，你自己聽到就好。吸气四秒，说得大声一点：「我在這裡。」吐气六秒。重複三次，每一次声音大一点。最後，想像房间裡的人转头看你了。他們的眼神是温暖的。张开眼睛。',
    quote:'你不用做什麼才配得上被看见。你在這裡，這就够了。'},
  emotional_firefighter:{name:'情緒消防员型',icon:'🧯',sub:'你的童年工作是「让大人不要崩潰」',
    keys:['过度負責','情緒照顾者','早熟'],
    desc:'你从很小的時候就开始照顾大人的情緒。你知道媽媽什麼時候快哭了、爸爸什麼時候快爆了、家裡的气氛什麼時候快要不行了。你会说适時的话、做适時的事、成为那个让家裡不要散掉的黏著劑。你觉得這是理所当然的。但其實一个小孩不应该需要承担這些。你的童年被借走了一大塊，拿去做了不属於你的事。長大之後，你可能在任何关係裡都習慣性地当那个「照顾者」。你的雷达自动偵测谁不开心，然後你的身体自动切換成「让对方好起來」模式。但你自己不开心的時候，你卻不知道该找谁。',
    detail:'心理学裡把這叫做「亲职化」，就是孩子和父母的角色反转了。你在该被照顾的年纪，反过來照顾了整个家。這让你長大後有很強的同理心和照顾能力，但代价是你不太会「被照顾」。你的身体不知道怎麼接收，你的大脑会觉得「麻烦別人」是一件非常不安的事。\n\n你不需要繼續当消防员了。家裡的火不是你放的，也不该是你一个人滅的。你可以退一步。让大人的事回到大人手上。\n\n觉察练習：這週有一个人跟你诉苦的時候，练習只聽，不修复。不给建议、不想办法、不当中间人。就让对方的情緒是对方的。观察你不「出手救」的時候，你的焦慮有多高。那个焦慮的來源，值得去看看。',
    oil:'薰衣草 2 滴＋天竺葵 2 滴＋岩兰草 1 滴，在照顾別人照顾到累的時候扩香。薰衣草让你的消防员系统暫時下班，天竺葵提醒你自己也是需要被照顾的人，岩兰草把你的根紮回自己身上，不是紮在別人的需求裡。',
    med:'閉上眼睛。想像你手裡拿著一个滅火器，四周都是火。吸气四秒，看看那些火。吐气六秒。那些火是谁的？是你的嗎？大部分不是。吸气四秒，把滅火器轻轻放到地上。吐气六秒。火还在燒，但那不是你的火。吸气四秒，退後一步。吐气六秒。对自己说：「我不需要滅別人的火，才配得上被愛。」重複三次。张开眼睛。',
    quote:'你照顾了全世界。但你的火呢？谁在帮你滅？'},
  frozen_adapter:{name:'凍結适应型',icon:'🧊',sub:'你的情緒有一个自动冷凍庫',
    keys:['情感隔离','理性防衛','麻木'],
    desc:'你的情緒有一道自动开关。当事情太重、太痛、太複杂的時候，那个开关就会啪一声切断，你会进入一種很冷静、很理性、好像什麼都不影响你的狀态。外面的人觉得你很坚強、很稳定、很有承受力。但你知道那不是坚強。那是凍結。你把痛推到了一个你暫時碰不到的地方。那份痛还在。',
    detail:'情感隔离是一種很高級的心理防禦机制。它让你在极端压力下还能运作、还能做决定、还能照顾別人。问题是，情緒的开关一旦習慣性地关掉，快樂的感觉也一起被关掉了。你可能会发現自己对很多事情「没什麼感觉」，不太开心但也不太难过，人生好像隔著一层玻璃在看。\n\n你的冰庫裡有很多東西，是時候一点一点拿出來看了。不需要一次全解凍，那太危险。一次一小塊就好。找一个安全的人陪你，或者找一个安全的方式（写字、画画、做身体活动），让情緒慢慢回來。\n\n觉察练習：今天刻意去做一件「感觉」的事。吃一口你喜欢的食物，慢慢嚼，问自己「好吃嗎？什麼感觉？」。把注意力放在感受上，而不是想法上。让感觉的肌肉慢慢恢复。',
    oil:'玫瑰草 2 滴＋甜橙 2 滴＋薑 1 滴，在泡澡時滴入。玫瑰草非常温柔地软化情感的冰层，甜橙是温暖的橘色阳光照进冰庫，薑是从身体核心慢慢升起的温度。让解凍的过程是温和的，不是暴力的。',
    med:'閉上眼睛。想像你面前有一扇冰櫃的门。吸气四秒，把手放在门上。好冷。吐气六秒。你不需要打开它。只是感觉那个冷。吸气四秒，想像你的手掌有温度，温度透过门传进去。吐气六秒。不是在融化什麼，你只是在告诉裡面的東西：「我知道你在。」重複四次。最後对自己说：「慢慢來。等我准備好了，一点一点打开。」张开眼睛。',
    quote:'你以为自己很坚強，但那是凍結的姿态。解凍需要温度，也需要時间。'},
  rebel_healer:{name:'反叛重塑型',icon:'🔥',sub:'你用力地活成跟家裡相反的样子',
    keys:['对抗原生','刻意反向','身份重建'],
    desc:'你很早就决定了一件事：我绝对不要变成他們那样。你看到了家裡的问题，你的反应不是重複，是用力地跑向反方向。父母节省到极端，你可能变成大方到不照顾自己。父母情緒压抑，你可能刻意让自己什麼都说出來。你在建构一个「不是他們的我」，這个过程有力量，但也有盲点。因为你的座标系统依然是家裡的。你是在他們的地图上跑向反方向，但你用的还是同一张地图。',
    detail:'反叛本身不是问题，它是你保护自己的方式，也是你追求自主的证明。问题是，当你的所有选擇都在「跟家裡不一样」的座标上运作，你其實还是被家族定义的。你只是从正面複製变成了反面複製。真正的自由，是你的选擇可以不需要參照他們。\n\n這不代表你的反叛没有意义。你已经跨出了很重要的一步。現在的功课是从「逃离」走向「建构」。不是「我不要成为什麼」，是「我要成为什麼」。让你的身份从反向定义变成正向定义。\n\n觉察练習：写下三件你确定是「自己想要的」，而不是「跟家裡相反所以我选的」。如果写不出來，那這就是你目前最值得花時间想的事情。',
    oil:'迷迭香 2 滴＋雪松 2 滴＋佛手柑 1 滴，在需要安静下來想事情的時候扩香。迷迭香帮助你分辨「我真正想要的」和「我反对的」之间的差別，雪松让你的根紮在自己身上而不是家族的对面，佛手柑让重建的过程不那麼紧繃。',
    med:'閉上眼睛。想像你面前有一面镜子，镜子裡是家族的模式。你一直背对它在跑。吸气四秒，停下來。吐气六秒。转过身，看著镜子。镜子裡的東西不会咬你。吸气四秒，对镜子说：「我看到你了。你教了我什麼不该做。」吐气六秒。然後把镜子翻到背面。背面是空白的。吸气四秒，问自己：「我想在上面画什麼？」吐气六秒。让画面浮現。那才是你的。张开眼睛。',
    quote:'跑向反方向是第一步。但真正的自由，是你可以不需要參照任何人。'},
  legacy_light:{name:'传承光明型',icon:'🕯️',sub:'你从家族裡收到的，不只有傷',
    keys:['感恩接納','正面传承','平衡視角'],
    desc:'你的家族不完美。但你能看到，在那些不完美裡面，也有很多好的東西。阿嬤的韌性、爸爸的沉稳、媽媽的温柔、家裡的某个不成文规則其實是在保护你的。你不会因为家裡有过傷痛就否定所有的好，也不会因为有好的就假装傷痛不存在。你有一種很珍貴的能力：同時看见光和影，然後选擇带走光、放下影。',
    detail:'Bekes 和 Starrs（2024）的研究特別指出，代际传递不只有创傷，也有韌性。那些经历过战爭、遷徙、貧困的家族，往往同時发展出驚人的生存智慧和情感连結能力。你身上的坚韌、你面对困难的态度、你对家人的忠誠，很多都是家族送给你的礼物。\n\n你的功课不是「修复」，而是「精选」。像逛一个很大的家族倉庫，挑你要带走的，放下你不需要的。带走阿嬤的坚韌但放下她的委屈，带走爸爸的責任感但放下他的情緒压抑。\n\n觉察练習：想一个你从家裡繼承的「好東西」，可以是一个能力、一个价值观、一个習慣。然後想一个你想改变的。把好的放在左手心，把想改变的放在右手心。感觉兩隻手的重量。然後左手握拳（保留），右手打开（释放）。',
    oil:'乳香 2 滴＋甜橙 2 滴＋薰衣草 1 滴，在感恩或者需要做整理的時候扩香。乳香连結家族的智慧传承，甜橙带來温暖和感恩的感觉，薰衣草让放下的过程是平静的。',
    med:'閉上眼睛。想像你坐在一个家族聚会的大桌子旁边，桌上擺满了東西。有些是你想要的，有些不是。吸气四秒，看看桌上的東西。吐气六秒。拿起一样你感恩的，放进口袋。吸气四秒。拿起一样你不需要的，轻轻推到桌子中间。吐气六秒。重複四次。最後站起來，口袋裡装著你选的東西。对桌子说：「谢谢這些年。」转身走。张开眼睛。',
    quote:'家族给你的不只有傷，也有光。带走你选的，放下其餘的。'},
  anxious_inheritor:{name:'焦慮繼承型',icon:'🌀',sub:'你的担心，有些是上一代存进來的',
    keys:['泛焦慮','过度担憂','安全感匱乏'],
    desc:'你好像天生就是一个容易担心的人。但如果仔细看，你担心的那些事情，跟家裡的恐懼是一模一样的。爸媽怕窮，你对花钱也有莫名的不安。家裡出过意外，你对安全特別敏感。上一代经历过动盪，你的身体对稳定有一種近乎偏執的需求。你的焦慮不一定是你的。它可能是家族记忆的身体化。你在替上一代担他們当年担不完的心。',
    detail:'表观遺传学的研究发現，极端压力可以改变基因的表現方式，而且這个改变可以遺传。你的基准焦慮水平可能真的比一般人高，不是因为你「太敏感」，是因为你的生物系统裡写进了上一代的生存警报。在台湾，战後遷台、白色恐怖、经濟起飞的压力、土地认同的焦慮，這些集体经验都可能透过家庭氛圍传递到你身上。\n\n知道焦慮的「戶籍」在哪裡，不会让焦慮消失，但可以让你不再为此責怪自己。你带著兩代人的担心在活。轻一点看自己。\n\n觉察练習：下次焦慮上來的時候，对自己说：「這是我的焦慮，还是家裡的？」如果是家裡的，想像把它放进一个盒子裡，盒子上面写著家人的名字。不是不管它，是标记它不是你的。',
    oil:'薰衣草 2 滴＋佛手柑 2 滴＋依兰 1 滴，在焦慮感上來的時候扩香或滴在手帕上。薰衣草降低你的基准焦慮值，佛手柑把「万一」的声音调小，依兰温柔地跟你说：「你担心的那些事，大部分不会发生。而且就算发生了，你也能应对。」',
    med:'閉上眼睛。想像你的身体裡有很多个担心，像很多顆小石头。有些石头上面刻著你的名字，有些刻著爸媽的名字，有些刻著阿公阿嬤的名字。吸气四秒，感觉那些石头的重量。吐气六秒。伸出手，把刻著別人名字的石头一顆一顆放下來。吸气四秒，放一顆。吐气六秒，放一顆。重複四次。身体轻了一点。那些还留著的石头，才是你真正需要面对的。张开眼睛。',
    quote:'你担心的那些，有些根本不是你的功课。放下別人的石头，你才能走得动。'},
  body_keeper:{name:'身体记忆型',icon:'🫀',sub:'你的身体记得所有大脑选擇忘记的事',
    keys:['身体化症狀','感官记忆','凍結反应'],
    desc:'你的身体是一本日记，写满了大脑没有处理过的段落。某些场景你会莫名心跳加速、某些气味让你全身不舒服、某些声音让你瞬间僵住。你可能去看过医生，檢查都正常，但你知道身体裡有什麼不对勁的東西。那些不是你的想像。你的身体在替你保存了一些大脑还没准備好面对的记忆。它們可能是你自己的，也可能是你在家裡吸收到的。孩子的身体是海綿，大人没说出口的恐懼和悲傷，孩子的身体会代替吸收。',
    detail:'Bessel van der Kolk 的「身体记得一切」理论指出，创傷记忆不只儲存在大脑的杏仁核，也儲存在身体的肌肉和筋膜裡。這就是为什麼有時候你做瑜伽或按摩的時候会突然想哭。不是你想到了什麼，是你的身体在释放那个被锁住的東西。\n\n你的身体需要一種不是「想通」而是「感受通」的方式來处理這些。身体工作（瑜伽、跳舞、呼吸练習、按摩）通常比談话更直接。你不需要「理解」身体裡的東西才能释放它，你只需要让它有一个安全的出口。\n\n觉察练習：今天花五分鐘做全身扫描。从头顶慢慢感觉到脚底，注意哪裡紧、哪裡痛、哪裡有感觉。不需要做什麼，只是注意。你的身体一直在跟你说话，你只需要开始聽。',
    oil:'薰衣草 2 滴＋迷迭香 1 滴＋生薑 2 滴，在做伸展或放松的時候扩香。薰衣草安撫被啟动的身体记忆，迷迭香让你在感受的同時保持一定的意识清晰度（不要被情緒淹没），生薑温暖你身体裡那些凍結的区域。',
    med:'躺下來，或者坐在舒服的地方。閉上眼睛。从头顶开始，慢慢往下扫描。吸气四秒，注意头部和脖子。吐气六秒。有紧的地方嗎？不需要改变它，只是看见。吸气四秒，往下到肩膀和胸口。吐气六秒。繼續往下，腹部、腰部、臀部、大腿、小腿、脚。每一个区域都停留一次呼吸。扫描完之後，对你的身体说：「谢谢你替我记住了這些。我在学習怎麼聽你的话。」张开眼睛。',
    quote:'你的身体是最忠實的日记。学会读它，比读任何书都重要。'}
};
let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';
    const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 题 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一题</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一题 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看看我的韌性图譜 🌳</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 题，共 '+questions.length+' 题';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const dimScores={};Object.keys(DIMS).forEach(k=>{dimScores[k]=0;});
  Object.keys(answers).forEach(qi=>{const oi=answers[qi];const s=questions[qi].opts[oi].s;Object.keys(s).forEach(d=>{dimScores[d]+=s[d];});});
  const maxPossible=Object.keys(answers).length*3;
  // Determine type based on legacy vs resilience ratio + secondary dims
  const legacyPct=dimScores.legacy/maxPossible;
  const resilPct=dimScores.resilience/maxPossible;
  const suppressPct=dimScores.suppress/maxPossible;
  const vigilancePct=dimScores.vigilance/maxPossible;
  let topType;
  if(resilPct>0.55) topType='resilient_breaker';
  else if(resilPct>0.4&&legacyPct<0.3) topType='legacy_light';
  else if(legacyPct>0.5&&suppressPct>0.4) topType='silent_bearer';
  else if(legacyPct>0.5&&vigilancePct>0.4) topType='sentinel';
  else if(suppressPct>0.5&&vigilancePct<0.2) topType='frozen_adapter';
  else if(suppressPct>0.4&&legacyPct>0.3) topType='invisible_child';
  else if(legacyPct>0.5&&resilPct>0.2) topType='rebel_healer';
  else if(vigilancePct>0.35) topType='anxious_inheritor';
  else if(legacyPct>0.4) topType='body_keeper';
  else topType='emotional_firefighter';
  const sorted=Object.keys(DIMS).sort((a,b)=>dimScores[b]-dimScores[a]);
  const f=TYPES[topType];
  // Find a secondary type
  const typeKeys=Object.keys(TYPES).filter(k=>k!==topType);
  const secondType=typeKeys[0];
  const f2=TYPES[secondType];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('hlTitleReveal').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥灵之钥</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-quote">「'+f.quote+'」</div><div class="ss-footer">hourlightkey.com ✦ </div></div><div class="hl-title-card"><div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div><div class="hl-title-eyebrow">Hour Light ✦ 代际创傷与韌性指數</div><span class="hl-title-icon">'+f.icon+'</span><div class="hl-title-main">'+f.name+'</div><div class="hl-title-sub">'+f.sub+'</div><div class="hl-title-divider"></div><div class="hl-title-grid"><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 韌性样态</div><div class="hl-title-tag-value">'+f.name+'</div></div><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 觉察关键字</div><div class="hl-title-tag-value">'+f.keys.join(' · ')+'</div></div></div><div class="hl-title-quote">「'+f.quote+'」</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">代际韌性觉察 Intergenerational Resilience</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var pct=Math.round(dimScores[k]/maxPossible*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+DIMS[k]+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">'+f.icon+' 你的韌性样态</div><div class="result-section-content">'+f.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度觉察</div><div class="result-section-content">'+f.detail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🌿 认知芳疗配方</div><div class="result-section-content">'+f.oil+'</div></div><div class="result-section"><div class="result-section-title">🧘 60秒觉察练習</div><div class="result-section-content">'+f.med+'</div></div><div class="result-section" style="text-align:center;font-family:LXGW WenKai TC,serif;font-size:1.05rem;color:#8b6914"><div class="result-section-content"></div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ H.O.U.R. 觉察橋接</div><div class="hour-bridge-text">代际模式是「家族层」的你，馥灵秘码看的是「设定层」的你。<br>兩个座标交叉，才能看清楚哪些是你的，哪些该还回去。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免费解码馥灵秘码 →</a>';
  window._resultText=f.icon+' 我的代际韌性类型是「'+f.name+'」：'+f.sub+'\n\n你的家族在你身上留下了什麼？👉 hourlightkey.com/sc/quiz-intergenerational-trauma.html';
  try{localStorage.setItem('hl_quiz_intergenerational_trauma',JSON.stringify({type:topType,dimScores,ts:Date.now()}));}catch(e){}
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_dropMaterial) HL_dropMaterial('quiz');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz',toolName:'代际创傷与韌性指數'});window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
</script>
