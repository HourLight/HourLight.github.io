    {t:'国家有国家的考量，我們老百姓配合就好',s:{care:0,fair:0,liberty:0,loyal:1,auth:3,pure:0}}]},
  {q:'餐桌上有人开始讲带有歧視意味的笑话，大家都在笑，你会？',scene:'聚餐气氛很好，但那个笑话让你不太舒服。',opts:[
    {t:'当场说「這个笑话不太好」，即使气氛可能尷尬',s:{care:2,fair:2,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'不笑，但也不说什麼，不想破坏气氛',s:{care:1,fair:0,liberty:0,loyal:2,auth:0,pure:0}},
    {t:'每个人有说话的自由，不喜欢可以不聽',s:{care:0,fair:0,liberty:3,loyal:0,auth:0,pure:0}},
    {t:'觉得這種话不应该在公开场合说，有些底线不能碰',s:{care:0,fair:0,liberty:0,loyal:0,auth:1,pure:3}}]},
  {q:'你发現一个你敬重的前輩做了不誠實的事，你怎麼看？',scene:'他一直是你学習的对象，但這件事确實有问题。',opts:[
    {t:'失望，但会直接跟他说我觉得這样不对',s:{care:0,fair:2,liberty:0,loyal:0,auth:0,pure:1}},
    {t:'他一定有他的原因，我选擇相信他',s:{care:0,fair:0,liberty:0,loyal:3,auth:0,pure:0}},
    {t:'前輩也是人，会犯错，但规矩不能因为身份就不适用',s:{care:0,fair:3,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'很震驚。這样的人怎麼能做這種事，让我对他整个人的印象都变了',s:{care:0,fair:0,liberty:0,loyal:0,auth:0,pure:3}}]},
  {q:'你在餐厅吃到一道用了爭议食材的料理（比如鱼翅），你的想法是？',scene:'同桌的人都吃得很开心。',opts:[
    {t:'那些动物很可憐，我吃不下去',s:{care:3,fair:0,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'這是文化传统，偶爾吃一次也还好',s:{care:0,fair:0,liberty:0,loyal:2,auth:1,pure:0}},
    {t:'每个人有选擇吃什麼的自由，我不吃但不批评別人',s:{care:0,fair:0,liberty:3,loyal:0,auth:0,pure:0}},
    {t:'光想到那个画面就觉得不舒服，有些東西就是不该碰',s:{care:1,fair:0,liberty:0,loyal:0,auth:0,pure:3}}]},
  {q:'你的家人坚持要你用某種方式过节（拜拜、圍爐、扫墓），你不太想去，你会？',scene:'你有自己的计画，但家人说「一年就這麼一次」。',opts:[
    {t:'去。家人比我个人的计画重要',s:{care:1,fair:0,liberty:0,loyal:3,auth:0,pure:0}},
    {t:'跟家人溝通，看有没有折衷的方式',s:{care:1,fair:2,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'不想去就不去，我有自己的生活',s:{care:0,fair:0,liberty:3,loyal:0,auth:0,pure:0}},
    {t:'這些传统有它的意义，長輩的安排我会尊重',s:{care:0,fair:0,liberty:0,loyal:1,auth:2,pure:1}}]},
  {q:'社群上有人公开批评你支持的理念，而且很多人按讚，你的反应是？',scene:'留言区很熱鬧，有些话挺刺耳的。',opts:[
    {t:'每个人都有发表意见的权利，我不需要跟每个人辯论',s:{care:0,fair:0,liberty:3,loyal:0,auth:0,pure:0}},
    {t:'如果他说的有道理我会反思，但人身攻击我不能接受',s:{care:0,fair:3,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'觉得不舒服，好像被背叛了，我以为大家是站同一边的',s:{care:0,fair:0,liberty:0,loyal:3,auth:0,pure:0}},
    {t:'在意，因为有些价值观是不能妥協的底线',s:{care:0,fair:0,liberty:0,loyal:0,auth:1,pure:2}}]},
  {q:'你身边有人做了合法但你觉得不道德的事（比如钻法律漏洞避稅），你怎麼看？',scene:'這个人没有犯法，但你心裡过不去。',opts:[
    {t:'合法就合法，你不能用你的道德标准要求別人',s:{care:0,fair:0,liberty:3,loyal:0,auth:0,pure:0}},
    {t:'合法不等於正确，這样做对其他人不公平',s:{care:0,fair:3,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'觉得這个人不乾淨，我会跟他保持距离',s:{care:0,fair:0,liberty:0,loyal:0,auth:0,pure:3}},
    {t:'制度有漏洞是制度的问题，该改的是制度',s:{care:0,fair:2,liberty:1,loyal:0,auth:1,pure:0}}]},
  {q:'你看到新聞裡有人为了正义而違法（比如揭发公司內幕的吹哨者），你怎麼看？',scene:'',opts:[
    {t:'他做了对的事。保护弱势比遵守规則更重要',s:{care:3,fair:0,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'他很勇敢，但不管原因如何，違法就是違法',s:{care:0,fair:0,liberty:0,loyal:0,auth:3,pure:0}},
    {t:'這就是为什麼我們需要更好的制度來保护吹哨者',s:{care:0,fair:3,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'他背叛了他的组织，即使結果是好的，手段也有问题',s:{care:0,fair:0,liberty:0,loyal:3,auth:0,pure:0}}]},
  {q:'你跟另一半对一件事情的看法完全相反，而且双方都觉得自己是对的，你会？',scene:'已经吵了一阵子了，谁都不退让。',opts:[
    {t:'先处理情緒，比起谁对谁错，我更在意对方有没有受傷',s:{care:3,fair:0,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'攤开事實，用邏輯來说服对方',s:{care:0,fair:3,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'我有我的立场，你有你的，不需要谁妥協',s:{care:0,fair:0,liberty:3,loyal:0,auth:0,pure:0}},
    {t:'想想谁的判断力在這件事上比較可靠，聽那个人的',s:{care:0,fair:0,liberty:0,loyal:0,auth:3,pure:0}}]},
  {q:'有人送你一份礼物，但那个礼物是用爭议手段取得的，你会收嗎？',scene:'对方一片好意，但你知道背後的故事。',opts:[
    {t:'收下礼物但会找時间跟对方聊聊那个故事',s:{care:2,fair:1,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'收下。送礼的心意跟礼物怎麼來的是兩回事',s:{care:0,fair:0,liberty:0,loyal:2,auth:0,pure:0}},
    {t:'不收。有些東西沾了不该沾的，我碰不下去',s:{care:0,fair:0,liberty:0,loyal:0,auth:0,pure:3}},
    {t:'收不收是我的自由，但我会让对方知道我的立场',s:{care:0,fair:0,liberty:3,loyal:0,auth:0,pure:0}}]},
  {q:'在一个团队裡，有个成员总是唱反调，你觉得？',scene:'每次开会他都有不同意见，拖慢进度。',opts:[
    {t:'不同意见很重要，可能他看到了我們看不到的',s:{care:0,fair:2,liberty:2,loyal:0,auth:0,pure:0}},
    {t:'团队需要共识，一直唱反调会拖垮大家',s:{care:0,fair:0,liberty:0,loyal:3,auth:0,pure:0}},
    {t:'如果他的意见是有道理的就该聽，不能因为不合群就忽略',s:{care:0,fair:3,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'他应该尊重团队的决定，个人意见可以私下提',s:{care:0,fair:0,liberty:0,loyal:0,auth:3,pure:0}}]},
  {q:'你在排队买咖啡，前面有人插队，你会？',scene:'你已经排了十分鐘。',opts:[
    {t:'直接跟他说：「不好意思，我們都在排队」',s:{care:0,fair:3,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'不说什麼，但心裡很不爽',s:{care:0,fair:1,liberty:0,loyal:0,auth:0,pure:1}},
    {t:'不想管，不值得为這種事起冲突',s:{care:0,fair:0,liberty:2,loyal:0,auth:0,pure:0}},
    {t:'看店员怎麼处理，維持秩序是店家的責任',s:{care:0,fair:0,liberty:0,loyal:0,auth:3,pure:0}}]},
  {q:'你发現你买的東西比朋友买的同一个商品貴了很多，你的感觉是？',scene:'一模一样的東西，你多付了30%。',opts:[
    {t:'觉得很不公平，想找賣家理论',s:{care:0,fair:3,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'下次学聪明一点就好，市场本來就有价差',s:{care:0,fair:0,liberty:2,loyal:0,auth:0,pure:0}},
    {t:'觉得被騙了，对這个品牌整个观感都变差',s:{care:0,fair:1,liberty:0,loyal:0,auth:0,pure:2}},
    {t:'算了，钱已经花了，计較也拿不回來',s:{care:0,fair:0,liberty:0,loyal:0,auth:1,pure:0}}]},
  {q:'你怎麼看「为了更大的善，犧牲少數人」這个概念？',scene:'',opts:[
    {t:'如果真的没有其他办法，可以理解但很心痛',s:{care:3,fair:0,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'不行。每个人的权利都是平等的，不能用數量來算',s:{care:0,fair:3,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'没有人有权利决定犧牲谁',s:{care:0,fair:0,liberty:3,loyal:0,auth:0,pure:0}},
    {t:'如果是为了国家或群体的存亡，那有時候不得不做',s:{care:0,fair:0,liberty:0,loyal:2,auth:2,pure:0}}]},
  {q:'你觉得「孝順」是什麼？',scene:'',opts:[
    {t:'让父母开心、不让他們操心',s:{care:2,fair:0,liberty:0,loyal:1,auth:0,pure:0}},
    {t:'尊重他們的人生经验和决定',s:{care:0,fair:0,liberty:0,loyal:0,auth:3,pure:0}},
    {t:'互相尊重。我愛他們，但我也有自己的人生',s:{care:0,fair:0,liberty:3,loyal:0,auth:0,pure:0}},
    {t:'維繫家族的传统和连結，让家人之间有归属感',s:{care:0,fair:0,liberty:0,loyal:3,auth:0,pure:1}}]},
  {q:'你心目中「好人」的定义是什麼？',scene:'只能选一个最重要的。',opts:[
    {t:'不忍心看到別人受苦的人',s:{care:3,fair:0,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'对所有人一視同仁、不偏心的人',s:{care:0,fair:3,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'能为自己的行为負責、尊重別人自由的人',s:{care:0,fair:0,liberty:3,loyal:0,auth:0,pure:0}},
    {t:'言行一致、表裡如一的人',s:{care:0,fair:0,liberty:0,loyal:0,auth:0,pure:3}}]},
  {q:'你觉得社会最需要什麼？',scene:'',opts:[
    {t:'更多的同理心，让弱势被看见',s:{care:3,fair:0,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'更公平的制度，让每个人有平等的机会',s:{care:0,fair:3,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'更少的管束，让每个人活出自己想要的样子',s:{care:0,fair:0,liberty:3,loyal:0,auth:0,pure:0}},
    {t:'更稳定的秩序，让大家有安全感',s:{care:0,fair:0,liberty:0,loyal:1,auth:2,pure:0}}]},
  {q:'你的另一半想做一件你觉得很冒险的事，你会？',scene:'比如辭掉稳定工作去创业、或者去很远的地方。',opts:[
    {t:'担心他受傷，但如果他真的想做我会支持',s:{care:3,fair:0,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'這是他的人生，他有权利决定',s:{care:0,fair:0,liberty:3,loyal:0,auth:0,pure:0}},
    {t:'我們是一起的，這種大事应该一起討论、一起承担',s:{care:0,fair:0,liberty:0,loyal:3,auth:0,pure:0}},
    {t:'先评估可行性再说，不能靠冲动',s:{care:0,fair:1,liberty:0,loyal:0,auth:2,pure:0}}]},
  {q:'你在选擇食物、日用品的時候，会在意它的「來源」嗎？',scene:'比如公平貿易咖啡、无动物實验保养品、有机食材。',opts:[
    {t:'会。如果知道背後有人或动物在受苦，我买不下去',s:{care:3,fair:0,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'会看一下，但不会太坚持，方便就好',s:{care:0,fair:0,liberty:1,loyal:0,auth:0,pure:0}},
    {t:'会。不乾淨的東西我不想碰，身体吃进去什麼很重要',s:{care:0,fair:0,liberty:0,loyal:0,auth:0,pure:3}},
    {t:'会。企业应该对供应鏈負責，消费者的选擇可以推动改变',s:{care:0,fair:3,liberty:0,loyal:0,auth:0,pure:0}}]},
  {q:'你怎麼看「规矩就是用來打破的」這句话？',scene:'',opts:[
    {t:'不合理的规矩本來就该被挑战',s:{care:0,fair:1,liberty:3,loyal:0,auth:0,pure:0}},
    {t:'规矩是经验累积出來的，打破之前要先了解它存在的原因',s:{care:0,fair:0,liberty:0,loyal:0,auth:3,pure:0}},
    {t:'如果规矩傷害了人，那它就不是好规矩',s:{care:3,fair:0,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'规矩是群体的共识，随便打破会傷害信任',s:{care:0,fair:0,liberty:0,loyal:3,auth:0,pure:0}}]},
  {q:'最後一题。你最受不了什麼样的人？',scene:'直觉选。',opts:[
    {t:'对別人的痛苦无动於衷的人',s:{care:3,fair:0,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'佔便宜、双标、只对自己有利的规則才遵守的人',s:{care:0,fair:3,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'控制狂。管東管西，不让別人有自己的空间',s:{care:0,fair:0,liberty:3,loyal:0,auth:0,pure:0}},
    {t:'背叛者。说好的事情反悔、答应的承諾不算數',s:{care:0,fair:0,liberty:0,loyal:3,auth:0,pure:0}},
    {t:'没有原則、表裡不一、什麼都说好但什麼都做不到',s:{care:0,fair:0,liberty:0,loyal:0,auth:0,pure:3}},
    {t:'不尊重長輩、目无法纪、没有分寸的人',s:{care:0,fair:0,liberty:0,loyal:0,auth:3,pure:0}}]}
];
const DIMS={care:'关怀',fair:'公平',liberty:'自由',loyal:'忠誠',auth:'权威',pure:'纯潔'};
const TYPES={
  care:{name:'守护者',icon:'🫶',sub:'你的道德羅盘指向「不忍心」',
    keys:['同理心','弱势保护','温柔'],
    desc:'在你的道德世界裡，最重要的事情只有一件：不要让任何人受苦。你看到受傷的动物会心疼、聽到不公正的新聞会憤怒、发現有人被欺負你站不住。你的道德直觉是从「痛」出发的。因为你真的能感觉到那个痛，所以你会想阻止它。你做的很多决定，底层动力都是「我不想看到有人不好」。',
    detail:'Jonathan Haidt 的研究显示，「关怀/傷害」是所有道德基礎中最普遍的。幾乎所有人都有這个基礎，但在你身上它特別強烈。你的镜像神经元可能比一般人活躍，你真的能「感同身受」別人的痛苦。\n\n守护者的盲点在於：你可能会因为太在意「谁在受苦」而忽略了其他面向。比如你可能为了保护一个人而違反公平原則，或者为了避免冲突而不敢设界线。你的同理心是天賦，但如果没有搭配判断力，它可能会让你燃尽自己。\n\n另一个风险是「道德疲勞」。因为你对痛苦的敏感度很高，這个世界上太多你想管但管不了的事。新聞裡的苦难、社群上的求助、身边的人际糾紛，你全部都在接收。你的心很大，但你的能量是有限的。\n\n觉察邀请：這週练習一次「不是我的責任」。不是不在乎，是承认有些苦不是你能帮的，把能量留给你真正能影响的范圍。',
    oil:'天竺葵 2 滴＋薰衣草 2 滴＋甜橙 1 滴。天竺葵平衡你的付出与接收。薰衣草安撫你因为別人的苦而紧繃的神经。甜橙提醒你自己的快樂也很重要。',
    med:'閉上眼睛。想想今天你照顾过的那些人。吸气四秒，让那些画面慢慢过去。吐气六秒。把注意力拉回來，手放在胸口。吸气四秒，感觉胸口的温度。吐气六秒，对自己说：「我也需要被照顾。」重複三次。张开眼睛。今天有没有一件只为自己做的小事？',
    quote:'你的心够大，装得下全世界。只是记得留一个角落给自己。'},
  fair:{name:'天秤手',icon:'⚖️',sub:'你的道德羅盘指向「這不公平」',
    keys:['规則意识','平等','不偏不倚'],
    desc:'在你的道德世界裡，最重要的事情是：每个人都应该被公平对待。不管你是谁、有什麼背景、认识什麼人，规則对所有人都一样。你很难接受双标、走後门、用关係压人這種事。你的道德直觉是从「比例」出发的。付出多少就应该得到多少，傷害多少就应该承受多少。',
    detail:'公平基礎是人类社会合作的核心。没有公平感，就没有信任，没有信任就没有合作。你对不公平的敏感度很高，這让你成为很好的仲裁者，因为你真的能看到谁被多拿了、谁被少给了。\n\n天秤手的盲点在於：「公平」其實不只有一種。你可能偏向的是「結果公平」（每个人得到一样的），但有時候「过程公平」（每个人有平等的机会）或「需求公平」（最需要的人先得到）才是更好的。当你坚持你那一種公平的時候，可能会跟坚持另一種公平的人产生冲突。\n\n另一个风险是「过度计較」。不是每件事都需要精算到分毫不差。在亲密关係裡，如果你一直在记帳（我做了幾件家事、你做了幾件），那个计數本身就会消耗愛。\n\n觉察邀请：這週允许自己在一件事情上「不计較」。不是因为不在意公平，是让你体验一下：放下天秤的時候，你的双手可以做什麼。',
    oil:'佛手柑 2 滴＋迷迭香 2 滴＋薰衣草 1 滴。佛手柑降低你看到不公平時的焦慮反应。迷迭香維持你的判断清晰度。薰衣草让你在坚持原則的同時，不至於太繃。',
    med:'閉上眼睛。想像你心裡那把天秤。吸气四秒，感觉它現在的重量，哪边比較沉。吐气六秒，不用立刻调平，只是看著它。吸气四秒，告诉自己：「我可以观察不公平，但不一定要马上出手。」吐气六秒。重複四次。张开眼睛。今天有一件不公平的事，允许自己只是记下來，先不行动。',
    quote:'你的天秤很准。但偶爾让它歪一点，不是不公正，是温柔。'},
  liberty:{name:'自由行者',icon:'🦅',sub:'你的道德羅盘指向「不要管我」',
    keys:['个人自主','反控制','尊重边界'],
    desc:'在你的道德世界裡，最重要的事情是：每个人都有权利决定自己的人生。你不太能忍受被控制、被规定、被告诉「你应该怎样」。你的道德直觉是从「自主」出发的。你不要求別人跟你一样，但你也不接受別人要求你跟他們一样。你的底线很简单：我不傷害你，你也別管我。',
    detail:'自由基礎在Haidt的框架裡是後來才加入的，因为它太強了，不能被忽略。你对「被压迫」的感觉非常敏感，不管是來自政府、组织、文化、甚至是善意的建议，只要你觉得「這在限制我」，你就会反弹。\n\n自由行者的盲点在於：你可能把「不管別人」当成美德，但有時候「管」是出於在乎。你的伴侶问你今天过得好嗎，不是在控制你，是在关心你。你的朋友建议你去看个医生，不是在指揮你，是在担心你。如果你的自由雷达太敏感，会把善意的连結也推开。\n\n另一个风险是「孤立」。极端的自由意味著极端的独立，而极端的独立可能变成极端的孤独。你不需要任何人，但你想要有人嗎？\n\n觉察邀请：這週接受一次別人的帮助。不是因为你做不到，是练習「让人靠近也是安全的」。你的自由不会因为有人帮你就消失。',
    oil:'尤加利 2 滴＋薄荷 1 滴＋佛手柑 2 滴。尤加利给你呼吸的空间。薄荷維持你的清醒独立。佛手柑在自由裡面加一点温暖，让你不至於飞太远。',
    med:'閉上眼睛。感觉今天的你在哪个空间裡。吸气四秒，想像一片没有边界的天空，你就在那裡飞。吐气六秒，不用降落，只是飞著。吸气四秒，感觉這份自在是你自己带來的，不是外面给的。吐气六秒，说：「我的自由，从裡面开始。」重複三次。张开眼睛。今天选一件事，理由只有「我想要」，不需要別的解释。',
    quote:'你的自由是你最在意的東西。但自由不一定要孤独。'},
  loyal:{name:'守约人',icon:'🤝',sub:'你的道德羅盘指向「我們是一起的」',
    keys:['群体归属','承諾','义气'],
    desc:'在你的道德世界裡，最重要的事情是：你的人不能被背叛。家人、朋友、团队、组织，只要你认定了「我們是一群的」，你就会全力維护這个群体。你重視承諾、重視义气、重視「说到做到」。你可以原諒能力不足，但很难原諒背叛。因为在你心裡，忠誠是所有关係的底线。',
    detail:'忠誠基礎的演化根源跟部落生存有关。在远古時代，被群体驅逐等於死亡。所以你的大脑对「谁跟我同一边」非常敏感。你很快能辨识出谁是內人、谁是外人，然後本能地保护前者、防備後者。\n\n守约人的盲点在於：你可能会因为忠誠而不敢批评自己人。明明知道他做错了，但因为「他是我朋友」就选擇閉嘴。忠誠如果没有搭配公正，就会变成包庇。你保护的不应该是「人」，是你們之间的「约定」。\n\n另一个风险是「排外」。你的群体边界画得越清楚，对外面的人就越冷淡。你对自己人有多暖，对外人可能就有多冷。在台湾的文化裡，這很常见。但世界不只是你的圈子。\n\n觉察邀请：這週跟一个「不是你的人」聊一聊。不需要喜欢他，只是练習看到对方也是一个完整的人。',
    oil:'乳香 2 滴＋雪松 2 滴＋甜橙 1 滴。乳香连結你跟你重視的人之间的深层连結。雪松让你的根紮稳但不至於排斥新土壤。甜橙提醒你圈子外面也有温暖。',
    med:'閉上眼睛。想一个你在乎的人。吸气四秒，感觉那份连結。吐气六秒，不用说任何话，只是感觉「我們是一起的」這四个字。吸气四秒，问自己：「我对自己的承諾，也有這麼认真嗎？」吐气六秒，让這个问题待在那裡。重複三次。张开眼睛。今天对自己许一个小承諾，今天就實現它。',
    quote:'你的义气是你最美的品质。只是別让它变成一面只看得到裡面的墙。'},
  auth:{name:'秩序守望者',icon:'🏛️',sub:'你的道德羅盘指向「规矩不能亂」',
    keys:['階层感','稳定','尊重经验'],
    desc:'在你的道德世界裡，最重要的事情是：社会需要秩序，而秩序需要有人維护。你尊重经验、尊重制度、尊重那些在你之前就存在的规則。不是盲从，是你相信「大部分的规矩之所以存在，是因为前人踩过坑」。你觉得長輩的话有道理应该聽、公司的流程有意义应该遵守、社会的階层有存在的原因。',
    detail:'权威基礎的演化根源跟社会分工有关。在複杂的社会裡，如果每个人都自行其是，合作就无法进行。有人領导、有人跟随，這套系统让人类能组织起比任何动物都龐大的合作网路。\n\n秩序守望者的盲点在於：你可能会因为尊重权威而不敢质疑。「長輩说的」不一定都对，「公司的制度」不一定都合理，「传统的做法」不一定适合現在。当权威本身是错的時候，你的服从就不是美德了，是共犯。\n\n在台湾的文化裡，這種盲点特別明显。尊师重道、長幼有序、上司下属。這些框架让社会稳定，但也可能压住了很多该说的话。\n\n觉察邀请：這週对一个你通常会服从的对象，提出一个真實的意见。不是反抗，是练習「尊重不等於不能有不同看法」。',
    oil:'迷迭香 2 滴＋薄荷 1 滴＋佛手柑 2 滴。迷迭香維持你的判断力不被权威盖过。薄荷给你一点清醒的勇气。佛手柑让质疑的过程不那麼焦慮。',
    med:'閉上眼睛。想像你心裡那本规矩手冊。吸气四秒，翻到某一页，上面写了一条你很在意的规矩。吐气六秒，读了一遍。吸气四秒，问：「這条规矩是保护我的，还是限制我的？」吐气六秒，不用急著答，让身体告诉你感觉。重複三次。张开眼睛。有没有一条规矩今天可以放软一点，试试看？',
    quote:'规矩是好的。但偶爾问一声「为什麼」，不是不尊重，是让规矩变得更好。'},
  pure:{name:'結界守护者',icon:'🪷',sub:'你的道德羅盘指向「有些東西碰不得」',
    keys:['底线分明','直觉式道德','厭惡感強烈'],
    desc:'在你的道德世界裡，有些東西是不能碰的。不是因为它犯法、不是因为它傷害了谁，是因为它就是「不对」。你有很強的道德直觉，很多判断你说不出具体的理由，但你就是知道那条线在哪裡。你对「乾淨」和「骯髒」的感觉很敏銳，不只是物理上的，心理上也是。',
    detail:'纯潔基礎是六个基礎裡最容易被误解的。它不是宗教或保守的专利，而是一種深层的直觉性道德反应。你的厭惡感（disgust）比一般人灵敏，這让你对很多事情有很快速的「好/不好」判断。\n\n結界守护者的盲点在於：你的道德判断可能过度依賴「感觉」而不是「分析」。你觉得噁心不代表那件事真的有问题。文化差异、个人经验、甚至是偏见，都可能偽装成你的「道德直觉」。当你说「這就是不对」但说不出为什麼的時候，值得多停一下想一想。\n\n在台湾的脈络裡，面子文化、潔身自好的观念都跟纯潔基礎有关。你可能特別受不了「不乾不淨」的人事物，但有時候人生就是会弄髒手的。\n\n觉察邀请：這週找一件你本能觉得「不对」的事情，试著用邏輯分析一下它到底为什麼不对。如果你找不到具体的理由，那也许值得重新评估那个直觉。',
    oil:'檸檬 2 滴＋薄荷 1 滴＋乳香 2 滴。檸檬带來清淨感。薄荷帮你的直觉保持銳利。乳香让你在坚守底线的同時，不至於把所有人都推开。',
    med:'閉上眼睛。想像你心裡的潔白空间，你的結界。吸气四秒，感觉它的乾淨，你就在裡面，安全的。吐气六秒。吸气四秒，看看結界的边缘，问自己：「這边界是在保护我，还是把我圍起來了？」吐气六秒，不用急著答。重複三次。张开眼睛。今天允许一件「不完美但无害」的事进來你的世界，感觉一下有没有那麼可怕。',
    quote:'你的底线很清楚，那是你的結界。但偶爾打开大门看看外面，不是降低标准，是扩大視野。'},
  care_fair:{name:'正义使者',icon:'🛡️',sub:'你要保护弱者，而且要用公平的方式',
    keys:['制度关怀','理性善良','系统思考'],
    desc:'你的道德世界裡同時住著温柔和理性。你看到不公平的事会心痛，但你不会只是心痛，你会去想：「怎麼样从制度层面改变它？」你相信好的制度能保护最多的人。你不只想帮一个人，你想改变游戏规則。你是那種会去做公益但同時会质疑公益组织效率的人。',
    detail:'這種组合让你在道德推理上很全面。你能感受到人的痛苦（关怀），也能分析造成痛苦的結构（公平）。你大概是朋友圈裡最常被來问「你觉得怎样才合理」的人。\n\n正义使者的盲点在於：你可能太理想化了。你想要的是一个既温暖又公平的世界，但現實是温暖和公平有時候会冲突。给弱势更多资源是关怀，但其他人可能觉得不公平。你在兩者之间的拉扯会让你很累。\n\n觉察邀请：接受這个世界暫時不完美。你可以同時追求关怀和公平，但不需要每一件事都同時满足兩者。有時候先温暖，有時候先公平。一步一步來。',
    oil:'天竺葵 2 滴＋佛手柑 2 滴＋薰衣草 1 滴。天竺葵平衡你的关怀能量。佛手柑安撫你对不公平的焦慮。薰衣草让你在为世界奮战的同時，记得也照顾自己。',
    med:'閉上眼睛。想像你的心是一个广场，今天打了很多仗。吸气四秒，現在可以放下武器一分鐘。吐气六秒，肩膀放松。吸气四秒，说：「世界的不公平不是我一个人能扛完的。」吐气六秒。重複四次。最後一次吐气，说：「今天先照顾自己，明天繼續奮战。」张开眼睛。',
    quote:'你的正义很完整。温柔和公平都在。只是這条路很長，记得替自己留油。'},
  loyal_auth:{name:'传统守衛者',icon:'🏯',sub:'你重視的是群体的稳定、長幼的秩序、说到做到的承諾',
    keys:['家族观念','尊重传统','稳定优先'],
    desc:'你的道德世界很重視「秩序」和「归属」。你觉得一个好的社会需要稳定的結构：家庭有家庭的伦理、公司有公司的规矩、国家有国家的法律。你会为群体犧牲个人、为传统坚持立场、为長輩維护尊嚴。你觉得前人留下的東西有它的道理。',
    detail:'在台湾的文化裡，這種组合其實是最主流的道德观。重視家庭、尊敬長輩、維护团体和諧。你走进家族聚会，大概是最会顾慮每个人感受和位階的那个人。\n\n传统守衛者的盲点在於：你可能会用「传统」和「秩序」來压制异见。不是每个不服从的人都是叛逆，有些人只是看到了你没看到的東西。稳定不代表不能改变，好的传统是活的，它会随著時代更新。\n\n觉察邀请：這週聽一个你平常觉得「太叛逆」的人说说他的想法。不是要你认同，是让你的道德視野多一个角度。',
    oil:'雪松 2 滴＋檀香 2 滴＋甜橙 1 滴。雪松加固你的根。檀香连結你跟传统之间的深层智慧。甜橙提醒你：传统也可以是有温度的、是会生長的。',
    med:'閉上眼睛。想像你守护的那些東西，传统、承諾、秩序。吸气四秒，感觉它們的重量在你身上。吐气六秒，慢慢把其中一样放在你旁边，让它站在那裡，你來守护，但不是你在扛它。吸气四秒，感觉肩膀轻了一点。吐气六秒，说：「守护不是一个人撐住。」重複三次。张开眼睛。',
    quote:'你守护的東西很有价值。只是別忘了，最好的传统是会随著時代一起長大的。'},
  liberty_care:{name:'温柔反抗者',icon:'🌻',sub:'你为自由而战，但你的武器是同理心',
    keys:['为弱势发声','反压迫','温柔坚定'],
    desc:'你的道德世界裡，最受不了的事情是「有权力的人欺負没有权力的人」。你重視自由，但不是那種「我不管別人」的自由，是那種「每个人都应该被尊重」的自由。你会为被压迫的人发声、为不公正的制度生气、为那些说不出话的人把话说出來。你的反抗不是暴力的，是温柔但坚定的。',
    detail:'這種组合在社会运动者身上很常见。你同時拥有关怀（看到人的痛苦）和自由（看到压迫的結构）兩種敏感度。你不只心疼受苦的人，你还想改变造成苦的系统。\n\n温柔反抗者的盲点在於：你可能会燃尽自己。因为你在意的事情太多了。每一个不公正、每一个受压迫的群体、每一个你觉得应该改变的制度，都在消耗你的能量。你不能拯救所有人。\n\n觉察邀请：选擇一个你最在意的议题，把 80% 的力气放在那裡。其他的，允许自己暫時放手。不是不在乎，是策略性的专注。',
    oil:'天竺葵 2 滴＋尤加利 2 滴＋薰衣草 1 滴。天竺葵平衡你的付出。尤加利維持你为自由而战的力气。薰衣草在你战累了的時候接住你。',
    med:'閉上眼睛。想像你是一棵开花的樹，根往下，花往上。吸气四秒，感觉根的稳定。吐气六秒，感觉花的轻盈。吸气四秒，你同時是兩種：有骨气，有柔情。吐气六秒，说：「温柔和勇气，都是我的。」重複三次。张开眼睛。今天不用选边，做一件让你觉得「对」的事就好。',
    quote:'你的温柔和勇气同時存在，那是很少人有的组合。別把它用到见底。'},
  pure_loyal:{name:'道德潔癖者',icon:'🏮',sub:'你对「不乾淨」的人事物零容忍，尤其是背叛',
    keys:['高标准','黑白分明','义理兼具'],
    desc:'你的道德世界很乾淨、很清楚。什麼可以做、什麼不能做，你心裡有一条非常清楚的线。這条线同時包含了「纯潔」（有些東西就是碰不得）和「忠誠」（答应的事就要做到）。你可能是朋友圈裡最「讲原則」的那个人，也是最难原諒背叛的那个人。在你心裡，髒了就是髒了，很难洗回去。',
    detail:'這種组合让你的道德判断非常果断。你不太有灰色地带。好就是好，坏就是坏，乾淨就是乾淨，骯髒就是骯髒。這让你很值得信任，因为你说到做到、表裡如一。\n\n道德潔癖者的盲点在於：你的黑白分明可能让你很难跟「不完美」的人相处。每个人都有灰色的部分，如果你不接受灰色，你的圈子会越來越小。不是要你降低标准，是允许別人在你的标准裡有成長的空间。\n\n觉察邀请：這週想一个你曾经「放棄」的人。问自己：「如果我当時愿意多给一次机会，結果会不同嗎？」不一定要行动，只是想一想。',
    oil:'茶樹 2 滴＋乳香 2 滴＋薰衣草 1 滴。茶樹带來淨化感。乳香让你的高标准不至於变成武器。薰衣草在你对人失望的時候安撫那个心痛。',
    med:'閉上眼睛。想像你心裡那塊潔白的地板。吸气四秒，蹲下來看著它。吐气六秒，有一小塊灰塵。吸气四秒，问自己：「這塊灰塵让整片地板失去意义了嗎？」吐气六秒，让身体给你感觉，不用用头脑答。重複三次。张开眼睛。人和地板一样，有灰塵不代表没有价值。',
    quote:'你的底线很高、原則很清楚。這是你最好的品质。但人不是非黑即白的，允许一点灰色，不代表你变了。'}
};
let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 题 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一题</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一题 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看看我的道德人格 ⚖️</button>')+'</div>';area.appendChild(card);});updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 题，共 '+questions.length+' 题';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const dimScores={};Object.keys(DIMS).forEach(k=>{dimScores[k]=0;});
  Object.keys(answers).forEach(qi=>{const oi=answers[qi];const s=questions[qi].opts[oi].s;Object.keys(s).forEach(d=>{dimScores[d]+=s[d];});});
  const maxPossible=Object.keys(answers).length*3;
  const sorted=Object.keys(DIMS).sort((a,b)=>dimScores[b]-dimScores[a]);
  const top=sorted[0],sec=sorted[1];const t1=dimScores[top],t2=dimScores[sec];
  let topType;
  if(t1>t2*1.4) topType=top;
  else{const combo={'care_fair':'care_fair','fair_care':'care_fair','loyal_auth':'loyal_auth','auth_loyal':'loyal_auth','liberty_care':'liberty_care','care_liberty':'liberty_care','pure_loyal':'pure_loyal','loyal_pure':'pure_loyal'};topType=combo[top+'_'+sec]||top;}
  if(!TYPES[topType]) topType=top;
  const f=TYPES[topType];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('hlTitleReveal').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥灵之钥</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-quote">「'+f.quote+'」</div><div class="ss-footer">hourlightkey.com ✦ </div></div><div class="hl-title-card"><div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div><div class="hl-title-eyebrow">Hour Light ✦ 道德基礎觉察</div><span class="hl-title-icon">'+f.icon+'</span><div class="hl-title-main">'+f.name+'</div><div class="hl-title-sub">'+f.sub+'</div><div class="hl-title-divider"></div><div class="hl-title-grid"><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 道德人格</div><div class="hl-title-tag-value">'+f.name+'</div></div><div class="hl-title-tag" style="grid-column:1/-1"><div class="hl-title-tag-label">✦ 觉察关键字</div><div class="hl-title-tag-value">'+f.keys.join(' · ')+'</div></div></div><div class="hl-title-quote">「'+f.quote+'」</div><div class="hl-title-combo-hint">'+f.name+'｜'+f.sub+'</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">道德基礎觉察 Moral Foundations</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var pct=Math.round(dimScores[k]/maxPossible*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+DIMS[k]+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">'+f.icon+' 你的道德人格</div><div class="result-section-content">'+f.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度觉察</div><div class="result-section-content">'+f.detail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🌿 认知芳疗配方</div><div class="result-section-content">'+f.oil+'</div></div>'+(f.med?'<div class="result-section"><div class="result-section-title">🧘 随時可做的觉察冒想</div><div class="result-section-content">'+f.med.replace(/\n/g,'<br>')+'</div></div>':'')+'<div class="result-section" style="text-align:center;font-family:LXGW WenKai TC,serif;font-size:1.05rem;color:#8b6914"><div class="result-section-content"></div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ H.O.U.R. 觉察橋接</div><div class="hour-bridge-text">你的道德人格是「你觉得世界应该怎麼运作」，馥灵秘码看的是「你在世界裡怎麼运作」。<br>兩个座标交叉比对，才能看见你的行为跟你的价值观之间有没有落差。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免费解码馥灵秘码 →</a>';
  window._resultText=f.icon+' 我是「'+f.name+'」！'+f.sub+'\n「'+f.quote+'」\n\n你的正义長什麼样子？👉 hourlightkey.com/sc/quiz-moral-foundations.html';
  try{localStorage.setItem('hl_quiz_moral_foundations',JSON.stringify({type:topType,dimScores,ts:Date.now()}));}catch(e){}
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_dropMaterial) HL_dropMaterial('quiz');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz',toolName:'道德基礎檢視'});window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
</script>
