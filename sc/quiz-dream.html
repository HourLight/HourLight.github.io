<script>
var TYPES={
prophet:{name:'预知夢者',icon:'🔮',cl:'#6C5CE7',sub:'夢裡藏著未來的碎片，你的潜意识比理性脑快好幾步',
desc:'你的夢境不只是回放白天的记忆，它們常常带著一種「预感」的味道，像快樂鼠尾草那样朦朧卻精准。你可能夢过某个场景，後來真的发生了；或者夢裡出現的人，隔天就莫名其妙联络你。朋友说你「太玄」，但你知道這不是巧合。Jung 称這为「共時性」，宇宙的巧合不是巧合，是你的潜意识接收到了某些讯号，比你的理性脑早一步解读完畢。你的夢像一台讯号接收器，频率调得比別人灵敏。有些人睡觉是关机，你睡觉是开天线。你最适合在睡前设定一个「想问潜意识的问题」，然後带著這个问题入睡。醒來後记录夢境，那些看似荒謬的画面裡藏著你还没來得及理解的答案。',
dreamType:'你最常做的夢：突然想起一个很久没联络的人，然後他就出現了。夢到某个场景後來成真。在夢裡「知道」某件事会发生，醒來後觉得不安但又很篤定。有時候你会分不清是夢还是预感。',
oil:'🌿 快樂鼠尾草：睡前滴 3 滴在枕头旁扩香，被称为「夢之草」，打开直觉的频道。你的天线本來就灵敏，這支精油帮你调得更准。\n🌿 檀香：冥想時滴在眉心或胸口，深层连結高我。那些夢裡的「知道」，会变得更清晰、更有画面。\n🌿 月桂：早晨嗅吸，预知力的放大器。古希臘的先知都用月桂。帮你把夢裡的讯息带到白天。\n\n为什麼這个配方对你有效？\n快樂鼠尾草裡的乙酸沉香酯会温柔地安撫你的杏仁核（大脑的情緒警报器），让你的边缘系统从「日间防禦模式」切換到「夜间接收模式」。檀香裡的 α-檀香醇能啟动前額葉皮质的深层连結迴路，让潜意识的讯号传得更清晰。月桂裡的桉油醇則在早晨帮你的海马迴「回放」夢境记忆。简单说：這组配方帮你的大脑从「播报新聞」切換到「收看直播」。',
med:'手边没有精油？试试這个：\n\n【预知夢者的讯号接收练習】\n睡前坐在床上，閉上眼睛。\n\n第一步：緩慢深呼吸 5 次（吸 4 秒、停 2 秒、吐 6 秒），每一次吐气時想像自己的身体慢慢变透明，像一面乾淨的接收天线。\n\n第二步：在心裡对潜意识说一句话：「今晚，请让我看见我需要看见的。」不用大声，默念就好。重複 3 次。\n\n第三步：想像你站在一片星空下，每一顆星星都是一个讯号。你不需要去抓任何一顆，只要张开双手，让它們自己來。停留在這个画面裡 60 秒。\n\n第四步：放松躺下，把注意力放在眉心（第三眼的位置），感受那裡微微的温熱。带著這个感觉入睡。\n\n醒來後的前 30 秒，不要动、不要看手机。閉著眼，让夢的碎片像底片一样慢慢显影。记住任何一个画面或感觉，立刻写下來。你的天线已经打开了。',
awareness:'你的觉察练習：在床头放一本「夢境日记」。醒來的前三十秒，不要看手机，先把夢的画面写下來，哪怕只有三个字。一个月後翻回去看，你会发現一个驚人的模式：你的夢比你以为的更准。不是每个夢都是预言，但你的潜意识一直在跟你说话。',
share:'🔮 我是预知夢者！夢裡藏著未來的碎片，朋友说我太玄，但那些「巧合」的命中率高得让我自己都怕。你的夢在告诉你什麼？'},
emotion:{name:'修复夢者',icon:'🎭',cl:'#E17055',sub:'白天压住的情緒，夢裡全都温柔地播出來',
desc:'你的夢是情緒的私人放映室，空气裡瀰漫著羅马洋甘菊那種温暖到让人想哭的味道。白天你可能很会忍、很会装没事、很会「理性处理」，同事问你还好嗎，你说「没事啊」，笑得很职业。但到了晚上，潜意识把所有被压下去的感觉一次播放给你看。所以你的夢常常很濃烈：哭得很慘、怒得很兇、怕得要死、或者开心到不想醒來。你的夢在告诉你：「嘿，這些情緒白天没有被好好感受，它們还在。不是不见了，只是被你塞到枕头底下了。」你的夢不是问题，是出口。是你的身体替你安排的情緒回收日。如果你持續做很激烈的夢，那是潜意识在温柔但坚定地催促你：白天也可以允许自己有感觉。你不用永远坚強。',
dreamType:'你最常做的夢：被追趕（逃不掉的压力）、墜落（失控感）、跟某人激烈爭吵（没说出口的话）、跟已逝的人重逢（未完成的告別）、在夢裡大哭然後醒來枕头是濕的。',
oil:'🌿 羅马洋甘菊：睡前滴 2 滴在枕头上，情緒的溶解液，最温柔的安眠曲。让那些白天装不下的感觉在夢裡被轻轻接住。\n🌿 依兰依兰：泡澡時滴 3 滴，心门慢慢打开。允许自己感受，不用再假装「没事」。\n🌿 薰衣草：持續扩香整夜，安撫过度警觉的神经系统。让夢境从暴风雨变成毛毛雨，柔软但依然真實。\n\n为什麼這个配方对你有效？\n羅马洋甘菊裡的酯类分子（尤其是歐白芷酸异丁酯）直接对你的杏仁核说「收工了，今天辛苦了」，让过度警觉的边缘系统终於可以放松。依兰依兰的沉香醇和乙酸苄酯促进血清素分泌，打开你心裡那扇一直关著的门。薰衣草的乙酸沉香酯則帮前額葉和杏仁核之间搭一条温柔的橋，让情緒流过去而不是堵在胸口。翻译成白话：這组配方让你的身体终於允许自己「有感觉」。',
med:'手边没有精油？试试這个：\n\n【修复夢者的情緒释放练習】\n找一个安静的地方坐下來（床上最好）。\n\n第一步：把双手放在胸口，感受心跳。呼吸 5 次（吸 4 秒、吐 6 秒），每一次吐气時轻轻叹一口气，像在说「呼～」。\n\n第二步：閉上眼，问自己：「今天有什麼感觉是我还没好好感受的？」不急著回答，等 15 秒。\n\n第三步：不管浮現什麼情緒（委屈、疲倦、难过、莫名的紧繃），想像它变成一種颜色。深呼吸 3 次，每次吐气時想像那个颜色从胸口慢慢飄出去，像煙一样散开。\n\n第四步：最後对自己说一句话：「今天的感觉我收到了，谢谢你告诉我。」然後把手从胸口移到肚子上，再做 3 次深呼吸。\n\n躺下來入睡。今晚的夢会温柔很多，因为你已经在醒著的時候接住了自己。',
awareness:'你的觉察练習：下次做了一个情緒很濃的夢，醒來後不要急著「甩掉」它。问自己：「這个情緒，白天有没有被我压下去的版本？」通常会有。那个被压下去的瞬间，就是你的夢想要你回去看的地方。不需要处理，只需要承认：「嗯，我有這个感觉。」光是承认，夢就会变柔软。',
share:'🎭 我是修复夢者！白天压住的情緒，夢裡全都播出來。原來我的潜意识比我誠實太多了。有一次夢裡大哭醒來枕头是濕的，這就是身体替我安排的情緒回收日。你呢？'},
solver:{name:'解謎夢者',icon:'🧩',cl:'#00B894',sub:'你的大脑连睡觉都在加班，夢裡自带解题模式',
desc:'你的夢像一台後台运算的超級电脑，带著迷迭香的清冽。白天解不开的问题、做不了的决定、卡住的企劃案，你的大脑在你以为它「关机」的時候繼續处理。你可能曾经「一觉醒來突然有了灵感」，或者在夢裡直接看到解法，像一个灯泡在黑暗中亮起來。這不是魔法，是你大脑的工作模式，把白天散落的资讯碎片重新排列组合，找到清醒時被「太努力」擋住的连結。你是天生的问题解决者，而你最強的武器不是熬夜加班，是好好睡一觉。愛因斯坦的相对论、Paul McCartney 的 Yesterday、门捷列夫的元素週期表，都是在夢裡浮現的。你是他們的同类。',
dreamType:'你最常做的夢：在夢裡工作（对，连夢都在加班）、突然想通一件卡了很久的事、夢境很有邏輯像在解一道推理题、醒來後有「啊！原來如此」的頓悟感。有時候你甚至会夢到程式码或简报。',
oil:'🌿 迷迭香（CT 桉油醇）：睡前嗅吸，记忆增強、帮你记住夢裡闪过的灵感。不要让那些天才想法随著鬧鐘响消散。\n🌿 薄荷：醒來第一件事嗅吸，清晰思路、把夢裡的解法从模糊拉到高清。\n🌿 檸檬：工作時扩香，资讯整合力提升。你的大脑白天蒐集素材，夜晚组装成品，檸檬帮你兩班都更有效率。\n\n为什麼這个配方对你有效？\n迷迭香裡的 1,8-桉油醇会直接刺激你的海马迴（记忆的总管），让夢裡那些一闪而过的灵感被「存檔」而不是「清除」。薄荷的薄荷醇喚醒前額葉皮质，把模糊的夢境解法拉到高清画质。檸檬的檸檬烯促进多巴胺分泌，让你的大脑在「蒐集资讯」和「重组连結」之间切換得更順暢。白话翻译：你的脑袋本來就是一台解题神机，這组配方帮它装了更大的硬碟和更快的处理器。',
med:'手边没有精油？试试這个：\n\n【解謎夢者的灵感錨定练習】\n睡前坐在书桌前或床边，准備一张白纸和筆。\n\n第一步：把今天卡住的那个问题写在纸上。只写一句话，越简单越好。例如：「這个企劃的核心賣点是什麼？」\n\n第二步：閉上眼，做 6 次方塊呼吸（吸 4 秒、停 4 秒、吐 4 秒、停 4 秒）。每一轮呼吸時，想像你的大脑是一台电脑，正在後台静静地运算。\n\n第三步：睜开眼，在纸上随意写下 5 个跟這个问题完全无关的词。例如：「云朵、螺絲、蓝莓、迴旋、口袋」。不要想，手写就对了。\n\n第四步：把纸放在枕头旁边，告诉自己：「我的大脑今晚会帮我把這些碎片拼起來。」然後躺下睡觉。\n\n醒來的前 3 分鐘，不看手机。拿起筆，写下脑中浮現的第一个念头。很可能就是答案。你的後台运算完成了。',
awareness:'你的觉察练習：睡前对自己说一句话：「如果明天醒來，這个问题有了答案，那个答案会是什麼？」然後不要再想，直接睡。你的大脑会在你睡著的時候繼續跑。醒來的前三分鐘，先不要看手机，把脑海裡浮現的第一个念头记下來。那个念头，很可能就是答案。',
share:'🧩 我是解謎夢者！大脑连睡觉都在加班。最厲害的是我不用付加班费。有一次夢裡直接夢到卡了三天的企劃解法，老闆以为我熬夜想出來的。你的夢在替你做什麼？'},
creative:{name:'冒险夢者',icon:'🎨',cl:'#E58E26',sub:'你的夢是一座超現實美术館，每晚自动換展',
desc:'你的夢境像一部超現實电影，空气裡飄著佛手柑和茉莉交织的奇幻香气。会飞的鯨鱼游过你家客厅、時鐘像达利画的那样融化在桌上、你站在宇宙的边缘往下看然後觉得「嗯不错的景色」。你的潜意识不走正常路线，它喜欢把完全不相关的東西揉在一起，创造出全新的画面。別人的夢是「考试遲到」，你的夢是「騎著一隻透明的马在海底的图书館裡找一本会唱歌的书」。這些看似荒謬的夢境，是创造力最原始的形态。达利的融化時鐘、宮崎駿的龍猫、许多偉大的创作都來自夢境。你不需要「解读」這些夢，你需要「收藏」它們。床头放一本筆记本，醒來立刻速写。你会发現夢裡的灵感比清醒時想出來的更精彩、更大膽、更不设限。',
dreamType:'你最常做的夢：飞翔（而且飞行方式每次不同）、身体变形或有超能力、到了一个不存在但无比华丽的地方、夢境色彩鮮豔到像开了濾镜、出現現實中不可能存在的生物或建筑。',
oil:'🌿 佛手柑：睡前扩香 3 滴，想像力的水龍头转到最大。让你的夢更自由、更不设限、更敢亂來。\n🌿 天竺葵：泡澡時滴 2 滴，创意的平衡，在超現實和現實之间找到那个甜蜜的交界点。\n🌿 广藿香：醒來後嗅吸，把夢境的灵感錨定到現實。不要只是做夢，把最好的部分带回來用。\n\n为什麼這个配方对你有效？\n佛手柑的檸檬烯和乙酸沉香酯联手，一边让前額葉放下「這不合理」的框架，一边让边缘系统自由奔跑。天竺葵的香葉醇和香茅醇平衡左右脑的活躍度，让你的创意不至於飞太远收不回來。广藿香的广藿香醇直接作用在基底核，像一枚錨釘把天马行空的灵感釘在現實的木板上。翻译成人话：佛手柑帮你做最瘋的夢，天竺葵帮你记住最美的画面，广藿香帮你把画面变成作品。',
med:'手边没有精油？试试這个：\n\n【冒险夢者的创意漫游练習】\n躺在床上，关灯之後先不急著睡。\n\n第一步：閉上眼，做 4 次長呼吸（吸 5 秒、吐 7 秒）。每次吐气時，想像你的身体正在慢慢融化成一攤温暖的液体，流进枕头裡。\n\n第二步：想像你站在一扇巨大的彩色门前面。门上画著你从没见过的图案。用 30 秒仔细「看」那些图案，不要嘗试认出它們是什麼，让它們自己说话。\n\n第三步：在心裡推开门。门後面是什麼？不要想，让第一个画面自己跳出來。不管是海底城堡、会飞的图书館还是紫色的沙漠，都接受它。在那个场景裡「走」60 秒。\n\n第四步：找到场景裡一个你想带回來的東西（一朵花、一顆石头、一个声音都可以）。把它握在手心，然後放松入睡。\n\n明天醒來，花 2 分鐘用三个关键字记下夢裡的画面。你的私人美术館又多了一幅新展品。',
awareness:'你的觉察练習：醒來後不要急著清醒。在半夢半醒的狀态裡停留三分鐘，用速写或幾个关键字把夢境的画面记下來。不需要完整，不需要合理，碎片就好。一个月後翻回去看，你会发現你的夢给你的素材，比 Pinterest 还丰富。你的潜意识是你最好的创意总监。',
share:'🎨 我是冒险夢者！昨晚夢到騎著透明的马在海底图书館找一本会唱歌的书。別人的夢是考试遲到，我的夢是自带特效。你的夢境美术館展什麼？'},
memory:{name:'重播夢者',icon:'📚',cl:'#636E72',sub:'你的夢在帮你整理记忆，每一段过去都有意义',
desc:'你的夢境像一台记忆的老式投影机，带著雪松和乳香那種温暖的木质调。你常常夢到「以前的事」，小時候的学校走廊、搬过的那间老房子、很久没见的国中同学的脸。這不是沉溺过去，是你的大脑在做非常重要的工作：记忆归檔。神经科学研究发現，睡眠中的大脑会重新播放白天（和过去）的记忆，决定哪些存入長期记忆、哪些可以放手。你的夢之所以常常出現过去的场景，是因为你的大脑正在把新的经验跟旧的记忆串在一起，编织成你這个人的故事。你在用过去理解現在。你是一个很重視经验的人，你相信「走过的路都不会白费」，你的成長來自回顾，你的智慧來自那些反覆咀嚼的记忆。',
dreamType:'你最常做的夢：回到学校（教室、走廊、操场）、见到小時候的朋友或家人、重访某个去过的城市或房间、重複某个人生转折点的场景。有時候夢裡的记忆比真實的还清晰。',
oil:'🌿 乳香：睡前滴 2 滴在掌心嗅吸，時间穿越者的通行证。跨越记忆的長廊，让那些画面带著温度回來。\n🌿 雪松：扩香整夜，根基稳固的木质香安定你在过去与現在之间的擺盪。你不需要住在过去，只需要带著过去的礼物走到現在。\n🌿 甜橙：醒來後嗅吸，温暖记忆的色调。让回顾带著感恩而不是遺憾，带著微笑而不是叹息。\n\n为什麼這个配方对你有效？\n乳香裡的乳香酸和倍半萜烯能穿透血脑屏障，直接跟你的海马迴（记忆銀行的总经理）对话，让旧记忆带著更完整的情緒标籤浮上來。雪松的雪松烯作用在边缘系统的「稳定器」，让你回忆过去的時候脚还踩在現在。甜橙的檸檬烯促进多巴胺释放，把记忆的色温从冷蓝调调成暖黃调。白话翻译：乳香帮你开门回去看，雪松确保你不会迷路，甜橙让你带著微笑回來。',
med:'手边没有精油？试试這个：\n\n【重播夢者的记忆温泉练習】\n睡前找一个安静的姿势，坐著或躺著都可以。\n\n第一步：閉上眼，做 5 次腹式呼吸（吸气 4 秒让肚子鼓起來、吐气 6 秒让肚子凹下去）。每次吐气時想像自己慢慢沉进一池温暖的水裡。\n\n第二步：在心裡轻声问自己：「有没有一段记忆，現在想起來会让我微笑的？」等 10 秒，让画面自己浮上來。\n\n第三步：找到那个画面後，用 60 秒慢慢「放大」它的细节。那天的光线是什麼样的？空气裡有什麼味道？谁在你身边？他們的表情是什麼？让五感的记忆一层一层回來。\n\n第四步：把双手放在肚子上，对那段记忆说：「谢谢你，你教会了我一些重要的事。」深呼吸 3 次。\n\n然後放松入睡。今晚的夢会带你回到你需要回去的地方，而且带著比往常更温暖的色调。',
awareness:'你的觉察练習：下次夢到过去的场景，醒來後问自己：「這段记忆出現在現在，是因为它跟我最近的什麼经历有连結？」你的大脑不会无缘无故播放旧片段，它在暗示你，过去的某个经验裡，有你現在需要的答案。那个连結找到了，你就找到了你的夢想说的话。',
share:'📚 我是重播夢者！夢裡在帮记忆归檔，每一段过去都有意义。昨晚又夢到国小的走廊了，原來我的大脑比我还念旧。你的夢带你回到哪裡？'},
traveler:{name:'清醒夢者',icon:'✨',cl:'#0C2461',sub:'你的夢是另一个維度的旅行，每晚閉眼就出发',
desc:'你的夢境有一種「去了另一个地方」的真實感，带著檀香和乳香那種超越時空的深邃。你可能会夢到从未去过的城市，但街道的细节清晰到不可思议，转角有一棵什麼樹、墙壁是什麼颜色、空气是什麼味道。你在夢裡遇到的人，不像是自己想像出來的，他們有自己的表情、自己的话要说。你醒來後会有一種很深的感觉，像是真的经历了一场旅行，身体还带著那个空间的温度。Jung 把這类夢叫做「大夢」（Big Dreams），它們攜带的不是个人的焦慮，而是更大的、集体潜意识层面的讯息。你是少數能在夢中触及深层意识的人。有些人一輩子做一兩次大夢，你可能每个月都在旅行。你的夢不只是为了你自己，它們带著某種超越个人的洞见。',
dreamType:'你最常做的夢：在夢中「知道自己在做夢」（清明夢）、到了一个不存在但感觉比現實还真實的地方、遇到不认识但感觉极其重要的人、夢裡有某種「教导」或「啟示」。你的夢有時候带著一種莊嚴感。',
oil:'🌿 檀香：睡前塗在眉心或脈搏处，灵性的橋樑。连結那个在夢裡等你的深层意识。你的旅行需要一张安全的通行证。\n🌿 乳香：扩香整夜，神圣空间的守护者。为灵魂旅行打开一扇安全的门，也确保你能完整地回來。\n🌿 快樂鼠尾草：睡前嗅吸 3 次深呼吸，夢境深化，让你在夢裡走得更远、看得更清楚、记得更完整。\n\n为什麼這个配方对你有效？\n檀香的 α-檀香醇能穿过血脑屏障，直达松果体和丘脑，像帮你的意识装上一台高倍望远镜。乳香的乳香酸安撫杏仁核的恐懼反应，让你的大脑在深层意识旅行時保持「安全感」而不是「警戒狀态」。快樂鼠尾草的乙酸沉香酯則让边缘系统进入一種「清醒但放松」的狀态，這正是清明夢（知道自己在做夢）最需要的脑波频率。简单说：檀香帮你走得更深，乳香帮你走得更安全，鼠尾草帮你记得回來的路。',
med:'手边没有精油？试试這个：\n\n【清醒夢者的意识旅行练習】\n睡前坐在床上，找到一个舒服的姿势。\n\n第一步：閉上眼，做 7 次非常緩慢的呼吸（吸 5 秒、吐 8 秒）。每一次吐气時，想像你的身体像一层薄紗一样变得越來越轻、越來越透明。\n\n第二步：把注意力集中在眉心。想像那裡有一扇小小的门，门的另一边透出微微的光。不急著开门，先感受门後面传來的温度。停留 30 秒。\n\n第三步：在心裡默念 3 次：「今晚我会清醒地旅行，我会记得我去过的地方。」\n\n第四步：想像你慢慢穿过那扇门，來到一个空曠的平台。四面八方都是星空。你可以选擇往任何方向走。不要选，让你的脚自己带你去。在這个画面裡停留 90 秒。\n\n第五步：躺下來，把注意力从眉心移到全身，感觉自己像一片葉子飄落在水面上。带著這个轻盈的感觉入睡。\n\n醒來後先不动。花 60 秒回想：你去了哪裡？那裡的空气是什麼温度？你遇到了谁？把「感觉」而不只是「画面」记下來。',
awareness:'你的觉察练習：睡前用一个简单的仪式告诉自己：「今晚我会清醒地旅行。」然後放松入睡。醒來後立刻记录，不只是记夢的「內容」，更要记夢的「感觉」：你在那个空间裡是什麼感受？那个感受，就是你的夢要带给你的讯息。內容可能是象徵，但感受永远是真的。',
share:'✨ 我是清醒夢者！夢是另一个維度的旅行，每晚閉上眼就出发。有一次夢到一个从没去过的城市，连街角那棵樹的形狀都记得。你的夢带你去哪？'}
};
