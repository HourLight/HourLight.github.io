  fight:{name:'战鬥模式',icon:'🥊',sub:'越压越拼，直到燒完为止',
    desc:'你是那个 deadline 前兩小時效率最高的人。压力对你來说是咖啡因，劑量越大你越清醒。但你有没有注意到，你已经不记得上一次「不用拼」的日子是什麼時候了？',
    detail:'战鬥模式的人看起來很強。你不会倒、不会哭、不会喊累。你的同事和朋友都以为你是鐵人。\n\n但鐵人也会鏽。\n\n你的身体不是为了「永远冲刺」设计的。战鬥反应（fight response）是你的交感神经在面对威脅時的紧急模式，本來应该是短暫的。但你把它变成了日常。皮质醇一直在高位、腎上腺一直在透支、肌肉一直在紧繃。\n\n你是不是发現自己连休假都在做事？是不是停下來就焦慮、没事做就不安？那不是你勤勞，是你的神经系统已经忘记「安全」是什麼感觉了。\n\n你最大的恐懼不是压力本身，是「不够努力」。因为某个時候你学到了：只要我够努力，就不会被拋棄/否定/看不起。所以你停不下來。\n\n试一次：今天设定一个「下班鬧鐘」。鬧鐘响了就停。不管做完没有。世界不会因为你停下來而崩塌。',
    oil:'薰衣草 × 羅马洋甘菊 × 雪松',
    oilDetail:'薰衣草的沉香醇和乙酸沉香酯直接按下交感神经的「停止」键，降低你的皮质醇水准。羅马洋甘菊的酯类分子安撫过度激发的杏仁核，让你的身体记住「不用一直战鬥」。雪松的倍半萜烯稳定腎上腺的透支狀态，像一个温柔的教练告诉你「今天练够了」。\n\n调配建议：基底油 10ml＋薰衣草 3 滴＋羅马洋甘菊 1 滴＋雪松 1 滴。睡前塗抹脚底或太阳穴。',
    med:'「卸甲呼吸法」\n\n你已经打了一整天的仗了。現在允许自己卸甲。\n\n1. 站直。肩膀用力聳起來，越高越好。憋住 5 秒\n2. 吐气的時候突然放掉。让肩膀自由落下\n3. 吸气 4 秒：把双手高举过头，握拳\n4. 吐气 6 秒：双手放下，拳头打开，手指张到最开\n5. 自然呼吸 5 秒：感觉那个「松」的感觉，停在那裡\n\n做 4 轮。\n\n最後一轮結束後对自己说：「今天的仗打完了。我可以休息了。」\n\n你的身体需要一个明确的「結束」信号。這个练習就是那个信号。',
    closing:'你的战鬥力是真的很強。但战士也需要回营地。不是因为你弱了，是因为你值得好好休息。明天的仗，睡飽了再打。'},
  flight:{name:'逃跑模式',icon:'🏃',sub:'压力來了你就想找出口',
    desc:'你处理压力的方式是：离开。不一定是物理上的离开，可能是打开Netflix、瘋狂滑手机、突然很想去旅行。你的神经系统需要一个「不在压力裡」的空间，才能重新整頓。',
    detail:'逃跑模式的人不是懦弱，是你的神经系统判断「這个威脅太大了，留下來不安全」。\n\n你的逃跑可能有很多種形式：追劇到凌晨三点、週末瘋狂排行程让自己忙到没空想、拼命规劃下一次旅行、或者在最压力的時候突然很想換工作/搬家/剪头髮。\n\n這些「逃跑」其實是你在找安全感。因为你的安全感不在当下，所以你要去別的地方找。\n\n问题是：你每次逃到新的地方，压力还是在那裡等你。因为压力的來源不在外面，在你跟压力的「关係」裡。\n\n更深一层：你可能很小的時候就学会了「离开是安全的」。也许家裡常吵架，你躲进房间就没事了。那个策略救了童年的你。但現在你已经不是那个躲房间的小孩了。\n\n试一次：下次压力來的時候，不要移动。留在原地，告诉自己「我在這裡是安全的」。只要 60 秒。看看会怎样。',
    oil:'岩兰草 × 檀香 × 甜橙',
    oilDetail:'岩兰草的岩兰草醇是最強的「接地」分子，把你从「想逃」的浮动狀态拉回当下。檀香的 α-檀香醇稳定前額葉的不安感，让你知道「留在這裡不会怎样」。甜橙的檸檬烯在边缘系统裡製造安全感，让当下变成一个可以待的地方。\n\n调配建议：基底油 10ml＋岩兰草 1 滴＋檀香 2 滴＋甜橙 2 滴。岩兰草味道濃，1 滴就够。',
    med:'「紮根 60 秒」\n\n你現在在哪裡就在哪裡做。不用移动。\n\n1. 感觉你的脚。踩在地上。地板是硬的、稳的、不会动的\n2. 吸气 4 秒：把注意力从脚底往上带，经过小腿、膝盖、大腿、屁股坐在椅子上的压力\n3. 吐气 6 秒：对自己说「我在這裡。這裡是安全的」\n4. 吸气 4 秒：用眼睛找到三个你看得到的東西（桌子、杯子、窗戶）\n5. 吐气 6 秒：「我不需要去別的地方。我在這裡就好」\n\n做 4 轮。\n\n你不用每次都跑。留下來，你会发現這裡也有氧气。',
    closing:'你的敏銳让你很快察觉威脅，這是一種天賦。但不是每个压力都需要你逃开。有些压力，你站在那裡面对，它自己会先退。'},
  freeze:{name:'凍結模式',icon:'🧊',sub:'你知道该动但就是动不了',
    desc:'压力來的時候你不战也不逃，你当机。像手机跑太多APP一样，整个人卡住了。你在乎到连反应的力气都没有了。',
    detail:'凍結模式是压力反应裡最容易被误解的一種。別人看你什麼都不做，以为你在擺爛。但你的身体裡正在经历一场风暴。\n\n凍結反应（freeze response）是你的神经系统判断「打不过也逃不掉」之後的最後一道防线：装死。你的背側迷走神经啟动了，心率下降、呼吸变淺、意识开始模糊。你人在那裡，但你不在那裡。\n\n你是不是常常在压力最大的時候反而什麼都做不了？然後事後自責「我到底在幹什麼」？這是你的身体在保护你，用它唯一知道的方式。只是這个保护方式在現代社会不太管用。\n\n你需要的不是「振作起來」（说這句话的人根本不懂凍結），你需要的是一点点温度，把你从凍結狀态慢慢解凍。\n\n试一次：下次发現自己卡住了，做一个很小很小的动作。动一根手指。踮一下脚尖。只要身体动了，神经系统就会开始重新上线。',
    oil:'薑 × 甜橙 × 肉桂',
    oilDetail:'薑的薑烯和薑酮带來温熱感，像在你凍結的神经系统裡生一堆小火。不是要你马上动起來，是先让你的身体「感觉到自己还在」。甜橙的檸檬烯喚醒边缘系统的活力，一点一点地。肉桂的肉桂醛刺激血液循环，把氧气重新送到你的大脑和四肢。\n\n调配建议：基底油 10ml＋薑 2 滴＋甜橙 2 滴＋肉桂 1 滴。肉桂皮膚刺激性較強，敏感肌减量。',
    med:'「解凍练習」\n\n你現在可能正在凍結的狀态裡。没关係。我們慢慢來。\n\n1. 感觉你的双手。搓一搓。搓到有一点温度\n2. 吸气 4 秒：把搓熱的手放在你的脸頰上。感受那个温度\n3. 吐气 6 秒：对自己说「我还在。我的身体还在」\n4. 动动脚趾头。感觉每一根脚趾都存在\n5. 吸气 4 秒：站起來（如果可以的话）。感觉重力把你的脚压在地板上\n6. 吐气 6 秒：跺一下脚。让地板知道你在\n\n做 3 轮。\n\n你不需要马上动起來。你只需要先「在」這裡。',
    closing:'你的凍結不是软弱。是你的身体在用它唯一知道的方式保护你。但你已经安全了。可以慢慢解凍了。一根手指一根手指地。'},
  fawn:{name:'討好模式',icon:'🫠',sub:'你压力大的時候先照顾別人',
    desc:'你压力爆表的時候，不是忙自己的事，是忙著确认身边的人都OK。你的压力反应不是打或逃，是先让別人舒服。然後你自己呢？你把自己排在待办事項的最後一格，而那一格永远不会轮到。',
    detail:'討好模式（fawn response）是心理学裡相对新发現的第四種压力反应。你的神经系统判断「這个威脅太大了，打不过也逃不了，唯一安全的方式就是让对方开心」。\n\n你可能很小的時候就学会了：当家裡的空气变冷、大人脸色不好的時候，只要你乖乖的、聽话的、不添麻烦、甚至主动去安撫他們，你就安全了。\n\n於是你長大後，压力來的時候你的第一反应不是处理压力，是「別人还好嗎？」你加班到半夜还在担心同事的情緒。你自己快撐不住了还在问別人「你需要帮忙嗎？」\n\n你的神经系统告诉你：照顾別人 = 安全。照顾自己 = 自私 = 危险。\n\n试一次：下次有人问你「需要帮忙嗎？」，试著说「需要」。不加条件，不加「其實还好」。就一个字：需要。',
    oil:'玫瑰 × 乳香 × 雪松',
    oilDetail:'玫瑰的香茅醇和苯乙醇直接撫慰边缘系统裡那个「別人比我重要」的旧迴路，让你的身体记住「我也可以被照顾」。乳香的乳香酸降低杏仁核的「如果我不照顾別人就会出事」的警报。雪松的倍半萜烯在你跟別人之间建一个温柔的屏障，让你的善良有边界。\n\n调配建议：基底油 10ml＋玫瑰 1 滴＋乳香 2 滴＋雪松 2 滴。',
    med:'「先照顾我自己」冥想\n\n找一个只有你自己的空间。手机静音。\n\n1. 吸气 4 秒：想像你的身边有一圈温暖的光。那个光圈裡只有你。没有任何人需要你照顾\n2. 吐气 6 秒：把双手放在心口。对自己说「這一分鐘，我只照顾我自己」\n3. 吸气 4 秒：问自己「我現在需要什麼？」不是別人需要什麼。是我需要什麼\n4. 吐气 6 秒：不管答案是什麼，对自己说「你值得被照顾。尤其被你自己」\n\n做 5 轮。\n\n飞机上的安全须知说得对：先帮自己戴好氧气面罩。不是自私，是你窒息了就帮不了任何人。',
    closing:'你的善良是真正的力量。但善良如果没有方向，就变成了消耗。记得把你的善良也分一点给自己。你值得的。'},
  crash:{name:'崩潰重啟型',icon:'💥',sub:'你撐到最後一秒才倒',
    desc:'战鬥、逃跑、凍結都不是你的模式。你是一直撐、一直撐、一直撐，直到某一天因为一件很小的事（比如外送送错餐）突然崩潰了。然後你擦乾眼淚，重啟，繼續撐。',
    detail:'崩潰重啟型的人在別人眼裡通常很稳定。你不会在压力來的当下表現出來，你会自己消化。一天、兩天、一个月、三个月，你像一个不断吸水的海綿。\n\n问题是海綿的容量有极限。\n\n你的崩潰通常來得毫无预警。突然对老公发了一頓脾气、突然在車裡哭了出來、突然整个人癱在床上动不了。而触发的那件事通常很小，小到你自己都觉得莫名其妙。\n\n但那不是因为那件小事。那是前面一百件你都没有好好处理的压力，在那一刻同時爆发。你的崩潰不是你脆弱，是你太坚強太久了。\n\n你最需要的不是「再撐一下」，是在还没到崩潰点之前就开始释放。小小的、持續的、不用等到爆炸才处理。\n\n试一次：今天做一件很小的事让自己舒服。泡个脚、吃一塊巧克力、走到外面深呼吸三次。不要等到崩了才想到自己。',
    oil:'薰衣草 × 檀香 × 玫瑰',
    oilDetail:'薰衣草的沉香醇和乙酸沉香酯安撫你長期过度激发的边缘系统，像温柔地拍一拍那个一直在硬撐的你。檀香的 α-檀香醇帮助你的前額葉在崩潰之前多一个「暫停」的选項。玫瑰的苯乙醇直达边缘系统最柔软的角落，让你的身体知道「不用撐到极限才配休息」。\n\n调配建议：基底油 10ml＋薰衣草 2 滴＋檀香 2 滴＋玫瑰 1 滴。',

let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const optsHTML='<div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]===o.a?' selected':'')+'" onclick="selectOpt('+i+',\''+o.a+'\',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 题 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一题</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一题 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看我的压力模式 🌪️</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,a,btn){answers[qi]=a;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 题，共 '+questions.length+' 题';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const scores={};Object.keys(TYPES).forEach(k=>{scores[k]=0;});
  Object.values(answers).forEach(a=>{scores[a]=(scores[a]||0)+1;});
  const sorted=Object.keys(TYPES).sort((a,b)=>scores[b]-scores[a]);
  const topType=sorted[0],f=TYPES[topType],f2=TYPES[sorted[1]];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('screenshotCard').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥灵之钥</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-tags"><span class="ss-tag">压力反应模式</span><span class="ss-tag">'+f.name+'</span></div><div class="ss-quote">「'+f.closing+'」</div><div class="ss-footer">hourlightkey.com ✦ 读懂自己，活对人生</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">压力反应模式 Stress Response</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var tp=TYPES[k],pct=Math.round(scores[k]/questions.length*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+tp.icon+' '+tp.name+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">🌪️ 你的压力模式</div><div class="result-section-content">'+f.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度解析</div><div class="result-section-content">'+f.detail.replace(/\n/g,'<br>')+'</div></div>'+(f2?'<div class="result-section"><div class="result-section-title">'+f2.icon+' 副型：'+f2.name+'（'+f2.sub+'）</div><div class="result-section-content">'+f2.desc+'</div></div>':'')+'<div class="result-section"><div class="result-section-title">🌿 认知芳疗建议：'+f.oil+'</div><div class="result-section-content">'+f.oilDetail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🧘 冥想练習（60-90秒）</div><div class="result-section-content">'+f.med.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">✦ 馥灵收束语</div><div class="result-section-content" style="font-family:LXGW WenKai TC,serif;font-size:1rem;line-height:1.9">'+f.closing+'</div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ 馥灵之钥 × 你的觉察密码</div><div class="hour-bridge-text" style="margin-bottom:8px">你的压力反应不是性格缺陷，是你的神经系统学会的生存策略。看见它，你才能从「被压力控制」变成「跟压力合作」。</div><div style="font-size:.85rem;color:#9e8a70;line-height:1.8;margin-bottom:16px">馥灵秘码可以揭示你天生的情緒调节设定，跟今天的压力模式交叉比对会有意想不到的发現。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免费解码馥灵秘码 →</a>';
  try{localStorage.setItem('hl_quiz_stress_resp',JSON.stringify({type:topType,scores,ts:Date.now()}));}catch(e){}
  window._resultText=f.icon+' 我的压力模式是「'+f.name+'」：'+f.sub+'。'+f.desc.substring(0,60)+'⋯ 你压力大变什麼样？ 👉 hourlightkey.com/sc/quiz-stress-response.html #馥灵之钥 #压力反应';
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz-stress-response',toolName:'压力反应模式'});window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
