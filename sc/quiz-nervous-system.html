  ventral:{name:'安全连結型',icon:'🌿',sub:'你的身体记得什麼是安全的感觉',
    keys:['自我调节','社交连結','情緒稳定'],
    desc:'你的自律神经系统大部分時间处在腹側迷走神经主导的狀态。這意味著你的身体觉得這个世界是安全的，你可以跟人连結、可以放松、可以专注做事。你不是没有压力，但你的身体知道怎麼从压力裡回來。被嚇到之後，你的心跳很快就能恢复。被人惹到之後，你能感受到情緒但不会被淹没。你的神经系统有一个稳定的「家」可以回去。',
    detail:'腹側迷走神经是人类最晚演化出來的神经通路，它跟社交、表情、声音辨识直接相关。当這条路暢通的時候，你的脸部表情自然、声音有温度、眼神能跟人接触。你能接收到別人的善意，也能适度表达自己的需要。\n\n這不代表你永远在這个狀态。压力大的時候你也会被推到交感神经或背側迷走神经的地方去。但你有一个很重要的能力：「回來」。你知道怎麼让自己回到安全感裡，不管是深呼吸、跟人说话、去运动、或者只是提醒自己「我現在是安全的」。\n\n觉察邀请：你的這份稳定是珍貴的。但留意一件事，有没有時候你把「我很好」当成不允许自己不好？稳定不是压抑。偶爾让自己崩潰一下，也是一種安全。',

    keys:['高度警觉','反应快速','容易疲累'],
    desc:'你的自律神经系统大部分時间处在交感神经亢奮的狀态。你的身体觉得随時可能有危险，所以一直保持著「准備好了」的姿态。心跳快一点、肌肉紧一点、脑袋转快一点、睡眠淺一点。你可能做事效率很高、反应很快、什麼风吹草动都瞞不过你。但你同時也很累。因为你的身体消耗的能量，远超过环境真正需要的。',
    detail:'交感神经系统是演化送给我們的生存礼物。面对老虎的時候，它让你瞬间跑得比平常快三倍。但问题是，你的身体分不清老虎跟主管的语气、分不清生命危险跟社交尷尬。它只知道「有威脅」，然後全力啟动。\n\n長期处在這个狀态会怎样？你的身体会开始出現「过度使用」的症狀。肩颈僵硬是因为肌肉一直在備战。磨牙是因为下巴在睡觉的時候还在「咬紧」。胃痛是因为血液都跑去四肢了，消化系统分不到资源。头痛是因为大脑一直在高速运转。\n\n觉察邀请：你的警觉是有原因的。某个時候你的身体学会了「放松是危险的」，所以它选擇永远不放松。現在你可以慢慢告诉它：「那个時候已经过去了。」不是用脑袋告诉它，是用身体告诉它。',
    oil:'薰衣草 3 滴＋岩兰草 2 滴＋羅马洋甘菊 1 滴，在睡前扩香或稀释後擦在脚底。薰衣草直接作用在副交感神经，帮你踩煞車。岩兰草是最強的「落地」精油，把你的能量从脑袋拉回地面。羅马洋甘菊安撫你的內在小孩，那个一直觉得不安全的部分。',

    keys:['情感麻木','慢性疲勞','断线感'],
    desc:'你的自律神经系统大部分時间处在背側迷走神经主导的狀态。這是最古老的生存策略，当交感神经的「战或逃」都行不通的時候，身体会啟动最後一道防线：关机。你可能经常觉得累、觉得空、觉得跟世界之间隔著一层東西。不是不想动，是身体不让你动。不是不想感受，是感觉的通道暫時关閉了。',
    detail:'背側迷走神经的「凍結」反应在动物界很常见。装死的負鼠就是這个机制。当威脅太大、打不过也跑不掉的時候，身体会选擇「把自己关掉」來减少痛苦。在人类身上，這不一定是面对物理危险，長期的情緒压力、被忽視、无力改变的困境，都可能让身体选擇這条路。\n\n处在這个狀态的你可能会觉得自己很「废」。但這不是懶，這是你的身体在保护你。它用尽了所有办法，最後选擇了最省能量的一个。手脚冰冷是因为血液回缩。慢性疲勞是因为代谢降到最低。情感麻木是因为大脑关閉了感觉的通道。\n\n觉察邀请：你要做的不是「振作起來」，不是用意志力把自己从這裡拔出來。你要做的是非常非常小的事情。动一根手指头。喝一口温水。感觉嘴唇碰到杯缘的触感。让身体知道：「你还在這裡。你还活著。你还连著。」',

    med:'躺在床上或沙发上。不用坐起來。把一隻手放在肚子上。吸气四秒，感觉肚子在手掌底下微微鼓起來。如果感觉不到也没关係，就想像。吐气六秒。动一动脚趾头。感觉它們在动。吸气四秒，动一动手指头。吐气六秒。对自己说：「我还在這裡。」重複四次。不用起來。就這样就好。',
    quote:'关机不是你的错。是你的身体替你做了一个很勇敢的决定。現在，一点一点重新开机就好。'},
  ventral_sympathetic:{name:'过度負責型',icon:'🔥',sub:'你看起來很稳，但身体一直在高速运转',

    desc:'你的神经系统在腹側迷走和交感神经之间快速切換。对外看起來是稳定的、可靠的、什麼都能处理的人。但裡面一直在燒。你用「我來」「我处理」「没事我可以」把焦慮包装成負責任，別人看到的是你的能力，看不到的是你的消耗。晚上回到家可能直接癱在沙发上，因为白天的「稳定」已经把你的能量全部用完了。',
    detail:'這種模式很常见在長女、長子、或是从小就需要「当大人」的人身上。你的腹側迷走神经学会了一件事：「只要我保持冷静，大家就安全。」但问题是你把別人的安全当成自己的責任了。你的交感神经一直在运转但被你的社交面具压住，所以別人看不出來你在紧张。\n\n長期下來，你的身体会用很隐蔽的方式告诉你它撐不住了。磨牙、淺眠、假日一放松就生病、肩颈痠到推拿都推不开。這些都是你的身体在说：「拜託，让我歇一下。」\n\n觉察邀请：练習说一次「這个我没办法」。不是因为真的没办法，是让你的身体体验一次「不負責也不会天塌下來」的感觉。你的稳定很珍貴，但稳定不是没有极限。',
    oil:'天竺葵 2 滴＋薰衣草 2 滴＋佛手柑 1 滴，在一个人的時候扩香。天竺葵帮你把「给出去」和「收回來」调到平衡。薰衣草让你的副交感神经接手。佛手柑降低你的責任焦慮。這是属於你自己的配方，不用分给別人。',
    med:'坐下來。把双手放在大腿上，掌心朝上。吸气四秒，想像你正在扛著什麼東西。吐气六秒，想像慢慢把它放在地上。重複四次，每次放下一样東西。吸气四秒，看著空了的双手。吐气六秒。对自己说：「今天够了。」不加「但是」。张开眼睛。',

    desc:'你的神经系统在交感神经和背側迷走之间劇烈擺盪。一下子焦慮到想冲出去做点什麼，一下子又整个人癱掉什麼都不想动。或者更常见的是：兩个同時发生。脑袋在焦慮但身体动不了。想要行动但全身像灌了鉛。這種冲突感让你觉得自己快瘋了，因为你同時收到「快跑」和「別动」兩个矛盾的指令。',
    detail:'這種模式在心理学裡对应的是「功能性凍結」。你的身体同時啟动了加速和减速系统，結果就是卡住。這不是你意志力不够，是你的神经系统过载了，它不知道该冲还是该停，所以兩个都做。\n\n你可能有过這样的经验：明明有一堆事情要做，焦慮得不得了，但就是坐在那裡滑手机，一滑就是兩小時。那不是拖延，那是你的背側迷走在保护你，因为交感神经的焦慮已经超过你能承受的閾值了。\n\n觉察邀请：你需要的不是「动力」，是先把其中一个系统安撫下來。通常先处理交感神经（焦慮）比較有效。当焦慮降下來了，背側迷走的凍結才有空间松开。',
    oil:'岩兰草 2 滴＋薰衣草 2 滴＋甜橙 1 滴，在感觉卡住的時候扩香。岩兰草先把你从天花板上拉回地面。薰衣草让交感神经那边安静下來。甜橙在凍結稍微松动的時候给你一点温暖的动力，不是催你，是陪你。',
    med:'如果你能站起來就站著。如果站不起來就坐著。双脚踩稳。吸气四秒，用力握拳。吐气六秒，慢慢松开。重複四次。這个「握紧再放开」是在告诉你的神经系统：「你可以动。你可以停。你可以选擇。」最後一次握拳的時候，对自己说：「我不需要同時冲跟停。一次做一件事就好。」张开眼睛。',
    quote:'你没有当机。你是同時收到了兩个矛盾的指令。慢慢來，一次处理一个。'},
  ventral_dorsal:{name:'表面开朗型',icon:'🎭',sub:'你笑著跟人聊天的時候，身体裡面其實是空的',
    keys:['社交面具','內在断联','耗能演出'],
    desc:'你的腹側迷走神经在社交的時候会啟动，你能笑、能聊、能表現得很正常。但那个连結不是真的。你的背側迷走在底下等著。聚会結束、回到家、门关上的那一刻，你会突然感觉到一股巨大的空洞。不是累，是断线。你在外面连著全世界，在裡面卻连自己都连不上。',
    detail:'這種模式很难被发現，因为你的「社交功能」运作得太好了。你知道该说什麼、该笑什麼、该在什麼時候点头。但這些都是「表层腹側」的运作，你的身体在社交场合啟动的不是真正的安全连結，是一種学習來的「表演连結」。\n\n回到一个人的時候，「表演」結束了，底下的背側迷走就接管了。你会突然觉得空、觉得没意义、觉得连起來做一頓飯的力气都没有。朋友很多但觉得孤独，被人包圍但觉得没有人真正认识你。\n\n觉察邀请：试著在安全的人面前「不表演」一次。不是要你表現脆弱，是让你的身体体验一次：「不笑也可以、不聊也可以、安静地待著也有人愿意留在旁边。」那一刻，腹側迷走才会从表层降到深层。',
    oil:'玫瑰 1 滴＋檀香 2 滴＋佛手柑 2 滴，在独处的時候扩香。玫瑰不是让你对別人打开，是让你对自己打开。檀香把你的觉察从脑袋带回身体。佛手柑在空洞感浮上來的時候，给你一点温暖。這是你跟自己重新连线的气味。',
    med:'找一个安全的空间。坐下或躺下。閉上眼睛。不用微笑。让脸上的表情完全放掉。吸气四秒，感觉脸頰放松。吐气六秒，感觉眉头松开。你的表情不需要为谁存在。吸气四秒，把手放在胸口。吐气六秒。对自己说：「不笑也是安全的。」重複四次。张开眼睛。',
    quote:'你在人群裡很亮，但回到家的那个关机，你值得被看见。'},
  sympathetic_ventral:{name:'高功能焦慮型',icon:'🏃',sub:'你把焦慮转化成了生产力，但油箱快见底了',
    keys:['高效率','停不下來','休息有罪惡感'],
    desc:'你的交感神经一直在线，但你学会了用腹側迷走的社交功能把焦慮「包装」成正向的样子。你很忙、很有效率、待办清单永远在清。別人觉得你很厲害，但你知道自己停不下來不是因为熱愛工作，是因为停下來就会被焦慮淹没。忙碌是你的止痛藥。',
    detail:'高功能焦慮在外面看起來跟「优秀」很像。你的绩效好、社交好、什麼都处理得好。但驅动這一切的引擎不是熱情，是恐懼。你怕的是「如果我没有在做事，我就没有价值」。所以你的身体一直保持在高转速。\n\n休息对你來说不是放松，是另一種压力。躺下來的時候焦慮反而更嚴重，因为没有事情可以擋住那些你不想面对的念头。所以你宁可繼續做事。假日比上班日更累，因为你不知道不工作的自己要做什麼。\n\n觉察邀请：今天给自己十五分鐘什麼都不做。不滑手机、不看书、不整理東西。就坐著。当焦慮浮上來的時候，不要用「做事」去压它，观察它。它在你身体的哪裡？什麼形狀？什麼温度？你不需要消除它，只需要看见它。',
    oil:'佛手柑 2 滴＋薰衣草 2 滴＋依兰 1 滴，在你终於停下來的那个時刻扩香。佛手柑告诉你的大脑：「現在不需要高效能。」薰衣草帮你的身体踩煞車。依兰让「什麼都不做」变成一種享受而不是一種懲罰。',
    med:'坐在椅子上。把手机翻面。吸气四秒，想像你的待办清单。吐气六秒，想像把它放进抽屜裡。吸气四秒，感觉身体的重量沉在椅子上。吐气六秒。对自己说：「我不做事的時候，我也在。」不加「但是」。重複四次。让那十秒的空白是空白的。张开眼睛。',
    quote:'你的忙碌是一层很精緻的包装纸。撕开看看裡面。不用怕，裡面不是空的。'},
  dorsal_sympathetic:{name:'崩潰预備型',icon:'🌋',sub:'你已经关机很久了，但地底下的压力一直在累积',
    keys:['平時麻木','突然爆发','情緒地震'],
    desc:'大部分時间你处在背側迷走的低能量狀态，觉得什麼都无所謂、什麼都提不起勁。但每隔一段時间，交感神经会突然爆发，像火山一样。可能是一件小事就让你暴怒、大哭、或者做出平常不会做的冲动行为。发完之後又回到那个空空的狀态，觉得很後悔也很困惑：「剛才那个人是我嗎？」',
    detail:'這種模式的邏輯是：凍結狀态並不是真的没有情緒，它只是把情緒压在底下了。就像鍋盖盖住了一鍋正在沸騰的水。平常你感觉不到，因为盖子很紧。但压力累积到一个臨界点，盖子就会被弹开。\n\n爆发之後你会觉得羞恥、觉得失控、觉得自己「果然很糟」，然後又缩回凍結狀态去。這形成了一个循环：麻木→累积→爆发→羞恥→更深的麻木。\n\n觉察邀请：你需要给自己一个「安全的出口」，让压力不要累积到火山爆发。每天花五分鐘跟自己的身体对话就好。不是问「我怎麼了」，是问「我的身体現在有什麼感觉」。当你开始感觉到了，压力就在緩慢释放了。',
    oil:'甜橙 2 滴＋薰衣草 2 滴＋乳香 1 滴，每天固定時间扩香。甜橙慢慢喚醒被关閉的感觉通道。薰衣草让交感神经不需要用「爆发」的方式來宣洩。乳香在兩个极端之间架一座橋。不是避免爆发，是让情緒有一条平坦的路可以走。',
    med:'坐著或躺著。一隻手放在胸口，一隻手放在肚子上。吸气四秒，问自己：「我的身体現在有什麼感觉？」不评判。吐气六秒。可能是麻的、空的、什麼都没有。那就跟「什麼都没有」待一会兒。吸气四秒，动一动手指，看看有没有微小的感觉浮上來。吐气六秒。不管有没有感觉到，都对自己说：「我愿意慢慢感觉。不用一次全部打开。」重複四次。张开眼睛。',
    quote:'感觉一直都在。只是被锁太久了。慢慢转开那个閥门，一点一点就好。'},
  dorsal_ventral:{name:'解离漂浮型',icon:'☁️',sub:'你的身体在這裡，但「你」好像在很远的地方看著',
    keys:['离身体很远','自动駕駛','旁观者視角'],
    desc:'你经常有一種感觉，好像自己在看著自己过日子。身体在做事、在说话、在笑，但你的意识飄在上面，像一个旁观者。你能正常运作，甚至可以跟人互动（腹側迷走的社交功能还在），但你知道那不是「完整」的你在场。有一部分的你一直在很远的地方。',
    detail:'解离是一種非常精密的保护机制。当环境的压力超过你的承受范圍，大脑会选擇把「你」和「正在发生的事」分开。這样即使外在很痛苦，「你」不用完整地经历它。這在当時可能救了你。但現在它变成了一種预设模式。\n\n你可能会觉得记忆有断层。昨天做了什麼不太记得。开車回家不太记得经过了哪些路口。別人跟你说过的话你需要聽兩遍才能「进去」。這不是记性差，是你的意识在保护你的時候「不完全在场」。\n\n觉察邀请：「回到身体裡」不是一句空话，是需要练習的。你可以从最小的感觉开始。脚趾踩在地板上是什麼触感？嘴裡含著一口水是什麼温度？当你能感觉到身体的某个部分，你就回來了一点点。不用急，慢慢回來就好。',
    oil:'迷迭香 2 滴＋黑胡椒 1 滴＋葡萄柚 2 滴，在觉得自己「飄走」的時候扩香或直接聞瓶口。迷迭香是最強的「回到這裡」精油，它直接刺激前額葉。黑胡椒的温熱感把你的注意力拉回皮膚。葡萄柚让回來的过程带一点亮度，不是嚇你回來，是温柔地接你回來。',
    med:'站著。赤脚踩在地板上。閉上眼睛。把全部的注意力放在脚底。地板是冷的还是暖的？硬的还是软的？吸气四秒，感觉脚底的触感。吐气六秒。把注意力往上移到小腿、膝盖、大腿。每一段停三秒。吸气四秒，移到肚子、胸口。吐气六秒，移到肩膀、头顶。对自己说：「我在這裡。我的身体在這裡。我回來了。」张开眼睛。用力看一样房间裡的東西，说出它的颜色。',
    quote:'你飄了很久了。不需要一下子降落。先感觉脚底就好。'}
};
let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';
    const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 题 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一题</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一题 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看看我的神经系统模式 🫀</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 题，共 '+questions.length+' 题';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const dimScores={};Object.keys(DIMS).forEach(k=>{dimScores[k]=0;});
  Object.keys(answers).forEach(qi=>{const oi=answers[qi];const s=questions[qi].opts[oi].s;Object.keys(s).forEach(d=>{dimScores[d]+=s[d];});});
  const maxPossible=Object.keys(answers).length*3;
  const sorted=Object.keys(DIMS).sort((a,b)=>dimScores[b]-dimScores[a]);
  // Determine type based on score distribution
  const v=dimScores.ventral,sy=dimScores.sympathetic,d=dimScores.dorsal;
  const total=v+sy+d;
  let topType;
  if(v>sy*1.3&&v>d*1.3) topType='ventral';
  else if(sy>v*1.3&&sy>d*1.3) topType='sympathetic';
  else if(d>v*1.3&&d>sy*1.3) topType='dorsal';
  else if(v>=sy&&v>=d&&sy>d) topType='ventral_sympathetic';
  else if(sy>=v&&sy>=d&&v>d) topType='sympathetic_ventral';
  else if(sy>=v&&sy>=d&&d>v) topType='sympathetic_dorsal';
  else if(d>=v&&d>=sy&&sy>v) topType='dorsal_sympathetic';
  else if(d>=v&&d>=sy&&v>sy) topType='dorsal_ventral';
  else if(v>=sy&&v>=d&&d>sy) topType='ventral_dorsal';
  else topType=sorted[0];
  const f=TYPES[topType];
  // find a secondary type for display
  const pureTypes=['ventral','sympathetic','dorsal'];
  const secondKey=pureTypes.filter(k=>k!==sorted[0]).sort((a,b)=>dimScores[b]-dimScores[a])[0];
  const f2=TYPES[secondKey];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('hlTitleReveal').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥灵之钥</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-quote">「'+f.quote+'」</div><div class="ss-footer">hourlightkey.com ✦ </div></div><div class="hl-title-card"><div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div><div class="hl-title-eyebrow">Hour Light ✦ 神经系统觉察</div><span class="hl-title-icon">'+f.icon+'</span><div class="hl-title-main">'+f.name+'</div><div class="hl-title-sub">'+f.sub+'</div><div class="hl-title-divider"></div><div class="hl-title-grid"><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 神经系统模式</div><div class="hl-title-tag-value">'+f.name+'</div></div><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 觉察关键字</div><div class="hl-title-tag-value">'+f.keys.join(' · ')+'</div></div></div><div class="hl-title-quote">「'+f.quote+'」</div><div class="hl-title-combo-hint">'+f.name+'｜'+f.sub+'</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">神经系统觉察 Nervous System</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var pct=Math.round(dimScores[k]/maxPossible*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+DIMS[k]+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">'+f.icon+' 你的神经系统模式</div><div class="result-section-content">'+f.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度觉察</div><div class="result-section-content">'+f.detail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🌿 认知芳疗配方</div><div class="result-section-content">'+f.oil+'</div></div><div class="result-section"><div class="result-section-title">🧘 60秒身体校准练習</div><div class="result-section-content">'+f.med+'</div></div><div class="result-section" style="text-align:center;font-family:LXGW WenKai TC,serif;font-size:1.05rem;color:#8b6914"><div class="result-section-content"></div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ H.O.U.R. 觉察橋接</div><div class="hour-bridge-text">你的神经系统模式是「身体的出廠设定」，馥灵秘码看的是「內在的出廠设定」。<br>兩组數据对照，你才能看见为什麼你的身体总是用這種方式回应世界。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免费解码馥灵秘码 →</a>';
  window._resultText=f.icon+' 我是「'+f.name+'」！'+f.sub+'\n「'+f.quote+'」\n\n你的神经系统是什麼模式？👉 hourlightkey.com/sc/quiz-nervous-system.html';
  try{localStorage.setItem('hl_quiz_nervous_system',JSON.stringify({type:topType,dimScores,ts:Date.now()}));}catch(e){}
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_dropMaterial) HL_dropMaterial('quiz');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz',toolName:'神经系统觉察量表'});window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
