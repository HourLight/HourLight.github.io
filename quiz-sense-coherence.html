const questions=[
  {q:'你覺得你的人生到目前為止，是「有脈絡的」嗎？',scene:'如果要跟一個陌生人解釋你怎麼走到今天，你說得出來嗎？',opts:[
    {t:'說得出來。每一步都有原因，雖然不一定是計畫好的',s:{comp:3,manage:1,meaning:2}},
    {t:'大概說得出來，但有些段落我自己也搞不懂',s:{comp:2,manage:1,meaning:1}},
    {t:'說不太出來。感覺很多事情是隨機發生的',s:{comp:0,manage:0,meaning:1}},
    {t:'不想解釋。過去的事不重要',s:{comp:0,manage:1,meaning:0}}]},
  {q:'遇到突發狀況的時候，你的第一反應是？',scene:'計畫被打亂了。旅行航班取消、重要會議突然改期。',opts:[
    {t:'馬上開始想替代方案，通常能找到出路',s:{comp:1,manage:3,meaning:1}},
    {t:'會慌一下，但冷靜下來之後可以處理',s:{comp:1,manage:2,meaning:0}},
    {t:'會卡住一段時間，不知道該怎麼辦',s:{comp:0,manage:0,meaning:0}},

  {q:'你覺得你正在做的事情（工作、學業、生活的重心）「值得」嗎？',scene:'每天起床的那個動力，來自哪裡？',opts:[
    {t:'值得。雖然不輕鬆，但我知道這對我有意義',s:{comp:1,manage:1,meaning:3}},
    {t:'大部分時候覺得值得，偶爾會懷疑',s:{comp:1,manage:1,meaning:2}},
    {t:'其實不太確定。但也不知道還能做什麼',s:{comp:0,manage:0,meaning:0}},
    {t:'不值得。但目前沒有更好的選擇',s:{comp:1,manage:0,meaning:0}}]},
  {q:'你覺得「壞事」發生的時候，你能看懂它為什麼發生嗎？',scene:'失戀、失業、生病、被背叛。那些不好的經歷。',opts:[
    {t:'不一定馬上能懂，但回頭看通常都找得到原因',s:{comp:3,manage:1,meaning:1}},

    {t:'我覺得壞事就是壞事，沒有為什麼',s:{comp:0,manage:0,meaning:0}},
    {t:'壞事發生的時候我通常忙著應對，沒時間想為什麼',s:{comp:0,manage:2,meaning:0}}]},
  {q:'你的日常生活有沒有一些固定的節奏或儀式感？',scene:'早上一杯咖啡、睡前十分鐘閱讀、每週跑一次步，這種。',opts:[
    {t:'有，而且我蠻需要這些規律的',s:{comp:2,manage:3,meaning:1}},

const DIMS={comp:'理解力',manage:'掌控力',meaning:'意義感'};
const TYPES={
  navigator:{name:'人生導航型',icon:'🧭',sub:'你活得像一個有地圖的人',
    keys:['方向清晰','自我理解','內在穩定'],
    desc:'你的生活連貫感很高。你能理解發生在自己身上的事情，有辦法應對大部分的挑戰，而且你覺得這一切是值得的。這不代表你的人生沒有困難。你只是有一種能力，能把困難放進一個更大的脈絡裡看。壞事不只是壞事，它是故事的一部分。你的人生不是隨機的，它有一條你能看見的線。這條線不是命運給的，是你自己在每一次經歷中、每一次選擇中，一針一線縫出來的。',
    detail:'Antonovsky的健康生成論指出，高連貫感的人不是「幸運」，而是他們有一套內在的處理系統：遇到事情先看懂（理解力）→ 找到應對的方式（掌控力）→ 把它放進人生的意義裡（意義感）。這三步你做得很自然，可能自然到你不覺得這是一種能力。但這就是為什麼同樣的壓力，有些人會被壓垮，你卻能消化。\n\n你現在的功課不是修復什麼，而是持續維護。高連貫感不是永久的，它需要持續的經驗來滋養。保持跟有深度的人交流、保持做讓你覺得有意義的事、保持對自己誠實。\n\n覺察練習：今天花三分鐘寫下「過去一年教會我最重要的一件事」。不用多，一件就好。這個動作在強化你的意義建構能力。',
    oil:'乳香 2 滴＋甜橙 2 滴＋雪松 1 滴，在需要沉澱的時候擴香。乳香維持你跟深層自我的連結，甜橙讓你的穩定感帶著溫度而不是距離感，雪松像你的根一樣穩穩地紮在土裡。',
    med:'閉上眼睛。想像你站在一座山的中間。往下看，能看到你走過的路。往上看，能看到你要去的方向。吸氣四秒，感覺腳下的地面。吐氣六秒。吸氣四秒，對自己說：「我知道我在哪裡。」吐氣六秒。重複三次。最後，看看四周的風景。風景很好。你走到這裡，風景是你賺到的。張開眼睛。',
    quote:'你的人生不是隨機的。每一步，都是你自己走出來的路。'},
  quiet_steady:{name:'靜水深流型',icon:'🌊',sub:'你不激動，但你的穩定有很深的根',
    keys:['沉穩','低調掌控','不張揚'],
    desc:'你的生活連貫感像一條不急不徐的河，表面看起來平靜，但底下有很穩定的水流。你不太會大起大落地感嘆人生的意義，也不太需要別人來告訴你方向。你就是默默地走，默默地做，遇到問題默默地解決。你的力量不在於有多激昂的信念，而在於你能在沒有掌聲的時候，也穩穩地做自己覺得對的事。',
    detail:'你的掌控力和理解力都不錯，意義感可能處於中等。你不是不在乎意義，是你覺得意義不需要特別拿出來講。你的意義藏在日常裡：做好一頓飯、陪一個人走一段路、把一件事做到位。這種意義感是非常實在的，不虛。\n\n但靜水深流的風險是：你可能太久沒有問自己「我想要什麼」了。你很會應對、很會處理，但你會不會忘了退一步想：「這條河要流向哪裡？」如果你的穩定開始讓你覺得有一點空，那可能是時候加一點意義的調味了。\n\n覺察練習：今天做一件「不是因為該做，而是因為想做」的事。可以很小。但那件事是你自己的，不是為了任何人。',
    oil:'佛手柑 2 滴＋薰衣草 2 滴＋依蘭 1 滴，在下午需要安靜的時候擴香。佛手柑帶一點陽光進你的沉穩裡，薰衣草讓你的安靜帶著溫柔而不是冷漠，依蘭打開你心裡那個「想要」的閥門，讓你允許自己多感受一點。',
    med:'閉上眼睛。想像你是一條河。水穩穩地流著。吸氣四秒，感覺水流的速度。吐氣六秒。很穩。重複三次。第四次的時候，問你的河：「你想流向哪裡？」吸氣四秒，等答案浮現。吐氣六秒。不管答案是什麼，記住那個方向。對自己說：「穩是好的。但偶爾加速一下也是好的。」張開眼睛。',
    quote:'穩定是你的超能力。偶爾加一點方向，穩定會變成力量。'},
  meaning_seeker:{name:'意義追尋型',icon:'🔍',sub:'你不缺能力，缺的是「為什麼要用」',
    keys:['追問意義','存在焦慮','深度需求'],
    desc:'你的理解力和掌控力都不差，但意義感是你最不穩定的那一塊。你很能看懂事情、也有辦法處理問題，但你會反覆問自己：「然後呢？」「這一切到底是為了什麼？」你不是做不到，是你不確定做了值不值得。這讓你有時候很有動力（找到意義的時候），有時候很虛無（意義消失的時候），像一台引擎很好但油箱時有時無的車。',
    detail:'意義感不是一個開關，不是「有」或「沒有」，而是一個需要持續維護的連結。研究發現，意義感最穩定的來源不是工作成就或被需要，而是「一致性」。就是你的行為和你的價值觀是對齊的。當你做的事情跟你相信的東西吻合的時候，意義感就自然生成了。反過來，如果你一直在做你不認同的事，意義感就會像沙漏一樣漏掉。\n\n你的功課不是「找到人生的意義」（這個命題太大了），而是「在每一天裡做一件有意義的小事」。意義是累積的，不是頓悟的。\n\n覺察練習：今天睡前寫下一件「今天讓我覺得值得」的事。可以很小。一杯好喝的咖啡、一段有品質的對話、完成了一件拖很久的事。每天寫一件，一週之後你會開始看到一條線。',
    oil:'乳香 2 滴＋迷迭香 2 滴＋薰衣草 1 滴，在你開始問「然後呢？」的時候擴香。乳香連結你跟更大的東西之間的關係，迷迭香讓你的追問保持方向而不是變成漩渦，薰衣草在找不到答案的夜晚陪著你。',
    med:'閉上眼睛。想像你手裡拿著一盞燈，但燈忽明忽暗。吸氣四秒，看著那盞燈。吐氣六秒。它不穩，但它在亮。那盞燈是你的意義。吸氣四秒，問它：「你需要什麼才能穩定？」吐氣六秒。讓答案慢慢浮現。第四次呼吸的時候，把那盞燈放在胸口。吸氣四秒，感覺它的溫度。吐氣六秒。對自己說：「我不需要找到答案。我只需要讓這盞燈不滅。」張開眼睛。',
    quote:'意義不是找到的，是一天一天做出來的。你的引擎很好，只需要加油。'},
  overwhelmed:{name:'浪裡浮沉型',icon:'🌀',sub:'你覺得什麼都在動，就你站不穩',
    keys:['失控感','混亂','消耗'],
    desc:'你現在的生活連貫感比較低，三個維度都不太穩。你覺得事情看不懂、處理不了、也不太知道意義在哪裡。這不代表你不好或者你有什麼問題，這代表你現在可能正在經歷一段超出你目前資源的壓力期。你的系統在過載。你不是能力不夠，是同時要處理的事情太多了。',
    detail:'低連貫感不是一個永久狀態。Antonovsky的研究也指出，連貫感會隨著人生經歷而波動。你現在在低谷，不代表你會一直在這裡。你需要做的不是「變好」，是先減少消耗。把不必要的事情放下，把可以求助的事情交出去，把你僅剩的力氣用在最重要的事上。\n\n如果你覺得自己真的撐不住了，請尋求專業協助。這不是軟弱，是聰明。你不需要獨自面對所有的事情。\n\n覺察練習：今天只做三件事。不是三件「大事」，是三件「你能做完」的事。哪怕是刷牙、吃一頓飯、回一則訊息。完成了就好。其他的，明天再說。',
    oil:'薰衣草 3 滴＋甜橙 2 滴，在你覺得撐不住的時候擴香或滴在枕頭上。薰衣草是最直接的安撫信號，不需要你分析什麼，只是讓你的神經系統慢下來。甜橙給你一個很小但真實的好感覺。先穩住，其他的慢慢來。',
    med:'找一個安全的地方坐下來。閉上眼睛。什麼都不想。吸氣四秒。吐氣六秒。就這樣。重複十次。什麼都不想，只是呼吸。如果有念頭跑進來，讓它跑。你不需要追著它。你現在唯一的工作就是呼吸。做完十次之後，對自己說：「今天，這樣就夠了。」張開眼睛。',
    quote:'你現在在浪裡面。浪會退的。你的工作是先浮著。'},
  competent_hollow:{name:'外強內虛型',icon:'🏗️',sub:'你什麼都能處理，就是覺得空空的',
    keys:['能力強','意義缺失','高功能空虛'],
    desc:'你的掌控力很高，你很會做事、很會解決問題、別人遇到事情第一個想到你。但你心裡有一塊空的。不是不開心，是你不太確定為什麼要做這些。你的日子過得「不錯」，薪水夠用、生活穩定、朋友也有，但你就是覺得少了什麼。那個「少了什麼」不是物質，是一種「這一切對我來說到底重不重要」的感覺。你像一棟蓋得很好的房子，結構完整、裝潢到位，但裡面沒有人住。',
    detail:'高掌控力加低意義感是一個很現代的組合。社會教我們「能力」比「意義」重要。你在這套系統裡表現得很好，但你的內心開始問一些系統回答不了的問題。「薪水高然後呢？」「升遷然後呢？」「然後呢？」這不是矯情，這是你的系統在升級。它在告訴你：你已經不只是要生存了，你開始需要意義。\n\n意義不是你在目前的生活以外去找一個新東西。它可能就在你現在做的事情裡面，只是你太忙了沒有看到。放慢一點，問自己：「在我做的所有事情裡面，哪一件讓我有一丁點的滿足感？」那一丁點就是線索。\n\n覺察練習：這週每天問自己一個問題：「今天做的事情裡面，有哪一件就算沒人付我錢我也會做？」答案可能很意外。',
    oil:'迷迭香 2 滴＋乳香 2 滴＋甜橙 1 滴，在你開始覺得「然後呢」的時候擴香。迷迭香讓你從「做事模式」切換到「感受模式」，乳香帶你碰觸更深層的東西，甜橙在那個深層的地方放了一盞溫暖的燈。',
    med:'閉上眼睛。想像你站在你蓋的那棟很好的房子裡面。吸氣四秒，看看四周。很完整。吐氣六秒。但房子裡面是空的。吸氣四秒，走到窗邊，打開窗。吐氣六秒。風吹進來了。帶著外面的聲音、氣味、溫度。吸氣四秒，問自己：「我想在這個房子裡放什麼？」吐氣六秒。讓畫面慢慢出現。重複三次。那些你想放進去的東西，就是你的意義。張開眼睛。',
    quote:'房子蓋好了。現在，你想讓誰住進去？'},
  rebuilding:{name:'重建中型',icon:'🔨',sub:'你正在一片廢墟上重新蓋',
    keys:['從破碎到整合','重新定義','過渡期'],
    desc:'你的生活連貫感曾經不錯，但某些事情發生之後，它碎了。可能是一次重大的失去、一次關係的斷裂、一次人生方向的大轉彎。你現在正在重建。不是回到原來的樣子，是在用新的眼光重新理解自己和世界。這個過程會混亂、會痛、會覺得看不到盡頭。但你已經在做了。',
    detail:'重建期的連貫感波動是正常的。你可能某天覺得「啊，我好像想通了」，隔天又覺得「算了什麼都不重要」。這不是退步，是你的系統在重新校準。就像手機更新一樣，過程中會卡頓，但更新完了會比以前更好。\n\n在重建的過程中，最重要的不是速度，是方向。不需要急著把所有的碎片拼回去，先撿你能認出來的那幾塊。其他的，時間到了自然會歸位。\n\n覺察練習：找一張紙，畫一條線。左邊寫「以前的我」，右邊寫「現在的我」。中間的距離，就是你正在走的路。看看那段距離，你會發現你已經走了很多了。',
    oil:'尤加利 2 滴＋薄荷 1 滴＋薰衣草 2 滴，在重建的過程中隨時可以用。尤加利清理舊的，給新的騰出空間。薄荷讓你在混亂裡保持一點清醒。薰衣草在你累了的時候接住你。',
    med:'閉上眼睛。想像你面前是一片空地。這裡曾經有東西，但現在是空的。吸氣四秒，看看那片空地。吐氣六秒。地上有些碎片，有些你認得出來，有些不認得。吸氣四秒，撿起一塊你認得的。吐氣六秒。那是什麼？是一段記憶？一個價值觀？一種能力？吸氣四秒，把它放在新的地基上。吐氣六秒。重複四次。你不需要一天蓋好。今天放一塊磚就夠了。對自己說：「我在蓋的，比以前的更好。」張開眼睛。',
    quote:'碎了不可怕。可怕的是拼都不拼就放棄了。你已經在蓋了。'},
  analyst_drift:{name:'理性漂流型',icon:'🧮',sub:'你什麼都看得懂，但身體不在這裡',
    keys:['過度理性','體感斷裂','知道但做不到'],
    desc:'你的理解力很強。別人的問題你看得比誰都清楚，社會的結構、關係的動態、自己的模式，你都分析得頭頭是道。但問題是，知道歸知道，你的日常生活好像跟你的理解是分開的。你知道該運動但不運動，知道該放下但放不下，知道該跟某個人談但就是不開口。你活在腦子裡，身體只是載具。',
    detail:'過度理性是一種微型的情感隔離。你用分析來取代感受，用「理解」來避免「面對」。這不是智商的問題，是你的感受通道可能在某個時候被關小了。也許是因為環境不允許你有感覺，也許是因為有感覺太痛苦了。理解是好的，但理解不能取代體驗。你需要讓身體追上你的腦袋。\n\n覺察練習：今天做一件事的時候，刻意不分析它，只是感覺它。吃飯的時候感覺食物的溫度和口感。走路的時候感覺腳底的觸感。讓感官先於思考。',
    oil:'薰衣草 2 滴＋甜橙 2 滴＋岩蘭草 1 滴，在你又開始「想」而忘了「感覺」的時候擴香。薰衣草把你從腦袋拉回身體，甜橙喚醒你的感官（不是想法，是感覺），岩蘭草讓你的腳重新踩在地上。',
    med:'站起來。閉上眼睛。感覺腳底踩著地面。吸氣四秒，注意腳掌的壓力分布。前腳掌比較多還是後腳跟比較多？吐氣六秒。不分析，只是感覺。吸氣四秒，注意空氣碰觸皮膚的感覺。吐氣六秒。吸氣四秒，聽聽周圍的聲音。不判斷，只是聽。吐氣六秒。重複四次。對自己說：「我不只是腦袋。我也有身體。身體也知道很多事。」張開眼睛。',
    quote:'你什麼都看得懂。但人生不是看懂就好了，還要活進去。'},
  fragile_hope:{name:'微光搖曳型',icon:'🕯️',sub:'你的意義感很脆弱，但它還在亮',
    keys:['意義薄弱','但在努力','需要支持'],
    desc:'你的連貫感整體偏低，但有一個很重要的東西：你還在意。你還在想「這一切有什麼意義」，你還在做這份測驗，你還沒有完全放棄去理解自己的人生。那個「還在意」就是你最重要的資源。它可能很微弱，像一根蠟燭在風裡搖。但它在亮。只要它在亮，一切就還有機會。',
    detail:'低連貫感加上「還在找」的態度，通常是一個即將轉折的狀態。你已經觸底了，但你在抬頭。研究顯示，意義感的重建通常不是來自一個大的頓悟，而是來自很多個小的「啊，原來這樣」。一次被理解的對話、一個做完之後覺得「不錯」的小事、一段觸動你的文字。這些小的意義碎片會慢慢累積成一條線。\n\n你不需要現在就看到全貌。你只需要讓那根蠟燭不滅。擋風的方式可以是：找一個安全的人聊聊、做一件很小但你覺得值得的事、允許自己今天只做到「還活著」就好。\n\n覺察練習：今天找一個讓你有一丁點感覺的東西。一首歌、一個畫面、一句話。記下來。那是你的意義碎片。明天再找一個。慢慢撿。',
    oil:'玫瑰 1 滴＋薰衣草 2 滴＋甜橙 2 滴，在你覺得那根蠟燭快滅的時候擴香。玫瑰非常輕柔地碰觸你心裡那個「還在乎」的部分。薰衣草確保你不會在脆弱的時候被情緒淹沒。甜橙給你一個很小但真實的溫暖。先暖著。',
    med:'坐在一個安全的地方。閉上眼睛。想像你手裡有一根蠟燭，火在搖。吸氣四秒，用你的雙手圍住它，擋風。吐氣六秒，輕輕地，不要把它吹熄。重複四次。每一次呼吸，火都穩一點點。第五次呼吸的時候，火穩了。小小的，但穩了。吸氣四秒，看著那個火光。那是你的。吐氣六秒。對自己說：「小小的也沒關係。還亮著就夠了。」張開眼睛。',
    quote:'你的火很小，但它還在亮。只要還亮著，一切就還有可能。'}
};
let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';
    const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 題 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一題</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一題 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看看我的連貫感 🧿</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 題，共 '+questions.length+' 題';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const dimScores={};Object.keys(DIMS).forEach(k=>{dimScores[k]=0;});
  Object.keys(answers).forEach(qi=>{const oi=answers[qi];const s=questions[qi].opts[oi].s;Object.keys(s).forEach(d=>{dimScores[d]+=s[d];});});
  const maxPossible=Object.keys(answers).length*3;
  const compPct=dimScores.comp/maxPossible;
  const managePct=dimScores.manage/maxPossible;
  const meaningPct=dimScores.meaning/maxPossible;
  const total=compPct+managePct+meaningPct;
  let topType;
  if(total>2.0) topType='navigator';
  else if(managePct>0.5&&meaningPct<0.3) topType='competent_hollow';
  else if(compPct>0.5&&managePct<0.3) topType='analyst_drift';
  else if(managePct>0.4&&compPct>0.3&&meaningPct>0.2) topType='quiet_steady';
  else if(compPct>0.3&&meaningPct<0.3&&managePct<0.3) topType='meaning_seeker';
  else if(total>1.0&&meaningPct>0.1) topType='rebuilding';
  else if(meaningPct>0.15||compPct>0.15) topType='fragile_hope';
  else topType='overwhelmed';
  // Handle meaning_seeker: good comp+manage but low meaning
  if(compPct>0.35&&managePct>0.3&&meaningPct<0.35) topType='meaning_seeker';
  const sorted=Object.keys(DIMS).sort((a,b)=>dimScores[b]-dimScores[a]);
  const f=TYPES[topType];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('hlTitleReveal').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥靈之鑰</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-quote">「'+f.quote+'」</div><div class="ss-footer">hourlightkey.com ✦ </div></div><div class="hl-title-card"><div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div><div class="hl-title-eyebrow">Hour Light ✦ 意義感與生活連貫性</div><span class="hl-title-icon">'+f.icon+'</span><div class="hl-title-main">'+f.name+'</div><div class="hl-title-sub">'+f.sub+'</div><div class="hl-title-divider"></div><div class="hl-title-grid"><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 連貫樣態</div><div class="hl-title-tag-value">'+f.name+'</div></div><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 覺察關鍵字</div><div class="hl-title-tag-value">'+f.keys.join(' · ')+'</div></div></div><div class="hl-title-quote">「'+f.quote+'」</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">意義感覺察 Sense of Coherence</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var pct=Math.round(dimScores[k]/maxPossible*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+DIMS[k]+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">'+f.icon+' 你的連貫樣態</div><div class="result-section-content">'+f.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度覺察</div><div class="result-section-content">'+f.detail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🌿 認知芳療配方</div><div class="result-section-content">'+f.oil+'</div></div><div class="result-section"><div class="result-section-title">🧘 60秒覺察練習</div><div class="result-section-content">'+f.med+'</div></div><div class="result-section" style="text-align:center;font-family:LXGW WenKai TC,serif;font-size:1.05rem;color:#8b6914"><div class="result-section-content"></div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ H.O.U.R. 覺察橋接</div><div class="hour-bridge-text">生活連貫感是「你跟人生的關係」，馥靈秘碼看的是「人生給你的出廠設定」。<br>兩個座標交叉，找到你的意義感從哪裡來。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免費解碼馥靈秘碼 →</a>';
  window._resultText=f.icon+' 我的生活連貫感是「'+f.name+'」：'+f.sub+'\n\n你的人生有一條看得見的線嗎？👉 hourlightkey.com/quiz-sense-coherence.html';
  try{localStorage.setItem('hl_quiz_sense_coherence',JSON.stringify({type:topType,dimScores,ts:Date.now()}));}catch(e){}
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_dropMaterial) HL_dropMaterial('quiz');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz',toolName:'意義感與生活連貫性'});window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
</script>
