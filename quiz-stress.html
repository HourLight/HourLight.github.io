    bridge:'你最需要的是 Heal（身心校準）：讓你的身體重新感覺到「現在是安全的」。馥靈之鑰的香氣工具，幫你的神經系統慢慢回來。'},
  fawn:{name:'討好反應（Fawn）',sub:'壓力來了，你的第一反應是讓對方舒服',
    desc:'你面對威脅時會自動進入「讓對方開心」模式。你道歉、你妥協、你把自己的需求藏起來，因為你學到「讓別人滿意 = 安全」。這不是善良，這是生存策略。真正的善良是你有選擇之後還願意給，而不是不敢不給。',
    shadow:'你最大的功課是學會說「不」，而且不覺得愧疚。你的需求不是「自私」，是「基本權利」。',
    bridge:'你最需要 Own（智慧辨識）：分清楚「我真的想幫」和「我不敢不幫」的差別。馥靈之鑰的牌卡，幫你聽見自己的聲音。'}
};

let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}

function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const optsHTML=qd.opts.map((opt,oi)=>`<button class="quiz-option${answers[i]===opt.v?' selected':''}" onclick="selectAnswer(${i},'${opt.v}',this)"><span style="flex-shrink:0;opacity:0.6;font-size:0.9rem">${String.fromCharCode(65+oi)}</span><span>${opt.text}</span></button>`).join('');
    card.innerHTML=`<div class="quiz-q-num">第 ${i+1} 題 / ${questions.length}</div><div class="quiz-question">${qd.q}</div><div class="quiz-options">${optsHTML}</div><div class="quiz-nav">${i>0?`<button class="btn-prev" onclick="goTo(${i-1})">← 上一題</button>`:'<span></span>'}${i<questions.length-1?`<button class="btn-next" id="btnNext-${i}" ${answers[i]===undefined?'disabled':''} onclick="goTo(${i+1})">下一題 →</button>`:`<button class="btn-next" id="btnNext-${i}" ${answers[i]===undefined?'disabled':''} onclick="showResult()">看我的壓力模式 ⚡</button>`}</div>`;
    area.appendChild(card);
  });updateProgress(idx);
}
function selectAnswer(qi,v,btn){answers[qi]=v;document.getElementById('qcard-'+qi).querySelectorAll('.quiz-option').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent=`第 ${idx+1} 題，共 ${questions.length} 題`;document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}

function showResult(){
  const scores={fight:0,flight:0,freeze:0,fawn:0};
  questions.forEach((_,i)=>{const a=answers[i];if(a)scores[a]++;});
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const topType=sorted[0][0];const total=questions.length;
  const pcts={};Object.keys(scores).forEach(k=>{pcts[k]=Math.round(scores[k]/total*100);});
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  const r=resultData[topType],t=hlTitles[topType];
  const typeLabels={fight:'戰鬥型',flight:'逃跑型',freeze:'僵住型',fawn:'討好型'};
  const typeColors={fight:'#e85050',flight:'#f4a340',freeze:'#6a9fd8',fawn:'#b399e8'};
  document.getElementById('hlTitleReveal').innerHTML=`<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥靈之鑰</div><div class="ss-icon">${t.icon}</div><div class="ss-title">${t.title}</div><div class="ss-sub">${t.sub}</div><div class="ss-tags"><span class="ss-tag">${typeLabels[topType]}</span><span class="ss-tag">${t.castle}</span></div><div class="ss-quote">「${t.quote}」</div><div class="ss-footer">hourlightkey.com ✦ 你的城堡，你的鑰匙</div></div><div class="hl-title-card"><div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div><div class="hl-title-eyebrow">Hour Light ✦ 你的馥靈稱號</div><span class="hl-title-icon">${t.icon}</span><div class="hl-title-main">${t.title}</div><div class="hl-title-sub">${t.sub}</div><div class="hl-title-divider"></div><div class="hl-title-grid"><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 城堡守護宮</div><div class="hl-title-tag-value">${t.castle}</div></div><div class="hl-title-tag"><div class="hl-title-tag-label">✦ H.O.U.R. 天賦</div><div class="hl-title-tag-value">${t.hour}</div></div><div class="hl-title-tag" style="grid-column:1/-1"><div class="hl-title-tag-label">✦ 你的精油指引</div><div class="hl-title-tag-value">🌿 ${t.oil}</div></div></div><div class="hl-title-quote">「${t.quote}」</div><div class="hl-title-combo-hint">${typeLabels[topType]}｜${r.name}</div></div>`;
  document.getElementById('resultHero').innerHTML=`<span class="result-hero-icon">${t.icon}</span><div class="result-type-label">壓力反應模式 4F Response</div><div class="result-combo-name">${r.name}</div><div class="result-subtitle">${r.sub}</div>`;
  document.getElementById('dimBars').innerHTML=[
    {label:'Fight 戰鬥',color:'#e85050',score:pcts.fight},{label:'Flight 逃跑',color:'#f4a340',score:pcts.flight},
    {label:'Freeze 僵住',color:'#6a9fd8',score:pcts.freeze},{label:'Fawn 討好',color:'#b399e8',score:pcts.fawn}
  ].map(d=>`<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>${d.label}</strong></span><span class="ocean-score">${d.score}%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:${d.score}%;background:${d.color}"></div></div></div>`).join('');
  document.getElementById('resultSections').innerHTML=`<div class="result-section"><div class="result-section-title">⚡ 你的壓力自動反應</div><div class="result-section-content">${r.desc}</div></div><div class="result-section"><div class="result-section-title">🌑 你的盲點與課題</div><div class="result-section-content">${r.shadow}</div></div>`;
  document.getElementById('resultHour').innerHTML=`<div class="hour-bridge-label">✦ 馥靈之鑰 × 你的覺察密碼</div><div class="hour-bridge-text">${r.bridge}</div><a href="draw-hl.html" class="hour-bridge-cta">抽一張牌，聽聽自己的聲音 ✨</a>`;
  
  try{localStorage.setItem('hl_quiz_stress',JSON.stringify({type:topType,pcts,ts:Date.now()}));}catch(e){}
document.getElementById('quizResult').classList.add('active');window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
function copyResult(){const text=`我的壓力反應模式：${document.querySelector('.result-combo-name')?.textContent||''}
${document.querySelector('.ss-quote')?.textContent||''}

測測你的 → hourlightkey.com/quiz-stress.html`;navigator.clipboard?.writeText(text).then(()=>alert('已複製！'));}
function shareToLine(){window.open(`https://line.me/R/share?text=${encodeURIComponent('我剛做了壓力反應模式測驗！你也來試試～\nhttps://hourlightkey.com/quiz-stress.html')}`);}
