<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>內在城堡遊戲 | 馥靈之鑰</title>
<meta name="description" content="進入你的內在城堡，探索12間房間的秘密。透過覺察謎語，收集靈感點數，解鎖專屬傢具，打造屬於你的心靈空間。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/hourlight-global.css">

<style>
/* 修復：確保 castle-overlay 內的房間可以點擊 */
.castle-overlay .room-zone{pointer-events:all !important}

/* 原有 CSS 保持不變 */
:root{--navy:#1D3557;--txt-d:#1D3557;--txt-l:rgba(29,53,87,.7);--teal:#2EC4B6;--teal-d:#229C92;--coral:#E76F51;--rose:#E63946;--warm:#E9A03D;--gold:#F0B86E;--muted:rgba(29,53,87,.4);--bg-l:rgba(255,248,240,.9);--amber:#F0A500;--drop-shadow:drop-shadow(0 2px 6px rgba(0,0,0,.15))}
body{color:var(--navy);line-height:1.6;letter-spacing:.02em;background:#06040e}
.main{background:#faf8f5;border-radius:28px;overflow:hidden;border:1px solid rgba(240,165,0,.12);box-shadow:0 20px 60px rgba(6,4,14,.4)}
#topbar{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(6,4,14,.88);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-bottom:1px solid rgba(248,223,165,.08);padding:12px 0;transform:translateY(-100%);transition:transform .4s;color:#f8dfa5}
#topbar.show{transform:translateY(0)}
.topbar-inner{max-width:1200px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:20px}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-logo{font-size:1.2rem;font-weight:700;font-family:'Playfair Display',serif;color:#f8dfa5}
.topbar-stats{display:flex;align-items:center;gap:16px;font-size:.82rem;color:rgba(248,223,165,.75)}
.topbar-stat{display:flex;align-items:center;gap:4px}
.progress-bar{width:72px;height:4px;background:rgba(248,223,165,.15);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#f8dfa5,#f0d48a);border-radius:2px;transition:width .6s}
#gameArea{display:none;padding:20px;background:#faf8f5;color:var(--navy)}
#gameArea.active{display:block}
.castle-wrap{position:relative;width:100%;max-width:720px;margin:0 auto 28px;border-radius:20px;overflow:hidden}
.castle-bg{width:100%;display:block;border-radius:20px}
.castle-svg{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;pointer-events:none}
.castle-svg .room-zone{pointer-events:all}
h1,h2{font-family:'Playfair Display','Noto Serif TC',serif;margin:0 0 .5rem;font-weight:700}
.room-hotspot .hs-label{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-size:.6rem;color:rgba(255,255,255,.8);background:rgba(29,53,87,.75);padding:2px 8px;border-radius:10px;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none}
.room-hotspot:hover .hs-label{opacity:1}
.castle-watermark-cover{position:absolute;bottom:8px;right:10px;width:36px;height:36px;border-radius:50%;object-fit:cover;opacity:.85;pointer-events:none;filter:drop-shadow(0 2px 6px rgba(0,0,0,.3))}
.room-zone{cursor:pointer;transition:all .3s}
.room-zone:hover .zone-fill{opacity:.28}
/* Room state styles */
.room-zone.locked{cursor:default;opacity:.28;filter:grayscale(.7)}
.room-zone.locked:hover .zone-fill{opacity:0}
/* Current room (has key) */
.room-zone.current .zone-fill{opacity:.22;animation:glow 2s ease-in-out infinite}
.room-zone.current{filter:drop-shadow(0 0 7px rgba(240,165,0,.6))}
/* Done room */
.room-zone.done .zone-fill{opacity:.14}
.room-zone.done{filter:drop-shadow(0 0 5px rgba(46,196,182,.45))}
/* Available room */
.room-zone.available .zone-fill{opacity:.08}
.room-zone.available:hover .zone-fill{opacity:.22}
.room-zone.done .zone-check{opacity:1}
.zone-check{position:absolute;top:-8px;right:-8px;width:20px;height:20px;background:var(--teal);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;opacity:0;transition:all .3s;font-weight:700}
.zone-label{font-family:'Noto Serif TC',serif;font-size:12px;font-weight:700;fill:var(--navy);opacity:1;pointer-events:none;paint-order:stroke;stroke:#fff;stroke-width:3px;stroke-linecap:round;stroke-linejoin:round}
.zone-icon{font-size:24px;pointer-events:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,.15))}
</style>

</head>
<body>
<div id="topbar">
<div class="topbar-inner">
<div class="topbar-left">
<span class="topbar-logo">🏰 內在城堡</span>
<div class="topbar-stats">
<div class="topbar-stat"><span>✨</span><span id="dPts">0</span></div>
<div class="topbar-stat"><span>🗝️</span><span id="dRms">0/3</span></div>
<div class="topbar-stat"><span>🔥</span><span id="dStr">0</span></div>
<div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
</div>
</div>
</div>
</div>

<div class="main">
<div id="gameArea">
<div class="castle-wrap">
<img src="images/castle-web/castle-map.webp" alt="內在城堡" class="castle-bg" loading="eager">
<div class="castle-overlay" style="position:absolute;inset:0;pointer-events:none">
<!-- H.O.U.R. 四主房 -->
<div class="room-zone room-hotspot" data-room="mirror" style="position:absolute;left:18%;top:30%;transform:translate(-50%,-50%);pointer-events:auto;animation-delay:0s"><span class="zone-icon">🪞</span><span class="hs-label">鏡之廳</span></div>
<div class="room-zone room-hotspot" data-room="treasure" style="position:absolute;left:32%;top:25%;transform:translate(-50%,-50%);pointer-events:auto;animation-delay:.3s"><span class="zone-icon">💎</span><span class="hs-label">價值寶庫</span></div>
<div class="room-zone room-hotspot" data-room="throne" style="position:absolute;left:82%;top:35%;transform:translate(-50%,-50%);pointer-events:auto;animation-delay:.6s"><span class="zone-icon">👑</span><span class="hs-label">啟程塔</span></div>
<div class="room-zone room-hotspot" data-room="key" style="position:absolute;left:50%;top:70%;transform:translate(-50%,-50%);pointer-events:auto;animation-delay:.9s"><span class="zone-icon">🔑</span><span class="hs-label">解鎖密室</span></div>
<!-- 中央主堡 -->
<div class="room-zone room-hotspot" data-room="tower" style="position:absolute;left:50%;top:28%;transform:translate(-50%,-50%);pointer-events:auto;animation-delay:.15s"><span class="zone-icon">🔭</span><span class="hs-label">瞭望塔</span></div>
<!-- L.I.G.H.T. 五房 -->
<div class="room-zone room-hotspot" data-room="love" style="position:absolute;left:28%;top:18%;transform:translate(-50%,-50%);pointer-events:auto;animation-delay:.45s"><span class="zone-icon">💕</span><span class="hs-label">愛之殿</span></div>
<div class="room-zone room-hotspot" data-room="intuition" style="position:absolute;left:70%;top:28%;transform:translate(-50%,-50%);pointer-events:auto;animation-delay:.75s"><span class="zone-icon">🔮</span><span class="hs-label">直覺閣</span></div>
<div class="room-zone room-hotspot" data-room="ground" style="position:absolute;left:25%;top:55%;transform:translate(-50%,-50%);pointer-events:auto;animation-delay:.2s"><span class="zone-icon">🏔️</span><span class="hs-label">磐石廳</span></div>
<div class="room-zone room-hotspot" data-room="harmony" style="position:absolute;left:36%;top:62%;transform:translate(-50%,-50%);pointer-events:auto;animation-delay:.5s"><span class="zone-icon">🌿</span><span class="hs-label">和諧苑</span></div>
<div class="room-zone room-hotspot" data-room="transform" style="position:absolute;left:65%;top:60%;transform:translate(-50%,-50%);pointer-events:auto;animation-delay:.8s"><span class="zone-icon">🦋</span><span class="hs-label">蛻變室</span></div>
<!-- 探索房 -->
<div class="room-zone room-hotspot" data-room="dream" style="position:absolute;left:72%;top:20%;transform:translate(-50%,-50%);pointer-events:auto;animation-delay:.35s"><span class="zone-icon">🌙</span><span class="hs-label">夢境走廊</span></div>
<div class="room-zone room-hotspot" data-room="garden" style="position:absolute;left:78%;top:55%;transform:translate(-50%,-50%);pointer-events:auto;animation-delay:.65s"><span class="zone-icon">🌸</span><span class="hs-label">記憶花園</span></div>
</div>
</div>

<div style="text-align:center;margin:20px;font-size:1rem;color:var(--navy)">
<p>🔧 測試版本 - 房間點擊修復</p>
<p>請點擊任一房間圖示測試</p>
</div>

</div>
</div>

<script>
// 簡化測試版本
document.addEventListener('DOMContentLoaded', function(){
  console.log('🎮 測試版本載入');

  // 直接顯示遊戲區域
  var gameArea = document.getElementById('gameArea');
  var topbar = document.getElementById('topbar');
  if(gameArea) gameArea.classList.add('active');
  if(topbar) topbar.classList.add('show');

  // 為每個房間添加測試點擊事件
  document.querySelectorAll('.room-zone').forEach(function(room) {
    var roomId = room.dataset.room;
    room.addEventListener('click', function() {
      console.log('✅ 房間點擊成功:', roomId);
      alert('房間點擊成功: ' + roomId + '\n\n這證明修復有效！');
    });

    room.addEventListener('mouseenter', function() {
      console.log('🎯 滑鼠進入房間:', roomId);
    });
  });

  console.log('🎯 找到房間數量:', document.querySelectorAll('.room-zone').length);
});
</script>

<!-- 內在城堡遊戲系統 JS 模組 -->
<script src="assets/js/hl-castle-key.js" defer></script>
<script src="assets/js/hl-castle-decor-v2.js" defer></script>
<script src="assets/js/hl-castle-material.js" defer></script>
<script src="assets/js/hl-castle-pets.js" defer></script>
<script src="assets/js/hl-castle-room-decor.js" defer></script>
<script src="assets/js/hl-castle-sync.js" defer></script>
</body>
</html>
