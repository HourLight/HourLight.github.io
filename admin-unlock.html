<style>
body{background:#faf8f4;color:#2a1f0e;font-family:'Noto Sans TC',sans-serif;padding:0;margin:0}
.admin-wrap{max-width:600px;margin:80px auto 40px;padding:24px}
.admin-title{font-family:'Noto Serif TC',serif;font-size:1.6rem;color:#8b6914;text-align:center;letter-spacing:.15em;margin-bottom:8px}
.admin-subtitle{text-align:center;font-size:.85rem;color:rgba(42,31,14,.5);margin-bottom:32px}
.admin-guard{text-align:center;padding:60px 20px}
.admin-guard .icon{font-size:3rem;margin-bottom:16px}
.admin-guard .msg{color:rgba(42,31,14,.6);font-size:.95rem;margin-bottom:20px}
.admin-guard .btn{display:inline-block;padding:14px 36px;border-radius:40px;background:linear-gradient(135deg,#c9985e,#f0d48a);color:#1a1008;font-size:.95rem;font-weight:600;border:none;cursor:pointer;letter-spacing:.1em}
.gen-section{background:#ffffff;border:1px solid rgba(201,160,96,.2);border-radius:16px;padding:24px;margin-bottom:24px;box-shadow:0 2px 12px rgba(45,36,24,.06)}
.gen-section h3{color:#8b6914;font-size:1rem;margin:0 0 16px;font-weight:700}
.gen-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.gen-row label{font-size:.88rem;color:rgba(42,31,14,.7);min-width:80px}
.gen-row select,.gen-row input{background:#fdf8f2;border:1px solid rgba(201,160,96,.25);border-radius:8px;color:#2a1f0e;padding:10px 14px;font-size:.9rem;font-family:inherit}
.gen-row select{min-width:140px}
.gen-row input{flex:1;min-width:120px}
.gen-btn{display:block;width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,#c9a044,#f0d48a);color:#1a1008;font-size:.95rem;font-weight:700;border:none;cursor:pointer;letter-spacing:.08em;transition:all .3s}
.gen-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(201,160,96,.3)}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.result-box{margin-top:16px;display:none}
.result-code{background:rgba(201,160,96,.08);border:2px dashed rgba(201,160,96,.3);border-radius:12px;padding:20px;text-align:center;margin-bottom:12px}
.result-code .code{font-size:2rem;font-weight:800;color:#8b6914;letter-spacing:.3em;font-family:'Courier New',monospace}
.result-code .hint{font-size:.78rem;color:rgba(42,31,14,.5);margin-top:8px}
.copy-btn{display:block;width:100%;padding:12px;border-radius:10px;border:1px solid rgba(201,160,96,.3);background:transparent;color:#8b6914;font-size:.88rem;cursor:pointer;font-family:inherit;transition:all .3s}
.copy-btn:hover{background:rgba(201,160,96,.08)}
.history-section{margin-top:32px}
.history-section h3{color:#8b6914;font-size:1rem;margin:0 0 16px;font-weight:700}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(42,31,14,.06);font-size:.85rem}
.history-item:last-child{border-bottom:none}
.history-item .code-text{font-family:'Courier New',monospace;color:#8b6914;font-weight:700;letter-spacing:.15em}
.history-item .meta{color:rgba(42,31,14,.5)}
.history-item .used{color:#d05050;font-size:.78rem}
.history-item .unused{color:#4a9060;font-size:.78rem}
.empty-msg{text-align:center;color:rgba(42,31,14,.35);font-size:.85rem;padding:20px}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.97);border:1px solid rgba(201,160,96,.3);color:#8b6914;padding:10px 24px;border-radius:20px;font-size:.85rem;z-index:99999;box-shadow:0 4px 20px rgba(45,36,24,.12);animation:fadeInUp .3s}
@keyframes fadeInUp{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}

/* ── Mobile App Touch Feel ── */
body{-webkit-tap-highlight-color:transparent;overscroll-behavior-y:contain}
button,a,select,input[type=submit],input[type=button]{
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
button:active,input[type=submit]:active{transform:scale(.97);transition:transform .08s}
select,input[type=text],input[type=number],input[type=date],input[type=email],textarea{font-size:16px!important}
@media(max-width:600px){
  body{padding-bottom:calc(72px + env(safe-area-inset-bottom,0px))}
  button,input[type=submit],input[type=button]{min-height:48px}
}
</style>

<body>

<div style="max-width:600px;margin:16px auto 0;padding:0 24px">
  <a href="app.html" style="display:inline-flex;align-items:center;gap:6px;font-size:.85rem;color:#8b6914;text-decoration:none;transition:color .2s;opacity:.7" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='.7'">← 回管理中心</a>
</div>
<div class="admin-wrap">
  <h1 class="admin-title">🔑 解鎖碼管理</h1>
  <p class="admin-subtitle">馥靈智慧牌 AI 解讀｜手動收款後生成解鎖碼給客戶</p>

  <!-- 未登入 guard -->
  <div class="admin-guard" id="guardBlock">
    <div class="icon">🔒</div>
    <div class="msg">僅限管理員使用</div>
    <button class="btn" onclick="doLogin()">登入 Google 帳號</button>
  </div>

  <!-- 主內容（登入後顯示）-->
  <div id="mainContent" style="display:none">

    <div class="gen-section">
      <h3>✨ 生成新的解鎖碼</h3>
      <div class="gen-row">
        <label>服務類型</label>
        <select id="selService" onchange="onServiceChange()">
          <option value="reading" selected>🃏 牌卡 AI 解讀（家族／寵物／阿卡西／元辰宮／前世／姓名）</option>
          <option value="beauty">💅 美甲 / SPA AI 解讀</option>
          <option value="wealth-wallpaper">🌟 馥靈蘊福桌布</option>
        </select>
      </div>
      <div class="gen-row">
        <label id="planLabel">方案張數</label>
        <select id="selPlan">
          <!-- options 由 JS 依服務類型注入 -->
        </select>
      </div>
      <div class="gen-row">
        <label>備註（選填）</label>
        <input type="text" id="inputMemo" placeholder="例：小美 3/23 匯款" maxlength="100"/>
      </div>
      <button class="gen-btn" id="genBtn" onclick="generateCode()">🔑 生成解鎖碼</button>

      <div class="result-box" id="resultBox">
        <div class="result-code">
          <div class="code" id="resultCode"></div>
          <div class="hint" id="resultHint">請將此碼傳給客戶，輸入後即可獲得 AI 解讀</div>
        </div>
        <button class="copy-btn" onclick="copyCode()">📋 複製解鎖碼</button>
      </div>
    </div>

    <div class="history-section">
      <h3>📋 最近生成的解鎖碼（最新 20 筆）</h3>
      <div id="historyList"><div class="empty-msg">載入中⋯⋯</div></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="assets/js/firebase-config.js"></script>
<script src="assets/js/hl-referral.js?v=20260323"></script>
<script>
var ADMIN_EMAILS = []; // 從 Firestore 動態載入
// 服務方案表（n=張數, price=NT$, label=顯示文字, prefix=代碼前綴）
var SERVICE_PLANS = {
  'reading': {
    label: '🃏 牌卡 AI 解讀',
    plans: [
      { n: 3, price: 199, label: '3 張（NT$199）', prefix: 'HRC3' },
      { n: 5, price: 399, label: '5 張（NT$399）', prefix: 'HRC5' },
      { n: 7, price: 599, label: '7 張（NT$599）', prefix: 'HRC7' }
    ]
  },
  'beauty': {
    label: '💅 美甲 / SPA AI 解讀',
    plans: [
      { n: 3, price: 600,  label: '3 張（NT$600）',  prefix: 'BT3' },
      { n: 5, price: 900,  label: '5 張（NT$900）',  prefix: 'BT5' },
      { n: 9, price: 1200, label: '9 張（NT$1,200）', prefix: 'BT9' }
    ]
  },
  'wealth-wallpaper': {
    label: '🌟 馥靈蘊福桌布',
    plans: [
      { n: 1,  price: 199, label: '1 張（NT$199）',   prefix: 'WP1' },
      { n: 3,  price: 399, label: '3 張（NT$399）',   prefix: 'WP3' },
      { n: 6,  price: 599, label: '6 張（NT$599）',   prefix: 'WP6' },
      { n: 12, price: 999, label: '12 張（NT$999）',  prefix: 'WPX' }
    ]
  }
};

// Firebase init
if (typeof FIREBASE_CONFIG !== 'undefined' && !firebase.apps.length) {
  firebase.initializeApp(FIREBASE_CONFIG);
}
var auth = firebase.auth();
var db = firebase.firestore();

function doLogin() {
  var provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(function(err) {
    if (err.code === 'auth/popup-blocked') {
      auth.signInWithRedirect(provider);
    } else {
      alert('登入失敗：' + err.message);
    }
  });
}

auth.onAuthStateChanged(async function(user) {
  // 從 Firestore 載入管理員 email 清單
  if (user) { try { var rs = await db.doc('system/roles').get(); if(rs.exists) ADMIN_EMAILS = rs.data().adminEmails || []; } catch(e){} }
  if (user && ADMIN_EMAILS.includes(user.email.toLowerCase())) {
    document.getElementById('guardBlock').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    onServiceChange(); // 初始化方案下拉
    loadHistory();
  } else if (user) {
    document.getElementById('guardBlock').innerHTML =
      '<div class="icon">⛔</div><div class="msg">此帳號（' + user.email + '）非管理員</div>';
  }
});

// 取得目前選中的方案
function getCurrentPlan() {
  var service = document.getElementById('selService').value;
  var planIdx = parseInt(document.getElementById('selPlan').value);
  var plans = (SERVICE_PLANS[service] || {}).plans || [];
  return { service: service, plan: plans[planIdx] || plans[0] };
}

// 服務切換時，重建 selPlan 下拉
function onServiceChange() {
  var service = document.getElementById('selService').value;
  var plans = (SERVICE_PLANS[service] || {}).plans || [];
  var selPlan = document.getElementById('selPlan');
  selPlan.innerHTML = '';
  plans.forEach(function(p, idx) {
    var opt = document.createElement('option');
    opt.value = idx;
    opt.textContent = p.label;
    selPlan.appendChild(opt);
  });
}

// 生成 6 位碼（英數混合，去掉容易混淆的字元）
function makeCode(prefix) {
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var rand = '';
  for (var i = 0; i < 6; i++) {
    rand += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return (prefix || 'HL') + '-' + rand;
}

async function generateCode() {
  var btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.textContent = '生成中⋯⋯';

  try {
    var picked = getCurrentPlan();
    if (!picked.plan) throw new Error('未選擇方案');
    var memo = document.getElementById('inputMemo').value.trim();
    var code = makeCode(picked.plan.prefix);
    var user = auth.currentUser;

    // 檢查碼是否重複（極小機率）
    var existing = await db.collection('reading_codes').doc(code).get();
    if (existing.exists) code = makeCode(picked.plan.prefix);

    await db.collection('reading_codes').doc(code).set({
      service: picked.service,
      n: picked.plan.n,
      spreads: picked.plan.n,
      price: picked.plan.price,
      used: false,
      memo: memo,
      createdBy: user.email,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    document.getElementById('resultCode').textContent = code;
    document.getElementById('resultHint').textContent =
      '此碼適用：' + (SERVICE_PLANS[picked.service] || {}).label + '｜' + picked.plan.label;
    document.getElementById('resultBox').style.display = 'block';
    // 自動複製到剪貼簿（單手作業優化）
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(code);
        showToast('✅ 已產生並複製：' + code);
      } else {
        showToast('解鎖碼已生成：' + code);
      }
    } catch(_) {
      showToast('解鎖碼已生成：' + code);
    }
    loadHistory();

  } catch (err) {
    alert('生成失敗：' + err.message);
  }

  btn.disabled = false;
  btn.textContent = '🔑 生成解鎖碼';
}

function copyCode() {
  var code = document.getElementById('resultCode').textContent;
  navigator.clipboard.writeText(code).then(function() {
    showToast('已複製：' + code);
  });
}

async function loadHistory() {
  var listEl = document.getElementById('historyList');
  try {
    var snap = await db.collection('reading_codes')
      .orderBy('createdAt', 'desc')
      .limit(50)
      .get();

    if (snap.empty) {
      listEl.innerHTML = '<div class="empty-msg">尚無解鎖碼記錄</div>';
      return;
    }

    var serviceIcons = { 'reading':'🃏', 'beauty':'💅', 'wealth-wallpaper':'🌟' };
    var serviceLabels = { 'reading':'牌卡解讀', 'beauty':'美甲/SPA', 'wealth-wallpaper':'蘊福桌布' };
    var html = '';
    snap.forEach(function(doc) {
      var d = doc.data();
      var codeId = doc.id;
      var n = d.n || d.spreads || '?';
      var price = d.price || 0;
      var svc = d.service || 'reading';
      var icon = serviceIcons[svc] || '🃏';
      var svcLabel = serviceLabels[svc] || '牌卡解讀';
      var status = d.used
        ? '<span class="used">✗ 已使用</span>'
        : '<span class="unused">✓ 未使用</span>';
      var usedInfo = '';
      if (d.used && d.usedBy) usedInfo = '<br>使用：' + (d.usedAt ? new Date(d.usedAt.seconds * 1000).toLocaleString('zh-TW', {timeZone:'Asia/Taipei'}) : '') + '（' + d.usedBy + '）';
      var date = d.createdAt ? new Date(d.createdAt.seconds * 1000).toLocaleString('zh-TW', {timeZone:'Asia/Taipei'}) : '';
      var memo = d.memo ? '<br>備註：' + d.memo : '';
      var source = d.source ? ' · ' + d.source : '';
      html += '<div class="history-item">'
        + '<div><span class="code-text">' + codeId + '</span></div>'
        + '<div class="meta">' + icon + ' ' + svcLabel + ' · ' + n + '張 $' + price + source + '<br>' + status + memo + '<br>建立：' + date + usedInfo + '</div>'
        + '</div>';
    });
    listEl.innerHTML = html;

  } catch (err) {
    listEl.innerHTML = '<div class="empty-msg">載入失敗：' + err.message + '</div>';
  }
}

function showToast(msg) {
  var t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 2000);
}
</script>
</body>
</html>
