<div class="quiz-wrap">
  <div class="quiz-hero">

<script>
const questions=[
  // COM=溝通 x4
  {dim:'COM',q:'你們能自在地說出不開心的事，不用擔心對方反應。'},
  {dim:'COM',q:'吵架的時候，你們最終能把話說清楚（不是冷戰收場）。'},
  {dim:'COM',q:'對方能聽懂你真正在意的是什麼，不只聽表面。'},
  {dim:'COM',q:'你們溝通的時候，正面互動遠多於負面互動。'},
  // TRU=信任 x4
  {dim:'TRU',q:'你相信對方不在你面前的時候，不會做傷害關係的事。'},
  {dim:'TRU',q:'你們之間沒有需要隱瞞的重要事情。'},
  {dim:'TRU',q:'你覺得對方說的話是可以信的。'},
  {dim:'TRU',q:'即使意見不同，你相信對方是站在你這邊的。'},
  // INT=親密 x4
  {dim:'INT',q:'你們有足夠的身體接觸（牽手、擁抱、或只是靠在一起）。'},
  {dim:'INT',q:'你在對方面前可以完全做自己，不用演。'},
  {dim:'INT',q:'你們會分享只有彼此知道的事情。'},
  {dim:'INT',q:'你覺得在這段關係裡被「看見」了。'},
  // CON=衝突 x4（反向：高分=健康的衝突處理）
  {dim:'CON',q:'你們吵架不會翻舊帳或人身攻擊。'},
  {dim:'CON',q:'衝突之後你們能修復關係，不是一直僵著。'},
  {dim:'CON',q:'你們的衝突大多能找到雙方都能接受的解法。'},
  {dim:'CON',q:'吵架之後你不會懷疑「這段關係是不是完了」。'},
  // GRO=成長 x4
  {dim:'GRO',q:'你們在一起之後，你覺得自己變成了更好的人。'},
  {dim:'GRO',q:'你們會支持彼此的個人目標，即使不完全理解。'},
  {dim:'GRO',q:'你覺得這段關係讓你的世界變大了，不是變小了。'},
  {dim:'GRO',q:'你們對未來有共同的想像，即使細節不同。'},
];

const likertLabels=['完全不是','大概不是','中間','大概是','完全是'];
let answers={},currentQ=0;

function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const btns=[1,2,3,4,5].map(v=>`<button class="likert-btn${answers[i]===v?' selected':''}" onclick="selectAnswer(${i},${v},this)">${v}</button>`).join('');
    card.innerHTML=`<div class="quiz-q-num">第 ${i+1} 題 / ${questions.length}</div><div class="quiz-question">${qd.q}</div><div class="likert-wrap"><div class="likert-labels">${likertLabels.map(l=>`<span>${l}</span>`).join('')}</div><div class="likert-row">${btns}</div></div><div class="quiz-nav">${i>0?`<button class="btn-prev" onclick="goTo(${i-1})">← 上一題</button>`:'<span></span>'}${i<questions.length-1?`<button class="btn-next" id="btnNext-${i}" ${answers[i]===undefined?'disabled':''} onclick="goTo(${i+1})">下一題 →</button>`:`<button class="btn-next" id="btnNext-${i}" ${answers[i]===undefined?'disabled':''} onclick="showResult()">看我的關係儀表板 💑</button>`}</div>`;
    area.appendChild(card);
  });updateProgress(idx);
}
function selectAnswer(qi,v,btn){answers[qi]=v;document.getElementById('qcard-'+qi).querySelectorAll('.likert-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent=`第 ${idx+1} 題，共 ${questions.length} 題`;document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}

function showResult(){
  const raw={COM:0,TRU:0,INT:0,CON:0,GRO:0};
  questions.forEach((qd,i)=>{raw[qd.dim]+=(answers[i]||3);});
  const pct={};['COM','TRU','INT','CON','GRO'].forEach(d=>{pct[d]=Math.round((raw[d]-4)/16*100);});
  const avg=Math.round(Object.values(pct).reduce((a,b)=>a+b,0)/5);
  const sorted=Object.entries(pct).sort((a,b)=>b[1]-a[1]);
  const strongest=sorted[0][0];
  const weakest=sorted[sorted.length-1][0];

  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';

  const dimNames={COM:'溝通品質',TRU:'信任基礎',INT:'親密連結',CON:'衝突修復',GRO:'共同成長'};
  const dimIcons={COM:'💬',TRU:'🛡️',INT:'💕',CON:'🔧',GRO:'🌱'};
  const dimColors={COM:'#f4a340',TRU:'#5dba8a',INT:'#e9739c',CON:'#6a9fd8',GRO:'#9c6edb'};

  // Status metaphor
  let status,statusIcon,statusDesc,castle,hour,oil;
  if(avg>=75){status='暖陽運轉中';statusIcon='☀️';statusDesc='你的關係引擎運轉良好。五個維度都在健康區間。這不代表沒有問題，代表你們有足夠的資源去面對問題。';castle='休憩塔（H 區）';hour='Heal ✦ 身心校準';oil='天竺葵 · 佛手柑';}
  else if(avg>=50){status='部分指示燈亮起';statusIcon='🌤️';statusDesc='你的關係大致還在軌道上，但有幾個維度需要注意。不是警報，是提醒。就像汽車儀表板上的小黃燈——不用馬上停車，但該進廠看一下了。';castle='覺察廳（O 區）';hour='Own ✦ 智慧辨識';oil='薰衣草 · 迷迭香';}
  else if(avg>=25){status='需要進廠保養';statusIcon='🌥️';statusDesc='好幾個維度亮了紅燈。這不是說你的關係完蛋了——很多關係都曾經到過這裡。重點是你願不願意正視它、修理它。覺察是修復的第一步。';castle='休憩塔（H 區）';hour='Heal ✦ 身心校準';oil='岩蘭草 · 乳香';}
  else{status='重新評估期';statusIcon='🌧️';statusDesc='你的關係正在經歷很大的壓力。這個結果不是判決，是一面鏡子。看清楚了之後，選擇權在你手上：進廠大修、尋求專業協助、或是做出其他選擇。';castle='覺察廳（O 區）';hour='Own ✦ 智慧辨識';oil='洋甘菊 · 雪松';}

  document.getElementById('hlTitleReveal').innerHTML=`<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥靈之鑰</div><div class="ss-icon">${statusIcon}</div><div class="ss-title">${status}</div><div class="ss-sub">${dimNames[strongest]}最穩 · ${dimNames[weakest]}最需要注意</div><div class="ss-tags"><span class="ss-tag">${castle}</span><span class="ss-tag">關係健康度 ${avg}%</span></div><div class="ss-quote">「愛不是一張考卷。愛是你明知道不及格，還願意把筆遞給他。」</div><div class="ss-footer">hourlightkey.com ✦ 你的城堡，你的鑰匙</div></div><div class="hl-title-card"><div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div><div class="hl-title-eyebrow">Hour Light ✦ 關係儀表板</div><span class="hl-title-icon">${statusIcon}</span><div class="hl-title-main">${status}</div><div class="hl-title-sub">${statusDesc}</div><div class="hl-title-divider"></div><div class="hl-title-grid"><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 城堡守護宮</div><div class="hl-title-tag-value">${castle}</div></div><div class="hl-title-tag"><div class="hl-title-tag-label">✦ H.O.U.R. 建議</div><div class="hl-title-tag-value">${hour}</div></div><div class="hl-title-tag" style="grid-column:1/-1"><div class="hl-title-tag-label">✦ 你的精油指引</div><div class="hl-title-tag-value">🌿 ${oil}</div></div></div><div class="hl-title-quote">「看見了，才有機會選擇。」</div><div class="hl-title-combo-hint">關係健康度 ${avg}%</div></div>`;

  document.getElementById('resultHero').innerHTML=`<span class="result-hero-icon">${statusIcon}</span><div class="result-type-label">關係儀表板 Relationship Dashboard</div><div class="result-combo-name">${status}</div><div class="result-subtitle">最穩：${dimNames[strongest]} · 最需關注：${dimNames[weakest]}</div>`;

  document.getElementById('dimBars').innerHTML=['COM','TRU','INT','CON','GRO'].map(d=>{
    const light=pct[d]>=65?'🟢':pct[d]>=40?'🟡':'🔴';
    return `<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>${dimIcons[d]} ${dimNames[d]} ${light}</strong></span><span class="ocean-score">${pct[d]}%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:${pct[d]}%;background:${dimColors[d]}"></div></div></div>`;
  }).join('');

  const descs={
    COM:{h:s=>s>=65?'你們的溝通品質很好。能說真話、能聽得懂、而且正面互動的比例遠超過負面的。根據 Gottman 的 5:1 法則，這是關係健康的關鍵指標。':s>=40?'溝通還可以，但有些話你可能還是吞下去了。試著在安全的時候多說一句：「其實我真正在意的是⋯」':'你們的溝通需要升級。可能有太多冷戰、太多誤解、或太多話說不出口。第一步：找一個雙方都放鬆的時刻，練習只「聽」不「回應」。'},
    TRU:{h:s=>s>=65?'你們的信任基礎很穩固。你相信對方，即使看不到的時候也安心。這是關係最珍貴的資產。':s>=40?'信任大致還在，但偶爾會搖晃。可能有些小事累積成了懷疑。試著在不安的時候直接問，而不是自己腦補。':'信任正在流失。這可能是累積的結果，也可能是某個事件造成的裂痕。修復信任需要時間和誠實——雙方都是。'},
    INT:{h:s=>s>=65?'你們的親密連結很深。你在這段關係裡感到被看見、被接納、可以做自己。這是關係最溫暖的部分。':s>=40?'親密感還在，但可能有一些距離正在悄悄拉開。你們上一次只是安靜地在一起，不做任何事，是什麼時候？':'親密連結正在弱化。你可能覺得在對方面前需要「演」，或者很久沒有真正被看見了。重新建立親密，不需要大動作，需要小瞬間。'},
    CON:{h:s=>s>=65?'你們處理衝突的方式很健康。吵架歸吵架，但能修復、能解決、不會留下長期傷害。':s>=40?'衝突處理還行，但有些模式可能在重複。你們有沒有注意到總是因為同一件事吵？那個「同一件事」底下藏的東西，才是真正需要被看見的。':'衝突是你們關係裡最大的壓力源。可能有翻舊帳、人身攻擊、或者乾脆不吵了（但問題還在）。找一個你們都信任的第三方聊聊，可能會有幫助。'},
    GRO:{h:s=>s>=65?'你們在一起後各自都在成長，而且是正向的成長。這段關係讓你們的世界變大了。這是最理想的狀態。':s>=40?'有成長但也有卡點。可能有一方覺得被限制了，或者對未來的想像不太一致。試著問對方：「你理想中五年後的我們是什麼樣子？」':'你覺得在這段關係裡變小了，或者停滯了。這需要認真面對：是環境的問題、溝通的問題，還是你們本來就要往不同方向走？覺察是第一步。'}
  };
  document.getElementById('resultSections').innerHTML=['COM','TRU','INT','CON','GRO'].map(d=>`<div class="result-section"><div class="result-section-title">${dimIcons[d]} ${dimNames[d]}（${pct[d]}%）</div><div class="result-section-content">${descs[d].h(pct[d])}</div></div>`).join('');

  document.getElementById('resultHour').innerHTML=`<div class="hour-bridge-label">✦ 馥靈之鑰 × 你的關係覺察</div><div class="hour-bridge-text">關係不是考證照，沒有絕對的及格線。它是兩個人不斷磨合彼此出廠配置的過程。馥靈之鑰幫你看清現在的狀態，然後把選擇權還給你。</div><a href="draw-hl.html" class="hour-bridge-cta">抽一張牌，問問你的心 💑</a>`;
  document.getElementById('quizResult').classList.add('active');window.scrollTo({top:0,behavior:'smooth'});
  try{localStorage.setItem('hl_quiz_relationship',JSON.stringify({status,avg,pcts:pct,strongest,weakest,ts:Date.now()}));}catch(e){}
}
