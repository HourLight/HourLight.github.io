const questions=[
  {q:'菜單上有 50 道菜，服務生站在旁邊等你點餐。你的狀態是？',opts:[
    {t:'翻一翻，第一眼被吸引的就點了',a:'gut'},
    {t:'先看熱門推薦和Google評論再決定',a:'data'},
    {t:'翻了三遍還是不知道要吃什麼，最後請同桌幫我選',a:'stuck'},
    {t:'手指隨便一指，吃什麼都行',a:'flow'},
    {t:'研究食材、熱量、CP值，選出最完美的那道',a:'perfect'},
    {t:'直接點最貴的，吃完才想到錢包在哭',a:'impulse'}]},
  {q:'你接到兩個工作邀約，條件各有優劣。你的第一反應是？',opts:[
    {t:'心裡已經有答案了，只是需要一個理由說服自己',a:'gut'},
    {t:'列表比較薪資、發展、通勤時間、文化⋯',a:'data'},
    {t:'問了十個人意見，每個人說的都不一樣，更迷了',a:'stuck'},
    {t:'哪個先回覆我就去哪個',a:'flow'},
    {t:'不斷想「會不會有更好的機會？」遲遲不回覆',a:'perfect'},
    {t:'興奮地接了一個，三天後開始後悔',a:'impulse'}]},
  {q:'你在網購看到一件衣服很喜歡，有三個顏色可選。你會？',opts:[
    {t:'直覺告訴你哪個色，買了',a:'gut'},
    {t:'查穿搭文、看買家秀、對比色系再選',a:'data'},
    {t:'三個都加購物車，然後一個都不結帳',a:'stuck'},
    {t:'隨便選一個，反正穿起來差不多',a:'flow'},
    {t:'三個都買回來比較，留最完美的退兩個',a:'perfect'},
    {t:'三個都買了，告訴自己反正可以退',a:'impulse'}]},
  {q:'朋友約你週末出去，但你也想在家休息。你的內心戲是？',opts:[
    {t:'身體已經替你決定了。想去就去，不想去就不去',a:'gut'},
    {t:'衡量上次拒絕是什麼時候、這次不去會不會影響友誼',a:'data'},
    {t:'想了一整天還是不知道要去還是不去',a:'stuck'},
    {t:'到時候再說，看那天的心情',a:'flow'},
    {t:'想找到一個「去了不後悔、不去也不愧疚」的完美選擇',a:'perfect'},
    {t:'秒回「好啊！」然後週六早上開始後悔',a:'impulse'}]},
  {q:'你搬家找新房子，看了十幾間都沒有決定。通常卡在哪？',opts:[
    {t:'其實第三間就有感覺了，但朋友說再看看',a:'gut'},
    {t:'還在比較坪數單價、周邊機能、未來增值空間',a:'data'},
    {t:'每間都有優缺點，沒有一間讓你100%滿意',a:'stuck'},
    {t:'其實哪間都行，有人幫你選你就住了',a:'flow'},
    {t:'一直覺得「下一間會更好」，所以遲遲不簽約',a:'perfect'},
    {t:'看到一間陽台view很美就衝動簽了，入住才發現隔音差',a:'impulse'}]},
  {q:'人生中某個重大決定（離職/分手/搬家），你最後是怎麼做的？',opts:[
    {t:'某天突然「就是現在」，然後真的做了',a:'gut'},
    {t:'做了完整的利弊分析才行動',a:'data'},
    {t:'拖了很久很久，最後是被外力推著才動的',a:'stuck'},
    {t:'順其自然走到那一步的',a:'flow'},
    {t:'反覆推演每一種可能的結果，才終於動手',a:'perfect'},
    {t:'情緒上來就做了，後來覺得太衝動但已經無法回頭',a:'impulse'}]},
  {q:'你去旅行，行程規劃通常是？',opts:[
    {t:'大方向有，細節到了再說，隨機最好玩',a:'gut'},
    {t:'Excel檔、Google Map標記、交通時刻表一應俱全',a:'data'},
    {t:'花了很多時間規劃但一直改，最後帶著半成品出發',a:'stuck'},
    {t:'跟著走就好，別人安排什麼我就去什麼',a:'flow'},
    {t:'每個景點都查了三篇遊記，安排到分鐘級別',a:'perfect'},
    {t:'機票買了再說，其他到了再想',a:'impulse'}]},
  {q:'你做了一個選擇之後，通常的心理狀態是？',opts:[
    {t:'很少回頭看，做了就做了',a:'gut'},
    {t:'會追蹤結果，確認自己的分析是否正確',a:'data'},
    {t:'開始焦慮「另一個選擇是不是比較好」',a:'stuck'},
    {t:'不太在意，反正都會有路',a:'flow'},
    {t:'持續檢視自己的決定有沒有瑕疵',a:'perfect'},
    {t:'一開始很嗨，過幾天開始後悔',a:'impulse'}]},

    {t:'我不做五年計畫，但我知道方向在哪',a:'gut'},

    {t:'⋯我連明天中午要吃什麼都不知道',a:'stuck'},

const TYPES={
  gut:{name:'直覺秒決型',icon:'⚡',sub:'你的身體比腦子先知道答案',
    desc:'你做選擇的速度讓身邊的人佩服又害怕。「直覺」是你的導航系統，你相信身體給你的訊號。問題是，你有時候分不清楚「直覺」和「衝動」的差別。',
    detail:'直覺秒決型的人通常是經驗豐富的「快速判斷者」。你的大腦在意識層之下已經做完了運算，然後把結果用「感覺」的方式送到你面前。\n\n你的直覺大部分時候是準的，因為它不是亂猜，是你過去所有經驗的濃縮。\n\n但要注意一件事：當你面對的是一個全新的、你沒有經驗值的領域時，你的「直覺」可能只是焦慮或偏見的化名。比如你第一次投資就「感覺」某支股票會漲，那不是直覺，那是幻覺。\n\n你最大的風險是：太快做決定，快到忘了問自己「我是真的有感覺，還是只是不想再想了？」\n\n試一次：下次直覺告訴你答案的時候，給自己 24 小時。如果隔天那個感覺還在，那就是真的直覺。',
    oil:'迷迭香 × 檸檬 × 岩蘭草',
    oilDetail:'迷迭香的桉油醇和樟腦活化前額葉的判斷功能，讓你的直覺不只是快，還準。檸檬的檸檬烯帶來清晰的覺察力，幫你分辨「直覺」和「急躁」。岩蘭草的岩蘭草醇把你的根往下扎，讓你在快速決策之前多接一秒地氣。\n\n調配建議：基底油 10ml＋迷迭香 2 滴＋檸檬 2 滴＋岩蘭草 1 滴。檸檬有光敏性。孕婦避免使用迷迭香。',
    med:'「直覺校準呼吸」\n\n下次你要做一個決定的時候：\n\n1. 把兩個選項分別放在左手和右手（想像的就好）\n2. 吸氣 4 秒：感覺哪一隻手比較重\n3. 吐氣 6 秒：問自己「這個重量是直覺還是習慣？」\n4. 吸氣 4 秒：如果是直覺，它會穩穩的。如果是習慣或衝動，它會有點慌\n5. 吐氣 6 秒：做你的決定\n\n做 3 輪。\n\n這個練習不是讓你變慢，是讓你的快更精準。',
    closing:'你的直覺是一把好刀。但好刀也需要偶爾磨一下。不是每個快速的決定都是好決定，但你分得出來的。你只需要多給自己一秒的安靜。'},
  data:{name:'資料控分析型',icon:'📊',sub:'你的Excel比你的心先做好決定',
    desc:'你做選擇之前一定要蒐集夠多的資訊。Google、PTT、Dcard、YouTube評測，全部看過一輪才敢動。你不是優柔寡斷，你只是覺得「資訊不足的決定不算決定」。',
    detail:'資料控型的人做出來的決定通常品質很高。你的分析能力強，風險評估到位，很少因為衝動踩雷。\n\n但你的問題是：你可能永遠覺得資料不夠。\n\n多看一篇評測、多比較一個選項、多問一個人的意見⋯你以為自己在「謹慎」，但也許你只是在「拖延做決定」。因為做決定意味著承擔後果，而你害怕的不是選錯，是「明明可以做更多研究卻沒有做，然後選錯」的那種自責感。\n\n另一個你可能不想承認的事：有些決定，資料是幫不了你的。選什麼工作可以分析，但要不要跟一個人在一起？那是心的事，不是Excel的事。\n\n試一次：下一次做決定的時候，設定一個截止時間。到了就選。不管資料蒐集到幾成。80%的資訊就夠了，剩下20%用經驗和勇氣補。',
    oil:'佛手柑 × 甜橙 × 檀香',
    oilDetail:'佛手柑的乙酸沉香酯放鬆前額葉的「必須完美」執念，讓你的大腦接受「夠好」就是好。甜橙的檸檬烯打開邊緣系統裡被壓抑的直覺通道，讓你的分析多一個維度：感覺。檀香的 α-檀香醇穩定你在「資料不足」時的焦慮感。\n\n調配建議：基底油 10ml＋佛手柑 2 滴＋甜橙 2 滴＋檀香 1 滴。佛手柑有光敏性。',
    med:'「關掉搜尋引擎」冥想\n\n找一個安靜的地方。關掉手機。\n\n1. 吸氣 4 秒：想像你面前有一個決定要做，但Google壞了、PTT關站了、沒有任何人可以問\n2. 吐氣 6 秒：只剩你自己。你身體裡的哪個地方有感覺？胸口？肚子？手心？\n3. 吸氣 4 秒：那個感覺在說什麼？不用翻譯成邏輯，讓它用它自己的語言說\n4. 吐氣 6 秒：對自己說「我已經知道答案了，我只是不敢相信自己」\n\n做 4 輪。\n\n數據是地圖，但地圖不會替你走路。',
    closing:'你的謹慎是一種珍貴的能力。但別讓蒐集資料變成不敢做決定的藉口。有時候最重要的資料，是你心裡那個你一直忽略的聲音。'},
  stuck:{name:'選擇困難症型',icon:'😵‍💫',sub:'困住你的是選錯的恐懼，不是選擇的能力',
    desc:'你在火鍋店選鍋底可以選十分鐘。不是因為你沒有偏好，是因為你太害怕做了一個「不是最好」的選擇。每一個選項在你眼裡都有利有弊，而你想要一個百分之百不會後悔的答案。但那個答案不存在。',
    detail:'選擇困難症型的人通常很聰明，你能看到每一個選項的好與壞。這是你的天賦，也是你的詛咒。\n\n因為你看得太清楚了，所以每個選擇都有缺陷。而你受不了缺陷。你想要完美的決定，但完美的決定根本不存在。\n\n更深的問題是：你把「選錯」等於「我這個人很糟」。別人選錯了可以笑著說「踩雷了」，你選錯了會反覆自責三個月。所以你寧可不選，也不要面對選錯之後的自己。\n\n但你知道嗎？不選也是一種選擇。而且通常是最差的那種。因為「不選」意味著你把決定權交給了時間、運氣、或別人。你以為你在避免風險，但你放棄了掌控。\n\n試一次：今天午餐，5秒內決定。不管選了什麼，告訴自己「這就是最好的選擇，因為是我選的」。',
    oil:'薄荷 × 迷迭香 × 甜橙',
    oilDetail:'薄荷的薄荷醇像一記清脆的彈指，把你從「再想一下、再想一下」的迴圈裡彈出來。迷迭香的桉油醇活化前額葉的執行功能，讓你從「分析」模式切換到「行動」模式。甜橙的檸檬烯降低「選錯了怎麼辦」的焦慮，讓你的邊緣系統放鬆一點。\n\n調配建議：基底油 10ml＋薄荷 1 滴＋迷迭香 2 滴＋甜橙 2 滴。',
    med:'「丟硬幣覺察法」\n\n不是要你用硬幣做決定。是要你用硬幣看見你的答案。\n\n1. 在心裡設定：正面是A，反面是B\n2. 吸氣 4 秒：把硬幣（想像的）往上拋\n3. 在硬幣還在空中的那一秒，注意你心裡在祈禱哪一面朝上\n4. 吐氣 6 秒：那個你祈禱的方向，就是你真正的答案\n\n你從來就不是不知道答案。你只是不相信自己知道。\n\n做 1 輪就夠了。答案在硬幣離開你手的那一秒就出現了。',
    closing:'你不需要完美的選擇。你需要的是：選了之後把它變完美的能力。而那個能力，你早就有了。你只是被恐懼遮住了眼睛。'},
  flow:{name:'隨緣佛系型',icon:'🌊',sub:'你不選，你等',
    desc:'你的人生哲學是「該來的會來」。你不太主動做選擇，你等選擇來找你。有時候這是智慧，有時候這是你把方向盤交給了全世界，除了你自己。',
    detail:'佛系型的人壓力很小，因為你不把「選擇」當成一件很重要的事。你覺得大部分的事情都差不多，沒什麼好糾結的。\n\n這種態度在小事上很管用。午餐吃什麼、衣服穿哪件、週末去哪玩，隨緣就好。但在大事上呢？\n\n你的「隨緣」有沒有讓你錯過一些你其實很想要的東西？一個你很想但沒有主動爭取的機會，一段你很喜歡但沒有主動靠近的關係，一個你很嚮往但覺得「算了太麻煩」的夢想？\n\n佛系和消極只差一個念頭：佛系是「我接受結果」，消極是「我放棄選擇」。你是前者還是後者，只有你自己知道。\n\n試一次：今天找一件小事，主動做選擇。不問別人、不等別人安排。你來決定。看看那種「掌控感」是什麼滋味。',
    oil:'薑 × 黑胡椒 × 葡萄柚',
    oilDetail:'薑的薑烯和薑酮是天然的「行動啟動劑」，在你的邊緣系統裡點一把小火，讓你的身體想動。黑胡椒的胡椒鹼活化交感神經，給你一點「我想做點什麼」的衝勁。葡萄柚的諾卡酮讓你的大腦從「都可以」切換到「我要這個」。\n\n調配建議：基底油 10ml＋薑 2 滴＋黑胡椒 1 滴＋葡萄柚 2 滴。黑胡椒和薑對皮膚有溫熱感，敏感肌減量。',
    med:'「我要」呼吸法\n\n坐直。眼睛張開。\n\n1. 吸氣 4 秒：想一件你想要但從來沒有主動爭取的事\n2. 憋氣 3 秒：在心裡說「我要」。不是「也許」、不是「看看」，是「我要」\n3. 吐氣 6 秒：想像你站起來，走向那個東西。你的腳踏在地上，每一步都是你自己選的\n\n做 5 輪。\n\n最後一輪的「我要」說出聲來。讓你的耳朵也聽到。\n\n「隨緣」是一種選擇。但「隨緣」本身也是你選的。既然你有選的能力，就用一次。',
    closing:'真正的自在不是不做選擇，是做了選擇之後不執著結果。你的「隨緣」如果是放下，那是智慧。如果是放棄，那就值得再想想。'},
  perfect:{name:'完美主義型',icon:'🔍',sub:'你一直在等一個不存在的最佳解',
    desc:'你不是選擇困難，你是標準太高。你的每一個決定都要經過嚴格的品質管控，任何瑕疵都是不及格。問題是，在你追求完美的路上，很多「夠好」的機會已經走掉了。',
    detail:'完美主義型的人做出來的決定品質極高。但你做出決定的速度極慢。\n\n因為你心裡有一個標準是：如果不是最好的，那就不值得選。所以你一直在比較、一直在等待、一直在尋找那個100分的選項。但100分不存在。\n\n你的完美主義可能來自一個很深的信念：「如果我選了一個不完美的東西，就代表我這個人不夠好。」所以每一次選擇都像一場考試，而你不允許自己考不到滿分。\n\n但人生不是考試。有些最好的東西，是在你接受「不完美」的那一刻出現的。那間不完美但溫暖的房子、那個不完美但真心的伴侶、那份不完美但讓你有成就感的工作。\n\n試一次：下次做決定的時候，把標準從100分降到80分。然後看看80分的人生，是不是比等待100分的焦慮好活多了。',
    oil:'乳香 × 佛手柑 × 天竺葵',
    oilDetail:'乳香的乳香酸降低前額葉的「不夠不夠」警報，讓你的大腦接受「夠好就是好」。佛手柑的乙酸沉香酯放鬆邊緣系統的焦慮感，讓「不完美」這件事不再那麼讓人恐懼。天竺葵的香茅醇平衡自律神經，讓你從「追求完美」的緊繃裡鬆開。\n\n調配建議：基底油 10ml＋乳香 2 滴＋佛手柑 2 滴＋天竺葵 1 滴。',
    med:'「80分就走」冥想\n\n閉上眼睛。\n\n1. 吸氣 4 秒：想像你面前有一條路，路的盡頭寫著「100分」\n2. 吐氣 6 秒：注意看，那條路沒有終點。100分永遠在更遠的地方\n3. 吸氣 4 秒：現在看看路邊，在你身旁，有一個寫著「80分」的門\n4. 吐氣 6 秒：打開那扇門。裡面有陽光、有笑聲、有一杯溫熱的咖啡。不完美，但足夠好\n5. 自然呼吸 10 秒：對自己說「80分的人生比100分的等待更值得活」\n\n做 4 輪。',
    closing:'你對品質的堅持是了不起的。但不完美不是失敗，是留白。最好的畫作都有留白。最好的人生也是。'},
  impulse:{name:'衝動後悔型',icon:'🎢',sub:'你做選擇用感覺，後悔用理智',
    desc:'你是那個秒下單、秒報名、秒辭職的人。做的時候熱血沸騰，過了三天冷靜下來開始懊悔。你的人生軌跡像雲霄飛車：刺激，但也暈。',
    detail:'衝動後悔型的人活得很精彩，但也很累。因為你不只要承受選擇的後果，還要承受後悔的重量。\n\n你的決策模式是：情緒先行，理智善後。高興的時候什麼都敢說yes，冷靜下來才發現自己答應了一堆做不到的事。\n\n更深一層看：你的衝動可能是一種「不想面對不確定性」的策略。與其在猶豫中煎熬，不如直接跳下去。至少跳下去之後就不用再想了。但你跳下去之後開始後悔，後悔比猶豫更痛。\n\n你最需要的不是「想清楚再做」（你做不到），而是一個簡單的緩衝機制。不用很長，24小時就好。衝動來的時候先放著，明天還想做的才是真的想做。\n\n試一次：手機設一個鬧鐘，名字叫「你確定？」。每次做重大決定之前先等這個鬧鐘響。',
    oil:'薰衣草 × 雪松 × 檀香',
    oilDetail:'薰衣草的沉香醇和乙酸沉香酯是天然的「冷靜鍵」，降低杏仁核的衝動反應，在你按下「確認購買」之前多給你三秒。雪松的倍半萜烯穩定邊緣系統的情緒波動，讓你的「想要」不會每次都贏過你的「需要」。檀香的 α-檀香醇活化前額葉的判斷功能，讓理智不只在後悔的時候才上班。\n\n調配建議：基底油 10ml＋薰衣草 2 滴＋雪松 2 滴＋檀香 1 滴。',
    med:'「明天再說」呼吸法\n\n當你突然很想做一個決定的時候（衝動來了）：\n\n1. 把手從手機/鍵盤/錢包上拿開\n2. 吸氣 4 秒：問自己「這個感覺是持續的，還是三分鐘前才開始的？」\n3. 吐氣 6 秒：如果是三分鐘前開始的，它可能只是情緒，不是決定\n4. 吸氣 4 秒：對自己說「如果明天我還想做，我就做。但今天，放著」\n5. 吐氣 6 秒：走開。去喝一杯水。等到明天\n\n做 3 輪。\n\n如果明天醒來還想做，那就去做。不用後悔。因為那是「你」的決定，不是「你的情緒」的決定。',
    closing:'你的行動力是很多人羨慕的。大部分人想太多做太少，你是做太多想太少。兩個都不完美，但你的版本至少比較精彩。'}
};

let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const optsHTML='<div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]===o.a?' selected':'')+'" onclick="selectOpt('+i+',\''+o.a+'\',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 題 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一題</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一題 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看我的決策風格 🎲</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,a,btn){answers[qi]=a;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 題，共 '+questions.length+' 題';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const scores={};Object.keys(TYPES).forEach(k=>{scores[k]=0;});
  Object.values(answers).forEach(a=>{scores[a]=(scores[a]||0)+1;});
  const sorted=Object.keys(TYPES).sort((a,b)=>scores[b]-scores[a]);
  const topType=sorted[0],f=TYPES[topType],f2=TYPES[sorted[1]];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('screenshotCard').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥靈之鑰</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-tags"><span class="ss-tag">決策模式覺察</span><span class="ss-tag">'+f.name+'</span></div><div class="ss-quote">「'+f.closing+'」</div><div class="ss-footer">hourlightkey.com ✦ 讀懂自己，活對人生</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">決策模式覺察 Decision Pattern</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var tp=TYPES[k],pct=Math.round(scores[k]/questions.length*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+tp.icon+' '+tp.name+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">🎲 你的決策模式</div><div class="result-section-content">'+f.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度解析</div><div class="result-section-content">'+f.detail.replace(/\n/g,'<br>')+'</div></div>'+(f2?'<div class="result-section"><div class="result-section-title">'+f2.icon+' 副型：'+f2.name+'（'+f2.sub+'）</div><div class="result-section-content">'+f2.desc+'</div></div>':'')+'<div class="result-section"><div class="result-section-title">🌿 認知芳療建議：'+f.oil+'</div><div class="result-section-content">'+f.oilDetail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🧘 冥想練習（60-90秒）</div><div class="result-section-content">'+f.med.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">✦ 馥靈收束語</div><div class="result-section-content" style="font-family:LXGW WenKai TC,serif;font-size:1rem;line-height:1.9">'+f.closing+'</div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ 馥靈之鑰 × 你的覺察密碼</div><div class="hour-bridge-text" style="margin-bottom:8px">你做選擇的方式，是你跟自己的關係的縮影。看見你的模式，下次你才能真正「選」，而不只是「重複」。</div><div style="font-size:.85rem;color:#9e8a70;line-height:1.8;margin-bottom:16px">馥靈秘碼可以揭示你天生的決策天賦設定，跟今天的結果交叉比對更有趣。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免費解碼馥靈秘碼 →</a>';
  try{localStorage.setItem('hl_quiz_decision',JSON.stringify({type:topType,scores,ts:Date.now()}));}catch(e){}
  window._resultText=f.icon+' 我的決策模式是「'+f.name+'」：'+f.sub+'。'+f.desc.substring(0,60)+'⋯ 你怎麼做選擇的？ 👉 hourlightkey.com/quiz-decision-pattern.html #馥靈之鑰 #決策模式';
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz-decision-pattern',toolName:'決策模式覺察'});window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
