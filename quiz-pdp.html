var TYPES={tiger:{name:'老虎',icon:'🐅',sub:'果斷的領導者',color:'#e74c3c',desc:'您像老虎：目標明確，行動迅速，不喜歡繞彎。走進會議室的前三秒，您已經知道結論是什麼了。在團隊裡您天然是領頭的那個，但有時候您的速度會讓別人跟不上——不是他們慢，是您太快了。說真的，您那種「想好就衝」的決斷力，很多人練十年都練不出來。',detail:'老虎型的人做決定很快，執行力是最大武器。但要注意：快不代表對。有時候慢下來聽聽別人的想法，會讓結果更好。您的陰影面是：您太習慣自己扛了，覺得等別人太慢不如自己來。久了，團隊會變成觀眾，而不是隊友。\n\n💼 職場場景：當老闆說「這件事下週要交」，您今天就做完了。當同事還在討論方案 A 和方案 B，您已經在執行方案 C 了。\n\n🌿 精油覺察：黑胡椒 3 滴 + 雪松 2 滴，滴在手腕深呼吸。在你衝出去之前，讓木質的沉穩幫你踩一下剎車。\n\n✦ 覺察小語：「最快的人不一定跑得最遠，但知道什麼時候該停的人，一定走得最穩。」'},
peacock:{name:'孔雀',icon:'🦚',sub:'魅力型的溝通者',color:'#f39c12',desc:'您像孔雀：走到哪裡都自帶聚光燈，不是您故意的，是您的能量就是這樣——暖的、亮的、讓人忍不住往您那邊看。您的表達能力和感染力是天賦，一個眼神就能讓整個房間的氣氛從冷調變暖調。但有時候太在意觀眾反應了，忘了台下那個真正的自己。',detail:'孔雀型的人是天生的溝通者、銷售員、氣氛製造機。您能在三十秒內讀懂一個房間需要什麼，然後自然地補上去。但您的陰影面是：表演久了會忘了哪個是戲、哪個是真。那個在眾人面前開朗的你，回到家關上門的時候，真的還笑得出來嗎？\n\n💼 職場場景：客戶本來要殺價，被您三句話說得心甘情願加購。同事吵架的會議，您一開口大家就消氣了。但您最崩潰的時刻是：一個人對著報表，沒有觀眾。\n\n🌿 精油覺察：依蘭 2 滴 + 佛手柑 3 滴，睡前擴香。讓甜潤的花香提醒你——關掉舞台燈的你，也值得被喜歡。\n\n✦ 覺察小語：「最迷人的你，不是在發光的時候，是你願意把光關掉、讓人看見真實的那個瞬間。」'},
koala:{name:'無尾熊',icon:'🐨',sub:'穩定的支持者',color:'#27ae60',desc:'您像無尾熊：溫暖、耐心、讓人覺得安全。您是那種「沒有您這個團隊根本撐不起來，但大家可能要等您離開才會發現」的人。您不搶風頭，但少了您整個團隊會垮。您的存在就像空氣——不出聲，但沒有了所有人都會窒息。',detail:'無尾熊型的人是組織裡的黏合劑。您的耐心和包容讓每個人都想靠近您。但您的陰影面是：太容易妥協，把自己的需求往後排。您常常覺得「大家開心就好」，但您有沒有想過，一直退讓的你，到最後連自己想要什麼都不確定了。\n\n💼 職場場景：新人第一天不知所措，是您默默帶他去吃飯。同事吵架，兩邊都來找您說。老闆壓力大的時候，也是您在旁邊穩住局面。但您的功勞總是被當成理所當然。\n\n🌿 精油覺察：薰衣草 3 滴 + 天竺葵 2 滴，泡腳時加入。你照顧了所有人，現在輪到你被花香包住——今晚，你才是被照顧的那個。\n\n✦ 覺察小語：「你的溫柔不是軟弱，但你的沉默不該是習慣。你的需求，也是需求。」'},
owl:{name:'貓頭鷹',icon:'🦉',sub:'精準的分析者',color:'#2980b9',desc:'您像貓頭鷹：看得仔細、想得深、不會輕易下結論。當別人都在喊「差不多就好」的時候，您心裡知道差不多根本不夠好。您的數據和邏輯是團隊最需要的品質守門人，只是有時候想太久，機會就飛走了。',detail:'貓頭鷹型的人是品質的守門人。沒有您的把關，很多東西會出錯。但完美主義的陰影是：永遠覺得還不夠好。您花了三天分析出最佳方案的時候，老虎型的人已經做了、錯了、改了、又做了。而且他的結果可能不比您差。這會讓您很不甘心對吧？\n\n💼 職場場景：報告您會改三遍才交，每個數字都核對過。email 您會斟酌措辭才送出。您最痛苦的同事是那種「先做再說」的人——您不懂他們怎麼能對品質這麼隨便。\n\n🌿 精油覺察：迷迭香 3 滴 + 薄荷 2 滴，工作前滴在擴香石上。清涼草本的氣息幫您保持清醒，同時提醒您：80 分出發，比 100 分永遠不出門更有用。\n\n✦ 覺察小語：「完美不是終點，它是你用來逃避『開始』的藉口。夠好就出發。」'},
chameleon:{name:'變色龍',icon:'🦎',sub:'靈活的適應者',color:'#9b59b6',desc:'您像變色龍：在任何環境都能生存，跟任何人都能相處。您的適應力是最大資產——老闆要什麼風格您就切什麼風格，客戶什麼脾氣您都接得住。但有時候切換太多次了，連自己都忘了原本的顏色是什麼。你到底是誰？',detail:'變色龍型的人是最被低估的。您不是沒有立場，是您能看見每個角度。但「每個角度都懂」有時候會讓別人覺得您沒有主見。您的陰影面是：因為太會配合，所以沒有人真正認識那個「不配合的你」。包括您自己。\n\n💼 職場場景：跟業務部開會您講業績，跟設計部開會您講美學，跟老闆談話您講策略。每個部門都覺得你是自己人。但下班之後你累到不想說話，因為一整天都在演別人。\n\n🌿 精油覺察：天竺葵 3 滴 + 岩蘭草 2 滴，睡前塗在腳底。天竺葵平衡你的百變，岩蘭草把你拉回土地——脫掉所有角色之後，你是誰？那個才是最值得認識的人。\n\n✦ 覺察小語：「你不需要在每個場合都變色。找到一件不管環境怎麼變都不讓步的事，那就是你的芯。」'}};
