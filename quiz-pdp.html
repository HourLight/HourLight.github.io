tiger:{name:'老虎',icon:'🐅',sub:'目標鎖定的決斷者',color:'#e74c3c',

oilText:'黑胡椒的辛辣跟你的果斷同頻，雪松的木質沉穩在你全速衝刺時輕輕踩一下剎車。快是你的天賦，穩是你的功課。\n\n為什麼這個配方對你有效？\n黑胡椒裡的胡椒鹼和 β-石竹烯能跟你天生高速運轉的前額葉同頻共振，不是讓你慢下來，而是幫你的決策系統多裝一個「品質檢查站」。雪松裡的雪松烯和大西洋酮則溫柔地安撫你那個總是全速運轉的杏仁核，像一隻穩穩的手按住方向盤，讓你在衝刺的時候不會甩尾。老虎不需要更多油門，需要的是更好的煞車系統。',
med:'手邊沒有精油？試試這個：\n\n【策略暫停呼吸法】\n在你準備做一個快速決定之前（你一天大概做 87 個），強制自己暫停 90 秒。\n\n雙手握拳放在桌上，用力握 5 秒，然後瞬間放開，感受手指展開的感覺。重複 3 次。這是在教你的身體「收放之間」的節奏。\n\n接著做 4 次「獵豹呼吸」：快速用鼻子吸氣 2 秒（像獵豹鎖定獵物），然後慢慢用嘴巴吐氣 8 秒（像獵豹埋伏等待最佳時機）。重點在吐氣要長，讓你習慣「等一下再出手」的節奏。\n\n最後問自己兩個問題：「這件事一定要現在決定嗎？」和「我身邊的人跟上了嗎？」如果答案是「其實可以等」或「他們還在消化」，就再給自己和團隊 30 分鐘。老虎最厲害的不是衝得快，是知道什麼時候出手最精準。',

peacock:{name:'孔雀',icon:'🦚',sub:'自帶聚光燈的溝通者',color:'#f39c12',
desc:'您像孔雀：走到哪裡都自帶聚光燈，而且不是您故意開的，是您的能量就是這樣，暖的、亮的、讓人忍不住往您那邊看。一個眼神就能讓整個房間從冷調變暖調。您的表達力和感染力是天賦等級的，客戶本來要殺價的，被您三句話說得心甘情願加購。但有時候太在意觀眾反應了，忘了台下那個真正的自己。回到家關上門的時候，那個在眾人面前笑得最燦爛的您，真的還笑得出來嗎？您最珍貴的不是舞台上的光芒，是願意把光關掉讓人看見真實的那個瞬間。',
oil:'依蘭 2 滴 + 佛手柑 3 滴',oilMethod:'睡前擴香 30 分鐘',oilScene:'需要回到自己、不用表演的夜晚',
oilText:'依蘭的甜潤像你最真實的笑容，佛手柑的陽光提醒你：關掉舞台燈之後的你，才是最迷人的版本。\n\n為什麼這個配方對你有效？\n依蘭裡的乙酸苄酯和沉香醇是你的「卸妝油」，能溫柔地告訴你過度活躍的邊緣系統：「今天的表演結束了，可以回到後台了。」它直接安撫你因為長時間維持社交能量而疲憊不堪的杏仁核。佛手柑的檸檬烯和呋喃香豆素則像一盞溫暖的床頭燈，刺激迷走神經慢慢降頻，讓你的前額葉從「觀眾反應監控模式」切換到「只有我自己」的安靜模式。聚光燈很亮很美，但你的眼睛也需要休息。',
med:'手邊沒有精油？試試這個：\n\n【關燈獨處儀式】\n回到家或找到獨處空間後，做這個 3 分鐘的「關燈練習」。\n\n第一步（60 秒）：站在鏡子前面，刻意做出你今天對別人笑過的那種笑容。hold 住 5 秒，然後慢慢讓嘴角放下來，放到完全沒有表情。重複 3 次。這是在告訴你的臉部肌肉：「下班了。」\n\n第二步（60 秒）：閉上眼睛，雙手輕輕蓋住耳朵。用鼻子吸氣 4 秒，嘴巴吐氣 6 秒，聽自己呼吸的聲音。重複 6 次。蓋住耳朵能屏蔽外界的聲音，讓你從「對外廣播」模式切回「只聽自己」模式。\n\n第三步（60 秒）：問自己一個今天沒有人問過你的問題：「你今天真正的感覺是什麼？」不用回答得漂亮，不用正能量，說實話就好。就算答案是「累到想消失」也是一個誠實的好答案。孔雀最需要練習的，是在沒有觀眾的時候也能舒服地存在。',

koala:{name:'無尾熊',icon:'🐨',sub:'溫暖穩定的守護者',color:'#27ae60',
desc:'您像無尾熊：溫暖、耐心、讓人覺得安全。您是那種「沒有您這個團隊根本撐不起來，但大家可能要等您離開才會發現」的人。新人第一天不知所措，是您默默帶他去吃飯。同事吵架，兩邊都來找您說。老闆壓力大的時候，也是您在旁邊穩住局面。但您的功勞總是被當成理所當然。您不搶風頭，但少了您整個團隊會垮。您的存在就像空氣，不出聲，但沒有了所有人都會窒息。您太容易妥協，把自己的需求往後排。「大家開心就好」是您的口頭禪，但一直退讓的您，到最後連自己想要什麼都不確定了。',
oil:'薰衣草 3 滴 + 天竺葵 2 滴',oilMethod:'加入泡腳水或塗在肩膀',oilScene:'照顧了所有人之後，終於輪到自己的夜晚',
oilText:'薰衣草像一條軟毯裹住你，天竺葵的花香在問你一句你很少聽見的話：「你今天還好嗎？」\n\n為什麼這個配方對你有效？\n薰衣草裡的沉香醇和乙酸沉香酯是天然的「自我照顧提醒」，它們能直接安撫你那個因為一整天照顧別人而過度消耗的杏仁核和邊緣系統，溫柔地把你的注意力從「大家還好嗎」轉向「我還好嗎」。天竺葵的香茅醇和牻牛兒醇則像一面鏡子，讓你的前額葉重新看見自己的需求。無尾熊的迷走神經天生就調成「照顧他人」的頻率，這兩支精油能幫你偶爾把頻率調回「照顧自己」。你值得被你對別人那樣溫柔地對待自己。',
med:'手邊沒有精油？試試這個：\n\n【自我照顧邊界練習】\n每天睡前花 3 分鐘做這個練習，幫自己充電。\n\n第一步（60 秒）：把雙手放在心口，閉眼，做 5 次溫暖的呼吸。吸氣 4 秒時想像吸進來的空氣是溫暖的粉紅色，吐氣 6 秒時想像這個溫暖填滿你自己的身體（不是送給別人，是留給自己）。\n\n第二步（60 秒）：回想今天你為別人做的 3 件事。然後問自己：「如果是別人為我做了這些事，我會怎麼對他說？」把那句話（通常是「謝謝你」或「你辛苦了」）在心裡對自己說 3 遍。\n\n第三步（60 秒）：想像明天有一件事你可以說「不」或「等一下」。不需要拒絕所有人，一天只練習一次就好。在心裡預演那個場景：有人拜託你，你微笑著說「我今天沒辦法耶，明天可以嗎？」然後感受一下，世界沒有毀滅，對方也沒有因此討厭你。溫柔的人最需要學的，不是如何更溫柔，是如何溫柔地守住自己的空間。',
insight:'「你的溫柔不是軟弱，但你的沉默不該是習慣。你的需求，也是需求。」',
share:'我是無尾熊型🐨！默默撐起全場但大家要等我離開才發現😢 「溫柔的人也需要被照顧啊。」你的職場靈魂是哪隻動物？'},
owl:{name:'貓頭鷹',icon:'🦉',sub:'精準冷靜的分析者',color:'#2980b9',
desc:'您像貓頭鷹：看得仔細、想得深、不會輕易下結論。當別人都在喊「差不多就好」的時候，您心裡知道差不多根本不夠好。報告您會改三遍才交，每個數字都核對過。email 您會斟酌措辭才送出。您是團隊最需要的品質守門人。但完美主義的陰影是：永遠覺得還不夠好。您花了三天分析出最佳方案的時候，老虎型的人已經做了、錯了、改了、又做了，而且結果可能不比您差。這會讓您很不甘心對吧？您最痛苦的同事是那種「先做再說」的人，您不懂他們怎麼能對品質這麼隨便。但有時候，80 分出發真的比 100 分永遠不出門更有用。',
oil:'迷迭香 3 滴 + 薄荷 2 滴',oilMethod:'滴在擴香石放在桌上',oilScene:'需要從分析模式切換到行動模式時',
oilText:'迷迭香維持你的清晰思維，薄荷的涼意像一聲哨音：「分析到這裡就夠了，出發吧。」\n\n為什麼這個配方對你有效？\n迷迭香裡的 1,8-桉油醇和樟腦是前額葉的「增幅器」，能讓你本來就很強的分析能力保持清晰，但同時加速「從分析到行動」的傳導速度。貓頭鷹的問題從來不是想得不夠清楚，而是想太清楚了反而走不出去。薄荷的薄荷醇直接刺激三叉神經和前額葉，像一聲清脆的哨音穿透你的分析迴圈，在你的神經系統裡建立一條新的捷徑：「80 分已經夠好了，現在出發。」兩支精油合作，不是要你放棄品質，是讓你的大腦學會「分析有截止時間」這件事。',
med:'手邊沒有精油？試試這個：\n\n【80 分出發倒數法】\n當你發現自己又在反覆檢查、修改、覺得還不夠好的時候，做這個練習。\n\n拿出手機設定 3 分鐘的計時器。在這 3 分鐘裡，快速寫下：「如果現在就交出去，最壞會怎樣？」然後寫下 3 個最壞的後果。通常你會發現最壞的後果是「需要再修改一次」，而不是「世界末日」。\n\n接著做 5 次「哨音呼吸」：用鼻子快速吸氣 2 秒，然後嘟起嘴巴慢慢吐氣 6 秒，發出像吹口哨一樣的「呼，」聲。這個特殊的吐氣方式能刺激你的迷走神經，幫你的前額葉從「分析迴圈」裡跳出來。\n\n吐完最後一口氣之後，心裡默念「夠了」，然後在 5 秒內按下送出鍵。不要給自己再檢查一次的機會。你的 80 分已經是大多數人的 120 分了，你只是不知道而已。每天練習一次「刻意交出不完美的東西」，你的完美主義就會慢慢學會讓路。',
insight:'「完美不是終點，它是你用來逃避『開始』的藉口。夠好就出發。」',
share:'我是貓頭鷹型🦉！差不多？差不多根本不夠好好嗎📊 「報告改三遍才交是基本尊重。」你的職場靈魂是哪隻動物？'},
chameleon:{name:'變色龍',icon:'🦎',sub:'靈活切換的適應者',color:'#9b59b6',
desc:'您像變色龍：在任何環境都能生存，跟任何人都能相處。跟業務部開會您講業績，跟設計部開會您講美學，跟老闆談話您講策略。每個部門都覺得您是自己人。您的適應力是最大資產，老闆要什麼風格您就切什麼風格，客戶什麼脾氣您都接得住。但下班之後您累到不想說話，因為一整天都在演別人。您不是沒有立場，是您能看見每個角度。但「每個角度都懂」有時候會讓別人覺得您沒有主見。因為太會配合，沒有人真正認識那個「不配合的您」。包括您自己。脫掉所有角色之後，您到底是誰？那個才是最值得認識的人。',
oil:'天竺葵 3 滴 + 岩蘭草 2 滴',oilMethod:'睡前塗在腳底',oilScene:'一整天演了太多角色、需要回到自己的夜晚',
oilText:'天竺葵幫你平衡所有切換過的頻率，岩蘭草把你從百變模式拉回土地。脫掉角色之後的你，才是最珍貴的。\n\n為什麼這個配方對你有效？\n天竺葵裡的香茅醇和牻牛兒醇是你的「頻率歸零鍵」，能幫你的邊緣系統把一整天切換了七八種角色所累積的混亂訊號統統整理歸檔。你的杏仁核很累，因為每換一個場合它就要重新評估「在這裡要展現什麼樣的我才安全」，天竺葵能讓它好好休息。岩蘭草的岩蘭草醇和岩蘭草酮是最重的精油分子之一，像一根深入泥土的錨，把你從「百變適應」的漂浮狀態拉回地面，讓你的前額葉有空間問自己：「脫掉所有角色之後，我到底喜歡什麼？」',
med:'手邊沒有精油？試試這個：\n\n【找回原色冥想】\n睡前花 3 分鐘做這個練習，幫自己從一天的角色切換中回到原廠設定。\n\n第一步（60 秒）：閉眼，想像你的身體被塗滿了各種顏色。每種顏色代表你今天扮演過的角色（跟主管說話是藍色、跟客戶聊天是金色、跟朋友相處是橘色）。吸氣 4 秒，吐氣 6 秒時想像這些顏色像水彩一樣慢慢被洗掉，露出底下你本來的顏色。做 5 次。\n\n第二步（60 秒）：問自己三個問題，不用回答得漂亮，只要誠實：「今天哪一個場合的我，最接近真正的我？」「今天哪一個場合，我演得最累？」「如果明天可以少演一個角色，我要拿掉哪一個？」\n\n第三步（60 秒）：把雙手放在肚子上，做 5 次深呼吸。每次吐氣時在心裡說：「我不需要每個場合都完美適應。」感受肚子在手掌下起伏的節奏，那個最基本的、不用切換的生理節奏，就是你最真實的頻率。帶著這個頻率入睡。',
insight:'「你不需要在每個場合都變色。找到一件不管環境怎麼變都不讓步的事，那就是你的芯。」',
share:'我是變色龍型🦎！跟誰都能聊、在哪都能活，但有時候連自己都忘了原本的顏色是什麼🌈 「脫掉角色之後的我，到底是誰？」你的職場靈魂是哪隻動物？'}
};
