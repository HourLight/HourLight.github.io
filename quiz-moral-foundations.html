  {q:'餐桌上有人開始講帶有歧視意味的笑話，大家都在笑，你會？',scene:'聚餐氣氛很好，但那個笑話讓你不太舒服。',opts:[
    {t:'當場說「這個笑話不太好」，即使氣氛可能尷尬',s:{care:2,fair:2,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'不笑，但也不說什麼，不想破壞氣氛',s:{care:1,fair:0,liberty:0,loyal:2,auth:0,pure:0}},
    {t:'每個人有說話的自由，不喜歡可以不聽',s:{care:0,fair:0,liberty:3,loyal:0,auth:0,pure:0}},
    {t:'覺得這種話不應該在公開場合說，有些底線不能碰',s:{care:0,fair:0,liberty:0,loyal:0,auth:1,pure:3}}]},
  {q:'你發現一個你敬重的前輩做了不誠實的事，你怎麼看？',scene:'他一直是你學習的對象，但這件事確實有問題。',opts:[
    {t:'失望，但會直接跟他說我覺得這樣不對',s:{care:0,fair:2,liberty:0,loyal:0,auth:0,pure:1}},
    {t:'他一定有他的原因，我選擇相信他',s:{care:0,fair:0,liberty:0,loyal:3,auth:0,pure:0}},
    {t:'前輩也是人，會犯錯，但規矩不能因為身份就不適用',s:{care:0,fair:3,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'很震驚。這樣的人怎麼能做這種事，讓我對他整個人的印象都變了',s:{care:0,fair:0,liberty:0,loyal:0,auth:0,pure:3}}]},
  {q:'你在餐廳吃到一道用了爭議食材的料理（比如魚翅），你的想法是？',scene:'同桌的人都吃得很開心。',opts:[
    {t:'那些動物很可憐，我吃不下去',s:{care:3,fair:0,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'這是文化傳統，偶爾吃一次也還好',s:{care:0,fair:0,liberty:0,loyal:2,auth:1,pure:0}},
    {t:'每個人有選擇吃什麼的自由，我不吃但不批評別人',s:{care:0,fair:0,liberty:3,loyal:0,auth:0,pure:0}},
    {t:'光想到那個畫面就覺得不舒服，有些東西就是不該碰',s:{care:1,fair:0,liberty:0,loyal:0,auth:0,pure:3}}]},
  {q:'你的家人堅持要你用某種方式過節（拜拜、圍爐、掃墓），你不太想去，你會？',scene:'你有自己的計畫，但家人說「一年就這麼一次」。',opts:[
    {t:'去。家人比我個人的計畫重要',s:{care:1,fair:0,liberty:0,loyal:3,auth:0,pure:0}},
    {t:'跟家人溝通，看有沒有折衷的方式',s:{care:1,fair:2,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'不想去就不去，我有自己的生活',s:{care:0,fair:0,liberty:3,loyal:0,auth:0,pure:0}},
    {t:'這些傳統有它的意義，長輩的安排我會尊重',s:{care:0,fair:0,liberty:0,loyal:1,auth:2,pure:1}}]},
  {q:'社群上有人公開批評你支持的理念，而且很多人按讚，你的反應是？',scene:'留言區很熱鬧，有些話挺刺耳的。',opts:[
    {t:'每個人都有發表意見的權利，我不需要跟每個人辯論',s:{care:0,fair:0,liberty:3,loyal:0,auth:0,pure:0}},
    {t:'如果他說的有道理我會反思，但人身攻擊我不能接受',s:{care:0,fair:3,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'覺得不舒服，好像被背叛了，我以為大家是站同一邊的',s:{care:0,fair:0,liberty:0,loyal:3,auth:0,pure:0}},
    {t:'在意，因為有些價值觀是不能妥協的底線',s:{care:0,fair:0,liberty:0,loyal:0,auth:1,pure:2}}]},
  {q:'你身邊有人做了合法但你覺得不道德的事（比如鑽法律漏洞避稅），你怎麼看？',scene:'這個人沒有犯法，但你心裡過不去。',opts:[
    {t:'合法就合法，你不能用你的道德標準要求別人',s:{care:0,fair:0,liberty:3,loyal:0,auth:0,pure:0}},
    {t:'合法不等於正確，這樣做對其他人不公平',s:{care:0,fair:3,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'覺得這個人不乾淨，我會跟他保持距離',s:{care:0,fair:0,liberty:0,loyal:0,auth:0,pure:3}},
    {t:'制度有漏洞是制度的問題，該改的是制度',s:{care:0,fair:2,liberty:1,loyal:0,auth:1,pure:0}}]},
  {q:'你看到新聞裡有人為了正義而違法（比如揭發公司內幕的吹哨者），你怎麼看？',scene:'',opts:[
    {t:'他做了對的事。保護弱勢比遵守規則更重要',s:{care:3,fair:0,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'他很勇敢，但不管原因如何，違法就是違法',s:{care:0,fair:0,liberty:0,loyal:0,auth:3,pure:0}},
    {t:'這就是為什麼我們需要更好的制度來保護吹哨者',s:{care:0,fair:3,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'他背叛了他的組織，即使結果是好的，手段也有問題',s:{care:0,fair:0,liberty:0,loyal:3,auth:0,pure:0}}]},
  {q:'你跟另一半對一件事情的看法完全相反，而且雙方都覺得自己是對的，你會？',scene:'已經吵了一陣子了，誰都不退讓。',opts:[
    {t:'先處理情緒，比起誰對誰錯，我更在意對方有沒有受傷',s:{care:3,fair:0,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'攤開事實，用邏輯來說服對方',s:{care:0,fair:3,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'我有我的立場，你有你的，不需要誰妥協',s:{care:0,fair:0,liberty:3,loyal:0,auth:0,pure:0}},
    {t:'想想誰的判斷力在這件事上比較可靠，聽那個人的',s:{care:0,fair:0,liberty:0,loyal:0,auth:3,pure:0}}]},
  {q:'有人送你一份禮物，但那個禮物是用爭議手段取得的，你會收嗎？',scene:'對方一片好意，但你知道背後的故事。',opts:[
    {t:'收下禮物但會找時間跟對方聊聊那個故事',s:{care:2,fair:1,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'收下。送禮的心意跟禮物怎麼來的是兩回事',s:{care:0,fair:0,liberty:0,loyal:2,auth:0,pure:0}},
    {t:'不收。有些東西沾了不該沾的，我碰不下去',s:{care:0,fair:0,liberty:0,loyal:0,auth:0,pure:3}},
    {t:'收不收是我的自由，但我會讓對方知道我的立場',s:{care:0,fair:0,liberty:3,loyal:0,auth:0,pure:0}}]},
  {q:'在一個團隊裡，有個成員總是唱反調，你覺得？',scene:'每次開會他都有不同意見，拖慢進度。',opts:[
    {t:'不同意見很重要，可能他看到了我們看不到的',s:{care:0,fair:2,liberty:2,loyal:0,auth:0,pure:0}},
    {t:'團隊需要共識，一直唱反調會拖垮大家',s:{care:0,fair:0,liberty:0,loyal:3,auth:0,pure:0}},
    {t:'如果他的意見是有道理的就該聽，不能因為不合群就忽略',s:{care:0,fair:3,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'他應該尊重團隊的決定，個人意見可以私下提',s:{care:0,fair:0,liberty:0,loyal:0,auth:3,pure:0}}]},
  {q:'你在排隊買咖啡，前面有人插隊，你會？',scene:'你已經排了十分鐘。',opts:[
    {t:'直接跟他說：「不好意思，我們都在排隊」',s:{care:0,fair:3,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'不說什麼，但心裡很不爽',s:{care:0,fair:1,liberty:0,loyal:0,auth:0,pure:1}},
    {t:'不想管，不值得為這種事起衝突',s:{care:0,fair:0,liberty:2,loyal:0,auth:0,pure:0}},
    {t:'看店員怎麼處理，維持秩序是店家的責任',s:{care:0,fair:0,liberty:0,loyal:0,auth:3,pure:0}}]},
  {q:'你發現你買的東西比朋友買的同一個商品貴了很多，你的感覺是？',scene:'一模一樣的東西，你多付了30%。',opts:[
    {t:'覺得很不公平，想找賣家理論',s:{care:0,fair:3,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'下次學聰明一點就好，市場本來就有價差',s:{care:0,fair:0,liberty:2,loyal:0,auth:0,pure:0}},
    {t:'覺得被騙了，對這個品牌整個觀感都變差',s:{care:0,fair:1,liberty:0,loyal:0,auth:0,pure:2}},
    {t:'算了，錢已經花了，計較也拿不回來',s:{care:0,fair:0,liberty:0,loyal:0,auth:1,pure:0}}]},
  {q:'你怎麼看「為了更大的善，犧牲少數人」這個概念？',scene:'',opts:[
    {t:'如果真的沒有其他辦法，可以理解但很心痛',s:{care:3,fair:0,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'不行。每個人的權利都是平等的，不能用數量來算',s:{care:0,fair:3,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'沒有人有權利決定犧牲誰',s:{care:0,fair:0,liberty:3,loyal:0,auth:0,pure:0}},
    {t:'如果是為了國家或群體的存亡，那有時候不得不做',s:{care:0,fair:0,liberty:0,loyal:2,auth:2,pure:0}}]},
  {q:'你覺得「孝順」是什麼？',scene:'',opts:[
    {t:'讓父母開心、不讓他們操心',s:{care:2,fair:0,liberty:0,loyal:1,auth:0,pure:0}},
    {t:'尊重他們的人生經驗和決定',s:{care:0,fair:0,liberty:0,loyal:0,auth:3,pure:0}},
    {t:'互相尊重。我愛他們，但我也有自己的人生',s:{care:0,fair:0,liberty:3,loyal:0,auth:0,pure:0}},
    {t:'維繫家族的傳統和連結，讓家人之間有歸屬感',s:{care:0,fair:0,liberty:0,loyal:3,auth:0,pure:1}}]},
  {q:'你心目中「好人」的定義是什麼？',scene:'只能選一個最重要的。',opts:[
    {t:'不忍心看到別人受苦的人',s:{care:3,fair:0,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'對所有人一視同仁、不偏心的人',s:{care:0,fair:3,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'能為自己的行為負責、尊重別人自由的人',s:{care:0,fair:0,liberty:3,loyal:0,auth:0,pure:0}},
    {t:'言行一致、表裡如一的人',s:{care:0,fair:0,liberty:0,loyal:0,auth:0,pure:3}}]},
  {q:'你覺得社會最需要什麼？',scene:'',opts:[
    {t:'更多的同理心，讓弱勢被看見',s:{care:3,fair:0,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'更公平的制度，讓每個人有平等的機會',s:{care:0,fair:3,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'更少的管束，讓每個人活出自己想要的樣子',s:{care:0,fair:0,liberty:3,loyal:0,auth:0,pure:0}},
    {t:'更穩定的秩序，讓大家有安全感',s:{care:0,fair:0,liberty:0,loyal:1,auth:2,pure:0}}]},
  {q:'你的另一半想做一件你覺得很冒險的事，你會？',scene:'比如辭掉穩定工作去創業、或者去很遠的地方。',opts:[
    {t:'擔心他受傷，但如果他真的想做我會支持',s:{care:3,fair:0,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'這是他的人生，他有權利決定',s:{care:0,fair:0,liberty:3,loyal:0,auth:0,pure:0}},
    {t:'我們是一起的，這種大事應該一起討論、一起承擔',s:{care:0,fair:0,liberty:0,loyal:3,auth:0,pure:0}},
    {t:'先評估可行性再說，不能靠衝動',s:{care:0,fair:1,liberty:0,loyal:0,auth:2,pure:0}}]},
  {q:'你在選擇食物、日用品的時候，會在意它的「來源」嗎？',scene:'比如公平貿易咖啡、無動物實驗保養品、有機食材。',opts:[
    {t:'會。如果知道背後有人或動物在受苦，我買不下去',s:{care:3,fair:0,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'會看一下，但不會太堅持，方便就好',s:{care:0,fair:0,liberty:1,loyal:0,auth:0,pure:0}},
    {t:'會。不乾淨的東西我不想碰，身體吃進去什麼很重要',s:{care:0,fair:0,liberty:0,loyal:0,auth:0,pure:3}},
    {t:'會。企業應該對供應鏈負責，消費者的選擇可以推動改變',s:{care:0,fair:3,liberty:0,loyal:0,auth:0,pure:0}}]},
  {q:'你怎麼看「規矩就是用來打破的」這句話？',scene:'',opts:[
    {t:'不合理的規矩本來就該被挑戰',s:{care:0,fair:1,liberty:3,loyal:0,auth:0,pure:0}},
    {t:'規矩是經驗累積出來的，打破之前要先了解它存在的原因',s:{care:0,fair:0,liberty:0,loyal:0,auth:3,pure:0}},
    {t:'如果規矩傷害了人，那它就不是好規矩',s:{care:3,fair:0,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'規矩是群體的共識，隨便打破會傷害信任',s:{care:0,fair:0,liberty:0,loyal:3,auth:0,pure:0}}]},
  {q:'最後一題。你最受不了什麼樣的人？',scene:'直覺選。',opts:[
    {t:'對別人的痛苦無動於衷的人',s:{care:3,fair:0,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'佔便宜、雙標、只對自己有利的規則才遵守的人',s:{care:0,fair:3,liberty:0,loyal:0,auth:0,pure:0}},
    {t:'控制狂。管東管西，不讓別人有自己的空間',s:{care:0,fair:0,liberty:3,loyal:0,auth:0,pure:0}},
    {t:'背叛者。說好的事情反悔、答應的承諾不算數',s:{care:0,fair:0,liberty:0,loyal:3,auth:0,pure:0}},
    {t:'沒有原則、表裡不一、什麼都說好但什麼都做不到',s:{care:0,fair:0,liberty:0,loyal:0,auth:0,pure:3}},
    {t:'不尊重長輩、目無法紀、沒有分寸的人',s:{care:0,fair:0,liberty:0,loyal:0,auth:3,pure:0}}]}
];
const DIMS={care:'關懷',fair:'公平',liberty:'自由',loyal:'忠誠',auth:'權威',pure:'純潔'};
const TYPES={
  care:{name:'守護者',icon:'🫶',sub:'你的道德羅盤指向「不忍心」',
    keys:['同理心','弱勢保護','溫柔'],
    desc:'在你的道德世界裡，最重要的事情只有一件：不要讓任何人受苦。你看到受傷的動物會心疼、聽到不公正的新聞會憤怒、發現有人被欺負你站不住。你的道德直覺是從「痛」出發的。因為你真的能感覺到那個痛，所以你會想阻止它。你做的很多決定，底層動力都是「我不想看到有人不好」。',
    detail:'Jonathan Haidt 的研究顯示，「關懷/傷害」是所有道德基礎中最普遍的。幾乎所有人都有這個基礎，但在你身上它特別強烈。你的鏡像神經元可能比一般人活躍，你真的能「感同身受」別人的痛苦。\n\n守護者的盲點在於：你可能會因為太在意「誰在受苦」而忽略了其他面向。比如你可能為了保護一個人而違反公平原則，或者為了避免衝突而不敢設界線。你的同理心是天賦，但如果沒有搭配判斷力，它可能會讓你燃盡自己。\n\n另一個風險是「道德疲勞」。因為你對痛苦的敏感度很高，這個世界上太多你想管但管不了的事。新聞裡的苦難、社群上的求助、身邊的人際糾紛，你全部都在接收。你的心很大，但你的能量是有限的。\n\n覺察邀請：這週練習一次「不是我的責任」。不是不在乎，是承認有些苦不是你能幫的，把能量留給你真正能影響的範圍。',
    oil:'天竺葵 2 滴＋薰衣草 2 滴＋甜橙 1 滴。天竺葵平衡你的付出與接收。薰衣草安撫你因為別人的苦而緊繃的神經。甜橙提醒你自己的快樂也很重要。',
    med:'閉上眼睛。想想今天你照顧過的那些人。吸氣四秒，讓那些畫面慢慢過去。吐氣六秒。把注意力拉回來，手放在胸口。吸氣四秒，感覺胸口的溫度。吐氣六秒，對自己說：「我也需要被照顧。」重複三次。張開眼睛。今天有沒有一件只為自己做的小事？',
    quote:'你的心夠大，裝得下全世界。只是記得留一個角落給自己。'},
  fair:{name:'天秤手',icon:'⚖️',sub:'你的道德羅盤指向「這不公平」',
    keys:['規則意識','平等','不偏不倚'],
    desc:'在你的道德世界裡，最重要的事情是：每個人都應該被公平對待。不管你是誰、有什麼背景、認識什麼人，規則對所有人都一樣。你很難接受雙標、走後門、用關係壓人這種事。你的道德直覺是從「比例」出發的。付出多少就應該得到多少，傷害多少就應該承受多少。',
    detail:'公平基礎是人類社會合作的核心。沒有公平感，就沒有信任，沒有信任就沒有合作。你對不公平的敏感度很高，這讓你成為很好的仲裁者，因為你真的能看到誰被多拿了、誰被少給了。\n\n天秤手的盲點在於：「公平」其實不只有一種。你可能偏向的是「結果公平」（每個人得到一樣的），但有時候「過程公平」（每個人有平等的機會）或「需求公平」（最需要的人先得到）才是更好的。當你堅持你那一種公平的時候，可能會跟堅持另一種公平的人產生衝突。\n\n另一個風險是「過度計較」。不是每件事都需要精算到分毫不差。在親密關係裡，如果你一直在記帳（我做了幾件家事、你做了幾件），那個計數本身就會消耗愛。\n\n覺察邀請：這週允許自己在一件事情上「不計較」。不是因為不在意公平，是讓你體驗一下：放下天秤的時候，你的雙手可以做什麼。',
    oil:'佛手柑 2 滴＋迷迭香 2 滴＋薰衣草 1 滴。佛手柑降低你看到不公平時的焦慮反應。迷迭香維持你的判斷清晰度。薰衣草讓你在堅持原則的同時，不至於太繃。',
    med:'閉上眼睛。想像你心裡那把天秤。吸氣四秒，感覺它現在的重量，哪邊比較沉。吐氣六秒，不用立刻調平，只是看著它。吸氣四秒，告訴自己：「我可以觀察不公平，但不一定要馬上出手。」吐氣六秒。重複四次。張開眼睛。今天有一件不公平的事，允許自己只是記下來，先不行動。',
    quote:'你的天秤很準。但偶爾讓它歪一點，不是不公正，是溫柔。'},
  liberty:{name:'自由行者',icon:'🦅',sub:'你的道德羅盤指向「不要管我」',
    keys:['個人自主','反控制','尊重邊界'],
    desc:'在你的道德世界裡，最重要的事情是：每個人都有權利決定自己的人生。你不太能忍受被控制、被規定、被告訴「你應該怎樣」。你的道德直覺是從「自主」出發的。你不要求別人跟你一樣，但你也不接受別人要求你跟他們一樣。你的底線很簡單：我不傷害你，你也別管我。',
    detail:'自由基礎在Haidt的框架裡是後來才加入的，因為它太強了，不能被忽略。你對「被壓迫」的感覺非常敏感，不管是來自政府、組織、文化、甚至是善意的建議，只要你覺得「這在限制我」，你就會反彈。\n\n自由行者的盲點在於：你可能把「不管別人」當成美德，但有時候「管」是出於在乎。你的伴侶問你今天過得好嗎，不是在控制你，是在關心你。你的朋友建議你去看個醫生，不是在指揮你，是在擔心你。如果你的自由雷達太敏感，會把善意的連結也推開。\n\n另一個風險是「孤立」。極端的自由意味著極端的獨立，而極端的獨立可能變成極端的孤獨。你不需要任何人，但你想要有人嗎？\n\n覺察邀請：這週接受一次別人的幫助。不是因為你做不到，是練習「讓人靠近也是安全的」。你的自由不會因為有人幫你就消失。',
    oil:'尤加利 2 滴＋薄荷 1 滴＋佛手柑 2 滴。尤加利給你呼吸的空間。薄荷維持你的清醒獨立。佛手柑在自由裡面加一點溫暖，讓你不至於飛太遠。',
    med:'閉上眼睛。感覺今天的你在哪個空間裡。吸氣四秒，想像一片沒有邊界的天空，你就在那裡飛。吐氣六秒，不用降落，只是飛著。吸氣四秒，感覺這份自在是你自己帶來的，不是外面給的。吐氣六秒，說：「我的自由，從裡面開始。」重複三次。張開眼睛。今天選一件事，理由只有「我想要」，不需要別的解釋。',
    quote:'你的自由是你最在意的東西。但自由不一定要孤獨。'},
  loyal:{name:'守約人',icon:'🤝',sub:'你的道德羅盤指向「我們是一起的」',
    keys:['群體歸屬','承諾','義氣'],
    desc:'在你的道德世界裡，最重要的事情是：你的人不能被背叛。家人、朋友、團隊、組織，只要你認定了「我們是一群的」，你就會全力維護這個群體。你重視承諾、重視義氣、重視「說到做到」。你可以原諒能力不足，但很難原諒背叛。因為在你心裡，忠誠是所有關係的底線。',
    detail:'忠誠基礎的演化根源跟部落生存有關。在遠古時代，被群體驅逐等於死亡。所以你的大腦對「誰跟我同一邊」非常敏感。你很快能辨識出誰是內人、誰是外人，然後本能地保護前者、防備後者。\n\n守約人的盲點在於：你可能會因為忠誠而不敢批評自己人。明明知道他做錯了，但因為「他是我朋友」就選擇閉嘴。忠誠如果沒有搭配公正，就會變成包庇。你保護的不應該是「人」，是你們之間的「約定」。\n\n另一個風險是「排外」。你的群體邊界畫得越清楚，對外面的人就越冷淡。你對自己人有多暖，對外人可能就有多冷。在台灣的文化裡，這很常見。但世界不只是你的圈子。\n\n覺察邀請：這週跟一個「不是你的人」聊一聊。不需要喜歡他，只是練習看到對方也是一個完整的人。',
    oil:'乳香 2 滴＋雪松 2 滴＋甜橙 1 滴。乳香連結你跟你重視的人之間的深層連結。雪松讓你的根紮穩但不至於排斥新土壤。甜橙提醒你圈子外面也有溫暖。',
    med:'閉上眼睛。想一個你在乎的人。吸氣四秒，感覺那份連結。吐氣六秒，不用說任何話，只是感覺「我們是一起的」這四個字。吸氣四秒，問自己：「我對自己的承諾，也有這麼認真嗎？」吐氣六秒，讓這個問題待在那裡。重複三次。張開眼睛。今天對自己許一個小承諾，今天就實現它。',
    quote:'你的義氣是你最美的品質。只是別讓它變成一面只看得到裡面的牆。'},
  auth:{name:'秩序守望者',icon:'🏛️',sub:'你的道德羅盤指向「規矩不能亂」',
    keys:['階層感','穩定','尊重經驗'],
    desc:'在你的道德世界裡，最重要的事情是：社會需要秩序，而秩序需要有人維護。你尊重經驗、尊重制度、尊重那些在你之前就存在的規則。不是盲從，是你相信「大部分的規矩之所以存在，是因為前人踩過坑」。你覺得長輩的話有道理應該聽、公司的流程有意義應該遵守、社會的階層有存在的原因。',
    detail:'權威基礎的演化根源跟社會分工有關。在複雜的社會裡，如果每個人都自行其是，合作就無法進行。有人領導、有人跟隨，這套系統讓人類能組織起比任何動物都龐大的合作網路。\n\n秩序守望者的盲點在於：你可能會因為尊重權威而不敢質疑。「長輩說的」不一定都對，「公司的制度」不一定都合理，「傳統的做法」不一定適合現在。當權威本身是錯的時候，你的服從就不是美德了，是共犯。\n\n在台灣的文化裡，這種盲點特別明顯。尊師重道、長幼有序、上司下屬。這些框架讓社會穩定，但也可能壓住了很多該說的話。\n\n覺察邀請：這週對一個你通常會服從的對象，提出一個真實的意見。不是反抗，是練習「尊重不等於不能有不同看法」。',
    oil:'迷迭香 2 滴＋薄荷 1 滴＋佛手柑 2 滴。迷迭香維持你的判斷力不被權威蓋過。薄荷給你一點清醒的勇氣。佛手柑讓質疑的過程不那麼焦慮。',
    med:'閉上眼睛。想像你心裡那本規矩手冊。吸氣四秒，翻到某一頁，上面寫了一條你很在意的規矩。吐氣六秒，讀了一遍。吸氣四秒，問：「這條規矩是保護我的，還是限制我的？」吐氣六秒，不用急著答，讓身體告訴你感覺。重複三次。張開眼睛。有沒有一條規矩今天可以放軟一點，試試看？',
    quote:'規矩是好的。但偶爾問一聲「為什麼」，不是不尊重，是讓規矩變得更好。'},
  pure:{name:'結界守護者',icon:'🪷',sub:'你的道德羅盤指向「有些東西碰不得」',
    keys:['底線分明','直覺式道德','厭惡感強烈'],
    desc:'在你的道德世界裡，有些東西是不能碰的。不是因為它犯法、不是因為它傷害了誰，是因為它就是「不對」。你有很強的道德直覺，很多判斷你說不出具體的理由，但你就是知道那條線在哪裡。你對「乾淨」和「骯髒」的感覺很敏銳，不只是物理上的，心理上也是。',
    detail:'純潔基礎是六個基礎裡最容易被誤解的。它不是宗教或保守的專利，而是一種深層的直覺性道德反應。你的厭惡感（disgust）比一般人靈敏，這讓你對很多事情有很快速的「好/不好」判斷。\n\n結界守護者的盲點在於：你的道德判斷可能過度依賴「感覺」而不是「分析」。你覺得噁心不代表那件事真的有問題。文化差異、個人經驗、甚至是偏見，都可能偽裝成你的「道德直覺」。當你說「這就是不對」但說不出為什麼的時候，值得多停一下想一想。\n\n在台灣的脈絡裡，面子文化、潔身自好的觀念都跟純潔基礎有關。你可能特別受不了「不乾不淨」的人事物，但有時候人生就是會弄髒手的。\n\n覺察邀請：這週找一件你本能覺得「不對」的事情，試著用邏輯分析一下它到底為什麼不對。如果你找不到具體的理由，那也許值得重新評估那個直覺。',
    oil:'檸檬 2 滴＋薄荷 1 滴＋乳香 2 滴。檸檬帶來清淨感。薄荷幫你的直覺保持銳利。乳香讓你在堅守底線的同時，不至於把所有人都推開。',
    med:'閉上眼睛。想像你心裡的潔白空間，你的結界。吸氣四秒，感覺它的乾淨，你就在裡面，安全的。吐氣六秒。吸氣四秒，看看結界的邊緣，問自己：「這邊界是在保護我，還是把我圍起來了？」吐氣六秒，不用急著答。重複三次。張開眼睛。今天允許一件「不完美但無害」的事進來你的世界，感覺一下有沒有那麼可怕。',
    quote:'你的底線很清楚，那是你的結界。但偶爾打開大門看看外面，不是降低標準，是擴大視野。'},
  care_fair:{name:'正義使者',icon:'🛡️',sub:'你要保護弱者，而且要用公平的方式',
    keys:['制度關懷','理性善良','系統思考'],
    desc:'你的道德世界裡同時住著溫柔和理性。你看到不公平的事會心痛，但你不會只是心痛，你會去想：「怎麼樣從制度層面改變它？」你相信好的制度能保護最多的人。你不只想幫一個人，你想改變遊戲規則。你是那種會去做公益但同時會質疑公益組織效率的人。',
    detail:'這種組合讓你在道德推理上很全面。你能感受到人的痛苦（關懷），也能分析造成痛苦的結構（公平）。你大概是朋友圈裡最常被來問「你覺得怎樣才合理」的人。\n\n正義使者的盲點在於：你可能太理想化了。你想要的是一個既溫暖又公平的世界，但現實是溫暖和公平有時候會衝突。給弱勢更多資源是關懷，但其他人可能覺得不公平。你在兩者之間的拉扯會讓你很累。\n\n覺察邀請：接受這個世界暫時不完美。你可以同時追求關懷和公平，但不需要每一件事都同時滿足兩者。有時候先溫暖，有時候先公平。一步一步來。',
    oil:'天竺葵 2 滴＋佛手柑 2 滴＋薰衣草 1 滴。天竺葵平衡你的關懷能量。佛手柑安撫你對不公平的焦慮。薰衣草讓你在為世界奮戰的同時，記得也照顧自己。',
    med:'閉上眼睛。想像你的心是一個廣場，今天打了很多仗。吸氣四秒，現在可以放下武器一分鐘。吐氣六秒，肩膀放鬆。吸氣四秒，說：「世界的不公平不是我一個人能扛完的。」吐氣六秒。重複四次。最後一次吐氣，說：「今天先照顧自己，明天繼續奮戰。」張開眼睛。',
    quote:'你的正義很完整。溫柔和公平都在。只是這條路很長，記得替自己留油。'},
  loyal_auth:{name:'傳統守衛者',icon:'🏯',sub:'你重視的是群體的穩定、長幼的秩序、說到做到的承諾',
    keys:['家族觀念','尊重傳統','穩定優先'],
    desc:'你的道德世界很重視「秩序」和「歸屬」。你覺得一個好的社會需要穩定的結構：家庭有家庭的倫理、公司有公司的規矩、國家有國家的法律。你會為群體犧牲個人、為傳統堅持立場、為長輩維護尊嚴。你覺得前人留下的東西有它的道理。',
    detail:'在台灣的文化裡，這種組合其實是最主流的道德觀。重視家庭、尊敬長輩、維護團體和諧。你走進家族聚會，大概是最會顧慮每個人感受和位階的那個人。\n\n傳統守衛者的盲點在於：你可能會用「傳統」和「秩序」來壓制異見。不是每個不服從的人都是叛逆，有些人只是看到了你沒看到的東西。穩定不代表不能改變，好的傳統是活的，它會隨著時代更新。\n\n覺察邀請：這週聽一個你平常覺得「太叛逆」的人說說他的想法。不是要你認同，是讓你的道德視野多一個角度。',
    oil:'雪松 2 滴＋檀香 2 滴＋甜橙 1 滴。雪松加固你的根。檀香連結你跟傳統之間的深層智慧。甜橙提醒你：傳統也可以是有溫度的、是會生長的。',
    med:'閉上眼睛。想像你守護的那些東西，傳統、承諾、秩序。吸氣四秒，感覺它們的重量在你身上。吐氣六秒，慢慢把其中一樣放在你旁邊，讓它站在那裡，你來守護，但不是你在扛它。吸氣四秒，感覺肩膀輕了一點。吐氣六秒，說：「守護不是一個人撐住。」重複三次。張開眼睛。',
    quote:'你守護的東西很有價值。只是別忘了，最好的傳統是會隨著時代一起長大的。'},
  liberty_care:{name:'溫柔反抗者',icon:'🌻',sub:'你為自由而戰，但你的武器是同理心',
    keys:['為弱勢發聲','反壓迫','溫柔堅定'],
    desc:'你的道德世界裡，最受不了的事情是「有權力的人欺負沒有權力的人」。你重視自由，但不是那種「我不管別人」的自由，是那種「每個人都應該被尊重」的自由。你會為被壓迫的人發聲、為不公正的制度生氣、為那些說不出話的人把話說出來。你的反抗不是暴力的，是溫柔但堅定的。',
    detail:'這種組合在社會運動者身上很常見。你同時擁有關懷（看到人的痛苦）和自由（看到壓迫的結構）兩種敏感度。你不只心疼受苦的人，你還想改變造成苦的系統。\n\n溫柔反抗者的盲點在於：你可能會燃盡自己。因為你在意的事情太多了。每一個不公正、每一個受壓迫的群體、每一個你覺得應該改變的制度，都在消耗你的能量。你不能拯救所有人。\n\n覺察邀請：選擇一個你最在意的議題，把 80% 的力氣放在那裡。其他的，允許自己暫時放手。不是不在乎，是策略性的專注。',
    oil:'天竺葵 2 滴＋尤加利 2 滴＋薰衣草 1 滴。天竺葵平衡你的付出。尤加利維持你為自由而戰的力氣。薰衣草在你戰累了的時候接住你。',
    med:'閉上眼睛。想像你是一棵開花的樹，根往下，花往上。吸氣四秒，感覺根的穩定。吐氣六秒，感覺花的輕盈。吸氣四秒，你同時是兩種：有骨氣，有柔情。吐氣六秒，說：「溫柔和勇氣，都是我的。」重複三次。張開眼睛。今天不用選邊，做一件讓你覺得「對」的事就好。',
    quote:'你的溫柔和勇氣同時存在，那是很少人有的組合。別把它用到見底。'},
  pure_loyal:{name:'道德潔癖者',icon:'🏮',sub:'你對「不乾淨」的人事物零容忍，尤其是背叛',
    keys:['高標準','黑白分明','義理兼具'],
    desc:'你的道德世界很乾淨、很清楚。什麼可以做、什麼不能做，你心裡有一條非常清楚的線。這條線同時包含了「純潔」（有些東西就是碰不得）和「忠誠」（答應的事就要做到）。你可能是朋友圈裡最「講原則」的那個人，也是最難原諒背叛的那個人。在你心裡，髒了就是髒了，很難洗回去。',
    detail:'這種組合讓你的道德判斷非常果斷。你不太有灰色地帶。好就是好，壞就是壞，乾淨就是乾淨，骯髒就是骯髒。這讓你很值得信任，因為你說到做到、表裡如一。\n\n道德潔癖者的盲點在於：你的黑白分明可能讓你很難跟「不完美」的人相處。每個人都有灰色的部分，如果你不接受灰色，你的圈子會越來越小。不是要你降低標準，是允許別人在你的標準裡有成長的空間。\n\n覺察邀請：這週想一個你曾經「放棄」的人。問自己：「如果我當時願意多給一次機會，結果會不同嗎？」不一定要行動，只是想一想。',
    oil:'茶樹 2 滴＋乳香 2 滴＋薰衣草 1 滴。茶樹帶來淨化感。乳香讓你的高標準不至於變成武器。薰衣草在你對人失望的時候安撫那個心痛。',
    med:'閉上眼睛。想像你心裡那塊潔白的地板。吸氣四秒，蹲下來看著它。吐氣六秒，有一小塊灰塵。吸氣四秒，問自己：「這塊灰塵讓整片地板失去意義了嗎？」吐氣六秒，讓身體給你感覺，不用用頭腦答。重複三次。張開眼睛。人和地板一樣，有灰塵不代表沒有價值。',
    quote:'你的底線很高、原則很清楚。這是你最好的品質。但人不是非黑即白的，允許一點灰色，不代表你變了。'}
};
let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 題 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一題</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一題 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看看我的道德人格 ⚖️</button>')+'</div>';area.appendChild(card);});updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 題，共 '+questions.length+' 題';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const dimScores={};Object.keys(DIMS).forEach(k=>{dimScores[k]=0;});
  Object.keys(answers).forEach(qi=>{const oi=answers[qi];const s=questions[qi].opts[oi].s;Object.keys(s).forEach(d=>{dimScores[d]+=s[d];});});
  const maxPossible=Object.keys(answers).length*3;
  const sorted=Object.keys(DIMS).sort((a,b)=>dimScores[b]-dimScores[a]);
  const top=sorted[0],sec=sorted[1];const t1=dimScores[top],t2=dimScores[sec];
  let topType;
  if(t1>t2*1.4) topType=top;
  else{const combo={'care_fair':'care_fair','fair_care':'care_fair','loyal_auth':'loyal_auth','auth_loyal':'loyal_auth','liberty_care':'liberty_care','care_liberty':'liberty_care','pure_loyal':'pure_loyal','loyal_pure':'pure_loyal'};topType=combo[top+'_'+sec]||top;}
  if(!TYPES[topType]) topType=top;
  const f=TYPES[topType];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('hlTitleReveal').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥靈之鑰</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-quote">「'+f.quote+'」</div><div class="ss-footer">hourlightkey.com ✦ </div></div><div class="hl-title-card"><div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div><div class="hl-title-eyebrow">Hour Light ✦ 道德基礎覺察</div><span class="hl-title-icon">'+f.icon+'</span><div class="hl-title-main">'+f.name+'</div><div class="hl-title-sub">'+f.sub+'</div><div class="hl-title-divider"></div><div class="hl-title-grid"><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 道德人格</div><div class="hl-title-tag-value">'+f.name+'</div></div><div class="hl-title-tag" style="grid-column:1/-1"><div class="hl-title-tag-label">✦ 覺察關鍵字</div><div class="hl-title-tag-value">'+f.keys.join(' · ')+'</div></div></div><div class="hl-title-quote">「'+f.quote+'」</div><div class="hl-title-combo-hint">'+f.name+'｜'+f.sub+'</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">道德基礎覺察 Moral Foundations</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var pct=Math.round(dimScores[k]/maxPossible*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+DIMS[k]+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">'+f.icon+' 你的道德人格</div><div class="result-section-content">'+f.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度覺察</div><div class="result-section-content">'+f.detail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🌿 認知芳療配方</div><div class="result-section-content">'+f.oil+'</div></div>'+(f.med?'<div class="result-section"><div class="result-section-title">🧘 隨時可做的覺察冒想</div><div class="result-section-content">'+f.med.replace(/\n/g,'<br>')+'</div></div>':'')+'<div class="result-section" style="text-align:center;font-family:LXGW WenKai TC,serif;font-size:1.05rem;color:#8b6914"><div class="result-section-content"></div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ H.O.U.R. 覺察橋接</div><div class="hour-bridge-text">你的道德人格是「你覺得世界應該怎麼運作」，馥靈秘碼看的是「你在世界裡怎麼運作」。<br>兩個座標交叉比對，才能看見你的行為跟你的價值觀之間有沒有落差。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免費解碼馥靈秘碼 →</a>';
  window._resultText=f.icon+' 我是「'+f.name+'」！'+f.sub+'\n「'+f.quote+'」\n\n你的正義長什麼樣子？👉 hourlightkey.com/quiz-moral-foundations.html';
  try{localStorage.setItem('hl_quiz_moral_foundations',JSON.stringify({type:topType,dimScores,ts:Date.now()}));}catch(e){}
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_dropMaterial) HL_dropMaterial('quiz');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz',toolName:'道德基礎檢視'});window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
</script>
