<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>平台管理｜馥靈之鑰</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/hourlight-global.css">
<link rel="stylesheet" href="assets/css/hl-footer.css">
<style>
body{background:#06040e;color:rgba(255,255,255,.85);font-family:'Noto Sans TC',sans-serif;line-height:1.7;min-height:100vh;padding-bottom:100px}
.pa-hero{text-align:center;padding:48px 24px 24px}
.pa-hero h1{font-family:'Noto Serif TC',serif;font-size:1.6rem;color:#f8dfa5;font-weight:500;letter-spacing:.06em;margin-bottom:6px}
.pa-hero p{font-size:.88rem;color:rgba(255,255,255,.45)}
.pa-body{max-width:800px;margin:0 auto;padding:0 20px}
.pa-card{background:rgba(255,255,255,.03);border:1px solid rgba(248,223,165,.15);border-radius:14px;padding:24px;margin-bottom:16px}
.pa-card-title{font-family:'Noto Serif TC',serif;font-size:1.05rem;color:#f8dfa5;margin-bottom:12px}
.pa-biz{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.pa-biz:last-child{border-bottom:none}
.pa-biz-name{font-size:.95rem;font-weight:500}
.pa-biz-meta{font-size:.78rem;color:rgba(255,255,255,.4);margin-top:2px}
.pa-biz-actions{display:flex;gap:8px}
.pa-btn{padding:8px 16px;border-radius:8px;font-size:.82rem;border:none;cursor:pointer;font-family:inherit;transition:all .2s}
.pa-btn-gold{background:rgba(248,223,165,.12);color:#f8dfa5;border:1px solid rgba(248,223,165,.3)}
.pa-btn-gold:hover{background:rgba(248,223,165,.2)}
.pa-btn-outline{background:transparent;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.12)}
.pa-btn-outline:hover{border-color:rgba(248,223,165,.3);color:#f8dfa5}
.pa-input{width:100%;padding:12px 16px;border:1px solid rgba(255,255,255,.12);border-radius:10px;background:rgba(255,255,255,.03);color:#fff;font-size:1rem;outline:none;font-family:inherit;margin-bottom:12px}
.pa-input:focus{border-color:rgba(248,223,165,.4)}
.pa-guard{display:flex;align-items:center;justify-content:center;min-height:60vh;text-align:center;color:rgba(255,255,255,.4)}
.pa-stat{display:inline-block;padding:4px 10px;border-radius:6px;font-size:.72rem;margin-left:8px}
.pa-stat-green{background:rgba(74,138,90,.15);color:#6cc070}
.pa-stat-gray{background:rgba(255,255,255,.06);color:rgba(255,255,255,.4)}
@media(max-width:600px){body{padding-bottom:calc(72px + env(safe-area-inset-bottom,0px))}}
</style>
</head>
<body>

<div class="pa-hero">
  <h1>平台管理</h1>
  <p>馥靈之鑰預約系統｜所有公司總覽</p>
</div>

<div class="pa-body">
  <div id="guardArea" class="pa-guard">驗證身份中⋯</div>

  <div id="mainArea" style="display:none">

    <!-- 公司列表 -->
    <div class="pa-card">
      <div class="pa-card-title">已開通公司</div>
      <div id="bizList"><div style="color:rgba(255,255,255,.35)">載入中⋯</div></div>
    </div>

    <!-- 新增公司 -->
    <div class="pa-card">
      <div class="pa-card-title">開通新公司</div>
      <input type="text" class="pa-input" id="newBizId" placeholder="公司 ID（英文小寫，如 pinpin-nail）">
      <input type="text" class="pa-input" id="newBizName" placeholder="公司名稱（如 蘋蘋美甲）">
      <input type="text" class="pa-input" id="newBizOwner" placeholder="管理員 email（如 pinpin@example.com）">
      <button class="pa-btn pa-btn-gold" onclick="createBusiness()" style="width:100%;padding:12px">開通</button>
      <div id="createResult" style="font-size:.82rem;margin-top:8px;min-height:20px"></div>
    </div>

    <!-- 平台統計 -->
    <div class="pa-card">
      <div class="pa-card-title">平台統計</div>
      <div id="platformStats" style="font-size:.88rem;color:rgba(255,255,255,.6);line-height:2">
        載入中⋯
      </div>
    </div>
  </div>
</div>

<footer class="hl-footer">
  <div class="hl-footer-inner">
    <div class="hl-footer-brand">
      <div class="hl-footer-logo"><img src="LOGO-1.png" alt="" class="hl-logo-icon" aria-hidden="true" loading="lazy">馥靈之鑰 Hour Light</div>
      <div class="hl-footer-tagline">讀懂自己，活對人生｜創辦人 王逸君</div>
    </div>
    <div class="hl-footer-links">
      <a href="index.html">首頁</a>
      <a href="booking-admin.html">預約管理</a>
      <a href="admin-dashboard.html">總管理後台</a>
    </div>
    <div class="hl-footer-copyright">© 2026 馥靈之鑰國際有限公司｜統編：60303284</div>
  </div>
</footer>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="assets/js/firebase-config.js"></script>
<script>
'use strict';
var SUPER_ADMINS = ['judyanee@gmail.com','info@hourlightkey.com','judyanee@hotmail.com'];
var db, auth;
if (typeof FIREBASE_CONFIG !== 'undefined' && FIREBASE_CONFIG.apiKey !== 'YOUR_API_KEY') {
  if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
  auth = firebase.auth();
  db = firebase.firestore();
}

auth.onAuthStateChanged(function(user){
  var guard = document.getElementById('guardArea');
  var main = document.getElementById('mainArea');
  if (!user) {
    guard.innerHTML = '請先登入<br><br><button onclick="firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider())" style="padding:12px 28px;border-radius:12px;background:linear-gradient(135deg,#f0d48a,#c9a060);color:#1a1520;border:none;font-size:.95rem;font-weight:600;cursor:pointer">Google 登入</button>';
    guard.style.display = 'flex'; main.style.display = 'none';
    return;
  }
  if (!SUPER_ADMINS.includes((user.email||'').toLowerCase())) {
    guard.innerHTML = '此帳號無平台管理權限：' + user.email;
    guard.style.display = 'flex'; main.style.display = 'none';
    return;
  }
  guard.style.display = 'none'; main.style.display = 'block';
  loadBusinesses();
});

function loadBusinesses(){
  db.collection('businesses').get().then(function(snap){
    var list = document.getElementById('bizList');
    if (snap.empty) {
      list.innerHTML = '<div style="color:rgba(255,255,255,.35)">還沒有公司</div>';
      return;
    }
    var totalBookings = 0;
    var html = '';
    var promises = [];

    snap.forEach(function(doc){
      var d = doc.data();
      var bizId = doc.id;
      html += '<div class="pa-biz">'
        + '<div><div class="pa-biz-name">' + (d.name || bizId) + '<span class="pa-stat pa-stat-green">啟用中</span></div>'
        + '<div class="pa-biz-meta">ID: ' + bizId + (d.owner ? ' · 管理員: ' + d.owner : '') + '</div></div>'
        + '<div class="pa-biz-actions">'
        + '<a href="booking-admin.html?biz=' + bizId + '" class="pa-btn pa-btn-gold">管理後台</a>'
        + '<a href="booking.html?biz=' + bizId + '" class="pa-btn pa-btn-outline">預約頁</a>'
        + '</div></div>';
    });
    list.innerHTML = html;

    // Platform stats
    document.getElementById('platformStats').innerHTML =
      '公司數：' + snap.size + '<br>' +
      '平台版本：v1.0 SaaS<br>' +
      '部署：GitHub Pages + Vercel<br>' +
      '金流：PAYUNi 統一金流（AES-256-GCM）';
  });
}

function createBusiness(){
  var bizId = document.getElementById('newBizId').value.trim().toLowerCase().replace(/[^a-z0-9-]/g,'');
  var bizName = document.getElementById('newBizName').value.trim();
  var bizOwner = document.getElementById('newBizOwner').value.trim();
  var result = document.getElementById('createResult');

  if (!bizId || !bizName) { result.textContent = '請填 ID 和名稱'; result.style.color = '#e57373'; return; }

  result.textContent = '建立中⋯'; result.style.color = 'rgba(255,255,255,.5)';

  db.collection('businesses').doc(bizId).get().then(function(doc){
    if (doc.exists) {
      result.textContent = '此 ID 已存在：' + bizId; result.style.color = '#e57373';
      return;
    }
    return db.collection('businesses').doc(bizId).set({
      name: bizName,
      slug: bizId,
      owner: bizOwner || '',
      tagline: '',
      desc: '',
      address: '',
      phone: '',
      lineUrl: '',
      lineToken: '',
      deposit: 'off',
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      createdBy: auth.currentUser.email
    }).then(function(){
      result.textContent = '開通成功：' + bizName + '（' + bizId + '）'; result.style.color = '#6cc070';
      document.getElementById('newBizId').value = '';
      document.getElementById('newBizName').value = '';
      document.getElementById('newBizOwner').value = '';
      loadBusinesses();
    });
  }).catch(function(e){
    result.textContent = '失敗：' + e.message; result.style.color = '#e57373';
  });
}
</script>
<script src="assets/js/hl-topnav.js"></script>
<script src="assets/js/hl-bottomnav.js"></script>
</body>
</html>
