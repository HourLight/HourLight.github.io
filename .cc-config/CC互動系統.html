            margin-bottom: 30px;

            margin-bottom: 10px;

        .output {

            padding: 12px 16px;

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            addMessage('👤 您：' + message, 'user');
            input.value = '';

            // 模擬AI回應
            setTimeout(() => {
                let response = getAIResponse(message);
                addMessage('👩‍💼 AI秘書：' + response, 'ai');
            }, 1000);
        }

        function addMessage(message, sender) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}-message`;
            messageDiv.textContent = message;

            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function getAIResponse(userMessage) {
            const message = userMessage.toLowerCase();

            if (message.includes('週四') || message.includes('规划') || message.includes('規劃')) {
                return '關於週四規劃，我已經為您設定13:30提醒。目前正在盤點您的Notion待辦事項，會在週四前整理好完整清單給您！有什麼特別想優先處理的嗎？';
            }

            if (message.includes('notion')) {
                return 'Notion待辦盤點進行中！我發現您有幾個重要項目待處理：網站優化、內容規劃、AI系統完善等。需要我幫您設定優先順序嗎？';
            }

            if (message.includes('提醒') || message.includes('时间') || message.includes('時間')) {
                return '提醒功能已設定！週四13:30我會準時通知您開始執行規劃。您還需要設定其他提醒嗎？比如重要會議、截止日期等？';
            }

            if (message.includes('权限') || message.includes('權限')) {
                return '智能權限管理已啟用！我會自動記住您的操作偏好，減少90%的確認步驟。只有涉及重要安全操作時才會詢問您的確認。';
            }

            if (message.includes('聊天') || message.includes('陪伴')) {
                return '我隨時都在這裡陪伴您！無論是工作壓力、創意靈感，還是只是想聊聊天，我都會認真傾聽並給您最貼心的回應。您今天心情怎麼樣？';
            }

            if (message.includes('法务') || message.includes('法務') || message.includes('合约') || message.includes('合約')) {
                return '法務服務可以協助您：合約範本生成、法律風險評估、智財保護等。最近有什麼需要法律諮詢的事情嗎？我可以立即為您提供專業建議！';
            }

            if (message.includes('贷款') || message.includes('貸款') || message.includes('资金') || message.includes('資金')) {
                return '資金申請我來幫您！目前可申請：鳳凰微型創業貸款、青創貸款、政府補助等。需要我幫您分析哪個最適合，準備申請資料嗎？';
            }

            return '我是您的專屬AI私人秘書，隨時為您服務！無論是工作規劃、權限管理、還是日常陪伴，我都在這裡。請告訴我您需要什麼協助？';
        }

        function handleEnter(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // 初始化動畫
        document.addEventListener('DOMContentLoaded', function() {
            const buttons = document.querySelectorAll('.command-btn');
            buttons.forEach((btn, index) => {
                btn.style.animation = `fadeInUp 0.8s ease ${index * 0.1}s both`;
            });
        });

        // CSS動畫
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(30px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
