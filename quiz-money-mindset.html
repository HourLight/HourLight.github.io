  hoard:{name:'安全囤積型',icon:'🏦',sub:'錢是你的安全毯',
    desc:'你跟錢的關係像倉鼠跟花生。不是貪心，是害怕。存款數字是你的安眠藥，少一塊都會讓你半夜驚醒。你很自律、很有計畫，但有時候「省」到忘了「活」。',
    detail:'安全囤積型的金錢劇本通常寫在童年。也許你小時候經歷過家裡經濟不穩定，也許你看過大人為錢吵架，也許有人告訴過你「沒錢什麼都不是」。\n\n所以你學會了一件事：存款就是安全感。帳戶數字越多，你越能呼吸。\n\n問題不在存錢這個行為，而在背後那個恐懼。當你把錢等於安全、花錢等於危險，你的人生就只剩下「防守」。偶爾的享受不是浪費，是在告訴自己：我值得在活著的時候就享受活著。\n\n試一次：這週找一件 500 塊以內的小事，純粹為了開心去花。不記帳。',

    med:'「安全毯呼吸法」\n\n找一個安靜的角落坐下來。把手放在你的胸口。\n\n1. 吸氣 4 秒：想像你的帳戶數字在發光，那個光是溫暖的金色\n2. 憋氣 4 秒：對自己說「我現在是安全的，不是因為錢，是因為我在」\n3. 吐氣 6 秒：想像那道金光從帳戶數字慢慢擴散到你的生活裡，變成一頓好吃的飯、一杯想喝的咖啡、一個讓你微笑的小東西\n\n做 5 輪。\n\n最後一輪結束後，對自己說：「錢是工具，不是主人。我可以用它來活，不只是用它來撐。」\n\n這個練習透過觸覺（手放胸口）和視覺化雙重刺激迷走神經，幫助你的神經系統記住「安全感不只有一種來源」。',

  spend:{name:'揮霍享受型',icon:'🛍️',sub:'花錢是你的情緒出口',
    desc:'你花錢的時候最像自己。刷卡的聲音是你的白噪音，拆包裹的瞬間是你一天裡最快樂的時刻。不是不知道要省，是「活在當下」對你來說不是口號，是消費哲學。',

    med:'「購物車暫停練習」\n\n下次你打開購物APP或走進一間店，在按下「加入購物車」之前：\n\n1. 把手機翻面朝下（或把東西放回架上），閉上眼睛\n2. 吸氣 4 秒：問自己「我現在什麼感覺？」\n3. 吐氣 6 秒：問自己「買了之後那個感覺會消失嗎？還是只是暫時蓋住？」\n4. 再吸氣 4 秒：問「三天之後我還會記得這個東西嗎？」\n5. 吐氣 6 秒：如果答案是「會」，那就買。如果答案模糊，給自己 24 小時再決定\n\n這不是叫你不花錢。是讓你的前額葉有機會參與決策，而不是每次都讓杏仁核的多巴胺搶先發車。',
    closing:'你的慷慨和對生活的熱情是真的很美的特質。只是偶爾讓那股熱情流向不用刷卡的地方，你會發現有些快樂根本不需要物流。'},

    desc:'你不是不在乎錢，你只是不想面對。帳單放到過期、餘額不敢看、理財文章永遠存了不讀。你跟錢的關係像一對冷戰中的情侶：都知道有問題，但誰都不開口。',
    detail:'逃避型的人對錢的感覺是複雜的。不是不想管，是管了會焦慮，焦慮了會更不想管，然後就形成一個迴圈。\n\n你可能覺得理財很複雜、很無聊、或者是「別人的事」。也可能你曾經試過認真面對，結果發現數字比你想像的糟，從此再也不敢打開帳本。\n\n逃避不會讓問題消失，但你已經知道了。你缺的不是知識，是一個夠安全的起點。不需要一次搞懂所有的事，只要願意打開手機看一眼餘額，今天就已經很了不起了。\n\n試一次：現在，就現在，打開你的銀行APP，看一下餘額。不用做任何事，看一眼就好。',

    detail:'成就驅動型的人通常在職場上表現很好，財務狀況也不差。但問題出在：你把自己的價值跟收入綁在一起了。\n\n賺得多的月份你信心滿滿，賺得少的月份你開始自我懷疑。加薪的時候覺得自己是個人物，被砍預算的時候覺得天要塌了。\n\n你追求的不是錢本身，是錢代表的那個「我很有用」、「我很厲害」、「我值得被尊重」。但這個邏輯反過來就很危險：如果沒賺到那個數字，你就不值得被尊重了嗎？\n\n試一次：今天下班後，做一件跟「產值」完全無關的事。散步、發呆、看一集沒營養的劇。允許自己「沒有在創造價值」地活一個小時。',

    detail:'匱乏焦慮型的核心不是真的沒錢（雖然有時候是），而是一種根深蒂固的信念：「我不會有足夠的。」\n\n這個信念可能來自童年的貧困經驗，可能來自父母的焦慮被你整套複製過來，也可能來自一次重大的財務打擊。不管來源是什麼，它讓你活在一個永遠不安全的世界裡。\n\n真正的問題是：如果你連有錢的時候都在焦慮，那錢就不是解方了。解方在你跟「匱乏」這個感覺之間的關係。\n\n你需要的不是更多的錢，是一個讓你相信「夠了」的時刻。\n\n試一次：今天回家，打開冰箱看一看裡面有什麼。不是看「缺什麼」，是看「有什麼」。然後用裡面的食材做一頓飯。那就是夠了的感覺。',

    detail:'佛系隨緣型的人通常活得很輕鬆，壓力很小。你不會為了錢焦慮，也不會為了錢拼命。\n\n好處是你很自在。壞處是你可能忽略了一些需要面對的財務現實。不焦慮跟不在乎中間有一條線，而那條線有時候很模糊。\n\n另一個可能是：你的「不在意」其實是另一種逃避。不是不怕，是假裝不怕。不是不在乎，是覺得在乎了也沒用。\n\n如果是真的佛系，那你不需要改變什麼。如果是假裝佛系⋯那你可能需要跟自己的錢好好聊一聊。\n\n試一次：今天花五分鐘想一下，如果三年後你的財務狀況跟現在一模一樣，你OK嗎？如果答案猶豫了，那就不是真的佛系。',
    oil:'茶樹 × 尤加利 × 檸檬',
    oilDetail:'茶樹的萜品四醇像一面清晰的鏡子，讓你看見「隨緣」背後到底是真的放下還是懶得面對。尤加利的桉油醇喚醒前額葉的規劃功能，給你一點「也許我可以多想一步」的動力。檸檬的檸檬烯帶來清新的覺察力，讓「活在當下」多一個維度：「活在當下，但知道明天在哪裡」。\n\n調配建議：基底油 10ml＋茶樹 2 滴＋尤加利 2 滴＋檸檬 1 滴。檸檬有光敏性，塗抹後 12 小時避免陽光直曬。',
    med:'「三年後的我」冥想\n\n閉上眼睛，做三次深呼吸。\n\n1. 吸氣 4 秒：想像三年後的你，住在哪裡、做什麼、跟誰在一起\n2. 吐氣 6 秒：那個三年後的你，跟現在的你比，有什麼不一樣？\n3. 吸氣 4 秒：如果三年後的你跟現在完全一樣，你是什麼感覺？\n4. 吐氣 6 秒：如果那個感覺是「也OK啊」，那你是真佛系。如果那個感覺有點酸，那就值得多想想\n\n做 4 輪。\n\n最後一輪結束後問自己：「我的隨緣，是自由，還是放棄？」\n不用急著回答。讓這個問題陪你走一段。',

let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const optsHTML='<div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]===o.a?' selected':'')+'" onclick="selectOpt('+i+',\''+o.a+'\',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 題 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一題</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一題 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看我的金錢人格 💰</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,a,btn){answers[qi]=a;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 題，共 '+questions.length+' 題';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const scores={};Object.keys(TYPES).forEach(k=>{scores[k]=0;});
  Object.values(answers).forEach(a=>{scores[a]=(scores[a]||0)+1;});
  const sorted=Object.keys(TYPES).sort((a,b)=>scores[b]-scores[a]);
  const topType=sorted[0],f=TYPES[topType],f2=TYPES[sorted[1]];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('screenshotCard').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥靈之鑰</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-tags"><span class="ss-tag">金錢觀覺察</span><span class="ss-tag">'+f.name+'</span></div><div class="ss-quote">「'+f.closing+'」</div><div class="ss-footer">hourlightkey.com ✦ 讀懂自己，活對人生</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">金錢觀覺察 Money Mindset</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var tp=TYPES[k],pct=Math.round(scores[k]/questions.length*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+tp.icon+' '+tp.name+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">💰 你的金錢人格</div><div class="result-section-content">'+f.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度解析</div><div class="result-section-content">'+f.detail.replace(/\n/g,'<br>')+'</div></div>'+(f2?'<div class="result-section"><div class="result-section-title">'+f2.icon+' 副型：'+f2.name+'（'+f2.sub+'）</div><div class="result-section-content">'+f2.desc+'</div></div>':'')+'<div class="result-section"><div class="result-section-title">🌿 認知芳療建議：'+f.oil+'</div><div class="result-section-content">'+f.oilDetail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🧘 冥想練習（60-90秒）</div><div class="result-section-content">'+f.med.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">✦ 馥靈收束語</div><div class="result-section-content" style="font-family:LXGW WenKai TC,serif;font-size:1rem;line-height:1.9">'+f.closing+'</div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ 馥靈之鑰 × 你的覺察密碼</div><div class="hour-bridge-text" style="margin-bottom:8px">你跟錢的關係，其實是你跟自己的關係。今天看到的不是理財建議，是你潛意識裡那本從來沒翻開的帳本。帳本打開了，才知道該補哪一頁。</div><div style="font-size:.85rem;color:#9e8a70;line-height:1.8;margin-bottom:16px">馥靈秘碼可以看到你天生的財富能量設定，跟今天的金錢人格交叉比對更完整。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免費解碼馥靈秘碼 →</a>';
  try{localStorage.setItem('hl_quiz_money',JSON.stringify({type:topType,scores,ts:Date.now()}));}catch(e){}
  window._resultText=f.icon+' 我的金錢人格是「'+f.name+'」：'+f.sub+'。'+f.desc.substring(0,60)+'⋯ 你跟錢的關係是什麼？ 👉 hourlightkey.com/quiz-money-mindset.html #馥靈之鑰 #金錢觀覺察';
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz-money-mindset',toolName:'金錢觀覺察'});window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
