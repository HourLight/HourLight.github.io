const DIMS={legacy:'傳承印記',suppress:'情緒壓抑',vigilance:'高度警覺',resilience:'韌性修復'};
const TYPES={
  deep_echo:{name:'深層回聲型',icon:'🪞',sub:'家族的故事，一直在你身上重播',
    keys:['家族劇本','無意識重複','情緒記憶'],
    desc:'你身上帶著很深的家族印記。那些你以為是「我的個性」的東西，很多其實是上一代沒有處理完的情緒，透過日常相處滲進你的身體裡。你可能會發現自己在親密關係裡重複父母的模式，在職場上複製家裡的權力結構，在面對衝突的時候用跟小時候一模一樣的方式反應。這不是你的錯。當一個模式在家族裡運行了兩三代，它的慣性大到你不特別去看，根本不會發現自己在裡面。',
    detail:'代際創傷傳遞研究（Bekes & Starrs, 2024）發現，創傷的傳遞不只是心理層面的。它會影響基因表現（表觀遺傳學），影響你的壓力荷爾蒙基準值，影響你的依附模式。你的「過度反應」可能不是你反應過度，而是你的神經系統從小就被校準在一個比較高的警戒水平。\n\n但看見本身就是改變的起點。你願意做這份測驗，代表你已經不想再無意識地演那個劇本了。打破循環不需要一次到位，每一次你意識到「啊，這是家裡的模式，不是我的選擇」，就已經在鬆動那個慣性了。\n\n覺察練習：這週找一個讓你情緒起伏的時刻，暫停三秒，問自己：「這個反應是我的，還是家裡的？」不需要答案，問本身就是覺察。',
    oil:'乳香 2 滴＋薰衣草 2 滴＋岩蘭草 1 滴，睡前擴香。乳香幫你跟深層記憶建立一個比較安全的連結通道，薰衣草降低被翻攪的不安感，岩蘭草讓你的根重新紮在「現在的我」而不是「家族的我」。',
    med:'閉上眼睛。想像你站在一條很長的家族隊伍裡，你的前面站著爸媽，爸媽前面站著阿公阿嬤。吸氣四秒，感覺這條線的重量。吐氣六秒。第四次呼吸的時候，你往旁邊踏出一步。你還是這個家族的一份子，但你站在自己的位置上了。吸氣四秒，對家族的隊伍說：「謝謝你們撐到了我這一代。接下來，我會用我的方式走。」吐氣六秒。張開眼睛。',
    quote:'你身上帶著的，不全是你的。看見了，就有機會放下。'},
  silent_bearer:{name:'沉默承擔型',icon:'🤐',sub:'你把情緒吞下去的姿勢，跟家裡人一模一樣',
    keys:['情緒壓抑','獨自消化','忍耐慣性'],
    desc:'你從小就學會了一件事：不要說。不要讓人知道你不開心、不要讓人看到你的脆弱、不要成為別人的負擔。你可能是家裡最懂事的那一個，最早開始幫忙做家事的那一個，成績不用人催的那一個。因為你很早就知道，家裡的容量已經不夠了，你的情緒如果也加進去，整個系統會崩潰。所以你學會了壓住。壓久了，你可能已經不太記得「表達情緒」是什麼感覺了。不是不想說，是不知道怎麼開口。',
    detail:'情緒壓抑不是你的選擇，是你的生存策略。在你成長的環境裡，壓住情緒是最安全的做法。但現在你已經長大了，環境變了，這個策略反而在傷害你。長期壓抑跟很多身心狀況有關：慢性疲勞、莫名的身體疼痛、人際關係裡的疏離感、突然爆發然後極度自責的循環。\n\n你身體裡有一個巨大的情緒冰庫，什麼都塞進去了但從來沒有整理過。不需要一次全部打開。找一個安全的出口就好，可以是一個值得信任的人、可以是寫日記、可以是哭一場。\n\n覺察練習：今天找一個你信任的人，跟他說一句真話。可以很小。「今天有點累。」「那件事我其實有點介意。」不需要解釋太多，讓出口先打開一個縫。',
    oil:'玫瑰 1 滴＋天竺葵 2 滴＋佛手柑 2 滴，泡澡或泡腳的時候滴入。玫瑰很輕柔地碰觸你的心牆，不是要你拆掉，是讓你知道牆後面的東西還活著。天竺葵讓壓抑的情緒有一個安全的流動方式。佛手柑降低「說出來會怎樣」的恐懼。',
    med:'閉上眼睛，把手放在喉嚨的位置。吸氣四秒，感覺喉嚨是緊的還是鬆的。吐氣六秒。大部分時候可能是緊的，因為那裡鎖了很多沒說出口的話。吸氣四秒，想像喉嚨裡有一扇很小的門。吐氣六秒，讓那扇門打開一條縫。不需要有東西出來，先讓空氣流通就好。重複四次。對自己說：「我的感受值得被聽見。」張開眼睛。',
    quote:'你吞下的那些，身體都記得。允許自己說出口，不是軟弱，是勇敢。'},
  sentinel:{name:'高度警戒型',icon:'🦅',sub:'你的雷達一直開著，因為你不能再被嚇到了',
    keys:['過度警覺','環境掃描','安全需求'],
    desc:'你對環境的感知能力非常強。誰的臉色變了、誰的語氣不對、空氣裡的氣壓是不是降了，你都會第一時間偵測到。這不是敏感，這是你的神經系統被訓練過的結果。在你的成長過程中，可能有一些「不可預測」的事情反覆發生，大人的情緒不穩、家裡的氣氛隨時可能翻盤、你不知道今天回家等著你的是笑臉還是暴風雨。所以你的身體學會了提前偵測危險。那個雷達，從來沒有關過。',
    detail:'持續的高度警覺會消耗大量的心理資源。你可能會覺得自己「很容易累」，不是因為做了什麼，而是你的神經系統一直在運作，像一台從來不關機的電腦。你可能睡眠品質不太好、容易驚醒、在人多的地方會不舒服、需要一個安全的角落才能放鬆。\n\n這個模式在童年是保護你的。但現在的你已經有能力保護自己了，那個雷達可以調低一點。不是關掉，是從最大音量調到適當音量。\n\n覺察練習：找一個你覺得安全的空間，設定十分鐘的鬧鐘。在這十分鐘裡，刻意告訴自己：「現在是安全的。」如果雷達又啟動了，溫柔地對它說：「我知道你在保護我。但現在不需要。」練習讓身體記住「安全」的感覺。',
    oil:'薰衣草 3 滴＋甜橙 1 滴＋雪松 1 滴，在睡前或需要安定的時候擴香。薰衣草是最溫柔的安全信號，甜橙把你從警戒模式裡拉回來，雪松像一棵穩定的大樹讓你靠著。讓你的神經系統知道：可以休息了。',
    med:'坐在一張有靠背的椅子上，讓背靠著。閉上眼睛。感覺背後是穩固的。吸氣四秒，問自己：「現在有危險嗎？」吐氣六秒。答案通常是沒有。吸氣四秒，感覺椅子在支撐你。吐氣六秒。重複三次。第四次的時候，讓肩膀往下沉兩公分。對你的身體說：「謝謝你一直保護我。現在可以休息一下了。」張開眼睛。',
    quote:'你的警覺讓你活了下來。但你現在已經安全了，可以讓雷達歇一歇。'},
  resilient_breaker:{name:'韌性破局型',icon:'🌱',sub:'你看見了模式，而且你正在改寫它',
    keys:['覺察力高','主動轉化','打破循環'],
    desc:'你的家族印記不比別人少，但你有一個很了不起的能力：你看得見。你能辨認出哪些反應是自己的，哪些是家族遺留的。而且你不只是看見，你還在做。在每一個「差點又重複舊模式」的瞬間裡，你選擇了暫停、選擇了不同的反應、選擇了一條新的路。這不容易。打破慣性需要的力氣，比順著慣性走大十倍。但你正在做。',
    detail:'韌性不是「不受影響」，是「受了影響之後有能力恢復和轉化」。研究顯示，能夠打破代際創傷循環的人，通常有幾個共同特質：願意面對真實（即使很痛）、有至少一個安全的人際連結、有持續反思的習慣。你可能不是每一條都有，但你一定有其中至少一條，否則你不會走到這裡。\n\n你正在做的事情，不只是為自己。每一個你打破的模式，都會讓你的下一代少繼承一個不屬於他們的包袱。你是家族裡的轉折點。\n\n覺察練習：寫下一個你已經成功打破的家族模式，不管多小。然後寫下一個你還在努力的。前者提醒你已經走了多遠，後者讓你知道下一步在哪裡。',
    oil:'尤加利 2 滴＋薄荷 1 滴＋乳香 2 滴，在早上或需要力量的時候擴香。尤加利清理舊的、不屬於你的能量殘留，薄荷讓你的決心保持清醒，乳香連結你最深層的智慧，提醒你打破循環的能力一直都在。',
    med:'站起來，雙腳踩穩。閉上眼睛。想像你腳下有一個圓圈，圈裡是「你的」，圈外是「家族的」。吸氣四秒，把屬於你的收進圈裡。吐氣六秒，把不屬於你的放到圈外。重複四次。不需要扔掉，只是分清楚。最後，看著圈外的東西，說：「謝謝你教會我的，但我選擇不帶走你。」張開眼睛。',
    quote:'你是家族故事的轉折點。從你開始，劇本改寫了。'},
  invisible_child:{name:'隱形小孩型',icon:'👻',sub:'你從小就學會了不佔空間',
    keys:['自我消除','過度配合','存在感焦慮'],
    desc:'你在家裡的位置，不是被看見的那一個。可能是因為有一個特別需要關注的手足，可能是因為父母自己都顧不了自己，可能是因為「乖的小孩不需要擔心」。你很早就學會了縮小自己，不添麻煩、不提要求、不佔空間。你把「不被注意到」當成一種安全策略。但長大之後你發現，你好像不太知道自己「想要什麼」。因為你花了太多年把自己的需求藏起來，藏到連自己都找不到了。',
    detail:'「隱形小孩」在家族系統裡其實是一個非常重要的角色。你的存在讓家庭系統可以運作下去，因為你不增加負擔。但代價是你的內在有一個持續在問「我重要嗎？我存在嗎？」的聲音。你可能在人際關係裡過度付出（因為你覺得要做些什麼才配得上被看見），或者反過來，你不太敢靠近人（因為靠近了也不一定會被看見）。\n\n你值得被看見。不是因為你做了什麼，是因為你存在。這句話你可能聽過很多次了，但身體不一定相信。身體的相信需要新的經驗來累積，不是一句話就能改變的。\n\n覺察練習：今天做一件「讓自己被看見」的小事。在群組裡表達一個意見、在餐廳裡指定你想坐的位子、跟一個人說「我今天想要...」。讓「佔空間」這件事慢慢變得安全。',
    oil:'甜橙 2 滴＋茉莉 1 滴＋佛手柑 2 滴，在需要勇氣的早上擴香。甜橙是存在感的氣味，暖暖的告訴你你在這裡。茉莉喚醒你內在那個值得被看見的部分。佛手柑降低「佔空間是不對的」那個舊信念的音量。',
    med:'坐好，閉上眼睛。想像你在一個很大的房間裡，房間裡有很多人，但沒有人看到你。吸氣四秒，感覺那個隱形的感覺。吐氣六秒。第四次呼吸的時候，你對自己說：「我在這裡。」聲音不需要大，你自己聽到就好。吸氣四秒，說得大聲一點：「我在這裡。」吐氣六秒。重複三次，每一次聲音大一點。最後，想像房間裡的人轉頭看你了。他們的眼神是溫暖的。張開眼睛。',
    quote:'你不用做什麼才配得上被看見。你在這裡，這就夠了。'},
  emotional_firefighter:{name:'情緒消防員型',icon:'🧯',sub:'你的童年工作是「讓大人不要崩潰」',
    keys:['過度負責','情緒照顧者','早熟'],
    desc:'你從很小的時候就開始照顧大人的情緒。你知道媽媽什麼時候快哭了、爸爸什麼時候快爆了、家裡的氣氛什麼時候快要不行了。你會說適時的話、做適時的事、成為那個讓家裡不要散掉的黏著劑。你覺得這是理所當然的。但其實一個小孩不應該需要承擔這些。你的童年被借走了一大塊，拿去做了不屬於你的事。長大之後，你可能在任何關係裡都習慣性地當那個「照顧者」。你的雷達自動偵測誰不開心，然後你的身體自動切換成「讓對方好起來」模式。但你自己不開心的時候，你卻不知道該找誰。',
    detail:'心理學裡把這叫做「親職化」，就是孩子和父母的角色反轉了。你在該被照顧的年紀，反過來照顧了整個家。這讓你長大後有很強的同理心和照顧能力，但代價是你不太會「被照顧」。你的身體不知道怎麼接收，你的大腦會覺得「麻煩別人」是一件非常不安的事。\n\n你不需要繼續當消防員了。家裡的火不是你放的，也不該是你一個人滅的。你可以退一步。讓大人的事回到大人手上。\n\n覺察練習：這週有一個人跟你訴苦的時候，練習只聽，不修復。不給建議、不想辦法、不當中間人。就讓對方的情緒是對方的。觀察你不「出手救」的時候，你的焦慮有多高。那個焦慮的來源，值得去看看。',
    oil:'薰衣草 2 滴＋天竺葵 2 滴＋岩蘭草 1 滴，在照顧別人照顧到累的時候擴香。薰衣草讓你的消防員系統暫時下班，天竺葵提醒你自己也是需要被照顧的人，岩蘭草把你的根紮回自己身上，不是紮在別人的需求裡。',
    med:'閉上眼睛。想像你手裡拿著一個滅火器，四周都是火。吸氣四秒，看看那些火。吐氣六秒。那些火是誰的？是你的嗎？大部分不是。吸氣四秒，把滅火器輕輕放到地上。吐氣六秒。火還在燒，但那不是你的火。吸氣四秒，退後一步。吐氣六秒。對自己說：「我不需要滅別人的火，才配得上被愛。」重複三次。張開眼睛。',
    quote:'你照顧了全世界。但你的火呢？誰在幫你滅？'},
  frozen_adapter:{name:'凍結適應型',icon:'🧊',sub:'你的情緒有一個自動冷凍庫',
    keys:['情感隔離','理性防衛','麻木'],
    desc:'你的情緒有一道自動開關。當事情太重、太痛、太複雜的時候，那個開關就會啪一聲切斷，你會進入一種很冷靜、很理性、好像什麼都不影響你的狀態。外面的人覺得你很堅強、很穩定、很有承受力。但你知道那不是堅強。那是凍結。你不是不痛，你是把痛推到了一個你暫時碰不到的地方。',
    detail:'情感隔離是一種很高級的心理防禦機制。它讓你在極端壓力下還能運作、還能做決定、還能照顧別人。問題是，情緒的開關一旦習慣性地關掉，快樂的感覺也一起被關掉了。你可能會發現自己對很多事情「沒什麼感覺」，不太開心但也不太難過，人生好像隔著一層玻璃在看。\n\n你的冰庫裡有很多東西，是時候一點一點拿出來看了。不需要一次全解凍，那太危險。一次一小塊就好。找一個安全的人陪你，或者找一個安全的方式（寫字、畫畫、做身體活動），讓情緒慢慢回來。\n\n覺察練習：今天刻意去做一件「感覺」的事。吃一口你喜歡的食物，慢慢嚼，問自己「好吃嗎？什麼感覺？」。把注意力放在感受上，而不是想法上。讓感覺的肌肉慢慢恢復。',
    oil:'玫瑰草 2 滴＋甜橙 2 滴＋薑 1 滴，在泡澡時滴入。玫瑰草非常溫柔地軟化情感的冰層，甜橙是溫暖的橘色陽光照進冰庫，薑是從身體核心慢慢升起的溫度。讓解凍的過程是溫和的，不是暴力的。',
    med:'閉上眼睛。想像你面前有一扇冰櫃的門。吸氣四秒，把手放在門上。好冷。吐氣六秒。你不需要打開它。只是感覺那個冷。吸氣四秒，想像你的手掌有溫度，溫度透過門傳進去。吐氣六秒。你不是在融化什麼，你只是在告訴裡面的東西：「我知道你在。」重複四次。最後對自己說：「慢慢來。等我準備好了，一點一點打開。」張開眼睛。',
    quote:'你以為自己很堅強，但那是凍結的姿態。解凍需要溫度，也需要時間。'},
  rebel_healer:{name:'反叛重塑型',icon:'🔥',sub:'你用力地活成跟家裡相反的樣子',
    keys:['對抗原生','刻意反向','身份重建'],
    desc:'你很早就決定了一件事：我絕對不要變成他們那樣。你看到了家裡的問題，你的反應不是重複，是用力地跑向反方向。父母節省到極端，你可能變成大方到不照顧自己。父母情緒壓抑，你可能刻意讓自己什麼都說出來。你在建構一個「不是他們的我」，這個過程有力量，但也有盲點。因為你的座標系統依然是家裡的。你是在他們的地圖上跑向反方向，但你用的還是同一張地圖。',
    detail:'反叛本身不是問題，它是你保護自己的方式，也是你追求自主的證明。問題是，當你的所有選擇都在「跟家裡不一樣」的座標上運作，你其實還是被家族定義的。你只是從正面複製變成了反面複製。真正的自由，是你的選擇可以不需要參照他們。\n\n這不代表你的反叛沒有意義。你已經跨出了很重要的一步。現在的功課是從「逃離」走向「建構」。不是「我不要成為什麼」，是「我要成為什麼」。讓你的身份從反向定義變成正向定義。\n\n覺察練習：寫下三件你確定是「自己想要的」，而不是「跟家裡相反所以我選的」。如果寫不出來，那這就是你目前最值得花時間想的事情。',
    oil:'迷迭香 2 滴＋雪松 2 滴＋佛手柑 1 滴，在需要安靜下來想事情的時候擴香。迷迭香幫助你分辨「我真正想要的」和「我反對的」之間的差別，雪松讓你的根紮在自己身上而不是家族的對面，佛手柑讓重建的過程不那麼緊繃。',
    med:'閉上眼睛。想像你面前有一面鏡子，鏡子裡是家族的模式。你一直背對它在跑。吸氣四秒，停下來。吐氣六秒。轉過身，看著鏡子。鏡子裡的東西不會咬你。吸氣四秒，對鏡子說：「我看到你了。你教了我什麼不該做。」吐氣六秒。然後把鏡子翻到背面。背面是空白的。吸氣四秒，問自己：「我想在上面畫什麼？」吐氣六秒。讓畫面浮現。那才是你的。張開眼睛。',
    quote:'跑向反方向是第一步。但真正的自由，是你可以不需要參照任何人。'},
  legacy_light:{name:'傳承光明型',icon:'🕯️',sub:'你從家族裡收到的，不只有傷',
    keys:['感恩接納','正面傳承','平衡視角'],
    desc:'你的家族不完美。但你能看到，在那些不完美裡面，也有很多好的東西。阿嬤的韌性、爸爸的沉穩、媽媽的溫柔、家裡的某個不成文規則其實是在保護你的。你不會因為家裡有過傷痛就否定所有的好，也不會因為有好的就假裝傷痛不存在。你有一種很珍貴的能力：同時看見光和影，然後選擇帶走光、放下影。',
    detail:'Bekes 和 Starrs（2024）的研究特別指出，代際傳遞不只有創傷，也有韌性。那些經歷過戰爭、遷徙、貧困的家族，往往同時發展出驚人的生存智慧和情感連結能力。你身上的堅韌、你面對困難的態度、你對家人的忠誠，很多都是家族送給你的禮物。\n\n你的功課不是「修復」，而是「精選」。像逛一個很大的家族倉庫，挑你要帶走的，放下你不需要的。帶走阿嬤的堅韌但放下她的委屈，帶走爸爸的責任感但放下他的情緒壓抑。\n\n覺察練習：想一個你從家裡繼承的「好東西」，可以是一個能力、一個價值觀、一個習慣。然後想一個你想改變的。把好的放在左手心，把想改變的放在右手心。感覺兩隻手的重量。然後左手握拳（保留），右手打開（釋放）。',
    oil:'乳香 2 滴＋甜橙 2 滴＋薰衣草 1 滴，在感恩或者需要做整理的時候擴香。乳香連結家族的智慧傳承，甜橙帶來溫暖和感恩的感覺，薰衣草讓放下的過程是平靜的。',
    med:'閉上眼睛。想像你坐在一個家族聚會的大桌子旁邊，桌上擺滿了東西。有些是你想要的，有些不是。吸氣四秒，看看桌上的東西。吐氣六秒。拿起一樣你感恩的，放進口袋。吸氣四秒。拿起一樣你不需要的，輕輕推到桌子中間。吐氣六秒。重複四次。最後站起來，口袋裡裝著你選的東西。對桌子說：「謝謝這些年。」轉身走。張開眼睛。',
    quote:'家族給你的不只有傷，也有光。帶走你選的，放下其餘的。'},
  anxious_inheritor:{name:'焦慮繼承型',icon:'🌀',sub:'你的擔心，有些是上一代存進來的',
    keys:['泛焦慮','過度擔憂','安全感匱乏'],
    desc:'你好像天生就是一個容易擔心的人。但如果仔細看，你擔心的那些事情，跟家裡的恐懼是一模一樣的。爸媽怕窮，你對花錢也有莫名的不安。家裡出過意外，你對安全特別敏感。上一代經歷過動盪，你的身體對穩定有一種近乎偏執的需求。你的焦慮不一定是你的。它可能是家族記憶的身體化。你在替上一代擔他們當年擔不完的心。',
    detail:'表觀遺傳學的研究發現，極端壓力可以改變基因的表現方式，而且這個改變可以遺傳。你的基準焦慮水平可能真的比一般人高，不是因為你「太敏感」，是因為你的生物系統裡寫進了上一代的生存警報。在台灣，戰後遷台、白色恐怖、經濟起飛的壓力、土地認同的焦慮，這些集體經驗都可能透過家庭氛圍傳遞到你身上。\n\n知道焦慮的「戶籍」在哪裡，不會讓焦慮消失，但可以讓你不再為此責怪自己。你不是「想太多」的人，你是帶著兩代人的擔心在活的人。輕一點看自己。\n\n覺察練習：下次焦慮上來的時候，對自己說：「這是我的焦慮，還是家裡的？」如果是家裡的，想像把它放進一個盒子裡，盒子上面寫著家人的名字。不是不管它，是標記它不是你的。',
    oil:'薰衣草 2 滴＋佛手柑 2 滴＋依蘭 1 滴，在焦慮感上來的時候擴香或滴在手帕上。薰衣草降低你的基準焦慮值，佛手柑把「萬一」的聲音調小，依蘭溫柔地跟你說：「你擔心的那些事，大部分不會發生。而且就算發生了，你也能應對。」',
    med:'閉上眼睛。想像你的身體裡有很多個擔心，像很多顆小石頭。有些石頭上面刻著你的名字，有些刻著爸媽的名字，有些刻著阿公阿嬤的名字。吸氣四秒，感覺那些石頭的重量。吐氣六秒。伸出手，把刻著別人名字的石頭一顆一顆放下來。吸氣四秒，放一顆。吐氣六秒，放一顆。重複四次。身體輕了一點。那些還留著的石頭，才是你真正需要面對的。張開眼睛。',
    quote:'你擔心的那些，有些根本不是你的功課。放下別人的石頭，你才能走得動。'},
  body_keeper:{name:'身體記憶型',icon:'🫀',sub:'你的身體記得所有大腦選擇忘記的事',
    keys:['身體化症狀','感官記憶','凍結反應'],
    desc:'你的身體是一本日記，寫滿了大腦沒有處理過的段落。某些場景你會莫名心跳加速、某些氣味讓你全身不舒服、某些聲音讓你瞬間僵住。你可能去看過醫生，檢查都正常，但你知道身體裡有什麼不對勁的東西。那些不是你的想像。你的身體在替你保存了一些大腦還沒準備好面對的記憶。它們可能是你自己的，也可能是你在家裡吸收到的。孩子的身體是海綿，大人沒說出口的恐懼和悲傷，孩子的身體會代替吸收。',
    detail:'Bessel van der Kolk 的「身體記得一切」理論指出，創傷記憶不只儲存在大腦的杏仁核，也儲存在身體的肌肉和筋膜裡。這就是為什麼有時候你做瑜伽或按摩的時候會突然想哭。不是你想到了什麼，是你的身體在釋放那個被鎖住的東西。\n\n你的身體需要一種不是「想通」而是「感受通」的方式來處理這些。身體工作（瑜伽、跳舞、呼吸練習、按摩）通常比談話更直接。你不需要「理解」身體裡的東西才能釋放它，你只需要讓它有一個安全的出口。\n\n覺察練習：今天花五分鐘做全身掃描。從頭頂慢慢感覺到腳底，注意哪裡緊、哪裡痛、哪裡有感覺。不需要做什麼，只是注意。你的身體一直在跟你說話，你只需要開始聽。',
    oil:'薰衣草 2 滴＋迷迭香 1 滴＋生薑 2 滴，在做伸展或放鬆的時候擴香。薰衣草安撫被啟動的身體記憶，迷迭香讓你在感受的同時保持一定的意識清晰度（不要被情緒淹沒），生薑溫暖你身體裡那些凍結的區域。',
    med:'躺下來，或者坐在舒服的地方。閉上眼睛。從頭頂開始，慢慢往下掃描。吸氣四秒，注意頭部和脖子。吐氣六秒。有緊的地方嗎？不需要改變它，只是看見。吸氣四秒，往下到肩膀和胸口。吐氣六秒。繼續往下，腹部、腰部、臀部、大腿、小腿、腳。每一個區域都停留一次呼吸。掃描完之後，對你的身體說：「謝謝你替我記住了這些。我在學習怎麼聽你的話。」張開眼睛。',
    quote:'你的身體是最忠實的日記。學會讀它，比讀任何書都重要。'}
};
let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';
    const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 題 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一題</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一題 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看看我的韌性圖譜 🌳</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 題，共 '+questions.length+' 題';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const dimScores={};Object.keys(DIMS).forEach(k=>{dimScores[k]=0;});
  Object.keys(answers).forEach(qi=>{const oi=answers[qi];const s=questions[qi].opts[oi].s;Object.keys(s).forEach(d=>{dimScores[d]+=s[d];});});
  const maxPossible=Object.keys(answers).length*3;
  // Determine type based on legacy vs resilience ratio + secondary dims
  const legacyPct=dimScores.legacy/maxPossible;
  const resilPct=dimScores.resilience/maxPossible;
  const suppressPct=dimScores.suppress/maxPossible;
  const vigilancePct=dimScores.vigilance/maxPossible;
  let topType;
  if(resilPct>0.55) topType='resilient_breaker';
  else if(resilPct>0.4&&legacyPct<0.3) topType='legacy_light';
  else if(legacyPct>0.5&&suppressPct>0.4) topType='silent_bearer';
  else if(legacyPct>0.5&&vigilancePct>0.4) topType='sentinel';
  else if(suppressPct>0.5&&vigilancePct<0.2) topType='frozen_adapter';
  else if(suppressPct>0.4&&legacyPct>0.3) topType='invisible_child';
  else if(legacyPct>0.5&&resilPct>0.2) topType='rebel_healer';
  else if(vigilancePct>0.35) topType='anxious_inheritor';
  else if(legacyPct>0.4) topType='body_keeper';
  else topType='emotional_firefighter';
  const sorted=Object.keys(DIMS).sort((a,b)=>dimScores[b]-dimScores[a]);
  const f=TYPES[topType];
  // Find a secondary type
  const typeKeys=Object.keys(TYPES).filter(k=>k!==topType);
  const secondType=typeKeys[0];
  const f2=TYPES[secondType];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('hlTitleReveal').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥靈之鑰</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-quote">「'+f.quote+'」</div><div class="ss-footer">hourlightkey.com ✦ 鑰匙我遞給您。城堡自己開。</div></div><div class="hl-title-card"><div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div><div class="hl-title-eyebrow">Hour Light ✦ 代際創傷與韌性指數</div><span class="hl-title-icon">'+f.icon+'</span><div class="hl-title-main">'+f.name+'</div><div class="hl-title-sub">'+f.sub+'</div><div class="hl-title-divider"></div><div class="hl-title-grid"><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 韌性樣態</div><div class="hl-title-tag-value">'+f.name+'</div></div><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 覺察關鍵字</div><div class="hl-title-tag-value">'+f.keys.join(' · ')+'</div></div></div><div class="hl-title-quote">「'+f.quote+'」</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">代際韌性覺察 Intergenerational Resilience</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var pct=Math.round(dimScores[k]/maxPossible*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+DIMS[k]+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">'+f.icon+' 你的韌性樣態</div><div class="result-section-content">'+f.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度覺察</div><div class="result-section-content">'+f.detail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🌿 認知芳療配方</div><div class="result-section-content">'+f.oil+'</div></div><div class="result-section"><div class="result-section-title">🧘 60秒覺察練習</div><div class="result-section-content">'+f.med+'</div></div><div class="result-section" style="text-align:center;font-family:LXGW WenKai TC,serif;font-size:1.05rem;color:#8b6914"><div class="result-section-content">鑰匙我遞給您。城堡自己開。</div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ H.O.U.R. 覺察橋接</div><div class="hour-bridge-text">代際模式是「家族層」的你，馥靈秘碼看的是「設定層」的你。<br>兩個座標交叉，才能看清楚哪些是你的，哪些該還回去。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免費解碼馥靈秘碼 →</a>';
  window._resultText=f.icon+' 我的代際韌性類型是「'+f.name+'」：'+f.sub+'\n\n你的家族在你身上留下了什麼？👉 hourlightkey.com/quiz-intergenerational-trauma.html';
  try{localStorage.setItem('hl_quiz_intergenerational_trauma',JSON.stringify({type:topType,dimScores,ts:Date.now()}));}catch(e){}
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_dropMaterial) HL_dropMaterial('quiz');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz',toolName:'代際創傷與韌性指數'});window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
</script>
