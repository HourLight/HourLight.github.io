const TYPES={
  hedgehog:{name:'刺蝟（縮成一團）',icon:'🦔',sub:'壓力來的時候，你豎起全身的刺',
    keys:['自我保護','退縮','內耗嚴重'],
    desc:'你面對壓力的方式就是把自己蜷起來。不是躲，是你的身體會自動啟動防禦模式。肩膀縮起來、社交減到最少、把自己關在一個小空間裡。你的刺不是要傷人，是你在保護一個很柔軟的自己。問題是你縮著的時候，別人碰不到你，但你也碰不到任何可以幫你的東西。',
    detail:'刺蝟反應在神經科學裡對應的是「凍結反應（freeze response）」，是戰或逃之外的第三種壓力回應。你的自律神經系統選擇關機而不是戰鬥或逃跑。這不是軟弱，是你的系統在用「最低功耗模式」保護你。\n\n刺蝟的風險是：你會在自己的殼裡越待越久。壓力沒有消失，只是被你隔在刺的外面。但那些被隔開的東西裡面，可能有人想幫你、有資源可以用、有出路你沒看到。\n\n覺察練習：下次壓力來的時候，注意你的肩膀。它是不是已經快碰到耳朵了？做三次深呼吸，然後把肩膀刻意往下放。跟自己說：「我可以保護自己，但不用把所有人都關在外面。」然後做一件很小的事：回一則訊息、走出房間倒一杯水。一次打開一根刺就好。',
    oil:'薰衣草 2 滴＋佛手柑 2 滴＋甜橙 1 滴，在你縮起來的時候滴在手帕上深吸三次。薰衣草跟你的杏仁核說「安全了，可以鬆開」，佛手柑降低那個「外面很危險」的警報音量，甜橙像陽光從你的殼縫裡照進來。',
    med:'閉上眼睛。想像你是一隻刺蝟，蜷成一顆球。吸氣四秒，感覺你的刺豎起來。吐氣六秒。重複兩次。第三次呼吸的時候，想像有一隻很溫暖的手輕輕放在你旁邊，沒有碰你，只是在旁邊。吸氣四秒，感覺那份溫度。吐氣六秒，讓一根刺放下來。重複三次，每次多放下一根。最後對自己說：「我可以保護自己，也可以被靠近。」張開眼睛。',
    quote:'你的刺是你的保護，但偶爾放下幾根，讓陽光照到你柔軟的肚子。'},
  ostrich:{name:'鴕鳥（假裝沒事）',icon:'🪶',sub:'壓力來的時候，你把頭埋進沙子裡',
    keys:['逃避現實','拖延','表面平靜'],
    desc:'你面對壓力的方式就是不面對。帳單不看就不存在，訊息不讀就還沒發生，問題不想就不是問題。你是「假裝沒事」的高手，表面上你看起來好好的，但你心裡知道，沙子底下那些東西越積越多。你不是不知道該處理，你只是覺得「再等一下就好」。這個「一下」，有時候是一天，有時候是一年。',
    detail:'逃避是人類最常見的壓力反應之一，心理學叫「迴避式因應（avoidant coping）」。短期來看它真的有效，至少你今天不用痛。但長期來看，那些被你埋起來的問題會生利息。小問題變大問題、簡單的事變複雜的事、可以修的關係變成修不了的裂痕。\n\n鴕鳥的風險你自己比誰都清楚：你不是不知道，你是知道了不敢動。那份「不敢動」的底層是什麼？可能是害怕面對之後的結果、可能是覺得自己處理不來、也可能只是太累了。\n\n覺察練習：今天面對一件你一直在逃避的小事。不用是最大的那件，選一件小的就好。回一封你一直沒回的訊息、打開你一直沒看的帳單、處理一件你放了超過一週的事。做完之後注意一下：那個你以為會很恐怖的東西，真的有那麼恐怖嗎？',
    oil:'薄荷 2 滴＋迷迭香 2 滴＋葡萄柚 1 滴，在你開始「假裝沒事」的時候擴香。薄荷是一個清醒的小巴掌（溫柔的那種），迷迭香讓你的前額葉重新上線，葡萄柚給你一點面對現實的勇氣。你聞到這個味道的時候會想：「好吧，來面對吧。」',
    med:'閉上眼睛。想像你的頭埋在沙子裡，很暗，聽不到外面的聲音。吸氣四秒。吐氣六秒。重複兩次。第三次的時候，慢慢把頭抬起來。吸氣四秒，感覺光線照到你的臉。吐氣六秒，眼睛適應了。看看周圍，那些你一直不想看的東西其實都還在。吸氣四秒，對自己說：「我看見了。它沒有比我想像的可怕。」吐氣六秒。重複三次。張開眼睛。',
    quote:'你不是看不見，只是不想看。把頭抬起來，外面的陽光比你以為的溫柔。'},
  bee:{name:'蜜蜂（拼命忙碌）',icon:'🐝',sub:'壓力來的時候，你用「忙」來蓋過「慌」',
    keys:['過度行動','停不下來','用忙麻痺'],
    desc:'你面對壓力的方式就是讓自己更忙。別人壓力大的時候癱在沙發上，你壓力大的時候加班、接更多案子、把行程排得更滿。你的邏輯是：只要我在動，問題就追不上我。你確實很厲害，你的產能在壓力最大的時候反而最高。但你心裡知道，有些忙碌不是在解決問題，是在逃避那個停下來之後會浮上來的東西。',
    detail:'過度行動型壓力反應在心理學裡叫「功能性逃避」。你用生產力來證明自己還好、用忙碌來覆蓋焦慮。你的系統選擇了「戰鬥模式」，但你打的不是敵人，是你自己的安靜。\n\n蜜蜂的風險是：你會燒完。蠟燭兩頭燒，中間燒得最快。你的身體遲早會替你按下暫停鍵，可能是一場感冒、一次失眠、或是某天早上突然完全不想起床。那不是你當機了，是你的身體在說「夠了」。\n\n覺察練習：今天刻意留一個「什麼都不做」的空檔。不是「做輕鬆的事」，是真的什麼都不做。坐著，看著窗外，讓腦袋放空。你會發現那個空白讓你很不舒服。那個不舒服的感覺，就是你一直在用忙碌蓋住的東西。看它一眼就好，不用處理。',
    oil:'薰衣草 3 滴＋佛手柑 2 滴＋雪松 1 滴，在你覺得「停不下來」的時候擴香。薰衣草是一個溫柔的制動器，佛手柑讓你不需要「做了什麼」也能感覺到自己的價值，雪松是一棵不動的樹，提醒你：不動也是一種力量。',
    med:'閉上眼睛。想像你是一隻蜜蜂，翅膀嗡嗡響，一直在飛。吸氣四秒，感覺翅膀的震動。吐氣六秒。飛了好久好累了。第三次呼吸的時候，想像你降落在一朵花上。翅膀停了。吸氣四秒，安靜。吐氣六秒，安靜。什麼都不用做。花會托住你。重複四次。對自己說：「停下來不是偷懶，是充電。」張開眼睛。',
    quote:'你的勤勞是天賦。但蜜蜂也需要回巢休息。停下來，花會等你。'},
  cat:{name:'貓（獨處充電）',icon:'🐱',sub:'壓力來的時候，你需要一個人安靜待著',
    keys:['獨處需求','自我調節','界限清楚'],
    desc:'你面對壓力的方式很像一隻貓：自己找一個安靜的角落，蜷起來，不要任何人打擾。你不需要別人來安慰你，你需要的是空間。給你足夠的時間和安靜，你會自己消化、自己處理、自己恢復。你的充電方式就是「一個人」。不是孤僻，是你的系統就是這樣設計的。',
    detail:'你的壓力恢復機制是「獨處式自我調節」。你的神經系統在社交中消耗能量，在獨處中恢復能量。這不是性格缺陷，是你的大腦處理資訊的方式決定的。你在安靜中才能啟動修復程序。\n\n貓型的風險是：你可能會在獨處中跟世界斷線太久。你覺得自己在「充電」，但從外面看，你消失了。關心你的人不知道你怎麼了，只知道你不回訊息。你需要學會在消失之前丟一句話：「我需要一點時間，但我沒事。」這不是為別人，是讓你可以安心地獨處。\n\n覺察練習：下次你需要獨處之前，練習跟身邊最親近的人說一句話就好：「我需要一個人待一下，不是你的問題，我等等就回來。」然後安心地消失。這句話是你給自己的許可證，也是你給對方的安心丸。',

    med:'閉上眼睛。想像你是一隻貓，找到了一個溫暖的窗台。陽光照在你身上。吸氣四秒，感覺溫暖。吐氣六秒，全身放鬆。你不需要做任何事。不需要回應任何人。吸氣四秒，世界在外面轉，你在這裡休息。吐氣六秒。重複五次。最後伸一個懶腰，對自己說：「充好電了。」張開眼睛。',
    quote:'你的獨處是充電，不是逃跑。記得在消失之前說一聲「我等等就回來」。'},
  dog:{name:'狗（找人取暖）',icon:'🐕',sub:'壓力來的時候，你需要有人在旁邊',
    keys:['需要陪伴','語言紓壓','怕孤單'],
    desc:'你面對壓力的方式就是找人。打電話、傳訊息、約出來、抱一下。你需要有人聽你說，需要有人告訴你「你可以的」，需要感覺到「不是只有我一個人在扛」。你不是依賴別人幫你解決問題，你只是需要知道旁邊有人。那個「有人在」的感覺，就是你最強的修復模式。',
    detail:'你的壓力恢復機制是「社交式調節（social regulation）」。研究顯示，人在有連結感的時候，皮質醇（壓力荷爾蒙）會下降、催產素會上升。你的系統就是透過「人」來降壓的。這不是脆弱，是你的大腦知道團體比個體更容易存活。\n\n狗型的風險是：你可能會在找不到人的時候崩潰。如果你的修復模式百分之百依賴外部連結，那當你一個人的時候怎麼辦？你需要發展出一套「一個人也可以」的小系統，不取代陪伴，是在等待陪伴的空檔裡，讓自己不會散掉。\n\n覺察練習：下次壓力來但身邊沒有人的時候，試試這個：打開一首你喜歡的歌，聲音開大一點。在心裡跟唱歌的人說：「陪我一下。」音樂也是一種陪伴。然後自己給自己一個擁抱，雙手交叉抱住肩膀，輕輕拍。你就是你自己最近的那個人。',
    oil:'甜橙 3 滴＋薰衣草 2 滴＋花梨木 1 滴，在你需要陪伴但找不到人的時候擴香。甜橙是一個溫暖的擁抱（來自空氣），薰衣草告訴你的神經系統「你不是孤單的」，花梨木是一隻看不見但感覺得到的手，輕輕放在你的肩膀上。',
    med:'閉上眼睛。把雙手交叉抱住自己的肩膀。吸氣四秒，左手輕輕拍右肩。吐氣六秒，右手輕輕拍左肩。交替拍，像在拍一個小嬰兒。重複六次。然後想像你最想見到的那個人站在你面前，對你微笑。吸氣四秒，感覺那份溫暖。吐氣六秒。他說：「我在這裡。」重複三次。對自己說：「就算一個人，我也可以溫暖自己。」張開眼睛。',
    quote:'你需要人，這不是弱點，是你最好的修復模式。但學會自己也能抱住自己。'},
  chameleon:{name:'變色龍（看場合演）',icon:'🦎',sub:'壓力來的時候，你會變成別人需要的樣子',
    keys:['高度適應','壓抑真實','演技一流'],
    desc:'你面對壓力的方式就是「看場合調整」。老闆面前你冷靜專業，朋友面前你輕鬆搞笑，家人面前你什麼事都沒有。你可以在三分鐘內切換三種模式，像一台多頻道的電視。別人看到的永遠是他們想看到的那個你。但你自己呢？你在所有角色之間切來切去，有時候會忘了哪一個才是真正的自己。',
    detail:'變色龍型在心理學裡接近「高度自我監控（high self-monitoring）」的人格特質。你對環境的敏感度非常高，能迅速判斷「這裡需要我變成什麼」然後無縫切換。這讓你在社交場合很受歡迎、在職場上很有彈性。\n\n但變色龍的風險是：你可能已經很久沒有「不用演」的時刻了。每一個場合你都在調整、都在適應、都在表演。你的壓力不只來自外在事件，還來自「維持角色」的消耗。你累的不只是身體，是那個一直在計算「我應該表現得怎樣」的大腦。\n\n覺察練習：今天找十分鐘，關上門，不見任何人。對自己說：「現在沒有觀眾，我不用演。」然後觀察：你的身體在沒有角色的時候是什麼姿勢？你的表情是什麼？你的呼吸是怎麼樣的？那個「沒有在演」的你，就是最需要被你照顧的那一個。',
    oil:'天竺葵 2 滴＋薰衣草 2 滴＋檀香 1 滴，在你脫下所有面具的時候擴香。天竺葵讓你的情緒不再需要偽裝，薰衣草讓神經系統從「表演模式」切回「真實模式」，檀香是你最深處的體溫，不管外面變成什麼顏色，裡面的你永遠是暖的。',
    med:'閉上眼睛。想像你穿著很多層衣服，每一層都是一個角色。吸氣四秒。吐氣六秒，脫掉外套（那是工作裡的你）。吸氣四秒。吐氣六秒，脫掉襯衫（那是朋友面前的你）。吸氣四秒。吐氣六秒，脫掉T恤（那是家人面前的你）。現在什麼都沒穿了。吸氣四秒，感覺空氣碰到皮膚的溫度。吐氣六秒。這就是你。不用演。對自己說：「這個樣子就夠了。」重複三次。張開眼睛。',
    quote:'你的適應力是超能力。但偶爾脫下所有偽裝，讓真正的自己透一口氣。'},
  eagle:{name:'老鷹（俯瞰全局）',icon:'🦅',sub:'壓力來的時候，你飛到更高的地方看',
    keys:['理性抽離','全局思維','策略型'],
    desc:'你面對壓力的方式很不一樣：你會往上拉。當別人在壓力裡翻滾的時候，你在半空中看著整個局面。你會分析壓力的來源、評估各種可能的處理方式、找出最有效率的解法。你很少恐慌，因為你的大腦在壓力下反而更清醒。你是那種「越大的事越冷靜」的人。',
    detail:'老鷹型的壓力反應在心理學裡對應的是「認知重評（cognitive reappraisal）」，也就是透過重新定義壓力源來降低情緒反應。你不是不痛，你是把「痛」轉化成了「問題」，然後開始解題。你的前額葉在壓力下特別活躍，壓住了杏仁核的警報。\n\n但老鷹的風險是：你可能飛太高了。從高空看下去，一切都變成了棋盤上的棋子，包括你自己的感受。你的「冷靜」裡面可能藏著「跟情緒失聯」。你很會分析壓力，但你有多久沒有真正「感覺」壓力了？有些壓力不是拿來分析的，是拿來感受、消化、流過身體的。\n\n覺察練習：下次壓力來的時候，在你飛上去之前先停一下。把一隻手放在胸口，問自己：「我現在的身體感覺是什麼？」不分析、不命名、只是感覺。讓那個感覺在你身體裡待三十秒。然後再飛上去。帶著感覺飛的老鷹，看得更清楚。',
    oil:'乳香 2 滴＋岩蘭草 2 滴＋薰衣草 1 滴，在你覺得自己「抽離太遠」的時候擴香。乳香維持你的高空視野，岩蘭草把你拉回身體裡（讓你記得自己也是棋盤上的一個人），薰衣草讓理性和感性之間有一個柔軟的過渡帶。',
    med:'閉上眼睛。想像你是一隻老鷹，在高空盤旋。下面的一切都很小。吸氣四秒，看著那些壓力源，它們好小。吐氣六秒。重複兩次。第三次的時候，慢慢飛下來。越來越低。吸氣四秒，感覺風變暖了。吐氣六秒，你降落了，腳踩到地面。把一隻手放在胸口。吸氣四秒，感覺心跳。吐氣六秒。對自己說：「我可以看得遠，也可以感覺得深。」重複三次。張開眼睛。',
    quote:'你的全局視野是你最大的武器。但偶爾飛下來，讓腳踩到泥土裡感受一下。'},
  sloth:{name:'樹懶（放慢一切）',icon:'🦥',sub:'壓力來的時候，你的系統自動降速',
    keys:['放慢節奏','低功耗模式','接受現狀'],
    desc:'你面對壓力的方式就是變慢。不是你在擺爛，是你的整個系統在壓力下會自動切換到省電模式。動作變慢、反應變慢、連說話的速度都慢了。別人可能覺得你「怎麼還不緊張」，但你不是不緊張，你只是緊張的方式跟別人不一樣。你的身體選擇用「減速」來代替「加速」。',
    detail:'樹懶型的壓力反應接近「背側迷走神經反應」，也就是自律神經系統在極度壓力下啟動的「關機」模式。你不是不在乎，你的系統只是選擇用最低功耗來度過危機。就像手機剩10%的時候自動關掉所有非必要App。\n\n樹懶的風險是：你的「放慢」有時候會被別人（或你自己）解讀為「不在乎」。你的同事在趕死線，你看起來一副不急的樣子。你的伴侶在生氣，你的反應慢到他覺得你無所謂。你在乎的，只是你的表達速度跟不上你的感受速度。\n\n覺察練習：下次你發現自己進入「樹懶模式」的時候，做一件小小的身體啟動：站起來，原地踏步30秒。不快不慢，就是動一動。讓身體從「省電模式」稍微喚醒一點。你不需要變成蜜蜂，只需要從樹上稍微移動一下位置就好。',
    oil:'葡萄柚 2 滴＋薄荷 1 滴＋甜橙 2 滴，在你感覺自己「整個人都沉下去」的時候擴香。葡萄柚叫醒你的多巴胺系統，薄荷給你的系統一個溫柔的啟動信號，甜橙讓「動起來」不是一件壓力而是一件舒服的事。',
    med:'閉上眼睛。你現在就是一隻樹懶，掛在樹上，什麼都不想動。很好。不用動。吸氣四秒。吐氣六秒。重複三次，允許自己就是這麼慢。第四次的時候，動一根手指。只要一根。吸氣四秒，感覺那根手指。吐氣六秒。第五次，動整隻手。吸氣四秒。吐氣六秒。第六次，轉轉手腕。不急。慢慢來。最後對自己說：「我的速度是我的，不需要跟任何人一樣快。但我可以動。」張開眼睛。動一下就好。',
    quote:'你的慢不是懶，是你的系統在用自己的節奏度過風暴。但偶爾動一下，讓世界知道你還在。'}
};
let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';
    const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 題 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一題</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一題 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看看你的壓力動物 🦔</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 題，共 '+questions.length+' 題';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const dimScores={};Object.keys(DIMS).forEach(k=>{dimScores[k]=0;});
  Object.keys(answers).forEach(qi=>{const oi=answers[qi];const s=questions[qi].opts[oi].s;Object.keys(s).forEach(d=>{dimScores[d]+=s[d];});});
  const maxPossible=Object.keys(answers).length*3;
  const sorted=Object.keys(DIMS).sort((a,b)=>dimScores[b]-dimScores[a]);
  const topType=sorted[0],f=TYPES[topType],f2=TYPES[sorted[1]];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('hlTitleReveal').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥靈之鑰</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-quote">「'+f.quote+'」</div><div class="ss-footer">hourlightkey.com ✦ </div></div><div class="hl-title-card"><div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div><div class="hl-title-eyebrow">Hour Light ✦ 壓力動物覺察</div><span class="hl-title-icon">'+f.icon+'</span><div class="hl-title-main">'+f.name+'</div><div class="hl-title-sub">'+f.sub+'</div><div class="hl-title-divider"></div><div class="hl-title-grid"><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 壓力動物</div><div class="hl-title-tag-value">'+f.name+'</div></div><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 副動物</div><div class="hl-title-tag-value">'+f2.icon+' '+f2.name+'</div></div><div class="hl-title-tag" style="grid-column:1/-1"><div class="hl-title-tag-label">✦ 覺察關鍵字</div><div class="hl-title-tag-value">'+f.keys.join(' · ')+'</div></div></div><div class="hl-title-quote">「'+f.quote+'」</div><div class="hl-title-combo-hint">'+f.name+'｜'+f.sub+'</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">壓力動物覺察 Stress Animal</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var pct=Math.round(dimScores[k]/maxPossible*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+DIMS[k]+' '+TYPES[k].icon+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
