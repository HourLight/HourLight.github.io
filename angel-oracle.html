<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=5">
<title>天使占卜｜夜深人靜，抽一張天使訊息｜馥靈之鑰</title>
<meta name="description" content="需要被接住的時候，抽一張天使訊息。44張牌，放手、值得、等待、行動四個向度。每張都有溫柔的話、科學支持、香氣落地。馥靈之鑰原創占卜。">
<link rel="icon" href="favicon.ico">
<link rel="stylesheet" href="assets/css/hourlight-global.css">
<link rel="stylesheet" href="assets/css/hl-design-tokens.css">
<link rel="stylesheet" href="assets/css/hl-music.css">

<style>
:root{
  --bg:#03020a;
  --gold:#f8dfa5;
  --serif:"Noto Serif TC","Georgia",serif;
  --sans:"Noto Sans TC","PingFang TC",system-ui,sans-serif;
  --release:#f4a5c0;
  --worthy:#f8d880;
  --trust:#a8c8ff;
  --action:#ffb86c;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;min-height:100dvh;background:var(--bg)}
body{background:var(--bg);color:rgba(255,255,255,.88);font-family:var(--sans);overflow-x:hidden}

#starCanvas{position:fixed;top:0;left:0;right:0;bottom:0;z-index:0;pointer-events:none}

.screen{position:relative;z-index:1;min-height:100vh;min-height:100dvh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px 100px}
.screen.active{display:flex}

/* ═══ INTRO ═══ */
@keyframes au{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.i-eye{font-size:.66rem;letter-spacing:.22em;color:rgba(220,200,255,.4);text-transform:uppercase;margin-bottom:20px;animation:au .8s .1s both}

/* 天使羽翼 SVG 標題裝飾 */
.i-wings{animation:au .8s .2s both;margin-bottom:8px}

.i-h1{font-family:var(--serif);font-size:clamp(2.2rem,5.5vw,3.2rem);font-weight:400;letter-spacing:.22em;line-height:1.25;text-align:center;margin-bottom:6px;animation:au .8s .3s both;
  background:linear-gradient(135deg,#f4a5c0 0%,#f8d880 35%,#a8c8ff 65%,#ffb86c 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.i-sub{font-size:.72rem;letter-spacing:.16em;color:rgba(220,200,255,.32);margin-bottom:28px;animation:au .8s .4s both}
.i-desc{font-size:.9rem;color:rgba(240,220,255,.5);line-height:2;max-width:320px;text-align:center;margin-bottom:44px;animation:au .8s .5s both}

/* 天使卡牌組 */
.angel-deck{position:relative;width:170px;height:238px;margin:0 auto 36px;cursor:pointer;animation:au .8s .6s both;perspective:700px}
.ad{position:absolute;inset:0;border-radius:18px;transition:transform .45s cubic-bezier(.34,1.56,.64,1)}
.ad:nth-child(3){transform:translateY(-8px) rotate(-5deg) translateZ(-8px)}
.ad:nth-child(2){transform:translateY(-4px) rotate(-2.5deg) translateZ(-4px)}
.ad:nth-child(1){transform:translateY(0) rotate(0) translateZ(0)}
.angel-deck:hover .ad:nth-child(3){transform:translateY(-18px) rotate(-8deg) translateZ(-8px)}
.angel-deck:hover .ad:nth-child(2){transform:translateY(-9px) rotate(-4deg) translateZ(-4px)}
.angel-deck:hover .ad:nth-child(1){transform:translateY(-5px) rotate(0) translateZ(0)}
.ad-face{width:100%;height:100%;border-radius:18px;
  background:linear-gradient(145deg,#f8f0ff,#fff5fa);
  border:1px solid rgba(200,160,220,.18);
  box-shadow:0 14px 44px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.04);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
/* 牌背光暈 */
.ad-face::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 50% at 50% 30%,rgba(200,160,240,.12),transparent 70%);
}
.ad-face::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(60deg,transparent,transparent 14px,rgba(248,223,165,.018) 14px,rgba(248,223,165,.018) 15px),
             repeating-linear-gradient(-60deg,transparent,transparent 14px,rgba(248,223,165,.018) 14px,rgba(248,223,165,.018) 15px);
}
.ad-sym{position:relative;z-index:1;font-size:2.2rem;opacity:.2;color:rgba(180,140,220,1);filter:drop-shadow(0 0 8px rgba(180,140,220,.3))}

.i-btn{display:inline-flex;align-items:center;gap:9px;padding:15px 42px;border-radius:999px;border:none;
  background:linear-gradient(135deg,#e8a0c0,#b8a0e0);
  color:#fff;font-size:.95rem;font-weight:700;letter-spacing:.1em;cursor:pointer;
  font-family:var(--sans);transition:all .35s;
  box-shadow:0 4px 24px rgba(200,140,200,.35);
  animation:au .8s .76s both}
.i-btn:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 10px 32px rgba(244,165,192,.45)}
.i-btn:active{transform:scale(.97)}

/* 向度說明帶 */
.zones-bar{display:flex;gap:20px;justify-content:center;margin-top:28px;animation:au .8s .9s both}
.zp{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:default}
.zp-s{font-size:1.1rem;opacity:.55;transition:opacity .3s}
.zp-n{font-size:.58rem;letter-spacing:.1em;opacity:.45;transition:opacity .3s}
.zp:hover .zp-s,.zp:hover .zp-n{opacity:.85}

/* ═══ 抽牌動畫 ═══ */
#drawScreen{text-align:center}
.draw-wrap{position:relative;width:190px;height:266px;margin:0 auto}
.draw-card{width:100%;height:100%;transform-style:preserve-3d;position:relative}
.draw-card.go{animation:angelFlip 1.1s cubic-bezier(.4,0,.2,1) forwards}
@keyframes angelFlip{
  0%  {transform:rotateY(0) scale(1) translateY(0)}
  20% {transform:rotateY(70deg) scale(.9) translateY(-30px)}
  50% {transform:rotateY(190deg) scale(.88) translateY(-18px)}
  80% {transform:rotateY(310deg) scale(.96) translateY(-6px)}
  100%{transform:rotateY(360deg) scale(1) translateY(0)}
}
.draw-back{position:absolute;inset:0;border-radius:18px;
  background:linear-gradient(145deg,#f8f0ff,#fff0f8);
  border:1px solid rgba(200,160,220,.2);
  box-shadow:0 20px 60px rgba(180,120,200,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:3rem;color:rgba(180,140,200,.25);
}
.draw-back::before{content:'';position:absolute;inset:10px;border:1px solid rgba(200,160,220,.12);border-radius:10px}
.ptcls{position:absolute;inset:-80px;pointer-events:none;overflow:visible}
.draw-msg{margin-top:28px;font-family:var(--serif);font-size:.9rem;color:rgba(220,180,255,.55);letter-spacing:.1em;min-height:1.6em}

/* 羽毛粒子動畫容器 */
.feathers{position:absolute;inset:-60px;pointer-events:none;overflow:hidden}
.feather{position:absolute;font-size:1rem;opacity:0;animation:featherFly var(--dur,1.2s) var(--del,0s) ease-out forwards}
@keyframes featherFly{
  0%  {opacity:1;transform:translate(0,0) rotate(0deg) scale(1)}
  100%{opacity:0;transform:translate(var(--tx,40px),var(--ty,-80px)) rotate(var(--rot,45deg)) scale(.3)}
}

/* ═══ 結果 ═══ */
#resultScreen{justify-content:flex-start;padding-top:0;padding-bottom:120px;align-items:stretch}

.rh{
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:64px 28px 36px;text-align:center;
  position:relative;
}
.rh-aura{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 50% 30%,var(--rc-glow,rgba(244,165,192,.1)),transparent 65%),
             radial-gradient(ellipse 60% 40% at 50% 70%,var(--rc-glow2,rgba(168,200,255,.06)),transparent 70%);
}

/* 天使卡面 */
.acard{
  width:min(200px,50vw);aspect-ratio:2.5/3.8;
  border-radius:22px;
  position:relative;overflow:hidden;
  margin-bottom:28px;
  border:1px solid rgba(255,255,255,.1);
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  padding:18px 16px;
  box-shadow:0 28px 80px rgba(0,0,0,.75),0 0 80px var(--rc-shadow,rgba(244,165,192,.2));
  animation:cardSoar .8s cubic-bezier(.34,1.3,.64,1) both;
}
@keyframes cardSoar{
  from{opacity:0;transform:scale(.5) translateY(40px) rotateX(15deg)}
  to{opacity:1;transform:scale(1) translateY(0) rotateX(0)}
}
.acard::before{content:'';position:absolute;inset:0;background:linear-gradient(145deg,rgba(255,255,255,.06) 0,transparent 45%,rgba(0,0,0,.08) 100%);pointer-events:none;border-radius:22px}

.acard-halo{
  position:absolute;top:-30%;left:-20%;width:140%;height:100%;
  background:radial-gradient(ellipse,var(--rc-glow,rgba(244,165,192,.18)) 0,transparent 65%);
  pointer-events:none;
}

.acard-top{width:100%;display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1}
.acard-num{font-family:var(--serif);font-size:.75rem;color:var(--rc,#f4a5c0);opacity:.55;letter-spacing:.1em}
.acard-zone-sym{font-size:1.1rem;color:var(--rc,#f4a5c0);opacity:.4}

.acard-mid{text-align:center;position:relative;z-index:1;padding:8px 0}
.acard-angel-sym{
  font-size:3rem;line-height:1;
  color:var(--rc,#f4a5c0);
  filter:drop-shadow(0 0 24px var(--rc,#f4a5c0));
  animation:angelGlow 3s ease-in-out infinite;
}
@keyframes angelGlow{
  0%,100%{filter:drop-shadow(0 0 18px var(--rc,#f4a5c0))}
  50%{filter:drop-shadow(0 0 40px var(--rc,#f4a5c0)) brightness(1.3)}
}
.acard-name-on{font-family:var(--serif);font-size:.85rem;letter-spacing:.1em;margin-top:8px;color:rgba(255,255,255,.72)}
.acard-quote-on{font-family:var(--serif);font-size:.62rem;color:var(--rc,#f4a5c0);opacity:.5;letter-spacing:.06em;margin-top:4px;line-height:1.5;padding:0 4px}

.acard-bot{width:100%;display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1}

/* 主引言 */
.r-quote{
  font-family:var(--serif);
  font-size:clamp(1.1rem,3.5vw,1.4rem);
  color:var(--rc,#f4a5c0);
  letter-spacing:.08em;line-height:1.8;
  max-width:440px;margin-bottom:20px;
  text-shadow:0 0 40px var(--rc,#f4a5c0);
  position:relative;
  animation:au .5s .2s both;
}
.r-quote::before{content:'「';font-size:1.8em;position:absolute;top:-.1em;left:-.3em;opacity:.2;font-family:var(--serif)}
.r-quote::after{content:'」';font-size:1.8em;position:absolute;bottom:-.1em;right:-.3em;opacity:.2;font-family:var(--serif)}

/* 天使名 */
.r-angel-name{font-size:.68rem;letter-spacing:.18em;color:var(--rc,#c070b0);opacity:.7;margin-bottom:8px;animation:au .5s .3s both}

/* 正文 */
.r-body{max-width:460px;font-size:clamp(.9rem,2.4vw,.98rem);color:rgba(245,235,255,.78);line-height:2.1;letter-spacing:.04em;animation:au .5s .4s both}
.r-body p{margin-bottom:.5em}
.r-body p:last-child{margin-bottom:0}

.r-div{width:32px;height:1px;margin:24px auto;opacity:.3;animation:au .5s .5s both}

/* 展開層 */
.layers{width:100%;max-width:520px;padding:0 20px;margin:0 auto;animation:au .5s .58s both}
.layer{border-radius:14px;overflow:hidden;border:1px solid rgba(200,160,220,.18);margin-bottom:8px;transition:border-color .3s}
.layer:hover{border-color:rgba(200,160,255,.25)}
.layer-hd{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:rgba(14,8,28,.88);border:none;cursor:pointer;font-family:var(--sans);font-size:.82rem;color:rgba(200,180,240,.5);letter-spacing:.06em;transition:all .3s;text-align:left;backdrop-filter:blur(8px)}
.layer-hd:hover{background:rgba(22,12,40,.95);color:var(--rc,#c070b0)}
.layer-hd-l{display:flex;align-items:center;gap:9px}
.layer-arr{font-size:.85rem;color:var(--rc,#f4a5c0);opacity:.4;transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
.layer.open .layer-arr{transform:rotate(180deg)}
.layer-bd{max-height:0;overflow:hidden;transition:max-height .48s cubic-bezier(.4,0,.2,1);background:rgba(14,8,28,.92)}
.layer.open .layer-bd{max-height:400px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.layer-inner{padding:16px 18px 20px;font-size:.88rem;color:rgba(240,230,255,.82);line-height:1.95;letter-spacing:.03em}
.layer-tag{font-size:.6rem;letter-spacing:.14em;margin-bottom:9px;text-transform:uppercase;border-bottom:1px solid;padding-bottom:3px;display:inline-block;color:var(--rc,#f4a5c0);opacity:.7}

/* 操作 */
.r-acts{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;padding:20px 20px 0;animation:au .5s .7s both}
.abtn{padding:10px 22px;border-radius:999px;font-size:.82rem;font-family:inherit;cursor:pointer;transition:all .3s;letter-spacing:.05em;display:flex;align-items:center;gap:6px}
.abtn-g{background:linear-gradient(135deg,#e8a0c0,#b8a0e0);color:#fff;border:none;font-weight:700;box-shadow:0 4px 16px rgba(200,140,200,.3)}
.abtn-g:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(244,165,192,.4)}
.abtn-o{background:rgba(255,255,255,.07);color:rgba(230,210,255,.65);border:1px solid rgba(200,180,255,.18)}
.abtn-o:hover{background:rgba(255,255,255,.12);color:rgba(240,225,255,.9);transform:translateY(-1px)}

.r-foot{text-align:center;padding:18px 20px 0;font-size:.72rem;color:rgba(200,180,255,.25);line-height:2;animation:au .5s .82s both}
.r-foot a{color:rgba(200,160,240,.38);text-decoration:none}
.r-foot a:hover{color:rgba(210,180,255,.75)}

/* Toast & watermark */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(12px);padding:9px 22px;border-radius:999px;background:rgba(220,140,180,.95);color:#fff;font-size:.82rem;font-weight:600;z-index:9999;opacity:0;transition:all .32s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.hl-wm{position:fixed;bottom:70px;right:12px;z-index:50;pointer-events:none;display:flex;align-items:center;gap:5px;background:rgba(240,230,250,.8);border:1px solid rgba(180,140,200,.2);border-radius:20px;padding:4px 11px 4px 8px;backdrop-filter:blur(8px)}
.hl-wm-dot{width:5px;height:5px;border-radius:50%;background:rgba(180,120,200,1);opacity:.55;flex-shrink:0}
.hl-wm-t{font-size:.58rem;color:rgba(200,170,240,.42);letter-spacing:.05em;white-space:nowrap}

/* ═══ 手機斷點 ═══ */
@media(max-width:480px){
  .screen{padding:32px 16px 80px}
  .rh{padding:48px 16px 28px}
  .layers{padding:0 12px}
  .layer-hd{padding:14px 14px;min-height:44px}
  .layer-inner{padding:14px 14px 18px;font-size:.86rem}
  .r-acts{gap:8px;padding:16px 12px 0}
  .abtn{padding:12px 18px;min-height:44px;font-size:.82rem}
  .acard{width:min(180px,55vw)}
  .angel-deck{width:150px;height:210px}
  .i-btn{padding:14px 36px;min-height:44px}
  .r-quote::before,.r-quote::after{display:none}
}
@media(max-width:360px){
  .screen{padding:24px 12px 72px}
  .rh{padding:40px 12px 24px}
  .layers{padding:0 8px}
  .layer-hd{padding:12px 12px;font-size:.78rem}
  .layer-inner{padding:12px 12px 16px;font-size:.82rem}
  .angel-deck{width:130px;height:182px}
  .i-h1{letter-spacing:.12em}
  .zones-bar{gap:14px}
}
/* hover 僅限有 hover 的裝置 */
@media(hover:hover){
  .i-btn:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 10px 32px rgba(244,165,192,.45)}
  .abtn-g:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(244,165,192,.4)}
  .abtn-o:hover{background:rgba(255,255,255,.12);color:rgba(240,225,255,.9);transform:translateY(-1px)}
  .layer-hd:hover{background:rgba(22,12,40,.95);color:var(--rc,#c070b0)}
}
@media(hover:none){
  .i-btn:active{transform:scale(.96)}
  .abtn-g:active{transform:scale(.96)}
  .abtn-o:active{background:rgba(255,255,255,.12)}
  .layer-hd:active{background:rgba(22,12,40,.95);color:var(--rc,#c070b0)}
  .angel-deck:hover .ad:nth-child(3),
  .angel-deck:hover .ad:nth-child(2),
  .angel-deck:hover .ad:nth-child(1){transform:none}
}
</style>
</head>
<body>

<canvas id="starCanvas"></canvas>

<!-- ══ INTRO ══ -->
<div class="screen active" id="introScreen">
  <div class="i-eye">馥靈之鑰 · 覺察占卜系列</div>

  <!-- 羽翼裝飾SVG -->
  <div class="i-wings">
    <svg width="180" height="48" viewBox="0 0 180 48" fill="none" xmlns="http://www.w3.org/2000/svg" opacity=".35">
      <path d="M90 24 C70 8, 30 4, 4 20" stroke="url(#wg1)" stroke-width="1" fill="none" stroke-linecap="round"/>
      <path d="M90 24 C72 14, 38 12, 16 24" stroke="url(#wg1)" stroke-width=".6" fill="none" stroke-linecap="round"/>
      <path d="M90 24 C75 20, 48 20, 28 28" stroke="url(#wg1)" stroke-width=".4" fill="none" stroke-linecap="round"/>
      <path d="M90 24 C110 8, 150 4, 176 20" stroke="url(#wg2)" stroke-width="1" fill="none" stroke-linecap="round"/>
      <path d="M90 24 C108 14, 142 12, 164 24" stroke="url(#wg2)" stroke-width=".6" fill="none" stroke-linecap="round"/>
      <path d="M90 24 C105 20, 132 20, 152 28" stroke="url(#wg2)" stroke-width=".4" fill="none" stroke-linecap="round"/>
      <defs>
        <linearGradient id="wg1" x1="90" y1="0" x2="4" y2="0"><stop stop-color="#f4a5c0"/><stop offset="1" stop-color="#a8c8ff" stop-opacity="0"/></linearGradient>
        <linearGradient id="wg2" x1="90" y1="0" x2="176" y2="0"><stop stop-color="#ffb86c"/><stop offset="1" stop-color="#f8d880" stop-opacity="0"/></linearGradient>
      </defs>
    </svg>
  </div>

  <h1 class="i-h1">天使占卜</h1>
  <div class="i-sub">Angel Oracle · 44 Messages</div>
  <p class="i-desc">需要被接住的時候，<br>抽一張天使訊息。<br>她說的，是你心裡早就知道的。</p>

  <div class="angel-deck" data-no-gate onclick="startDraw()">
    <div class="ad"><div class="ad-face"><div class="ad-sym">✦</div></div></div>
    <div class="ad"><div class="ad-face"></div></div>
    <div class="ad"><div class="ad-face"></div></div>
  </div>

  <button class="i-btn" data-no-gate onclick="startDraw()"><span>✦</span> 抽一張天使訊息</button>

  <div class="zones-bar">
    <div class="zp"><span class="zp-s" style="color:var(--release)">♡</span><span class="zp-n" style="color:var(--release)">放手</span></div>
    <div class="zp"><span class="zp-s" style="color:var(--worthy)">✦</span><span class="zp-n" style="color:var(--worthy)">值得</span></div>
    <div class="zp"><span class="zp-s" style="color:var(--trust)">☽</span><span class="zp-n" style="color:var(--trust)">等待</span></div>
    <div class="zp"><span class="zp-s" style="color:var(--action)">☀</span><span class="zp-n" style="color:var(--action)">行動</span></div>
  </div>
</div>

<!-- ══ 抽牌 ══ -->
<div class="screen" id="drawScreen">
  <div class="draw-wrap">
    <svg class="ptcls" id="ptcls" viewBox="-80 -80 460 426"></svg>
    <div class="feathers" id="feathers"></div>
    <div class="draw-card" id="drawCard">
      <div class="draw-back">✦</div>
    </div>
  </div>
  <div class="draw-msg" id="drawMsg">靜心片刻⋯</div>
</div>

<!-- ══ 結果 ══ -->
<div class="screen" id="resultScreen">
  <div class="rh" id="rh">
    <div class="rh-aura" id="rhAura"></div>

    <!-- 天使牌 -->

<script>
if(typeof ANGEL_CARDS==='undefined') window.ANGEL_CARDS=[];

/* ── 向度符號 ── */
const ZONE_SYM={release:'♡',worthy:'✦',trust:'☽',action:'☀'};

/* ═══════════ 星空 (天使版：更柔，更多粉紫) ═══════════ */
(()=>{
  const cv=document.getElementById('starCanvas');
  const cx=cv.getContext('2d');
  let W,H;
  function rz(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
  rz();addEventListener('resize',rz);

  const COLORS=[
    [255,200,220],[220,200,255],[200,220,255],
    [255,230,200],[220,255,230],[255,255,200],
    [255,180,200],[180,200,255],[200,240,255],
  ];

  const stars=[];
  for(let i=0;i<280;i++){
    const c=COLORS[Math.floor(Math.random()*COLORS.length)];
    stars.push({
      x:Math.random(),y:Math.random(),
      r:.1+Math.random()*(i<40?2.0:i<130?1.0:.48),
      phase:Math.random()*Math.PI*2,
      speed:.0025+Math.random()*.065,
      col:c,
    });
  }

  const meteors=[];
  const MCOLORS=[[244,165,192],[168,200,255],[248,216,128],[255,184,108],[200,180,255],[180,220,255]];
  function spawnM(){
    const c=MCOLORS[Math.floor(Math.random()*MCOLORS.length)];
    meteors.push({
      x:Math.random()>.35?Math.random():.9+Math.random()*.12,
      y:Math.random()>.35?0:Math.random()*.35,
      len:60+Math.random()*130,speed:.003+Math.random()*.007,
      angle:Math.random()>.35?(Math.PI*.28+Math.random()*.44):(Math.PI*.52+Math.random()*.32),
      life:0,maxLife:1,col:c,w:.4+Math.random()*1.1,fadeIn:.18,fadeOut:.65,
    });
  }

  // 星雲（天使版：更柔）
  const nebulas=[
    {x:.15,y:.2,r:.35,col:[200,140,220],a:.07},
    {x:.82,y:.55,r:.3,col:[140,160,240],a:.06},
    {x:.5,y:.08,r:.25,col:[240,160,180],a:.065},
    {x:.35,y:.75,r:.22,col:[180,200,140],a:.04},
  ];
  let nt=0;

  let t=0;
  function draw(){
    cx.clearRect(0,0,W,H);
    nt+=.0004;

    // 星雲
    nebulas.forEach((n,i)=>{
      const ox=Math.sin(nt*(i+1)*.6)*.014;
      const oy=Math.cos(nt*(i+1)*.45)*.01;
      const grd=cx.createRadialGradient((n.x+ox)*W,(n.y+oy)*H,0,(n.x+ox)*W,(n.y+oy)*H,n.r*Math.min(W,H));
      const p=(n.a+Math.sin(nt*(i+1))*0.02)*.35;
      grd.addColorStop(0,`rgba(${n.col[0]},${n.col[1]},${n.col[2]},${p})`);
      grd.addColorStop(.5,`rgba(${n.col[0]},${n.col[1]},${n.col[2]},${p*.28})`);
      grd.addColorStop(1,'rgba(0,0,0,0)');
      cx.fillStyle=grd;cx.fillRect(0,0,W,H);
    });

    // 星星
    t+=.016;
    stars.forEach(s=>{
      s.phase+=s.speed;
      const tw=.5+Math.sin(s.phase)*.5;
      const al=Math.max(.02,Math.min(.9,tw*.68+.05));
      const sx=s.x*W,sy=s.y*H,r=s.r;
      if(r>1.1){
        const g=cx.createRadialGradient(sx,sy,0,sx,sy,r*4.5);
        g.addColorStop(0,`rgba(${s.col[0]},${s.col[1]},${s.col[2]},${al*.45})`);
        g.addColorStop(1,'rgba(0,0,0,0)');
        cx.fillStyle=g;cx.beginPath();cx.arc(sx,sy,r*4.5,0,Math.PI*2);cx.fill();
      }
      cx.beginPath();cx.arc(sx,sy,r,0,Math.PI*2);
      cx.fillStyle=`rgba(${s.col[0]},${s.col[1]},${s.col[2]},${al*.22})`;cx.fill();
      if(r>1.4&&al>.55){
        const l=r*4.5;
        cx.save();cx.globalAlpha=al*.2;cx.strokeStyle=`rgb(${s.col[0]},${s.col[1]},${s.col[2]})`;cx.lineWidth=.4;
        cx.beginPath();cx.moveTo(sx-l,sy);cx.lineTo(sx+l,sy);cx.stroke();
        cx.beginPath();cx.moveTo(sx,sy-l);cx.lineTo(sx,sy+l);cx.stroke();
        cx.restore();
      }
    });

    // 流星
    for(let i=meteors.length-1;i>=0;i--){
      const m=meteors[i];
      m.life+=.016/m.maxLife;
      if(m.life>=1){meteors.splice(i,1);continue;}
      let al=m.life<m.fadeIn?m.life/m.fadeIn:m.life>m.fadeOut?1-(m.life-m.fadeOut)/(1-m.fadeOut):1;
      al=Math.max(0,Math.min(1,al));
      m.x+=Math.cos(m.angle)*m.speed;m.y+=Math.sin(m.angle)*m.speed;
      const sx=m.x*W,sy=m.y*H;
      const tx=sx-Math.cos(m.angle)*m.len,ty=sy-Math.sin(m.angle)*m.len;
      const grd=cx.createLinearGradient(tx,ty,sx,sy);
      grd.addColorStop(0,'rgba(0,0,0,0)');
      grd.addColorStop(.6,`rgba(${m.col[0]},${m.col[1]},${m.col[2]},${al*.18})`);
      grd.addColorStop(1,`rgba(${m.col[0]},${m.col[1]},${m.col[2]},${al*.45})`);
      cx.save();cx.globalAlpha=al;cx.strokeStyle=grd;cx.lineWidth=m.w;cx.lineCap='round';
      cx.beginPath();cx.moveTo(tx,ty);cx.lineTo(sx,sy);cx.stroke();
      const hg=cx.createRadialGradient(sx,sy,0,sx,sy,m.w*2.5);
      hg.addColorStop(0,`rgba(${m.col[0]},${m.col[1]},${m.col[2]},${al*.45})`);hg.addColorStop(1,'rgba(0,0,0,0)');
      cx.fillStyle=hg;cx.beginPath();cx.arc(sx,sy,m.w*2.5,0,Math.PI*2);cx.fill();
      cx.restore();
      if(m.x<-.1||m.x>1.1||m.y<-.1||m.y>1.1) meteors.splice(i,1);
    }
    if(Math.random()<.0028&&meteors.length<5) spawnM();
    requestAnimationFrame(draw);
  }
  draw();
  setTimeout(spawnM,1000);setTimeout(spawnM,2800);setTimeout(spawnM,5000);
})();

/* ═══════════ 狀態 ═══════════ */
let drawn=[],lastCard=null,busy=false;
function getRandom(){
  if(drawn.length>=ANGEL_CARDS.length) drawn=[];
  let i,t=0;
  do{i=Math.floor(Math.random()*ANGEL_CARDS.length);t++;}
  while(drawn.includes(i)&&t<200);
  drawn.push(i);return ANGEL_CARDS[i];
}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');scrollTo(0,0);}
function goBack(){show('introScreen');lastCard=null;}

/* ═══════════ 抽牌 ═══════════ */
function startDraw(){
  if(busy||!ANGEL_CARDS.length) return;
  if(lastCard&&!confirm('確定要再抽一張嗎？目前的結果將會消失。')) return;
  busy=true;
  show('drawScreen');
  const card=getRandom();lastCard=card;
  const msgs=['靜心片刻⋯','天使正在傾聽⋯','訊息顯現中⋯','為您傳遞⋯'];
  const dm=document.getElementById('drawMsg');
  let mi=0;
  const mt=setInterval(()=>{dm.textContent=msgs[mi++%msgs.length];},420);
  const dc=document.getElementById('drawCard');
  dc.classList.remove('go');void dc.offsetWidth;dc.classList.add('go');
  setTimeout(()=>burstAngel(card.color),380);
  setTimeout(()=>{clearInterval(mt);dm.textContent='';busy=false;renderAngel(card);},1700);
}

/* ── SVG粒子 + 羽毛 ── */
function burstAngel(color){
  // SVG粒子
  const svg=document.getElementById('ptcls');svg.innerHTML='';
  for(let i=0;i<24;i++){
    const ang=Math.random()*Math.PI*2,dist=40+Math.random()*85;
    const tx=Math.cos(ang)*dist+145,ty=Math.sin(ang)*dist+133;
    const r=1.2+Math.random()*2.8,dur=(.5+Math.random()*.55).toFixed(2),del=(Math.random()*.2).toFixed(2);
    svg.insertAdjacentHTML('beforeend',
      `<circle cx="145" cy="133" r="${r}" fill="${color}" opacity="1">
        <animateMotion dur="${dur}s" begin="${del}s" fill="freeze" path="M 0 0 L ${tx-145} ${ty-133}"/>
        <animate attributeName="opacity" dur="${dur}s" begin="${del}s" values="1;0" fill="freeze"/>
        <animate attributeName="r" dur="${dur}s" begin="${del}s" values="${r};0" fill="freeze"/>
      </circle>`
    );
  }
  // 羽毛emoji粒子
  const fContainer=document.getElementById('feathers');fContainer.innerHTML='';
  const featherSyms=['🕊','✦','♡','☽','✧','⋆'];
  for(let i=0;i<12;i++){
    const f=document.createElement('div');f.className='feather';
    f.textContent=featherSyms[Math.floor(Math.random()*featherSyms.length)];
    const tx=(Math.random()*160-80).toFixed(0),ty=(-60-Math.random()*80).toFixed(0);
    const rot=(Math.random()*180-90).toFixed(0);
    f.style.cssText=`left:calc(50% + ${(Math.random()*80-40).toFixed(0)}px);top:50%;--tx:${tx}px;--ty:${ty}px;--rot:${rot}deg;--dur:${(.8+Math.random()*.6).toFixed(2)}s;--del:${(Math.random()*.25).toFixed(2)}s;font-size:${.7+Math.random()*.8}rem;color:${color};`;
    fContainer.appendChild(f);
  }
}

/* ═══════════ 渲染 ═══════════ */
function renderAngel(card){
  const c=card.color,g=card.glow,sh=card.shadow;
  const zs=ZONE_SYM[card.zone]||'✦';

  // CSS變數（深色主題）
  const rh=document.getElementById('rh');
  rh.style.background=card.bg;
  rh.style.setProperty('--rc',c);
  rh.style.setProperty('--rc-glow',g);
  rh.style.setProperty('--rc-glow2',g.replace('.16','.08'));
  rh.style.setProperty('--rc-shadow',sh);
  document.getElementById('rhAura').style.background=`radial-gradient(ellipse 80% 60% at 50% 30%,${g},transparent 65%)`;

  const ac=document.getElementById('acard');
  ac.style.background=card.bg;
  ac.style.borderColor=`${c}22`;
  ac.style.boxShadow=`0 28px 80px rgba(0,0,0,.75),0 0 80px ${sh}`;
  ac.style.setProperty('--rc',c);

  // 牌面
  ['ac-num','ac-num2'].forEach(id=>{const e=document.getElementById(id);e.textContent=String(card.num).padStart(2,'0');e.style.color=c;});
  ['ac-zsym','ac-zsym2'].forEach(id=>{const e=document.getElementById(id);e.textContent=zs;e.style.color=c;});
  const sym=document.getElementById('ac-sym');sym.textContent=zs;sym.style.color=c;sym.style.setProperty('--rc',c);
  document.getElementById('ac-name').textContent=card.name;
  document.getElementById('ac-name').style.color=`${c}bb`;
  const qs=document.getElementById('ac-qshort');
  qs.textContent=card.quote.length>16?card.quote.slice(0,16)+'⋯':card.quote;
  qs.style.color=c;

  // 展開層顏色
  document.querySelectorAll('.layer-arr').forEach(e=>e.style.color=c);
  ['sci-tag','aroma-tag'].forEach(id=>{const e=document.getElementById(id);e.style.color=c;e.style.borderColor=c;});
  document.querySelectorAll('.layer-hd').forEach(e=>e.style.setProperty('--rc',c));

  // 文字
  const an=document.getElementById('r-aname');an.textContent=card.zoneLabel+'｜'+card.name;an.style.color=c;
  const rq=document.getElementById('r-quote');rq.textContent=card.quote;rq.style.color=c;rq.style.textShadow=`0 0 40px ${c}`;
  document.getElementById('r-div').style.background=c;
  document.getElementById('r-body').innerHTML=card.body.split('\n').map(l=>l?`<p>${l}</p>`:'').join('');
  document.getElementById('sci-body').textContent=card.science;
  document.getElementById('aroma-body').textContent=card.aroma;

  // 自動展開科學+香氣區塊（讓用戶直接看到完整內容）
  document.querySelectorAll('.layer').forEach(l=>l.classList.add('open'));

  show('resultScreen');
  flash(c);
}

function flash(c){
  const d=document.createElement('div');
  d.style.cssText=`position:fixed;inset:0;z-index:999;pointer-events:none;background:${c};opacity:.1;animation:po .6s ease-out forwards`;
  const s=document.createElement('style');s.textContent='@keyframes po{to{opacity:0}}';
  document.head.appendChild(s);document.body.appendChild(d);
  setTimeout(()=>{d.remove();s.remove();},620);
}

function toggleL(id){document.getElementById('L-'+id).classList.toggle('open');}

function copyCard(){
  if(!lastCard) return;
  const zs=ZONE_SYM[lastCard.zone]||'✦';
  const txt=`【天使占卜 · 馥靈之鑰】\n\n${zs} ${String(lastCard.num).padStart(2,'0')} · ${lastCard.name}\n\n「${lastCard.quote}」\n\n${lastCard.body}\n\n── 科學怎麼說 ──\n${lastCard.science}\n\n── 香氣落地 ──\n${lastCard.aroma}\n\n🔗 hourlightkey.com/angel-oracle.html`;
  navigator.clipboard.writeText(txt).then(()=>showToast('已複製！')).catch(()=>{const t=document.createElement('textarea');t.value=txt;t.style.cssText='position:fixed;opacity:0';document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);showToast('已複製！');});
}

function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2000);}
</script>
