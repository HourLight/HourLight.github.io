<script>
var QUESTIONS=[
{q:'整體來說，我對自己是滿意的。',opts:[{t:'非常同意',a:'4'},{t:'同意',a:'3'},{t:'不同意',a:'2'},{t:'非常不同意',a:'1'}]},
{q:'有時候我覺得自己什麼都不好。',opts:[{t:'非常同意',a:'1'},{t:'同意',a:'2'},{t:'不同意',a:'3'},{t:'非常不同意',a:'4'}]},
{q:'我覺得自己有一些好的特質。',opts:[{t:'非常同意',a:'4'},{t:'同意',a:'3'},{t:'不同意',a:'2'},{t:'非常不同意',a:'1'}]},
{q:'我能把事情做得跟大多數人一樣好。',opts:[{t:'非常同意',a:'4'},{t:'同意',a:'3'},{t:'不同意',a:'2'},{t:'非常不同意',a:'1'}]},
{q:'我覺得自己沒什麼值得驕傲的地方。',opts:[{t:'非常同意',a:'1'},{t:'同意',a:'2'},{t:'不同意',a:'3'},{t:'非常不同意',a:'4'}]},
{q:'有時候我覺得自己真沒用。',opts:[{t:'非常同意',a:'1'},{t:'同意',a:'2'},{t:'不同意',a:'3'},{t:'非常不同意',a:'4'}]},
{q:'我覺得自己是一個有價值的人，至少跟其他人一樣有價值。',opts:[{t:'非常同意',a:'4'},{t:'同意',a:'3'},{t:'不同意',a:'2'},{t:'非常不同意',a:'1'}]},
{q:'我希望能更看得起自己。',opts:[{t:'非常同意',a:'1'},{t:'同意',a:'2'},{t:'不同意',a:'3'},{t:'非常不同意',a:'4'}]},
{q:'整體而言，我傾向於認為自己是個失敗者。',opts:[{t:'非常同意',a:'1'},{t:'同意',a:'2'},{t:'不同意',a:'3'},{t:'非常不同意',a:'4'}]},
{q:'我對自己持正面積極的態度。',opts:[{t:'非常同意',a:'4'},{t:'同意',a:'3'},{t:'不同意',a:'2'},{t:'非常不同意',a:'1'}]}
];

function renderQ(){var q=QUESTIONS[currentQ];var html='<div class="quiz-question-card" style="padding:28px 22px;margin-bottom:16px"><div class="quiz-q-number" style="margin-bottom:10px">'+(currentQ+1)+' / '+QUESTIONS.length+'</div><div class="quiz-q-text" style="margin-bottom:20px">'+q.q+'</div><div class="quiz-options" style="display:flex;flex-direction:column;gap:10px">';q.opts.forEach(function(o){html+='<button class="quiz-option" onclick="pick(\''+o.a+'\',this)">'+o.t+'</button>'});html+='</div></div>';document.getElementById('questionsArea').innerHTML=html;document.getElementById('progressFill').style.width=((currentQ/QUESTIONS.length)*100)+'%';document.getElementById('progressText').textContent=(currentQ+1)+' / '+QUESTIONS.length}
function pick(a,btn){answers[currentQ]=a;btn.classList.add('selected');setTimeout(function(){currentQ++;if(currentQ>=QUESTIONS.length)showResult();else renderQ()},350)}
function showResult(){var total=0;Object.values(answers).forEach(function(a){total+=parseInt(a)});var level=total>=30?'高自尊':total>=20?'中等自尊':'低自尊';var color=total>=30?'#6AB04C':total>=20?'#F9CA24':'#E17055';var pct=Math.round(total/40*100);var desc=total>=30?'您對自己有健康正面的評價。這不代表自大，代表您認識自己的價值，也接納自己的不完美。':total>=20?'您對自己的評價時好時壞。有些時候覺得自己還不錯，有些時候又覺得不夠好。這是大多數人的狀態。':'您目前對自己的評價偏低。這不代表您真的不好，而是您此刻看自己的濾鏡是灰色的。灰色濾鏡是可以拿掉的。';var tip=total>=30?'您的功課是：把這份自信分一點給身邊的人。不是教他們，是讓他們知道「你也可以這樣看自己」。':total>=20?'您的功課是：覺察那些「覺得不夠好」的瞬間，問自己：這是事實還是感覺？大部分時候是感覺。':'您的功課是：今天寫下一件「我做到了」的事。多小都算。然後明天再寫一件。連續七天，您會發現濾鏡慢慢變亮。';document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';var html='<div style="animation:hlFadeUp .6s ease both">';html+='<div style="background:#fff;border:3px solid '+color+';border-radius:20px;padding:32px 24px;text-align:center;margin-bottom:24px;box-shadow:0 8px 32px rgba(0,0,0,.06)">';html+='<div style="font-size:.7rem;color:var(--qc1);letter-spacing:.15em;margin-bottom:12px">HOUR LIGHT ✦ 馥靈之鑰</div>';html+='<div style="font-size:3rem;margin-bottom:8px">🌟</div>';html+='<div style="font-size:1.6rem;font-weight:700;color:'+color+';font-family:Playfair Display,serif;margin-bottom:4px">'+level+'</div>';html+='<div style="font-size:1.2rem;color:var(--qlt);margin-bottom:4px">'+total+' / 40 分</div>';html+='<div style="height:10px;background:#f0f0f0;border-radius:5px;overflow:hidden;margin:0 20px 16px"><div style="height:100%;width:'+pct+'%;background:'+color+';border-radius:5px;animation:hlBarGrow 1s ease both"></div></div>';html+='<div style="font-size:.9rem;color:var(--qtxt);line-height:1.8;text-align:left;padding:0 8px">'+desc+'</div></div>';html+='<div style="background:#fff;border-radius:16px;padding:24px;margin-bottom:20px;border:1.5px solid #eee"><h3 style="color:var(--qc1);font-size:1rem;margin-bottom:12px">✦ 覺察建議</h3><div style="font-size:.88rem;line-height:1.9;color:var(--qtxt)">'+tip+'</div></div>';html+='<div style="background:#fff;border-radius:16px;padding:24px;text-align:center;margin-bottom:20px;border:1.5px solid #eee"><div style="font-size:.92rem;margin-bottom:14px">想更深入了解自己？</div><div style="display:flex;flex-direction:column;gap:10px;max-width:320px;margin:0 auto"><a href="quiz-innerchild.html" style="display:block;padding:12px;background:var(--qc1);color:#fff;border-radius:12px;text-decoration:none;font-weight:600;font-size:.88rem">🧸 內在小孩測驗（交叉比對）</a><a href="fuling-mima.html" style="display:block;padding:12px;background:var(--qc2);color:#fff;border-radius:12px;text-decoration:none;font-weight:600;font-size:.88rem">🔮 馥靈秘碼（免費）</a></div></div>';html+='<div style="text-align:center;font-size:.68rem;color:var(--qlt);line-height:1.8">本測驗為 Rosenberg Self-Esteem Scale (1965) 正式量表。結果僅供自我覺察參考。如持續感到困擾，建議諮詢專業心理師。<br>© 2026 馥靈之鑰國際有限公司</div></div>';document.getElementById('quizResult').innerHTML=html;document.getElementById('quizResult').style.display='block';document.getElementById('quizResult').scrollIntoView({behavior:'smooth',block:'start'});if(window.hlCastle)hlCastle.giveKey("treasure")}
