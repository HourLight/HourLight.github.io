<script>
const questions=[
  // EX=情緒耗竭 x6
  {dim:'EX',q:'下班回家後你只想癱著，連說話的力氣都沒有。'},
  {dim:'EX',q:'早上出門上班的路上，你已經開始覺得累了。'},
  {dim:'EX',q:'客人跟你說她的煩惱時，你發現自己其實沒在聽。'},
  {dim:'EX',q:'你覺得自己的情緒像一塊被擰乾的抹布。'},
  {dim:'EX',q:'你的肩頸或腰背的疼痛，跟你的客量成正比。'},
  {dim:'EX',q:'假日你最想做的事是「什麼都不做」，連出門都不想。'},
  // DP=去個人化 x6
  {dim:'DP',q:'你偷偷在心裡幫客人取綽號（而且不太好聽）。'},
  {dim:'DP',q:'你越來越不想跟客人聊天，只想趕快做完收工。'},
  {dim:'DP',q:'客人取消預約，你的第一反應是鬆了一口氣。'},
  {dim:'DP',q:'你開始覺得「客人的問題關我什麼事」。'},
  {dim:'DP',q:'你對客人的笑容越來越像是職業反射，不是真心的。'},
  {dim:'DP',q:'你發現自己對客人越來越沒耐心，以前不會這樣。'},
  // PA=成就感低落 x6（反向）
  {dim:'PA',q:'你覺得自己的工作正在改變別人的生活。',reverse:true},
  {dim:'PA',q:'做完一個客人你會有成就感，不只是「又做完一個」。',reverse:true},
  {dim:'PA',q:'你還記得當初為什麼選擇這個行業。',reverse:true},
  {dim:'PA',q:'你覺得自己的技術和能力一直在進步。',reverse:true},
  {dim:'PA',q:'客人說「謝謝你」的時候，你是真的開心。',reverse:true},
  {dim:'PA',q:'你對自己在這個行業的未來感到有希望。',reverse:true},
];

const likertLabels=['從來沒有','偶爾','有時候','常常','幾乎每天'];
let answers={},currentQ=0;

function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const btns=[1,2,3,4,5].map(v=>`<button class="likert-btn${answers[i]===v?' selected':''}" onclick="selectAnswer(${i},${v},this)">${v}</button>`).join('');
    card.innerHTML=`<div class="quiz-q-num">第 ${i+1} 題 / ${questions.length}</div><div class="quiz-question">${qd.q}</div><div class="likert-wrap"><div class="likert-labels">${likertLabels.map(l=>`<span>${l}</span>`).join('')}</div><div class="likert-row">${btns}</div></div><div class="quiz-nav">${i>0?`<button class="btn-prev" onclick="goTo(${i-1})">← 上一題</button>`:'<span></span>'}${i<questions.length-1?`<button class="btn-next" id="btnNext-${i}" ${answers[i]===undefined?'disabled':''} onclick="goTo(${i+1})">下一題 →</button>`:`<button class="btn-next" id="btnNext-${i}" ${answers[i]===undefined?'disabled':''} onclick="showResult()">看我的倦怠指數 🔥</button>`}</div>`;
    area.appendChild(card);
  });updateProgress(idx);
}
function selectAnswer(qi,v,btn){answers[qi]=v;document.getElementById('qcard-'+qi).querySelectorAll('.likert-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent=`第 ${idx+1} 題，共 ${questions.length} 題`;document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}

function showResult(){
  const raw={EX:0,DP:0,PA:0};
  questions.forEach((qd,i)=>{const v=answers[i]||3;const s=qd.reverse?(6-v):v;raw[qd.dim]+=s;});
  const pct={};['EX','DP','PA'].forEach(d=>{pct[d]=Math.round((raw[d]-6)/24*100);});
  // PA is reversed: high raw = high burnout in achievement loss
  const burnoutIndex=Math.round((pct.EX+pct.DP+pct.PA)/3);
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';

  const dimNames={EX:'情緒耗竭',DP:'去個人化',PA:'成就感流失'};
  const dimIcons={EX:'🔋',DP:'🧊',PA:'💔'};
  const dimColors={EX:'#e85050',DP:'#6a9fd8',PA:'#9c6edb'};

  let status,statusIcon,castle,hour,oil,desc,shadow;
  if(burnoutIndex>=70){
    status='紅色警戒';statusIcon='🚨';castle='休憩塔（H 區）';hour='Heal ✦ 身心校準';oil='薰衣草 · 岩蘭草';
    desc='你的情緒絕緣體已經被燒穿了。你不是「有點累」，你是系統性地在透支。你的身體在替你的情緒買單｜那些肩頸痛、失眠、胃不舒服，不是因為你站太久，是因為你扛太多別人的東西。';
    shadow='做得好是天賦，但光靠天賦撐久了也會消耗。90 張單方精油牌能幫你重新校準狀態，找回做這行最初的那種順暢感。';
  } else if(burnoutIndex>=45){
    status='黃燈閃爍';statusIcon='⚠️';castle='覺察廳（O 區）';hour='Own ✦ 智慧辨識';oil='佛手柑 · 天竺葵';
    desc='你還撐得住，但有些地方已經開始磨損了。你可能發現自己對客人的耐心在縮水，或者下班後的疲憊不是用睡覺就能恢復的那種。這是你的神經系統在發出預警。';
    shadow='現在是最好的介入時機。不要等到燒穿了才來修。開始學習辨識「哪些情緒是你的，哪些是客人的」｜這就是馥靈之鑰系統在做的事。';
  } else {
    status='綠燈穩定';statusIcon='💚';castle='王座塔（R 區）';hour='Rise ✦ 行動進化';oil='甜橙 · 迷迭香';
    desc='你的情緒防護罩目前運作良好。你知道怎麼照顧自己，也知道什麼時候該放手。這不代表你沒有壓力，而是你有辦法處理它。';
    shadow='你的穩定度意味著你已經具備了成為「幫助別人的人」的基礎。馥靈之鑰的覺察師系統，就是為像你這樣的人設計的｜自己穩了，才能幫別人穩。';
  }
