<script>
const questions=[
  {q:'客人沒回你的促銷訊息，你的第一反應？',opts:[
    {text:'正常，她看到會回',v:'secure'},{text:'再傳一則，怕她沒看到',v:'anxious'},
    {text:'無所謂，她有需要自然會來',v:'avoidant'},{text:'擔心她是不是不來了，但又不敢追問',v:'enmeshed'}]},
  {q:'有個客人每次來都跟你傾訴家庭問題，你？',opts:[
    {text:'適度回應，但會把時間拉回療程',v:'secure'},{text:'認真聽完，常常因此延後下一個客人',v:'anxious'},
    {text:'有點煩，但不好意思打斷',v:'avoidant'},{text:'覺得你有責任幫她解決',v:'enmeshed'}]},
  {q:'客人突然跑去別家做，你？',opts:[
    {text:'有點可惜，但尊重她的選擇',v:'secure'},{text:'開始想是不是自己哪裡做不好',v:'anxious'},
    {text:'早就習慣了，客人來來去去很正常',v:'avoidant'},{text:'覺得被背叛，明明你對她那麼好',v:'enmeshed'}]},
  {q:'你跟客人之間的界線？',opts:[
    {text:'公私分明，上班是服務，下班是自己',v:'secure'},{text:'客人隨時傳訊息你都會回',v:'anxious'},
    {text:'保持距離，不太聊私事',v:'avoidant'},{text:'你知道客人家裡大小事，她也知道你的',v:'enmeshed'}]},
  {q:'你推薦產品的方式？',opts:[
    {text:'根據她的需求推薦，不推不適合的',v:'secure'},{text:'怕她覺得你在推銷，所以都不太敢開口',v:'anxious'},
    {text:'價格說完讓她自己決定，不多說',v:'avoidant'},{text:'幫她分析到她覺得非買不可',v:'enmeshed'}]},
  {q:'客人跟你抱怨另一個美容師，你？',opts:[
    {text:'聽但不評論，不介入',v:'secure'},{text:'很緊張，怕她以後也這樣說你',v:'anxious'},
    {text:'敷衍幾句帶過，不想被牽扯',v:'avoidant'},{text:'認真分析，幫她出主意',v:'enmeshed'}]},
  {q:'你最怕哪種客人？',opts:[
    {text:'不溝通的，做完什麼也不說',v:'secure'},{text:'突然消失不來的',v:'anxious'},
    {text:'太黏的，好像把你當閨蜜',v:'avoidant'},{text:'你不怕任何客人，你都能搞定',v:'enmeshed'}]},
  {q:'客人跟你訂了時間卻遲到30分鐘，你？',opts:[
    {text:'提醒她下次注意，這次正常服務',v:'secure'},{text:'不敢說，怕她不開心不來了',v:'anxious'},
    {text:'內心不爽但面無表情做完',v:'avoidant'},{text:'幫她找理由，「一定是路上塞車」',v:'enmeshed'}]},
  {q:'你的回頭客比例高嗎？',opts:[
    {text:'穩定，來的都是認同你的人',v:'secure'},{text:'高，但你很累，因為你付出太多',v:'anxious'},
    {text:'一般，你沒花太多心思在經營關係',v:'avoidant'},{text:'很高，客人離不開你，但你也離不開她們',v:'enmeshed'}]},
  {q:'你覺得「好的客情關係」是？',opts:[
    {text:'互相尊重，各取所需',v:'secure'},{text:'客人信任你到什麼都聽你的',v:'anxious'},
    {text:'做好服務就好，不需要太親',v:'avoidant'},{text:'像家人一樣，無話不說',v:'enmeshed'}]},
  {q:'客人要求你做一個你覺得不適合她的療程，你？',opts:[
    {text:'誠實說不適合，推薦更好的選擇',v:'secure'},{text:'猶豫半天，怕拒絕她會不來',v:'anxious'},
    {text:'她要做就做，反正她付錢',v:'avoidant'},{text:'花很長時間分析說服她改選另一個',v:'enmeshed'}]},
  {q:'你會在非上班時間想客人的事嗎？',opts:[
    {text:'偶爾，但不影響生活',v:'secure'},{text:'常常，擔心她上次做完滿不滿意',v:'anxious'},
    {text:'不會，下班就是下班',v:'avoidant'},{text:'會，而且會主動傳訊息關心她',v:'enmeshed'}]},
  {q:'你最自豪的是？',opts:[
    {text:'我的技術和專業判斷',v:'secure'},{text:'客人都說「只有你最懂我」',v:'anxious'},
    {text:'我不用靠巴結客人就能做好',v:'avoidant'},{text:'我的客人都變成我的朋友了',v:'enmeshed'}]},
  {q:'你覺得漲價這件事？',opts:[
    {text:'合理就漲，提前通知客人',v:'secure'},{text:'一直想漲但不敢，怕客人跑掉',v:'anxious'},
    {text:'該漲就漲，不解釋',v:'avoidant'},{text:'漲了之後會特別加量服務補回來',v:'enmeshed'}]},
  {q:'如果一個客人說「沒有你我怎麼辦」，你覺得？',opts:[
    {text:'謝謝信任，但我希望你能自己做選擇',v:'secure'},{text:'有點開心但也有壓力',v:'anxious'},
    {text:'不太舒服，這種依賴讓你有負擔',v:'avoidant'},{text:'很有成就感，這就是你存在的價值',v:'enmeshed'}]},
];

let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const optsHTML=qd.opts.map((opt,oi)=>`<button class="quiz-option${answers[i]===opt.v?' selected':''}" onclick="selectAnswer(${i},'${opt.v}',this)"><span style="flex-shrink:0;opacity:0.6;font-size:0.8rem">${String.fromCharCode(65+oi)}</span><span>${opt.text}</span></button>`).join('');
    card.innerHTML=`<div class="quiz-q-num">第 ${i+1} 題 / ${questions.length}</div><div class="quiz-question">${qd.q}</div><div class="quiz-options">${optsHTML}</div><div class="quiz-nav">${i>0?`<button class="btn-prev" onclick="goTo(${i-1})">← 上一題</button>`:'<span></span>'}${i<questions.length-1?`<button class="btn-next" id="btnNext-${i}" ${answers[i]===undefined?'disabled':''} onclick="goTo(${i+1})">下一題 →</button>`:`<button class="btn-next" id="btnNext-${i}" ${answers[i]===undefined?'disabled':''} onclick="showResult()">看我的客情模式 🤝</button>`}</div>`;
    area.appendChild(card);
  });updateProgress(idx);
}
function selectAnswer(qi,v,btn){answers[qi]=v;document.getElementById('qcard-'+qi).querySelectorAll('.quiz-option').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent=`第 ${idx+1} 題，共 ${questions.length} 題`;document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}

function showResult(){
  const scores={secure:0,anxious:0,avoidant:0,enmeshed:0};
  questions.forEach((_,i)=>{const a=answers[i];if(a)scores[a]++;});
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const topType=sorted[0][0];const total=questions.length;
