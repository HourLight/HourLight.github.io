const DIMS={anxiety:'焦慮程度',action:'行動力',efficacy:'效能感'};
const TYPES={
  eco_warrior:{name:'生態行動家型',icon:'🌱',sub:'你的焦慮變成了行動的燃料',
    keys:['積極行動','系統思考','影響力'],
    desc:'你不只是擔心地球，你在做事。你知道個人行動的極限，但你不會因為極限就什麼都不做。你帶環保杯、減少食物浪費、支持永續品牌，不是為了炫耀，是因為你相信每一個小動作都算數。你可能也在推動更大的改變，跟身邊的人聊氣候議題、關注政策、參與連署。你的焦慮有一個出口，那個出口就是行動。',
    detail:'研究顯示，把氣候焦慮轉化為行動的人，心理健康狀態通常比單純焦慮或麻木的人好。你做的事情不只是在「拯救地球」，更是在拯救自己的心理平衡。行動給你掌控感，掌控感降低無力感。\n\n但生態行動家的風險是「行動倦怠」。你可能會把所有的力氣都放在行動上，忘了休息、忘了自己也需要被照顧。你不需要一個人扛起整個地球。做你能做的，然後允許自己放鬆。地球的問題需要幾十億人一起解決，不是你一個人。\n\n覺察練習：今天做一件「不是為了地球，是為了自己」的事。一杯好茶、一段音樂、一段在自然裡的散步。照顧地球的人，也需要被照顧。',
    oil:'尤加利 2 滴＋迷迭香 2 滴＋甜橙 1 滴，在行動疲倦的時候擴香。尤加利帶來清新和淨化的感覺，迷迭香維持你的清醒和方向感，甜橙提醒你在拯救世界的路上不要忘記笑一下。',
    med:'閉上眼睛。想像你的腳踩在泥土上。吸氣四秒，感覺泥土的濕潤和穩固。吐氣六秒。你一直在做很多事。吸氣四秒，對自己說：「我做的夠了。」吐氣六秒。不是放棄，是允許自己休息。重複四次。最後，感覺泥土的溫度傳上來。它在支撐你。對自己說：「我照顧地球，地球也在照顧我。」張開眼睛。',
    quote:'你的行動不會白費。但記得也照顧行動家自己。'},
  paralyzed_empath:{name:'生態共感癱瘓型',icon:'🥀',sub:'你感受到了一切，然後動不了了',
    keys:['高度共感','氣候哀傷','過度負荷'],
    desc:'你對地球的痛苦有非常強的感受力。冰層融化你心裡也跟著融化，珊瑚白化你的心也跟著白化。這不是「想太多」，你是真的感覺到了。問題不是你的感受不合理，問題是這個感受太大了，大到讓你癱瘓了。你想做點什麼，但每次一想到問題有多大，就覺得自己有多小。那個落差，讓你什麼都做不了。',
    detail:'氣候共感是一種真實的情緒反應，不是矯情。研究顯示，對生態議題有高度共感的人，通常也對其他事物有高度的感受力。你的神經系統比較敏感，它在接收整個地球的訊號。問題是，你的身體不是設計來承受整個地球的痛苦的。\n\n你需要學會「有邊界的共感」。你可以感受，但你不需要把整個地球的重量都扛在身上。你可以關心，但你不需要因為你「只是一個人」就覺得自己沒有用。在台灣，你面對的颱風、空污、都市熱島效應，這些都是真實的。但你能做的，也是真實的。\n\n覺察練習：今天做一件「你能做完的」環保小事。不是簽一個改變世界的連署，是收好今天的垃圾分類。做完之後，對自己說：「這樣就夠了。」讓你的大腦記住「完成」的感覺。',
    oil:'薰衣草 2 滴＋天竺葵 2 滴＋佛手柑 1 滴，在你被環境新聞淹沒的時候擴香。薰衣草安撫你過度敏感的神經系統，天竺葵在你的感受和外在刺激之間建立一道溫柔的邊界，佛手柑讓你知道悲傷是可以的但不需要住在裡面。',
    med:'閉上眼睛。想像你站在一片很大的森林裡。森林有些地方在枯萎，有些地方還綠著。吸氣四秒，看看枯萎的部分。心裡會痛。吐氣六秒。吸氣四秒，轉頭看看還綠著的部分。它還在。吐氣六秒。你不需要修復整片森林。你只需要澆你面前的那棵樹。吸氣四秒，想像你在澆水。吐氣六秒。看那棵樹的葉子亮了一點。對自己說：「一棵樹也算。」張開眼睛。',
    quote:'你感受到了整個地球的痛。但你面前那棵樹，只需要你澆一杯水。'},
  numb_protector:{name:'麻木保護型',icon:'🧊',sub:'在乎的開關暫時被關掉了，不代表你不在乎',
    keys:['情感隔離','自我保護','迴避'],
    desc:'你聽到氣候相關的消息，沒什麼反應。不是你冷血，是你的心理防禦系統很早就把這個頻道關掉了。可能是因為資訊轟炸太多了，可能是因為你覺得自己什麼也改變不了，也可能是因為認真感受的話會太痛苦。麻木是一種自我保護。你的大腦判斷這個威脅太大了，與其焦慮，不如假裝它不存在。',
    detail:'環境議題的麻木是一種「慢性迴避」。資訊太多、問題太大、個人太小。你的大腦選擇了最省力的策略：不看、不聽、不想。但麻木的問題是，它不只會關掉對環境的感覺，它會慢慢關掉你對所有事情的感覺。你可能發現自己對很多事都「無感」，不只是氣候。\n\n重新啟動不需要從大事開始。去一次海邊、在公園裡坐十分鐘、看一棵樹從發芽到開花。讓你的身體重新跟自然建立連結。連結回來了，感覺才會回來。感覺回來了，行動才可能發生。\n\n覺察練習：今天找五分鐘待在自然裡。不用很遠，社區公園就好。不看手機，只是看、聽、聞。讓你的感官重新開機。',
    oil:'薄荷 2 滴＋迷迭香 2 滴＋甜橙 1 滴，在你覺得「什麼都無所謂」的時候擴香。薄荷是一個溫柔的巴掌，叫醒你的感覺系統。迷迭香讓你重新連上「在乎」的頻道。甜橙讓重新感覺這件事不那麼可怕。',
    med:'走到窗邊或戶外。閉上眼睛。吸氣四秒，聞空氣的味道。有什麼味道？不判斷，只是聞。吐氣六秒。吸氣四秒，聽聽聲音。鳥叫？車聲？風？吐氣六秒。張開眼睛，找一樣綠色的東西看。看十秒鐘。那是活的。吸氣四秒，對那個綠色的東西說：「我看到你了。」吐氣六秒。你開始有感覺了嗎？一點點就好。那是你的感覺回來了。',
    quote:'麻木是保護你的方式，但你值得重新感覺到這個世界。'},
  guilty_consumer:{name:'罪惡消費型',icon:'💸',sub:'你每買一樣東西都在想碳足跡',
    keys:['消費罪惡感','過度自責','完美主義環保'],
    desc:'你很在意自己的碳足跡，在意到已經變成一種壓力了。買杯飲料會想塑膠杯的問題，開冷氣會想電費和碳排，搭飛機會有罪惡感。你的環保意識不是行動的動力，而是一種持續的自我審判。你覺得自己做得不夠好、不夠環保、不夠負責任。但問題是：氣候變遷的責任不在你一個人身上。你把系統性的問題變成了個人的罪惡感。',
    detail:'研究顯示，「碳足跡」這個概念最早是石油公司推廣的，目的就是把氣候責任從企業轉嫁到個人身上。你的罪惡感，有一部分是被「設計」出來的。個人可以做有意義的事，但你不需要為整個系統的問題感到個人的罪惡。\n\n你的環保意識是好的。但當它變成一種持續的自我攻擊，它就不再是健康的了。你需要學會分辨：什麼是我能做的，什麼是系統的問題。然後把你的力氣放在前者，把後者交給政策和倡議。\n\n覺察練習：今天做一件「不環保但讓你開心」的小事。一杯外帶咖啡、一頓你想吃的東西、一次計程車。做完之後，對自己說：「我不需要完美。我是地球上的人，不是地球的贖罪者。」',
    oil:'佛手柑 2 滴＋甜橙 2 滴＋薰衣草 1 滴，在你又開始自責的時候擴香。佛手柑降低你的罪惡感閾值，甜橙提醒你活著本身就值得快樂，薰衣草安撫你的內在審判官。',
    med:'閉上眼睛。想像你的肩膀上扛著一個很大的袋子，裡面裝著所有你覺得「做不好」的環保事項。吸氣四秒，感覺那個重量。吐氣六秒。把袋子放到地上。不是扔掉，是放下。吸氣四秒，站直。吐氣六秒。你的肩膀鬆了。對自己說：「我盡力了。盡力就夠了。」重複三次。張開眼睛。',
    quote:'你不需要為整個地球贖罪。你是人，不是犧牲品。'},
  hopeful_pragmatist:{name:'務實樂觀型',icon:'🌿',sub:'你知道問題很大，但你選擇相信',
    keys:['理性樂觀','長期視角','平衡'],
    desc:'你不否認氣候問題的嚴重性，但你也不會因此絕望。你有一種務實的樂觀：承認問題、做能做的事、相信人類的適應力。你的心態不是「一切都會好的」那種天真，而是「問題很大，但我可以做的事情也很具體」。你環保但不偏執，關心但不崩潰，行動但不犧牲。你在環境和生活品質之間找到了一個平衡點。',
    detail:'務實的樂觀是心理韌性最強的一種態度。你既不逃避現實，也不被現實壓垮。你的效能感很高，代表你相信自己的行動有意義。這種信念本身就是一種資源，因為它讓你能持續做事，而不是三天打魚兩天曬網。\n\n你的功課不是修復什麼，而是擴大影響力。你的態度是最健康的那種，如果你能把這種態度傳遞給身邊的人，那比你自己減少多少碳排放都有價值。因為氣候問題的解決，需要的不是少數人做到極致，而是多數人做到基本。\n\n覺察練習：這週跟一個人聊氣候議題。不是說教，是分享你的感受和行動。讓對方看到「關心環境」也可以是不焦慮、不沉重的。你的存在本身就是一種示範。',
    oil:'迷迭香 2 滴＋尤加利 1 滴＋甜橙 2 滴，在你想分享和行動的時候擴香。迷迭香讓你的務實保持清晰，尤加利帶來清新和希望的感覺，甜橙讓你的行動帶著溫暖而不是壓力。',
    med:'閉上眼睛。想像你在一片草地上，天空很藍。吸氣四秒，感覺陽光曬在皮膚上。吐氣六秒。很舒服。吸氣四秒，想像你手裡有一顆種子。吐氣六秒，把它種在地上。吸氣四秒，想像它開始發芽。一棵小芽。不大。但它是活的。吐氣六秒。對自己說：「一顆種子。一步行動。夠了。」張開眼睛。',
    quote:'問題很大。但你能做的事也很真實。一顆種子，就夠了。'},
  doom_scroller:{name:'末日滑手型',icon:'📱',sub:'你一直看壞消息，然後更絕望',
    keys:['資訊過載','末日感','滑手機焦慮'],
    desc:'你的氣候焦慮有一個很具體的來源：螢幕。你會不自覺地滑到氣候相關的壞消息，然後一則接一則看下去。每看一則，焦慮就多一層。但你停不下來。因為不看的話你覺得更焦慮，好像你需要「知道」才能掌控，但知道了之後反而更失控。你的焦慮不只來自氣候本身，更來自資訊過載。你的大腦被淹沒了。',
    detail:'「末日滑手」是氣候焦慮裡一個很常見的模式。社群演算法知道你關注什麼，就餵你更多同類的內容。你以為你在「了解世界」，其實你在被餵養一個越來越大的焦慮迴圈。而且壞消息的呈現方式通常是為了吸引注意力，不是為了給你行動方案。你接收了最大的恐懼，卻沒有接收到任何出路。\n\n你需要做的第一件事不是「做環保」，是管理你的資訊攝取。限制每天看氣候新聞的時間、取消追蹤只發壞消息的帳號、追蹤一些在做實事的組織。讓你的焦慮從「末日」重新對焦到「行動」。\n\n覺察練習：今天設一個鬧鐘。超過十五分鐘的氣候新聞就停。然後做一件看得見的小事。你需要的不是更多資訊，是更多行動的回饋。',
    oil:'薰衣草 2 滴＋佛手柑 2 滴＋岩蘭草 1 滴，在你又開始無限滑手機的時候擴香。薰衣草讓你的神經系統從過度刺激中降下來，佛手柑把螢幕帶來的焦慮調低，岩蘭草把你的注意力拉回你腳下的現實。',
    med:'把手機螢幕朝下放在桌上。閉上眼睛。吸氣四秒，感覺眼睛在休息。沒有螢幕的光。吐氣六秒。吸氣四秒，聽聽真實的聲音。不是螢幕裡的聲音。吐氣六秒。重複四次。張開眼睛之後，不要馬上拿手機。先看看窗外。看一棵樹。看天空。吸氣四秒，對自己說：「真實的世界，比螢幕裡的好。」',
    quote:'手機裡的世界是被演算法餵養的。放下螢幕，看看真正的天空。'},
  angry_advocate:{name:'憤怒倡議型',icon:'🔥',sub:'你的怒火是真的，但需要一個方向',
    keys:['正義憤怒','系統批判','行動衝勁'],
    desc:'你很生氣。對企業的貪婪生氣、對政府的怠惰生氣、對人類的短視生氣。你的憤怒是合理的，因為你看得到問題在哪裡，而問題的根源不在個人，在系統。你可能會在社群上發聲、跟朋友爭論、對不環保的行為感到憤怒。你的怒火是真的，你的關心也是真的。但憤怒如果沒有出口，最後會燒到你自己。',
    detail:'正義憤怒是一種很有力量的情緒，它可以推動社會改變。但持續的憤怒對身心的消耗非常大。你的壓力荷爾蒙長期偏高，免疫力可能下降，人際關係可能因為你的「激進」而產生距離。\n\n你的功課是把憤怒變成策略。怒火是燃料，但你需要一個引擎來使用它。找一個具體的議題、一個具體的組織、一個具體的行動目標。把「對一切生氣」聚焦成「對這件事做點什麼」。聚焦之後，你的怒火會變成力量，而不是內耗。\n\n覺察練習：今天找一件讓你生氣的環境議題，用三十秒寫下：1. 我生氣的是什麼？2. 我能做的一件事是什麼？把情緒接地。',
    oil:'薄荷 2 滴＋尤加利 2 滴＋薰衣草 1 滴，在你怒火上來的時候擴香。薄荷給你的怒火一個冷靜的通道，尤加利清理被憤怒染色的思考，薰衣草在你準備好行動之前先讓你穩下來。',
    med:'站起來。雙手握拳。閉上眼睛。吸氣四秒，握緊。感覺那個憤怒。吐氣六秒，打開手掌。讓怒火散出去一些。重複四次。不是要你不生氣，是讓怒火從失控的火變成可以使用的火。最後，張開手掌，想像手裡拿著一顆種子。把怒火的熱度傳進去。那顆種子是你的行動。對自己說：「我不需要滅火。我需要用火。」張開眼睛。',
    quote:'你的怒火是真的。現在，給它一個方向。'},
  disengaged:{name:'事不關己型',icon:'😐',sub:'你活在自己的世界裡，地球的事太遠了',
    keys:['低關注','日常導向','心理距離'],
    desc:'氣候變遷對你來說是一個「很遠的議題」。你知道它存在，但它不在你的日常考慮範圍內。關心的能力你有，只是你覺得那跟你的生活沒有直接關係。你的注意力在工作、感情、家人、帳單上面，沒有多餘的心力分給一個你覺得自己改變不了的事情。這不是自私，這是你的認知資源分配策略。',
    detail:'心理距離是影響環保行為最大的因素之一。如果你覺得氣候問題很遠（時間上在未來、空間上在北極、跟你個人沒有直接關係），你就不太會把它當回事。但在台灣，氣候的影響其實很近。越來越熱的夏天、越來越強的颱風、越來越差的空氣品質。你已經在經歷了，只是你可能沒有把它跟「氣候變遷」連在一起。\n\n你不需要變成一個環保人士。你只需要把一些遠的東西拉近一點看。下次夏天熱到受不了的時候、颱風又破紀錄的時候、AQI紅色警報的時候，讓自己多想十秒鐘：「這跟什麼有關？」覺察是第一步。\n\n覺察練習：今天注意一件「你已經在經歷的氣候影響」。可以是天氣、可以是電費、可以是空氣。讓它從背景雜訊變成你認出來的訊號。',
    oil:'薄荷 1 滴＋迷迭香 2 滴＋甜橙 2 滴，在你覺得「跟我無關」的時候聞一下。薄荷叫醒你的注意力，迷迭香讓你看到日常和環境之間的連結線，甜橙讓這個覺察過程是溫暖的而不是沉重的。',
    med:'閉上眼睛。想像你在你家客廳。很舒服。吸氣四秒，看看窗外。窗外的世界跟你的客廳是同一個星球。吐氣六秒。吸氣四秒，想像窗外的風、陽光、雨、空氣。它們跟你的日常生活是連在一起的。吐氣六秒。你不需要改變世界。你只需要注意到它跟你是連在一起的。重複三次。對自己說：「我也是自然的一部分。」張開眼睛。',
    quote:'地球的事不遠。你呼吸的空氣、喝的水、曬的太陽，都是同一回事。'}
};
let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';
    const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 題 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一題</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一題 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看看我的生態情緒 🌍</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 題，共 '+questions.length+' 題';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const dimScores={};Object.keys(DIMS).forEach(k=>{dimScores[k]=0;});
  Object.keys(answers).forEach(qi=>{const oi=answers[qi];const s=questions[qi].opts[oi].s;Object.keys(s).forEach(d=>{dimScores[d]+=s[d];});});
  const maxPossible=Object.keys(answers).length*3;
  const anxPct=dimScores.anxiety/maxPossible;
  const actPct=dimScores.action/maxPossible;
  const effPct=dimScores.efficacy/maxPossible;
  let topType;
  if(actPct>0.45&&effPct>0.4) topType='eco_warrior';
  else if(anxPct>0.5&&actPct<0.15) topType='paralyzed_empath';
  else if(anxPct<0.15&&actPct<0.15) topType='disengaged';
  else if(anxPct<0.15&&actPct<0.15&&effPct<0.15) topType='numb_protector';
  else if(anxPct>0.35&&actPct>0.2) topType='angry_advocate';
  else if(anxPct>0.4&&effPct<0.15) topType='doom_scroller';
  else if(anxPct>0.3&&actPct>0.15&&effPct<0.2) topType='guilty_consumer';
  else if(effPct>0.35&&anxPct<0.3) topType='hopeful_pragmatist';
  else if(anxPct>0.3) topType='paralyzed_empath';
  else topType='numb_protector';
  const sorted=Object.keys(DIMS).sort((a,b)=>dimScores[b]-dimScores[a]);
  const f=TYPES[topType];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('hlTitleReveal').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥靈之鑰</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-quote">「'+f.quote+'」</div><div class="ss-footer">hourlightkey.com ✦ </div></div><div class="hl-title-card"><div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div><div class="hl-title-eyebrow">Hour Light ✦ 氣候焦慮與生態關係</div><span class="hl-title-icon">'+f.icon+'</span><div class="hl-title-main">'+f.name+'</div><div class="hl-title-sub">'+f.sub+'</div><div class="hl-title-divider"></div><div class="hl-title-grid"><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 生態情緒</div><div class="hl-title-tag-value">'+f.name+'</div></div><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 覺察關鍵字</div><div class="hl-title-tag-value">'+f.keys.join(' · ')+'</div></div></div><div class="hl-title-quote">「'+f.quote+'」</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">生態情緒覺察 Climate Emotional Profile</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var pct=Math.round(dimScores[k]/maxPossible*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+DIMS[k]+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">'+f.icon+' 你的生態情緒</div><div class="result-section-content">'+f.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度覺察</div><div class="result-section-content">'+f.detail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🌿 認知芳療配方</div><div class="result-section-content">'+f.oil+'</div></div><div class="result-section"><div class="result-section-title">🧘 60秒覺察練習</div><div class="result-section-content">'+f.med+'</div></div><div class="result-section" style="text-align:center;font-family:LXGW WenKai TC,serif;font-size:1.05rem;color:#8b6914"><div class="result-section-content"></div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ H.O.U.R. 覺察橋接</div><div class="hour-bridge-text">你跟地球的關係，其實也反映了你跟自己的關係。<br>馥靈秘碼看你的內在設定，交叉比對才看得完整。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免費解碼馥靈秘碼 →</a>';
  window._resultText=f.icon+' 我的生態情緒是「'+f.name+'」：'+f.sub+'\n\n你跟地球的關係是什麼？👉 hourlightkey.com/quiz-climate-anxiety.html';
  try{localStorage.setItem('hl_quiz_climate_anxiety',JSON.stringify({type:topType,dimScores,ts:Date.now()}));}catch(e){}
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_dropMaterial) HL_dropMaterial('quiz');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz',toolName:'氣候焦慮與生態關係'});window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
</script>
