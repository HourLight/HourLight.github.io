<script>
(function(){
  const grid = document.getElementById('storiesGrid');
  const btns = document.querySelectorAll('.filter-btn');
  let allCards = [];
  let curFilter = 'all';

  function teaser(story){
    // First paragraph up to 90 chars
    const nl = story.indexOf('\n\n');
    const raw = nl > 0 && nl < 100 ? story.slice(0, nl) : story.slice(0, 90);
    return raw.replace(/^天使的名字叫[\S]+。\n?/, '').trim().slice(0, 80);
  }

  function tarotLabel(t){
    if(Array.isArray(t)) return t[0] || '';
    return t || '';
  }

  function renderCards(data){
    const order = Object.keys(data).sort((a,b)=>{
      const aA = a.startsWith('A'), bA = b.startsWith('A');
      if(aA !== bA) return aA ? -1 : 1;
      return a.localeCompare(b, 'zh-TW');
    });
    grid.innerHTML = '';
    allCards = [];
    order.forEach(id=>{
      const v = data[id];
      const isArcana = id.startsWith('A');
      const group = isArcana ? 'major' : 'oil';
      const groupLabel = isArcana ? '大阿爾克那' : '精油牌';
      const a = document.createElement('a');
      a.href = 'angel-story.html?id=' + id;
      a.className = 'story-card';
      a.dataset.group = group;
      a.innerHTML = '<div class="card-num">' + id + '</div>' +
        '<div class="card-title">' + (v.title||'') + '</div>' +
        '<div class="card-meta"><span class="meta-tarot">' + tarotLabel(v.tarot) + '</span><span class="meta-group">' + groupLabel + '</span></div>' +
        '<p class="card-teaser">' + teaser(v.fullStory) + '…</p>' +
        '<div class="card-cta">讀完整故事 →</div>';
      grid.appendChild(a);
      allCards.push(a);
    });
    applyFilter();
  }

  function applyFilter(){
    allCards.forEach(c=>{
      const match = curFilter==='all' || c.dataset.group===curFilter;
      c.classList.toggle('hidden', !match);
    });
  }

  btns.forEach(btn=>{
    btn.addEventListener('click',()=>{
      curFilter = btn.dataset.filter;
      btns.forEach(b=>b.classList.toggle('active', b===btn));
      applyFilter();
    });
  });

  fetch('assets/data/angel-stories.json?v=130')
    .then(r=>r.json())
    .then(renderCards)
    .catch(()=>{ grid.innerHTML='<p style="text-align:center;color:#b39b6f;padding:40px;grid-column:1/-1">載入失敗，請重新整理。</p>'; });
})();
</script>
