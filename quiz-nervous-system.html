const DIMS={ventral:'安全社交（腹側迷走）',sympathetic:'戰或逃（交感神經）',dorsal:'凍結關機（背側迷走）'};
const TYPES={
  ventral:{name:'安全連結型',icon:'🌿',sub:'你的身體記得什麼是安全的感覺',
    keys:['自我調節','社交連結','情緒穩定'],
    desc:'你的自律神經系統大部分時間處在腹側迷走神經主導的狀態。這意味著你的身體覺得這個世界是安全的，你可以跟人連結、可以放鬆、可以專注做事。你不是沒有壓力，但你的身體知道怎麼從壓力裡回來。被嚇到之後，你的心跳很快就能恢復。被人惹到之後，你能感受到情緒但不會被淹沒。你的神經系統有一個穩定的「家」可以回去。',
    detail:'腹側迷走神經是人類最晚演化出來的神經通路，它跟社交、表情、聲音辨識直接相關。當這條路暢通的時候，你的臉部表情自然、聲音有溫度、眼神能跟人接觸。你能接收到別人的善意，也能適度表達自己的需要。\n\n這不代表你永遠在這個狀態。壓力大的時候你也會被推到交感神經或背側迷走神經的地方去。但你有一個很重要的能力：「回來」。你知道怎麼讓自己回到安全感裡，不管是深呼吸、跟人說話、去運動、或者只是提醒自己「我現在是安全的」。\n\n覺察邀請：你的這份穩定是珍貴的。但留意一件事，有沒有時候你把「我很好」當成不允許自己不好？穩定不是壓抑。偶爾讓自己崩潰一下，也是一種安全。',
    oil:'薰衣草 2 滴＋甜橙 2 滴＋乳香 1 滴，日常擴香。薰衣草維持你副交感神經的穩定基調，甜橙保持你跟快樂的連結，乳香讓你在安全感裡再深沉一層。不需要修復，只需要滋養。',
    med:'坐著或躺著，把一隻手放在心口，一隻手放在肚子上。吸氣四秒，感覺兩隻手的溫度。吐氣六秒。對自己說：「我的身體知道什麼是安全的。」重複四次。最後一次，微微上揚嘴角，讓臉部肌肉告訴神經系統：「一切都好。」張開眼睛。',
    quote:'你的身體記得安全的感覺。好好珍惜它。'},
  sympathetic:{name:'備戰警覺型',icon:'⚡',sub:'你的身體一直踩著油門，即使沒有敵人',
    keys:['高度警覺','反應快速','容易疲累'],
    desc:'你的自律神經系統大部分時間處在交感神經亢奮的狀態。你的身體覺得隨時可能有危險，所以一直保持著「準備好了」的姿態。心跳快一點、肌肉緊一點、腦袋轉快一點、睡眠淺一點。你可能做事效率很高、反應很快、什麼風吹草動都瞞不過你。但你同時也很累。因為你的身體消耗的能量，遠超過環境真正需要的。',
    detail:'交感神經系統是演化送給我們的生存禮物。面對老虎的時候，它讓你瞬間跑得比平常快三倍。但問題是，你的身體分不清老虎跟主管的語氣、分不清生命危險跟社交尷尬。它只知道「有威脅」，然後全力啟動。\n\n長期處在這個狀態會怎樣？你的身體會開始出現「過度使用」的症狀。肩頸僵硬是因為肌肉一直在備戰。磨牙是因為下巴在睡覺的時候還在「咬緊」。胃痛是因為血液都跑去四肢了，消化系統分不到資源。頭痛是因為大腦一直在高速運轉。\n\n覺察邀請：你的警覺是有原因的。某個時候你的身體學會了「放鬆是危險的」，所以它選擇永遠不放鬆。現在你可以慢慢告訴它：「那個時候已經過去了。」不是用腦袋告訴它，是用身體告訴它。',
    oil:'薰衣草 3 滴＋岩蘭草 2 滴＋羅馬洋甘菊 1 滴，在睡前擴香或稀釋後擦在腳底。薰衣草直接作用在副交感神經，幫你踩煞車。岩蘭草是最強的「落地」精油，把你的能量從腦袋拉回地面。羅馬洋甘菊安撫你的內在小孩，那個一直覺得不安全的部分。',
    med:'站著或坐著，雙腳踩穩地面。吸氣四秒，感覺氣進到肚子裡。吐氣六秒，想像腳底有根往下長進地板。重複四次。然後把雙手搓熱，輕輕蓋在眼睛上。吸氣四秒，感覺手掌的溫度。吐氣六秒，對自己說：「現在沒有老虎。我是安全的。」停在黑暗裡十秒。慢慢放下手。張開眼睛。',
    quote:'你不需要一直準備好。放下盾牌的時候，不代表有人會攻擊你。'},
  dorsal:{name:'凍結關機型',icon:'🧊',sub:'你的身體選擇了關機，因為它覺得戰也打不贏、逃也逃不掉',
    keys:['情感麻木','慢性疲勞','斷線感'],
    desc:'你的自律神經系統大部分時間處在背側迷走神經主導的狀態。這是最古老的生存策略，當交感神經的「戰或逃」都行不通的時候，身體會啟動最後一道防線：關機。你可能經常覺得累、覺得空、覺得跟世界之間隔著一層東西。不是不想動，是身體不讓你動。不是不想感受，是感覺的通道暫時關閉了。',
    detail:'背側迷走神經的「凍結」反應在動物界很常見。裝死的負鼠就是這個機制。當威脅太大、打不過也跑不掉的時候，身體會選擇「把自己關掉」來減少痛苦。在人類身上，這不一定是面對物理危險，長期的情緒壓力、被忽視、無力改變的困境，都可能讓身體選擇這條路。\n\n處在這個狀態的你可能會覺得自己很「廢」。但這不是懶，這是你的身體在保護你。它用盡了所有辦法，最後選擇了最省能量的一個。手腳冰冷是因為血液回縮。慢性疲勞是因為代謝降到最低。情感麻木是因為大腦關閉了感覺的通道。\n\n覺察邀請：你要做的不是「振作起來」，不是用意志力把自己從這裡拔出來。你要做的是非常非常小的事情。動一根手指頭。喝一口溫水。感覺嘴唇碰到杯緣的觸感。讓身體知道：「你還在這裡。你還活著。你還連著。」',
    oil:'葡萄柚 2 滴＋薄荷 1 滴＋黑胡椒 1 滴＋甜橙 1 滴，在早晨擴香。葡萄柚是喚醒多巴胺系統最溫和的方式。薄荷讓身體記得什麼是「清醒」的感覺。黑胡椒帶來溫熱感，像在告訴你的皮膚：「你還有知覺。」甜橙讓這個喚醒的過程不那麼粗暴。',
    med:'躺在床上或沙發上。不用坐起來。把一隻手放在肚子上。吸氣四秒，感覺肚子在手掌底下微微鼓起來。如果感覺不到也沒關係，就想像。吐氣六秒。動一動腳趾頭。感覺它們在動。吸氣四秒，動一動手指頭。吐氣六秒。對自己說：「我還在這裡。」重複四次。不用起來。就這樣就好。',
    quote:'關機不是你的錯。是你的身體替你做了一個很勇敢的決定。現在，一點一點重新開機就好。'},
  ventral_sympathetic:{name:'過度負責型',icon:'🔥',sub:'你看起來很穩，但身體一直在高速運轉',
    keys:['表面穩定','隱性焦慮','用責任感壓住恐懼'],
    desc:'你的神經系統在腹側迷走和交感神經之間快速切換。對外看起來是穩定的、可靠的、什麼都能處理的人。但裡面一直在燒。你用「我來」「我處理」「沒事我可以」把焦慮包裝成負責任，別人看到的是你的能力，看不到的是你的消耗。晚上回到家可能直接癱在沙發上，因為白天的「穩定」已經把你的能量全部用完了。',
    detail:'這種模式很常見在長女、長子、或是從小就需要「當大人」的人身上。你的腹側迷走神經學會了一件事：「只要我保持冷靜，大家就安全。」但問題是你把別人的安全當成自己的責任了。你的交感神經一直在運轉但被你的社交面具壓住，所以別人看不出來你在緊張。\n\n長期下來，你的身體會用很隱蔽的方式告訴你它撐不住了。磨牙、淺眠、假日一放鬆就生病、肩頸痠到推拿都推不開。這些都是你的身體在說：「拜託，讓我歇一下。」\n\n覺察邀請：練習說一次「這個我沒辦法」。不是因為真的沒辦法，是讓你的身體體驗一次「不負責也不會天塌下來」的感覺。你的穩定很珍貴，但穩定不是沒有極限。',
    oil:'天竺葵 2 滴＋薰衣草 2 滴＋佛手柑 1 滴，在一個人的時候擴香。天竺葵幫你把「給出去」和「收回來」調到平衡。薰衣草讓你的副交感神經接手。佛手柑降低你的責任焦慮。這是屬於你自己的配方，不用分給別人。',
    med:'坐下來。把雙手放在大腿上，掌心朝上。吸氣四秒，想像你正在扛著什麼東西。吐氣六秒，想像慢慢把它放在地上。重複四次，每次放下一樣東西。吸氣四秒，看著空了的雙手。吐氣六秒。對自己說：「今天夠了。」不加「但是」。張開眼睛。',
    quote:'你撐起了很多人的天花板。但你的地板也需要人踩穩。'},
  sympathetic_dorsal:{name:'油門煞車同踩型',icon:'🌀',sub:'你的身體同時在衝刺和關機，像踩著油門拉手煞車',
    keys:['情緒暴衝','能量崩塌','極端擺盪'],
    desc:'你的神經系統在交感神經和背側迷走之間劇烈擺盪。一下子焦慮到想衝出去做點什麼，一下子又整個人癱掉什麼都不想動。或者更常見的是：兩個同時發生。腦袋在焦慮但身體動不了。想要行動但全身像灌了鉛。這種衝突感讓你覺得自己快瘋了，因為你同時收到「快跑」和「別動」兩個矛盾的指令。',
    detail:'這種模式在心理學裡對應的是「功能性凍結」。你的身體同時啟動了加速和減速系統，結果就是卡住。這不是你意志力不夠，是你的神經系統過載了，它不知道該衝還是該停，所以兩個都做。\n\n你可能有過這樣的經驗：明明有一堆事情要做，焦慮得不得了，但就是坐在那裡滑手機，一滑就是兩小時。那不是拖延，那是你的背側迷走在保護你，因為交感神經的焦慮已經超過你能承受的閾值了。\n\n覺察邀請：你需要的不是「動力」，是先把其中一個系統安撫下來。通常先處理交感神經（焦慮）比較有效。當焦慮降下來了，背側迷走的凍結才有空間鬆開。',

  ventral_dorsal:{name:'表面開朗型',icon:'🎭',sub:'你笑著跟人聊天的時候，身體裡面其實是空的',

    med:'找一個安全的空間。坐下或躺下。閉上眼睛。不用微笑。讓臉上的表情完全放掉。吸氣四秒，感覺臉頰放鬆。吐氣六秒，感覺眉頭鬆開。你的表情不需要為誰存在。吸氣四秒，把手放在胸口。吐氣六秒。對自己說：「不笑也是安全的。」重複四次。張開眼睛。',

  sympathetic_ventral:{name:'高功能焦慮型',icon:'🏃',sub:'你把焦慮轉化成了生產力，但油箱快見底了',

    detail:'高功能焦慮在外面看起來跟「優秀」很像。你的績效好、社交好、什麼都處理得好。但驅動這一切的引擎不是熱情，是恐懼。你怕的是「如果我沒有在做事，我就沒有價值」。所以你的身體一直保持在高轉速。\n\n休息對你來說不是放鬆，是另一種壓力。躺下來的時候焦慮反而更嚴重，因為沒有事情可以擋住那些你不想面對的念頭。所以你寧可繼續做事。假日比上班日更累，因為你不知道不工作的自己要做什麼。\n\n覺察邀請：今天給自己十五分鐘什麼都不做。不滑手機、不看書、不整理東西。就坐著。當焦慮浮上來的時候，不要用「做事」去壓它，觀察它。它在你身體的哪裡？什麼形狀？什麼溫度？你不需要消除它，只需要看見它。',
    oil:'佛手柑 2 滴＋薰衣草 2 滴＋依蘭 1 滴，在你終於停下來的那個時刻擴香。佛手柑告訴你的大腦：「現在不需要高效能。」薰衣草幫你的身體踩煞車。依蘭讓「什麼都不做」變成一種享受而不是一種懲罰。',

    quote:'你的忙碌是一層很精緻的包裝紙。撕開看看裡面。不用怕，裡面不是空的。'},
  dorsal_sympathetic:{name:'崩潰預備型',icon:'🌋',sub:'你已經關機很久了，但地底下的壓力一直在累積',
    keys:['平時麻木','突然爆發','情緒地震'],

    oil:'甜橙 2 滴＋薰衣草 2 滴＋乳香 1 滴，每天固定時間擴香。甜橙慢慢喚醒被關閉的感覺通道。薰衣草讓交感神經不需要用「爆發」的方式來宣洩。乳香在兩個極端之間架一座橋。不是避免爆發，是讓情緒有一條平坦的路可以走。',
    med:'坐著或躺著。一隻手放在胸口，一隻手放在肚子上。吸氣四秒，問自己：「我的身體現在有什麼感覺？」不評判。吐氣六秒。可能是麻的、空的、什麼都沒有。那就跟「什麼都沒有」待一會兒。吸氣四秒，動一動手指，看看有沒有微小的感覺浮上來。吐氣六秒。不管有沒有感覺到，都對自己說：「我願意慢慢感覺。不用一次全部打開。」重複四次。張開眼睛。',
    quote:'感覺一直都在。只是被鎖太久了。慢慢轉開那個閥門，一點一點就好。'},
  dorsal_ventral:{name:'解離漂浮型',icon:'☁️',sub:'你的身體在這裡，但「你」好像在很遠的地方看著',
    keys:['離身體很遠','自動駕駛','旁觀者視角'],
    desc:'你經常有一種感覺，好像自己在看著自己過日子。身體在做事、在說話、在笑，但你的意識飄在上面，像一個旁觀者。你能正常運作，甚至可以跟人互動（腹側迷走的社交功能還在），但你知道那不是「完整」的你在場。有一部分的你一直在很遠的地方。',
    detail:'解離是一種非常精密的保護機制。當環境的壓力超過你的承受範圍，大腦會選擇把「你」和「正在發生的事」分開。這樣即使外在很痛苦，「你」不用完整地經歷它。這在當時可能救了你。但現在它變成了一種預設模式。\n\n你可能會覺得記憶有斷層。昨天做了什麼不太記得。開車回家不太記得經過了哪些路口。別人跟你說過的話你需要聽兩遍才能「進去」。這不是記性差，是你的意識在保護你的時候「不完全在場」。\n\n覺察邀請：「回到身體裡」不是一句空話，是需要練習的。你可以從最小的感覺開始。腳趾踩在地板上是什麼觸感？嘴裡含著一口水是什麼溫度？當你能感覺到身體的某個部分，你就回來了一點點。不用急，慢慢回來就好。',

    quote:'你飄了很久了。不需要一下子降落。先感覺腳底就好。'}
};
let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';
    const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 題 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一題</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一題 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看看我的神經系統模式 🫀</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 題，共 '+questions.length+' 題';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const dimScores={};Object.keys(DIMS).forEach(k=>{dimScores[k]=0;});
  Object.keys(answers).forEach(qi=>{const oi=answers[qi];const s=questions[qi].opts[oi].s;Object.keys(s).forEach(d=>{dimScores[d]+=s[d];});});
  const maxPossible=Object.keys(answers).length*3;
  const sorted=Object.keys(DIMS).sort((a,b)=>dimScores[b]-dimScores[a]);
  // Determine type based on score distribution
  const v=dimScores.ventral,sy=dimScores.sympathetic,d=dimScores.dorsal;
  const total=v+sy+d;
  let topType;
  if(v>sy*1.3&&v>d*1.3) topType='ventral';
  else if(sy>v*1.3&&sy>d*1.3) topType='sympathetic';
  else if(d>v*1.3&&d>sy*1.3) topType='dorsal';
  else if(v>=sy&&v>=d&&sy>d) topType='ventral_sympathetic';
  else if(sy>=v&&sy>=d&&v>d) topType='sympathetic_ventral';
  else if(sy>=v&&sy>=d&&d>v) topType='sympathetic_dorsal';
  else if(d>=v&&d>=sy&&sy>v) topType='dorsal_sympathetic';
  else if(d>=v&&d>=sy&&v>sy) topType='dorsal_ventral';
  else if(v>=sy&&v>=d&&d>sy) topType='ventral_dorsal';
  else topType=sorted[0];
  const f=TYPES[topType];
  // find a secondary type for display
  const pureTypes=['ventral','sympathetic','dorsal'];
  const secondKey=pureTypes.filter(k=>k!==sorted[0]).sort((a,b)=>dimScores[b]-dimScores[a])[0];
  const f2=TYPES[secondKey];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('hlTitleReveal').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥靈之鑰</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-quote">「'+f.quote+'」</div><div class="ss-footer">hourlightkey.com ✦ </div></div><div class="hl-title-card"><div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div><div class="hl-title-eyebrow">Hour Light ✦ 神經系統覺察</div><span class="hl-title-icon">'+f.icon+'</span><div class="hl-title-main">'+f.name+'</div><div class="hl-title-sub">'+f.sub+'</div><div class="hl-title-divider"></div><div class="hl-title-grid"><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 神經系統模式</div><div class="hl-title-tag-value">'+f.name+'</div></div><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 覺察關鍵字</div><div class="hl-title-tag-value">'+f.keys.join(' · ')+'</div></div></div><div class="hl-title-quote">「'+f.quote+'」</div><div class="hl-title-combo-hint">'+f.name+'｜'+f.sub+'</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">神經系統覺察 Nervous System</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var pct=Math.round(dimScores[k]/maxPossible*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+DIMS[k]+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">'+f.icon+' 你的神經系統模式</div><div class="result-section-content">'+f.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度覺察</div><div class="result-section-content">'+f.detail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🌿 認知芳療配方</div><div class="result-section-content">'+f.oil+'</div></div><div class="result-section"><div class="result-section-title">🧘 60秒身體校準練習</div><div class="result-section-content">'+f.med+'</div></div><div class="result-section" style="text-align:center;font-family:LXGW WenKai TC,serif;font-size:1.05rem;color:#8b6914"><div class="result-section-content"></div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ H.O.U.R. 覺察橋接</div><div class="hour-bridge-text">你的神經系統模式是「身體的出廠設定」，馥靈秘碼看的是「內在的出廠設定」。<br>兩組數據對照，你才能看見為什麼你的身體總是用這種方式回應世界。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免費解碼馥靈秘碼 →</a>';
  window._resultText=f.icon+' 我是「'+f.name+'」！'+f.sub+'\n「'+f.quote+'」\n\n你的神經系統是什麼模式？👉 hourlightkey.com/quiz-nervous-system.html';
  try{localStorage.setItem('hl_quiz_nervous_system',JSON.stringify({type:topType,dimScores,ts:Date.now()}));}catch(e){}
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_dropMaterial) HL_dropMaterial('quiz');
