<style>
/* ═══════════════════════════════════════
   castle-hub.html 專用樣式 — cv3- 前綴避免 CSS 衝突
   ═══════════════════════════════════════ */
:root{
  --cv3-bg: #faf7f2;
  --cv3-bg-alt: #f1ead9;
  --cv3-ink: #2a1f4c;
  --cv3-ink-soft: #4a3f6c;
  --cv3-ink-lite: #8a7fa0;
  --cv3-gold: #b8922a;
  --cv3-gold-lt: #e9c27d;
  --cv3-gold-dk: #8a6d1f;
  --cv3-purple: #a07cdc;
  --cv3-purple-lt: #d6a7c7;
  --cv3-warm: #7a6068;
  --cv3-line: rgba(184,146,42,.2);
  --cv3-line-soft: rgba(0,0,0,.06);
  --cv3-serif: 'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif;
  --cv3-sans: 'Noto Serif TC','PingFang TC','Microsoft JhengHei',sans-serif;
  --cv3-ease: cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body.cv3-body{font-family:var(--cv3-sans);color:var(--cv3-ink);background:var(--cv3-bg);-webkit-font-smoothing:antialiased;overflow-x:hidden;line-height:1.8}
a{color:var(--cv3-gold-dk);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ── 時辰視覺主題 ── */
body.cv3-phase-dawn{background:linear-gradient(180deg,#fef4e6 0%,#fbebd4 40%,#faf7f2 100%)}
body.cv3-phase-dawn::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 60% 25%,rgba(255,210,140,.35),transparent 60%);pointer-events:none;z-index:0}
body.cv3-phase-day{background:linear-gradient(180deg,#faf9f0,#f5f2ea)}
body.cv3-phase-dusk{background:linear-gradient(180deg,#ffe8d6 0%,#fdd5b8 45%,#fae0c9 100%)}
body.cv3-phase-dusk::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 70% 70%,rgba(255,150,100,.35),transparent 55%);pointer-events:none;z-index:0}
body.cv3-phase-night{background:linear-gradient(180deg,#1f1c3e 0%,#2a2752 50%,#3a3569 100%);color:#f0ecf5}
body.cv3-phase-night .cv3-card{background:rgba(255,255,255,.08);color:#f0ecf5;border-color:rgba(255,255,255,.12)}
body.cv3-phase-midnight{background:linear-gradient(180deg,#0e0b24 0%,#1f1c3e 55%,#2d2755 100%);color:#e8e2f0}
body.cv3-phase-midnight .cv3-card{background:rgba(255,255,255,.06);color:#e8e2f0;border-color:rgba(255,255,255,.1)}

/* ── 夜晚/深夜：星點漂浮背景 ── */
body.cv3-phase-night::before, body.cv3-phase-midnight::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,.8), transparent),
    radial-gradient(1px 1px at 45% 50%, rgba(248,223,165,.6), transparent),
    radial-gradient(1.5px 1.5px at 75% 15%, rgba(255,255,255,.9), transparent),
    radial-gradient(1px 1px at 85% 70%, rgba(248,223,165,.6), transparent),
    radial-gradient(1px 1px at 25% 80%, rgba(255,255,255,.6), transparent),
    radial-gradient(1.5px 1.5px at 55% 35%, rgba(255,255,255,.7), transparent);
  background-repeat:no-repeat;background-size:100% 100%;
  animation:cv3Twinkle 6s ease-in-out infinite;
}
@keyframes cv3Twinkle{0%,100%{opacity:.7}50%{opacity:1}}

/* ── 浮動粒子（所有時辰都有，金色塵埃）── */
.cv3-particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.cv3-particle{position:absolute;width:6px;height:6px;border-radius:50%;
  background:radial-gradient(circle,rgba(248,223,165,.6) 0%,rgba(248,223,165,0) 70%);
  opacity:0;animation:cv3Float 14s linear infinite}
@keyframes cv3Float{
  0%{transform:translate(0,100vh) scale(.3);opacity:0}
  10%{opacity:.5}
  50%{opacity:.8}
  90%{opacity:.4}
  100%{transform:translate(40px,-10vh) scale(1);opacity:0}
}

/* ── 讓所有主要內容 z-index > 0 浮在粒子上 ── */
main{position:relative;z-index:1}

/* ── 頂部 Hero ── */
.cv3-hero{max-width:1200px;margin:0 auto;padding:56px 20px 32px;text-align:center;position:relative}
.cv3-eyebrow{font-size:.8rem;color:var(--cv3-gold);letter-spacing:.45em;text-transform:uppercase;margin-bottom:12px}
.cv3-hero h1{font-family:var(--cv3-serif);font-size:clamp(1.8rem,4.2vw,2.6rem);font-weight:500;letter-spacing:.14em;line-height:1.5;margin-bottom:12px}
.cv3-phase-info{display:inline-flex;align-items:center;gap:10px;padding:8px 20px;border-radius:999px;background:rgba(233,194,125,.12);font-size:.85rem;color:var(--cv3-gold-dk);margin:10px 0}
.cv3-phase-info .cv3-dot{width:8px;height:8px;border-radius:50%;background:var(--cv3-gold)}

/* ── Lord 面板（用戶狀態卡）── */
.cv3-lord-card{max-width:880px;margin:16px auto;padding:24px 28px;background:#fff;border:1px solid var(--cv3-line);border-radius:20px;display:grid;grid-template-columns:auto 1fr auto;gap:22px;align-items:center;box-shadow:0 6px 24px rgba(184,146,42,.08)}
.cv3-lord-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--cv3-gold-lt),var(--cv3-purple-lt));display:flex;align-items:center;justify-content:center;font-size:1.8rem}
.cv3-lord-info .cv3-lord-title{font-family:var(--cv3-serif);font-size:1.15rem;font-weight:500;color:var(--cv3-ink)}
.cv3-lord-info .cv3-lord-meta{font-size:.82rem;color:var(--cv3-ink-lite);margin-top:2px}
.cv3-lord-xpbar{width:100%;height:6px;background:var(--cv3-line-soft);border-radius:3px;margin-top:8px;overflow:hidden}
.cv3-lord-xpbar-fill{height:100%;background:linear-gradient(90deg,var(--cv3-gold),var(--cv3-gold-lt));transition:width .6s var(--cv3-ease)}
.cv3-lord-stats{display:flex;gap:18px;text-align:center}
.cv3-lord-stat{font-size:.75rem;color:var(--cv3-ink-lite)}
.cv3-lord-stat strong{display:block;font-family:var(--cv3-serif);font-size:1.15rem;color:var(--cv3-gold-dk);margin-bottom:2px}

/* ── 城堡地圖區（等圖到位替換）── */
.cv3-map-wrap{max-width:1200px;margin:24px auto;padding:0 20px}
.cv3-map-container{position:relative;background:linear-gradient(135deg,#f7f0e0,#ece1c9);border:1px solid var(--cv3-line);border-radius:24px;padding:40px 30px;min-height:400px;overflow:hidden}
.cv3-map-placeholder{text-align:center;padding:80px 20px;color:var(--cv3-ink-lite);font-size:.85rem;line-height:2}
.cv3-map-placeholder-emoji{font-size:4rem;margin-bottom:18px;display:block;filter:grayscale(.3)}

/* ── 房間網格（美術圖到位前作為主顯示）── */
.cv3-rooms-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px;margin-top:24px}
.cv3-room-card{background:#fff;border:1px solid var(--cv3-line);border-radius:16px;padding:22px 20px;cursor:pointer;transition:all .3s var(--cv3-ease);position:relative;overflow:hidden;min-height:220px;display:flex;flex-direction:column;justify-content:space-between}
.cv3-room-card::after{content:'';position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity .5s var(--cv3-ease);z-index:0;border-radius:16px}
.cv3-room-card[data-img-loaded="true"]::after{opacity:.22}
.cv3-room-card:hover::after{opacity:.42}
.cv3-room-card > *{position:relative;z-index:1}
.cv3-room-card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(184,146,42,.22);border-color:var(--cv3-gold)}
.cv3-room-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--cv3-gold);z-index:2}
.cv3-room-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.cv3-room-emoji{font-size:2rem;line-height:1}
.cv3-room-name{font-family:var(--cv3-serif);font-size:1.05rem;font-weight:500;color:var(--cv3-ink)}
.cv3-room-zone{font-size:.7rem;color:var(--cv3-ink-lite);letter-spacing:.1em;margin-top:2px}
.cv3-room-desc{font-size:.82rem;color:var(--cv3-ink-soft);line-height:1.9;margin-bottom:14px}
.cv3-room-footer{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--cv3-line-soft);font-size:.75rem;color:var(--cv3-ink-lite)}
.cv3-room-lv{font-family:var(--cv3-serif);color:var(--cv3-gold-dk);font-weight:500}
.cv3-room-mood{font-size:.7rem;padding:3px 10px;border-radius:999px;background:var(--cv3-bg-alt);color:var(--cv3-warm)}
.cv3-room-mood.bright{background:#fff3d6;color:#b8922a}
.cv3-room-mood.calm{background:#e8efe6;color:#4a7a4a}
.cv3-room-mood.pensive{background:#e0d8ec;color:#6d5daa}
.cv3-room-mood.playful{background:#ffe0e8;color:#c9567a}
.cv3-room-mood.melancholy{background:#d8dee8;color:#5a6478}

/* ── 側邊任務面板 ── */
.cv3-sidebar{max-width:1200px;margin:32px auto;padding:0 20px;display:grid;grid-template-columns:1fr 1fr;gap:22px}
@media(max-width:768px){.cv3-sidebar{grid-template-columns:1fr}}
.cv3-card{background:#fff;border:1px solid var(--cv3-line);border-radius:16px;padding:24px 22px}
.cv3-card-title{font-family:var(--cv3-serif);font-size:1rem;font-weight:500;color:var(--cv3-ink);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--cv3-line-soft);letter-spacing:.08em}
.cv3-quest-item{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 0;border-bottom:1px dashed var(--cv3-line-soft);font-size:.88rem}
.cv3-quest-item:last-child{border-bottom:none}
.cv3-quest-text{flex:1;color:var(--cv3-ink-soft);line-height:1.7}
.cv3-quest-progress{font-size:.75rem;color:var(--cv3-gold-dk);white-space:nowrap}
.cv3-quest-reward{font-size:.75rem;color:var(--cv3-ink-lite)}
.cv3-quest-done{opacity:.5;text-decoration:line-through}

/* ── 兌換所 ── */
.cv3-exchange{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
@media(max-width:480px){.cv3-exchange{grid-template-columns:1fr}}
.cv3-ex-btn{padding:12px 10px;border:1px solid var(--cv3-line);border-radius:10px;background:#fff;text-align:center;cursor:pointer;transition:all .2s var(--cv3-ease)}
.cv3-ex-btn:hover{border-color:var(--cv3-gold);background:rgba(233,194,125,.06)}
.cv3-ex-btn .cv3-ex-cost{font-family:var(--cv3-serif);font-size:1rem;color:var(--cv3-gold-dk);font-weight:500;display:block}
.cv3-ex-btn .cv3-ex-label{font-size:.72rem;color:var(--cv3-ink-lite);margin-top:2px}

/* ── Toast ── */
.cv3-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(42,31,76,.95);color:var(--cv3-gold-lt);padding:18px 32px;border-radius:14px;font-size:1rem;line-height:1.6;text-align:center;z-index:9999;display:none;max-width:min(88vw,420px);box-shadow:0 10px 40px rgba(42,31,76,.3)}
.cv3-toast.show{display:block;animation:cv3Up .25s ease}
@keyframes cv3Up{from{opacity:0;transform:translate(-50%,-48%)}to{opacity:1;transform:translate(-50%,-50%)}}

/* ── 房間進入彈窗 ── */
.cv3-room-modal-overlay{position:fixed;inset:0;background:rgba(10,6,24,.55);z-index:800;display:none;align-items:center;justify-content:center;padding:20px}
.cv3-room-modal-overlay.show{display:flex;animation:cv3FadeIn .22s ease}
@keyframes cv3FadeIn{from{opacity:0}to{opacity:1}}
.cv3-room-modal{background:#fff;border-radius:24px;padding:30px 26px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(42,31,76,.25);position:relative;animation:cv3ModalUp .28s cubic-bezier(.34,1.56,.64,1)}
@keyframes cv3ModalUp{from{opacity:0;transform:translateY(18px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.cv3-room-modal-close{position:absolute;top:14px;right:16px;font-size:1.3rem;color:var(--cv3-ink-lite);cursor:pointer;line-height:1;padding:4px}
.cv3-room-modal-close:hover{color:var(--cv3-ink)}
.cv3-room-modal-head{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.cv3-room-modal-icon{font-size:2.6rem;line-height:1}
.cv3-room-modal-title{font-family:var(--cv3-serif);font-size:1.2rem;font-weight:500;color:var(--cv3-ink)}
.cv3-room-modal-zone{font-size:.72rem;color:var(--cv3-gold);letter-spacing:.1em;margin-top:2px}
.cv3-room-modal-event{background:var(--cv3-bg-alt);border-radius:12px;padding:14px 16px;font-size:.85rem;color:var(--cv3-ink-soft);line-height:1.85;margin-bottom:14px;border-left:3px solid var(--cv3-gold-lt)}
.cv3-room-modal-mood{display:inline-flex;align-items:center;gap:6px;font-size:.76rem;color:var(--cv3-warm);margin-bottom:18px}
.cv3-room-modal-tools{display:flex;flex-direction:column;gap:8px;margin-bottom:6px}
.cv3-room-modal-tool-btn{display:flex;align-items:center;gap:10px;padding:11px 14px;border:1.5px solid var(--cv3-line);border-radius:12px;background:#fff;cursor:pointer;transition:all .2s var(--cv3-ease);text-align:left;font-size:.85rem;color:var(--cv3-ink-soft);text-decoration:none}
.cv3-room-modal-tool-btn:hover{border-color:var(--cv3-gold);background:rgba(233,194,125,.06);color:var(--cv3-ink)}
.cv3-room-modal-tool-btn .cv3-tool-arrow{margin-left:auto;color:var(--cv3-gold-lt);font-size:.8rem}

/* ── 兌換獎勵彈窗 ── */
.cv3-ex-reward-overlay{position:fixed;inset:0;background:rgba(10,6,24,.45);z-index:900;display:none;align-items:center;justify-content:center}
.cv3-ex-reward-overlay.show{display:flex;animation:cv3FadeIn .2s ease}
.cv3-ex-reward-popup{background:#fff8f0;border:2px solid rgba(200,134,42,.3);border-radius:22px;padding:30px 26px;text-align:center;min-width:240px;max-width:min(88vw,320px);box-shadow:0 16px 48px rgba(42,31,76,.2);animation:cv3ModalUp .28s cubic-bezier(.34,1.56,.64,1)}
.cv3-ex-reward-icon{font-size:3rem;display:block;margin-bottom:10px}
.cv3-ex-reward-name{font-family:var(--cv3-serif);font-size:1.1rem;color:var(--cv3-ink);font-weight:500;margin-bottom:4px}
.cv3-ex-reward-sub{font-size:.8rem;color:var(--cv3-ink-lite);margin-bottom:18px}
.cv3-ex-reward-close{padding:9px 24px;background:linear-gradient(135deg,#c8862a,#e8b86d);color:#fff;border:none;border-radius:20px;cursor:pointer;font-size:.86rem;font-family:inherit}

/* ── Footer ── */
.cv3-footer{text-align:center;padding:40px 20px 30px;color:var(--cv3-ink-lite);font-size:.78rem;letter-spacing:.05em}
</style>
</head>
<body class="cv3-body">

<!-- 金色塵埃漂浮粒子（JS 動態生成） -->
<div class="cv3-particles" id="cv3-particles"></div>

<main>

  <!-- Hero -->
  <section class="cv3-hero">
    <div class="cv3-eyebrow">Castle Hub · 全站中樞</div>
    <h1>您的內在城堡</h1>
    <div class="cv3-phase-info">
      <span class="cv3-dot"></span>
      <span id="cv3-solar-term">節氣載入中⋯⋯</span>
      <span style="color:var(--cv3-ink-lite)">·</span>
      <span id="cv3-day-phase">時辰載入中⋯⋯</span>
    </div>
  </section>

  <!-- Lord 面板 -->
  <section class="cv3-lord-card">
    <div class="cv3-lord-avatar" id="cv3-lord-avatar">🔑</div>
    <div class="cv3-lord-info">
      <div class="cv3-lord-title" id="cv3-lord-title">城堡訪客</div>
      <div class="cv3-lord-meta">
        Lv.<span id="cv3-lord-lv">1</span>
        · <span id="cv3-lord-xp">0</span> / <span id="cv3-lord-xp-next">100</span> XP

      <div class="cv3-lord-xpbar"><div class="cv3-lord-xpbar-fill" id="cv3-lord-xp-fill" style="width:0%"></div></div>

      <div class="cv3-lord-stat"><strong id="cv3-points">0</strong>靈感點</div>

  <!-- 12 房間卡片 -->

    </div>
  </section>

  <!-- 今日任務 + 點數兌換所 -->
  <section class="cv3-sidebar">
    <div class="cv3-card">
      <div class="cv3-card-title">📜 今日任務（完成獲得經驗 + 靈感點）</div>

  <div class="cv3-footer">
    內在城堡 v3.0 · 馥靈之鑰 Hour Light © 2026
  </div>

</main>

<!-- 房間進入彈窗 -->

<!-- 城堡 v3 核心邏輯 -->
<script src="assets/js/hl-castle-v3.js"></script>

<script>
// ═══════════════════════════════════════
// castle-hub.html 專屬頁面邏輯
// ═══════════════════════════════════════
(function(){
  'use strict';

  var V3 = window.HLCastleV3;
  if (!V3) { console.error('hl-castle-v3.js 未載入'); return; }

  var state = {
    uid: null,
    save: null,      // Firestore castle_save/state
    rooms: V3.ROOMS,
    moods: {},       // 今日僕人心情
    quests: [],      // 今日任務
  };

  function toast(msg, ms){
    var el = document.getElementById('cv3-toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function(){ el.classList.remove('show'); }, ms || 3000);
  }
  window.cv3Toast = toast;

  // ── 時辰 + 節氣 ──
  function renderTimeContext(){
    var phase = V3.getDayPhase();
    var term = V3.getCurrentSolarTerm();
    document.getElementById('cv3-solar-term').textContent = term.name;
    document.getElementById('cv3-day-phase').textContent = phase.name + ' · ' + phase.mood;
    document.body.classList.add('cv3-phase-' + phase.id);
  }

  // ── 金色塵埃漂浮粒子（15 顆隨機位置隨機延遲）──
  function spawnParticles(){
    var container = document.getElementById('cv3-particles');
    if (!container) return;
    for (var i = 0; i < 15; i++) {
      var p = document.createElement('div');
      p.className = 'cv3-particle';
      p.style.left = (Math.random() * 100) + '%';
      p.style.animationDelay = (Math.random() * 14) + 's';
      p.style.animationDuration = (10 + Math.random() * 8) + 's';
      var size = 4 + Math.random() * 6;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      container.appendChild(p);
    }
  }

  // ── Lord 面板 ──
  function renderLord(){
    var lv = (state.save && state.save.cv3_lord_lv) || 1;
    var xp = (state.save && state.save.cv3_lord_xp) || 0;
    var xpNext = V3.lordXpToNextLv(lv) || 1;
    document.getElementById('cv3-lord-title').textContent = V3.lordTitle(lv);
    document.getElementById('cv3-lord-lv').textContent = lv;
    document.getElementById('cv3-lord-xp').textContent = xp;
    document.getElementById('cv3-lord-xp-next').textContent = xpNext;
    var pct = Math.min(100, Math.floor(xp / xpNext * 100));
    document.getElementById('cv3-lord-xp-fill').style.width = pct + '%';

    // 統計
    var points = (state.save && state.save.points) || 0;
    var materials = 0, furniture = 0;
    try {
      var mat = JSON.parse(localStorage.getItem('hl_materials_v1') || '{}');
      if (mat.inventory) Object.values(mat.inventory).forEach(function(n){ materials += n; });
      if (mat.furniture) furniture = mat.furniture.length;
    } catch(e) {}
    document.getElementById('cv3-points').textContent = points.toLocaleString();
    document.getElementById('cv3-materials').textContent = materials.toLocaleString();
    document.getElementById('cv3-furniture').textContent = furniture;
  }

  // ── 12 房間卡片 ──
  function renderRooms(){
    var grid = document.getElementById('cv3-rooms-grid');
    var html = '';
    state.rooms.forEach(function(room){
      var lv = (state.save && state.save.cv3_room_lv && state.save.cv3_room_lv[room.id]) || 1;
      var mood = state.moods[room.id] || 'calm';
      var moodDef = V3.SERVANT_MOODS.find(function(m){ return m.id === mood; });
      var moodName = moodDef ? moodDef.name : '平靜';
      var tool = room.tools && room.tools[0] ? room.tools[0] : '#';

      var imgPath = 'images/castle/room-' + room.id + '.png';
      html += '<div class="cv3-room-card" data-room-id="' + room.id + '" onclick="cv3EnterRoom(\'' + room.id + '\')">' +
        '<div class="cv3-room-head">' +
          '<span class="cv3-room-emoji">' + room.emoji + '</span>' +
          '<div>' +
            '<div class="cv3-room-name">' + room.name + '</div>' +
            '<div class="cv3-room-zone">' + room.zone + ' 區</div>' +
          '</div>' +
        '</div>' +
        '<div class="cv3-room-desc">' + room.desc + '</div>' +
        '<div class="cv3-room-footer">' +
          '<span class="cv3-room-lv">Lv.' + lv + '</span>' +
          '<span class="cv3-room-mood ' + mood + '">僕人' + moodName + '</span>' +
        '</div>' +
      '</div>';
    });
    grid.innerHTML = html;

    // 預先探測每張房間圖片，載入成功才顯示背景（避免 404 圖顯示裂圖）
    state.rooms.forEach(function(room){
      var card = grid.querySelector('[data-room-id="' + room.id + '"]');
      if (!card) return;
      var testImg = new Image();
      testImg.onload = function(){
        card.style.setProperty('background-image', 'none');
        card.style.setProperty('--cv3-room-bg-ready', '1');
        card.setAttribute('data-img-loaded', 'true');
        var bgSrc = 'images/castle/room-' + room.id + '.png';
        // 透過偽元素 ::after 顯示
        var styleTag = document.getElementById('cv3-room-bg-' + room.id);
        if (!styleTag) {
          styleTag = document.createElement('style');
          styleTag.id = 'cv3-room-bg-' + room.id;
          document.head.appendChild(styleTag);
        }
        styleTag.textContent = '.cv3-room-card[data-room-id="' + room.id + '"]::after{background-image:url("' + bgSrc + '")}';
      };
      testImg.src = 'images/castle/room-' + room.id + '.png';
    });
  }

  // ── 進入房間 — 顯示今日事件 tease 後跳工具頁 ──
  window.cv3EnterRoom = function(roomId){
    var room = V3.getRoom(roomId);
    if (!room || !room.tools || !room.tools[0]) { toast('這個房間還在建造中⋯⋯'); return; }
    // 取今日事件（依 uid + 日期 + roomId 做 seed，同一天同一房間事件固定）
    var lv = (state.save && state.save.cv3_room_lv && state.save.cv3_room_lv[roomId]) || 1;
    var today = new Date().toISOString().slice(0, 10);
    var seedStr = (state.uid || 'guest') + today + roomId;
    var ev = V3.pickTodayRoomEvent ? V3.pickTodayRoomEvent(roomId, lv, seedStr) : null;
    if (ev && ev.text) {
      toast(room.emoji + ' ' + room.name + '\n\n' + ev.text, 4000);
      setTimeout(function(){ location.href = room.tools[0]; }, 3500);
    } else {
      toast('進入 ' + room.name + '⋯⋯', 1500);
      setTimeout(function(){ location.href = room.tools[0]; }, 800);
    }
  };

  // ── 今日任務 ──
  function renderDailyQuests(){
    var wrap = document.getElementById('cv3-daily-quests');
    var today = new Date().toISOString().slice(0, 10);
    var quests = (state.save && state.save.cv3_quests_daily && state.save.cv3_quests_daily[today])
      || V3.pickDailyQuests(today + (state.uid || 'guest'), 3);
    state.quests = quests;

    var html = '';
    quests.forEach(function(q){
      var cls = q.done ? 'cv3-quest-done' : '';
      html += '<div class="cv3-quest-item ' + cls + '">' +
        '<div class="cv3-quest-text">' + q.text + '</div>' +
        '<div style="text-align:right">' +
          '<div class="cv3-quest-progress">' + q.progress + '/' + q.target + '</div>' +
          '<div class="cv3-quest-reward">+' + q.reward.xp + 'xp · +' + q.reward.points + '點</div>' +
        '</div>' +
      '</div>';
    });
    wrap.innerHTML = html;
  }

  // ── 材料兌換 ──
  window.cv3ExchangeMaterial = function(tier){
    var def = V3.MATERIAL_EXCHANGE[tier];
    if (!def) return;
    var points = (state.save && state.save.points) || 0;
    if (points < def.cost) {
      toast('靈感點不足（需要 ' + def.cost + ' 點）');
      return;
    }
    // TODO Phase 2: 實作真正扣點 + 加材料 + 每日上限檢查
    toast('兌換功能即將開放⋯⋯（Phase 2）');
  };

  // ── 初始化 ──
  async function init(){
    renderTimeContext();
    spawnParticles();

    // 等 Firebase Auth
    if (!window.firebase || !firebase.auth) {
      renderLord(); renderRooms(); renderDailyQuests();
      return;
    }

    firebase.auth().onAuthStateChanged(async function(user){
      if (user) {
        state.uid = user.uid;
        try {
          var doc = await firebase.firestore().collection('users').doc(user.uid)
            .collection('castle_save').doc('state').get();
          if (doc.exists) state.save = doc.data();
        } catch(e) { console.warn('讀取 castle_save 失敗：', e.message); }
      }

      // 用 uid + 今日 作為 seed 決定僕人心情
      var seedStr = (state.uid || 'guest') + new Date().toISOString().slice(0, 10);
      state.moods = V3.rollDailyMoods(seedStr);

      renderLord();
      renderRooms();
      renderDailyQuests();
    });
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>

</body>
</html>
