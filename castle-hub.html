/* ═══════════════════════════════════════
   castle-hub.html 專用樣式 — cv3- 前綴避免 CSS 衝突
   ═══════════════════════════════════════ */
:root{
  --cv3-bg: #faf7f2;
  --cv3-bg-alt: #f1ead9;
  --cv3-ink: #2a1f4c;
  --cv3-ink-soft: #4a3f6c;
  --cv3-ink-lite: #8a7fa0;
  --cv3-gold: #b8922a;
  --cv3-gold-lt: #e9c27d;
  --cv3-gold-dk: #8a6d1f;
  --cv3-purple: #a07cdc;
  --cv3-purple-lt: #d6a7c7;
  --cv3-warm: #7a6068;
  --cv3-line: rgba(184,146,42,.2);
  --cv3-line-soft: rgba(0,0,0,.06);
  --cv3-serif: 'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif;
  --cv3-sans: 'Noto Serif TC','PingFang TC','Microsoft JhengHei',sans-serif;
  --cv3-ease: cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body.cv3-body{font-family:var(--cv3-sans);color:var(--cv3-ink);background:var(--cv3-bg);-webkit-font-smoothing:antialiased;overflow-x:hidden;line-height:1.8}
a{color:var(--cv3-gold-dk);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ── 時辰視覺主題 ── */
body.cv3-phase-dawn{background:linear-gradient(180deg,#fef4e6 0%,#fbebd4 40%,#faf7f2 100%)}
body.cv3-phase-dawn::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 60% 25%,rgba(255,210,140,.35),transparent 60%);pointer-events:none;z-index:0}
body.cv3-phase-day{background:linear-gradient(180deg,#faf9f0,#f5f2ea)}
body.cv3-phase-dusk{background:linear-gradient(180deg,#ffe8d6 0%,#fdd5b8 45%,#fae0c9 100%)}
body.cv3-phase-dusk::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 70% 70%,rgba(255,150,100,.35),transparent 55%);pointer-events:none;z-index:0}
body.cv3-phase-night{background:linear-gradient(180deg,#1f1c3e 0%,#2a2752 50%,#3a3569 100%);color:#f0ecf5}
body.cv3-phase-night .cv3-card{background:rgba(255,255,255,.08);color:#f0ecf5;border-color:rgba(255,255,255,.12)}
body.cv3-phase-midnight{background:linear-gradient(180deg,#0e0b24 0%,#1f1c3e 55%,#2d2755 100%);color:#e8e2f0}
body.cv3-phase-midnight .cv3-card{background:rgba(255,255,255,.06);color:#e8e2f0;border-color:rgba(255,255,255,.1)}

/* ── 夜晚/深夜：星點漂浮背景 ── */
body.cv3-phase-night::before, body.cv3-phase-midnight::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,.8), transparent),
    radial-gradient(1px 1px at 45% 50%, rgba(248,223,165,.6), transparent),
    radial-gradient(1.5px 1.5px at 75% 15%, rgba(255,255,255,.9), transparent),
    radial-gradient(1px 1px at 85% 70%, rgba(248,223,165,.6), transparent),
    radial-gradient(1px 1px at 25% 80%, rgba(255,255,255,.6), transparent),
    radial-gradient(1.5px 1.5px at 55% 35%, rgba(255,255,255,.7), transparent);
  background-repeat:no-repeat;background-size:100% 100%;
  animation:cv3Twinkle 6s ease-in-out infinite;
}
@keyframes cv3Twinkle{0%,100%{opacity:.7}50%{opacity:1}}

/* ── 浮動粒子（所有時辰都有，金色塵埃）── */
.cv3-particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.cv3-particle{position:absolute;width:6px;height:6px;border-radius:50%;
  background:radial-gradient(circle,rgba(248,223,165,.6) 0%,rgba(248,223,165,0) 70%);
  opacity:0;animation:cv3Float 14s linear infinite}
@keyframes cv3Float{
  0%{transform:translate(0,100vh) scale(.3);opacity:0}
  10%{opacity:.5}
  50%{opacity:.8}
  90%{opacity:.4}
  100%{transform:translate(40px,-10vh) scale(1);opacity:0}
}

/* ── 讓所有主要內容 z-index > 0 浮在粒子上 ── */
main{position:relative;z-index:1}

/* ── 頂部 Hero ── */
.cv3-hero{max-width:1200px;margin:0 auto;padding:56px 20px 32px;text-align:center;position:relative}
.cv3-eyebrow{font-size:.8rem;color:var(--cv3-gold);letter-spacing:.45em;text-transform:uppercase;margin-bottom:12px}
.cv3-hero h1{font-family:var(--cv3-serif);font-size:clamp(1.8rem,4.2vw,2.6rem);font-weight:500;letter-spacing:.14em;line-height:1.5;margin-bottom:12px}
.cv3-phase-info{display:inline-flex;align-items:center;gap:10px;padding:8px 20px;border-radius:999px;background:rgba(233,194,125,.12);font-size:.85rem;color:var(--cv3-gold-dk);margin:10px 0}
.cv3-phase-info .cv3-dot{width:8px;height:8px;border-radius:50%;background:var(--cv3-gold)}

/* ── Lord 面板（用戶狀態卡）── */
.cv3-lord-card{max-width:880px;margin:16px auto;padding:24px 28px;background:#fff;border:1px solid var(--cv3-line);border-radius:20px;display:grid;grid-template-columns:auto 1fr auto;gap:22px;align-items:center;box-shadow:0 6px 24px rgba(184,146,42,.08)}
.cv3-lord-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--cv3-gold-lt),var(--cv3-purple-lt));display:flex;align-items:center;justify-content:center;font-size:1.8rem}
.cv3-lord-info .cv3-lord-title{font-family:var(--cv3-serif);font-size:1.15rem;font-weight:500;color:var(--cv3-ink)}
.cv3-lord-info .cv3-lord-meta{font-size:.82rem;color:var(--cv3-ink-lite);margin-top:2px}
.cv3-lord-xpbar{width:100%;height:6px;background:var(--cv3-line-soft);border-radius:3px;margin-top:8px;overflow:hidden}
.cv3-lord-xpbar-fill{height:100%;background:linear-gradient(90deg,var(--cv3-gold),var(--cv3-gold-lt));transition:width .6s var(--cv3-ease)}
.cv3-lord-stats{display:flex;gap:18px;text-align:center}
.cv3-lord-stat{font-size:.75rem;color:var(--cv3-ink-lite)}
.cv3-lord-stat strong{display:block;font-family:var(--cv3-serif);font-size:1.15rem;color:var(--cv3-gold-dk);margin-bottom:2px}

/* ── 城堡地圖區（等圖到位替換）── */
.cv3-map-wrap{max-width:1200px;margin:24px auto;padding:0 20px}
.cv3-map-container{position:relative;background:linear-gradient(135deg,#f7f0e0,#ece1c9);border:1px solid var(--cv3-line);border-radius:24px;padding:40px 30px;min-height:400px;overflow:hidden}
.cv3-map-placeholder{text-align:center;padding:80px 20px;color:var(--cv3-ink-lite);font-size:.85rem;line-height:2}
.cv3-map-placeholder-emoji{font-size:4rem;margin-bottom:18px;display:block;filter:grayscale(.3)}

/* ── 房間網格（美術圖到位前作為主顯示）── */
.cv3-rooms-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px;margin-top:24px}
.cv3-room-card{background:#fff;border:1px solid var(--cv3-line);border-radius:16px;padding:22px 20px;cursor:pointer;transition:all .3s var(--cv3-ease);position:relative;overflow:hidden;min-height:220px;display:flex;flex-direction:column;justify-content:space-between}
.cv3-room-card::after{content:'';position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity .5s var(--cv3-ease);z-index:0;border-radius:16px}
.cv3-room-card[data-img-loaded="true"]::after{opacity:.22}
.cv3-room-card:hover::after{opacity:.42}
.cv3-room-card > *{position:relative;z-index:1}
.cv3-room-card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(184,146,42,.22);border-color:var(--cv3-gold)}
.cv3-room-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--cv3-gold);z-index:2}
.cv3-room-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.cv3-room-emoji{font-size:2rem;line-height:1}
.cv3-room-name{font-family:var(--cv3-serif);font-size:1.05rem;font-weight:500;color:var(--cv3-ink)}
.cv3-room-zone{font-size:.7rem;color:var(--cv3-ink-lite);letter-spacing:.1em;margin-top:2px}
.cv3-room-desc{font-size:.82rem;color:var(--cv3-ink-soft);line-height:1.9;margin-bottom:14px}
.cv3-room-footer{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--cv3-line-soft);font-size:.75rem;color:var(--cv3-ink-lite)}
.cv3-room-lv{font-family:var(--cv3-serif);color:var(--cv3-gold-dk);font-weight:500}
.cv3-room-mood{font-size:.7rem;padding:3px 10px;border-radius:999px;background:var(--cv3-bg-alt);color:var(--cv3-warm)}
.cv3-room-mood.bright{background:#fff3d6;color:#b8922a}
.cv3-room-mood.calm{background:#e8efe6;color:#4a7a4a}
.cv3-room-mood.pensive{background:#e0d8ec;color:#6d5daa}
.cv3-room-mood.playful{background:#ffe0e8;color:#c9567a}
.cv3-room-mood.melancholy{background:#d8dee8;color:#5a6478}

/* ── 側邊任務面板 ── */
.cv3-sidebar{max-width:1200px;margin:32px auto;padding:0 20px;display:grid;grid-template-columns:1fr 1fr;gap:22px}
@media(max-width:768px){.cv3-sidebar{grid-template-columns:1fr}}
.cv3-card{background:#fff;border:1px solid var(--cv3-line);border-radius:16px;padding:24px 22px}
.cv3-card-title{font-family:var(--cv3-serif);font-size:1rem;font-weight:500;color:var(--cv3-ink);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--cv3-line-soft);letter-spacing:.08em}
.cv3-quest-item{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 0;border-bottom:1px dashed var(--cv3-line-soft);font-size:.88rem}
.cv3-quest-item:last-child{border-bottom:none}
.cv3-quest-text{flex:1;color:var(--cv3-ink-soft);line-height:1.7}
.cv3-quest-progress{font-size:.75rem;color:var(--cv3-gold-dk);white-space:nowrap}
.cv3-quest-reward{font-size:.75rem;color:var(--cv3-ink-lite)}
.cv3-quest-done{opacity:.5;text-decoration:line-through}

/* ── 兌換所 ── */
.cv3-exchange{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
@media(max-width:480px){.cv3-exchange{grid-template-columns:1fr}}
.cv3-ex-btn{padding:12px 10px;border:1px solid var(--cv3-line);border-radius:10px;background:#fff;text-align:center;cursor:pointer;transition:all .2s var(--cv3-ease)}
.cv3-ex-btn:hover{border-color:var(--cv3-gold);background:rgba(233,194,125,.06)}
.cv3-ex-btn .cv3-ex-cost{font-family:var(--cv3-serif);font-size:1rem;color:var(--cv3-gold-dk);font-weight:500;display:block}
.cv3-ex-btn .cv3-ex-label{font-size:.72rem;color:var(--cv3-ink-lite);margin-top:2px}

/* ── Toast ── */
.cv3-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(42,31,76,.95);color:var(--cv3-gold-lt);padding:18px 32px;border-radius:14px;font-size:1rem;line-height:1.6;text-align:center;z-index:9999;display:none;max-width:min(88vw,420px);box-shadow:0 10px 40px rgba(42,31,76,.3);white-space:pre-line}
.cv3-toast.show{display:block;animation:cv3Up .25s ease}
@keyframes cv3Up{from{opacity:0;transform:translate(-50%,-48%)}to{opacity:1;transform:translate(-50%,-50%)}}

/* ── 房間詳情 Modal ── */
.cv3-modal{position:fixed;inset:0;background:rgba(42,31,76,.85);z-index:10000;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px)}
.cv3-modal.show{display:flex;animation:cv3FadeIn .25s ease}
@keyframes cv3FadeIn{from{opacity:0}to{opacity:1}}
.cv3-modal-card{background:#fff;border-radius:20px;padding:28px 26px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);position:relative}
.cv3-modal-close{position:absolute;top:14px;right:16px;background:var(--cv3-line-soft);border:none;width:32px;height:32px;border-radius:50%;font-size:1.2rem;cursor:pointer;color:var(--cv3-ink-soft)}
.cv3-modal-head{display:flex;align-items:center;gap:14px;padding-bottom:16px;border-bottom:1px solid var(--cv3-line-soft);margin-bottom:18px}
.cv3-modal-emoji{font-size:2.4rem}
.cv3-modal-title{font-family:var(--cv3-serif);font-size:1.3rem;font-weight:500;color:var(--cv3-ink)}
.cv3-modal-zone{font-size:.78rem;color:var(--cv3-ink-lite);letter-spacing:.08em;margin-top:2px}
.cv3-modal-section{margin-bottom:18px}
.cv3-modal-section-title{font-size:.78rem;color:var(--cv3-warm);letter-spacing:.1em;margin-bottom:8px;font-weight:500}
.cv3-modal-event{padding:14px 16px;background:linear-gradient(135deg,rgba(233,194,125,.08),rgba(160,124,220,.06));border-left:3px solid var(--cv3-gold);border-radius:10px;font-size:.92rem;color:var(--cv3-ink-soft);line-height:1.9;margin-bottom:10px;font-family:var(--cv3-serif)}
.cv3-modal-lv-bar{background:var(--cv3-line-soft);border-radius:4px;height:8px;overflow:hidden;margin:8px 0}
.cv3-modal-lv-fill{height:100%;background:linear-gradient(90deg,var(--cv3-gold),var(--cv3-gold-lt));transition:width .6s var(--cv3-ease)}
.cv3-modal-cost{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px}
.cv3-modal-cost-item{text-align:center;padding:10px 6px;background:var(--cv3-bg-alt);border-radius:10px;font-size:.82rem}
.cv3-modal-cost-item strong{display:block;font-family:var(--cv3-serif);font-size:1.05rem;color:var(--cv3-gold-dk);margin-bottom:2px}
.cv3-modal-actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.cv3-modal-btn{flex:1;min-width:140px;padding:12px 18px;border-radius:10px;font-size:.92rem;font-weight:500;cursor:pointer;transition:all .2s var(--cv3-ease);letter-spacing:.04em;font-family:inherit;border:none}
.cv3-modal-btn-gold{background:linear-gradient(135deg,var(--cv3-gold),var(--cv3-gold-lt));color:#fff}
.cv3-modal-btn-outline{background:transparent;border:1.5px solid var(--cv3-gold);color:var(--cv3-gold-dk)}
.cv3-modal-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(184,146,42,.25)}
.cv3-modal-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

/* ── 房間進入彈窗 ── */
.cv3-room-modal-overlay{position:fixed;inset:0;background:rgba(10,6,24,.55);z-index:800;display:none;align-items:center;justify-content:center;padding:20px}
.cv3-room-modal-overlay.show{display:flex;animation:cv3FadeIn .22s ease}
@keyframes cv3FadeIn{from{opacity:0}to{opacity:1}}
.cv3-room-modal{background:#fff;border-radius:24px;padding:30px 26px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(42,31,76,.25);position:relative;animation:cv3ModalUp .28s cubic-bezier(.34,1.56,.64,1)}
@keyframes cv3ModalUp{from{opacity:0;transform:translateY(18px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.cv3-room-modal-close{position:absolute;top:14px;right:16px;font-size:1.3rem;color:var(--cv3-ink-lite);cursor:pointer;line-height:1;padding:4px}
.cv3-room-modal-close:hover{color:var(--cv3-ink)}
.cv3-room-modal-head{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.cv3-room-modal-icon{font-size:2.6rem;line-height:1}
.cv3-room-modal-title{font-family:var(--cv3-serif);font-size:1.2rem;font-weight:500;color:var(--cv3-ink)}
.cv3-room-modal-zone{font-size:.72rem;color:var(--cv3-gold);letter-spacing:.1em;margin-top:2px}
.cv3-room-modal-event{background:var(--cv3-bg-alt);border-radius:12px;padding:14px 16px;font-size:.85rem;color:var(--cv3-ink-soft);line-height:1.85;margin-bottom:14px;border-left:3px solid var(--cv3-gold-lt)}
.cv3-room-modal-mood{display:inline-flex;align-items:center;gap:6px;font-size:.76rem;color:var(--cv3-warm);margin-bottom:18px}
.cv3-room-modal-tools{display:flex;flex-direction:column;gap:8px;margin-bottom:6px}
.cv3-room-modal-tool-btn{display:flex;align-items:center;gap:10px;padding:11px 14px;border:1.5px solid var(--cv3-line);border-radius:12px;background:#fff;cursor:pointer;transition:all .2s var(--cv3-ease);text-align:left;font-size:.85rem;color:var(--cv3-ink-soft);text-decoration:none}
.cv3-room-modal-tool-btn:hover{border-color:var(--cv3-gold);background:rgba(233,194,125,.06);color:var(--cv3-ink)}
.cv3-room-modal-tool-btn .cv3-tool-arrow{margin-left:auto;color:var(--cv3-gold-lt);font-size:.8rem}

/* ── 兌換獎勵彈窗 ── */
.cv3-ex-reward-overlay{position:fixed;inset:0;background:rgba(10,6,24,.45);z-index:900;display:none;align-items:center;justify-content:center}
.cv3-ex-reward-overlay.show{display:flex;animation:cv3FadeIn .2s ease}
.cv3-ex-reward-popup{background:#fff8f0;border:2px solid rgba(200,134,42,.3);border-radius:22px;padding:30px 26px;text-align:center;min-width:240px;max-width:min(88vw,320px);box-shadow:0 16px 48px rgba(42,31,76,.2);animation:cv3ModalUp .28s cubic-bezier(.34,1.56,.64,1)}
.cv3-ex-reward-icon{font-size:3rem;display:block;margin-bottom:10px}
.cv3-ex-reward-name{font-family:var(--cv3-serif);font-size:1.1rem;color:var(--cv3-ink);font-weight:500;margin-bottom:4px}
.cv3-ex-reward-sub{font-size:.8rem;color:var(--cv3-ink-lite);margin-bottom:18px}
.cv3-ex-reward-close{padding:9px 24px;background:linear-gradient(135deg,#c8862a,#e8b86d);color:#fff;border:none;border-radius:20px;cursor:pointer;font-size:.86rem;font-family:inherit}

/* ── Footer ── */
.cv3-footer{text-align:center;padding:40px 20px 30px;color:var(--cv3-ink-lite);font-size:.78rem;letter-spacing:.05em}

<body class="cv3-body">

<!-- 金色塵埃漂浮粒子（JS 動態生成） -->
<div class="cv3-particles" id="cv3-particles"></div>

<main>

  <!-- Hero -->
  <section class="cv3-hero">
    <div class="cv3-eyebrow">Castle Hub · 全站中樞</div>
    <h1>您的內在城堡</h1>
    <div class="cv3-phase-info">
      <span class="cv3-dot"></span>
      <span id="cv3-solar-term">節氣載入中⋯⋯</span>
      <span style="color:var(--cv3-ink-lite)">·</span>
      <span id="cv3-day-phase">時辰載入中⋯⋯</span>
    </div>
  </section>

  <!-- Lord 面板 -->
  <section class="cv3-lord-card">
    <div class="cv3-lord-avatar" id="cv3-lord-avatar">🔑</div>
    <div class="cv3-lord-info">
      <div class="cv3-lord-title" id="cv3-lord-title">城堡訪客</div>
      <div class="cv3-lord-meta">

        · <span id="cv3-lord-xp">0</span> / <span id="cv3-lord-xp-next">100</span> XP
      </div>
      <div class="cv3-lord-xpbar"><div class="cv3-lord-xpbar-fill" id="cv3-lord-xp-fill" style="width:0%"></div></div>
    </div>

<script>
// ═══════════════════════════════════════
// castle-hub.html 專屬頁面邏輯 v3.1
// ═══════════════════════════════════════
(function(){
  'use strict';

  var V3 = window.HLCastleV3;
  if (!V3) { console.error('hl-castle-v3.js 未載入'); return; }

  var TODAY = new Date().toISOString().slice(0, 10);

  var state = {
    uid: null,
    save: null,
    rooms: V3.ROOMS,
    moods: {},
    quests: [],
  };

  // ── localStorage helpers ──
  function lsGet(key){ try { return JSON.parse(localStorage.getItem(key) || 'null'); } catch(e){ return null; } }
  function lsSet(key, val){ try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){} }

  // ── 靈感點（hl_castle_v3.points）──
  function getPoints(){
    var d = lsGet('hl_castle_v3') || {};
    return d.points || 0;
  }
  function addPoints(n){
    var d = lsGet('hl_castle_v3') || {};
    d.points = Math.max(0, (d.points || 0) + n);
    lsSet('hl_castle_v3', d);
    document.getElementById('cv3-points').textContent = d.points.toLocaleString();
  }

  // ── 材料庫（hl_materials_v1.inventory）──
  function addMaterial(matId){
    var d = lsGet('hl_materials_v1') || {};
    if (!d.inventory) d.inventory = {};
    d.inventory[matId] = (d.inventory[matId] || 0) + 1;
    lsSet('hl_materials_v1', d);
    var total = 0;
    Object.keys(d.inventory).forEach(function(k){ total += d.inventory[k]; });
    document.getElementById('cv3-materials').textContent = total.toLocaleString();
  }

  // ── 每日兌換計數（hl_castle_exchange）──
  function getExData(){
    var d = lsGet('hl_castle_exchange') || {};
    if (d.date !== TODAY) d = { date: TODAY, common:0, rare:0, legendary:0 };
    return d;
  }
  function saveExData(d){ lsSet('hl_castle_exchange', d); }

  // ── 可兌換材料池 ──
  var EX_MATS = {
    common: [
      { id:'star_shard',      name:'星辰碎片',   icon:'✨' },
      { id:'insight_feather', name:'洞見羽毛',   icon:'🪶' },
      { id:'emotion_color',   name:'情緒色彩',   icon:'🎨' },
      { id:'moonlight_shard', name:'月光碎片',   icon:'🌙' },
      { id:'chart_ink',       name:'命盤墨跡',   icon:'📜' },
      { id:'hexagram_mark',   name:'卦象印記',   icon:'☯️' },
      { id:'vision_shadow',   name:'靈視殘影',   icon:'🌫️' },
    ],
    rare: [
      { id:'mirror_truth',    name:'鏡中真相',   icon:'🪞' },
      { id:'wuxing_crystal',  name:'五行晶石',   icon:'🔮' },
      { id:'time_fragment',   name:'時辰碎片',   icon:'⏳' },
      { id:'oil_spirit',      name:'玫瑰精魄',   icon:'🌿' },
      { id:'dawn_dew',        name:'薰衣草晨露', icon:'💧' },
      { id:'honest_mirror',   name:'誠實碎鏡',   icon:'🔑' },
      { id:'psyche_crystal',  name:'心靈水晶',   icon:'💎' },
    ],
    legendary: [
      { id:'destiny_core',    name:'天命核心',   icon:'🌌' },
      { id:'awareness_seal',  name:'覺察印記',   icon:'✴️' },
      { id:'oracle_essence',  name:'沒藥精髓',   icon:'🔯' },
      { id:'castle_key_core', name:'城堡鑰芯',   icon:'🗝️' },
    ],
  };
  function pickMat(tier){
    var pool = EX_MATS[tier] || EX_MATS.common;
    return pool[Math.floor(Math.random() * pool.length)];
  }

  // ── Toast ──
  function toast(msg, ms){
    var el = document.getElementById('cv3-toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function(){ el.classList.remove('show'); }, ms || 3000);
  }
  window.cv3Toast = toast;

  // ── 時辰 + 節氣 ──
  function renderTimeContext(){
    var phase = V3.getDayPhase();
    var term = V3.getCurrentSolarTerm();
    document.getElementById('cv3-solar-term').textContent = term.name;
    document.getElementById('cv3-day-phase').textContent = phase.name + ' · ' + phase.mood;
    document.body.classList.add('cv3-phase-' + phase.id);
  }

  // ── 金色塵埃漂浮粒子 ──
  function spawnParticles(){
    var container = document.getElementById('cv3-particles');
    if (!container) return;
    for (var i = 0; i < 15; i++) {
      var p = document.createElement('div');
      p.className = 'cv3-particle';
      p.style.left = (Math.random() * 100) + '%';
      p.style.animationDelay = (Math.random() * 14) + 's';
      p.style.animationDuration = (10 + Math.random() * 8) + 's';
      var size = 4 + Math.random() * 6;
      p.style.width = size + 'px'; p.style.height = size + 'px';
      container.appendChild(p);
    }
  }

  // ── Lord 面板（從 localStorage 讀取實際靈感點）──
  function renderLord(){
    var castleData = lsGet('hl_castle_v3') || {};
    var lv = (state.save && state.save.cv3_lord_lv) || castleData.level || 1;
    var xp = (state.save && state.save.cv3_lord_xp) || castleData.xp || 0;
    var xpNext = V3.lordXpToNextLv(lv) || 1;
    document.getElementById('cv3-lord-title').textContent = V3.lordTitle(lv);
    document.getElementById('cv3-lord-lv').textContent = lv;
    document.getElementById('cv3-lord-xp').textContent = xp;
    document.getElementById('cv3-lord-xp-next').textContent = xpNext;
    document.getElementById('cv3-lord-xp-fill').style.width = Math.min(100, Math.floor(xp / xpNext * 100)) + '%';

    var points = getPoints() || (state.save && state.save.points) || 0;
    var materials = 0, furniture = 0;
    try {
      var mat = lsGet('hl_materials_v1') || {};
      if (mat.inventory) Object.keys(mat.inventory).forEach(function(k){ materials += mat.inventory[k]; });
      if (mat.furniture) furniture = mat.furniture.length;
    } catch(e) {}
    document.getElementById('cv3-points').textContent = points.toLocaleString();
    document.getElementById('cv3-materials').textContent = materials.toLocaleString();
    document.getElementById('cv3-furniture').textContent = furniture;
  }

  // ── 12 房間卡片 ──
  function renderRooms(){
    var grid = document.getElementById('cv3-rooms-grid');
    var dailyData = lsGet('hl_castle_daily') || {};
    var todayRooms = dailyData[TODAY] || {};
    var html = '';
    state.rooms.forEach(function(room){
      var lv = (state.save && state.save.cv3_room_lv && state.save.cv3_room_lv[room.id]) || 1;
      var mood = state.moods[room.id] || 'calm';
      var moodDef = V3.SERVANT_MOODS.find(function(m){ return m.id === mood; });
      var moodName = moodDef ? moodDef.name : '平靜';
      var slug = 'castle-room-' + room.id;
      var visited = todayRooms[slug] && todayRooms[slug].started;
      var questDone = todayRooms[slug] && todayRooms[slug].claimed;
      html += '<div class="cv3-room-card" data-room-id="' + room.id + '" onclick="cv3EnterRoom(\'' + room.id + '\')">' +
        '<div class="cv3-room-head"><span class="cv3-room-emoji">' + room.emoji + '</span>' +
          '<div><div class="cv3-room-name">' + room.name + '</div>' +
          '<div class="cv3-room-zone">' + room.zone + ' 區' + (visited ? ' · 今日已訪' : '') + '</div></div></div>' +
        '<div class="cv3-room-desc">' + room.desc + '</div>' +
        '<div class="cv3-room-footer"><span class="cv3-room-lv">Lv.' + lv + '</span>' +
          '<span class="cv3-room-mood ' + mood + '">僕人' + moodName + '</span>' +
          (questDone ? '<span style="font-size:.68rem;color:#4a7a4a;padding:2px 8px;background:#e8f5e9;border-radius:6px">任務完成</span>' : '') +
        '</div></div>';
    });
    grid.innerHTML = html;
    // 探測房間圖片
    state.rooms.forEach(function(room){
      var card = grid.querySelector('[data-room-id="' + room.id + '"]');
      if (!card) return;
      var img = new Image();
      img.onload = function(){
        card.setAttribute('data-img-loaded', 'true');
        var st = document.getElementById('cv3-room-bg-' + room.id);
        if (!st){ st = document.createElement('style'); st.id='cv3-room-bg-'+room.id; document.head.appendChild(st); }
        st.textContent = '.cv3-room-card[data-room-id="' + room.id + '"]::after{background-image:url("images/castle/room-' + room.id + '.png")}';
      };
      img.src = 'images/castle/room-' + room.id + '.png';
    });
  }

  // ── 工具名稱對照 ──
  var TOOL_NAMES = {
    'draw-hl.html':'抽牌解讀','destiny-engine.html':'命運引擎 33合1','destiny-match.html':'合盤分析',
    'quiz-hub.html':'心理測驗中心','yijing-oracle.html':'易經占卜','angel-oracle.html':'天使卡',
    'tarot-draw.html':'塔羅牌','dream-decoder.html':'夢境解碼','mirror-oracle.html':'真實之鏡',
    'akashic-reading.html':'阿卡西解讀','past-life.html':'前世故事','name-oracle.html':'姓名占卜',
    'fortune-wealth.html':'財富分析','triangle-calculator.html':'三角秘碼',
    'chiron-lilith.html':'凱龍莉莉絲','quiz-shadow.html':'陰影覺察',
    'quiz-inner-child.html':'內在小孩','quiz-love-language.html':'愛之語測驗',
    'quiz-attachment.html':'依附型態','bazi.html':'八字排盤','ziwei.html':'紫微斗數',
    'massage-guide.html':'按摩指南','aroma-garden.html':'芳療共享園地',
    'knowledge-hub.html':'知識學苑','aromatherapy-science.html':'芳療科學',
    'blending-guide.html':'調香指南','witch-power.html':'女巫原力',
    'draw-family.html':'家族牌陣','draw-spa.html':'SPA牌陣','season-oracle.html':'季節神諭',
    'yuan-chen-reading.html':'元辰宮','quiz-family.html':'家族系統',
    'projection-cards.html':'投射卡','hour-training.html':'覺察師培訓',
    'course-slides/index.html':'課程投影片','birthday-gift.html':'生日月禮',
    'member-dashboard.html':'會員中心','abundance-prayer-pro.html':'豐盛祈禱文',
  };
  function toolName(href){ return TOOL_NAMES[href] || href.replace('.html','').replace('castle-room-',''); }

  // ── 房間進入彈窗 ──
  window.cv3EnterRoom = function(roomId){
    var room = V3.getRoom(roomId);
    if (!room) { toast('這個房間還在建造中⋯⋯'); return; }

    // 選今日事件（seed = uid + 日期 + roomId，固定一天）
    var events = V3.EVENT_POOL_SEEDS.filter(function(e){ return e.roomId === roomId; });
    var seedNum = 0;
    var seedStr = (state.uid || 'guest') + TODAY + roomId;
    for (var i=0; i<seedStr.length; i++) seedNum += seedStr.charCodeAt(i);
    var evt = events.length ? events[seedNum % events.length] : null;

    var mood = state.moods[roomId] || 'calm';
    var moodDef = V3.SERVANT_MOODS.find(function(m){ return m.id === mood; });
    var moodName = moodDef ? moodDef.name : '平靜';
    var moodBonus = moodDef && moodDef.xpBonus > 1 ? '　經驗 ×' + moodDef.xpBonus : '';

    document.getElementById('cv3-modal-icon').textContent = room.emoji;
    document.getElementById('cv3-modal-title').textContent = room.name;
    document.getElementById('cv3-modal-zone').textContent = room.zone + ' 區';
    document.getElementById('cv3-modal-event').textContent = evt ? evt.text : room.desc;
    document.getElementById('cv3-modal-mood').textContent = '僕人今日心情：' + moodName + moodBonus;

    var tools = room.tools || [];
    var toolsHtml = '';
    var max = Math.min(tools.length, 4);
    for (var t=0; t<max; t++){
      toolsHtml += '<a href="' + tools[t] + '" class="cv3-room-modal-tool-btn">' +
        '<span>' + toolName(tools[t]) + '</span>' +
        '<span class="cv3-tool-arrow">→</span></a>';
    }
    if (!toolsHtml) toolsHtml = '<div style="font-size:.82rem;color:var(--cv3-ink-lite)">探索工具建造中⋯⋯</div>';
    document.getElementById('cv3-modal-tools').innerHTML = toolsHtml;

    // ── 渲染房間等級升級區 ──
    cv3RenderRoomUpgrade(roomId);

    document.getElementById('cv3-room-modal-overlay').classList.add('show');

    // 造訪給 XP（今日每間限 1 次）
    var visitKey = 'cv3_visit_' + TODAY;
    var visited = lsGet(visitKey) || [];
    if (visited.indexOf(roomId) === -1){
      visited.push(roomId);
      lsSet(visitKey, visited);
      var cd = lsGet('hl_castle_v3') || {};
      cd.xp = (cd.xp || 0) + 5;
      lsSet('hl_castle_v3', cd);
    }
  };

  window.cv3CloseRoomModal = function(){
    document.getElementById('cv3-room-modal-overlay').classList.remove('show');
  };

  // ── 房間等級升級：渲染成本 + 狀態 ──
  var _currentModalRoomId = null;
  function cv3RenderRoomUpgrade(roomId){
    _currentModalRoomId = roomId;
    var castleData = lsGet('hl_castle_v3') || {};
    var roomLvs = castleData.cv3_room_lv || {};
    var currentLv = roomLvs[roomId] || 1;

    var lvDisplay = document.getElementById('cv3-modal-lv-display');
    var lvFill = document.getElementById('cv3-modal-lv-fill');
    var costEl = document.getElementById('cv3-modal-cost');
    var btn = document.getElementById('cv3-modal-upgrade-btn');
    var msgEl = document.getElementById('cv3-modal-upgrade-msg');

    lvDisplay.textContent = 'Lv.' + currentLv + ' / 99';
    lvFill.style.width = Math.min(100, currentLv) + '%';

    if (currentLv >= 99) {
      costEl.innerHTML = '<span style="color:var(--cv3-gold-dk,#8a6d1f)">✨ 房間已達滿級，無需升級</span>';
      btn.disabled = true;
      btn.style.opacity = '.4';
      btn.textContent = '已達 Lv.99 滿級';
      msgEl.textContent = '';
      return;
    }

    var cost = V3.roomUpgradeCost(currentLv);
    if (!cost) {
      costEl.textContent = '升級資料載入中⋯⋯';
      btn.disabled = true;
      return;
    }

    // 顯示成本
    var parts = [];
    if (cost.common) parts.push('Common 材料 × ' + cost.common);
    if (cost.rare) parts.push('Rare 材料 × ' + cost.rare);
    if (cost.legendary) parts.push('Legendary 材料 × ' + cost.legendary);
    costEl.innerHTML = '升到 Lv.' + (currentLv + 1) + ' 需要：<br>' + parts.join('｜');

    // 檢查庫存
    var mat = lsGet('hl_materials_v1') || { inventory: {} };
    var inv = mat.inventory || {};
    var commonHave = 0, rareHave = 0, legendaryHave = 0;
    // hl_materials_v1 的 inventory 是 { materialId: count }，不區分 tier
    // 這裡簡化：把所有材料當成 common 池（實際進階需再分 tier 歸類）
    Object.values(inv).forEach(function(n){ commonHave += (n || 0); });

    var canUpgrade = commonHave >= (cost.common || 0);
    btn.disabled = !canUpgrade;
    btn.style.opacity = canUpgrade ? '1' : '.5';
    btn.textContent = canUpgrade ? '✨ 升級這個房間' : '材料不足，去抽牌 / 做測驗蒐集';
    msgEl.innerHTML = canUpgrade
      ? '您目前有 <b style="color:var(--cv3-gold-dk,#8a6d1f)">' + commonHave + '</b> 個材料可用'
      : '您目前有 ' + commonHave + ' 個材料，還需要 ' + ((cost.common || 0) - commonHave) + ' 個';
  }

  // ── 執行升級 ──
  window.cv3UpgradeRoom = function(){
    var roomId = _currentModalRoomId;
    if (!roomId) return;
    var castleData = lsGet('hl_castle_v3') || {};
    var roomLvs = castleData.cv3_room_lv || {};
    var currentLv = roomLvs[roomId] || 1;
    if (currentLv >= 99) { toast('已達滿級'); return; }

    var cost = V3.roomUpgradeCost(currentLv);
    if (!cost) return;

    var mat = lsGet('hl_materials_v1') || { inventory: {} };
    var inv = mat.inventory || {};
    var total = Object.values(inv).reduce(function(a,b){ return a+(b||0); }, 0);

    if (total < (cost.common || 0)) {
      toast('材料不足，差 ' + ((cost.common || 0) - total) + ' 個', 2500);
      return;
    }

    // 扣除材料（從庫存中扣 cost.common 個）
    var toDeduct = cost.common || 0;
    var matKeys = Object.keys(inv);
    for (var i = 0; i < matKeys.length && toDeduct > 0; i++) {
      var k = matKeys[i];
      var take = Math.min(inv[k] || 0, toDeduct);
      inv[k] = (inv[k] || 0) - take;
      toDeduct -= take;
      if (inv[k] <= 0) delete inv[k];
    }
    mat.inventory = inv;
    lsSet('hl_materials_v1', mat);

    // 升級
    roomLvs[roomId] = currentLv + 1;
    castleData.cv3_room_lv = roomLvs;
    // 加城堡主 XP
    castleData.xp = (castleData.xp || 0) + (cost.xp_needed || 10);
    lsSet('hl_castle_v3', castleData);

    toast('✨ 升級成功！\n' + (V3.getRoom(roomId) || {name:''}).name + ' Lv.' + (currentLv + 1) + '\n+ ' + (cost.xp_needed || 10) + ' 城堡主經驗', 3500);

    // 重新渲染 modal + 房間卡
    cv3RenderRoomUpgrade(roomId);
    if (typeof renderRooms === 'function') renderRooms();
    if (typeof renderLord === 'function') renderLord();
  };
  document.addEventListener('DOMContentLoaded', function(){
    document.getElementById('cv3-room-modal-overlay').addEventListener('click', function(e){
      if (e.target === this) window.cv3CloseRoomModal();
    });
    document.getElementById('cv3-ex-reward-overlay').addEventListener('click', function(e){
      if (e.target === this) window.cv3CloseExReward();
    });
  });

  // ── 今日任務（從 hl_castle_daily + hl_castle_v3 讀取進度）──
  function renderDailyQuests(){
    var wrap = document.getElementById('cv3-daily-quests');
    var dailyData = lsGet('hl_castle_daily') || {};
    var todayRooms = dailyData[TODAY] || {};
    var roomsVisited = Object.keys(todayRooms).length;
    var questsClaimed = Object.keys(todayRooms).filter(function(k){ return todayRooms[k].claimed; }).length;
    var hiddenFound = Object.keys(todayRooms).filter(function(k){ return todayRooms[k].hiddenFound; }).length;

    var quests = V3.pickDailyQuests(TODAY + (state.uid || 'guest'), 3);
    state.quests = quests;

    var castleData = lsGet('hl_castle_v3') || {};
    var ds = (castleData.dailyStats && castleData.dailyStats[TODAY]) || {};
    var progressMap = {
      visit3rooms: Math.min(roomsVisited, 3),
      draw5cards:  Math.min(ds.draws || 0, 5),
      quiz1:       Math.min(ds.quizzes || 0, 1),
      destiny_run: Math.min(ds.destiny || 0, 1),
      furniture1:  Math.min(ds.furniture || 0, 1),
      event3:      Math.min(hiddenFound, 3),
      feed_pet:    Math.min(ds.pet_feed || 0, 1),
      share_castle:Math.min(ds.share || 0, 1),
    };

    var html = '';
    quests.forEach(function(q){
      var prog = progressMap[q.id] || 0;
      var done = prog >= q.target;
      html += '<div class="cv3-quest-item' + (done ? ' cv3-quest-done' : '') + '">' +
        '<div class="cv3-quest-text">' + q.text + '</div>' +
        '<div style="text-align:right">' +
          '<div class="cv3-quest-progress">' + prog + '/' + q.target + '</div>' +
          '<div class="cv3-quest-reward">+' + q.reward.xp + 'xp · +' + q.reward.points + '點</div>' +
        '</div></div>';
    });
    if (questsClaimed > 0){
      html += '<div style="margin-top:12px;padding:10px 12px;background:#e8f5e9;border-radius:10px;font-size:.78rem;color:#2e7d32">' +
        '今日已完成 ' + questsClaimed + ' 個房間任務</div>';
    }
    wrap.innerHTML = html;
  }

  // ── 材料兌換（真實實作）──
  window.cv3ExchangeMaterial = function(tier){
    var def = V3.MATERIAL_EXCHANGE[tier];
    if (!def) return;
    var pts = getPoints();
    if (pts < def.cost){ toast('靈感點不足，需要 ' + def.cost + ' 點（目前 ' + pts + ' 點）'); return; }
    var ex = getExData();
    if ((ex[tier] || 0) >= def.dailyLimit){
      toast(({ common:'Common', rare:'Rare', legendary:'Legendary' }[tier] || tier) + ' 今日已達上限 ' + def.dailyLimit + ' 次');
      return;
    }
    addPoints(-def.cost);
    var mat = pickMat(tier);
    addMaterial(mat.id);
    ex[tier] = (ex[tier] || 0) + 1;
    saveExData(ex);

    document.getElementById('cv3-ex-reward-icon').textContent = mat.icon;
    document.getElementById('cv3-ex-reward-name').textContent = '獲得 ' + mat.name;
    document.getElementById('cv3-ex-reward-sub').textContent =
      '花費 ' + def.cost + ' 靈感點 · 今日剩餘次數 ' + (def.dailyLimit - ex[tier]);
    document.getElementById('cv3-ex-reward-overlay').classList.add('show');
  };

  window.cv3CloseExReward = function(){
    document.getElementById('cv3-ex-reward-overlay').classList.remove('show');
  };

  // ── 初始化 ──
  async function init(){
    renderTimeContext();
    spawnParticles();

    if (!window.firebase || !firebase.auth){
      var seed = 'guest' + TODAY;
      state.moods = V3.rollDailyMoods(seed);
      renderLord(); renderRooms(); renderDailyQuests();
      return;
    }

    firebase.auth().onAuthStateChanged(async function(user){
      if (user){
        state.uid = user.uid;
        try {
          var doc = await firebase.firestore().collection('users').doc(user.uid)
            .collection('castle_save').doc('state').get();
          if (doc.exists) state.save = doc.data();
        } catch(e){ console.warn('castle_save 讀取失敗：', e.message); }
      }
      var seedStr = (state.uid || 'guest') + TODAY;
      state.moods = V3.rollDailyMoods(seedStr);
      renderLord(); renderRooms(); renderDailyQuests();
    });
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>

</body>
</html>
