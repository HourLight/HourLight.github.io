const TYPES={
  chase:{name:'追逐者',icon:'🏃‍♀️',sub:'你的愛情是一場永遠追不到終點的馬拉松',
    desc:'你愛上的不是那個人，是「追」的那個感覺。對方若即若離的時候你最清醒，對方穩定下來你反而覺得少了什麼。你把焦慮當成心動，把不確定當成激情。',
    detail:'追逐者的核心恐懼是被拋棄。\n\n你可能小時候的主要照顧者（不一定是父母）不太穩定。有時候很親密、有時候很疏遠、有時候甚至消失。你沒有辦法預測「愛什麼時候會在」，所以你學會了一件事：一直追。只要我追得夠快，愛就不會跑掉。\n\n這個模式讓你特別容易被「忽冷忽熱」的人吸引。因為他們的不確定性會啟動你熟悉的那個「追」的反應。穩定的人反而讓你覺得無聊。\n\n但你追的不是愛，是「被確認我值得被愛」的感覺。每一次對方回訊息你就安心五分鐘，然後又開始焦慮。你的安全感不在自己手上，在對方的已讀時間上。\n\n試一次：下次想傳訊息確認的時候，先問自己：「我是真的想跟他聊天，還是在找安全感？」如果是後者，把手機放下，深呼吸三次。安全感要從自己身上長出來。',
    oil:'岩蘭草 × 雪松 × 甜橙',
    oilDetail:'岩蘭草的岩蘭草醇把你從「對方在嗎？」的焦慮迴圈裡拉回自己的身體。雪松的倍半萜烯在你和焦慮之間建一道透明屏障，讓你看得到焦慮但不被它帶走。甜橙的檸檬烯重新啟動你邊緣系統裡「自我安撫」的功能，讓你不需要靠別人的回覆來呼吸。\n\n調配建議：基底油 10ml＋岩蘭草 1 滴＋雪松 2 滴＋甜橙 2 滴。',
    med:'「回到自己」呼吸法\n\n當你又在焦慮地等對方回訊息的時候：\n\n1. 把手機翻面朝下。雙手放在大腿上\n2. 吸氣 4 秒：把注意力從「對方」拉回「自己」。感覺你的腳踩在地上\n3. 吐氣 6 秒：對自己說「我在這裡。不管對方在不在，我都在」\n4. 吸氣 4 秒：問自己「我現在需要什麼？」不是「對方有沒有回」，是「我自己需要什麼」\n5. 吐氣 6 秒：去做那件你需要的事。喝水、洗臉、走一走\n\n做 4 輪。\n\n你的安全感不應該放在別人的手機裡。它應該在你自己的胸口。',
    closing:'你值得一段不用追的愛情。那個對的人不會讓你一直跑，會在你身邊走。你只需要停下來，看看身邊有沒有人已經在了。'},
  avoid:{name:'逃避者',icon:'🦌',sub:'你很想被愛，但更怕被困住',
    desc:'對方越靠近，你越想跑。對方越認真，你越害怕。你把「保持距離」說成「需要空間」，把「不敢投入」說成「隨緣」。你心裡那扇門其實一直都開著，但你站在門後面，誰靠近你就退一步。',
    detail:'逃避者不是不想愛，是太怕愛了。\n\n你的恐懼不是被拋棄（那是追逐者的），你的恐懼是被吞噬。你害怕如果你全心投入一段關係，就會失去自己。因為也許你曾經失去過。\n\n也許小時候你的主要照顧者太侵入、太控制、或者太需要你。你學到的教訓是：「跟人太靠近很危險。」所以你長大後，親密關係變成一場拉鋸戰。你想被愛的那一面不斷把人拉近，怕被困住的那一面不斷把人推開。\n\n你最大的盲點是：你以為你在保護自己的自由，但你被「保護自由」這件事給困住了。你無法享受一段關係裡的安定感，因為安定讓你焦慮。\n\n試一次：下次對方做了一件親密的事讓你想退的時候，留在那裡多5秒。就5秒。讓你的神經系統記住「靠近不一定會受傷」。',
    oil:'茉莉 × 玫瑰 × 檀香',
    oilDetail:'茉莉的吲哚穿透你的防備，讓邊緣系統嚐一口「被愛也是安全的」。玫瑰的苯乙醇柔化你心門的鐵鎖，不是要你大開城門，只是把門稍微推開一條縫。檀香的 α-檀香醇穩定你在「靠近」時的恐慌反應。\n\n調配建議：基底油 10ml＋茉莉 1 滴＋玫瑰 1 滴＋檀香 2 滴。',
    med:'「5秒靠近練習」\n\n不需要大動作。找一個你信任的人（朋友也可以）。\n\n1. 吸氣 4 秒：感覺你跟這個人之間的距離\n2. 吐氣 6 秒：在心裡把這個距離縮短一點點。不用真的移動，想像就好\n3. 吸氣 4 秒：注意你身體的反應。胸口緊嗎？想逃嗎？\n4. 吐氣 6 秒：對自己說「靠近不等於被困住。我隨時可以退回來。但現在，我選擇待在這裡」\n\n做 4 輪。\n\n你不需要一步到位。5秒就夠了。明天再多5秒。',
    closing:'你的獨立是真正的力量。但讓一個人進來不會讓你變弱，會讓你完整。你不用敞開所有的門。一扇就好。就一扇。'},
  rescue:{name:'拯救者',icon:'🦸',sub:'你愛的不是人，是一個需要被拯救的故事',
    desc:'你總是被「有故事的人」吸引。他們通常不太好，有點受傷、有點迷失、有點需要你。你在照顧他們的時候覺得自己很有價值。但你有沒有想過：如果他好了，你們的關係還剩什麼？',
    detail:'拯救者型的人很慷慨、很溫暖、很有同理心。但你的愛裡有一個危險的成分：你把「被需要」當成「被愛」。\n\n你可能很小的時候就在照顧別人了。照顧生病的家人、安撫情緒不穩的父母、當家裡的小大人。你學到的公式是：「我照顧你 → 你離不開我 → 我就不會被拋棄。」\n\n所以你長大後，特別容易被「需要被拯救」的人吸引。不是因為你聖母心發作，是因為那個模式讓你覺得安全。一個太健康、太獨立的人反而讓你不安，因為他不需要你。「不需要我 = 會離開我」這個等式在你腦子裡跑了很多年了。\n\n但拯救不是愛。拯救是一種控制。你用付出換取對方的依賴，但依賴不是愛。\n\n試一次：下次你想幫對方處理他自己的事的時候，問一句：「你需要我幫忙嗎？還是你想自己處理？」然後尊重他的回答。',
    oil:'天竺葵 × 乳香 × 佛手柑',
    oilDetail:'天竺葵的香茅醇和牻牛兒醇平衡你邊緣系統裡「照顧別人才安全」的舊迴路。乳香的乳香酸降低杏仁核的「如果我不拯救他就會出事」的警報。佛手柑的乙酸沉香酯幫你的身體記住「不照顧別人的時候，我也是有價值的」。\n\n調配建議：基底油 10ml＋天竺葵 2 滴＋乳香 2 滴＋佛手柑 1 滴。',
    med:'「放手練習」\n\n想一個你正在照顧的人。\n\n1. 吸氣 4 秒：想像你雙手捧著他的問題。那些問題很重，你的手臂很酸\n2. 吐氣 6 秒：慢慢把手打開。讓那些問題落回地上。那是他的地，不是你的\n3. 吸氣 4 秒：雙手空了。感覺那個輕。那不是冷漠，是歸還\n4. 吐氣 6 秒：對自己說「他有他的路要走。我照顧好自己就是最大的愛」\n\n做 5 輪。\n\n你不需要拯救任何人才配被愛。你的存在本身就夠了。',
    closing:'你的付出是出自真心的。但真心不需要掏到見底。你可以愛一個人，同時讓他自己站起來。那才是最深的愛。'},
  perfectionist:{name:'完美主義者',icon:'💎',sub:'你在找一個不存在的人',
    desc:'你的擇偶標準很高。不是公主病或王子病，是你真的覺得「如果要在一起，就不能將就」。問題是，你的「不將就」有時候變成了「沒有人夠好」。',
    detail:'感情裡的完美主義者通常很優秀。你對自己要求高，所以也對伴侶要求高。\n\n你的清單很長：外表要能看、談吐要有深度、上進但不工作狂、體貼但不黏、有主見但不固執。每一條都合理，但全部加起來就變成了一個不存在的人。\n\n更深一層：你的完美主義可能是一種保護機制。因為只要「找不到完美的人」，你就不用真正進入一段關係。不進入就不會受傷。你用高標準擋住了失望的可能，但也擋住了幸福的可能。\n\n另一個盲點：你在關係裡容易「幻滅」。一開始覺得對方很好，但某天發現他有一個你受不了的毛病（也許是小事），你的濾鏡就碎了。你不是不愛了，是你的完美主義不允許你愛一個有瑕疵的人。\n\n但所有人都有瑕疵。包括你。\n\n試一次：把你的擇偶清單拿出來，刪掉一半。留下最核心的三條。看看這三條以外的彈性空間裡，有沒有你本來會錯過的人。',
    oil:'玫瑰 × 薰衣草 × 甜橙',
    oilDetail:'玫瑰的香茅醇和苯乙醇穿透你前額葉的「完美標準」防線，讓你的邊緣系統記住：被愛的感覺跟完不完美無關。薰衣草的沉香醇放鬆你在「幻滅」時的緊繃感，讓你能帶著溫柔看見對方的缺點。甜橙的檸檬烯在你心裡創造一個「不完美也可以」的柔軟空間。\n\n調配建議：基底油 10ml＋玫瑰 1 滴＋薰衣草 2 滴＋甜橙 2 滴。',
    med:'「不完美也很好」冥想\n\n閉上眼睛。\n\n1. 吸氣 4 秒：想一個你在意的人（伴侶/曖昧對象/前任）。想他最讓你「幻滅」的那個缺點\n2. 吐氣 6 秒：看著那個缺點。不是要你接受，是要你「看見」\n3. 吸氣 4 秒：問自己「這個缺點真的不可忍受嗎？還是只是不符合我的完美劇本？」\n4. 吐氣 6 秒：想像那個缺點慢慢變小，變成他身上一個小痣、一個小記號。不完美，但真實\n5. 對自己說：「完美的人不存在。真實的人才值得愛」\n\n做 4 輪。',
    closing:'你對品質的追求是因為你認真。但感情不是精品，不能退貨。那個讓你偶爾皺眉的人，可能就是讓你一輩子微笑的人。'},
  independent:{name:'獨立過頭型',icon:'🏔️',sub:'你一個人可以，但有時候半夜還是會冷',
    desc:'你的人生不需要任何人也能運轉。你有自己的朋友圈、自己的興趣、自己的收入、自己的快樂。你驕傲於此。但你有沒有發現，「不需要任何人」這句話說久了，連你自己都信了？',
    detail:'獨立過頭型的人在感情裡像一座美麗的孤島。你的風景很好，但碼頭太小，大部分的船靠不進來。\n\n你的獨立可能來自很早的一個認知：「靠自己最安全。靠別人會失望。」也許你試過依賴，結果被辜負了。也許你從來沒有過可以依賴的對象，所以你從來不知道「被接住」是什麼感覺。\n\n你最大的盲點是：你把「不需要」當成了力量。但不需要和不敢需要是兩回事。你不是不需要愛，你是不敢承認你需要。因為承認就等於脆弱，脆弱就等於危險。\n\n你在關係裡的樣子是：你在，但你不太交出去。你願意陪伴，但不太願意融合。你的伴侶可能會說：「跟你在一起，有時候比一個人還孤獨。」\n\n試一次：今天對一個你信任的人說「我需要你」。不用很嚴肅。可以是「我需要你幫我拿一下東西」。讓「需要」這兩個字從你嘴巴出來一次。看看天會不會塌。',
    oil:'茉莉 × 天竺葵 × 岩蘭草',
    oilDetail:'茉莉的吲哚和苯甲酸苄酯穿透你「不需要任何人」的盔甲，讓邊緣系統嚐一口「被連結」的感覺。天竺葵的香茅醇平衡你的自律神經，讓「依賴」不再觸發你的警報系統。岩蘭草的岩蘭草醇把你的根扎深，讓你知道即使讓人靠近，你也不會失去自己。\n\n調配建議：基底油 10ml＋茉莉 1 滴＋天竺葵 2 滴＋岩蘭草 1 滴。',
    med:'「打開碼頭」冥想\n\n想像你是一座島。\n\n1. 吸氣 4 秒：看看你的島。風景很美，但碼頭太小了。只有很小的船能靠進來\n2. 吐氣 6 秒：想像你開始把碼頭加大一點點。不是要迎接一整支艦隊，只是讓一艘對的船有地方停\n3. 吸氣 4 秒：看到那艘船慢慢靠近。你不用衝過去迎接，你只要站在那裡就好\n4. 吐氣 6 秒：對自己說「讓人靠近不會讓我的島消失。它會讓我的島有人陪」\n\n做 4 輪。\n\n你的獨立很美。但美不需要孤獨來證明。',
    closing:'你一個人也很完整。但完整跟幸福不一樣。有些幸福只有在另一個人靠近的時候才會出現。你不用改變你的島。只要把碼頭再寬一點就好。'},
  allin:{name:'全心投入型',icon:'🔥',sub:'你愛的時候把自己燒光了',
    desc:'你愛一個人的方式是：全部。時間全給、心思全放、未來全規劃好。你在愛情裡燃燒得最美也最快。問題是，火燒完了之後，你會發現自己已經不認得自己了。',
    detail:'全心投入型的人在感情裡是最「真」的。你不會半心半意，不會保留後路。你愛就是愛，用你所有的一切。\n\n但你有沒有發現：每段感情結束後，你都需要很長的時間才能找回自己？因為你在關係裡把「我」融進了「我們」，當「我們」不見了，「我」也跟著不見了。\n\n你可能在關係裡會漸漸改變自己的興趣（配合對方的）、改變自己的社交圈（只剩對方的朋友）、改變自己的時間安排（圍繞對方轉）。一開始不覺得有什麼，因為你叫它「愛」。但有一天你發現自己已經不記得「單獨的我」喜歡什麼了。\n\n你的付出很真實，但你的付出裡有一個隱藏的邏輯：「如果我給得夠多，對方就不會離開。」你用付出換安全感。但安全感不是用付出買來的。\n\n試一次：今天花一個小時做一件「只有你自己」喜歡的事。不跟對方分享、不拍照發限動、不問別人的意見。純粹屬於你的一個小時。',
    oil:'薰衣草 × 檀香 × 迷迭香',
    oilDetail:'薰衣草的沉香醇安撫你在「害怕失去」時過度激發的邊緣系統，讓你的身體記住「不用全部給出去才配被愛」。檀香的 α-檀香醇穩定你的前額葉，幫你在付出之前多一個「我自己還好嗎？」的覺察。迷迭香的桉油醇喚醒你自己的存在感，讓「我」不會在「我們」裡面失蹤。\n\n調配建議：基底油 10ml＋薰衣草 2 滴＋檀香 2 滴＋迷迭香 1 滴。孕婦避免使用迷迭香。',
    med:'「找回自己」練習\n\n找一面鏡子。\n\n1. 看著自己。不是「某某的女朋友/男朋友/老婆/老公」，就是你\n2. 吸氣 4 秒：問自己「我喜歡什麼？」不是對方喜歡什麼。是我\n3. 吐氣 6 秒：再問「我想要什麼？」不是我們想要什麼。是我\n4. 吸氣 4 秒：如果答案模糊了，沒關係。那就是今天覺察的起點\n5. 吐氣 6 秒：對自己說「我可以全心愛一個人，但我不能全部都給出去。因為沒有我，就沒有我的愛」\n\n做 4 輪。\n\n你的愛很珍貴。但珍貴的東西要留一點給自己。不是自私，是讓你的愛能燒得更久。',
    closing:'你的熱情是稀有的真。但火不能只燒一個方向。留一根火柴給自己。因為如果你滅了，你想照亮的人也會在黑暗裡。'}
};

let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const optsHTML='<div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]===o.a?' selected':'')+'" onclick="selectOpt('+i+',\''+o.a+'\',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 題 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一題</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一題 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看我的愛情盲點 💕</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,a,btn){answers[qi]=a;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'nearest'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 題，共 '+questions.length+' 題';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const scores={};Object.keys(TYPES).forEach(k=>{scores[k]=0;});
  Object.values(answers).forEach(a=>{scores[a]=(scores[a]||0)+1;});
  const sorted=Object.keys(TYPES).sort((a,b)=>scores[b]-scores[a]);
  const topType=sorted[0],f=TYPES[topType],f2=TYPES[sorted[1]];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('screenshotCard').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥靈之鑰</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-tags"><span class="ss-tag">愛情盲點覺察</span><span class="ss-tag">'+f.name+'</span></div><div class="ss-quote">「'+f.closing+'」</div><div class="ss-footer">hourlightkey.com ✦ 讀懂自己，活對人生</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">愛情盲點覺察 Love Blind Spot</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var tp=TYPES[k],pct=Math.round(scores[k]/questions.length*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+tp.icon+' '+tp.name+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">💕 你的愛情盲點</div><div class="result-section-content">'+f.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度解析</div><div class="result-section-content">'+f.detail.replace(/\n/g,'<br>')+'</div></div>'+(f2?'<div class="result-section"><div class="result-section-title">'+f2.icon+' 副型：'+f2.name+'（'+f2.sub+'）</div><div class="result-section-content">'+f2.desc+'</div></div>':'')+'<div class="result-section"><div class="result-section-title">🌿 認知芳療建議：'+f.oil+'</div><div class="result-section-content">'+f.oilDetail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🧘 冥想練習（60-90秒）</div><div class="result-section-content">'+f.med.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">✦ 馥靈收束語</div><div class="result-section-content" style="font-family:LXGW WenKai TC,serif;font-size:1rem;line-height:1.9">'+f.closing+'</div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ 馥靈之鑰 × 你的覺察密碼</div><div class="hour-bridge-text" style="margin-bottom:8px">你在感情裡的盲點不是缺陷，是你的心學會的保護機制。看見它，你才能選擇要不要繼續用同一套劇本。</div><div style="font-size:.85rem;color:#9e8a70;line-height:1.8;margin-bottom:16px">馥靈秘碼可以揭示你天生的情感設定，跟今天的愛情盲點交叉比對會打開全新的理解。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免費解碼馥靈秘碼 →</a>';
  try{localStorage.setItem('hl_quiz_love',JSON.stringify({type:topType,scores,ts:Date.now()}));}catch(e){}
  window._resultText=f.icon+' 我的愛情盲點是「'+f.name+'」：'+f.sub+'。'+f.desc.substring(0,60)+'⋯ 你的盲區是什麼？ 👉 hourlightkey.com/quiz-love-pattern.html #馥靈之鑰 #愛情盲點';
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz-love-pattern',toolName:'愛情盲點覺察'});window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
