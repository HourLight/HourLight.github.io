const DIMS={filter:'心理過濾',catastrophe:'災難化思維',personal:'過度個人化',blackwhite:'黑白思考'};
const TYPES={
filter:{name:'負面濾鏡型',icon:'🕶️',sub:'你戴著一副只看得見壞事的眼鏡',keys:['選擇性注意','忽略正面','放大負面'],desc:'你的大腦有一個非常強的負面過濾器。十件事情裡有九件好的一件壞的，你只記得那一件。不是你悲觀，是你的注意力系統對負面訊號特別敏感。這在演化上曾經幫你避開危險，但現在它讓你活在一個比現實更灰暗的世界裡。',detail:'Aaron Beck 教授把這個叫做心理過濾（Mental Filter）。你的大腦像一個漏斗，只讓負面的訊息通過。好的評價從旁邊流走了，不好的卡在漏斗裡反覆被你看到。\n\n覺察邀請：今天睡前寫下三件今天發生的好事。不用很大的事，微小的就好。連續做一週，你會發現你的過濾器慢慢在調整。',oil:'甜橙 2 滴＋佛手柑 2 滴＋薰衣草 1 滴。甜橙打開你看見好事的通道。佛手柑讓你的心情往上提。薰衣草讓你的注意力不再只黏在壞事上。',med:'閉上眼睛。吸氣四秒，想一件今天發生的好事。吐氣六秒，讓它停留。對自己說：「好的也是真的。」重複四次。',quote:'你看到的壞事是真的。但你漏掉的好事也是。'},
catastrophe:{name:'末日預言家',icon:'🌋',sub:'你的腦袋擅長把小事變成世界末日',keys:['災難化想像','最壞結果','焦慮放大器'],desc:'你的認知系統擅長從一件小事推導出最壞的結果。朋友沒回訊息等於他不喜歡你了。工作犯一個錯等於你會被開除。身體有一點不舒服等於你得了重病。你的大腦有一台災難化放大器，每一個小訊號都會被放到最大。',detail:'David Burns 教授把這個叫做災難化思維（Catastrophizing）。你的前額葉很擅長模擬各種情境，但它只模擬最壞的。結果你活在一個充滿假想危機的世界裡，而那些危機大部分從來不會發生。\n\n覺察邀請：下次你的腦袋開始說「完蛋了」的時候，問自己：「最壞的結果真的發生的機率是多少？」然後問：「如果真的發生了我能怎麼辦？」你會發現，即使最壞的結果也是可以處理的。',oil:'薰衣草 2 滴＋岩蘭草 2 滴＋乳香 1 滴。薰衣草降低焦慮的音量。岩蘭草把你從想像的未來拉回此刻。乳香帶來一種穩定的安全感。',med:'吸氣四秒，問自己：「我現在害怕的事，發生的機率是多少？」吐氣六秒。吸氣四秒，問：「即使發生了，我可以怎麼辦？」吐氣六秒。重複四次。',quote:'你的腦袋在說世界末日。但你往窗外看一眼，太陽還在。'},
personal:{name:'宇宙中心承受者',icon:'🎯',sub:'你覺得所有壞事都跟你有關',keys:['過度歸因','自我責備','他人情緒背鍋'],desc:'別人心情不好是因為你。案子出問題是因為你。路上遇到塞車都覺得是自己的問題。你的認知系統有一個過度個人化的機制，把所有事情的原因都歸到自己身上。你不是自戀，你是把太多不屬於你的責任揹在背上了。',detail:'過度個人化（Personalization）是 CBT 裡最常見的認知偏誤之一。你的大腦會自動把你放在每一件事的因果鏈上。但很多事情跟你真的沒有關係。朋友心情差可能是他自己的事，老闆臉臭可能是昨天沒睡好。\n\n覺察邀請：下次你覺得是自己的錯的時候，列出三個跟你無關的可能原因。讓你的大腦練習看到其他可能性。',oil:'佛手柑 2 滴＋天竺葵 2 滴＋薰衣草 1 滴。佛手柑把你從自責裡拉出來。天竺葵讓你跟自己的情緒邊界回到平衡。薰衣草讓你的神經系統不再過度警覺。',med:'吸氣四秒，想一件你覺得是自己的錯的事。吐氣六秒，問自己：「有沒有可能跟我無關？」吸氣四秒，想一個不是你的原因。吐氣六秒。對自己說：「不是每件事都是我的責任。」',quote:'你把太多不是你的東西揹在背上了。放下一些。天不會塌的。'},
blackwhite:{name:'二元對立者',icon:'⬛',sub:'你的世界只有全好和全壞，沒有灰色地帶',keys:['非黑即白','完美或失敗','極端評價'],desc:'你的認知系統像一個只有兩個選項的開關：好或壞、成功或失敗、完美或垃圾。沒有中間值。一件事只要有一點瑕疵就是失敗，一個人只要犯了一個錯就不值得信任。你的世界非常清晰，但也非常殘酷。因為沒有人和事能通過你的全有或全無標準。',detail:'黑白思考（All-or-Nothing Thinking）是最強的認知偏誤之一。它讓你沒辦法接受不完美，不管是對自己還是對別人。你的標準只有一百分和零分，而現實世界大部分的事情在七十分左右。\n\n覺察邀請：下次你想說「完蛋了」或「太棒了」的時候，給它一個分數。不是一百也不是零，是一個中間的數字。讓你的大腦練習看到灰色地帶。',oil:'薰衣草 2 滴＋天竺葵 1 滴＋甜橙 2 滴。薰衣草讓兩個極端之間出現空間。天竺葵帶來平衡感。甜橙讓七十分也可以是一種美好。',med:'吸氣四秒，想一件你覺得很糟的事。給它打個分數。吐氣六秒。吸氣四秒，問自己：「有沒有一部分其實還好？」吐氣六秒。讓那個分數往中間移動一點。',quote:'世界不是非黑即白的。灰色的地方才是真正住人的。'},
filter_personal:{name:'自責型灰鏡',icon:'🪞',sub:'你只看到壞事而且都是你的錯',keys:['負面注意＋自我歸因','雙重打擊','慣性自責'],desc:'你同時有負面過濾和過度個人化的傾向。你不只看到壞的，你還把壞的全部歸因到自己身上。這是一個雙重打擊：世界看起來很糟，而且全是你的錯。你活在一個你自己建造的牢籠裡。',detail:'覺察邀請：今天試一個練習。每次你覺得是自己的錯的時候，問兩個問題：「這真的跟我有關嗎？」然後「如果跟我有關，我能做什麼？」把自責轉化成行動。',oil:'佛手柑 2 滴＋甜橙 2 滴＋薰衣草 1 滴。讓你從自責的迴圈裡走出來。',med:'吸氣四秒，把一件你在自責的事想出來。吐氣六秒，對自己說：「這不全是我的錯。」重複四次。',quote:'你的濾鏡是灰色的，而且你把所有灰色都當成自己的影子。但那些灰色不全是你的。'},
catastrophe_blackwhite:{name:'極端災難型',icon:'🔥',sub:'你的腦袋只有兩個劇本：一切很好或世界末日',keys:['非好即壞','災難預演','極端劇情'],desc:'你把災難化思維和黑白思考結合在一起了。事情稍微不順就直接跳到最壞的結局，中間的過程完全被跳過。你的人生像一部只有兩個畫面的電影：太陽或地震。中間的日常被你的認知系統跳過了。',detail:'覺察邀請：下次你的腦袋開始播放末日電影的時候，按暫停。問自己：「中間那些畫面長什麼樣？」讓你的想像力不只停在最壞的那一格。',oil:'岩蘭草 2 滴＋薰衣草 2 滴＋甜橙 1 滴。岩蘭草把你拉回當下。薰衣草降低焦慮。甜橙在兩個極端之間加一點溫度。',med:'吸氣四秒，想像最壞的結果。吐氣六秒。吸氣四秒，想像最好的結果。吐氣六秒。吸氣四秒，想像中間的結果。停在那裡。那才是最有可能發生的。',quote:'你的腦袋只播兩集：天堂和地獄。但你的人生大部分在中間那集。'},
filter_catastrophe:{name:'末日放大鏡',icon:'🔍',sub:'你找到壞事然後把它放到無限大',keys:['負面搜尋','放大災難','焦慮螺旋'],desc:'你先用負面過濾找到那一件壞事，然後用災難化思維把它放大到整個人生。一件小事可以讓你焦慮整晚。你的認知系統是一個會自動放大負面訊號的系統，從一點噪音到一場風暴。',detail:'覺察邀請：寫一本焦慮日記。每天記錄你焦慮的事，一週後回頭看。你會發現大部分你焦慮的事情都沒有發生。讓證據來告訴你的大腦：你的預測系統需要校準了。',oil:'薰衣草 3 滴＋佛手柑 2 滴。最簡單也最有效的抗焦慮配方。讓你的放大鏡縮小一點。',med:'吸氣四秒，把焦慮的那件事想出來。吐氣六秒，想像它在你面前。吸氣四秒，想像它慢慢縮小。吐氣六秒，縮到手掌大小。對自己說：「它沒有我想的那麼大。」',quote:'你手上拿著一個放大鏡對著一顆灰塵。放下放大鏡，它就只是一顆灰塵。'},
personal_blackwhite:{name:'完美自責型',icon:'⚖️',sub:'你要不就是全對要不就是全是你的錯',keys:['完美主義','自我審判','極端歸因'],desc:'你對自己的評價只有兩種：完美無缺或一無是處。犯了一個小錯就覺得自己整個人都是失敗的，同時把所有問題都歸因到自己身上。你既是被告也是法官，而你的法庭從來不判無罪。',detail:'覺察邀請：今天對自己說一次：「我做了一件不太好的事。但我這個人不壞。」把行為跟人分開。你犯的錯不等於你這個人。',oil:'薰衣草 2 滴＋玫瑰 1 滴＋佛手柑 2 滴。薰衣草讓內在法庭休庭。玫瑰讓你對自己溫柔一點。佛手柑讓不完美也可以是可以的。',med:'吸氣四秒，想一件你在責備自己的事。吐氣六秒，對自己說：「我做了一件不夠好的事。但我這個人值得被原諒。」重複四次。',quote:'你的法庭太嚴了。偶爾讓自己無罪釋放。'}
};
let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';
    const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 題 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一題</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一題 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看結果 🤔</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 題，共 '+questions.length+' 題';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const dimScores={};Object.keys(DIMS).forEach(k=>{dimScores[k]=0;});
  Object.keys(answers).forEach(qi=>{const oi=answers[qi];const s=questions[qi].opts[oi].s;Object.keys(s).forEach(d=>{dimScores[d]+=s[d];});});
  const maxPossible=Object.keys(answers).length*3;
  const sorted=Object.keys(DIMS).sort((a,b)=>dimScores[b]-dimScores[a]);
  const top=sorted[0],second=sorted[1];
  const v1=dimScores[top],v2=dimScores[second];
  let topType;
  if(v1>v2*1.4) topType=top;
  else{
    const comboKey=top+'_'+second;
    topType=TYPES[comboKey]?comboKey:(TYPES[second+'_'+top]?second+'_'+top:top);
  }
  const f=TYPES[topType];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('hlTitleReveal').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥靈之鑰</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-quote">「'+f.quote+'」</div><div class="ss-footer">hourlightkey.com ✦ </div></div><div class="hl-title-card"><div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div><div class="hl-title-eyebrow">Hour Light ✦ 自我破壞模式覺察</div><span class="hl-title-icon">'+f.icon+'</span><div class="hl-title-main">'+f.name+'</div><div class="hl-title-sub">'+f.sub+'</div><div class="hl-title-divider"></div><div class="hl-title-grid"><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 破壞模式</div><div class="hl-title-tag-value">'+f.name+'</div></div><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 覺察關鍵字</div><div class="hl-title-tag-value">'+f.keys.join(' · ')+'</div></div></div><div class="hl-title-quote">「'+f.quote+'」</div><div class="hl-title-combo-hint">'+f.name+'｜'+f.sub+'</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">Cognitive Distortion</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var pct=Math.round(dimScores[k]/maxPossible*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+DIMS[k]+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
