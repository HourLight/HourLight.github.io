function todayRiddle(room){
  var today = new Date(Date.now()+8*3600000);
  var seed = today.getUTCFullYear()*10000+today.getUTCMonth()*100+today.getUTCDate();
  var hash = seed * 2654435761 + room.id.charCodeAt(0) * 31;
  var idx = Math.abs(hash) % room.riddles.length;
  return room.riddles[idx];
}
;

// ═══ 使用 hl-castle-key.js 鑰匙系統 ═══
var CUR_ROOM = null;

function upd(){
  var st = hlCastle.getState();
  document.getElementById('dPts').textContent = st.points;
  document.getElementById('dRms').textContent = st.todayOpened + '/3';
  document.getElementById('dStr').textContent = st.streak;
  document.getElementById('progFill').style.width = Math.round(st.todayOpened/3*100) + '%';
  if(st.points > 0) document.getElementById('shareSec').style.display = 'block';
  renderZones();
}

function startGame(){
  document.getElementById('heroSec').style.display='none';
  document.getElementById('gameArea').classList.add('active');
  document.getElementById('topbar').classList.add('show');
  upd();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderZones(){
  var st = hlCastle.getState();
  document.querySelectorAll('.room-zone').forEach(function(g){
    var rid = g.dataset.room;
    var isDone = hlCastle.isDone(rid);
    var hasKey = hlCastle.hasKey(rid);
    var canOpenMore = hlCastle.canOpen();

    // 狀態：done（今天已完成）/ hasKey（有鑰匙可進）/ open（可去拿鑰匙）/ full（今天額度滿了）
    g.classList.toggle('done', isDone);
    g.classList.toggle('current', hasKey && !isDone);
    g.classList.toggle('locked', !hasKey && !isDone && !canOpenMore);

    if(isDone){
      g.style.cursor = 'default';
      g.onclick = null;
    } else {
      g.style.cursor = 'pointer';
      g.onclick = function(){ handleRoomClick(rid); };
    }
  });
}

function handleRoomClick(rid){
  if(hlCastle.isDone(rid)) return;

  if(hlCastle.hasKey(rid)){
    // 有鑰匙 → 直接進房間做謎語
    if(!hlCastle.canOpen()){
      alert('今天的 3 扇門已經全部探索完畢 ✨\n\n分享一次可以多開 1 扇，或者明天再來繼續探索！');
      return;
    }
    openRoom(rid);
  } else {
    // 沒鑰匙 → 顯示今天的任務提示
    showKeyTask(rid);
  }
}

function showKeyTask(rid){
  var task = hlCastle.getTodayTask(rid);
  var hint = hlCastle.getRoomHint(rid);
  var room = ROOMS.find(function(r){return r.id===rid});
  if(!room || !task) return;

  var p = document.getElementById('panel');
  var h = '<h2>🔒 ' + room.name + '</h2>';
  h += '<div class="desc" style="font-size:.95rem;color:var(--navy);font-weight:600;margin-bottom:8px">' + hint + '</div>';
  h += '<div class="riddle-box" style="text-align:center">';
  h += '<div style="font-size:2.5rem;margin-bottom:12px">🗝️</div>';
  h += '<div class="riddle-q" style="font-size:.95rem">今天的鑰匙：' + task.label + '</div>';
  h += '<div style="font-size:.85rem;color:var(--txt-l);margin-bottom:18px">' + task.hint + '</div>';
  if(task.url === '_share'){
    h += '<button class="btn-done" onclick="doShare()" style="background:var(--coral)">✦ 分享城堡進度，拿回鑰匙</button>';
  } else {
    h += '<a href="' + task.url + '" style="display:inline-block;padding:14px 32px;background:var(--rose);color:#fff;border-radius:12px;text-decoration:none;font-weight:700;font-size:.95rem;transition:all .3s">去拿鑰匙 →</a>';
    h += '<div style="font-size:.72rem;color:var(--txt-d);margin-top:10px">完成後會自動帶著鑰匙回到城堡</div>';
  }
  h += '</div>';
  p.innerHTML = h;
  p.classList.add('active');
  p.scrollIntoView({behavior:'smooth',block:'start'});
}

function openRoom(rid){
  var room = ROOMS.find(function(r){return r.id===rid});
  if(!room) return;
  CUR_ROOM = rid;
  var rd = todayRiddle(room); // 今天的這道謎語
  var p = document.getElementById('panel');
  var typeLabel = rd.type==='aroma'?'🌿 認知芳療':'rd.type==='fuyu'?'☯ 馥靈馥語':'💭 覺察';
  typeLabel = rd.type==='aroma'?'🌿 認知芳療':rd.type==='fuyu'?'☯ 馥靈馥語':'💭 覺察';
  var h = '<h2>' + room.icon + ' ' + room.name + '</h2>';
  h += '<div class="desc">' + room.phase + '｜門開了。走進去，看看裡面有什麼。</div>';
  h += '<div style="display:inline-block;padding:4px 12px;background:rgba(29,53,87,.06);border-radius:12px;font-size:.68rem;color:var(--txt-l);margin-bottom:14px">' + typeLabel + '</div>';
  h += '<div class="riddle-box"><div class="riddle-q">' + rd.q + '</div>';
  if(rd.isAroma && rd.aromas){
    h += '<div class="aroma-grid">';
    rd.aromas.forEach(function(a,i){
      h += '<div class="aroma-card" onclick="selAroma('+i+')" id="a'+i+'"><div class="aroma-icon">'+a.icon+'</div><div class="aroma-name">'+a.name+'</div><div class="aroma-note">'+a.note+'</div></div>';
    });
    h += '</div>';
  } else {
    h += '<div class="riddle-opts">';
    rd.opts.forEach(function(o,i){
      h += '<div class="riddle-opt" onclick="selOpt('+i+')" id="o'+i+'">'+o.text+'</div>';
    });
    h += '</div>';
  }
  h += '</div><div class="insight" id="ins"></div>';
  h += '<button class="btn-done" id="btnDone" disabled onclick="finish()">✦ 收下這份覺察</button>';
  p.innerHTML = h;
  p.classList.add('active');
  p.scrollIntoView({behavior:'smooth',block:'start'});
}

function selOpt(i){var r=ROOMS.find(function(r){return r.id===CUR_ROOM});if(!r)return;var rd=todayRiddle(r);if(rd.isAroma)return;rd.opts.forEach(function(_,j){var e=document.getElementById('o'+j);if(e)e.className='riddle-opt'+(j===i?' sel':'')});showIns(rd.opts[i].insight)}
function selAroma(i){var r=ROOMS.find(function(r){return r.id===CUR_ROOM});if(!r)return;var rd=todayRiddle(r);if(!rd.aromas)return;rd.aromas.forEach(function(_,j){var e=document.getElementById('a'+j);if(e)e.className='aroma-card'+(j===i?' sel':'')});showIns(rd.aromas[i].insight)}
function showIns(t){var el=document.getElementById('ins');el.innerHTML='<div class="insight-txt">'+t.replace(/\\n/g,'<br>')+'</div>';el.classList.add('show');document.getElementById('btnDone').disabled=false;el.scrollIntoView({behavior:'smooth',block:'center'})}

function finish(){
  if(!CUR_ROOM) return;
  hlCastle.completeRoom(CUR_ROOM);
  confetti();
  upd();
  document.getElementById('panel').classList.remove('active');
  setTimeout(function(){
    document.querySelector('.castle-wrap').scrollIntoView({behavior:'smooth',block:'center'});
  },400);
  var st = hlCastle.getState();
  if(st.todayOpened >= 3){
    setTimeout(function(){
      alert('✨ 今天的 3 個房間都探索完畢！\n\n明天城堡會為您準備新的鑰匙。\n\n您的靈感點數：' + st.points + ' 點（永久累積）');
    },1200);
  }
}
function confetti(){var b=document.getElementById('confettiBox'),c=['#E63946','#2EC4B6','#1D3557','#F0A500','#E76F51','#FFD166','#457B9D'];for(var i=0;i<40;i++){var p=document.createElement('i');p.style.cssText='left:'+Math.random()*100+'%;background:'+c[~~(Math.random()*c.length)]+';animation-delay:'+Math.random()+'s;animation-duration:'+(2+Math.random()*2)+'s;width:'+(6+Math.random()*8)+'px;height:'+(6+Math.random()*8)+'px;border-radius:'+(Math.random()>.5?'50%':'2px');b.appendChild(p)}setTimeout(function(){b.innerHTML=''},4000)}

function doShare(){
  var st = hlCastle.getState();
  var t='🏰 我在馥靈之鑰的內在城堡收集了 '+st.points+' 點靈感！\n\n每天10分鐘，走進自己的城堡 ✨\n👉 hourlightkey.com/castle-game.html';
  if(navigator.share)navigator.share({title:'內在城堡探索者',text:t,url:'https://hourlightkey.com/castle-game.html'}).catch(function(){});
  else navigator.clipboard.writeText(t).then(function(){alert('✅ 已複製分享文案')});
  hlCastle.shareBonus();
  upd();
}
