<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC系統 GUI 介面 - 馥靈之鑰</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 40px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .status {
            display: inline-block;
            padding: 8px 16px;
            background: #e8f5e8;
            color: #2d7d2d;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .command-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .command-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .command-btn:active {
            transform: translateY(0);
        }

        .command-btn .icon {
            font-size: 1.5rem;
            margin-bottom: 8px;
            display: block;
        }

        .command-btn .desc {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        .output-area {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
            text-align: left;
            min-height: 200px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            white-space: pre-wrap;
            overflow-y: auto;
            max-height: 400px;
        }

        .loading {
            display: none;
            color: #667eea;
            margin: 20px 0;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 0.9rem;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .clear-btn {
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s;
        }

        .clear-btn:hover {
            background: #c82333;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
                margin: 10px;
            }

            .button-grid {
                grid-template-columns: 1fr;
            }

            .logo {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🚀 CC系統</div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px;">
                <label style="display: flex; align-items: center; cursor: pointer;">
                    <input type="radio" name="module" value="free" checked style="margin-right: 8px;">
                    <span>🆓 免費模組 (基本功能)</span>

                    <input type="radio" name="module" value="lite" style="margin-right: 8px;">

        <div class="button-grid">

            <button class="command-btn" onclick="runCommand('seo-scan')">

            <!-- 內容工具 -->
            <button class="command-btn" onclick="runCommand('content-create')">

            <button class="command-btn" onclick="runCommand('social-schedule')">

                <div class="desc">預約發文時間管理</div>

            <button class="command-btn" onclick="runCommand('social-analytics')">

            <!-- 技術工具 -->
            <button class="command-btn" onclick="runCommand('website-scan')">

                <div>網站健檢</div>

            <button class="command-btn" onclick="runCommand('backup')">

            <button class="command-btn" onclick="runCommand('security-scan')">

        <div class="output-area" id="output">
🎯 歡迎使用 CC 系統 GUI 介面！

點擊上方按鈕執行相應功能：
• 系統狀態 - 查看當前系統運行情況

• 內容管理 - 創作和編輯網站內容
• 管理後台 - 系統設定與維護
• 資料同步 - 保持資料最新狀態

💡 提示：執行結果會顯示在此區域中
        </div>

        <button class="clear-btn" onclick="clearOutput()">清空輸出</button>

        <div class="footer">
            ✨ CC系統 v1.0 - 由馥靈之鑰 AI 團隊開發<br>
            💡 如需幫助，請查看系統狀態或聯繫技術支援
        </div>
    </div>

    <script>
        const { spawn } = require('child_process');
        const path = require('path');

        let isRunning = false;

        function runCommand(command) {
            if (isRunning) {
                alert('系統正在執行中，請稍候再試');
                return;
            }

            // 檢查模組權限
            const selectedModule = document.querySelector('input[name="module"]:checked').value;
            if (!checkModulePermission(command, selectedModule)) {
                alert(`此功能需要「${getModuleName(getRequiredModule(command))}」或更高級模組`);
                return;
            }

            isRunning = true;
            showLoading(true);

            const outputDiv = document.getElementById('output');
            appendOutput(`\n🚀 執行指令: cc ${command} [${getModuleName(selectedModule)}]\n${'='.repeat(60)}\n`);

            // 根據指令類型執行不同邏輯
            switch(command) {
                case 'status':
                    executeStatus();
                    break;
                case 'seo-scan':
                    executeSeoScan();
                    break;
                case 'content-create':
                    executeContentCreate();
                    break;
                case 'content-optimize':
                    executeContentOptimize();
                    break;
                case 'keyword-research':
                    executeKeywordResearch();
                    break;
                case 'social-post':
                    executeSocialPost();
                    break;
                case 'social-schedule':
                    executeSocialSchedule();
                    break;
                case 'social-analytics':
                    executeSocialAnalytics();
                    break;
                case 'website-scan':
                    executeWebsiteScan();
                    break;
                case 'backup':
                    executeBackup();
                    break;
                case 'security-scan':
                    executeSecurityScan();
                    break;
                case 'admin':
                    executeAdmin();
                    break;
                case 'sync':
                    executeSync();
                    break;
                case 'auto-learn':
                    executeAutoLearn();
                    break;
                case 'ai-assistant':
                    executeAiAssistant();
                    break;
                case 'ai-analyze':
                    executeAiAnalyze();
                    break;
                case 'report-daily':
                    executeReportDaily();
                    break;
                case 'report-weekly':
                    executeReportWeekly();
                    break;
                default:
                    appendOutput('❌ 未知指令\n');
                    showLoading(false);
                    isRunning = false;
            }
        }

        function checkModulePermission(command, module) {
            const requiredModule = getRequiredModule(command);
            const moduleLevel = {free: 0, lite: 1, pro: 2};
            return moduleLevel[module] >= moduleLevel[requiredModule];
        }

        function getRequiredModule(command) {
            const moduleRequirements = {
                'status': 'free',
                'seo-scan': 'free',
                'content-create': 'lite',
                'content-optimize': 'lite',
                'keyword-research': 'pro',
                'social-post': 'lite',
                'social-schedule': 'pro',
                'social-analytics': 'pro',
                'website-scan': 'free',
                'backup': 'free',
                'security-scan': 'lite',
                'admin': 'free',
                'sync': 'free',
                'auto-learn': 'free',
                'ai-assistant': 'pro',
                'ai-analyze': 'pro',
                'report-daily': 'lite',
                'report-weekly': 'lite'
            };
            return moduleRequirements[command] || 'free';
        }

        function getModuleName(module) {
            const names = {free: '免費模組', lite: '經濟模組', pro: '專業模組'};
            return names[module] || '未知模組';
        }

        function executeStatus() {
            appendOutput('📊 檢查系統狀態...\n');

            setTimeout(() => {
                const fs = require('fs');
                const os = require('os');

                let status = '';
                status += `💻 設備: ${os.platform()}-${os.userInfo().username}\n`;
                status += `🕐 時間: ${new Date().toLocaleString('zh-TW')}\n`;
                status += `📁 工作目錄: ${process.cwd()}\n`;
                status += `🟢 Node.js: ${process.version}\n`;

                // 檢查關鍵檔案
                const keyFiles = ['cc-main.js', 'package.json'];
                status += '\n📂 核心檔案檢查:\n';
                keyFiles.forEach(file => {
                    if (fs.existsSync(file)) {
                        status += `   ✅ ${file}\n`;
                    } else {
                        status += `   ❌ ${file} (缺失)\n`;
                    }
                });

                status += '\n✅ CC系統運行正常！\n';
                appendOutput(status);
                showLoading(false);
                isRunning = false;
            }, 1000);
        }

        function executeSeoScan() {
            appendOutput('🔍 啟動 SEO 掃描...\n');

            // 執行實際的 Node.js 指令
            const nodeProcess = spawn('node', ['cc-main.js', 'seo', 'scan'], {
                cwd: process.cwd(),
                stdio: ['pipe', 'pipe', 'pipe']
            });

            nodeProcess.stdout.on('data', (data) => {
                appendOutput(data.toString());
            });

            nodeProcess.stderr.on('data', (data) => {
                appendOutput(`❌ 錯誤: ${data.toString()}`);
            });

            nodeProcess.on('close', (code) => {
                if (code === 0) {
                    appendOutput('\n✅ SEO 掃描完成！\n');
                } else {
                    appendOutput(`\n❌ 掃描失敗，退出代碼: ${code}\n`);
                }
                showLoading(false);
                isRunning = false;
            });
        }

        // 新增的執行函數
        function executeContentCreate() {

        function executeSocialSchedule() {

            setTimeout(() => {

        function executeWebsiteScan() {
            appendOutput('🌐 網站全面健檢中...\n');

            setTimeout(() => {

        function executeBackup() {
