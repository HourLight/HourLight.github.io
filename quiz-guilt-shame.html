const DIMS={guilt:'健康內疚',intShame:'內在羞愧',extShame:'外在羞愧'};
const TYPES={
  healthy:{name:'內疚導航者',icon:'🧭',sub:'你的自責是建設性的，它推著你往前走而不是往下沉',
    keys:['行為導向','修復意願','自我接納'],
    desc:'你的自責模式以健康內疚為主。當你做錯事的時候，你感受到的是「我做了一件不好的事」，而不是「我是一個不好的人」。這個差別聽起來很小，但它決定了你的自責會把你帶去哪裡。健康的內疚像GPS的重新導航，告訴你「偏了，往這邊修正」，然後你就修正了。它不會讓你停在原地自我毀滅。',
    detail:'Brene Brown 的研究發現，能區分內疚和羞愧的人在心理健康、人際關係和面對失敗的能力上都顯著更好。你的大腦有一個很重要的迴路是暢通的：「犯錯 → 感覺不好 → 想辦法修正 → 繼續走」。這條路不卡在「感覺不好」那一站。\n\n你之所以能做到這件事，可能跟你的成長經驗有關。也許你在犯錯的時候，身邊有人對你說的是「這個行為不好」而不是「你這個人不好」。這讓你的大腦學會了把「我」和「我做的事」分開。\n\n覺察邀請：你的模式很健康。但留意一件事：在台灣的面子文化裡，有時候你可能需要幫身邊的人也區分內疚和羞愧。當你的朋友因為犯錯而覺得「我是一個很糟的人」的時候，你可以提醒他：「你做了一件不太好的事。但你還是你。」',
    oil:'佛手柑 2 滴＋薰衣草 2 滴＋甜橙 1 滴。這是保養配方。佛手柑維持你對自己的溫柔。薰衣草讓你的神經系統保持穩定。甜橙是你跟自己之間的溫暖連結。',
    quote:'你知道怎麼對自己說「這件事我做錯了」但不加上「所以我很爛」。這是很少人有的能力。'},
  intShame_mild:{name:'內在批評者',icon:'🗣️',sub:'你心裡住了一個對你很嚴格的聲音',
    keys:['自我苛責','完美標準','冒牌者感'],
    desc:'你的自責模式以內在羞愧為主，程度溫和。你心裡有一個聲音，它很嚴格、很挑剔、從來不滿意。你做了90分的事，它會說「還差10分」。你被稱讚了，它會說「他們不知道真正的你」。這個聲音不是你的敵人，它一開始是想幫你變更好。但它的方法是貶低你而不是鼓勵你。',
    detail:'內在批評者通常是在童年時期被「安裝」的。也許是父母的高標準、也許是老師的嚴厲評價、也許是一次被嘲笑的經驗。你的大腦把那些外部的聲音內化了，變成了自己對自己說話的方式。\n\n在台灣的文化裡，這特別常見。「虛心使人進步」「做人要謙卑」這些觀念讓你覺得對自己嚴格是美德。但對自己嚴格和對自己殘忍是兩回事。你的內在批評者不是在幫你進步，它是在用羞愧感控制你。\n\n好消息是你的內在羞愧還在溫和的範圍。你能辨識出那個聲音，偶爾也能不被它影響。\n\n覺察邀請：下次那個聲音出現的時候，給它取一個名字。「喔，是小明又來了」。把它從「我的想法」變成「一個角色的台詞」。你就能跟它拉開一點距離。',
    oil:'薰衣草 2 滴＋天竺葵 2 滴＋乳香 1 滴。薰衣草安撫那個嚴厲的聲音。天竺葵讓你對自己的態度從苛責回到平衡。乳香幫你找到一個比那個聲音更深的自己。',
    quote:'你心裡那個聲音很大聲。但那不是你。那是你小時候學會的一段錄音。你可以按暫停。'},
  intShame_mod:{name:'自我撕裂者',icon:'🪞',sub:'你看著鏡子的時候，看到的不是自己，是所有你覺得不夠好的地方',
    keys:['深層自我否定','反覆反芻','情感麻痺'],
    desc:'你的內在羞愧已經不只是一個「聲音」了，它變成了一個「世界觀」。你大部分時候都覺得自己不夠好。不夠聰明、不夠漂亮、不夠努力、不夠值得。這個感覺滲透在你的日常裡。你可能表面上過得不錯，但心裡一直有一塊地方在說：「如果他們知道真正的我，他們就不會喜歡我了。」',
    detail:'這個程度的內在羞愧通常跟早期經驗有很深的關聯。不一定是「大事件」，很多時候是累積的。一次又一次的「你怎麼這麼笨」「你看看人家」「你讓我很失望」。每一次都像在你的自我價值上劃一道小傷口。單獨一道不會怎樣，但幾百道加起來就成了一個你無法忽視的傷疤。\n\n在台灣的面子文化裡，這種羞愧會被放大。因為你的價值不只是你自己定義的，還有家族的期待、社會的標準、別人的眼光。你背的不只是自己的羞愧，還有「你代表了你的家庭」的壓力。\n\n覺察邀請：今天找一面鏡子。看著自己的眼睛。不用微笑。只是看。然後對自己說：「你夠好了。不是因為你做了什麼，是因為你就是你。」也許你不相信。那就先假裝相信。重複說幾次。讓那句話進到身體裡。如果眼淚掉了，讓它掉。那是你一直沒有聽到的話。',
    oil:'乳香 2 滴＋玫瑰 1 滴＋薰衣草 2 滴。乳香連結你最深層的自我價值。玫瑰是你對自己的一份溫柔，你很少給自己的那種。薰衣草安撫那些反覆撕裂你的想法。',
    quote:'你在鏡子裡看到的不是真相。真相是：你比你以為的完整得多。'},
  intShame_sev:{name:'羞愧風暴',icon:'🌑',sub:'你的羞愧已經不是一個想法了，它變成了你呼吸的空氣',
    keys:['存在性羞愧','自我厭惡','無法接受善意'],
    desc:'你的內在羞愧非常強烈。它不是偶爾出現的念頭，它是你的預設狀態。你不覺得自己做了什麼壞事，你覺得自己的「存在」本身就是一個問題。別人對你好的時候你會困惑甚至害怕，因為你覺得自己不配。被稱讚讓你不安，被關心讓你想逃，被愛讓你覺得那一定是誤會。',
    detail:'存在性羞愧是羞愧最深的形式。它不再是「我做了壞事所以我不好」，而是「我不需要做任何事就已經不好了」。這種程度的羞愧通常來自非常早期的經驗，可能是嬰兒時期的忽視、成長過程中持續的否定、或者是一個讓你覺得「我的存在是多餘的」的環境。\n\n這很痛。而且因為它太深了，你可能已經習慣了。你以為「覺得自己不夠好」就是正常的，因為你從來沒有體驗過其他的可能。你把羞愧當成了空氣，你已經不覺得它在了，但它一直在影響你的每一個決定、每一段關係。\n\n覺察邀請：你值得被專業的人陪伴。這不是你一個人用覺察就能走出來的。如果你願意，找一個你信任的專業陪伴者。不是因為你有問題，是因為你的痛值得被好好看見。安心專線 1925。你在的話就好。',
    oil:'檀香 2 滴＋乳香 2 滴＋薰衣草 1 滴。這不是修復你的配方，是陪你的。檀香讓你感覺到自己的身體，你還在這裡。乳香在你最深的地方點一盞小小的燈。薰衣草告訴你的神經系統：你可以休息了。',
    quote:'你的羞愧不是真相。它是你學來的一副很重的盔甲。你可以把它脫下來。慢慢來。'},
  extShame_mild:{name:'面子偵測器',icon:'📡',sub:'你的雷達一直在掃描別人怎麼看你',
    keys:['在意他人評價','形象管理','社交焦慮'],
    desc:'你的自責模式以外在羞愧為主，程度溫和。你很在意別人怎麼看你。不是虛榮，是你的自我價值有一部分建立在「別人的眼光」上。你出門前會照很久的鏡子，發文前會反覆修改，說了什麼話回家會反覆回想。你的腦袋裡有一個即時的「社交評分系統」，一直在計算你在別人心目中的分數。',
    detail:'外在羞愧跟台灣文化有很深的關聯。面子文化讓「被別人怎麼看」變成一件攸關生存的事。你爸媽可能不會說「你這樣做不好」，他們會說「人家會怎麼看」。這讓你的羞愧感不是來自內在的自我評價，而是來自你想像中別人的評價。\n\n溫和程度的外在羞愧其實是一種社交智慧。你很會讀空氣、很會維護關係、很會讓場面不尷尬。但問題是你做這些事的動力不是「我想要」，而是「我怕別人怎麼想」。當恐懼是驅動力的時候，你會活得很累。\n\n覺察邀請：這週做一件「別人可能覺得奇怪但你想做」的事。不用很大。穿一件跟你平常風格不同的衣服。在社群上發一則你通常不會發的感想。讓你的大腦體驗一次：別人的目光不會殺死你。',
    oil:'佛手柑 2 滴＋迷迭香 2 滴＋薰衣草 1 滴。佛手柑降低你的社交焦慮。迷迭香幫你回到自己的判斷而不是別人的判斷。薰衣草讓你在不完美的時候也能放鬆。',
    quote:'別人的目光是一面鏡子。但你不需要每一面鏡子都照。'},
  extShame_mod:{name:'面具匠人',icon:'🎭',sub:'你打造了一個完美的形象，但在面具後面快要窒息了',
    keys:['表裡落差','持續表演','真我藏匿'],
    desc:'你的外在羞愧已經讓你養成了一種生存策略：戴面具。你在不同的場合有不同的面具。在公司是能幹的那個、在朋友面前是有趣的那個、在家人面前是乖巧的那個。每一個面具都維護得很好，但面具底下的那個你，已經很久沒有被任何人看到了。',
    detail:'面具匠人的底層邏輯是：「如果我展現真正的自己，我會被拒絕。」這個信念來自你過去的經驗。也許你曾經展現過真正的自己，然後被嘲笑了、被否定了、被忽視了。你的結論是：真正的我不夠好，我需要一個更好的版本。\n\n在台灣社會裡，這種模式被高度鼓勵。「在外面要有樣子」「不要讓人看笑話」「家醜不可外揚」。你被教導要管理形象，但沒有人教你怎麼在面具底下呼吸。\n\n長期下來，你可能已經分不清楚哪個是面具、哪個是你了。如果有人問你「你到底想要什麼」，你可能會愣住。因為你太久沒有問過自己這個問題了。\n\n覺察邀請：找一個你覺得最安全的人。跟他說一件「你從來沒有告訴過別人」的事。不用很大，一個小秘密就好。讓面具裂開一條縫，看看陽光照進來的時候你的感覺是什麼。',
    oil:'玫瑰 1 滴＋天竺葵 2 滴＋檀香 2 滴。玫瑰幫你看到面具底下的那個人。天竺葵讓「表演」和「真我」之間的落差不那麼痛。檀香連結你跟最原始的自己。',
    quote:'你的面具做得很好。但面具底下的那個人，也值得被看見。'},
  extShame_sev:{name:'透明人',icon:'👁️',sub:'你覺得所有人都看穿你了，而他們看到的東西很糟糕',
    keys:['極度社交恐懼','被凝視的恐懼','公開曝光感'],
    desc:'你的外在羞愧非常強烈。你覺得自己是透明的，別人一看就知道你不行、你不好、你是假的。你走進一個房間的時候，會覺得所有人都在看你、在評判你、在看穿你的偽裝。你的身體在公開場合會緊縮、心跳加速、手心冒汗，因為你的神經系統把「被看到」等同於「被攻擊」。',
    detail:'這個程度的外在羞愧已經不只是「在意別人怎麼看」了，它更接近一種被凝視的恐懼。你的神經系統把「他人的目光」處理成一種威脅。這可能跟你過去被公開羞辱、被當眾批評、或者在群體中被排擠的經驗有關。\n\n在台灣的校園和職場文化裡，這種經驗並不罕見。被老師在全班面前罵、被同學的笑聲淹沒、被家人在親戚面前比較。每一次公開的羞辱都在告訴你的身體：「被看見是危險的。」\n\n覺察邀請：你的恐懼是真實的，但「所有人都在看你」不是真的。大部分人其實太忙了，忙著擔心自己被別人怎麼看。如果這個感覺嚴重影響了你的日常生活，專業的陪伴可以幫助你。安心專線 1925。',
    oil:'薰衣草 3 滴＋岩蘭草 2 滴。薰衣草是你的安全毯。岩蘭草把你從「所有人都在看我」的恐慌裡拉回腳底。先回到身體。先感覺腳踩在地上。其他的慢慢來。',
    quote:'你覺得所有人都在看你。但你不需要他們的允許才能存在。你已經在這裡了。'},
  guilt_intShame:{name:'修復型自責者',icon:'🔧',sub:'你想修好事情，但內在的聲音一直說你修不好',
    keys:['想行動又自我懷疑','修復意願vs能力感低'],
    desc:'你同時有健康內疚和內在羞愧。你犯錯之後的第一反應是想修復，但緊接著第二個聲音就會說：「你修什麼修，你就是這麼差勁。」你知道該道歉，但你怕道歉了對方會覺得你更差。你知道該改進，但你覺得改了也沒用，因為你本質上就有問題。修復的意願和自我懷疑在你心裡拉扯。',
    detail:'這種模式在高自我要求的人身上很常見。你有一套很高的道德標準（所以你會內疚），同時你也有一個很嚴格的自我評價系統（所以你會羞愧）。你想做一個好人，但你不相信自己做得到。\n\n在台灣的教育環境裡，這很常見。你被教導要「知錯能改」（內疚系統），但你同時也被教導「你怎麼又犯錯了」（羞愧系統）。兩個系統同時運作，你就卡在中間了。\n\n覺察邀請：下次犯錯的時候，先只做一件事：修復行為。道歉就道歉，改正就改正。不要在修復的過程中同時跟自己的自我價值辯論。先做，做完再想。讓「修復」的行為去覆蓋「我不行」的念頭。',
    oil:'佛手柑 2 滴＋迷迭香 2 滴＋薰衣草 1 滴。佛手柑降低你的羞愧閾值。迷迭香讓你的「修復模式」不被自我懷疑干擾。薰衣草在你修好事情之後說：「你做到了。」',
    quote:'你想修好事情的心是真的。那個說你修不好的聲音是假的。去修吧。'},
  intShame_extShame:{name:'雙面鏡囚',icon:'🪞',sub:'對內你覺得自己不夠好，對外你覺得別人也覺得你不夠好',
    keys:['內外夾擊','無處可逃','全方位自我否定'],
    desc:'你同時受到內在羞愧和外在羞愧的影響。你自己覺得自己不好（對內），同時你也覺得別人認為你不好（對外）。你被困在兩面鏡子中間，不管往哪邊看，看到的都是你不想看到的自己。你沒有一個可以逃的方向，因為連你自己都不站在你這邊。',
    detail:'這是最消耗能量的羞愧模式。因為你沒有「安全地帶」。通常，如果只有內在羞愧，你至少可以在外面得到一些肯定來平衡。如果只有外在羞愧，你至少可以在心裡知道「我其實沒那麼差」。但當兩個同時存在的時候，你找不到任何一個角度是對自己好的。\n\n在台灣的文化脈絡裡，這種模式跟「家族期待」和「社會比較」有很深的關聯。你不只是你自己，你還代表了你的家庭。你的羞愧不只是個人的，是系統性的。\n\n覺察邀請：你現在最需要的是一個「即使看到你全部的樣子也不會離開」的人。不管是朋友、伴侶、還是專業的陪伴者。讓一個人看到你覺得最不好的部分。然後觀察：他還在嗎？如果他還在，那面鏡子就裂開了一條縫。光會從那裡進來。安心專線 1925。',
    oil:'乳香 2 滴＋玫瑰 1 滴＋薰衣草 2 滴。乳香在你最暗的地方點一盞燈。玫瑰是你很久沒有收到的溫柔。薰衣草讓你的身體記住一件事：你可以休息了。不用再跑了。',
    quote:'兩面鏡子裡的你都不是全部的你。有一個你是鏡子照不到的。那個你值得被愛。'}
};
let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 題 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一題</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一題 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看看我的自責模式 🪞</button>')+'</div>';area.appendChild(card);});updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 題，共 '+questions.length+' 題';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const dimScores={};Object.keys(DIMS).forEach(k=>{dimScores[k]=0;});
  Object.keys(answers).forEach(qi=>{const oi=answers[qi];const s=questions[qi].opts[oi].s;Object.keys(s).forEach(d=>{dimScores[d]+=s[d];});});
  const maxPossible=Object.keys(answers).length*3;
  const g=dimScores.guilt,is=dimScores.intShame,es=dimScores.extShame;
  let topType;
  if(g>is&&g>es) topType='healthy';
  else if(is>es*1.3&&is>g){
    if(is>30) topType='intShame_sev';
    else if(is>18) topType='intShame_mod';
    else topType='intShame_mild';
  } else if(es>is*1.3&&es>g){
    if(es>30) topType='extShame_sev';
    else if(es>18) topType='extShame_mod';
    else topType='extShame_mild';
  } else if(g>0&&is>es&&is>=g) topType='guilt_intShame';
  else if(is>0&&es>0&&is<=es*1.3&&es<=is*1.3) topType='intShame_extShame';
  else if(is>=es) topType='intShame_mild';
  else topType='extShame_mild';
  if(!TYPES[topType]) topType='intShame_mild';
  const f=TYPES[topType];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('hlTitleReveal').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥靈之鑰</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-quote">「'+f.quote+'」</div><div class="ss-footer">hourlightkey.com ✦ </div></div><div class="hl-title-card"><div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div><div class="hl-title-eyebrow">Hour Light ✦ 內疚vs羞愧覺察</div><span class="hl-title-icon">'+f.icon+'</span><div class="hl-title-main">'+f.name+'</div><div class="hl-title-sub">'+f.sub+'</div><div class="hl-title-divider"></div><div class="hl-title-grid"><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 自責模式</div><div class="hl-title-tag-value">'+f.name+'</div></div><div class="hl-title-tag" style="grid-column:1/-1"><div class="hl-title-tag-label">✦ 覺察關鍵字</div><div class="hl-title-tag-value">'+f.keys.join(' · ')+'</div></div></div><div class="hl-title-quote">「'+f.quote+'」</div><div class="hl-title-combo-hint">'+f.name+'｜'+f.sub+'</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">內疚vs羞愧覺察 Guilt vs Shame</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  const sorted=Object.keys(DIMS).sort((a,b)=>dimScores[b]-dimScores[a]);
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var pct=Math.round(dimScores[k]/maxPossible*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+DIMS[k]+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">'+f.icon+' 你的自責模式</div><div class="result-section-content">'+f.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度覺察</div><div class="result-section-content">'+f.detail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🌿 認知芳療配方</div><div class="result-section-content">'+f.oil+'</div></div><div class="result-section" style="text-align:center;font-family:LXGW WenKai TC,serif;font-size:1.05rem;color:#8b6914"><div class="result-section-content"></div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ H.O.U.R. 覺察橋接</div><div class="hour-bridge-text">你的自責模式是「情緒層的你」，馥靈秘碼看的是「設定層的你」。<br>當你知道自己的羞愧從哪裡來，你才能決定要不要繼續扛著它。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免費解碼馥靈秘碼 →</a>';
  window._resultText=f.icon+' 我是「'+f.name+'」！'+f.sub+'\n「'+f.quote+'」\n\n你的自責是哪一種？👉 hourlightkey.com/quiz-guilt-shame.html';
  try{localStorage.setItem('hl_quiz_guilt_shame',JSON.stringify({type:topType,dimScores,ts:Date.now()}));}catch(e){}
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_dropMaterial) HL_dropMaterial('quiz');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz',toolName:'內疚vs羞愧識別器'});window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
</script>
