  pastPos:{name:'溫暖回望者',icon:'🕯️',sub:'你的根扎在回憶的土壤裡，從過去汲取養分',
    keys:['傳統','感恩','連結感'],hour:'H（Heal 身心校準）',
    desc:'你跟過去的關係是溫暖的。那些老照片、舊歌、已經搬走的老家，在你心裡都有一個專屬的位置。你重視傳統、重視承諾、重視那些跟你一起走過的人。過去對你來說不是負擔，是根。你的幸福感有很大一部分來自「回味」。吃到某道菜想起某個人，聽到某首歌想起某段日子，你會覺得：「啊，我的人生是有重量的。」',
    detail:'Zimbardo的研究顯示，過去正向型的人通常有較高的生活滿意度和較穩定的人際關係。你之所以能從回憶裡感受到溫暖，代表你的記憶系統擅長保留正面經驗。這是一種天賦。\n\n但過去正向的風險在於「美化」。你可能記住了那段關係裡的好，忘了它為什麼結束。你可能留戀以前的工作環境，卻忽略了你是自己辭職的。回憶是有濾鏡的，你的濾鏡偏暖。\n\n另一個風險是「抗拒變化」。當你太依賴過去的美好，現在的任何改變都會讓你不安。新的城市不如老家、新朋友不如老朋友、現在的自己不如以前的自己。你的時間感停在一個黃金時代，而那個時代回不去了。\n\n覺察邀請：這週找一件「以前不會做的新事」去試試。不是要你放棄回憶，是讓你的時間感往前流動。過去可以是根，但不要變成錨。',
    oil:'檀香 2 滴＋甜橙 2 滴＋佛手柑 1 滴。檀香連結你的根，讓那份溫暖感踏實。甜橙把你從回憶裡帶回到「此刻也很好」。佛手柑讓你對新經驗保持開放。',
    med:'閉上眼睛。想像你手裡捧著一盞溫暖的小燈。那盞燈裡裝著你最珍貴的回憶。吸氣四秒，感覺它的溫度。吐氣六秒。現在把這盞燈輕輕放在身後。吸氣四秒，看看前面。前面也有光。吐氣六秒。對自己說：「過去的美好不會消失，而前面還有新的在等。」張開眼睛。',
    quote:'你的回憶是一座花園。繼續澆水，但也記得往前面的空地種點新的。'},
  pastNeg:{name:'時光困獸',icon:'🔗',sub:'你的時鐘停在了某一天，一直在那裡繞圈',
    keys:['反芻','自責','難以放下'],hour:'H（Heal 身心校準）',
    desc:'你跟過去的關係是糾纏的。不是所有過去都痛，但那些痛的部分太大聲了，蓋過了其他所有聲音。你會反覆回想某段關係裡自己做錯的事、某次機會自己沒把握住的遺憾、某句話說出口的瞬間。你知道「過去了就過去了」，你也知道「往前看」，但你的內在時鐘不聽話。它一直停在那一天。',
    detail:'反芻思維是過去負向型最核心的特徵。你的大腦會自動把過去的負面事件拿出來「重播」，而且每次重播的時候，身體的感覺也會跟著重新來一次。心跳加速、胸口悶、眼眶發熱。與其說在「想」過去，不如說你在「重新經歷」過去。\n\n這種模式通常有兩個來源。一種是真正經歷過重大的挫折或傷害，記憶還沒有被好好處理。另一種是你的自我評價系統把「犯錯」等同於「我很糟」，所以每一次回想都在強化「我果然不夠好」的信念。\n\n讓這個模式更難的是：你知道自己在繞圈，但停不下來。就像手機後台跑了一個你關不掉的App，一直耗電。你累不是因為現在發生了什麼，是因為你一直在跑昨天的程式。\n\n覺察邀請：下次回想起那件事的時候，不要叫自己「不要想」。這不管用。改成問自己：「這件事裡面，有什麼是我已經學到的？」把反芻變成提取。同樣是回頭看，一個是困住，一個是取經。',
    oil:'乳香 2 滴＋薰衣草 2 滴＋佛手柑 1 滴。乳香幫你跟過去的自己和解。薰衣草讓那些反覆重播的畫面安靜下來。佛手柑是一道光，讓你看到回憶的出口不只是那個入口。',
    med:'坐下來。閉上眼睛。想像那件一直在你腦海裡回放的事情。這一次不要推開它。吸氣四秒，讓它在那裡。吐氣六秒，對那段記憶說：「我看到你了。」吸氣四秒，問它：「你想告訴我什麼？」吐氣六秒，聽。不管聽到什麼。第四次呼吸，對自己說：「那個時候的我，已經盡力了。」張開眼睛。',
    quote:'你不需要忘記。你需要的是允許自己把那件事放在一個可以走開的地方。'},
  preHed:{name:'此刻冒險家',icon:'🌊',sub:'你活在一個永恆的「現在」，每一刻都是新的',
    keys:['即時滿足','感官享受','自由奔放'],hour:'U（Unlock 潛能解鎖）',
    desc:'你跟時間的關係是「現在」。過去的事情不太回頭，未來的事情不太操心，你要的是這一秒的感受。你吃東西講究味道、旅行講究體驗、選擇人際關係講究「跟這個人在一起的時候我舒不舒服」。你的人生像衝浪，站在浪頭上，不知道下一波是什麼，但你不怕。',
    detail:'當下享樂型在Zimbardo的框架裡有一個很有趣的特徵：你的多巴胺系統可能比一般人活躍。你對新刺激的反應更強烈，對延遲滿足的容忍度更低。這不是缺陷，這是你的神經系統讓你活得更鮮活的方式。你真的能「品嚐」到這一刻的美好，不是每個人都做得到。\n\n但當下享樂的風險你大概也感覺到了：後果。今天的快樂可能是明天的麻煩。刷了那筆不該刷的卡、喝了那杯不該喝的酒、答應了那個不該答應的承諾。後果你心裡清楚，只是在決策的當下，「現在」的聲音太大了，「以後」的聲音聽不見。\n\n另一個隱藏的風險：你可能一直在用「享樂」來逃避某些你不想面對的事。如果你把每一個安靜的空檔都填滿了娛樂、社交、刺激，問問自己：我在跑的是什麼？\n\n覺察邀請：今天找十分鐘什麼都不做、不滑手機、不聽音樂。就坐著。讓安靜進來。看看那個安靜裡面住著什麼。',
    oil:'薄荷 2 滴＋迷迭香 2 滴＋檸檬 1 滴。薄荷維持你的「活著」的感覺。迷迭香幫你的前額葉多想一步。檸檬在享樂裡加入一點清醒。不是要你停止享受，是讓享受帶著一點覺察。',
    med:'站著。赤腳。閉上眼睛。感覺腳底踩在地板上。吸氣四秒，感覺空氣進入鼻腔。吐氣六秒，感覺空氣從嘴巴出去。你很會感受「現在」。這一次，在「現在」裡面多留一秒。吸氣四秒，問自己：「我現在的感覺從哪裡來？」吐氣六秒。不用回答，感覺就好。張開眼睛。',
    quote:'你比任何人都會活在當下。只是偶爾抬頭看一眼前面的路，不會讓你的浪變小。'},

    desc:'你跟時間的關係是被動的。不是不想努力，是你看不到努力的意義。過去的經驗讓你覺得很多事情不是你能控制的，未來也一樣。你可能不會主動去爭取什麼，不會花太多力氣做計畫，因為你心裡有一個聲音一直在說：「反正到頭來都一樣。」這不是懶，是你對「我的行動能改變結果」這件事，已經失去信心了。',
    detail:'心理學裡有一個概念叫「習得無助」，說的就是當一個人反覆經歷「我做什麼都沒有用」的情境，最後他會停止嘗試。不是因為學會了什麼，是因為「嘗試」這件事跟「成功」之間的連結被切斷了。\n\n宿命型的時間觀通常跟成長經驗有關。如果你在一個「你的意見不重要」的環境裡長大，或者你的人生裡有過太多「我很努力了但結果還是很差」的經驗，你的大腦就會開始節省資源，不再投入期待。\n\n你可能會覺得這樣也沒什麼不好，至少不會失望。但代價是你把自己的人生交給了「命運」來操控。你不做選擇，選擇就會替你做。到頭來你過的不是你的人生，是被環境推著走的人生。\n\n覺察邀請：今天做一件「你選的」事。不用大，買一杯你自己挑的飲料、走一條你自己決定的路。讓你的大腦重新感受「我選了，然後有一個屬於我的結果」。',

    med:'躺著或坐著。吸氣四秒，不用想任何事。吐氣六秒。重複兩次。然後想像你面前有一條路。路的盡頭你看不清楚。吸氣四秒，踏出一步。就算看不清楚也沒關係。吐氣六秒，再踏一步。對自己說：「我不需要知道結局才能開始走。」踏第三步。張開眼睛。',

  future:{name:'藍圖建築師',icon:'🗺️',sub:'你的眼睛永遠看著前面，腳下的風景常常忘了看',

let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';
    const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 題 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一題</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一題 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看看我的時間人格 ⏳</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 題，共 '+questions.length+' 題';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const dimScores={};Object.keys(DIMS).forEach(k=>{dimScores[k]=0;});
  Object.keys(answers).forEach(qi=>{const oi=answers[qi];const s=questions[qi].opts[oi].s;Object.keys(s).forEach(d=>{dimScores[d]+=s[d];});});
  const maxPossible=Object.keys(answers).length*3;
  const sorted=Object.keys(DIMS).sort((a,b)=>dimScores[b]-dimScores[a]);
  const top=sorted[0],sec=sorted[1];
  const t1=dimScores[top],t2=dimScores[sec];
  let topType;
  if(t1>t2*1.4) topType=top;
  else{
    const combo={
      'pastPos_preHed':'pastPos_preHed','preHed_pastPos':'pastPos_preHed',
      'pastNeg_preFat':'pastNeg_preFat','preFat_pastNeg':'pastNeg_preFat',
      'pastPos_future':'future_pastPos','future_pastPos':'future_pastPos',
      'preHed_future':'preHed_future','future_preHed':'preHed_future'
    };
    const key=top+'_'+sec;
    topType=combo[key]||top;
  }
  if(!TYPES[topType]) topType=top;
  const f=TYPES[topType];
  const pureKeys=Object.keys(DIMS);
  const secType=TYPES[pureKeys.filter(k=>k!==sorted[0]).sort((a,b)=>dimScores[b]-dimScores[a])[0]];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('hlTitleReveal').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥靈之鑰</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-quote">「'+f.quote+'」</div><div class="ss-footer">hourlightkey.com ✦ </div></div><div class="hl-title-card"><div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div><div class="hl-title-eyebrow">Hour Light ✦ 時間視角覺察</div><span class="hl-title-icon">'+f.icon+'</span><div class="hl-title-main">'+f.name+'</div><div class="hl-title-sub">'+f.sub+'</div><div class="hl-title-divider"></div><div class="hl-title-grid"><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 時間人格</div><div class="hl-title-tag-value">'+f.name+'</div></div><div class="hl-title-tag"><div class="hl-title-tag-label">✦ H.O.U.R. 對應</div><div class="hl-title-tag-value">'+f.hour+'</div></div><div class="hl-title-tag" style="grid-column:1/-1"><div class="hl-title-tag-label">✦ 覺察關鍵字</div><div class="hl-title-tag-value">'+f.keys.join(' · ')+'</div></div></div><div class="hl-title-quote">「'+f.quote+'」</div><div class="hl-title-combo-hint">'+f.name+'｜'+f.sub+'</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">時間視角覺察 Time Perspective</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var pct=Math.round(dimScores[k]/maxPossible*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+DIMS[k]+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
