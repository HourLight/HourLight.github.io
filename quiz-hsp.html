<script>
const questions=[
  {q:'別人沒注意到的細微聲音（冷氣、時鐘、遠處的車），你都聽得到。'},
  {q:'太亮的燈光或太吵的環境會讓你想逃。'},

  {q:'你會被音樂、藝術或大自然深深觸動到想哭。'},
  {q:'你對衣服的材質很挑剔，有些布料你完全不能穿。'},
  {q:'你在人多的地方待太久會頭痛、疲憊或暴躁。'},
  {q:'你對食物的味道和口感比身邊的人敏銳。'},
  {q:'你很容易察覺到一個空間的「氣場」——走進去就知道剛才有人吵架。'},
  {q:'別人覺得「還好」的壓力，對你來說可能已經很重了。'},
  {q:'你做決定時會考慮到非常多細節和可能性，所以比較慢。'},
  {q:'你的內心對話很豐富，腦子很少真正安靜。'},
  {q:'你對季節變化、天氣、氣壓的感受特別明顯。'},
  {q:'你常常需要在社交場合之後「修復」自己。'},
  {q:'你小時候就常被說「你太敏感了」「想太多了」。'},
  {q:'你比一般人更容易被香氣或臭味影響心情。'},
];

const likertLabels=['完全不是我','大概不是','中間','大概是我','就是在說我'];
let answers={},currentQ=0;

function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}

function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const btns=[1,2,3,4,5].map(v=>`<button class="likert-btn${answers[i]===v?' selected':''}" onclick="selectAnswer(${i},${v},this)">${v}</button>`).join('');
    card.innerHTML=`<div class="quiz-q-num">第 ${i+1} 題 / ${questions.length}</div><div class="quiz-question">${qd.q}</div>
      <div class="likert-wrap"><div class="likert-labels">${likertLabels.map(l=>`<span>${l}</span>`).join('')}</div><div class="likert-row">${btns}</div></div>
      <div class="quiz-nav">${i>0?`<button class="btn-prev" onclick="goTo(${i-1})">← 上一題</button>`:'<span></span>'}${i<questions.length-1?`<button class="btn-next" id="btnNext-${i}" ${answers[i]===undefined?'disabled':''} onclick="goTo(${i+1})">下一題 →</button>`:`<button class="btn-next" id="btnNext-${i}" ${answers[i]===undefined?'disabled':''} onclick="showResult()">看我的敏感指數 🦋</button>`}</div>`;
    area.appendChild(card);
  });updateProgress(idx);
}
function selectAnswer(qi,v,btn){answers[qi]=v;document.getElementById('qcard-'+qi).querySelectorAll('.likert-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent=`第 ${idx+1} 題，共 ${questions.length} 題`;document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}

function showResult(){
  let total=0;questions.forEach((_,i)=>{total+=(answers[i]||3);});
  const pct=Math.round((total-20)/80*100);
  const level=pct>=75?'high':pct>=45?'mid':'low';
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';

  const titles={
    high:{icon:'🌟',title:'水晶感應者',sub:'你的城堡感應器靈敏到極致。別人還沒走進來，你已經感覺到他的存在了。',castle:'休憩塔（H 區）',hour:'Heal ✦ 身心校準',oil:'洋甘菊 · 薰衣草',quote:'你不是太敏感。你只是能感受到這個世界比較多的層次。'},
    mid:{icon:'🌿',title:'溫和感知者',sub:'你的天線有開有關，知道什麼時候該接收，什麼時候該休息。',castle:'覺察廳（O 區）',hour:'Own ✦ 智慧辨識',oil:'佛手柑 · 天竺葵',quote:'你有足夠的感受力去理解這個世界，也有足夠的厚度保護自己。'},
    low:{icon:'🏔️',title:'磐石行者',sub:'你的城堡牆壁很厚，外面的風雨不太影響你。你的穩定是別人的依靠。',castle:'王座塔（R 區）',hour:'Rise ✦ 行動進化',oil:'迷迭香 · 黑胡椒',quote:'你不容易被動搖，這在這個過度敏感的時代是一種珍貴的力量。'}
  };
  const results={
    high:{name:'高敏感族群（HSP）',sub:'你的感官世界比大多數人都豐富',desc:'你的感官天線全部開到最大。聲音、光線、氣味、情緒、氣場——你同時接收的訊息量是一般人的好幾倍。這不是軟弱，這是你的神經系統本來就設計成這樣的。全球大約 15-20% 的人口是高敏感族群，你不是異類。',shadow:'你最大的課題是「保護你的能量」。你需要比一般人更刻意地安排獨處時間、遠離過度刺激、以及學會說「我今天需要安靜一下」而不覺得愧疚。',bridge:'你的高敏感讓你跟馥靈之鑰的「認知芳療」特別合拍。你的鼻子、你的皮膚、你的身體，都是你最強大的覺察工具。精油對你的影響比一般人深得多。'},
    mid:{name:'中度敏感',sub:'你是感受力和穩定度的平衡者',desc:'你有足夠的感受力來理解別人、感知細節，但不會被過度刺激輕易擊倒。你在敏感和鈍感之間找到了一個不錯的位置。',shadow:'你的課題是：在壓力特別大的時候，你的敏感度會暫時升高。學會辨識「我今天比較敏感」，然後給自己多一點空間。',bridge:'你的平衡感讓你適合 Own（智慧辨識）的修練。馥靈之鑰的牌卡，幫你在不同狀態下都能保持覺察。'},
    low:{name:'低敏感穩定型',sub:'你的神經系統像一座堡壘',desc:'外在的干擾不太容易影響你。你在吵雜的環境中依然能專注，別人的情緒不會輕易傳染到你身上。這是非常實用的特質，但也要小心別因此忽略了自己和別人的感受。',shadow:'你的課題是：有時候身邊的人需要你「多感受一點」。你的穩定是優勢，但偶爾也需要主動問問自己：「我真的沒感覺，還是我把感覺關掉了？」',bridge:'你的 Rise（行動進化）能力很強，但 Heal（身心校準）可能是你比較陌生的領域。馥靈之鑰的精油體驗，幫你慢慢打開那些被關掉的感官頻道。'}
  };
