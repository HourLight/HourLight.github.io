<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>逸君的大腦</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #06040e;
  --bg-card: rgba(16,12,28,0.97);
  --gold: #f8dfa5;
  --gold-deep: #e9c27d;
  --gold-dim: rgba(248,223,165,0.15);
  --text: rgba(255,255,255,0.88);
  --text-muted: rgba(255,255,255,0.45);
  --border: rgba(248,223,165,0.15);
  --purple: rgba(160,124,220,0.8);
  --user-bubble: rgba(160,124,220,0.12);
  --ai-bubble: rgba(248,223,165,0.06);
  --font-serif: "Noto Serif TC", serif;
  --font-sans: "Noto Sans TC", sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 15px;
  line-height: 1.7;
  overflow: hidden;
}

/* 設定畫面 */
#setupScreen {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
.setup-box {
  text-align: center;
  padding: 48px 40px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  max-width: 380px;
  width: 90%;
}
.setup-title {
  font-family: var(--font-serif);
  font-size: 1.5rem;
  color: var(--gold);
  margin-bottom: 6px;
  letter-spacing: .06em;
}
.setup-sub {
  font-size: 0.82rem;
  color: var(--text-muted);
  margin-bottom: 28px;
}
.setup-label {
  font-size: 0.82rem;
  color: var(--text-muted);
  text-align: left;
  margin-bottom: 6px;
  display: block;
}
.setup-input {
  width: 100%;
  padding: 12px 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 0.9rem;
  outline: none;
  margin-bottom: 20px;
  transition: border-color .2s;
}
.setup-input:focus { border-color: rgba(248,223,165,0.4); }
.setup-input::placeholder { color: var(--text-muted); }
.btn-enter {
  width: 100%;
  padding: 13px 20px;
  background: linear-gradient(135deg, #c9a060, #a8813c);
  border: none;
  border-radius: 12px;
  color: #1a1208;
  font-size: 0.92rem;
  font-family: var(--font-sans);
  font-weight: 700;
  cursor: pointer;
  transition: all .25s;
  letter-spacing: .04em;
}
.btn-enter:hover { opacity: 0.9; transform: translateY(-1px); }
.setup-hint {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 14px;
  line-height: 1.6;
}
#setupError {
  font-size: 0.78rem;
  color: #c97070;
  margin-top: 10px;
  display: none;
}

/* 主介面 */
#appScreen {
  display: none;
  flex-direction: column;
  height: 100vh;
}

.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px 12px;
  border-bottom: 1px solid var(--border);
  background: rgba(6,4,14,0.95);
  flex-shrink: 0;
}
.top-brand {
  font-family: var(--font-serif);
  font-size: 1rem;
  color: var(--gold);
  letter-spacing: .08em;
}
.top-brand span {
  font-size: 0.72rem;
  color: var(--text-muted);
  display: block;
  font-family: var(--font-sans);
}
.btn-clear {
  padding: 6px 14px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: var(--text-muted);
  font-size: 0.78rem;
  cursor: pointer;
  transition: all .2s;
  font-family: var(--font-sans);
}
.btn-clear:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }

/* 模式列 */
.mode-bar {
  display: flex; gap: 8px; padding: 10px 20px 8px;
  background: rgba(6,4,14,0.8);
  border-bottom: 1px solid rgba(248,223,165,0.06);
  flex-shrink: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.mode-bar::-webkit-scrollbar { display: none; }
.mode-btn {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid rgba(248,223,165,0.15);
  background: transparent;
  color: var(--text-muted);
  font-size: 0.78rem;
  cursor: pointer;
  white-space: nowrap;
  transition: all .2s;
  font-family: var(--font-sans);
}
.mode-btn.active, .mode-btn:hover {
  background: var(--gold-dim);
  border-color: rgba(248,223,165,0.35);
  color: var(--gold);
}

/* 對話區 */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px;
  scroll-behavior: smooth;
}
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: rgba(248,223,165,0.15); border-radius: 2px; }

.msg-wrap { display: flex; margin-bottom: 18px; max-width: 820px; margin-left: auto; margin-right: auto; }
.msg-wrap.user { justify-content: flex-end; }
.msg-wrap.ai { justify-content: flex-start; }

.bubble {
  max-width: 78%;
  padding: 13px 17px;
  border-radius: 16px;
  font-size: 0.92rem;
  line-height: 1.75;
  white-space: pre-wrap;
  word-break: break-word;
}
.bubble.user {
  background: var(--user-bubble);
  border: 1px solid rgba(160,124,220,0.2);
  color: rgba(255,255,255,0.9);
  border-bottom-right-radius: 4px;
}
.bubble.ai {
  background: var(--ai-bubble);
  border: 1px solid var(--border);
  color: var(--text);
  border-bottom-left-radius: 4px;
}
.ai-label {
  font-size: 0.72rem;
  color: var(--gold);
  opacity: 0.6;
  margin-bottom: 6px;
  letter-spacing: .06em;
  font-family: var(--font-serif);
}

.typing-dot { display: inline-flex; gap: 4px; padding: 4px 0; }
.typing-dot span {
  width: 6px; height: 6px;
  background: var(--gold);
  border-radius: 50%;
  opacity: 0.4;
  animation: blink 1.2s infinite;
}
.typing-dot span:nth-child(2) { animation-delay: .2s; }
.typing-dot span:nth-child(3) { animation-delay: .4s; }
@keyframes blink {
  0%, 80%, 100% { opacity: 0.2; transform: scale(1); }
  40% { opacity: 0.9; transform: scale(1.2); }
}

.welcome {
  text-align: center;
  padding: 48px 20px 32px;
  max-width: 480px;
  margin: 0 auto;
}
.welcome-icon { font-size: 2.4rem; margin-bottom: 16px; }
.welcome-title {
  font-family: var(--font-serif);
  font-size: 1.3rem;
  color: var(--gold);
  margin-bottom: 10px;
  letter-spacing: .06em;
}
.welcome-desc {
  font-size: 0.84rem;
  color: var(--text-muted);
  line-height: 1.8;
  margin-bottom: 28px;
}
.quick-btns { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.quick-btn {
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--gold-dim);
  color: rgba(248,223,165,0.8);
  font-size: 0.8rem;
  cursor: pointer;
  transition: all .2s;
  font-family: var(--font-sans);
}
.quick-btn:hover {
  background: rgba(248,223,165,0.18);
  color: var(--gold);
  border-color: rgba(248,223,165,0.35);
}

/* 輸入區 */
.input-area {
  padding: 12px 16px 16px;
  background: rgba(6,4,14,0.95);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.input-wrap { display: flex; gap: 10px; align-items: flex-end; max-width: 820px; margin: 0 auto; }
textarea {
  flex: 1;
  padding: 12px 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 14px;
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 0.92rem;
  line-height: 1.6;
  resize: none;
  min-height: 48px;
  max-height: 160px;
  outline: none;
  transition: border-color .2s;
}
textarea:focus { border-color: rgba(248,223,165,0.4); }
textarea::placeholder { color: var(--text-muted); }
.btn-send {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, #c9a060, #a8813c);
  border: none;
  border-radius: 14px;
  color: #1a1208;
  font-size: 1.1rem;
  cursor: pointer;
  transition: all .2s;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.btn-send:hover { opacity: 0.9; transform: scale(1.04); }
.btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.input-hint { text-align: center; font-size: 0.72rem; color: var(--text-muted); margin-top: 8px; }

@media (max-width: 600px) {
  .bubble { max-width: 90%; font-size: 0.88rem; }
  .mode-btn { font-size: 0.74rem; padding: 4px 12px; }
}
</style>
</head>
<body>

<!-- 設定畫面 -->
<div id="setupScreen">
  <div class="setup-box">
    <div class="setup-title">逸君的大腦 ✦</div>
    <div class="setup-sub">私人 AI 引擎 — 請輸入存取金鑰</div>
    <label class="setup-label">存取金鑰（Token）</label>
    <input type="password" class="setup-input" id="tokenInput" placeholder="輸入你的 RUBY_BRAIN_TOKEN">
    <button class="btn-enter" onclick="enterBrain()">進入 →</button>
    <div id="setupError">⚠️ 金鑰錯誤，請確認後再試</div>
    <p class="setup-hint">
      金鑰請從 Vercel 環境變數<br>
      <code>RUBY_BRAIN_TOKEN</code> 取得
    </p>
  </div>
</div>

<!-- 主介面 -->
<div id="appScreen">
  <div class="top-bar">
    <div class="top-brand">
      逸君的大腦
      <span>私人 AI 引擎 v2.0 ✦ Vercel 安全模式</span>
    </div>
    <button class="btn-clear" onclick="clearChat()">清空對話</button>
  </div>

  <div class="mode-bar">
    <button class="mode-btn active" data-mode="general" data-prompt="" onclick="setMode(this)">💭 自由對話</button>
    <button class="mode-btn" data-mode="brand" data-prompt="【當前模式：品牌決策】每次回應都要過三個濾鏡：1.品牌一致性（符合座標哲學嗎）2.市場定位（跟競品的差異）3.商業可行性（對營收的影響）。如有品牌禁忌詞風險，標注「⚠️ 注意」。" onclick="setMode(this)">🔮 品牌決策</button>
    <button class="mode-btn" data-mode="content" data-prompt="【當前模式：內容創作】幫逸君發想社群內容。Threads：100字內，幽默吐槽，讓人想截圖。IG：視覺感強，收藏型。FB：深度長文。結尾一句要讓人「欸沒聽過這個角度」。不勵志，不雞湯，要有冷知識或反常識觀點。" onclick="setMode(this)">✍️ 內容創作</button>
    <button class="mode-btn" data-mode="biz" data-prompt="【當前模式：商業分析】從一人公司角度分析。考量：逸君的時間成本、Vercel Hobby 12支API限制、台灣美業市場實際情況、短期現金流vs長期品牌值。只給今天就能啟動的方案。" onclick="setMode(this)">💼 商業分析</button>
    <button class="mode-btn" data-mode="copy" data-prompt="【當前模式：文案寫作】寫馥靈之鑰文案。感性但不煽情。接地氣。馥靈馥語風格：氣味+感官+詩意+落地。主文認真，hashtag 自嘲。官方場合用「您」，對自己人用「你」。所有文案先過禁忌詞：療癒/頻率/靈魂/天生座。" onclick="setMode(this)">📣 文案寫作</button>
    <button class="mode-btn" data-mode="decision" data-prompt="【當前模式：快速決策】格式固定：✅ 建議（一句話）📌 理由（2-3點）⚠️ 最大風險（一個）🔥 立刻做（具體第一步）。不囉嗦。" onclick="setMode(this)">⚡ 快速決策</button>
    <button class="mode-btn" data-mode="line" data-prompt="【當前模式：LINE回覆】幫逸君擬回覆LINE客人的訊息。語氣親切專業，用「您」。直接給可以複製貼上的回覆文字，不需要說明。如果需要多個版本，給2-3個選項。" onclick="setMode(this)">💬 LINE回覆</button>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcomeBlock">
      <div class="welcome-icon">✦</div>
      <div class="welcome-title">王逸君，妳好</div>
      <div class="welcome-desc">
        這裡只有妳。<br>
        不需要解釋背景，不需要重複品牌規則。<br>
        直接說想法，我們一起推進。
      </div>
      <div class="quick-btns">
        <button class="quick-btn" onclick="quickAsk('我想做一個新的社群貼文，主題是')">社群貼文發想</button>
        <button class="quick-btn" onclick="quickAsk('幫我分析這個商業決策的利弊：')">商業決策分析</button>
        <button class="quick-btn" onclick="quickAsk('有客人問我：')">LINE回覆協助</button>
        <button class="quick-btn" onclick="quickAsk('幫我寫一段官網文案，主題是')">官網文案</button>
        <button class="quick-btn" onclick="quickAsk('最近遇到一個問題：')">問題梳理</button>
        <button class="quick-btn" onclick="quickAsk('我想策劃一個活動：')">活動企劃</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="userInput" placeholder="直接說想法..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-send" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
    <div class="input-hint">Enter 送出 ✦ Shift+Enter 換行</div>
  </div>
</div>

<script>
const API_URL = 'https://app.hourlightkey.com/api/chat';

let token = '';
let currentModePrompt = '';
let messages = [];
let isLoading = false;

// 進入大腦
function enterBrain() {
  const t = document.getElementById('tokenInput').value.trim();
  if (!t) {
    document.getElementById('setupError').style.display = 'block';
    document.getElementById('setupError').textContent = '⚠️ 請輸入金鑰';
    return;
  }
  token = t;
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'flex';
  document.getElementById('userInput').focus();
}

document.getElementById('tokenInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') enterBrain();
});

// 模式切換
function setMode(btn) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentModePrompt = btn.dataset.prompt || '';
}

// 快捷
function quickAsk(text) {
  const ta = document.getElementById('userInput');
  ta.value = text;
  ta.focus();
  autoResize(ta);
}

// 自動高度
function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
}

// Enter
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// 清空
function clearChat() {
  if (!confirm('清空這次對話？')) return;
  messages = [];
  const area = document.getElementById('chatArea');
  area.innerHTML = '';
  area.appendChild(buildWelcome());
}

function buildWelcome() {
  const div = document.createElement('div');
  div.id = 'welcomeBlock';
  div.className = 'welcome';
  div.innerHTML = `<div class="welcome-icon">✦</div>
    <div class="welcome-title">王逸君，妳好</div>
    <div class="welcome-desc">這裡只有妳。<br>直接說想法，我們一起推進。</div>
    <div class="quick-btns">
      <button class="quick-btn" onclick="quickAsk('我想做一個新的社群貼文，主題是')">社群貼文發想</button>
      <button class="quick-btn" onclick="quickAsk('幫我分析這個商業決策的利弊：')">商業決策分析</button>
      <button class="quick-btn" onclick="quickAsk('有客人問我：')">LINE回覆協助</button>
      <button class="quick-btn" onclick="quickAsk('幫我寫一段官網文案，主題是')">官網文案</button>
    </div>`;
  return div;
}

// 渲染訊息
function appendMsg(role, text) {
  const wb = document.getElementById('welcomeBlock');
  if (wb) wb.remove();
  const area = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;
  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  if (role === 'ai') {
    bubble.innerHTML = `<div class="ai-label">✦ 大腦</div><div class="ai-text"></div>`;
    wrap.appendChild(bubble);
    area.appendChild(wrap);
    area.scrollTop = area.scrollHeight;
    return bubble.querySelector('.ai-text');
  } else {
    bubble.textContent = text;
    wrap.appendChild(bubble);
    area.appendChild(wrap);
    area.scrollTop = area.scrollHeight;
    return null;
  }
}

function appendTyping() {
  const wb = document.getElementById('welcomeBlock');
  if (wb) wb.remove();
  const area = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ai';
  wrap.id = 'typingIndicator';
  wrap.innerHTML = `<div class="bubble ai"><div class="ai-label">✦ 大腦</div><div class="typing-dot"><span></span><span></span><span></span></div></div>`;
  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

// 送出訊息
async function sendMessage() {
  if (isLoading) return;
  const ta = document.getElementById('userInput');
  const text = ta.value.trim();
  if (!text) return;

  ta.value = '';
  autoResize(ta);
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  appendMsg('user', text);
  messages.push({ role: 'user', content: text });
  appendTyping();

  try {
    const payload = {
      messages: messages.slice(-20),
      rubyToken: token
    };
    if (currentModePrompt) payload.modePrompt = currentModePrompt;

    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-ruby-token': token
      },
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    removeTyping();

    if (!res.ok) {
      // token 錯誤
      if (res.status === 401 || (data.error && data.error.includes('token'))) {
        const el = appendMsg('ai', '');
        if (el) el.textContent = '⚠️ 金鑰驗證失敗，請重新整理頁面並輸入正確的 RUBY_BRAIN_TOKEN。';
      } else {
        const el = appendMsg('ai', '');
        if (el) el.textContent = '連線異常，請稍後再試。';
      }
      messages.pop();
    } else {
      const reply = data.reply || '（無回應）';
      const aiTarget = appendMsg('ai', '');
      if (aiTarget) aiTarget.textContent = reply;
      messages.push({ role: 'assistant', content: reply });
    }

  } catch (err) {
    removeTyping();
    const el = appendMsg('ai', '');
    if (el) el.textContent = '網路錯誤，請確認連線後再試。';
    messages.pop();
    console.error(err);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}
</script>
</body>
</html>
