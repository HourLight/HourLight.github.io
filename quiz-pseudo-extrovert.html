desc:'您喜歡社交，真心喜歡。但社交完需要時間恢復，不是不喜歡人，是電池容量有限。您像一台精品咖啡機：出品品質很高，但需要暖機時間，用完需要清潔保養。您能把一場聚會變得很好，三個小時的深夜長談讓所有人都覺得被理解了。但代價是回家後癱在沙發上兩小時不想動。您跟真外向的差別不是「喜不喜歡人」，而是「需不需要恢復」。三場大趴比不上一次好朋友的深夜長談。少而精比多而淺更適合您。您的秘訣是控制社交的「節奏」和「深度」，一週兩次高品質社交，比每天淺淺地跟人互動更讓您快樂。',
oil:'天竺葵 2 滴 + 薰衣草 3 滴',oilMethod:'出門前一滴天竺葵在鎖骨，回家後薰衣草泡腳',oilScene:'社交前充能、社交後修復，一套完整的儀式',
oilText:'天竺葵幫你在「享受人群」和「保護電量」之間找到甜蜜點。薰衣草的泡腳儀式快速修復社交損耗。你值得享受人群，也值得享受安靜。\n\n為什麼這個配方對你有效？\n天竺葵的香葉醇和香茅醇會溫柔地調節你的自律神經平衡，讓交感神經（社交的油門）和副交感神經（休息的煞車）找到甜蜜的比例。薰衣草的沉香醇直接降低皮質醇（壓力荷爾蒙），泡腳時溫水帶動血液循環，把堆在頭部的疲勞往下帶走。翻譯：天竺葵幫你的社交電池裝上智慧型充電管理，薰衣草幫你用泡腳這個快充模式回血。',
med:'手邊沒有精油？試試這個：\n\n【社交型內向的快充練習】\n社交結束回到家，或是感覺電量快見底的時候。\n\n第一步：坐下來，把鞋子脫掉。雙腳踩在地板上（如果有地毯更好）。閉上眼。\n\n第二步：做 5 次「4-7-8 呼吸」：用鼻子吸 4 秒、停住 7 秒、用嘴巴吐 8 秒。這個呼吸法會直接啟動你的副交感神經，跟身體說「安全了，可以休息了」。\n\n第三步：想像你的身體是一台手機。現在電量 15%。每一次呼吸，電量就升 5%。慢慢地，15%、20%、25%……你不需要充到 100%，充到 50% 就夠了。\n\n第四步：把雙手搓熱，輕輕蓋在眼睛上。在這個黑暗裡待 30 秒。問自己：「今天最有品質的一刻是什麼？」記住那個畫面。\n\n第五步：睜開眼。喝一口水。你的快充完成了。\n\n這個練習只要 5 分鐘。每次社交後做一次，你會發現：你的電池雖然小，但充電效率很高。',
insight:'「你的電池容量不是缺陷，是品質管控。充滿電的你，比任何人都溫暖。」',
share:'🌤️ 我是社交型內向！喜歡跟人在一起，但社交完需要充電時間🔋 電池容量有限但出品品質很高，少而精是我的風格。'},
true_i:{name:'真內向',icon:'🌙',sub:'獨處就是我的能量來源',color:'#636e72',
desc:'您是真的內向。獨處是充電，社交是耗電。這不是缺陷，是能量管理方式不同。您的內在世界豐富到可以自給自足，一本書、一杯茶、一個安靜的下午，就是您最奢侈的享受。別人在聊天的時候，您在觀察；別人在社交的時候，您在消化。您不是慢，您是在用不同的速度處理世界。您的腦袋在安靜的時候運轉得最好，深度思考是您的超能力。那些最深刻的洞察、最精準的判斷，往往來自一個人安靜想出來的結果。您的挑戰不是「變外向」，是找到不需要假裝的社交方式。一對一比一群人舒服，對嗎？那就多安排一對一。',
oil:'檀香 3 滴 + 薰衣草 2 滴',oilMethod:'獨處時擴香，社交前在手腕點一滴薰衣草當結界',oilScene:'享受獨處的品質時間、不得不社交之前',
oilText:'檀香是你的靈魂精油，讓安靜的時光更有深度。薰衣草在手腕上像一層溫柔的結界，提醒你：在人群裡也可以保有一個屬於自己的角落。\n\n為什麼這個配方對你有效？\n檀香的 α-檀香醇是少數能穿過血腦屏障的分子，它會溫柔地啟動前額葉的「深度思考」模式，讓你的內在世界更有層次、更有深度。薰衣草的乙酸沉香酯則像給你的杏仁核套上一層隔音棉，讓外界的噪音被過濾掉，你的神經系統終於可以只聽「自己的聲音」。白話翻譯：檀香幫你的獨處時光升級到 VIP 包廂，薰衣草是你隨身攜帶的隱形結界。',
med:'手邊沒有精油？試試這個：\n\n【真內向的深度獨處練習】\n找一個你最舒服的角落。可以是床上、書桌前、陽台、任何屬於你的地方。\n\n第一步：關掉所有螢幕。手機靜音、電腦闔上。做 5 次深呼吸（吸 5 秒、吐 8 秒）。每次吐氣想像身邊有一個透明的泡泡正在慢慢形成，把你輕輕包在裡面。\n\n第二步：花 60 秒，用「五感掃描」感受你現在的空間：看到什麼？聽到什麼？皮膚感覺到什麼？空氣裡有什麼味道？嘴裡是什麼味道？\n\n第三步：現在把注意力完全轉向內在。問自己：「此刻我的身體哪裡最放鬆？」找到那個地方，把注意力停在那裡 30 秒。\n\n第四步：再問：「此刻我的腦袋裡最亮的一個念頭是什麼？」不管是什麼，不評判，只是看著它。像看一隻蝴蝶飛過。\n\n第五步：做最後 3 次呼吸，每次吐氣默念：「我在這裡。這樣就夠了。」\n\n這 5 分鐘的安靜，比任何社交都更能充滿你。因為你的能量來源，一直都是你自己。',
insight:'「你的安靜不是冷漠，是你在用最深的方式感受這個世界。」',
share:'🌙 我是真內向！獨處不是孤僻，是我最強大的充電方式🔌 一個人安靜的下午，比十場聚會更讓我開心。'},
context:{name:'情境切換型',icon:'🔄',sub:'看場合決定內外向',color:'#00cec9',
desc:'您不是固定的外向或內向，而是根據場合、對象、心情靈活切換。跟對的人在一起您可以嗨到天亮，跟不對的人在一起您五分鐘就想回家。您是社交界的雙聲道喇叭，可以很大聲，也可以很安靜，全看播的是什麼歌。您在老闆面前專業、在閨蜜面前搞笑、在獨處時深沉，這三個都是真的您。別人可能覺得您「很難定義」，但您知道自己不是沒有個性，是個性太多了裝不進一個標籤。但要注意：太靈活有時候會讓自己搞不清楚「真正的我到底是什麼樣子」。找到那些讓您完全不用切換的人和場合，那就是最接近真實的您。',
oil:'佛手柑 3 滴 + 快樂鼠尾草 2 滴',oilMethod:'每天早上一滴佛手柑在手腕，需要回歸自我時用快樂鼠尾草',oilScene:'在不同角色之間切換的日子、感覺「我到底是誰」的時刻',
oilText:'佛手柑像一個內在錨點，不管外面的角色怎麼變，裡面的你不會散。快樂鼠尾草在你需要回歸的時候，溫柔地提醒你：所有的你都是真的。\n\n為什麼這個配方對你有效？\n佛手柑的檸檬烯和乙酸沉香酯在你的邊緣系統裡種下一顆「不管外面怎麼變我都穩」的錨，前額葉在不同場景切換時依然維持穩定的自我感知。快樂鼠尾草的乙酸沉香酯讓你的杏仁核暫時放下「察言觀色」的任務，讓那個「真正的我」有空間冒出來。翻譯：佛手柑是你的 GPS 原點，不管你切換到哪個版本，它幫你記得「家」在哪裡。快樂鼠尾草是讓你願意回家的那盞燈。',
med:'手邊沒有精油？試試這個：\n\n【情境切換型的核心定位練習】\n一天結束的時候，或是感覺「我到底是誰」的時候。\n\n第一步：坐下來，雙手放在大腿上。閉上眼，做 5 次呼吸（吸 4 秒、吐 6 秒）。\n\n第二步：想像今天你扮演過的所有角色，像一件件衣服一樣掛在面前的衣架上。工作上的你、朋友面前的你、家人面前的你、獨處時的你。花 30 秒看看這些衣服。\n\n第三步：現在問自己：「如果把所有的衣服都脫掉，裡面站著的那個人是什麼樣子的？」不要想，讓第一個浮現的畫面或感覺出來。\n\n第四步：不管那個畫面是什麼（可能是一個小孩、一道光、一個安靜的房間），在心裡走過去，跟他說：「嘿，我看到你了。所有版本的我都是從你這裡出發的。」\n\n第五步：做 3 次深呼吸。每次吐氣時，感覺那些「衣服」都還在衣架上，但你知道它們都是你選的，而不是被迫穿的。\n\n這個練習幫你記得：你的核心很大，大到可以長出很多版本。但根，只有一個。',
insight:'「找到那些讓你完全不用切換的人，在他們面前的你，就是最真的你。」',
