  {q:'deadline 明天到，你今天才發現進度嚴重落後。你的身體第一個反應是？',opts:[
    {t:'腎上腺素飆起來，通宵也要把它做完',a:'fight'},
    {t:'打開外送APP先點個宵夜，或者開始整理房間',a:'flight'},
    {t:'盯著螢幕發呆，知道該動但動不了',a:'freeze'},
    {t:'先看看有誰能幫忙，或主動跟主管說明狀況',a:'fawn'},
    {t:'心裡突然一片空白，眼眶有點熱',a:'crash'},
    {t:'深呼吸，列一個優先順序開始逐項解決',a:'thrive'}]},
  {q:'跟重要的人大吵了一架。吵完之後你的狀態是？',opts:[
    {t:'繼續想論點，在心裡把剛才沒說完的話說完',a:'fight'},
    {t:'出門走一走，或者打電話找別的朋友聊',a:'flight'},
    {t:'蜷在沙發上，什麼都不想做，什麼都想不了',a:'freeze'},
    {t:'開始反省自己剛才是不是太過分了',a:'fawn'},
    {t:'突然很累，直接睡著了',a:'crash'},
    {t:'冷靜一下之後主動找對方談',a:'thrive'}]},
  {q:'你的壓力已經累積很久了，但沒有人知道。你在朋友面前的樣子是？',opts:[
    {t:'比平常更有幹勁，因為你把壓力全部轉成了工作',a:'fight'},
    {t:'推掉很多約，說「最近比較忙」',a:'flight'},
    {t:'出席但放空，在場但不在場',a:'freeze'},
    {t:'比平常更開朗，因為你不想讓別人擔心',a:'fawn'},
    {t:'偶爾會突然眼眶泛紅但馬上忍回去',a:'crash'},
    {t:'會找信任的人聊聊，不裝沒事',a:'thrive'}]},
  {q:'工作突然被塞了三倍的量，你的內心台詞是？',opts:[
    {t:'「好，我可以。我做給你看」',a:'fight'},
    {t:'「我需要暫時離開這裡」（開始想請假或離職）',a:'flight'},
    {t:'「⋯」（什麼都想不出來）',a:'freeze'},
    {t:'「沒問題」（其實有問題但不敢說）',a:'fawn'},
    {t:'「我撐不住了」（但只在心裡說）',a:'crash'},
    {t:'「讓我看看哪些可以優先、哪些可以協調」',a:'thrive'}]},
  {q:'你半夜睡不著。腦子裡在轉什麼？',opts:[
    {t:'明天的待辦事項、還沒解決的問題、一堆計畫',a:'fight'},
    {t:'幻想離開現在的生活，去一個沒人認識你的地方',a:'flight'},
    {t:'什麼都沒在想，但就是睡不著。身體像被按了暫停鍵',a:'freeze'},
    {t:'回想今天是不是哪句話讓別人不舒服了',a:'fawn'},
    {t:'突然想哭，不知道為什麼',a:'crash'},
    {t:'做幾個深呼吸，告訴自己明天再處理',a:'thrive'}]},
  {q:'你收到一封語氣很差的email/訊息。你的第一反應？',opts:[
    {t:'馬上回覆，語氣更硬，不讓對方佔上風',a:'fight'},
    {t:'先不回，出去買杯咖啡冷靜一下',a:'flight'},
    {t:'反覆看了十遍，什麼都沒做',a:'freeze'},
    {t:'檢討自己是不是先做錯了什麼才被這樣對待',a:'fawn'},
    {t:'胃突然一陣絞痛',a:'crash'},
    {t:'截圖存證，理性回覆，處理完就放下',a:'thrive'}]},
  {q:'你正在做一件很難的事，一直做不好。你的壓力模式切換成？',opts:[
    {t:'加倍努力，不做到好不罷休',a:'fight'},
    {t:'做到一半放棄，跳去做另一件事',a:'flight'},
    {t:'大腦像當機了一樣，坐在那邊什麼都做不了',a:'freeze'},
    {t:'問別人「你覺得我這樣做對嗎？」不斷尋求確認',a:'fawn'},
    {t:'突然覺得自己什麼都做不好，情緒崩了',a:'crash'},
    {t:'停下來，換個方法試試',a:'thrive'}]},
  {q:'你發現自己壓力大的時候，身體通常會？',opts:[
    {t:'肩膀和下巴緊繃，偶爾磨牙',a:'fight'},
    {t:'心跳加速，坐不住，一直想動',a:'flight'},
    {t:'全身無力，像被抽走了電',a:'freeze'},
    {t:'胃不舒服，或突然很想吃東西',a:'fawn'},
    {t:'頭痛、想哭、或突然很想睡',a:'crash'},
    {t:'會累但還能正常運作',a:'thrive'}]},
  {q:'你跟一群人合作一個專案，你發現有人在擺爛。你？',opts:[
    {t:'直接指出來，必要的話自己接手做完',a:'fight'},
    {t:'心裡不爽但不說，心想「以後不跟這人合作了」',a:'flight'},
    {t:'看到了但不知道該怎麼處理，就假裝沒看到',a:'freeze'},

    {t:'覺得整個團隊都在欺負你，開始自我懷疑',a:'crash'},
    {t:'找對方聊一下，了解狀況後一起調整分工',a:'thrive'}]},

    {t:'笑笑帶過，心裡決定以後離這個人遠一點',a:'flight'},
    {t:'腦子瞬間一片空白，什麼都回不了',a:'freeze'},

    {t:'表面沒事，回家之後反覆回想到睡不著',a:'crash'},
    {t:'聽完之後判斷有沒有道理，有的話就改',a:'thrive'}]},
  {q:'你已經連續加班兩週了。你處理這種持續性壓力的方式是？',opts:[
    {t:'繼續衝。累了喝咖啡、吃B群，倒了再說',a:'fight'},
    {t:'開始認真考慮離職，或者瘋狂訂機票研究旅行',a:'flight'},
    {t:'每天都覺得自己在演一齣戲，不知道自己在幹嘛',a:'freeze'},
    {t:'不敢喊累，因為別人也在加班',a:'fawn'},
    {t:'某天突然大哭了一場，或者身體出狀況（感冒/過敏/腸胃炎）',a:'crash'},
    {t:'跟主管談調整工作量，同時排優先順序',a:'thrive'}]},
  {q:'你最害怕的壓力類型是？',opts:[
    {t:'我掌控不了局面的壓力',a:'fight'},
    {t:'逃不掉的壓力（被綁住的感覺）',a:'flight'},

    {t:'讓別人失望的壓力',a:'fawn'},

  fight:{name:'戰鬥模式',icon:'🥊',sub:'越壓越拼，直到燒完為止',
    desc:'你是那個 deadline 前兩小時效率最高的人。壓力對你來說是咖啡因，劑量越大你越清醒。但你有沒有注意到，你已經不記得上一次「不用拼」的日子是什麼時候了？',
    detail:'戰鬥模式的人看起來很強。你不會倒、不會哭、不會喊累。你的同事和朋友都以為你是鐵人。\n\n但鐵人也會鏽。\n\n你的身體不是為了「永遠衝刺」設計的。戰鬥反應（fight response）是你的交感神經在面對威脅時的緊急模式，本來應該是短暫的。但你把它變成了日常。皮質醇一直在高位、腎上腺一直在透支、肌肉一直在緊繃。\n\n你是不是發現自己連休假都在做事？是不是停下來就焦慮、沒事做就不安？那不是你勤勞，是你的神經系統已經忘記「安全」是什麼感覺了。\n\n你最大的恐懼不是壓力本身，是「不夠努力」。因為某個時候你學到了：只要我夠努力，就不會被拋棄/否定/看不起。所以你停不下來。\n\n試一次：今天設定一個「下班鬧鐘」。鬧鐘響了就停。不管做完沒有。世界不會因為你停下來而崩塌。',
    oil:'薰衣草 × 羅馬洋甘菊 × 雪松',

    med:'「卸甲呼吸法」\n\n你已經打了一整天的仗了。現在允許自己卸甲。\n\n1. 站直。肩膀用力聳起來，越高越好。憋住 5 秒\n2. 吐氣的時候突然放掉。讓肩膀自由落下\n3. 吸氣 4 秒：把雙手高舉過頭，握拳\n4. 吐氣 6 秒：雙手放下，拳頭打開，手指張到最開\n5. 自然呼吸 5 秒：感覺那個「鬆」的感覺，停在那裡\n\n做 4 輪。\n\n最後一輪結束後對自己說：「今天的仗打完了。我可以休息了。」\n\n你的身體需要一個明確的「結束」信號。這個練習就是那個信號。',

  flight:{name:'逃跑模式',icon:'🏃',sub:'壓力來了你就想找出口',
    desc:'你處理壓力的方式是：離開。不一定是物理上的離開，可能是打開Netflix、瘋狂滑手機、突然很想去旅行。你的神經系統需要一個「不在壓力裡」的空間，才能重新整頓。',
    detail:'逃跑模式的人不是懦弱，是你的神經系統判斷「這個威脅太大了，留下來不安全」。\n\n你的逃跑可能有很多種形式：追劇到凌晨三點、週末瘋狂排行程讓自己忙到沒空想、拼命規劃下一次旅行、或者在最壓力的時候突然很想換工作/搬家/剪頭髮。\n\n這些「逃跑」其實是你在找安全感。因為你的安全感不在當下，所以你要去別的地方找。\n\n問題是：你每次逃到新的地方，壓力還是在那裡等你。因為壓力的來源不在外面，在你跟壓力的「關係」裡。\n\n更深一層：你可能很小的時候就學會了「離開是安全的」。也許家裡常吵架，你躲進房間就沒事了。那個策略救了童年的你。但現在你已經不是那個躲房間的小孩了。\n\n試一次：下次壓力來的時候，不要移動。留在原地，告訴自己「我在這裡是安全的」。只要 60 秒。看看會怎樣。',
    oil:'岩蘭草 × 檀香 × 甜橙',
    oilDetail:'岩蘭草的岩蘭草醇是最強的「接地」分子，把你從「想逃」的浮動狀態拉回當下。檀香的 α-檀香醇穩定前額葉的不安感，讓你知道「留在這裡不會怎樣」。甜橙的檸檬烯在邊緣系統裡製造安全感，讓當下變成一個可以待的地方。\n\n調配建議：基底油 10ml＋岩蘭草 1 滴＋檀香 2 滴＋甜橙 2 滴。岩蘭草味道濃，1 滴就夠。',
    med:'「紮根 60 秒」\n\n你現在在哪裡就在哪裡做。不用移動。\n\n1. 感覺你的腳。踩在地上。地板是硬的、穩的、不會動的\n2. 吸氣 4 秒：把注意力從腳底往上帶，經過小腿、膝蓋、大腿、屁股坐在椅子上的壓力\n3. 吐氣 6 秒：對自己說「我在這裡。這裡是安全的」\n4. 吸氣 4 秒：用眼睛找到三個你看得到的東西（桌子、杯子、窗戶）\n5. 吐氣 6 秒：「我不需要去別的地方。我在這裡就好」\n\n做 4 輪。\n\n你不用每次都跑。留下來，你會發現這裡也有氧氣。',
    closing:'你的敏銳讓你很快察覺威脅，這是一種天賦。但不是每個壓力都需要你逃開。有些壓力，你站在那裡面對，它自己會先退。'},
  freeze:{name:'凍結模式',icon:'🧊',sub:'你知道該動但就是動不了',
    desc:'壓力來的時候你不戰也不逃，你當機。像手機跑太多APP一樣，整個人卡住了。你在乎到連反應的力氣都沒有了。',
    detail:'凍結模式是壓力反應裡最容易被誤解的一種。別人看你什麼都不做，以為你在擺爛。但你的身體裡正在經歷一場風暴。\n\n凍結反應（freeze response）是你的神經系統判斷「打不過也逃不掉」之後的最後一道防線：裝死。你的背側迷走神經啟動了，心率下降、呼吸變淺、意識開始模糊。你人在那裡，但你不在那裡。\n\n你是不是常常在壓力最大的時候反而什麼都做不了？然後事後自責「我到底在幹什麼」？這是你的身體在保護你，用它唯一知道的方式。只是這個保護方式在現代社會不太管用。\n\n你需要的不是「振作起來」（說這句話的人根本不懂凍結），你需要的是一點點溫度，把你從凍結狀態慢慢解凍。\n\n試一次：下次發現自己卡住了，做一個很小很小的動作。動一根手指。踮一下腳尖。只要身體動了，神經系統就會開始重新上線。',
    oil:'薑 × 甜橙 × 肉桂',

    med:'「解凍練習」\n\n你現在可能正在凍結的狀態裡。沒關係。我們慢慢來。\n\n1. 感覺你的雙手。搓一搓。搓到有一點溫度\n2. 吸氣 4 秒：把搓熱的手放在你的臉頰上。感受那個溫度\n3. 吐氣 6 秒：對自己說「我還在。我的身體還在」\n4. 動動腳趾頭。感覺每一根腳趾都存在\n5. 吸氣 4 秒：站起來（如果可以的話）。感覺重力把你的腳壓在地板上\n6. 吐氣 6 秒：跺一下腳。讓地板知道你在\n\n做 3 輪。\n\n你不需要馬上動起來。你只需要先「在」這裡。',

  fawn:{name:'討好模式',icon:'🫠',sub:'你壓力大的時候先照顧別人',
    desc:'你壓力爆表的時候，不是忙自己的事，是忙著確認身邊的人都OK。你的壓力反應不是打或逃，是先讓別人舒服。然後你自己呢？你把自己排在待辦事項的最後一格，而那一格永遠不會輪到。',
    detail:'討好模式（fawn response）是心理學裡相對新發現的第四種壓力反應。你的神經系統判斷「這個威脅太大了，打不過也逃不了，唯一安全的方式就是讓對方開心」。\n\n你可能很小的時候就學會了：當家裡的空氣變冷、大人臉色不好的時候，只要你乖乖的、聽話的、不添麻煩、甚至主動去安撫他們，你就安全了。\n\n於是你長大後，壓力來的時候你的第一反應不是處理壓力，是「別人還好嗎？」你加班到半夜還在擔心同事的情緒。你自己快撐不住了還在問別人「你需要幫忙嗎？」\n\n你的神經系統告訴你：照顧別人 = 安全。照顧自己 = 自私 = 危險。\n\n試一次：下次有人問你「需要幫忙嗎？」，試著說「需要」。不加條件，不加「其實還好」。就一個字：需要。',
    oil:'玫瑰 × 乳香 × 雪松',
    oilDetail:'玫瑰的香茅醇和苯乙醇直接撫慰邊緣系統裡那個「別人比我重要」的舊迴路，讓你的身體記住「我也可以被照顧」。乳香的乳香酸降低杏仁核的「如果我不照顧別人就會出事」的警報。雪松的倍半萜烯在你跟別人之間建一個溫柔的屏障，讓你的善良有邊界。\n\n調配建議：基底油 10ml＋玫瑰 1 滴＋乳香 2 滴＋雪松 2 滴。',
    med:'「先照顧我自己」冥想\n\n找一個只有你自己的空間。手機靜音。\n\n1. 吸氣 4 秒：想像你的身邊有一圈溫暖的光。那個光圈裡只有你。沒有任何人需要你照顧\n2. 吐氣 6 秒：把雙手放在心口。對自己說「這一分鐘，我只照顧我自己」\n3. 吸氣 4 秒：問自己「我現在需要什麼？」不是別人需要什麼。是我需要什麼\n4. 吐氣 6 秒：不管答案是什麼，對自己說「你值得被照顧。尤其被你自己」\n\n做 5 輪。\n\n飛機上的安全須知說得對：先幫自己戴好氧氣面罩。不是自私，是你窒息了就幫不了任何人。',
    closing:'你的善良是真正的力量。但善良如果沒有方向，就變成了消耗。記得把你的善良也分一點給自己。你值得的。'},
  crash:{name:'崩潰重啟型',icon:'💥',sub:'你撐到最後一秒才倒',
    desc:'你不是戰鬥，不是逃跑，也不是凍結。你是一直撐、一直撐、一直撐，直到某一天因為一件很小的事（比如外送送錯餐）突然崩潰了。然後你擦乾眼淚，重啟，繼續撐。',
    detail:'崩潰重啟型的人在別人眼裡通常很穩定。你不會在壓力來的當下表現出來，你會自己消化。一天、兩天、一個月、三個月，你像一個不斷吸水的海綿。\n\n問題是海綿的容量有極限。\n\n你的崩潰通常來得毫無預警。突然對老公發了一頓脾氣、突然在車裡哭了出來、突然整個人癱在床上動不了。而觸發的那件事通常很小，小到你自己都覺得莫名其妙。\n\n但那不是因為那件小事。那是前面一百件你都沒有好好處理的壓力，在那一刻同時爆發。你的崩潰不是你脆弱，是你太堅強太久了。\n\n你最需要的不是「再撐一下」，是在還沒到崩潰點之前就開始釋放。小小的、持續的、不用等到爆炸才處理。\n\n試一次：今天做一件很小的事讓自己舒服。泡個腳、吃一塊巧克力、走到外面深呼吸三次。不要等到崩了才想到自己。',
    oil:'薰衣草 × 檀香 × 玫瑰',
    oilDetail:'薰衣草的沉香醇和乙酸沉香酯安撫你長期過度激發的邊緣系統，像溫柔地拍一拍那個一直在硬撐的你。檀香的 α-檀香醇幫助你的前額葉在崩潰之前多一個「暫停」的選項。玫瑰的苯乙醇直達邊緣系統最柔軟的角落，讓你的身體知道「不用撐到極限才配休息」。\n\n調配建議：基底油 10ml＋薰衣草 2 滴＋檀香 2 滴＋玫瑰 1 滴。',
    med:'「洩壓閥呼吸法」\n\n這個練習的目的是讓你每天釋放一點點，不要累積到爆炸。\n\n1. 找一個安靜的地方。可以是廁所、停車場、或者被窩裡\n2. 吸氣 4 秒：想像你的身體是一個高壓鍋。壓力計已經快到紅線了\n3. 吐氣 8 秒（盡量拉長）：想像你旋開了一個洩壓閥，蒸氣慢慢慢慢地散出去\n4. 吸氣 4 秒：壓力計降了一格\n5. 吐氣 8 秒：再降一格\n\n做 6 輪。\n\n每天做一次。不是等到壓力鍋要爆了才做。是每天晚上在它加壓之前就洩壓。\n\n你不需要一次把所有壓力放完。每天一點就好。',
    closing:'你的堅強是真的讓人心疼的那種。但你不需要撐到倒了才被允許休息。每天給自己一個小小的出口，不是奢侈，是生存。'},
  thrive:{name:'化壓力為動力型',icon:'🌱',sub:'壓力是訊號，不是敵人',
    desc:'你面對壓力的方式讓人羨慕。你會焦慮、會累、會不舒服，但你不會被壓力帶著走。你把壓力當成身體的訊號，而不是需要打敗的敵人。',
    detail:'化壓力為動力型的人通常有一個其他類型沒有的東西：覺察。\n\n你能在壓力來的時候覺察到「我正在有壓力」，然後選擇怎麼回應。其他類型的人是被壓力反應控制，你是在跟壓力反應合作。\n\n但這不代表你不會倒。覺察不是免疫力，是你能更快知道自己快倒了。\n\n你需要留意的是：別人可能會因為你「看起來很穩」就把更多壓力丟給你。你也可能因為自己「能處理」就不好意思說不。但你的容量也是有限的。\n\n你最大的功課不是學會處理壓力，你已經很會了。你的功課是學會在壓力還沒來的時候就好好享受。因為你太習慣「處理」了，有時候連開心都忘了。\n\n試一次：今天做一件完全沒有生產力但讓你快樂的事。不是為了紓壓，是純粹為了開心。',
    oil:'佛手柑 × 甜橙 × 薰衣草',
    oilDetail:'佛手柑的乙酸沉香酯和檸檬烯維持你邊緣系統的平衡狀態，讓你的覺察力保持在最佳水平。甜橙的檸檬烯提醒你的身體「不只是處理壓力，還要享受生活」。薰衣草的沉香醇在你的高效運作裡加入一絲柔軟，讓「穩定」不只是堅強，也有溫度。\n\n調配建議：基底油 10ml＋佛手柑 2 滴＋甜橙 2 滴＋薰衣草 1 滴。',
    med:'「純粹快樂冥想」\n\n這個冥想不是紓壓。你已經不太需要紓壓練習了。這個是提醒你快樂的練習。\n\n1. 閉上眼睛。想一件最近讓你開心的小事。不是完成任務的成就感，是純粹的快樂。一口好吃的東西、一個好笑的畫面、陽光照在臉上的溫度\n2. 吸氣 4 秒：讓那個快樂的感覺在胸口擴散\n3. 吐氣 6 秒：微笑。不用太用力，嘴角輕輕上揚就好\n4. 自然呼吸 10 秒：待在那個感覺裡。不做任何事。就只是快樂著\n\n做 3 輪。\n\n你很擅長處理困難。但別忘了你也值得不困難的時光。',
    closing:'你的穩定是一種天賦。但穩定不等於永遠都要堅強。偶爾讓自己「不用處理任何事」地活一天，你會發現：不處理的你，也很好。'}
};

let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const optsHTML='<div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]===o.a?' selected':'')+'" onclick="selectOpt('+i+',\''+o.a+'\',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 題 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一題</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一題 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看我的壓力模式 🌪️</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,a,btn){answers[qi]=a;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'nearest'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 題，共 '+questions.length+' 題';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const scores={};Object.keys(TYPES).forEach(k=>{scores[k]=0;});
  Object.values(answers).forEach(a=>{scores[a]=(scores[a]||0)+1;});
  const sorted=Object.keys(TYPES).sort((a,b)=>scores[b]-scores[a]);
  const topType=sorted[0],f=TYPES[topType],f2=TYPES[sorted[1]];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('screenshotCard').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥靈之鑰</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-tags"><span class="ss-tag">壓力反應模式</span><span class="ss-tag">'+f.name+'</span></div><div class="ss-quote">「'+f.closing+'」</div><div class="ss-footer">hourlightkey.com ✦ 讀懂自己，活對人生</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">壓力反應模式 Stress Response</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var tp=TYPES[k],pct=Math.round(scores[k]/questions.length*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+tp.icon+' '+tp.name+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">🌪️ 你的壓力模式</div><div class="result-section-content">'+f.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度解析</div><div class="result-section-content">'+f.detail.replace(/\n/g,'<br>')+'</div></div>'+(f2?'<div class="result-section"><div class="result-section-title">'+f2.icon+' 副型：'+f2.name+'（'+f2.sub+'）</div><div class="result-section-content">'+f2.desc+'</div></div>':'')+'<div class="result-section"><div class="result-section-title">🌿 認知芳療建議：'+f.oil+'</div><div class="result-section-content">'+f.oilDetail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🧘 冥想練習（60-90秒）</div><div class="result-section-content">'+f.med.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">✦ 馥靈收束語</div><div class="result-section-content" style="font-family:LXGW WenKai TC,serif;font-size:1rem;line-height:1.9">'+f.closing+'</div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ 馥靈之鑰 × 你的覺察密碼</div><div class="hour-bridge-text" style="margin-bottom:8px">你的壓力反應不是性格缺陷，是你的神經系統學會的生存策略。看見它，你才能從「被壓力控制」變成「跟壓力合作」。</div><div style="font-size:.85rem;color:#9e8a70;line-height:1.8;margin-bottom:16px">馥靈秘碼可以揭示你天生的情緒調節設定，跟今天的壓力模式交叉比對會有意想不到的發現。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免費解碼馥靈秘碼 →</a>';
  try{localStorage.setItem('hl_quiz_stress_resp',JSON.stringify({type:topType,scores,ts:Date.now()}));}catch(e){}
  window._resultText=f.icon+' 我的壓力模式是「'+f.name+'」：'+f.sub+'。'+f.desc.substring(0,60)+'⋯ 你壓力大變什麼樣？ 👉 hourlightkey.com/quiz-stress-response.html #馥靈之鑰 #壓力反應';
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz-stress-response',toolName:'壓力反應模式'});window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
</script>
