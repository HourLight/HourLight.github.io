name: IndexNow · push 變動自動通知

# 每次 push 到 main，抓變動的 .html 送 IndexNow（Bing / Yandex / Seznam 吃，Google 不支援 IndexNow 所以靠 sitemap 被動爬）
on:
  push:
    branches:
      - main
    paths:
      - '**/*.html'
      - 'sitemap.xml'

permissions:
  contents: read

env:
  HOST: hourlightkey.com
  KEY: 7e02e7f696be4797a684190a09079657
  KEY_LOCATION: https://hourlightkey.com/7e02e7f696be4797a684190a09079657.txt

jobs:
  notify-indexnow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout（取兩個 commit 才能 diff）
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 抓變動 HTML 轉成 URL 清單
        id: urls
        run: |
          # 取上一個 commit 跟現在 commit 之間變動/新增的 html
          CHANGED=$(git diff --name-only --diff-filter=ACMR HEAD~1 HEAD -- '*.html' | head -100)
          if [ -z "$CHANGED" ]; then
            echo "沒有變動的 HTML，跳過"
            echo "has_urls=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "變動檔案："
          echo "$CHANGED"
          # 轉成 URL（加 https://{HOST}/ 前綴）
          URLS=$(echo "$CHANGED" | awk -v host="$HOST" '{print "https://"host"/"$0}')
          # 生成 JSON
          JSON_URLS=$(echo "$URLS" | awk 'BEGIN{printf "["} NR>1{printf ","} {printf "\"%s\"", $0} END{printf "]"}')
          echo "json_urls=$JSON_URLS" >> "$GITHUB_OUTPUT"
          echo "has_urls=true" >> "$GITHUB_OUTPUT"

      - name: POST 到 IndexNow 公共端點
        if: steps.urls.outputs.has_urls == 'true'
        run: |
          PAYLOAD=$(cat <<EOF
          {
            "host": "${HOST}",
            "key": "${KEY}",
            "keyLocation": "${KEY_LOCATION}",
            "urlList": ${{ steps.urls.outputs.json_urls }}
          }
          EOF
          )
          echo "送出 payload："
          echo "$PAYLOAD"
          # IndexNow 公共端點（會代發給 Bing / Yandex / Seznam）
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "回應狀態：$RESPONSE"
          # 200 = 成功；202 = 收到但尚未處理；其他 = 失敗
          if [ "$RESPONSE" != "200" ] && [ "$RESPONSE" != "202" ]; then
            echo "⚠️ IndexNow 回應非 200/202"
            exit 1
          fi
          echo "✓ IndexNow 已通知"
