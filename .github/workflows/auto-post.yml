name: Auto Post to Threads & Facebook

on:
  schedule:
    # UTC times for UTC+8: 07:30 = 23:30 prev day, 12:15 = 04:15, 20:00 = 12:00
    - cron: '30 23 * * *'   # 07:30 UTC+8
    - cron: '15 4 * * *'    # 12:15 UTC+8
    - cron: '0 12 * * *'    # 20:00 UTC+8
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (log only, no posting)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Post to Threads & Facebook
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node .github/scripts/post.js
