    detail:'理性分析型的人在職場上通常很受重視。你的表達清晰、有說服力，不會被情緒帶著走。\n\n但在親密關係裡，你的理性可能是一面牆。\n\n你的伴侶跟你說「我好累」，你回「那你應該早點睡」。對方要的不是解決方案，是一句「辛苦了」。但你的大腦收到「問題」就自動進入「解決模式」，連你自己都攔不住。\n\n更深一層：你的理性不是天生的性格，可能是後天的保護機制。也許你小時候學到「哭沒有用」、「發脾氣會被罵」，所以你把所有感覺都打包成「邏輯」再輸出。這樣就不會被攻擊了。\n\n但沒有人想跟一台電腦談戀愛。偶爾讓「我覺得」出場一次，世界不會因此失控的。\n\n試一次：下次有人跟你訴苦，忍住不給建議。只說「聽起來真的很辛苦」。然後安靜地待在那裡。',

    med:'「歸還練習」\n\n今天結束前，找一個安靜的時刻。\n\n1. 吸氣 4 秒：回想今天你吸收了誰的情緒。那個焦慮是你的嗎？那個煩躁是你的嗎？\n2. 吐氣 6 秒：想像那些不屬於你的情緒，像彩色的氣泡，從你的身體裡一個一個飄出去。藍色是某人的焦慮，紅色是某人的憤怒，灰色是某人的疲倦\n3. 吸氣 4 秒：感覺身體變輕了。留下來的，才是你自己的\n4. 吐氣 6 秒：對自己說「我可以懂你，但我不需要扛你」\n\n做 5 輪。\n\n這個練習幫助你的神經系統重新建立「自己」和「他人」的邊界。共鳴是天賦，但天賦不應該讓你的身體買單。',
    closing:'你的柔軟是這個世界最稀缺的東西。但柔軟不是無限的。記得每天給自己充一次電，不是為了明天繼續付出，是因為你值得被好好對待。尤其被你自己。'},
  avoid:{name:'迴避沉默型',icon:'🤐',sub:'你的沉默裡藏著一整座火山',
    desc:'你看起來很好相處。不爭、不吵、不找麻煩。但你的「好相處」是有代價的。你用沉默交換了和平，但心裡那些沒說出口的話，正在慢慢腐蝕你。',
    detail:'迴避型的人不是沒有話想說，是覺得「說了也沒用」或「說了會更糟」。\n\n你可能試過說，結果被否定了、被忽略了、或是引發了一場你不想面對的衝突。從此你學會了：閉嘴是最安全的。\n\n但沉默不是和平，是冷戰。你不說，不代表你不在意。你的在意全部壓在胸口，像一顆吃了消音器的炸彈。表面上什麼事都沒有，裡面的計時器一直在倒數。\n\n然後有一天，因為一件很小的事，你爆了。對方會覺得你反應過度，但他不知道你已經忍了三百件小事了。那一次爆炸的威力，其實是三百次沉默的總和。\n\n試一次：今天找一件很小的不滿，在它還很小的時候說出來。「這個我不太喜歡。」就這七個字。小事說出來了，大事才不用爆。',
    oil:'薄荷 × 尤加利 × 甜橙',
    oilDetail:'薄荷的薄荷醇像一記溫柔的鬧鐘，喚醒被你按了靜音鍵的喉輪。尤加利的桉油醇打通呼吸道，讓「把話說出來」這個動作從物理層面開始變順暢。甜橙的檸檬烯在邊緣系統裡製造安全感，讓你的身體記住「說話不等於危險」。\n\n調配建議：基底油 10ml＋薄荷 1 滴＋尤加利 2 滴＋甜橙 2 滴。薄荷不建議用於臉部。',
    med:'「一句話練習」\n\n這個練習超短，因為你最怕的就是長篇大論。\n\n1. 想一件你最近想說但沒說的事（很小的就好）\n2. 吸氣 4 秒：把那句話在心裡組好\n3. 吐氣的時候，輕聲說出來。可以對著空氣說、對著寵物說、對著鏡子說\n4. 說完之後，吸氣 4 秒：注意，天花板沒有塌下來。世界還在\n5. 吐氣 6 秒：對自己說「我的聲音值得被聽見」\n\n做 3 輪。\n\n第一次不敢出聲也沒關係，在心裡說也算。但明天試著讓聲音出來。你的喉嚨不只是拿來吞聲的。',
    closing:'你的安靜裡有一整個宇宙。那個宇宙值得被聽見。不需要一次傾瀉而出，只要一句一句、慢慢的。你說的每一句話，都在告訴世界：我在。'},
  humor:{name:'幽默化解型',icon:'😄',sub:'你用笑話蓋住了你的眼淚',
    desc:'你是朋友圈裡的開心果，氣氛殺手的剋星，永遠知道怎麼用一句話讓場面不尷尬。但你有沒有注意到，你笑的時候，有時候眼睛是沒有在笑的？',
    detail:'幽默化解型的人社交能力極強，EQ看起來很高。你用笑話拆除衝突、用自嘲化解尷尬、用玩笑包裝你認真的話。\n\n但幽默是你的盾牌。\n\n每次你用開玩笑帶過一個認真的時刻，你其實是在說：「我不敢讓你看到我認真的樣子。」因為認真就意味著暴露，暴露就意味著可能被拒絕。笑話是一層保護膜，讓你可以說你想說的，但如果對方反應不好，你可以退回去說「我開玩笑的啦」。\n\n你是不是很少有人知道你真正在想什麼？因為你的幽默太成功了，成功到大家都以為你永遠沒事。但你有事。你只是從來不讓人看到。\n\n試一次：找一個你信任的人，說一句你一直想說但用笑話帶過的話。這次不搞笑。看看會怎樣。',
    oil:'茉莉 × 檀香 × 薰衣草',
    oilDetail:'茉莉的吲哚穿透你的「幽默盾牌」，抵達邊緣系統最真實的地方。它不是要拆你的防備，是讓你知道放下防備也是安全的。檀香的 α-檀香醇穩定前額葉，給你「不搞笑也不會冷場」的信心。薰衣草的沉香醇安撫那個「怕被看穿」的焦慮，讓認真不再那麼可怕。\n\n調配建議：基底油 10ml＋茉莉 1 滴＋檀香 2 滴＋薰衣草 2 滴。茉莉原精濃度高，1 滴就夠。',
    med:'「不搞笑的30秒」\n\n找一面鏡子。看著自己。\n\n1. 吸氣 4 秒：忍住不要對自己擠出任何表情\n2. 吐氣 6 秒：看著鏡子裡那個沒有在表演的自己。那個素顏的、安靜的、不需要讓任何人笑的自己\n3. 吸氣 4 秒：問「你好嗎？」認真問。不是寒暄，是真的想知道\n4. 吐氣 6 秒：如果眼眶有點熱，讓它熱。不用用笑話擋回去\n\n做 4 輪。\n\n這個練習的重點是讓你跟「不搞笑的自己」待在一起。那個人也很好。也許更好。因為那才是完整的你。',
    closing:'你的幽默是真正的天賦，它照亮了很多黑暗的角落。但偶爾讓聚光燈也照到你自己。你不用永遠是舞台上那個人，觀眾席也有你的位子。'}
};

let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const optsHTML='<div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]===o.a?' selected':'')+'" onclick="selectOpt('+i+',\''+o.a+'\',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 題 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一題</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一題 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看我的溝通風格 🗣️</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,a,btn){answers[qi]=a;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 題，共 '+questions.length+' 題';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const scores={};Object.keys(TYPES).forEach(k=>{scores[k]=0;});
  Object.values(answers).forEach(a=>{scores[a]=(scores[a]||0)+1;});
  const sorted=Object.keys(TYPES).sort((a,b)=>scores[b]-scores[a]);
  const topType=sorted[0],f=TYPES[topType],f2=TYPES[sorted[1]];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('screenshotCard').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥靈之鑰</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-tags"><span class="ss-tag">溝通風格解碼</span><span class="ss-tag">'+f.name+'</span></div><div class="ss-quote">「'+f.closing+'」</div><div class="ss-footer">hourlightkey.com ✦ 讀懂自己，活對人生</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">溝通風格解碼 Communication Style</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var tp=TYPES[k],pct=Math.round(scores[k]/questions.length*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+tp.icon+' '+tp.name+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">🗣️ 你的溝通風格</div><div class="result-section-content">'+f.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度解析</div><div class="result-section-content">'+f.detail.replace(/\n/g,'<br>')+'</div></div>'+(f2?'<div class="result-section"><div class="result-section-title">'+f2.icon+' 副型：'+f2.name+'（'+f2.sub+'）</div><div class="result-section-content">'+f2.desc+'</div></div>':'')+'<div class="result-section"><div class="result-section-title">🌿 認知芳療建議：'+f.oil+'</div><div class="result-section-content">'+f.oilDetail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🧘 冥想練習（60-90秒）</div><div class="result-section-content">'+f.med.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">✦ 馥靈收束語</div><div class="result-section-content" style="font-family:LXGW WenKai TC,serif;font-size:1rem;line-height:1.9">'+f.closing+'</div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ 馥靈之鑰 × 你的覺察密碼</div><div class="hour-bridge-text" style="margin-bottom:8px">你說話的方式不是性格，是一套你很早就學會的生存策略。看見它，你才能選擇：繼續用，還是換一套。</div><div style="font-size:.85rem;color:#9e8a70;line-height:1.8;margin-bottom:16px">馥靈秘碼可以看到你天生的溝通天賦設定，跟今天的測驗交叉比對，會發現有趣的落差。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免費解碼馥靈秘碼 →</a>';
  try{localStorage.setItem('hl_quiz_comm',JSON.stringify({type:topType,scores,ts:Date.now()}));}catch(e){}
  window._resultText=f.icon+' 我的溝通風格是「'+f.name+'」：'+f.sub+'。'+f.desc.substring(0,60)+'⋯ 你說話暴露了什麼？ 👉 hourlightkey.com/quiz-communication-style.html #馥靈之鑰 #溝通風格';
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz-communication-style',toolName:'溝通風格解碼'});window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
