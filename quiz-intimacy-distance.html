const TYPES={
  island:{name:'孤島型',icon:'🏝️',sub:'你在自己的島上活得挺好的，海水就是你的城牆',
    keys:['獨立自足','不需要人','情感隔離'],
    desc:'你跟人之間的距離是最遠的那種。不是故意冷漠，是你真的覺得一個人比較自在。你有自己的節奏、自己的世界、自己的方式。別人靠近的時候你會本能地退後，不是討厭他們，是你的個人空間比大多數人大很多。你的島很舒服，有書有音樂有你喜歡的一切。你只是不太需要另一個人出現在島上。',
    detail:'孤島型的底層通常有兩種可能。一種是「迴避依附」，你在成長過程中學到了「需要別人是危險的」。也許你表達需求的時候被忽略了，也許你靠近的時候被推開了。你的身體記住了那個經驗，所以它選擇不再靠近。另一種可能是你真的天生需要比較多的獨處空間，這不是問題，只是你的出廠設定。\n\n但值得留意的是：你的「不需要」是真的不需要，還是「需要了會失望所以不如不需要」？如果你在一個人待久了會有一陣空虛，那就不是不需要，是你把那個開關關掉了。\n\n覺察邀請：這週主動跟一個人約一杯咖啡。不聊什麼嚴肅的事。只是練習「有人在旁邊也是可以的」。你的島不會因為有人來訪就沉掉。',
    oil:'玫瑰 1 滴＋佛手柑 2 滴＋甜橙 2 滴。玫瑰輕輕打開你的心。佛手柑降低你對靠近的防備。甜橙讓「有人在旁邊」變得不那麼有壓力。',
    med:'閉上眼睛。想像你的島，海水環繞。吸氣四秒，感覺腳下的沙。吐氣六秒，不用改變什麼，就坐在這裡。遠遠的海平線上有一艘船，它只是路過。吸氣四秒，你對它點個頭。吐氣六秒，它繼續往前走了。重複三次。張開眼睛。今天有沒有一個人，你可以傳一句「我想到你了」？不用解釋，只是傳。',
    quote:'你的島很美。但偶爾讓一艘船靠岸，不會讓島變小。'},
  fortress:{name:'城堡型',icon:'🏰',sub:'你蓋了一座很堅固的城堡，但忘了留一扇門',
    keys:['高度防衛','情感壓抑','自給自足'],
    desc:'你跟孤島型有點像，但不同的是你的距離不是天生的，是你蓋出來的。你的城牆是一塊一塊用過去的傷痕堆起來的。你知道親密關係是什麼感覺，你嚐過，然後你受傷了。所以你決定蓋一座城堡，把自己保護起來。城堡很安全，但也很寂寞。',
    detail:'城堡型通常跟過去的關係創傷有關。被背叛、被拋棄、被忽視、被利用。你的身體從那些經驗裡學到了一件事：「靠近的人都會傷你。」所以你的解決方案是不讓任何人靠近到可以傷你的距離。\n\n你可能看起來很獨立、很堅強、什麼都不缺。但你知道那面牆後面有什麼。你知道你半夜三點醒來的時候，城堡裡有多空曠。你只是怕讓人進來之後又被留在空城堡裡。\n\n覺察邀請：你不需要拆掉城牆。但也許可以開一扇小窗。讓一個你信任的人看到裡面。不是把門打開，只是讓光透進來。一扇窗就好。',
    oil:'乳香 2 滴＋檀香 2 滴＋玫瑰 1 滴。乳香幫你跟過去的傷和解。檀香讓你在安全的情境裡放下戒備。玫瑰是你心裡那扇窗的第一道光。',
    med:'閉上眼睛。你在城堡裡，牆很厚，但你找到一扇窗。吸氣四秒，把窗子推開一點。外面有光。吐氣六秒，讓那道光照在你的手上。不用開門，只是開一扇窗。吸氣四秒，感覺光的溫度。吐氣六秒，說：「我讓光進來了，城堡還在。」重複四次。張開眼睛。今天，讓一個你信任的人多看到一點點真實的你。',
    quote:'你的城堡保護了你。但裡面那個人也需要陽光。'},
  satellite:{name:'衛星型',icon:'🛰️',sub:'你繞著別人轉，但永遠不降落',
    keys:['觀察者','保持距離','怕被吞噬'],
    desc:'你跟人的距離很奇妙。你很在乎，在乎到你會觀察對方的一舉一動、記住對方說過的每句話、默默替對方做很多事。但你永遠維持在一個「軌道」上，繞著轉但不降落。你怕的不是靠近，你怕的是「靠近之後失去自己」。',
    detail:'衛星型的人通常有很強的觀察力和同理心。你能「讀」懂別人的情緒，知道他們需要什麼。但你選擇在安全距離觀察，而不是進入。因為你有一個深層的恐懼：「如果我完全進入一段關係，我會消失。」\n\n這可能跟你的成長經驗有關。也許你在家裡是那個「為別人的情緒負責」的小孩。也許你經歷過一段讓你失去自我的關係。你的衛星軌道是你找到的平衡：既能看見對方，又不會被對方的引力拉垮。\n\n覺察邀請：這週試著「降落」一次。跟一個安全的人分享你真正的感受。不是你觀察到的「他的」感受，是你自己的。讓你的存在不只是環繞，而是著陸。',
    oil:'岩蘭草 2 滴＋薰衣草 2 滴＋甜橙 1 滴。岩蘭草把你從軌道上拉回地面。薰衣草讓降落的過程是柔軟的。甜橙告訴你地面上也有好東西。',
    med:'閉上眼睛。想像你在軌道上繞著地球轉。吸氣四秒，感覺那個速度。吐氣六秒，開始慢下來。第三次呼吸的時候，軌道慢慢降低，地面越來越近。吸氣四秒，你輕輕降落了，腳踩在地上。吐氣六秒，說：「我落地了，我還是我。」重複三次。張開眼睛。今天說一件只關於你自己的感受，不是你觀察到別人的事。',
    quote:'你觀察得很仔細。但他們也想看到你。不只是你的關心，是你這個人。'},
  elastic:{name:'彈性安全型',icon:'🌿',sub:'你知道什麼時候靠近、什麼時候退開，而且都是自在的',
    keys:['安全依附','彈性調節','關係舒適'],
    desc:'恭喜你，你的刺蝟距離是最健康的那種。你能靠近也能離開，而且兩種狀態你都不焦慮。你想跟人在一起的時候就在一起，想要空間的時候也能溫柔地表達。你不怕被拋棄，也不怕被吞噬。你在關係裡是鬆的、流動的、有彈性的。',
    detail:'彈性安全型對應的是心理學裡的「安全依附」。這通常意味著你在成長過程中有過至少一個「穩定的、可預測的、回應你需求的」照顧者。你的身體學到了一件很重要的事：「靠近是安全的，離開也是安全的。」\n\n但安全依附不代表你永遠不會焦慮。壓力大的時候、遇到重大失落的時候，你也可能暫時偏向某一端。你的優勢是你有「回到中間」的能力。你知道那個平衡點在哪裡，而且你能找到路回去。\n\n覺察邀請：你的關係模式很好。你要做的是維護它，以及理解不是每個人都有這麼好的出發點。當你身邊有人過度黏或過度遠，不是他們故意的，是他們的刺蝟距離跟你不同。',
    oil:'薰衣草 2 滴＋甜橙 2 滴＋乳香 1 滴。這是保養配方不是修復配方。薰衣草維持你的安全基調。甜橙保持你的溫暖連結。乳香讓你在安全裡繼續深化。',
    med:'閉上眼睛。感覺今天的你。吸氣四秒，想一個你在乎的人。吐氣六秒，感覺這份在乎是輕的，流動的，不是壓著你的。再一次。吸氣四秒，問自己：「今天我想靠近誰？」吐氣六秒，讓名字自然浮現。重複三次。張開眼睛。不用做什麼大的事，今天任何一個小動作都可以是一種靠近。',
    quote:'你找到了那個剛好的距離。繼續在那裡。偶爾幫別人也找到他們的。'},
  magnet:{name:'磁鐵型',icon:'🧲',sub:'你渴望連結到幾乎要把對方吸進來',
    keys:['渴望親密','分離焦慮','怕被拋棄'],
    desc:'你跟人之間的距離是最近的那種。你喜歡黏在一起、隨時聯絡、分享一切。你的愛很濃烈，你的需要很直接。當對方回訊息慢了、取消約會了、跟別人比較親了，你會焦慮。不是你不獨立，是「跟重要的人連在一起」對你來說等於「安全」。斷線就像斷氧。',
    detail:'磁鐵型對應的是「焦慮依附」。你的身體在成長過程中經歷了一種不確定性：照顧者有時候在、有時候不在。你不知道他什麼時候會回應你、什麼時候會消失。所以你的策略是「靠得越近越好」，因為距離等於危險。\n\n你的愛不是「太多」。你的愛是你確認安全的方式。但問題是你的安全感建立在「對方的回應」上，而不是你自己的內在。當對方已讀不回，你的安全感就碎了。這讓你在關係裡很累，也讓對方很有壓力。\n\n覺察邀請：下次你想傳第三則訊息的時候，暫停。把手放在胸口，做三次呼吸。問自己：「我現在是在表達愛，還是在確認他還在？」如果是後者，先安撫自己，再決定要不要傳。',
    oil:'薰衣草 3 滴＋岩蘭草 2 滴。薰衣草直接安撫你的分離焦慮。岩蘭草讓你的安全感從外在挪回內在。不是不讓你靠近別人，是讓你在自己身上也找得到溫暖。',
    med:'閉上眼睛。把雙手放在胸口。吸氣四秒，感覺手掌貼著胸口的溫度。吐氣六秒，對自己說：「我在這裡。」再一次。吸氣四秒，感覺那個溫度。吐氣六秒，說：「在得到任何回應之前，我就已經存在了。」重複四次。每次吐氣，那個等待的焦慮就小一點點。不是消失，是小了一點。張開眼睛。你剛才在陪自己，這也是一種愛。',
    quote:'你的愛很真很濃。但你不需要對方的每一個回應來證明自己值得被愛。'},
  pushpull:{name:'推拉型',icon:'🌊',sub:'你想靠近又想逃，想逃又想靠近，在兩端之間不停擺盪',
    keys:['矛盾依附','忽冷忽熱','自我保護'],
    desc:'你在關係裡的距離一直在變。有時候你想跟對方黏在一起、想被擁抱、想全然地信任。但靠近到某個點的時候，你會突然害怕，然後推開。推開之後又覺得空虛，於是又想靠近。你的伴侶可能覺得你忽冷忽熱很難捉摸，但你自己也很累，因為你同時想要又害怕你想要的東西。',
    detail:'推拉型對應的是「矛盾依附」（fearful-avoidant）。你同時擁有靠近的渴望和遠離的恐懼。這通常源自一種矛盾的早期經驗：給你愛的人同時也是讓你受傷的人。你學到了一件很困惑的事：「愛和痛是綁在一起的。」\n\n所以你的每一次靠近都伴隨著預期的傷害。你在伸手的同時已經在準備縮回去。這不是你故意的，是你的身體記住了「靠近之後會發生壞事」的模式。\n\n覺察邀請：你需要的不是「決定要靠近還是遠離」。你需要的是一個「靠近了之後不會受傷」的經驗。一次就好。找一個安全的人（可以是朋友、可以是專業的陪伴者），練習靠近了之後待在那裡。不逃。讓你的身體學到新的模式：靠近也可以是安全的。',
    oil:'天竺葵 2 滴＋薰衣草 2 滴＋乳香 1 滴。天竺葵平衡你推和拉的兩股力量。薰衣草安撫你靠近時的恐懼。乳香讓你在矛盾裡找到一個暫時的落腳點。',
    med:'閉上眼睛。想像你站在門口，門一半開著。吸氣四秒，不用決定要進去還是出來，就在門口站著。吐氣六秒，感覺兩腳踩在地上，門口的地也是實的。吸氣四秒，說：「我可以在中間待一下。」吐氣六秒。重複三次。最後一次說：「靠近和遠離，都不是一輩子的事。」張開眼睛。今天找一個你可以待住的距離，哪怕只有五分鐘。',
    quote:'同時渴望又害怕，慢慢來。找到一個你敢停下來的地方。'},
  chameleon:{name:'變色龍型',icon:'🦎',sub:'你的距離取決於對方想要多近，你會自動調整',
    keys:['過度配合','失去自我','怕被嫌棄'],
    desc:'你在每段關係裡的距離都不一樣，不是因為你很有彈性，是因為你在配合對方。對方想黏你就黏，對方想要空間你就退。你的距離感不是從自己內在長出來的，是從對方的需求反推出來的。你很會讀空氣、很會調整、很會讓對方舒服。但你可能不知道「自己」最舒服的距離是什麼。',
    detail:'變色龍型的底層通常是「如果我不配合，對方就會離開」的恐懼。你學會了用「讓別人舒服」來確保關係的存續。這很累。因為你一直在做翻譯的工作：翻譯對方想要什麼，然後把自己翻譯成那個樣子。\n\n你可能在不同的朋友面前是不同的人。跟外向的朋友在一起你變得很嗨，跟安靜的朋友在一起你變得很沉穩。你以為這是適應力好，但如果你一個人的時候不知道自己是什麼樣子，那就不是適應，是消失。\n\n覺察邀請：這週跟一個信任的朋友約出來，然後什麼都不配合。不去猜他想聊什麼、不去調整你的語速和音量。就做你自己。看看結果是什麼。大部分時候，結果會比你想的好得多。',
    oil:'迷迭香 2 滴＋雪松 2 滴＋佛手柑 1 滴。迷迭香幫你找到自己的聲音。雪松讓你長出自己的根，不用攀附在別人身上。佛手柑讓做自己的過程不那麼可怕。',
    med:'閉上眼睛。這次，問的不是別人想要什麼。吸氣四秒，問自己：「今天，我想要什麼？」吐氣六秒，讓答案慢慢浮出來。再一次。吸氣四秒，如果答案是空白的，也沒關係。吐氣六秒，那個空白也是訊號，你還不習慣問自己。重複三次。張開眼睛。今天說一次「我比較想要，」，完整說出你自己的偏好，不用配合任何人。',
    quote:'你很會讀別人。現在練習讀自己。你想要什麼距離？'},
  bridge:{name:'橋樑型',icon:'🌉',sub:'你擅長拉近人跟人之間的距離，但常常忘了自己也需要被拉近',
    keys:['連結者','忽略自我需求','關係推手'],
    desc:'你是人群裡的橋樑。你擅長讓不同的人靠近、讓關係變好、讓氣氛變溫暖。你可能是那個在群組裡主動約聚會的人、在朋友之間傳話和解的人、在家族裡把大家連在一起的人。你的刺蝟距離在幫別人的時候很完美，但在面對自己的親密關係時就會出問題。',
    detail:'橋樑型的人通常把注意力放在「別人的關係」而不是「自己的關係」。你幫別人修復了十段友情，但你自己最深的孤獨沒有人知道。因為你永遠是那個幫忙的人，不是被幫的人。你不習慣說「我需要」，你習慣說「你需要什麼」。\n\n你的關係裡可能有一種微妙的不平衡：你付出很多，但接收很少。不是別人不給你，是你不太會接。有人想靠近你的時候，你會不自覺地把角色切換成「服務模式」，幫對方解決問題而不是讓對方看到你的脆弱。\n\n覺察邀請：這週讓一個人幫你一件事。不是大事，可以是幫你倒杯水、聽你抱怨五分鐘、陪你走一段路。練習從「橋」變成「走在橋上的人」。',
    oil:'天竺葵 2 滴＋薰衣草 1 滴＋檀香 2 滴。天竺葵平衡你的給予和接收。薰衣草提醒你也可以被照顧。檀香連結你跟自己最深的需求。',
    med:'閉上眼睛。想像你站在一座橋上，這次有個人從對面走來，要幫你。吸氣四秒，讓他靠近，你不用側身讓路。吐氣六秒，他把手放在你肩上。吸氣四秒，感覺那個重量被接住了。吐氣六秒，說：「我也可以被照顧。」重複三次。張開眼睛。今天讓一個人幫你一件小事，說「謝謝」而不是「不用了」。',
    quote:'你連接了很多人。但誰在連接你？讓別人也走到你這一邊來。'}
};
let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 題 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一題</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一題 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看看我的刺蝟距離 🦔</button>')+'</div>';area.appendChild(card);});updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 題，共 '+questions.length+' 題';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const dimScores={};Object.keys(DIMS).forEach(k=>{dimScores[k]=0;});
  Object.keys(answers).forEach(qi=>{const oi=answers[qi];const s=questions[qi].opts[oi].s;Object.keys(s).forEach(d=>{dimScores[d]+=s[d];});});
  const maxPossible=Object.keys(answers).length*3;
  const c=dimScores.close,m=dimScores.mid,f=dimScores.far,p=dimScores.push;
  let topType;
  if(m>c&&m>f&&m>p) topType='elastic';
  else if(p>c&&p>m&&p>f) topType='pushpull';
  else if(c>f*1.5&&c>m&&c>p) topType='magnet';
  else if(f>c*1.5&&f>m&&f>p) topType=(f>20)?'island':'fortress';
  else if(f>c&&f>m&&p>c) topType='fortress';
  else if(c>f&&c>m&&p>0&&p>=m) topType='chameleon';
  else if(c>f&&m>p) topType='bridge';
  else if(f>c) topType='satellite';
  else topType='elastic';
  const ft=TYPES[topType];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('hlTitleReveal').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥靈之鑰</div><div class="ss-icon">'+ft.icon+'</div><div class="ss-title">'+ft.name+'</div><div class="ss-sub">'+ft.sub+'</div><div class="ss-quote">「'+ft.quote+'」</div><div class="ss-footer">hourlightkey.com ✦ </div></div><div class="hl-title-card"><div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div><div class="hl-title-eyebrow">Hour Light ✦ 刺蝟距離覺察</div><span class="hl-title-icon">'+ft.icon+'</span><div class="hl-title-main">'+ft.name+'</div><div class="hl-title-sub">'+ft.sub+'</div><div class="hl-title-divider"></div><div class="hl-title-grid"><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 距離類型</div><div class="hl-title-tag-value">'+ft.name+'</div></div><div class="hl-title-tag" style="grid-column:1/-1"><div class="hl-title-tag-label">✦ 覺察關鍵字</div><div class="hl-title-tag-value">'+ft.keys.join(' · ')+'</div></div></div><div class="hl-title-quote">「'+ft.quote+'」</div><div class="hl-title-combo-hint">'+ft.name+'｜'+ft.sub+'</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+ft.icon+'</span><div class="result-type-label">刺蝟距離覺察 Hedgehog Dilemma</div><div class="result-combo-name">'+ft.name+'</div><div class="result-subtitle">'+ft.sub+'</div>';
  const sorted=Object.keys(DIMS).sort((a,b)=>dimScores[b]-dimScores[a]);
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var pct=Math.round(dimScores[k]/maxPossible*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+DIMS[k]+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
  document.getElementById('resultSections').innerHTML='<div class="result-section"><div class="result-section-title">'+ft.icon+' 你的刺蝟距離</div><div class="result-section-content">'+ft.desc+'</div></div><div class="result-section"><div class="result-section-title">🔍 深度覺察</div><div class="result-section-content">'+ft.detail.replace(/\n/g,'<br>')+'</div></div><div class="result-section"><div class="result-section-title">🌿 認知芳療配方</div><div class="result-section-content">'+ft.oil+'</div></div>'+(ft.med?'<div class="result-section"><div class="result-section-title">🧘 隨時可做的覺察冒想</div><div class="result-section-content">'+ft.med.replace(/\n/g,'<br>')+'</div></div>':'')+'<div class="result-section" style="text-align:center;font-family:LXGW WenKai TC,serif;font-size:1.05rem;color:#8b6914"><div class="result-section-content"></div></div>';
  document.getElementById('resultHour').innerHTML='<div class="hour-bridge-label">✦ H.O.U.R. 覺察橋接</div><div class="hour-bridge-text">你的刺蝟距離是「關係裡的你」，馥靈秘碼看的是「設定裡的你」。<br>你跟人的距離，跟你對自己的距離，其實是同一個答案。</div><a href="fuling-mima.html" class="hour-bridge-cta">🔮 免費解碼馥靈秘碼 →</a>';
  window._resultText=ft.icon+' 我是「'+ft.name+'」！'+ft.sub+'\n「'+ft.quote+'」\n\n你的刺蝟距離是多少？👉 hourlightkey.com/quiz-intimacy-distance.html';
  try{localStorage.setItem('hl_quiz_intimacy_distance',JSON.stringify({type:topType,dimScores,ts:Date.now()}));}catch(e){}
  document.getElementById('quizResult').classList.add('active');
  if(window.HL_dropMaterial) HL_dropMaterial('quiz');
  if(window.HL_track) HL_track('quiz_complete',{toolId:'quiz',toolName:'親密距離量表'});window.scrollTo({top:0,behavior:'smooth'});
}
function restartQuiz(){answers={};currentQ=0;document.getElementById('quizResult').classList.remove('active');document.getElementById('questionsArea').style.display='block';document.getElementById('progressWrap').style.display='block';renderQuestion(0);window.scrollTo({top:0,behavior:'smooth'});}
</script>
