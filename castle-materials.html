<title>材料庫｜收集材料・合成傢具・建造你的城堡｜馥靈之鑰 Hour Light</title>
<meta name="description" content="探索全站、收集材料、合成傢具，打造屬於你的內在城堡。每個行動都留下痕跡，每件傢具都有它的故事。"/>
<meta property="og:title" content="材料庫｜馥靈之鑰內在城堡"/>
<meta property="og:description" content="探索全站收集材料，合成傢具建造你的城堡。"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --rose:#E63946;--teal:#2EC4B6;--navy:#1D3557;--coral:#E76F51;
  --amber:#F0A500;--amber-l:#FFD166;
  --cream:#FFF8F0;--peach:#FFE8D6;--warm:#5a3c22;--muted:#a08060;
  --gold:#e9a060;--gold-d:#c47a30;
  --rare-bg:#FAEEDA;--rare-border:#BA7517;--rare-text:#633806;
  --legend-bg:#EEEDFE;--legend-border:#7F77DD;--legend-text:#3C3489;
  --card:rgba(255,255,255,.92);
  --txt:#1a1a2e;--txt-l:#4a4a5a;--txt-d:#8a8a9a;
}
html{scroll-behavior:smooth}
body{font-family:'Noto Serif TC',serif;color:var(--txt);background:linear-gradient(160deg,var(--cream) 0%,var(--peach) 60%,#f0e8d8 100%);min-height:100vh;overflow-x:hidden}

/* ── topbar ── */
.topbar{position:sticky;top:0;z-index:200;background:rgba(255,248,240,.92);backdrop-filter:blur(8px);border-bottom:1px solid rgba(233,160,96,.15);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.topbar-back{font-size:.78rem;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:4px}
.topbar-title{font-size:.9rem;font-weight:700;color:var(--warm)}
.topbar-pts{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted)}
.pts-badge{background:var(--gold);color:#fff;padding:2px 10px;border-radius:20px;font-size:.72rem;font-weight:700}

/* ── 頁首 ── */
.hero{text-align:center;padding:32px 20px 20px}
.hero h1{font-family:'Playfair Display','Noto Serif TC',serif;font-size:clamp(1.6rem,5vw,2.2rem);font-weight:800;color:var(--navy);margin-bottom:8px}
.hero-sub{font-size:.85rem;color:var(--muted);line-height:1.7;max-width:320px;margin:0 auto}

/* ── 今日掉落進度條 ── */
.daily-strip{margin:0 16px 16px;background:var(--card);border-radius:14px;padding:14px 16px;border:1px solid rgba(233,160,96,.2)}
.daily-strip h3{font-size:.78rem;color:var(--muted);margin-bottom:10px;letter-spacing:.05em}
.zone-rows{display:flex;flex-direction:column;gap:8px}
.zone-row{display:flex;align-items:center;gap:10px}
.zone-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.zone-name{font-size:.78rem;color:var(--warm);flex:1;min-width:60px}
.zone-bar{flex:2;height:6px;background:rgba(0,0,0,.06);border-radius:3px;overflow:hidden}
.zone-fill{height:100%;border-radius:3px;background:var(--gold);transition:width .4s}
.zone-fill.full{background:#aaa}
.zone-count{font-size:.72rem;color:var(--muted);min-width:30px;text-align:right;flex-shrink:0}
.zone-btn{font-size:.68rem;padding:3px 10px;border-radius:12px;border:1px solid var(--gold);color:var(--gold-d);background:transparent;cursor:pointer;text-decoration:none;flex-shrink:0;white-space:nowrap}
.zone-btn.full{border-color:#ccc;color:#bbb;cursor:default}

/* ── tab ── */
.tabs{display:flex;gap:0;margin:0 16px 16px;background:rgba(0,0,0,.04);border-radius:12px;padding:3px}
.tab-btn{flex:1;padding:8px 4px;font-size:.78rem;color:var(--muted);background:transparent;border:none;border-radius:9px;cursor:pointer;font-family:inherit;transition:all .2s;font-weight:500}
.tab-btn.active{background:var(--card);color:var(--warm);box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* ── 材料庫 ── */
.mat-section{padding:0 16px 8px}
.zone-header{font-size:.72rem;color:var(--muted);letter-spacing:.08em;margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.zone-header::after{content:'';flex:1;height:1px;background:rgba(0,0,0,.06)}
.mat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px;margin-bottom:4px}
.mat-card{background:var(--card);border:1px solid rgba(0,0,0,.06);border-radius:12px;padding:10px 6px 8px;text-align:center;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative}
.mat-card:hover{transform:scale(1.04);box-shadow:0 4px 16px rgba(0,0,0,.08)}
.mat-card.rare{border-color:var(--rare-border);background:var(--rare-bg)}
.mat-card.legendary{border-color:var(--legend-border);background:var(--legend-bg)}
.mat-card.locked{opacity:.38;filter:grayscale(.8);cursor:default}
.mat-card.locked:hover{transform:none;box-shadow:none}
.mat-icon{font-size:22px;display:block;margin-bottom:4px;line-height:1}
.mat-name{font-size:.62rem;color:var(--warm);font-weight:700;line-height:1.3;word-break:break-all}
.mat-count{font-size:.6rem;color:var(--muted);margin-top:2px}
.mat-count.rare{color:var(--rare-text)}
.mat-count.legendary{color:var(--legend-text)}
.mat-new{position:absolute;top:4px;right:4px;width:7px;height:7px;background:var(--rose);border-radius:50%}

/* ── 材料詳情浮層 ── */
.mat-detail{display:none;margin:0 16px 12px;background:var(--card);border-radius:14px;padding:16px;border:1px solid rgba(233,160,96,.25);animation:fadeUp .25s ease}
.mat-detail.show{display:block}
.mat-detail-top{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.mat-detail-icon{font-size:36px;line-height:1;flex-shrink:0}
.mat-detail-info{flex:1}
.mat-detail-name{font-size:1rem;font-weight:700;color:var(--warm);margin-bottom:3px}
.mat-detail-zone{font-size:.72rem;color:var(--muted);margin-bottom:6px}
.mat-detail-rarity{display:inline-block;font-size:.65rem;padding:2px 10px;border-radius:20px;font-weight:700}
.mat-detail-rarity.common{background:rgba(0,0,0,.05);color:var(--muted)}
.mat-detail-rarity.rare{background:var(--rare-bg);color:var(--rare-text);border:1px solid var(--rare-border)}
.mat-detail-rarity.legendary{background:var(--legend-bg);color:var(--legend-text);border:1px solid var(--legend-border)}
.mat-detail-count{font-size:1.4rem;font-weight:800;color:var(--warm);line-height:1}
.mat-detail-sub{font-size:.7rem;color:var(--muted)}
.mat-detail-how{font-size:.75rem;color:var(--txt-l);line-height:1.7;border-top:1px solid rgba(0,0,0,.05);padding-top:10px}
.mat-detail-close{display:block;text-align:center;font-size:.72rem;color:var(--muted);margin-top:10px;cursor:pointer;padding:4px}

/* ── 合成配方 ── */
.recipe-list{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.recipe-card{background:var(--card);border:1px solid rgba(0,0,0,.06);border-radius:14px;padding:14px}
.recipe-card.can-craft{border-color:rgba(233,160,96,.4);background:rgba(255,248,240,.95)}
.recipe-card.owned{border-color:rgba(29,158,117,.3);background:rgba(225,245,238,.6)}
.recipe-top{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
.recipe-icon{font-size:32px;line-height:1;flex-shrink:0}
.recipe-meta{flex:1}
.recipe-name{font-size:.9rem;font-weight:700;color:var(--warm);margin-bottom:2px}
.recipe-zone-tag{display:inline-block;font-size:.62rem;padding:1px 8px;border-radius:10px;background:rgba(0,0,0,.05);color:var(--muted);margin-bottom:6px}
.recipe-desc{font-size:.75rem;color:var(--txt-l);line-height:1.6;font-style:italic}
.recipe-mats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.mat-pill{font-size:.68rem;padding:3px 10px;border-radius:20px;background:rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.08);color:var(--txt-l);display:flex;align-items:center;gap:4px}
.mat-pill.has{background:rgba(29,158,117,.08);border-color:rgba(29,158,117,.3);color:#085041}
.mat-pill.missing{background:rgba(226,75,74,.06);border-color:rgba(226,75,74,.2);color:#791F1F}
.craft-btn{width:100%;padding:10px;border-radius:10px;font-size:.82rem;font-family:inherit;font-weight:700;border:none;cursor:pointer;transition:all .2s}
.craft-btn.ready{background:var(--gold);color:#fff}
.craft-btn.ready:hover{background:var(--gold-d)}
.craft-btn.not-ready{background:rgba(0,0,0,.05);color:var(--muted);cursor:default}
.craft-btn.owned-btn{background:rgba(29,158,117,.1);color:#085041;cursor:default}
.owned-badge{display:inline-flex;align-items:center;gap:4px;font-size:.68rem;color:#085041;margin-bottom:6px}

/* ── 稀有材料來源提示 ── */
.rare-source-hint{margin-top:8px;padding:8px 12px;border-radius:10px;background:rgba(233,194,125,.08);border:1px solid rgba(233,194,125,.18);font-size:.72rem;color:var(--txt-l);line-height:1.6}
.rare-source-hint a{color:var(--warm);text-decoration:none;font-weight:600}
.rare-source-hint a:hover{text-decoration:underline}

/* ── 今日採集指南 ── */
.guide-list{padding:0 16px;display:flex;flex-direction:column;gap:8px}
.guide-card{background:var(--card);border:1px solid rgba(0,0,0,.06);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.guide-card.done{opacity:.5}
.guide-left{flex:1}
.guide-name{font-size:.82rem;font-weight:700;color:var(--warm);margin-bottom:2px}
.guide-desc{font-size:.7rem;color:var(--muted)}
.guide-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.guide-remain{font-size:.68rem;color:var(--muted)}
.guide-link{font-size:.72rem;padding:5px 14px;border-radius:20px;background:var(--gold);color:#fff;text-decoration:none;font-weight:700;white-space:nowrap}
.guide-link.done-link{background:rgba(0,0,0,.08);color:var(--muted)}

/* ── Toast ── */
.drop-toast{position:fixed;bottom:80px;right:16px;z-index:9999;background:linear-gradient(135deg,var(--cream),var(--peach));color:var(--warm);padding:12px 18px;border-radius:16px;font-size:.8rem;font-weight:600;box-shadow:0 6px 24px rgba(0,0,0,.15);opacity:0;transform:translateX(20px);transition:all .35s;pointer-events:none;max-width:240px}
.drop-toast.show{opacity:1;transform:translateX(0)}
.drop-toast-sub{font-size:.68rem;opacity:.7;margin-top:3px;font-weight:400}
.craft-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);z-index:9999;background:#E1F5EE;color:#085041;padding:12px 24px;border-radius:16px;font-size:.8rem;font-weight:600;box-shadow:0 6px 24px rgba(0,0,0,.12);opacity:0;transition:all .35s;pointer-events:none;text-align:center;white-space:nowrap}
.craft-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── 底部留白 ── */
.bottom-pad{height:80px}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

<script>

// ── 材料說明（掉落方式 + 芳療知識）──
var MAT_HOW = {
  moonlight_shard:  '每天完成城堡謎語，有機會掉落。\n\n【冷知識 ✦ 來源：芳療蒸餾工業文獻】薰衣草花朵的最佳採收時間是清晨日出前，研究顯示這個時段芳香醇（linalool）和乙酸芳樟酯（linalyl acetate）濃度最高，太陽一出來揮發性分子就開始散失。每天回來的習慣和這個道理一樣：不是要求完美，是把握那個時機。月亮的節律的靜謐。真正薰衣草（Lavandula angustifolia）在夜間採收品質最佳，因為日出前花朵的芳香分子濃度最高。月亮的節律和精油採收的節律，從來都是一回事。',
  midnight_silence: '完成夢境走廊或鏡之廳謎語後掉落。\n\n乳香低語，乳香（Boswellia sacra）在靜默中釋放最多的α-松烯，這個成分能跨越血腦屏障，調節神經傳遞素。幾千年前的僧侶在冥想時燃燒乳香，不是迷信，是直覺地掌握了腦化學。',
  honest_mirror:    '連續3天完成城堡謎語後掉落。\n\n誠實是最難的功課。迷迭香（Rosmarinus officinalis）裡的1,8-桉葉素能改善工作記憶，讓人更清晰地看見自己。「迷迭香是為了記憶」，莎士比亞在《哈姆雷特》裡早就說了。',
  dawn_dew:         '連續7天完成城堡謎語後掉落。\n\n【冷知識 來源：Journal of Ethnopharmacology 2024 / PubMed 39426576】2024年研究確認，薰衣草精油透過嗅覺作用在中央杏仁核的GABA神經元，縮短進入非快速眼動睡眠的時間，效果和低劑量煩寧相當。研究者阻斷老鼠嗅覺後助眠效果完全消失，氣味本身就是機制，不只是心理作用。每天回來練習的規律，是在用最溫柔的方式照顧自己的神經系統。',
  castle_key_core:  '連續30天不間斷探索城堡才能得到。傳說材料。\n\n三十天是習慣形成的最低門檻。神經可塑性研究顯示，重複的行為在30天後開始在神經迴路留下痕跡。你的城堡鑰芯，就是大腦改變的物理證據。',
  insight_feather:  '完成任何心理測驗後掉落。\n\n洞見像羽毛，輕盈卻真實。佛手柑（Citrus bergamia）裡的香柑油內酯（bergapten）在芳療中對應「照見」的能量，幫助人看清楚一直沒有正視的模式。',
  emotion_color:    '完成情緒、壓力、EQ類測驗後掉落。\n\n情緒是有顏色的，這不是比喻。大腦在處理情緒時會同時觸發視覺皮層。天竺葵（Pelargonium graveolens）裡的香茅醇能平衡腎上腺素，讓情緒的顏色不再那麼衝。',
  mirror_truth:     '完成深潛覺察測驗後掉落。\n\n深潛看到的，是表面測驗照不到的角落。玫瑰（Rosa damascena）精油需要3-5噸花瓣才能萃取1公斤，這種稀貴對應了真實自我的難以取得，卻無比珍貴。',
  psyche_crystal:   '完成MBTI、九型人格、Big Five等認證測驗後掉落。\n\n心靈水晶代表有框架的自我認識。橙花（Citrus aurantium var. amara flos.）在傳統芳療中用於「心理創傷修復」，它的複雜性（超過900個化學成分）對應了人格的無法簡化。',

// ── 核心函數 ──
var _currentDetail = null;

function init(){
  updateTopStats();
  renderZoneProgress();
  renderInventory();
}

function updateTopStats(){
  var st = hlCastle ? hlCastle.getState() : { points:0 };
  document.getElementById('pts-display').textContent = st.points;
}

function renderZoneProgress(){
  var container = document.getElementById('zone-progress');
  var html = '';
  ZONES.forEach(function(z){
    var remaining = hlMaterial ? hlMaterial.getDailyRemaining(z.type) : z.limit;
    var used = z.limit === 999 ? 0 : z.limit - remaining;
    var pct = z.limit === 999 ? 0 : Math.round(used / z.limit * 100);
    var isFull = remaining <= 0 && z.limit !== 999;
    var desc = z.desc.replace('{n}', remaining);
    html += '<div class="zone-row">' +
      '<span class="zone-icon">' + z.icon + '</span>' +
      '<span class="zone-name">' + z.name + '</span>';
    if(z.limit !== 999){
      html += '<div class="zone-bar"><div class="zone-fill' + (isFull?' full':'') +
        '" style="width:' + pct + '%"></div></div>' +
        '<span class="zone-count">' + (isFull ? '已滿' : remaining + '/' + z.limit) + '</span>';
    } else {
      html += '<div class="zone-bar"><div class="zone-fill" style="width:0%"></div></div>' +
        '<span class="zone-count">限定</span>';
    }
    html += '<a href="' + z.link + '" class="zone-btn' + (isFull?' full':'') + '">' +
      (isFull ? '明天再來' : '前往') + '</a></div>';
  });
  container.innerHTML = html;
}

function renderInventory(){
  var inv = hlMaterial ? hlMaterial.getInventory() : {};
  var allDefs = hlMaterial ? hlMaterial.getAllDefs() : {};
  var container = document.getElementById('inventory-content');
  var html = '';
  var zoneOrder = [
    { key:'castle_riddle', label:'城堡主堡' },
    { key:'quiz',          label:'覺察殿' },
    { key:'calculator',    label:'星象塔' },
    { key:'draw',          label:'神諭廳' },
    { key:'oracle',        label:'神諭廳' },
    { key:'draw_dna',      label:'牌卡殿' },
    { key:'course',        label:'學院塔' },
    { key:'nature_event',  label:'季節庭院' },
    { key:'inner_realm',   label:'內在深宮' }
  ];

  var rendered = {};
  var zoneSeen = {};

  zoneOrder.forEach(function(z){
    if(rendered[z.key]) return;
    rendered[z.key] = true;
    var pool = allDefs[z.key];
    if(!pool || !pool.length) return;
    // 去重標籤（oracle和draw共用神諭廳）
    var zoneLabel = z.label;
    if(zoneSeen[zoneLabel]) return;
    zoneSeen[zoneLabel] = true;

    // 合併同區域的池子（draw + oracle）
    var combinedPool = pool.slice();
    if(z.key === 'draw' && allDefs['oracle']){
      allDefs['oracle'].forEach(function(m){
        if(!combinedPool.find(function(x){return x.id===m.id;}))
          combinedPool.push(m);
      });
    }

    html += '<div class="zone-header">' + zoneLabel + '</div><div class="mat-grid">';
    combinedPool.forEach(function(mat){
      var count = inv[mat.id] ? inv[mat.id].count : 0;
      var locked = count === 0;
      var cls = 'mat-card' + (locked?' locked':'') + (mat.rarity==='rare'&&!locked?' rare':'') + (mat.rarity==='legendary'&&!locked?' legendary':'');
      var countCls = 'mat-count' + (mat.rarity==='rare'?' rare':'') + (mat.rarity==='legendary'?' legendary':'');
      var onclick = locked ? '' : 'onclick="showDetail(\''+mat.id+'\',\''+mat.name+'\',\''+mat.icon+'\',\''+mat.rarity+'\',\''+z.label+'\',' + count + ')"';
      html += '<div class="' + cls + '" ' + onclick + '>' +
        '<span class="mat-icon">' + mat.icon + '</span>' +
        '<div class="mat-name">' + mat.name + '</div>' +
        '<div class="' + countCls + '">' + (locked ? '未取得' : '×' + count) + '</div>' +
        '</div>';
    });
    html += '</div>';
  });

  if(!html) html = '<div style="text-align:center;padding:40px 20px;color:var(--muted);font-size:.85rem">還沒有材料。<br>去城堡完成謎語，或探索全站工具，<br>材料就會出現在這裡。</div>';
  container.innerHTML = html;
}

function renderRecipes(){
  var recipes = hlMaterial ? hlMaterial.getRecipes() : [];
  var container = document.getElementById('recipes-content');
  var html = '';
  recipes.forEach(function(r){
    var cls = 'recipe-card' + (r.owned?' owned':r.canCraft?' can-craft':'');
    html += '<div class="' + cls + '">';
    html += '<div class="recipe-top"><div class="recipe-icon">' + r.icon + '</div><div class="recipe-meta">';
    if(r.owned) html += '<div class="owned-badge">✓ 已合成</div>';
    html += '<div class="recipe-name">' + r.name + '</div>';
    html += '<span class="recipe-zone-tag">' + r.zone + '</span>';
    html += '<div class="recipe-desc">「' + r.desc + '」</div>';
    html += '</div></div>';
    html += '<div class="recipe-mats">';
    r.ingredientList.forEach(function(mat){
      var enough = mat.have >= mat.need;
      html += '<span class="mat-pill' + (r.owned?'':enough?' has':' missing') + '">' +
        mat.icon + ' ' + mat.name + ' ×' + mat.need +
        (r.owned ? '' : enough ? '' : '（缺' + (mat.need - mat.have) + '）') +
        '</span>';
    });
    html += '</div>';
    if(r.owned){
      html += '<button class="craft-btn owned-btn">✓ 已放入城堡</button>';
    } else if(r.canCraft){
      html += '<button class="craft-btn ready" onclick="doCraft(\''+r.id+'\',\''+r.name+'\')">✦ 立刻合成</button>';
    } else {
      var missingCount = r.ingredientList.filter(function(m){return m.have < m.need;}).length;
      html += '<button class="craft-btn not-ready">還差 ' + missingCount + ' 種材料</button>';
      // 溫和提示：只在「缺的全是稀有/傳說材料、其他普通材料都夠」時顯示
      var missingMats = r.ingredientList.filter(function(m){ return m.have < m.need; });
      var hasMats = r.ingredientList.filter(function(m){ return m.have >= m.need; });
      var allMissingAreRare = missingMats.length > 0 && missingMats.every(function(m){ return m.rarity === 'rare' || m.rarity === 'legendary'; });
      var hasCommonMats = hasMats.length > 0;
      if (allMissingAreRare && hasCommonMats) {
        // 判斷缺的稀有材料是否來自抽牌（draw pool）
        var drawRareIds = ['oil_spirit','angel_feather','oracle_essence'];
        var missingFromDraw = missingMats.filter(function(m){ return drawRareIds.indexOf(m.id) > -1; });
        if (missingFromDraw.length > 0) {
          html += '<div class="rare-source-hint">&#10024; 這個材料可以從「<a href="draw-hl.html">3張牌深度覺察</a>」中獲得</div>';
        }
      }
    }
    html += '</div>';
  });
  if(!html) html = '<div style="text-align:center;padding:40px 20px;color:var(--muted);font-size:.85rem">配方解鎖中...</div>';
  container.innerHTML = html;
}

function renderGuide(){
  var container = document.getElementById('guide-content');
  var html = '';
  ZONES.forEach(function(z){
    var remaining = hlMaterial ? hlMaterial.getDailyRemaining(z.type) : z.limit;
    var isFull = remaining <= 0 && z.limit !== 999;
    var isSpecial = z.limit === 999;
    html += '<div class="guide-card' + (isFull?' done':'') + '">';
    html += '<div style="font-size:24px;flex-shrink:0">' + z.icon + '</div>';
    html += '<div class="guide-left"><div class="guide-name">' + z.name + '</div>';
    html += '<div class="guide-desc">' + z.desc.replace('{n}', remaining) + '</div></div>';
    html += '<div class="guide-right">';
    if(!isSpecial) html += '<div class="guide-remain">今日剩餘 ' + (isFull?0:remaining) + ' 次</div>';
    html += '<a href="' + z.link + '" class="guide-link' + (isFull?' done-link':'') + '">' + (isFull?'明天再來':'前往採集') + '</a>';
    html += '</div></div>';
  });
  container.innerHTML = html;
}

// ── 互動函數 ──
function switchTab(name, btn){
  document.querySelectorAll('.tab-content').forEach(function(el){ el.style.display='none'; });
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('tab-' + name).style.display = '';
  btn.classList.add('active');
  closeDetail();
  if(name === 'recipes') renderRecipes();
  if(name === 'guide')   renderGuide();
}

function showDetail(id, name, icon, rarity, zone, count){
  if(_currentDetail === id){ closeDetail(); return; }
  _currentDetail = id;
  document.getElementById('d-icon').textContent = icon;
  document.getElementById('d-name').textContent = name;
  document.getElementById('d-zone').textContent = zone;
  document.getElementById('d-count').textContent = '×' + count;
  var rb = document.getElementById('d-rarity');
  rb.textContent = rarity === 'rare' ? '稀有材料' : rarity === 'legendary' ? '傳說材料' : '普通材料';
  rb.className = 'mat-detail-rarity ' + rarity;
  document.getElementById('d-how').textContent = MAT_HOW[id] || '探索城堡和全站工具後掉落。';
  var detail = document.getElementById('mat-detail');
  detail.classList.add('show');
  detail.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function closeDetail(){
  _currentDetail = null;
  document.getElementById('mat-detail').classList.remove('show');
}

function doCraft(recipeId, recipeName){
  if(!hlMaterial) return;
  var result = hlMaterial.craft(recipeId);
  if(!result.ok){
    if(result.reason === 'missing_materials'){
      showCraftToast('材料不足，還差 ' + result.missing.length + ' 種。', false);
    }
    return;
  }
  showCraftToast('「' + recipeName + '」合成成功！回城堡看看變化。', true);
  updateTopStats();
  renderRecipes();
  renderInventory();
}

function showCraftToast(msg, success){
  var t = document.getElementById('craft-toast');
  t.textContent = (success ? '🎉 ' : '⚠️ ') + msg;
  t.style.background = success ? '#E1F5EE' : '#FCEBEB';
  t.style.color = success ? '#085041' : '#791F1F';
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2800);
}

    if(window.hlMaterial || tries > 20){
      clearInterval(check);
      init();
    }
  }, 100);
});
