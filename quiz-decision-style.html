const DIMS={intuition:'直覺力',analysis:'分析力',emotion:'感受力',crowd:'從眾力',avoid:'迴避力',perfect:'完美力',value:'價值力',flow:'隨緣力'};
const TYPES={
  intuition:{name:'直覺衝鋒型',icon:'⚡',sub:'你的身體比腦袋先知道答案',
    keys:['速度感','體感決策','相信直覺'],
    desc:'你做決定的方式像閃電，還來不及分析就已經動了。不是衝動，是你的身體有一套比理智更快的處理系統。你走進一間店，三秒內就知道要不要待下去。你看到一個人，還沒說話就已經有感覺了。大部分時候，你的直覺是準的。那些事後分析出來的理由，只是幫你的直覺找到一件合理的外套。',
    detail:'認知科學裡有一個概念叫「軀體標記假說」，說的就是你的身體會在意識之前就對選項做出反應。你的心跳加速、手心微熱、胃輕微一縮，這些都是決策訊號。你只是比大多數人更會「聽身體的話」。\n\n但直覺衝鋒的風險在於：當你的身體記憶是歪的，直覺就會帶你去老地方。比如你對某種類型的人有好感，可能不是因為他們真的好，是因為他們像你熟悉的人。熟悉不等於正確。\n\n覺察練習：下次做重要決定的時候，先照直覺選，然後暫停三秒，問自己一個問題：「這個感覺是新的，還是舊的？」如果是舊的，多想三十秒再動。',
    oil:'薄荷 2 滴＋迷迭香 2 滴＋甜橙 1 滴，在需要做重要決定前擴香。薄荷讓你的直覺保持清醒而不是亢奮，迷迭香幫你的前額葉在直覺起跑的時候跟上節奏，甜橙軟化那個「不管了直接衝」的力道。讓直覺繼續帶路，但旁邊多一個清醒的副駕駛。',
    med:'閉上眼睛，把一隻手放在胸口。吸氣四秒，感覺心跳。吐氣六秒。問自己一個最近在猶豫的事情，然後注意身體的反應。胸口是緊的還是鬆的？胃是暖的還是涼的？吸氣四秒，不分析那個感覺，只是感覺它。吐氣六秒。重複四次。最後問自己：「這個感覺是新的，還是舊的？」張開眼睛。',
    quote:'你的直覺是一把好刀。但偶爾停下來磨一磨，切得更準。'},
  analysis:{name:'分析建模型',icon:'📊',sub:'你的腦袋是一台高效能運算機',
    keys:['邏輯推演','數據驅動','風險評估'],
    desc:'你做決定的方式像蓋房子，地基打好、結構算好、承重測試通過之後才會動工。你不相信「感覺」，你相信「資料」。你的手機裡可能有比較表、待辦清單、各種筆記App，你靠整理資訊來降低不確定性。大部分時候，你做的決定品質很高，因為你真的有想過。',
    detail:'你的大腦偏好用系統二（Daniel Kahneman 的概念）來處理決策，也就是慢思考、有意識、有邏輯的那一套。這讓你在做重大決策的時候犯錯率很低，但代價是速度慢、耗能高。\n\n分析建模型的風險是：你可能會掉進「分析癱瘓」的陷阱。收集資訊讓你覺得安全，但資訊永遠收集不完。你在等「資料夠了」的那一刻其實永遠不會來，因為你的安全閾值太高了。有些決定不需要 90% 的把握，60% 就夠動了。\n\n覺察練習：這週找一件小事，用計時器設定五分鐘，時間到就做決定。不管資料夠不夠，五分鐘到就選。練習在資訊不完美的情況下行動。完美的分析加上錯過的時機，等於零。',
    oil:'迷迭香 2 滴＋佛手柑 2 滴＋薰衣草 1 滴，在做決定前擴香。迷迭香維持你的邏輯清晰度，佛手柑降低你的焦慮閾值，讓「還不夠」的聲音小一點，薰衣草告訴你的前額葉：60%的把握也可以出發了。',
    med:'坐好，閉上眼睛。想像你面前有一張很大的試算表，上面寫滿了數字和分析。吸氣四秒，看著那張表。吐氣六秒，想像那張表慢慢變透明。重複三次。第四次的時候，表格消失了，面前只有一個問題：「如果我現在就要選，我選什麼？」不分析，讓第一個浮現的答案就是答案。吸氣四秒，吐氣六秒。對自己說：「不完美的行動，勝過完美的等待。」張開眼睛。',
    quote:'你的分析是你的超能力。但有時候，最好的數據就是你的心跳。'},
  emotion:{name:'情感導航型',icon:'💗',sub:'你做決定的羅盤是別人的感受',
    keys:['同理心','關係導向','溫度優先'],
    desc:'你做決定的時候，第一個想到的不是「什麼對我最好」，是「這樣做別人會怎麼樣」。你的選擇天生帶著溫度。選餐廳的時候想著誰吃素，換工作的時候想著同事會不會不開心，連分手都在想怎麼讓對方好過一點。你的世界有很多人，你把每個人都放在心上。',
    detail:'你的鏡像神經元可能比一般人活躍。你真的能「感覺到」別人的情緒，不是猜的，是你的身體在同步共振。這讓你成為很好的傾聽者、很暖的朋友、很體貼的伴侶。\n\n但情感導航的風險是：你可能已經很久沒有純粹為自己做一個決定了。你的「想要」跟「別人需要我想要的」已經混在一起，分不清楚了。你說「我沒關係」「我都可以」的時候，有多少次是真的沒關係，有多少次是你把自己的需求吞回去了？\n\n覺察練習：今天做一件事情的時候，在心裡先問：「如果這個世界上只有我一個人，我會怎麼選？」不管答案是什麼，先記下來。那個答案是你自己的聲音。',
    oil:'天竺葵 2 滴＋甜橙 2 滴＋岩蘭草 1 滴，在洗澡後擦在手腕上（用基底油稀釋）。天竺葵讓你的付出和接收回到平衡，甜橙提醒你自己的快樂也很重要，岩蘭草把你的根紮回自己身上，不是紮在別人的需求裡。',
    med:'閉上眼睛，雙手交疊放在心口。吸氣四秒，想像你心裡住著很多人，他們都在跟你說話。吐氣六秒，讓那些聲音慢慢變遠。重複三次。第四次的時候，所有聲音都退場了，只剩下你自己的心跳。吸氣四秒，問自己：「我想要什麼？」吐氣六秒。讓答案自己浮上來，不管它聽起來有多自私。重複三次。對自己說：「照顧自己不是自私，是讓我有力氣繼續照顧別人。」張開眼睛。',
    quote:'你把全世界都放在心上了。現在，把自己也放上去。'},
  crowd:{name:'從眾安全型',icon:'🛡️',sub:'你的安全感來自「大家都這樣」',
    keys:['群體歸屬','共識導向','怕犯錯'],
    desc:'你做決定的時候會先看看別人怎麼做。不是沒主見，是你覺得「多數人的選擇」本身就是一種很重要的資訊。你會看評價才買東西、問朋友才選餐廳、聽前輩的話才做職涯規劃。某種程度上這很聰明，群體智慧確實有用。但你心裡知道，有些時候這不是真的在參考意見，而是在找人幫你背書。',
    detail:'社會心理學裡的「從眾效應」不是貶義詞，它是人類生存策略的一部分。在資訊不足的時候，觀察別人的行為確實能降低風險。這不代表軟弱，而是你的生存系統把「群體一致」當作安全信號。\n\n但從眾安全型的風險是：你可能一直在走別人的路，走了很遠才發現那條路不是你的。你選了大家覺得好的工作、大家覺得該結婚的年紀、大家覺得成功的樣子，但你站在那裡的時候，心裡是空的。因為那是別人的地圖。\n\n覺察練習：這週做一件「只有你想做、但身邊沒人在做」的事。不用很大，一個人去看電影、買一件你的朋友圈沒人會穿的衣服、選一條沒人走過的路。練習「沒有人幫我背書也可以」的勇氣。',
    oil:'雪松 2 滴＋乳香 2 滴＋葡萄柚 1 滴，在需要獨立做決定的時候擴香。雪松給你一棵自己的樹（不用靠別的樹），乳香讓你跟自己的內在聲音接上線，葡萄柚帶一點陽光感讓獨自走路不那麼可怕。',
    med:'站起來，雙腳與肩同寬。閉上眼睛，想像你站在一群人中間，大家都往同一個方向走。吸氣四秒，感覺人群的流動。吐氣六秒。第四次呼吸的時候，停下腳步。人群繼續走，你站在原地。吸氣四秒，感覺腳底踩著地面。吐氣六秒。看看四面八方，問自己：「如果沒有人在前面帶路，我想往哪裡走？」讓答案浮現。吸氣四秒，往那個方向踏出一步。吐氣六秒。張開眼睛。',
    quote:'大家的路是參考，你的路要自己走。第一步最難，但那一步是你的。'},
  avoid:{name:'逃避拖延型',icon:'🐢',sub:'不是不會選，是「選了就要負責」讓你害怕',
    keys:['害怕犯錯','決策焦慮','拖延迴圈'],
    desc:'你做決定的方式就是不做決定。不是因為懶，是因為每一個選項在你眼裡都有風險。你看得到A的好也看得到A的壞，看得到B的好也看得到B的壞，然後你就卡在中間了。你可能會用「再想想」「等一下」「看情況」來拖延，直到環境替你做了選擇，或者選項過期。',

    oil:'佛手柑 2 滴＋甜橙 2 滴＋薄荷 1 滴，在早上出門前擴香或滴在手帕上帶著走。佛手柑降低你的決策焦慮，甜橙給你一點「沒那麼嚴重啦」的輕鬆感，薄荷在你又要拖延的時候給你一個清醒的小巴掌。',
    med:'閉上眼睛。想像你站在一個岔路口，左邊一條路，右邊一條路。你不知道哪條對。吸氣四秒，看看左邊。吐氣六秒，看看右邊。重複兩次。然後對自己說：「兩條路都可以。走錯了可以回來。」吸氣四秒，隨便選一條，踏出去。吐氣六秒，感覺腳踩在路上的觸感。重複三次。對自己說：「做了就是對了。」張開眼睛。',
    quote:'不選也是一種選擇，只是通常是最貴的那種。踏出去，你比你以為的更能承擔。'},
  perfect:{name:'完美主義型',icon:'🎯',sub:'你的標準很高，高到連自己都過不了',
    keys:['零容錯','反覆檢查','高標準'],
    desc:'你做決定之前需要確認再確認、檢查再檢查。不是猶豫，是你的標準太高了。你要確定這是「最好」的選擇才願意動。你會花很多時間比較、研究、推演各種可能性，就是為了那個「萬無一失」。你交出去的東西品質很高，但過程很累。因為你不允許自己犯錯。',
    detail:'完美主義的底層通常是「如果我不夠好，就不值得被愛」。你用高標準保護自己，用零失誤證明自己。但問題是，你的標準永遠在提高。100分做到了就會覺得應該要120分，120分做到了又覺得不夠。你追的不是完美，你追的是一個永遠抓不到的安心感。\n\n完美主義型的風險是：你會錯過。等你把方案改到完美的時候，機會已經被那個只有60分但先動了的人拿走了。而且你以為的「完美」，別人可能根本看不出差別。\n\n覺察練習：這週交出一個你覺得「只有80分」的東西。報告、訊息、料理、任何事。刻意不再修一次。然後觀察結果：別人的反應跟你預期的落差有多大？大部分時候，你的80分已經是別人的100分了。',
    oil:'薰衣草 3 滴＋佛手柑 2 滴＋依蘭 1 滴，在睡前擴香。薰衣草讓你的神經系統接受「今天夠了」，佛手柑降低那個「還不夠好」的焦慮信號，依蘭溫柔地跟你說：「80分的你也很美。」',

    detail:'價值導向型在心理學裡對應的是「自主型動機」，也就是你做事的驅力來自內在信念而不是外在獎懲。研究顯示，自主型動機的人長期滿意度和抗壓力都比較高，因為你的選擇是你自己的。\n\n價值導向型的風險是：你可能太執著於「正確」。世界不是非黑即白的，有些時候妥協不是背叛自己，是讓自己在現實裡找到可行的位置。如果你的價值觀讓你變得僵硬、批判、沒辦法接受灰色地帶，那值得回來看一眼：你的價值觀是在保護你，還是在限制你？\n\n覺察練習：找一個你最近很堅持的立場，然後試著從對面的角度想三十秒。不是要你改變立場，是練習「理解不等於認同」。你的價值觀夠強壯的話，不會因為理解對方就倒塌。',
    oil:'乳香 2 滴＋雪松 2 滴＋玫瑰草 1 滴，在需要做出重大選擇的時候擴香。乳香連結你最深層的信念，雪松讓你的內在指南針不被外界的雜訊干擾，玫瑰草在堅定和柔軟之間找到那個點。讓你的原則不變成牢籠。',
    med:'閉上眼睛。想像你的心裡有一個指南針，指針穩穩地指著一個方向。吸氣四秒，看著那個方向。吐氣六秒。重複三次。第四次的時候，想像有人走過來說：「那邊不對，你該往這邊走。」吸氣四秒，感覺指南針的指針動了嗎？吐氣六秒。如果沒動，很好，你的方向很穩。如果動了，問自己：「是因為對方說得有道理，還是因為我害怕不被認同？」吸氣四秒，吐氣六秒。對自己說：「我的路我負責。」張開眼睛。',
    quote:'你選的路不一定最輕鬆，但你走在上面的時候，腳步是踏實的。'},
  flow:{name:'隨遇而安型',icon:'🍃',sub:'你不挑路，路自己會帶你去該去的地方',
    keys:['順其自然','低控制欲','活在當下'],
    desc:'你做決定的方式就是不太刻意做決定。不是逃避，是你真的覺得很多事情不需要那麼認真選。你的人生哲學接近「船到橋頭自然直」，你相信事情會自己走到它該去的地方。你不太焦慮、不太糾結、不太把「選擇」當成很大的事。你身邊的人可能覺得你很佛系，也可能覺得你不太上進。',
    detail:'隨遇而安型在正向心理學裡其實有一個很高級的對應：接納與承諾。你能接受不確定性，不跟現實硬幹，在變動中保持平穩。這是很多人修練一輩子都學不會的東西。\n\n但隨遇而安的風險是：你可能把「不在乎」當成「想通了」。真正的隨遇而安是你知道自己要什麼但不執著於結果。假的隨遇而安是你不知道自己要什麼所以假裝什麼都好。如果你的「隨便」底下有一層空虛，那就不是佛系，是失聯。\n\n覺察練習：今天找一件事情「認真選」。不是因為重要，是練習「我在乎」的肌肉。選一杯你真正想喝的咖啡，不是最方便的那杯。走一條你真正想走的路，不是最短的那條。讓「我選的」這三個字回到你的生活裡。',

let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';
    const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 題 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一題</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一題 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">看看我的決策風格 🧭</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 題，共 '+questions.length+' 題';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){
  const dimScores={};Object.keys(DIMS).forEach(k=>{dimScores[k]=0;});
  Object.keys(answers).forEach(qi=>{const oi=answers[qi];const s=questions[qi].opts[oi].s;Object.keys(s).forEach(d=>{dimScores[d]+=s[d];});});
  const maxPossible=Object.keys(answers).length*3;
  const sorted=Object.keys(DIMS).sort((a,b)=>dimScores[b]-dimScores[a]);
  const topType=sorted[0],f=TYPES[topType],f2=TYPES[sorted[1]];
  document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';
  document.getElementById('hlTitleReveal').innerHTML='<div class="screenshot-card"><div class="ss-brand">HOUR LIGHT ✦ 馥靈之鑰</div><div class="ss-icon">'+f.icon+'</div><div class="ss-title">'+f.name+'</div><div class="ss-sub">'+f.sub+'</div><div class="ss-quote">「'+f.quote+'」</div><div class="ss-footer">hourlightkey.com ✦ </div></div><div class="hl-title-card"><div class="corner-deco tl"></div><div class="corner-deco tr"></div><div class="corner-deco bl"></div><div class="corner-deco br"></div><div class="hl-title-eyebrow">Hour Light ✦ 決策風格覺察</div><span class="hl-title-icon">'+f.icon+'</span><div class="hl-title-main">'+f.name+'</div><div class="hl-title-sub">'+f.sub+'</div><div class="hl-title-divider"></div><div class="hl-title-grid"><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 決策風格</div><div class="hl-title-tag-value">'+f.name+'</div></div><div class="hl-title-tag"><div class="hl-title-tag-label">✦ 副風格</div><div class="hl-title-tag-value">'+f2.icon+' '+f2.name+'</div></div><div class="hl-title-tag" style="grid-column:1/-1"><div class="hl-title-tag-label">✦ 覺察關鍵字</div><div class="hl-title-tag-value">'+f.keys.join(' · ')+'</div></div></div><div class="hl-title-quote">「'+f.quote+'」</div><div class="hl-title-combo-hint">'+f.name+'｜'+f.sub+'</div></div>';
  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">決策風格覺察 Decision Style</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var pct=Math.round(dimScores[k]/maxPossible*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+DIMS[k]+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
