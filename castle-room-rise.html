<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fdf6ef;--bg2:#f7ede2;--card:rgba(255,255,255,.92);--warm:#3e2a1a;--warm2:#6b4a30;--muted:#7a5a40;
  --gold:#c8862a;--gold-l:#e8b86d;--gold-ll:#f5dfa8;
  --accent:#1a5a4a;--accent2:#2a8a6a;
  --border:rgba(26,90,74,.15);--shadow:0 8px 32px rgba(62,42,26,.08);--shadow-lg:0 20px 60px rgba(62,42,26,.14);
}
html{scroll-behavior:smooth}
body{font-family:'Noto Serif TC',serif;color:var(--warm);background:var(--bg);min-height:100vh;min-height:100dvh;overflow-x:hidden}
.topbar{position:sticky;top:0;z-index:300;height:52px;background:rgba(253,246,239,.94);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 18px}
@media(min-width:521px){.topbar{-webkit-backdrop-filter:none;backdrop-filter:none;background:#fdf6ef}}
.topbar-back{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted);text-decoration:none;transition:color .2s}
.topbar-back:hover{color:var(--warm)}
.topbar-title{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:var(--warm);letter-spacing:.06em}
.topbar-right{display:flex;align-items:center;gap:10px}
.room-completeness{font-size:.7rem;color:var(--muted);display:flex;align-items:center;gap:5px}
.completeness-bar{width:48px;height:4px;background:rgba(26,90,74,.15);border-radius:2px;overflow:hidden}
.completeness-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .6s cubic-bezier(.16,1,.3,1)}
.room-header{padding:20px 18px 0;display:flex;align-items:baseline;gap:10px}
.room-badge{display:inline-flex;align-items:center;gap:5px;font-size:.68rem;letter-spacing:.12em;color:var(--muted);background:rgba(26,90,74,.08);border:1px solid rgba(26,90,74,.15);border-radius:20px;padding:3px 12px;text-transform:uppercase}
.room-phase{font-size:.68rem;color:var(--accent);letter-spacing:.1em}
.servant-greeting{margin:8px 18px 0;padding:12px 16px;background:linear-gradient(135deg,rgba(42,138,106,.06),rgba(26,90,74,.04));border:1px solid var(--border);border-radius:14px;font-size:.82rem;color:var(--warm2);line-height:1.6;text-align:center}
.room-scene-wrap{margin:12px 16px 0;border-radius:24px;overflow:hidden;border:1.5px solid var(--border);box-shadow:var(--shadow-lg);background:#060f0c;position:relative;cursor:pointer}
.room-scene-wrap:hover .scene-hint{opacity:1}
.scene-hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.55);color:rgba(255,248,235,.85);font-size:.68rem;padding:5px 14px;border-radius:20px;letter-spacing:.08em;white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.furniture-slot{cursor:pointer;transition:filter .25s}
.furniture-slot:hover{filter:brightness(1.25) drop-shadow(0 0 8px rgba(42,138,106,.6))}
.furniture-slot.occupied{cursor:default}
.furniture-slot.occupied:hover{filter:drop-shadow(0 0 6px rgba(42,138,106,.4))}
.slot-empty{opacity:.35;transition:opacity .25s}
.furniture-slot:hover .slot-empty{opacity:.6}
.status-strip{margin:14px 16px 0;display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.status-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 10px;text-align:center}
.status-icon{font-size:18px;margin-bottom:3px;display:block}
.status-label{font-size:.62rem;color:var(--muted);letter-spacing:.06em;display:block;margin-bottom:2px}
.status-val{font-size:.88rem;font-weight:700;color:var(--warm);display:block}
.riddle-section{margin:14px 16px 0}
.section-label{font-size:.68rem;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.riddle-card{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:20px 16px;box-shadow:var(--shadow)}
.riddle-type-badge{display:inline-flex;align-items:center;gap:5px;font-size:.63rem;letter-spacing:.1em;color:var(--accent);border:1px solid rgba(26,90,74,.25);border-radius:20px;padding:3px 10px;margin-bottom:12px;background:rgba(26,90,74,.05)}
.riddle-q{font-family:'LXGW WenKai TC','Noto Serif TC',serif;font-size:1rem;color:var(--warm);line-height:1.75;margin-bottom:16px}
.riddle-opts{display:flex;flex-direction:column;gap:8px}
.riddle-opt{padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;background:rgba(26,90,74,.03);cursor:pointer;font-size:.88rem;color:var(--warm2);line-height:1.55;transition:all .2s;position:relative}
.riddle-opt::before{content:'';position:absolute;left:0;top:0;width:3px;height:100%;background:var(--accent);border-radius:3px 0 0 3px;transform:scaleY(0);transition:transform .22s}
.riddle-opt:hover{border-color:rgba(26,90,74,.4);background:rgba(26,90,74,.07);transform:translateX(3px)}
.riddle-opt:hover::before,.riddle-opt.sel::before{transform:scaleY(1)}
.riddle-opt.sel{border-color:rgba(26,90,74,.4);background:rgba(26,90,74,.06);color:var(--warm);font-weight:500}
.aroma-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.aroma-card{padding:14px 10px;border:1.5px solid var(--border);border-radius:14px;background:rgba(26,90,74,.03);cursor:pointer;text-align:center;transition:all .22s}
.aroma-card:hover{border-color:rgba(26,90,74,.4);background:rgba(26,90,74,.07);transform:translateY(-2px)}
.aroma-card.sel{border-color:rgba(42,138,106,.45);background:rgba(42,138,106,.07)}
.aroma-icon{font-size:24px;margin-bottom:5px;display:block}
.aroma-name{font-size:.75rem;font-weight:700;color:var(--warm);margin-bottom:2px}
.aroma-note{font-size:.65rem;color:var(--muted);line-height:1.4}
.insight-box{margin-top:14px;padding:16px;background:linear-gradient(135deg,rgba(26,90,74,.04),rgba(42,138,106,.04));border:1px solid rgba(42,138,106,.2);border-radius:14px;display:none;animation:fadeSlideUp .5s ease}
.insight-box.show{display:block}
.insight-txt{font-family:'LXGW WenKai TC','Noto Serif TC',serif;font-size:.88rem;color:var(--warm2);line-height:1.9}
.insight-txt strong{color:var(--warm);font-weight:700}
.btn-complete{display:block;width:100%;margin-top:16px;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:14px;font-family:'Playfair Display','Noto Serif TC',serif;font-size:.95rem;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.btn-complete::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);transform:translateX(-100%);transition:transform .5s}
.btn-complete:hover::after{transform:translateX(100%)}
.btn-complete:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(26,90,74,.3)}
.btn-complete:disabled{opacity:.35;cursor:default;transform:none;box-shadow:none}
.btn-complete:disabled::after{display:none}
.furniture-section{margin:14px 16px 0;background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:18px 16px}
.care-title{font-family:'Playfair Display',serif;font-size:.88rem;font-weight:700;color:var(--warm);letter-spacing:.06em;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.care-title::after{content:'';flex:1;height:1px;background:var(--border)}
.furniture-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.furniture-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;background:rgba(26,90,74,.04);border:1px solid var(--border)}
.furniture-item.placed{border-color:rgba(26,90,74,.3);background:rgba(26,90,74,.07)}
.furniture-item-icon{font-size:20px;flex-shrink:0}
.furniture-item-info{flex:1;min-width:0}
.furniture-item-name{font-size:.82rem;font-weight:700;color:var(--warm)}
.furniture-item-desc{font-size:.68rem;color:var(--muted);line-height:1.4;margin-top:1px}
.furniture-item-action{padding:5px 12px;border-radius:20px;font-size:.68rem;font-weight:700;border:1px solid;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-place{border-color:var(--gold);color:var(--gold);background:transparent}
.btn-place:hover{background:var(--gold);color:#fff}
.btn-placed{border-color:rgba(26,90,74,.4);color:var(--accent);background:rgba(26,90,74,.06);cursor:default}
.furniture-empty{text-align:center;padding:20px;font-size:.78rem;color:var(--muted);line-height:1.8}
.diary-section{margin:14px 16px 0;background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:18px 16px}
.diary-textarea{width:100%;min-height:100px;border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;font-family:'LXGW WenKai TC','Noto Serif TC',serif;font-size:16px;color:var(--warm);line-height:1.8;background:rgba(26,90,74,.02);resize:vertical;outline:none;transition:border-color .2s}
.diary-textarea:focus{border-color:rgba(26,90,74,.4)}
.diary-textarea::placeholder{color:var(--muted);opacity:.6}
.diary-save-row{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.diary-save-btn{padding:8px 20px;border-radius:20px;font-size:.78rem;font-weight:700;border:1.5px solid var(--accent);color:var(--accent);background:transparent;cursor:pointer;font-family:inherit;transition:all .2s}
.diary-save-btn:hover{background:var(--accent);color:#fff}
.diary-saved-hint{font-size:.7rem;color:var(--accent2);opacity:0;transition:opacity .3s}
.diary-saved-hint.show{opacity:1}
.diary-history{margin-top:14px}
.diary-entry{padding:10px 14px;border-left:3px solid rgba(26,90,74,.25);margin-bottom:8px;font-family:'LXGW WenKai TC','Noto Serif TC',serif;font-size:.82rem;color:var(--warm2);line-height:1.7}
.diary-entry-date{font-size:.65rem;color:var(--muted);margin-bottom:3px}
.completion-banner{margin:14px 16px 0;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px}
.completion-pct{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:800;color:var(--gold-l);flex-shrink:0}
.completion-info{flex:1}
.completion-label{font-size:.72rem;color:rgba(245,223,168,.65);margin-bottom:4px;letter-spacing:.06em}
.completion-track{height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.completion-prog{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-l));border-radius:3px;transition:width .8s cubic-bezier(.16,1,.3,1)}
.completion-sub{font-size:.65rem;color:rgba(245,223,168,.5);margin-top:4px}
.bottom-nav-row{margin:20px 16px 8px;display:flex;gap:8px}
.room-nav-btn{flex:1;padding:11px;border-radius:12px;font-size:.75rem;font-weight:700;border:1.5px solid var(--border);background:var(--card);color:var(--warm2);cursor:pointer;font-family:'Noto Serif TC',serif;transition:all .2s;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:5px}
.room-nav-btn:hover{border-color:rgba(26,90,74,.4);background:rgba(26,90,74,.06)}
.room-nav-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff}
.room-nav-btn.primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,90,74,.25)}
.bottom-pad{height:80px}
.care-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.45);align-items:center;justify-content:center;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.care-overlay.show{display:flex;animation:fadeIn .3s ease}
.care-modal{background:var(--bg);border:1.5px solid var(--border);border-radius:28px;padding:32px 24px 28px;max-width:340px;width:90%;text-align:center;box-shadow:var(--shadow-lg);animation:modalPop .5s cubic-bezier(.16,1,.3,1)}
.care-modal-icon{font-size:3.2rem;margin-bottom:12px;display:block}
.care-modal-title{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:700;color:var(--warm);margin-bottom:6px;letter-spacing:.04em}
.care-modal-close{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:12px;background:transparent;color:var(--warm2);font-size:.88rem;cursor:pointer;font-family:'Noto Serif TC',serif;transition:all .2s}
.care-modal-close:hover{background:rgba(26,90,74,.07);border-color:rgba(26,90,74,.35)}
.story-intro{margin:12px 16px 0;padding:14px 18px;background:linear-gradient(135deg,rgba(255,255,255,.6),rgba(255,255,255,.3));border-left:3px solid var(--accent);border-radius:0 14px 14px 0;font-size:.85rem;color:var(--warm2);line-height:1.8;animation:storyFadeIn .8s ease both}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes modalPop{from{opacity:0;transform:scale(.88) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes storyFadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleFloat{0%,100%{transform:translateY(0) rotate(0deg)}33%{transform:translateY(-4px) rotate(3deg)}66%{transform:translateY(-2px) rotate(-2deg)}}
@keyframes compassSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes tealPulse{0%,100%{opacity:.4}50%{opacity:.8}}
@keyframes mist{0%{transform:translateX(-10px);opacity:0}30%{opacity:.4}70%{opacity:.3}100%{transform:translateX(30px);opacity:0}}
@media(max-width:600px){.room-scene-wrap,.furniture-section,.diary-section{margin-left:8px;margin-right:8px}body{padding-bottom:72px}}
@media(min-width:1024px){.room-scene-wrap,.furniture-section,.diary-section{max-width:640px;margin-left:auto;margin-right:auto}}
body{-webkit-tap-highlight-color:transparent;overscroll-behavior-y:contain}
button,a,.riddle-opt,.aroma-card{-webkit-tap-highlight-color:transparent;touch-action:manipulation;min-height:44px}
button:active,a:active{transform:scale(.97);transition:transform .08s}
.riddle-opt:active,.aroma-card:active{transform:scale(.96);transition:transform .1s}
@media(max-width:600px){body{padding-bottom:calc(72px + env(safe-area-inset-bottom,0px))}.topbar{padding:0 14px}.topbar-back{min-height:44px;display:flex;align-items:center}}
</style>

<body>

<div class="topbar">
  <a href="castle-game.html" class="topbar-back">← 城堡地圖</a>
  <span class="topbar-title">🧭 平衡室</span>

    <div class="room-completeness">
      <span id="comp-label">完整度</span>

</div>

<!-- SVG 房間場景 -->
<div class="room-scene-wrap" id="sceneWrap" onclick="toggleFurnitureMode()">
  <svg id="roomSvg" viewBox="0 0 420 280" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%">
    <defs>
      <linearGradient id="wallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#060f0c"/>
        <stop offset="100%" style="stop-color:#0e1a16"/>
      </linearGradient>
      <radialGradient id="scaleGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" style="stop-color:#40c090;stop-opacity:.4"/>
        <stop offset="100%" style="stop-color:#40c090;stop-opacity:0"/>
      </radialGradient>
      <radialGradient id="compassGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" style="stop-color:#60d0a8;stop-opacity:.5"/>
        <stop offset="100%" style="stop-color:#60d0a8;stop-opacity:0"/>
      </radialGradient>
    </defs>
    <rect x="0" y="0" width="420" height="280" fill="url(#wallGrad)"/>
    <!-- 遠景拱門開口（背後有光） -->
    <rect x="155" y="20" width="110" height="160" rx="55" fill="#0a1f1a" opacity=".8"/>
    <rect x="160" y="25" width="100" height="155" rx="50" fill="#0e2822"/>
    <!-- 拱門邊框 -->
    <rect x="155" y="20" width="110" height="160" rx="55" fill="none" stroke="#2a6a52" stroke-width="1.5" opacity=".7"/>
    <!-- 遠景山景（層次） -->
    <polygon points="160,180 180,140 210,160 240,130 270,155 270,180" fill="#0a2018" opacity=".8"/>
    <polygon points="155,180 170,155 195,170 220,148 250,162 270,155 270,180" fill="#0e2820" opacity=".6"/>
    <!-- 天空感（微光） -->
    <ellipse cx="210" cy="80" rx="50" ry="40" fill="#40c090" opacity=".05" style="animation:tealPulse 4s ease-in-out infinite"/>
    <!-- 天星 -->
    <circle cx="185" cy="50" r=".8" fill="#80e0c0" opacity=".6" style="animation:tealPulse 3s ease-in-out infinite"/>
    <circle cx="235" cy="40" r="1" fill="#60c0a0" opacity=".5" style="animation:tealPulse 4s .5s ease-in-out infinite"/>
    <circle cx="210" cy="35" r=".6" fill="#a0f0d8" opacity=".6" style="animation:tealPulse 5s 1s ease-in-out infinite"/>
    <!-- 天秤（中央，懸浮） -->
    <g style="animation:scaleFloat 4s ease-in-out infinite">
      <!-- 天秤頂部支點 -->
      <line x1="210" y1="115" x2="210" y2="135" stroke="#40a880" stroke-width="2"/>
      <circle cx="210" cy="113" r="5" fill="#30886a" opacity=".9"/>
      <!-- 天秤橫桿 -->
      <line x1="165" y1="137" x2="255" y2="137" stroke="#3a9870" stroke-width="1.8" opacity=".9"/>
      <!-- 左盤繩 -->
      <line x1="175" y1="137" x2="168" y2="158" stroke="#3a9870" stroke-width="1.2" opacity=".7"/>
      <line x1="175" y1="137" x2="182" y2="158" stroke="#3a9870" stroke-width="1.2" opacity=".7"/>
      <!-- 左盤 -->
      <ellipse cx="175" cy="159" rx="16" ry="5" fill="#2a7860" opacity=".8"/>
      <ellipse cx="175" cy="157" rx="16" ry="5" fill="#3a9870" opacity=".6"/>
      <!-- 右盤繩 -->
      <line x1="245" y1="137" x2="238" y2="158" stroke="#3a9870" stroke-width="1.2" opacity=".7"/>
      <line x1="245" y1="137" x2="252" y2="158" stroke="#3a9870" stroke-width="1.2" opacity=".7"/>
      <!-- 右盤 -->
      <ellipse cx="245" cy="159" rx="16" ry="5" fill="#2a7860" opacity=".8"/>
      <ellipse cx="245" cy="157" rx="16" ry="5" fill="#3a9870" opacity=".6"/>
      <!-- 天秤光暈 -->
      <ellipse cx="210" cy="145" rx="55" ry="28" fill="url(#scaleGlow)" opacity=".5"/>
    </g>
    <!-- 霧氣 -->
    <rect x="0" y="180" width="160" height="30" rx="15" fill="#1a4a38" opacity="0" style="animation:mist 8s 1s ease-in-out infinite"/>
    <rect x="270" y="190" width="160" height="25" rx="12" fill="#1a4a38" opacity="0" style="animation:mist 10s 4s ease-in-out infinite"/>
    <!-- 地板（石板） -->

<script>
'use strict';
var ROOM_ID='rise';
(function(){function showServant(){if(window.hlCastle&&hlCastle.getServant){var s=hlCastle.getServant(ROOM_ID);if(s){var el=document.getElementById('servantGreeting');if(el)el.innerHTML='<img src="fufu-cute.webp" alt="小馥" loading="lazy" style="width:26px;height:26px;object-fit:cover;border-radius:50%;vertical-align:middle;margin-right:8px;opacity:.85">'+s.emoji+' '+s.name+'：「'+s.greeting+'」';}}else{setTimeout(showServant,300);}}if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',showServant);}else{showServant();}})();
(function(){function initRoomCat(){if(!window.hlPets)return setTimeout(initRoomCat,350);var el=document.getElementById('roomCatWidget');if(!el)return;if(Math.random()<0.2){var qiqi=(hlPets.CATS||[]).filter(function(c){return c.id==='qiqi';})[0];if(qiqi){var state=hlPets.getState();var unlocked=(state.cats||[]).indexOf('qiqi')>-1;if(unlocked){el.innerHTML='<div style="display:flex;align-items:center;gap:10px;padding:8px 14px;background:linear-gradient(135deg,rgba(42,138,106,.05),rgba(26,90,74,.03));border:1px solid rgba(200,134,42,.12);border-radius:12px;font-size:.79rem;color:#6b4a30;margin:4px 18px 0"><img src="images/pets/'+qiqi.stickerImg+'" alt="七七" loading="lazy" style="width:36px;height:36px;object-fit:contain;border-radius:8px;flex-shrink:0"><div><div style="font-weight:600;font-size:.78rem;margin-bottom:2px">七七 <span style="opacity:.6;font-weight:400">· 今日隨機到訪</span></div><div style="opacity:.8;line-height:1.5">「'+qiqi.quote+'」</div></div></div>';}}}if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',initRoomCat);else initRoomCat();}})();
var ROOM_STORAGE='hl_room_rise_v1';var DIARY_STORAGE='hl_diary_rise_v1';var _roomRiddle=null;
function todayKey(){var tw=new Date(new Date().getTime()+8*3600000);return tw.getUTCFullYear()+'-'+String(tw.getUTCMonth()+1).padStart(2,'0')+'-'+String(tw.getUTCDate()).padStart(2,'0');}
function getTodayRiddle(){if(_roomRiddle)return _roomRiddle;if(!window.ROOMS)return null;var room=ROOMS.find(function(r){return r.id===ROOM_ID;});if(!room)return null;var today=todayKey();var seed=0;for(var i=0;i<today.length;i++)seed=((seed<<5)-seed)+today.charCodeAt(i);seed=Math.abs(seed)+99;_roomRiddle=room.riddles[seed%room.riddles.length];return _roomRiddle;}
function loadRoomState(){var def={totalVisits:0,riddleDone:{},furniture:[],completeness:0};try{var raw=localStorage.getItem(ROOM_STORAGE);if(!raw)return def;return Object.assign(def,JSON.parse(raw));}catch(e){return def;}}
function saveRoomState(st){try{localStorage.setItem(ROOM_STORAGE,JSON.stringify(st));}catch(e){}}
function isRiddleDone(st){return !!st.riddleDone[todayKey()];}
function calcCompleteness(st){var fp=Math.min(45,st.furniture.length*15);var rp=Math.min(55,Object.keys(st.riddleDone).length*5);return Math.min(100,fp+rp);}
function loadDiary(){try{var raw=localStorage.getItem(DIARY_STORAGE);if(!raw)return[];return JSON.parse(raw);}catch(e){return[];}}
function saveDiaryData(e){try{localStorage.setItem(DIARY_STORAGE,JSON.stringify(e));}catch(e){}}
function saveDiary(){var text=document.getElementById('diaryText').value.trim();if(!text)return;var entries=loadDiary();entries.unshift({date:todayKey(),text:text,ts:Date.now()});if(entries.length>30)entries=entries.slice(0,30);saveDiaryData(entries);document.getElementById('diaryText').value='';var hint=document.getElementById('diarySaved');hint.classList.add('show');setTimeout(function(){hint.classList.remove('show');},2000);renderDiaryHistory();}
function renderDiaryHistory(){var entries=loadDiary();var container=document.getElementById('diaryHistory');if(!entries.length){container.innerHTML='';return;}var html='';entries.slice(0,5).forEach(function(e){html+='<div class="diary-entry"><div class="diary-entry-date">'+e.date+'</div>'+e.text.replace(/</g,'&lt;').replace(/\n/g,'<br>')+'</div>';});container.innerHTML=html;}
var _state=null,_furnitureModeItem=null;
function init(){if(!window.ROOMS||!window.hlCastle){setTimeout(init,200);return;}hlCastle.giveKey(ROOM_ID);_state=loadRoomState();_state.totalVisits=(_state.totalVisits||0)+1;saveRoomState(_state);renderStatus();renderRiddle();renderDiaryHistory();renderFurnitureList();renderCompleteness();renderPlacedFurniture();}
function renderStatus(){document.getElementById('riddle-status').textContent=isRiddleDone(_state)?'✓ 完成':'待完成';document.getElementById('visit-count').textContent=_state.totalVisits+' 次';var c=calcCompleteness(_state);document.getElementById('comp-bar').style.width=c+'%';document.getElementById('comp-pct').textContent=c+'%';}
function renderRiddle(){var rd=getTodayRiddle();var done=isRiddleDone(_state);var box=document.getElementById('riddle-content');if(!rd){box.innerHTML='<p style="color:var(--muted);font-size:.82rem">今日覺察載入中…</p>';return;}var typeLabel=rd.type==='aroma'?'🌿 認知芳療':rd.type==='fuyu'?'🌿 馥靈馥語':'💭 覺察問答';var h='<div class="riddle-type-badge">'+typeLabel+'</div>';h+='<div class="riddle-q">'+rd.q+'</div>';if(done){h+='<div class="insight-box show"><div class="insight-txt">✓ 今日覺察已完成。明天有新的問題等著你。</div></div>';}else if(rd.isAroma&&rd.aromas){h+='<div class="aroma-grid">';rd.aromas.forEach(function(a,i){h+='<div class="aroma-card" onclick="selAroma('+i+')" id="a'+i+'"><span class="aroma-icon">'+a.icon+'</span><div class="aroma-name">'+a.name+'</div><div class="aroma-note">'+a.note+'</div></div>';});h+='</div>';h+='<div class="insight-box" id="ins"></div>';h+='<button class="btn-complete" id="btnDone" disabled onclick="finishRiddle()">✦ 收下這份覺察</button>';}else{h+='<div class="riddle-opts">';rd.opts.forEach(function(o,i){h+='<div class="riddle-opt" onclick="selOpt('+i+')" id="o'+i+'">'+o.text+'</div>';});h+='</div>';h+='<div class="insight-box" id="ins2"></div>';h+='<button class="btn-complete" id="btnDone2" disabled onclick="finishRiddle()">✦ 收下這份覺察</button>';}box.innerHTML=h;}
function selOpt(i){var rd=getTodayRiddle();if(!rd||rd.isAroma)return;rd.opts.forEach(function(_,j){var e=document.getElementById('o'+j);if(e)e.className='riddle-opt'+(j===i?' sel':'');});showInsight(rd.opts[i].insight);}
function selAroma(i){var rd=getTodayRiddle();if(!rd||!rd.aromas)return;rd.aromas.forEach(function(_,j){var e=document.getElementById('a'+j);if(e)e.className='aroma-card'+(j===i?' sel':'');});showInsight(rd.aromas[i].insight);}
function showInsight(t){var el=document.getElementById('ins')||document.getElementById('ins2');if(!el)return;el.innerHTML='<div class="insight-txt">'+t.replace(/\\n/g,'<br>').replace(/\n/g,'<br>')+'</div>';el.classList.add('show');var btn=document.getElementById('btnDone')||document.getElementById('btnDone2');if(btn)btn.disabled=false;el.scrollIntoView({behavior:'smooth',block:'center'});}
function finishRiddle(){var insEl=document.getElementById('ins')||document.getElementById('ins2');var insight=insEl?insEl.textContent:'';var qEl=document.querySelector('.riddle-q');var question=qEl?qEl.textContent:'';var selEl=document.querySelector('.riddle-opt.sel, .aroma-card.sel');var answer=selEl?selEl.textContent:'';if(window.hlCastle&&hlCastle.hasKey(ROOM_ID))hlCastle.completeRoom(ROOM_ID,question,answer,insight);if(window.hlMaterial)hlMaterial.drop('rise_room');_state.riddleDone[todayKey()]=true;saveRoomState(_state);renderStatus();renderCompleteness();var btn=document.getElementById('btnDone')||document.getElementById('btnDone2');if(btn){btn.disabled=true;btn.textContent='✓ 已收下';}setTimeout(function(){renderRiddle();},800);}
function renderFurnitureList(){var container=document.getElementById('furniture-list');var roomFurniture=getRoomFurniture();var placed=_state.furniture.map(function(f){return f.id;});if(!roomFurniture.length){container.innerHTML='<div class="furniture-empty">還沒有適合平衡室的傢具。<br>去材料庫合成傢具，可以放在這裡。</div>';return;}var html='';roomFurniture.forEach(function(item){var isPlaced=placed.indexOf(item.id)>-1;html+='<div class="furniture-item'+(isPlaced?' placed':'')+'"><span class="furniture-item-icon">'+item.icon+'</span><div class="furniture-item-info"><div class="furniture-item-name">'+item.name+'</div><div class="furniture-item-desc">'+(item.desc||'')+'</div></div>';if(isPlaced){html+='<button class="furniture-item-action btn-placed">✓ 已放入</button>';}else{html+='<button class="furniture-item-action btn-place" onclick="openFurniturePlace(\''+item.id+'\')">放入房間</button>';}html+='</div>';});container.innerHTML=html;}
function getRoomFurniture(){if(!window.hlMaterial)return[];var furniture=hlMaterial.getFurniture();var roomIds=['rise_compass','balance_scale'];return furniture.filter(function(f){return roomIds.indexOf(f.id)>-1;});}
function openFurniturePlace(itemId){if(!window.hlMaterial)return;var recipes=hlMaterial.getRecipes();var recipe=recipes.find(function(r){return r.id===itemId;});if(!recipe)return;_furnitureModeItem=recipe;document.getElementById('fo-icon').textContent=recipe.icon;document.getElementById('fo-name').textContent=recipe.name;document.getElementById('fo-desc').textContent='「'+(recipe.desc||'')+'」';var placedSlots=_state.furniture.map(function(f){return f.slot;});var slotsHtml='';[1,2,3].forEach(function(s){var occupied=placedSlots.indexOf(s)>-1;slotsHtml+='<button onclick="placeFurniture(\''+itemId+'\','+s+')" '+(occupied?'disabled style="opacity:.4;cursor:default"':'')+' style="width:100%;padding:10px;border-radius:10px;border:1.5px solid var(--border);background:'+(occupied?'rgba(0,0,0,.04)':'rgba(26,90,74,.06)')+';color:var(--warm2);font-size:.82rem;cursor:pointer;font-family:inherit;transition:all .2s">'+(occupied?'槽位 '+s+'（已佔用）':'放入槽位 '+s)+'</button>';});document.getElementById('fo-slots').innerHTML=slotsHtml;document.getElementById('furnitureOverlay').classList.add('show');}
function placeFurniture(itemId,slot){if(!_furnitureModeItem)return;_state.furniture=_state.furniture.filter(function(f){return f.slot!==slot;});_state.furniture.push({id:itemId,slot:slot,icon:_furnitureModeItem.icon,name:_furnitureModeItem.name});saveRoomState(_state);closeFurnitureOverlay();renderFurnitureList();renderPlacedFurniture();renderCompleteness();renderStatus();showToast(_furnitureModeItem.icon+' '+_furnitureModeItem.name+' 已放入平衡室！');}
function closeFurnitureOverlay(e){if(e&&e.target!==document.getElementById('furnitureOverlay')&&e.type==='click')return;document.getElementById('furnitureOverlay').classList.remove('show');_furnitureModeItem=null;}
function toggleFurnitureMode(){}
function clickSlot(slotNum){var placed=_state.furniture.find(function(f){return f.slot===slotNum;});if(placed){showToast(placed.icon+' '+placed.name+' 正放在這裡。');return;}showToast('這個位置還空著。去材料庫合成傢具，就能放在這裡。');}
function renderPlacedFurniture(){_state.furniture.forEach(function(f){var iconEl=document.getElementById('slot'+f.slot+'-icon');var emptyEls=document.querySelectorAll('#slot'+f.slot+' .slot-empty');if(iconEl){iconEl.textContent=f.icon;iconEl.style.display='';}emptyEls.forEach(function(e){e.style.display='none';});var slotEl=document.getElementById('slot'+f.slot);if(slotEl)slotEl.classList.add('occupied');});}
function renderCompleteness(){var c=calcCompleteness(_state);var sub=c>=100?'🎉 平衡室已完整！':c>=60?'繼續探索，越來越完整了':c>=30?'每天回來，完整度慢慢上升':'放置傢具，提升完整度';document.getElementById('total-pct').textContent=c+'%';document.getElementById('total-prog').style.width=c+'%';document.getElementById('total-sub').textContent=sub;document.getElementById('comp-bar').style.width=c+'%';document.getElementById('comp-pct').textContent=c+'%';}
var _toastTimeout=null;
function showToast(msg){var t=document.getElementById('hlToast');if(!t){t=document.createElement('div');t.id='hlToast';t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);background:rgba(62,42,26,.97);color:#f5dfa8;padding:10px 20px;border-radius:12px;font-size:.82rem;z-index:9999;border:1px solid rgba(200,134,42,.35);pointer-events:none;opacity:0;transition:all .3s;white-space:nowrap;max-width:88vw;text-align:center;';document.body.appendChild(t);}t.textContent=msg;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';clearTimeout(_toastTimeout);_toastTimeout=setTimeout(function(){t.style.opacity='0';t.style.transform='translateX(-50%) translateY(12px)';},2600);}
document.addEventListener('DOMContentLoaded',function(){var tries=0;var check=setInterval(function(){tries++;if((window.ROOMS&&window.hlCastle)||tries>25){clearInterval(check);init();}},150);});
</script>
