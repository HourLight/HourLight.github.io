<style>
/* =====================================================
   氣場色彩占卜 - 淺色暖色調主題
   ===================================================== */
:root {
  --aura-bg: #fdf6ef;
  --aura-bg-alt: #f7ede0;
  --aura-gold: #c9a033;
  --aura-gold-light: #e8d5a0;
  --aura-gold-dark: #9a7a28;
  --aura-text: #3d3228;
  --aura-text-light: #7a6d5f;
  --aura-card-bg: #fffbf5;
  --aura-card-border: rgba(201,160,51,0.2);
  --aura-shadow: rgba(160,130,60,0.08);
}

*, *::before, *::after { box-sizing: border-box; }

body {
  font-family: 'Noto Serif TC', 'PingFang TC', 'Microsoft JhengHei', serif;
  background: var(--aura-bg) !important;
  color: var(--aura-text) !important;
  margin: 0;
  padding: 0;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: contain;
  touch-action: manipulation;
  min-height: 100vh;
  min-height: 100dvh;
}

/* Override global dark theme */
body.night-mode {
  background: var(--aura-bg) !important;
  color: var(--aura-text) !important;
}

.aura-page {
  max-width: 480px;
  margin: 0 auto;
  padding: 0 20px;
  padding-top: 72px;
  padding-bottom: 120px;
}

/* ---- Hero Section ---- */
.aura-hero {
  text-align: center;
  padding: 40px 0 32px;
}

.aura-hero-icon {
  font-size: 48px;
  margin-bottom: 12px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.aura-hero h1 {
  font-family: 'Playfair Display', 'Noto Serif TC', serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--aura-text);
  margin: 0 0 8px;
  letter-spacing: 1px;
}

.aura-hero .subtitle {
  font-size: 15px;
  color: var(--aura-text-light);
  margin: 0;
  line-height: 1.7;
}

/* ---- Input Form ---- */
.aura-form {
  background: var(--aura-card-bg);
  border: 1px solid var(--aura-card-border);
  border-radius: 20px;
  padding: 28px 24px;
  margin: 0 0 24px;
  box-shadow: 0 4px 24px var(--aura-shadow);
}

.aura-form label {
  display: block;
  font-size: 14px;
  color: var(--aura-text-light);
  margin-bottom: 6px;
  font-weight: 500;
}

.aura-form .input-row {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.aura-form .input-group {
  flex: 1;
  position: relative;
}

.aura-form .input-group span {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 13px;
  color: var(--aura-text-light);
  pointer-events: none;
}

.aura-form input[type="number"] {
  width: 100%;
  height: 48px;
  border: 1.5px solid var(--aura-card-border);
  border-radius: 12px;
  padding: 0 32px 0 14px;
  font-size: 18px;
  font-family: 'Playfair Display', 'Noto Serif TC', serif;
  color: var(--aura-text);
  background: #fff;
  outline: none;
  transition: border-color 0.2s;
  -moz-appearance: textfield;
}

.aura-form input[type="number"]::-webkit-inner-spin-button,
.aura-form input[type="number"]::-webkit-outer-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

.aura-form input[type="number"]:focus {
  border-color: var(--aura-gold);
  box-shadow: 0 0 0 3px rgba(201,160,51,0.12);
}

.aura-form input::placeholder {
  color: #c8bfb2;
  font-size: 15px;
}

.aura-hint {
  font-size: 12px;
  color: var(--aura-text-light);
  text-align: center;
  margin-bottom: 20px;
  opacity: 0.7;
}

.aura-btn {
  display: block;
  width: 100%;
  height: 52px;
  min-height: 48px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--aura-gold) 0%, var(--aura-gold-dark) 100%);
  color: #fff;
  font-size: 17px;
  font-weight: 600;
  font-family: 'Noto Serif TC', serif;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 16px rgba(201,160,51,0.3);
}

.aura-btn:active {
  transform: scale(0.97);
  box-shadow: 0 2px 8px rgba(201,160,51,0.2);
}

.aura-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* ---- Loading ---- */
.aura-loading {
  display: none;
  text-align: center;
  padding: 60px 0;
}

.aura-loading.show { display: block; }

.aura-loading-orb {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  margin: 0 auto 20px;
  animation: loadingPulse 1.5s ease-in-out infinite;
}

@keyframes loadingPulse {
  0%, 100% { transform: scale(0.8); opacity: 0.4; }
  50% { transform: scale(1.1); opacity: 1; }
}

.aura-loading p {
  font-size: 15px;
  color: var(--aura-text-light);
  animation: fadeInOut 1.5s ease-in-out infinite;
}

@keyframes fadeInOut {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* ---- Result Section ---- */
.aura-result {
  display: none;
  animation: resultReveal 1.2s ease-out forwards;
}

.aura-result.show { display: block; }

@keyframes resultReveal {
  0% { opacity: 0; filter: blur(20px); transform: translateY(20px); }
  60% { filter: blur(0); }
  100% { opacity: 1; filter: blur(0); transform: translateY(0); }
}

/* The big aura orb */
.aura-orb-wrapper {
  text-align: center;
  padding: 32px 0 24px;
}

.aura-orb {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  margin: 0 auto;
  position: relative;
  animation: orbGlow 3s ease-in-out infinite;
}

.aura-orb::before {
  content: '';
  position: absolute;
  inset: -20px;
  border-radius: 50%;
  background: inherit;
  opacity: 0.25;
  filter: blur(24px);
  animation: orbGlow 3s ease-in-out infinite reverse;
}

.aura-orb::after {
  content: '';
  position: absolute;
  inset: -40px;
  border-radius: 50%;
  background: inherit;
  opacity: 0.1;
  filter: blur(40px);
}

@keyframes orbGlow {
  0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(255,255,255,0.1); }
  50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(255,255,255,0.2); }
}

.aura-color-name {
  text-align: center;
  margin: 20px 0 4px;
}

.aura-color-name h2 {
  font-family: 'Playfair Display', 'Noto Serif TC', serif;
  font-size: 32px;
  font-weight: 700;
  margin: 0;
  letter-spacing: 2px;
}

.aura-color-type {
  text-align: center;
  font-size: 14px;
  color: var(--aura-text-light);
  margin: 0 0 28px;
  letter-spacing: 4px;
}

/* Message card */
.aura-message-card {
  background: var(--aura-card-bg);
  border: 1px solid var(--aura-card-border);
  border-radius: 20px;
  padding: 24px;
  margin: 0 0 20px;
  box-shadow: 0 4px 24px var(--aura-shadow);
  line-height: 1.85;
  font-size: 15px;
  color: var(--aura-text);
}

.aura-message-card .msg-icon {
  font-size: 24px;
  margin-bottom: 12px;
  display: block;
}

/* Oil card */
.aura-oil-card {
  background: var(--aura-card-bg);
  border: 1px solid var(--aura-card-border);
  border-radius: 20px;
  padding: 24px;
  margin: 0 0 20px;
  box-shadow: 0 4px 24px var(--aura-shadow);
  display: flex;
  align-items: flex-start;
  gap: 16px;
}

.aura-oil-card .oil-icon {
  font-size: 36px;
  flex-shrink: 0;
  margin-top: 2px;
}

.aura-oil-card .oil-info h3 {
  font-size: 16px;
  font-weight: 600;
  margin: 0 0 4px;
  color: var(--aura-text);
}

.aura-oil-card .oil-info .oil-label {
  font-size: 12px;
  color: var(--aura-gold-dark);
  margin: 0 0 8px;
  letter-spacing: 1px;
}

.aura-oil-card .oil-info p {
  font-size: 14px;
  color: var(--aura-text-light);
  margin: 0;
  line-height: 1.7;
}

/* Energy bars */
.aura-energy-section {
  background: var(--aura-card-bg);
  border: 1px solid var(--aura-card-border);
  border-radius: 20px;
  padding: 24px;
  margin: 0 0 20px;
  box-shadow: 0 4px 24px var(--aura-shadow);
}

.aura-energy-section h3 {
  font-size: 15px;
  font-weight: 600;
  margin: 0 0 16px;
  color: var(--aura-text);
}

.energy-bar-item {
  margin-bottom: 14px;
}

.energy-bar-item:last-child { margin-bottom: 0; }

.energy-bar-label {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
  font-size: 13px;
}

.energy-bar-label .name { color: var(--aura-text); font-weight: 500; }
.energy-bar-label .value { color: var(--aura-gold-dark); font-weight: 600; }

.energy-bar-track {
  width: 100%;
  height: 8px;
  background: var(--aura-bg-alt);
  border-radius: 4px;
  overflow: hidden;
}

.energy-bar-fill {
  height: 100%;
  border-radius: 4px;
  width: 0;
  transition: width 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

/* Advice card */
.aura-advice-card {
  background: linear-gradient(135deg, var(--aura-gold-light) 0%, #f5e6c0 100%);
  border-radius: 20px;
  padding: 24px;
  margin: 0 0 24px;
  text-align: center;
}

.aura-advice-card .advice-label {
  font-size: 12px;
  color: var(--aura-gold-dark);
  letter-spacing: 3px;
  margin: 0 0 10px;
  font-weight: 500;
}

.aura-advice-card .advice-text {
  font-size: 16px;
  color: var(--aura-text);
  margin: 0;
  line-height: 1.8;
  font-weight: 500;
}

/* Share buttons */
.aura-share-row {
  display: flex;
  gap: 10px;
  margin: 0 0 28px;
  flex-wrap: wrap;
}

.aura-share-btn {
  flex: 1;
  min-width: calc(50% - 5px);
  min-height: 48px;
  height: 44px;
  border: 1.5px solid var(--aura-card-border);
  border-radius: 12px;
  background: var(--aura-card-bg);
  color: var(--aura-text);
  font-size: 13px;
  font-family: 'Noto Serif TC', serif;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 0.2s;
}

.aura-share-btn:active {
  background: var(--aura-bg-alt);
  transform: scale(0.97);
}

/* CTA section */
.aura-cta-section {
  margin: 0 0 28px;
}

.aura-cta-link {
  display: block;
  width: 100%;
  min-height: 48px;
  padding: 14px 20px;
  margin-bottom: 12px;
  border: 1.5px solid var(--aura-card-border);
  border-radius: 14px;
  background: var(--aura-card-bg);
  text-decoration: none;
  color: var(--aura-text);
  font-size: 15px;
  font-family: 'Noto Serif TC', serif;
  text-align: center;
  transition: all 0.2s;
  box-shadow: 0 2px 12px var(--aura-shadow);
}

.aura-cta-link:active {
  transform: scale(0.98);
  background: var(--aura-bg-alt);
}

.aura-cta-link .cta-icon { margin-right: 6px; }
.aura-cta-link .cta-arrow { float: right; opacity: 0.4; }

.aura-cta-primary {
  background: linear-gradient(135deg, var(--aura-gold) 0%, var(--aura-gold-dark) 100%);
  color: #fff;
  border-color: var(--aura-gold);
  font-weight: 600;
}

.aura-cta-primary:active { background: var(--aura-gold-dark); }

/* Brand closing */
.aura-brand-close {
  text-align: center;
  padding: 20px 0 8px;
  border-top: 1px solid var(--aura-card-border);
}

.aura-brand-close .brand-quote {
  font-size: 14px;
  color: var(--aura-gold-dark);
  font-style: italic;
  margin: 0 0 8px;
  letter-spacing: 1px;
}

.aura-brand-close .brand-name {
  font-size: 12px;
  color: var(--aura-text-light);
  letter-spacing: 2px;
}

/* Explore grid */
.aura-explore {
  margin: 28px 0 0;
}

.aura-explore h3 {
  font-size: 15px;
  font-weight: 600;
  margin: 0 0 14px;
  color: var(--aura-text);
  text-align: center;
}

.explore-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.explore-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 16px 10px;
  background: var(--aura-card-bg);
  border: 1px solid var(--aura-card-border);
  border-radius: 14px;
  text-decoration: none;
  color: var(--aura-text);
  font-size: 13px;
  text-align: center;
  transition: all 0.2s;
}

.explore-card:active {
  background: var(--aura-bg-alt);
  transform: scale(0.97);
}

.explore-card .explore-icon { font-size: 28px; }
.explore-card .explore-label { font-weight: 500; line-height: 1.4; }

/* Retry btn */
.aura-retry {
  text-align: center;
  margin: 24px 0 0;
}

.aura-retry button {
  background: none;
  border: none;
  color: var(--aura-gold-dark);
  font-size: 14px;
  font-family: 'Noto Serif TC', serif;
  cursor: pointer;
  padding: 8px 16px;
  min-height: 48px;
}

/* Toast */
.aura-toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--aura-text);
  color: #fff;
  padding: 10px 24px;
  border-radius: 24px;
  font-size: 13px;
  opacity: 0;
  transition: all 0.3s;
  z-index: 9999;
  pointer-events: none;
  white-space: nowrap;
}

.aura-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Animations */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.aura-result .aura-message-card { animation: slideUp 0.6s 0.3s both; }
.aura-result .aura-oil-card { animation: slideUp 0.6s 0.5s both; }
.aura-result .aura-energy-section { animation: slideUp 0.6s 0.7s both; }
.aura-result .aura-advice-card { animation: slideUp 0.6s 0.9s both; }
.aura-result .aura-share-row { animation: slideUp 0.6s 1.0s both; }
.aura-result .aura-cta-section { animation: slideUp 0.6s 1.1s both; }
.aura-result .aura-brand-close { animation: slideUp 0.6s 1.2s both; }
.aura-result .aura-explore { animation: slideUp 0.6s 1.3s both; }

/* ---- Error State ---- */
.aura-error {
  color: #c0392b;
  font-size: 13px;
  text-align: center;
  margin-top: 10px;
  display: none;
}

.aura-error.show { display: block; }

/* Nav overrides for light theme */
.hl-topnav, #hl-topnav-container { background: rgba(253,246,239,0.95) !important; -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px); }
.hl-bottomnav, #hl-bottomnav-container { background: rgba(253,246,239,0.95) !important; -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px); }
</style>

<body>
<!-- Top Nav placeholder -->
<div id="hl-topnav-container"></div>

<main class="aura-page" id="auraPage">

  <!-- ===== Input Section ===== -->
  <section class="aura-input-section" id="inputSection">
    <div class="aura-hero">
      <div class="aura-hero-icon">🔮</div>

    <div class="aura-form">
      <label>農曆生日</label>
      <div class="input-row">
        <div class="input-group">
          <input type="number" id="lunarYear" placeholder="年" min="1" max="2026" inputmode="numeric">

        <div class="input-group">

      </div>
      <p class="aura-hint">農曆生日不確定？問問爸媽或查萬年曆</p>
      <button class="aura-btn" id="calcBtn" onclick="calculateAura()">看見我的氣場色彩</button>
      <p class="aura-error" id="errorMsg"></p>
    </div>
  </section>

  <!-- ===== Loading ===== -->
  <div class="aura-loading" id="loadingSection">
    <div class="aura-loading-orb" id="loadingOrb"></div>
    <p>正在感應你的能量場...</p>
  </div>

  <!-- ===== Result Section ===== -->
  <section class="aura-result" id="resultSection">

    <!-- 1. Big Orb -->

    <!-- 2. Name + Type -->

      <h2 id="auraName"></h2>
    </div>
    <p class="aura-color-type" id="auraType"></p>

    <!-- 3. Message -->
    <div class="aura-message-card">
      <span class="msg-icon">💬</span>
      <div id="auraMessage"></div>
    </div>

    <!-- 4. Oil -->
    <div class="aura-oil-card">
      <span class="oil-icon">🌿</span>
      <div class="oil-info">
        <p class="oil-label">對應精油推薦</p>
        <h3 id="oilName"></h3>
        <p id="oilReason"></p>
      </div>
    </div>

    <!-- 5. Energy Bars -->
    <div class="aura-energy-section">
      <h3>🌟 今日能量狀態</h3>
      <div id="energyBars"></div>
    </div>

      <p class="advice-text" id="adviceText"></p>

function calculateAura() {
  var yearEl = document.getElementById('lunarYear');
  var monthEl = document.getElementById('lunarMonth');
  var dayEl = document.getElementById('lunarDay');
  var errorEl = document.getElementById('errorMsg');

  var y = parseInt(yearEl.value, 10);
  var m = parseInt(monthEl.value, 10);
  var d = parseInt(dayEl.value, 10);

  // Validation
  errorEl.classList.remove('show');

  if (!y || !m || !d) {
    errorEl.textContent = '請填入完整的農曆年月日';
    errorEl.classList.add('show');
    return;
  }
  if (m < 1 || m > 12) {
    errorEl.textContent = '月份請填 1 到 12';
    errorEl.classList.add('show');
    return;
  }
  if (d < 1 || d > 30) {
    errorEl.textContent = '日期請填 1 到 30';
    errorEl.classList.add('show');
    return;
  }

  // Calculate: sum all digits of year+month+day, take last digit
  var str = String(y) + String(m) + String(d);
  var total = 0;
  for (var i = 0; i < str.length; i++) {
    total += parseInt(str[i], 10);
  }
  var auraKey = total % 10;

  // Show loading
  document.getElementById('inputSection').style.display = 'none';
  var loadingSection = document.getElementById('loadingSection');
  var loadingOrb = document.getElementById('loadingOrb');
  var aura = AURA_DATA[auraKey];
  loadingOrb.style.background = aura.gradient;
  loadingSection.classList.add('show');

  // After 2.5s, show result
  setTimeout(function() {
    loadingSection.classList.remove('show');
    showResult(aura, auraKey);
  }, 2500);
}

function showResult(aura, key) {
  // Orb
  var orb = document.getElementById('auraOrb');
  orb.style.background = aura.gradient;
  orb.style.boxShadow = '0 0 50px ' + aura.orbShadow + ', 0 0 100px ' + aura.orbShadow;

  // Name + type
  document.getElementById('auraName').textContent = aura.name;
  document.getElementById('auraName').style.color = aura.textColor;
  document.getElementById('auraType').textContent = aura.type;

  // Message
  document.getElementById('auraMessage').textContent = aura.message;

  // Oil
  document.getElementById('oilName').textContent = aura.oil;
  document.getElementById('oilReason').textContent = aura.oilReason;

  // Energy bars
  var barsHtml = '';
  for (var i = 0; i < aura.energy.length; i++) {
    barsHtml += '<div class="energy-bar-item">' +
      '<div class="energy-bar-label"><span class="name">' + aura.energy[i] + '</span><span class="value">' + aura.energyValues[i] + '%</span></div>' +
      '<div class="energy-bar-track"><div class="energy-bar-fill" data-width="' + aura.energyValues[i] + '" style="background:' + aura.color + ';"></div></div>' +
      '</div>';
  }
  document.getElementById('energyBars').innerHTML = barsHtml;

  // Advice
  document.getElementById('adviceText').textContent = aura.advice;

  // Show result
  var resultSection = document.getElementById('resultSection');
  resultSection.classList.add('show');

  // Animate bars after a moment
  setTimeout(function() {
    var fills = document.querySelectorAll('.energy-bar-fill');
    for (var j = 0; j < fills.length; j++) {
      fills[j].style.width = fills[j].getAttribute('data-width') + '%';
    }
  }, 800);

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Store for sharing
  window._auraResult = aura;
  window._auraKey = key;

  // Material drop + tracking
  if (window.HL_dropMaterial) HL_dropMaterial('calculator');
  if (window.HL_track) HL_track('calc_complete', { toolId: 'aura-color', toolName: '氣場色彩占卜' });
}

function resetForm() {
  document.getElementById('resultSection').classList.remove('show');
  document.getElementById('inputSection').style.display = '';
  document.getElementById('lunarYear').value = '';
  document.getElementById('lunarMonth').value = '';
  document.getElementById('lunarDay').value = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function copyResult() {
  var text = getShareText();
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() {
      showToast('已複製，貼給朋友看看 ✨');
    });
  } else {
    // Fallback
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('已複製，貼給朋友看看 ✨');
  }
}
