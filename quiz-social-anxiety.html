<script>
var TYPES={
invisible:{name:'隱形人型',icon:'👻',sub:'存在感越低越安全',
desc:'你的社交策略是「讓自己消失」。不是不喜歡人，而是被注意到這件事本身就讓你全身不自在。你可以在咖啡廳待一整天，但前提是沒有人跟你講話。你的存在感刻意調到最低，彷彿一隻想融入牆壁花紋的變色龍。朋友約你出門時，你最先想的不是「好不好玩」，而是「會有多少人」。你把「不被看見」當成一種保護，但其實你內心深處渴望被溫柔地發現。你的焦慮不在表演，而在「暴露」，怕被看穿自己其實沒有那麼從容。',
oil:'🌿 <strong>精油處方：乳香（安定存在感）× 甜橙（溫暖打開心門）× 檀香（根植自我價值）</strong><br><br>隱形人型的焦慮來自「存在本身」。乳香的木質樹脂香氣能穩定你的神經系統，讓「被看見」不再那麼可怕。每天早晨在胸口滴一滴乳香，深呼吸三次，跟自己說：「我在這裡，這樣就夠了。」出門前手腕抹一點甜橙，讓柑橘的明亮感為你打開一扇小窗。\n\n為什麼這個配方對你有效？\n乳香裡的乳香酸（boswellic acid）能溫柔地安撫你過度警覺的杏仁核，把「被注意到＝危險」的警報音量調小。甜橙富含的檸檬烯（limonene）則直接跟你的邊緣系統說悄悄話，像一杯溫熱的可可，讓你的神經從「隱形模式」慢慢切換到「我在這裡也可以」模式。檀香裡的 α-檀香醇能活化前額葉皮質，幫你建立「存在本身就有價值」的新迴路。三支精油一起工作，就像幫你的靈魂裝了一盞柔和的夜燈，不刺眼，但足夠讓別人溫柔地看見你。',
med:'手邊沒有精油？試試這個：\n\n【存在感呼吸法】\n找一個安靜的角落坐下，雙腳平放在地面。閉上眼睛，用 4 秒鐘慢慢吸氣，想像空氣是一層淡淡的金色光暈，從頭頂開始往下包覆你的身體。hold 住 4 秒，感受這層光暈讓你的輪廓變得清晰。然後用 6 秒鐘慢慢吐氣，想像這層光暈不會消失，只是變得更柔和。重複 5 次。\n\n做完之後，睜開眼睛，環顧四周，找到 3 個你喜歡的顏色、2 個你聽到的聲音、1 個你聞到的味道。這個 3-2-1 著陸法會把你從「隱形狀態」拉回「我在這裡」的真實感。每天早上出門前做一次，或是到達社交場合的前 3 分鐘在洗手間偷偷做，效果很好。',
insight:'你不需要變得外向，只需要允許自己「被看見也沒關係」。'},

actor:{name:'完美演員型',icon:'🎭',sub:'台上滿分台下崩潰',
desc:'你在人前的表現堪稱完美，笑容到位、應對得體、誰都覺得你「很會社交」。但只有你知道，每一場社交都是一場消耗巨大的舞台劇。回到家的瞬間，你像被拔掉電池的機器人，什麼都不想動。你的焦慮不在「能不能做好」，而在「如果有一次沒做好怎麼辦」。你對自己的社交表現有著近乎苛刻的標準，一句說錯的話可以讓你反覆回想三天。你演得太好了，好到沒有人發現你在演。而這，才是最累的部分。',
oil:'🌿 <strong>精油處方：薰衣草（卸下面具）× 羅馬洋甘菊（允許不完美）× 佛手柑（真實的自信）</strong><br><br>完美演員型需要的不是更好的演技，而是「允許NG」。薰衣草的鎮靜酯類能直接鬆開你緊繃的杏仁核，讓神經系統從「備戰」切換到「安全」。社交結束後，泡一個加了三滴薰衣草的熱水澡，讓那些反覆回想的對話隨著蒸氣散去。佛手柑則幫你找回不靠表演也能自在的底氣。\n\n為什麼這個配方對你有效？\n薰衣草裡的沉香醇（linalool）和乙酸沉香酯是你的卸妝水，它們直接作用在杏仁核和邊緣系統，溫柔地跟你過度亢奮的「社交表演監控中心」說：「今天的戲份結束了，可以休息了。」羅馬洋甘菊的酯類分子則像一條柔軟的毛毯，裹住你那個在腦中不斷回放「剛才那句話是不是說錯了」的焦慮迴圈，讓前額葉從「覆盤模式」安靜下來。佛手柑的檸檬烯和呋喃香豆素能刺激迷走神經，幫你的身體記住「不演的時候也很安全」這個新感覺。',
med:'手邊沒有精油？試試這個：\n\n【卸下面具呼吸法】\n找一個獨處的空間（浴室、車裡都可以）。先做一個誇張的表情：把眼睛睜到最大、嘴巴張到最開，hold 住 5 秒，然後瞬間放鬆，讓臉上所有肌肉垮下來。重複 3 次。這是在幫你的臉部肌肉記住「不用維持表情」的感覺。\n\n接著閉眼，用鼻子吸氣 4 秒，想像自己正在脫掉一件很重的戲服。嘴巴吐氣 6 秒，發出「哈，」的聲音（越大聲越好），想像那件戲服掉在地上。重複 6 次。\n\n最後把右手放在心口，左手放在肚子上，對自己說三次：「今天的我已經夠好了。」感受手掌下心跳慢慢變穩的節奏。整個過程約 3 分鐘，適合每次社交活動後馬上做。',
insight:'完美不是目標，真實才是。允許自己偶爾「不那麼好」，才是真正的強大。'},

mindreader:{name:'讀心術型',icon:'🔮',sub:'瘋狂猜測別人在想什麼',
desc:'你的大腦有一個內建的「他人想法模擬器」，而且永遠往最壞的方向跑。對方皺了一下眉，你已經在腦中上演一齣「他是不是討厭我」的小劇場。別人少回你一個表情符號，你就開始回顧過去七天有沒有做錯什麼。你只是太擅長「讀出不存在的惡意」了。你的共感力是天賦，但當它過載的時候，別人的每一個表情都會變成一把瞄準你的箭。最累的是，你永遠無法驗證自己的猜測，所以焦慮永遠不會結束。',
oil:'🌿 <strong>精油處方：岩蘭草（停止腦內小劇場）× 快樂鼠尾草（鬆開思緒糾結）× 葡萄柚（回到當下）</strong><br><br>讀心術型的焦慮核心是「過度解讀」。岩蘭草厚重的泥土氣息像一個錨，把你從「他是不是討厭我」的漩渦裡拉回來。在手帕上滴兩滴岩蘭草，焦慮發作時聞一聞。睡前在太陽穴抹一滴快樂鼠尾草，讓那些今天讀錯的「心」安靜下來。\n\n為什麼這個配方對你有效？\n岩蘭草裡的岩蘭草醇和岩蘭草酮是天然的「腦內小劇場斷電器」，它們的大分子結構能放慢你過度運轉的邊緣系統，讓杏仁核那個瘋狂按警報的小人安靜下來。快樂鼠尾草的乙酸沉香酯直接跟你的前額葉溝通，幫你把「分析別人表情」的頻寬讓一點出來給「活在當下」用。葡萄柚滿滿的檸檬烯像一桶冰水，把你從腦內的第八百集小劇場裡潑醒，讓迷走神經重新校準，回到「此時此刻對方只是皺了一下眉而已」的現實。',
med:'手邊沒有精油？試試這個：\n\n【小劇場暫停鍵練習】\n當你發現自己又在瘋狂猜測「他剛才那個表情是什麼意思」的時候，馬上做這件事：雙腳用力踩地板 3 下（真的踩出聲音），然後大聲在心裡喊「暫停！」。\n\n接著做 5 次「方塊呼吸」：吸氣 4 秒、hold 4 秒、吐氣 4 秒、hold 4 秒。每次吐氣的時候，想像腦中的小劇場螢幕慢慢變暗、關機。\n\n最後做一個「事實查核」：在心裡列出 3 件你「確定知道」的事（例如：我現在坐在咖啡廳、外面在下雨、我的咖啡還是熱的），用確定的事實把猜測的小劇場擠出去。整個過程不到 2 分鐘，在任何場合都能偷偷做。每天睡前也可以做一次，把今天所有「讀錯的心」打包丟進想像中的碎紙機。',
insight:'你猜測的那個「別人的想法」，99%是你自己的恐懼投影。'},

runner:{name:'逃跑專家型',icon:'🏃',sub:'能閃就閃 閃不了就撐',
desc:'你的社交焦慮直接反映在行為上，能不去就不去，能早走就早走，能躲就躲。你有一整套精密的「社交迴避系統」：假裝沒看到訊息、突然身體不舒服、剛好那天有事。不是不想跟人連結，是光想到要面對一群人，你的身體就先替你踩了煞車。心跳加速、手心冒汗、腦袋一片空白，這些不是你在演，是你的自律神經真的在拉警報。你的逃跑不是懦弱，是身體在保護一個曾經在社交中受過傷的你。',
oil:'🌿 <strong>精油處方：甜馬鬱蘭（安撫自律神經）× 橙花（修復社交創傷）× 黑雲杉（勇氣的氣味）</strong><br><br>逃跑專家型的身體反應很真實，所以需要從身體層面去安撫。甜馬鬱蘭能直接作用於副交感神經，降低「戰或逃」的警報等級。出門前在後頸和手腕各滴一滴，讓它成為你的「安全結界」。橙花的花香則像一雙溫柔的手，撫平你過去在社交場合裡留下的皺褶。\n\n為什麼這個配方對你有效？\n甜馬鬱蘭裡的沉香醇和萜品烯-4-醇是你的自律神經安撫師，它們能直接啟動副交感神經（就是那個負責「放鬆、沒事的」的系統），把你的杏仁核從「紅色警戒」調回「黃燈注意」。橙花裡的橙花叔醇（nerolidol）溫柔得不講道理，它能穿過血腦屏障跟你的邊緣系統直接對話，慢慢修復那些「上次社交搞砸了」的記憶檔案，讓它們不再自動觸發逃跑反應。黑雲杉的乙酸龍腦酯則像一雙穩穩的手扶住你的腎上腺，讓你的身體記住：「站在原地不跑，天也不會塌下來。」',
med:'手邊沒有精油？試試這個：\n\n【安全結界身體掃描】\n當你感覺到「想逃」的衝動升起來的時候（心跳加速、手心冒汗、腦袋空白），先不要動。把雙手交叉放在胸前，像在抱住自己。\n\n然後做「蝴蝶拍」：左右手輪流輕拍自己的上臂，左、右、左、右，每秒一下的節奏，持續 30 秒。這個動作能直接刺激迷走神經，幫你的身體從「逃跑模式」切換回來。\n\n接著做 4 次深呼吸：鼻子吸氣 3 秒，嘴巴吐氣 7 秒（吐氣比吸氣長是關鍵，這會啟動你的副交感神經）。每次吐氣時，想像你的腳下長出樹根，深深扎進地板裡，讓你穩穩地站在原地。\n\n做完之後跟自己說：「我可以待 5 分鐘看看。」不用承諾待一整晚，只要 5 分鐘就好。通常 5 分鐘之後你會發現：其實沒有想像中那麼可怕。',
insight:'你不需要變勇敢，只需要一次「沒逃跑但也沒事」的經驗。'},

slowwarm:{name:'暖機慢熱型',icon:'🐢',sub:'不是不行 是需要時間',
desc:'你只是需要比別人多三倍的暖機時間。剛到一個場合的前三十分鐘你是一塊木頭，但如果有人願意等你，一個小時後你可能是全場最好聊的那個。你的問題不在「不會社交」，而在「啟動太慢」。這個世界對慢熱的人不太友善，聚會通常在你剛暖好的時候結束，面試通常在你最緊張的前十分鐘決定一切。你需要的不是改變自己，而是找到願意等你開機的人和場合。你一旦打開，溫度比誰都暖。',
oil:'🌿 <strong>精油處方：薑（加速暖機）× 肉桂葉（點燃內在火焰）× 玫瑰天竺葵（柔化社交稜角）</strong><br><br>暖機慢熱型需要的是「加速開機」的配方。薑的辛辣溫熱能活化你的循環系統，讓身體的能量從「省電模式」切換到「正常運作」。出門前三十分鐘，在腹部順時鐘按摩兩滴薑精油，讓溫熱感從核心往外擴散。到了現場如果還是卡卡的，聞一下手腕上的玫瑰天竺葵，讓花香替你打開話匣子。\n\n為什麼這個配方對你有效？\n薑裡的薑辣素和薑烯能像一杯熱拿鐵一樣暖開你的循環系統，同時刺激你的前額葉皮質加速開機。慢熱的人不是不想互動，是身體的「社交引擎」啟動比較慢，薑就是那根點火的火柴。肉桂葉的肉桂醛能輕輕推一把你的腎上腺，釋放恰到好處的去甲腎上腺素，讓你從「省電模式」順暢切換到「我準備好了」。玫瑰天竺葵的香茅醇和牻牛兒醇則溫柔地打開你的邊緣系統，像春天的暖風一樣融化你剛到場時那層薄薄的冰。三支精油合作，就像幫你的暖機時間從 30 分鐘壓縮到 10 分鐘。',
med:'手邊沒有精油？試試這個：\n\n【加速暖機運動】\n到達社交場合之前，找一個沒人的地方（電梯裡、停車場、洗手間都行），做這套 90 秒暖機操：\n\n第一步（30 秒）：原地快速踏步，膝蓋盡量抬高，同時雙手用力甩動。這會讓你的血液循環加速、體溫上升，身體暖了，嘴巴就比較容易打開。\n\n第二步（30 秒）：停下來，雙手搓熱，捂住臉頰 10 秒，然後移到耳朵 10 秒，最後放在後頸 10 秒。每個位置都深呼吸一次，想像溫度從手掌傳進去。\n\n第三步（30 秒）：張開嘴巴做 5 次誇張的「啊」的嘴型（不用出聲），放鬆你的下巴肌肉。然後用舌頭快速舔上下嘴唇各 3 圈。這是在喚醒你的口腔肌肉，讓等等開口說話變得更容易。\n\n暖好之後走進場合，給自己一個任務：「到場後 5 分鐘內，對任何一個人微笑點頭就好。」從最小的互動開始暖，不用急著變成全場焦點。',
insight:'慢熱不是缺陷，是你在確認安全後才交出真心的方式。'}
};
