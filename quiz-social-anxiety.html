<script>
var QUESTIONS=[
{q:'在一群不太熟的人面前自我介紹：',opts:[{t:'完全不會緊張',a:'0'},{t:'有一點緊張但還好',a:'1'},{t:'很緊張，會事先想好要說什麼',a:'2'},{t:'非常緊張，能避開就避開',a:'3'}]},
{q:'在餐廳裡需要叫服務生過來：',opts:[{t:'直接舉手或喊一聲',a:'0'},{t:'等服務生經過再叫',a:'1'},{t:'等很久才敢叫，或請同伴幫忙叫',a:'2'},{t:'寧願自己去櫃檯',a:'3'}]},
{q:'在會議中被點名發言：',opts:[{t:'自然地說出想法',a:'0'},{t:'有點緊張但能完成',a:'1'},{t:'心跳加速，說完後覺得自己講得不好',a:'2'},{t:'腦袋一片空白，恨不得消失',a:'3'}]},
{q:'參加一個只認識主人的聚會：',opts:[{t:'主動找人聊天',a:'0'},{t:'等主人介紹再開口',a:'1'},{t:'大部分時間看手機或待在角落',a:'2'},{t:'找理由不去或提早離開',a:'3'}]},
{q:'打電話給不太熟的人（訂位、詢問）：',opts:[{t:'不會猶豫直接打',a:'0'},{t:'深呼吸一下再撥出去',a:'1'},{t:'能用訊息就不打電話',a:'2'},{t:'寧願不做這件事也不想打',a:'3'}]},
{q:'在公共場合吃東西（一個人）：',opts:[{t:'完全自在',a:'0'},{t:'偶爾會注意到別人的眼光',a:'1'},{t:'會挑角落或不太顯眼的位置',a:'2'},{t:'不太想一個人在公共場合吃東西',a:'3'}]},
{q:'跟權威人物（主管、長輩）一對一講話：',opts:[{t:'跟平常一樣',a:'0'},{t:'比較正式但不會不自在',a:'1'},{t:'會緊張，擔心說錯話',a:'2'},{t:'能避免就避免',a:'3'}]},
{q:'做了一件事結果不如預期，別人在場：',opts:[{t:'沒什麼，失敗正常',a:'0'},{t:'有點不好意思',a:'1'},{t:'覺得很丟臉，會反覆回想',a:'2'},{t:'之後很長一段時間都會想起這件事',a:'3'}]}
];

function startQuiz(){answers={};currentQ=0;document.querySelector('.quiz-hero').style.display='none';document.getElementById('progressWrap').style.display='block';document.getElementById('questionsArea').style.display='block';document.getElementById('quizResult').style.display='none';renderQ()}
function renderQ(){var q=QUESTIONS[currentQ];var html='<div class="quiz-question-card" style="padding:28px 22px;margin-bottom:16px"><div class="quiz-q-number" style="margin-bottom:10px">'+(currentQ+1)+' / '+QUESTIONS.length+'</div><div class="quiz-q-text" style="margin-bottom:20px">'+q.q+'</div><div class="quiz-options" style="display:flex;flex-direction:column;gap:10px">';q.opts.forEach(function(o){html+='<button class="quiz-option" onclick="pick(\''+o.a+'\',this)">'+o.t+'</button>'});html+='</div></div>';document.getElementById('questionsArea').innerHTML=html;document.getElementById('progressFill').style.width=((currentQ/QUESTIONS.length)*100)+'%';document.getElementById('progressText').textContent=(currentQ+1)+' / '+QUESTIONS.length}
function pick(a,btn){answers[currentQ]=a;btn.classList.add('selected');setTimeout(function(){currentQ++;if(currentQ>=QUESTIONS.length)showResult();else renderQ()},350)}
function showResult(){var total=0;Object.values(answers).forEach(function(a){total+=parseInt(a)});var max=QUESTIONS.length*3;var pct=Math.round(total/max*100);var level=pct>=75?'明顯社交焦慮':pct>=45?'中度社交不適':pct>=20?'輕微社交緊張':'社交自在';var color=pct>=75?'#E17055':pct>=45?'#FDCB6E':pct>=20?'#74B9FF':'#55EFC4';var desc=pct>=75?'社交場合對您的影響相當大。這不代表您有問題，但如果它持續影響您的生活品質，值得進一步了解和處理。':pct>=45?'某些社交情境會讓您不太舒服。您有自己的應對方式（迴避、事先準備），這些策略有用但也消耗能量。':pct>=20?'大部分社交場合您都能應對，只是偶爾會緊張一下。這是正常的。':' 您在社交場合裡很自在。繼續保持，也記得理解那些比較緊張的人。';document.getElementById('questionsArea').style.display='none';document.getElementById('progressWrap').style.display='none';var html='<div style="animation:hlFadeUp .6s ease both">';html+='<div style="background:#fff;border:3px solid '+color+';border-radius:20px;padding:32px 24px;text-align:center;margin-bottom:24px">';html+='<div style="font-size:.7rem;color:var(--qc1);letter-spacing:.15em;margin-bottom:12px">HOUR LIGHT ✦ 馥靈之鑰</div>';html+='<div style="font-size:3rem;margin-bottom:8px">💬</div>';html+='<div style="font-size:1.6rem;font-weight:700;color:'+color+';font-family:Playfair Display,serif;margin-bottom:4px">'+level+'</div>';html+='<div style="font-size:.88rem;color:var(--qlt);margin-bottom:16px">社交焦慮指數 '+pct+'%</div>';html+='<div style="height:10px;background:#f0f0f0;border-radius:5px;overflow:hidden;margin:0 20px 16px"><div style="height:100%;width:'+pct+'%;background:'+color+';border-radius:5px;animation:hlBarGrow 1s ease both"></div></div>';html+='<div style="font-size:.9rem;line-height:1.8;text-align:left;padding:0 8px">'+desc+'</div></div>';html+='<div style="background:#fff;border-radius:16px;padding:24px;text-align:center;margin-bottom:20px;border:1.5px solid #eee"><div style="display:flex;flex-direction:column;gap:10px;max-width:320px;margin:0 auto"><a href="quiz-hsp.html" style="display:block;padding:12px;background:var(--qc1);color:#fff;border-radius:12px;text-decoration:none;font-weight:600;font-size:.88rem">🌿 HSP 高敏感測驗（交叉比對）</a><a href="fuling-mima.html" style="display:block;padding:12px;background:var(--qc2);color:#fff;border-radius:12px;text-decoration:none;font-weight:600;font-size:.88rem">🔮 馥靈秘碼（免費）</a></div></div>';html+='<div style="text-align:center;font-size:.68rem;color:var(--qlt);line-height:1.8">本測驗參考 Liebowitz Social Anxiety Scale 設計，結果僅供自我覺察參考，不構成醫療診斷。如持續影響生活，建議諮詢專業心理師。<br>© 2026 馥靈之鑰國際有限公司</div></div>';document.getElementById('quizResult').innerHTML=html;document.getElementById('quizResult').style.display='block';document.getElementById('quizResult').scrollIntoView({behavior:'smooth',block:'start'});if(window.hlCastle)hlCastle.giveKey("harmony")}
