<script>
var TYPES={
self:{name:'自我鞭策型',icon:'💎',sub:'對自己最嚴格的人',
  desc:'您的完美主義來自內在。不是別人要求您，是您自己要求自己。做到 95 分還是覺得不夠。那個「不夠好」的聲音，24 小時全年無休。',
  detail:'自我鞭策型的完美主義者是最累的那種。因為裁判和選手是同一個人，永遠不可能贏。\n\n這不是壞事。您的高標準讓您產出的品質確實比別人好。但代價是：慢性疲勞、拖延（因為怕做不好所以不敢開始）、以及一種「什麼都不夠」的空虛感。\n\n您可能是那種作業交出去之後還想收回來改的人。email 發出去三秒後就在想有沒有錯字。\n\n一個練習：今天故意交出一份 80 分的東西。看看世界有沒有塌。',
  oil:'佛手柑（放鬆標準·自我接納）× 乳香（看見全局·放下細節）× 甜馬鬱蘭（肌肉緊繃釋放·允許不完美）\n\n為什麼這個配方對你有效？\n佛手柑的乙酸沉香酯和檸檬烯直接作用在你前額葉的「標準設定區」，溫柔地把那把尺從 100 分鬆到 85 分。你的杏仁核一直在說「不夠好就會被拋棄」，佛手柑告訴它：「80 分也值得被愛。」乳香的乳香酸穿越血腦屏障，幫你的大腦從「盯著瑕疵」切換到「看見全局」。甜馬鬱蘭的萜品烯-4-醇同時放鬆肌肉和神經，因為自我鞭策型的身體永遠是緊繃的。\n調配建議：基底油（荷荷芭油）10ml＋佛手柑 2 滴＋乳香 2 滴＋甜馬鬱蘭 1 滴，約 2.5%。佛手柑有光敏性，塗抹後 12 小時避免日曬。IFA 建議成人全身 1~3%。',
  med:'手邊沒有精油？試試這個：\n\n「故意 80 分呼吸」\n你的每一口呼吸都想做到完美。這次，不要。\n\n1. 先做一次你的「標準呼吸」：吸到最飽、吐到最乾淨、姿勢完美\n2. 現在，故意做一次「80 分呼吸」：吸氣只吸八成（約 3 秒），吐氣隨便吐（約 4 秒），姿勢歪一點也行\n3. 用 80 分的方式呼吸 8 輪。每一輪在吐氣時默唸：「80 分就夠了」\n4. 注意你的身體：那個不安是什麼？那個「不夠好」的焦慮，住在身體的哪裡？\n5. 最後 2 輪：對那個焦慮說「我知道你在。但今天 80 分就夠了。世界沒有崩塌。」\n\n做完後，故意交出一件 80 分的東西。觀察：真的有人在意嗎？\n\n這個練習直接挑戰你的前額葉裡「完美才安全」的迴路，讓你的杏仁核體驗「不完美也不會被拋棄」的新記憶。'},
others:{name:'外在標準型',icon:'🔍',sub:'對別人標準很高的人',
  desc:'您的完美主義投射在別人身上。您對品質的要求很高，這讓您是很好的品管者，但也讓身邊的人壓力很大。別人覺得 OK 的，您覺得可以更好。',
  detail:'外在標準型的人通常是主管、父母、或團隊裡的品質把關者。您的標準確實讓事情做得更好。\n\n但要注意：不是每個人都跟您一樣在意細節。當您覺得「為什麼他們做不好」的時候，問自己：「我的標準是唯一正確的標準嗎？」\n\n這種完美主義最傷的不是自己，是關係。因為身邊的人會覺得「怎麼做都不對」，久了就不敢靠近。\n\n一個練習：今天對一個人說「這樣就很好了」。說出口，然後忍住不加「但是」。',
  oil:'甜橙（接納不完美的暖意）× 天竺葵（平衡對他人的期待）× 佛手柑（鬆開控制的手）\n\n為什麼這個配方對你有效？\n甜橙的檸檬烯在邊緣系統裡創造「溫暖的接納感」，讓你看到別人的 80 分時，不會自動切換到「修正模式」。天竺葵的香茅醇和牻牛兒醇平衡你前額葉的「標準校準器」，讓你對別人的期待從「我的標準」放寬到「對方的最佳水準」。佛手柑的乙酸沉香酯直接作用在杏仁核，鬆開你那隻「想幫每個人改到完美」的手。\n調配建議：基底油（甜杏仁油）10ml＋甜橙 2 滴＋天竺葵 2 滴＋佛手柑 1 滴，約 2.5%。佛手柑有光敏性，塗抹後避免日曬。IFA 建議成人全身 1~3%。',
  med:'手邊沒有精油？試試這個：\n\n「鬆手呼吸練習」\n你對別人的標準很高，因為你真的在乎品質。但不是每個人都需要被你改。\n\n1. 把雙手握拳，像你在抓住「標準」不放。用力握 5 秒\n2. 吸氣 4 秒：想一個你最近想幫別人「改」的事情\n3. 吐氣 6 秒：鬆開一根手指。對自己說「他的方式也可以」\n4. 吸氣 4 秒：你的大腦會反駁「可是那樣不夠好」。聽見了。但繼續鬆手\n5. 吐氣 6 秒：再鬆一根。「不是每件事都需要達到我的標準」\n\n做 5 輪，每輪鬆一根手指。直到手完全打開。\n\n最後，把雙手掌心朝上放在膝蓋上。感受「不抓」的感覺。你的手很輕，但那件事沒有變糟。\n\n這個練習幫你的前額葉區分「我的標準」和「唯一正確的標準」，讓你從「控制者」變成「支持者」。'},
social:{name:'社會比較型',icon:'🎭',sub:'怕達不到別人標準的人',
  desc:'您的完美主義來自外在。不是您對自己要求高，是您覺得「別人對我要求高」。不管做到什麼程度，都擔心不被認可。IG 上看到別人的生活，就覺得自己不夠好。',
  detail:'社會比較型的完美主義最痛苦。因為標準不在自己手上，您永遠在猜「這樣夠不夠好」。\n\n真相是：大部分人沒有您想的那麼在意。您的完美主義可能是小時候「做好才被愛」的信念延伸。\n\n社群媒體讓這種比較加劇了十倍。每次滑手機都是一次「我不夠好」的確認。但您看到的是別人的精華，跟自己的日常比，永遠輸。\n\n一個練習：今天問自己「如果沒有人在看，我還會在意這件事嗎？」答案是不會的話，那件事可以放了。',
  oil:'薰衣草（回到自己的節奏）× 岩蘭草（不被外在標準帶走）× 玫瑰（找回自我價值感）\n\n為什麼這個配方對你有效？\n薰衣草的沉香醇是最溫柔的「節奏重設劑」，讓你的邊緣系統從「別人的標準」回到「自己的頻率」。你的杏仁核一直在掃描「別人怎麼看我」，薰衣草幫它把掃描範圍縮回自己。岩蘭草的岩蘭草醇是精油界最重的「錨」，把你的自我價值從「別人的評分表」拉回「腳下的土地」。玫瑰的苯乙醇在前額葉裡種下一句話：「我的價值不需要別人打分數。」\n調配建議：基底油（荷荷芭油）10ml＋薰衣草 2 滴＋岩蘭草 1 滴＋玫瑰 1 滴，約 2%。玫瑰精油珍貴，1 滴即可。IFA 建議成人全身 1~3%。',
  med:'手邊沒有精油？試試這個：\n\n「內在評審退場練習」\n你的腦子裡一直有一排評審在舉牌。這個練習幫你請他們下班。\n\n1. 閉上眼睛。想像你站在舞台上，面前坐著一排「評審」。他們手裡舉著分數牌。有些是你認識的人，有些是想像中「社會」的樣子\n2. 吸氣 4 秒：看著他們。承認他們在那裡\n3. 吐氣 6 秒：走到第一位評審面前。對他說「謝謝你，但今天你可以下班了。」想像他站起來，走出去\n4. 每一輪呼吸，送走一位評審。吸氣看著他，吐氣送他離開\n5. 做 5 輪，直到評審席空了\n\n最後，在空蕩蕩的評審席上，只剩你自己。坐到那個位置上。\n\n拿起分數牌，舉起「100 分」。不是因為你完美，是因為你本來就值得。\n\n這個練習利用內在意象重塑，幫助前額葉減少對「外在評價」的依賴，把價值感的來源從外在移回內在。'},
procrastinate:{name:'拖延完美型',icon:'🐌',sub:'因為怕不完美所以不開始的人',
  desc:'您的完美主義表現在，不開始。因為「開始」就意味著有可能「做不好」。與其交出一個不完美的東西，不如⋯先不交。明天再說。下週再做。等準備好了再開始。',
  detail:'拖延完美型是最弔詭的完美主義。表面看是「拖延」，底層其實是「害怕不完美」。\n\n您可能花了三天在想怎麼開始，卻一個字都沒寫。或者研究了 50 個工具，卻一個都沒用。因為在腦海中，那個「完美的成品」已經存在了，而現實一定達不到，所以不如不做。\n\n這是一種自我保護：沒有嘗試就沒有失敗。但代價是：也沒有任何東西完成。\n\n一個練習：給自己一個「爛開始」的許可。今天寫 100 字的垃圾初稿。不管品質，先打破那道心理的牆。',
  oil:'迷迭香（啟動行動力）× 葡萄柚（切斷過度思考）× 薑（推一把的溫暖力量）\n\n為什麼這個配方對你有效？\n迷迭香的桉油醇和樟腦是前額葉的「啟動鍵」，不是讓你想得更多（你已經想太多了），而是把「想」切換成「做」。葡萄柚的檸檬烯和諾卡酮像一把利剪，咔嚓一聲剪斷你「再想一下」的迴圈。薑的薑烯在身體裡創造溫熱感，那是一種「推你一把」的物理力量，讓你的腳從「黏在地上」變成「可以踏出去」。\n調配建議：基底油（甜杏仁油）10ml＋迷迭香 2 滴＋葡萄柚 2 滴＋薑 1 滴，約 2.5%。葡萄柚有光敏性，塗抹後避免日曬。孕婦避免使用迷迭香。IFA 建議成人全身 1~3%。',
  med:'手邊沒有精油？試試這個：\n\n「爛開始呼吸法」\n你怕的是做不好。這個練習幫你跨過「開始」那道牆。\n\n1. 想一件你一直拖著沒開始的事。感受想到它時身體的反應（胸口緊？肩膀縮？）\n2. 吸氣 4 秒：承認「我在怕」。不批判，只是看見\n3. 吐氣 6 秒：對自己說「我允許自己做一個爛開始」\n4. 吸氣 4 秒：想像那件事的「最醜版本」。不完美的初稿、歪歪的線條、語法錯誤的第一段。它很醜，但它存在了\n5. 吐氣 6 秒：「存在比完美重要。」\n\n做 5 輪。\n\n做完後，立刻打開那件事。不管是打開文件、拿起筆、還是按下錄音鍵。花 5 分鐘，做一個「爛開始」。\n\n5 分鐘之後你可以停。但通常你不會想停。因為最難的從來不是做得好，是「開始」。\n\n這個練習利用「暴露法」的原理，讓你的杏仁核體驗「不完美的開始沒有帶來災難」，慢慢瓦解「不做就不會失敗」的迴避迴路。'},
hidden:{name:'隱性完美型',icon:'🦢',sub:'表面隨性內心挑剔的人',
  desc:'您看起來很隨和、很好相處、什麼都行。但只有您自己知道，腦子裡有一個小人一直在打分數。嘴上說「都可以」，心裡想「這哪裡可以」。',
  detail:'隱性完美型是最難被發現的。因為您學會了用「無所謂」包裝「非常在意」。\n\n您不會像自我鞭策型那樣明顯焦慮，也不會像外在標準型那樣挑剔別人。您的完美主義是安靜的、內縮的、只有您自己知道的。\n\n表面上接受了 80 分，心裡一直在想那缺少的 20 分。表面說「沒關係」，夜深人靜的時候反覆回想。\n\n最大的代價：因為不表達，所以沒人知道您在意。沒人知道，就沒人能幫忙。\n\n一個練習：今天對一個人坦白說「其實我有點在意這件事」。讓隱性的變成看得見的。',
  oil:'茉莉（讓真實的自己被看見）× 橙花（卸下「沒關係」的面具）× 檀香（允許自己有感覺）\n\n為什麼這個配方對你有效？\n茉莉的吲哚和苯甲酸苄酯是「真實自我顯影劑」，穿透邊緣系統裡那層「沒關係」的保護膜，讓真正的感受浮出水面。你的杏仁核學會了用「無所謂」包裝「非常在意」，茉莉溫柔地拆開包裝。橙花的橙花叔醇和沉香醇卸下你前額葉裡「表演毫不費力」的程式。檀香的 α-檀香醇給你一個安全的空間，讓你可以承認「其實我很在意」而不覺得丟臉。\n調配建議：基底油（荷荷芭油）10ml＋茉莉原精 1 滴＋橙花 1 滴＋檀香 2 滴，約 2%。茉莉原精和橙花都是珍貴精油，各 1 滴即足。IFA 建議成人全身 1~3%。',
  med:'手邊沒有精油？試試這個：\n\n「其實我在意呼吸」\n你最擅長的事是讓別人以為你不在意。但你在意。這個練習幫你把那個「在意」說出來。\n\n1. 閉上眼睛。想一件最近你嘴上說「沒關係」但心裡一直在想的事\n2. 吸氣 4 秒：感受那個「在意」住在身體的哪裡。胸口？喉嚨？胃？\n3. 吐氣 6 秒：出聲說「其實我在意。」（真的出聲，不是在心裡說）\n4. 吸氣 4 秒：你的身體可能會抗拒。嘴上說出「我在意」的時候，哪裡縮緊了？\n5. 吐氣 6 秒：讓那個縮緊慢慢鬆開。再說一次：「其實我在意，而且這沒什麼不好。」\n\n做 5 輪。\n\n做完之後，找一個人，把那件「其實我在意」的事告訴他。不需要很深，就說「其實我有點在意那件事」。\n\n這個練習利用言語化（verbalization）啟動前額葉的情緒標籤功能，幫你的杏仁核學會「表達在意不等於軟弱」。隱性完美主義最大的突破，就是把隱性變成可見的。'}
};
