<script>
/* ═══════════════════════════════════════
   自我覺察力指數（AQ）測驗
   五維度：身體覺察 / 情緒辨識 / 思維覺知 / 關係敏感 / 行動整合
   ═══════════════════════════════════════ */

var DIMS=['身體覺察','情緒辨識','思維覺知','關係敏感','行動整合'];
var DIM_ICONS=['🫀','🎭','🧠','🤝','⚡'];
var DIM_KEYS=['body','emotion','mind','relation','action'];

// 20題，每題對應一個維度，1-5分
var QUESTIONS=[
  // 身體覺察 (4題)
  {q:'當你壓力很大的時候，你能明確指出身體哪個部位在不舒服嗎？',d:0,
    opts:['完全不知道身體在說什麼','偶爾隱約覺得哪裡怪怪的','大概知道是肩頸或頭','能精準指出部位和感覺','能同時感知多個部位的細微變化']},
  {q:'吃東西的時候，你會注意到食物的味道、溫度和口感嗎？',d:0,
    opts:['吃就是吃，沒想過','偶爾會，但大部分時候在看手機','一半一半','大部分時候會注意','我吃得很慢，每一口都在感受']},
  {q:'你能感覺到自己現在的呼吸是深的還是淺的嗎？',d:0,
    opts:['完全沒注意過','現在被問了才注意到','偶爾會注意','經常注意','我有每天觀察呼吸的習慣']},
  {q:'當你很累的時候，你通常多久之後才意識到「我累了」？',d:0,
    opts:['撐到倒下才知道','很晚才發現','當天會發現','幾小時內就知道','一開始累就能覺察到']},

  // 情緒辨識 (4題)
  {q:'當你心情不好的時候，你能說出那是「什麼情緒」嗎？（例如：失望、委屈、生氣、嫉妒⋯⋯）',d:1,
    opts:['只知道「不好」，說不出具體是什麼','大概能分辨是正面還是負面','能說出2-3種','能準確命名，而且知道混合了哪幾種','能追溯到情緒的來源和觸發點']},
  {q:'你多久會因為「突然不知道為什麼心情變了」而困惑？',d:1,
    opts:['經常，覺得情緒像天氣一樣無法預測','蠻常的','偶爾','很少','幾乎不會，我通常知道情緒從哪裡來']},
  {q:'當別人問你「你還好嗎？」你的反射性回答是什麼？',d:1,
    opts:['永遠說「我很好」不管實際怎樣','通常說好，除非真的很慘','會想一下才回答','會根據實際感受回答','會先感受一下自己，再給出真實的答案']},
  {q:'你能在情緒升起的「當下」就覺察到它嗎？還是事後才發現？',d:1,
    opts:['通常是好幾天後才回想起來','事後幾小時會發現','當天就能覺察','發生當下就能注意到','能在情緒升起的瞬間就看見它']},

  // 思維覺知 (4題)
  {q:'你多常會注意到自己正在「自動化思考」（重複的念頭、預設的反應模式）？',d:2,
    opts:['從來沒注意過','偶爾會突然意識到','有時候','經常能看到自己的思維模式','幾乎能即時覺察到每一個念頭的來源']},
  {q:'當你做出一個判斷（例如「這個人不值得信任」），你會回頭檢查這個判斷是基於事實還是偏見嗎？',d:2,
    opts:['不會，我的直覺很準','偶爾被提醒才會','有時候會自我質疑','經常會檢查','會主動尋找反面證據來挑戰自己的判斷']},
  {q:'你能分辨「事實」和「你對事實的解讀」之間的差別嗎？',d:2,
    opts:['差別在哪？','知道有差別但做不到','偶爾能分辨','大部分時候能','能清楚拆開事實和解讀，而且知道自己的解讀從哪來']},
  {q:'你腦袋裡的「自我批評聲音」有多大聲？',d:2,
    opts:['非常大聲，幾乎聽不見其他的','蠻大聲的','有時候大聲有時候小聲','我能聽見它，但也能選擇不理它','我把它當成一個「顧問」，聽聽就好']},

  // 關係敏感 (4題)
  {q:'你能感覺到對方話語背後真正想表達的意思嗎？',d:3,
    opts:['完全聽不出來','偶爾能','一半一半','大部分時候能','幾乎都能，而且能感覺到對方自己都沒意識到的']},
  {q:'在一段對話中，你能同時注意到「對方在說什麼」和「我正在有什麼反應」嗎？',d:3,
    opts:['我只能注意到其中一個','偶爾','有時候','經常能','能同時觀察對方和自己，像有兩個意識在運作']},
  {q:'你多常因為別人的情緒而被「傳染」？',d:3,
    opts:['非常頻繁，別人不開心我就不開心','蠻常的','有時候','我能感受到但不會被帶走','我能感同身受，同時保持自己的中心']},
  {q:'在衝突中，你能意識到自己的「反應模式」嗎？（例如：逃避、攻擊、討好⋯⋯）',d:3,
    opts:['完全沒想過，衝突就是衝突','事後會反省','當下有點意識','能在當下覺察並嘗試調整','能即時看到模式、理解來源、選擇回應方式']},

  // 行動整合 (4題)
  {q:'你「知道該做什麼」和「真的去做」之間的距離有多遠？',d:4,
    opts:['非常遠，知道但永遠不做','蠻遠的，常拖延','有時候能做到','大部分時候能把覺察轉化為行動','覺察到就會行動，幾乎沒有延遲']},
  {q:'你有沒有每天固定的「覺察練習」？（例如：靜心、寫日記、呼吸練習⋯⋯）',d:4,
    opts:['完全沒有','曾經試過但沒持續','偶爾會做','每週有固定練習','每天都有，而且已經成為習慣']},
  {q:'當你覺察到自己的一個壞習慣，你能在多短的時間內開始改變？',d:4,
    opts:['知道但從來沒改過','要很久，可能幾個月','幾週','幾天內就開始行動','覺察到的當下就開始調整']},
  {q:'你的覺察有沒有在日常生活中帶來「可驗證的改變」？',d:4,
    opts:['沒有，覺察歸覺察，生活歸生活','偶爾','有一些','明顯有','我的生活因為覺察而發生了根本性的轉變']}
];

var answers={}, currentQ=0;

function renderQuestion(idx){
  var q=QUESTIONS[idx];
  var html='<div class="hl-quiz-q-text">'+q.q+'</div><div class="hl-quiz-options">';
  q.opts.forEach(function(opt,i){
    html+='<button class="hl-quiz-option" onclick="answer('+idx+','+(i+1)+')">'+opt+'</button>';
  });
  html+='</div>';
  document.getElementById('questionCard').innerHTML=html;
  document.getElementById('progressFill').style.width=((idx+1)/QUESTIONS.length*100)+'%';
  document.getElementById('progressText').textContent=(idx+1)+' / '+QUESTIONS.length;
}

function answer(qi,val){
  answers[qi]=val;
  currentQ=qi+1;
  if(currentQ<QUESTIONS.length) renderQuestion(currentQ);
  else showResult();
}

function showResult(){
  // 計算五維度
  var scores={body:0,emotion:0,mind:0,relation:0,action:0};
  var counts={body:0,emotion:0,mind:0,relation:0,action:0};
  Object.keys(answers).forEach(function(qi){
    var q=QUESTIONS[qi];
    var key=DIM_KEYS[q.d];
    scores[key]+=answers[qi];
    counts[key]++;
  });

  var pcts={};
  DIM_KEYS.forEach(function(k){
    pcts[k]=Math.round(scores[k]/(counts[k]*5)*100);
  });

  var totalScore=0,totalMax=0;
  DIM_KEYS.forEach(function(k){totalScore+=scores[k];totalMax+=counts[k]*5;});
  var totalPct=Math.round(totalScore/totalMax*100);

  // 等級
  var level,levelName,levelDesc;
  if(totalPct>=90){level=5;levelName='覺察大師';levelDesc='你的覺察力已經內化為本能。你不只是看見自己，還能幫助別人看見。你最大的課題不是「更覺察」，而是「不要忘記自己也需要被照顧」。';}
  else if(totalPct>=75){level=4;levelName='清醒行者';levelDesc='你大部分時候都能覺察到自己的狀態，而且能把覺察轉化為行動。你和覺察大師之間的距離，可能只差一個「持續性」。';}
  else if(totalPct>=60){level=3;levelName='漸醒之人';levelDesc='你已經開始覺察了，但常常在忙碌中又忘了。你需要的不是更多知識，是一個每天提醒你回到覺察的工具。';}
  else if(totalPct>=40){level=2;levelName='夢中微醒';levelDesc='你偶爾會突然「啊，我又在自動模式了」，但大部分時候是被生活帶著走。別急，你已經比完全沒覺察的人多走了一步。';}
  else{level=1;levelName='深睡期';levelDesc='你目前活在「自動導航」模式。不是你的錯，大部分人都是這樣。但你點進了這個測驗，說明你的潛意識已經開始敲門了。';}

  document.getElementById('questionsArea').style.display='none';
  document.getElementById('progressWrap').style.display='none';

  // Level
  document.getElementById('resultLevel').innerHTML=
    '<div class="al-score">'+totalPct+'<span class="al-max"> / 100</span></div>'
    +'<div class="al-name">'+levelName+'</div>'
    +'<div class="al-desc">'+levelDesc+'</div>';

  // Radar（簡易版用條狀圖，不依賴Chart.js）
  document.getElementById('resultRadar').style.display='none';

  // 五維度條
  var dh='';
  DIM_KEYS.forEach(function(k,i){
    dh+='<div class="aw-dim">'
      +'<div class="ad-icon">'+DIM_ICONS[i]+'</div>'
      +'<div class="ad-info"><div class="ad-name">'+DIMS[i]+'</div>'
      +'<div class="ad-bar"><div class="ad-fill" style="width:0" data-w="'+pcts[k]+'%"></div></div></div>'
      +'<div class="ad-pct">'+pcts[k]+'%</div></div>';
  });
  document.getElementById('resultDims').innerHTML=dh;
  setTimeout(function(){
    document.querySelectorAll('.ad-fill').forEach(function(el){el.style.width=el.dataset.w;});
  },300);

  // 找最弱和最強
  var minK=DIM_KEYS[0],maxK=DIM_KEYS[0];
  DIM_KEYS.forEach(function(k){if(pcts[k]<pcts[minK])minK=k;if(pcts[k]>pcts[maxK])maxK=k;});
  var minI=DIM_KEYS.indexOf(minK),maxI=DIM_KEYS.indexOf(maxK);

  // 成長建議
  var growthTools={
    body:'身體覺察日誌（app.hourlightkey.com）每天記錄身體感受，21 天後你會驚訝自己變得多敏銳。',
    emotion:'馥靈投射卡（projection-cards.html）用意象投射練習情緒辨識。或者，每天睡前寫三個今天的情緒：名稱、來源、強度。',
    mind:'馥靈馥語易經（fuling-fuyu.html）每天起一卦，練習分辨「卦象在說什麼」和「你覺得它在說什麼」的差別。',
    relation:'愛之語測驗（quiz-lovelang.html）+ 合盤配對（compatibility.html）從理解自己的關係模式開始。',
    action:'豐盛祈禱文（abundance-prayer.html）每天念 3 分鐘。21 天不間斷。覺察力需要行動才能長肌肉。'
  };

  document.getElementById('resultMain').innerHTML=
    '<div class="result-section-title">🏆 你最強的覺察維度：'+DIMS[maxI]+'（'+pcts[maxK]+'%）</div>'
    +'<div class="result-section-content">這是你的天賦覺察通道。在這個維度上，你比大部分人都敏銳。善用它。</div>';

  document.getElementById('resultGrowth').innerHTML=
    '<div class="result-section-title">🌱 成長空間最大：'+DIMS[minI]+'（'+pcts[minK]+'%）</div>'
    +'<div class="result-section-content">不是弱點，是還沒打開的天賦。<br><br>'
    +'<strong style="color:#f8dfa5;font-weight:500">推薦練習：</strong>'+growthTools[minK]+'</div>';

  // 香氣著陸
  var aromaMap={
    body:{oil:'岩蘭草',text:'你的身體覺察需要「接地」。岩蘭草的泥土氣息會提醒你的神經系統：回到身體裡。每天早上，一滴岩蘭草在腳底。踩在地板上。感覺重力。'},
    emotion:{oil:'玫瑰',text:'你的情緒辨識需要「溫柔的光」。玫瑰不是甜的，是讓你覺得「被溫柔以待」的感覺。每天晚上，一滴玫瑰在心口。問自己：今天我感受到了什麼？'},
    mind:{oil:'迷迭香',text:'你的思維覺知需要「清醒」。迷迭香一秒打通你的鼻腔，也打通你腦袋裡那些打結的念頭。每次做決定前，聞一口迷迭香。你會更清楚自己在想什麼。'},
    relation:{oil:'天竺葵',text:'你的關係敏感度需要「平衡」。天竺葵能讓你感受到對方，同時不被對方的情緒帶走。約會或談話前，一滴天竺葵在手腕上。'},
    action:{oil:'黑胡椒',text:'你的行動整合需要「點火」。黑胡椒的辛辣從胃開始往上燒，燒掉你的拖延。每次覺察到該做的事卻不想動的時候，聞一口黑胡椒。然後站起來。做。'}
  };
  var ar=aromaMap[minK];
  document.getElementById('resultAroma').style.display='block';
  document.getElementById('resultAroma').innerHTML=
    '<div class="aroma-landing"><div class="al-label">🌿 馥靈香氣著陸 · '+ar.oil+'</div>'
    +'<div class="al-text">'+ar.text+'</div></div>';

  document.getElementById('resultHour').innerHTML=
