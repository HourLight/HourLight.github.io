<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fdf0ef;
  --bg2:#fbe4e1;
  --card:rgba(255,255,255,.92);
  --warm:#3e2a2a;
  --warm2:#6b4a4a;
  --muted:#9a7a7a;
  --gold:#c8862a;
  --gold-l:#e8b86d;
  --gold-ll:#f5dfa8;
  --rose:#c0334d;
  --rose-l:#e85a72;
  --rose-ll:#f0c0be;
  --pink:#f0c0be;
  --pink-l:#f8d8d6;
  --teal:#2a8a7c;
  --teal-l:#4eb8a8;
  --navy:#1a3050;
  --accent:#c0334d;
  --border:rgba(192,51,77,.12);
  --shadow:0 8px 32px rgba(62,42,42,.08);
  --shadow-lg:0 20px 60px rgba(62,42,42,.14);
}
html{scroll-behavior:smooth}
body{
  font-family:'Noto Serif TC',serif;
  color:var(--warm);
  background:var(--bg);
  min-height:100vh;min-height:100dvh;
  overflow-x:hidden;
}

/* ── Topbar ── */
.topbar{
  position:sticky;top:0;z-index:300;
  height:52px;
  background:rgba(253,240,239,.94);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;
}
@media(min-width:521px){.topbar{-webkit-backdrop-filter:none;backdrop-filter:none;background:#fdf6ef}}
.topbar-back{
  display:flex;align-items:center;gap:6px;
  font-size:.78rem;color:var(--muted);text-decoration:none;
  transition:color .2s;
}
.topbar-back:hover{color:var(--warm)}
.topbar-title{
  font-family:'Playfair Display',serif;
  font-size:.95rem;font-weight:700;color:var(--warm);
  letter-spacing:.06em;
}
.topbar-right{display:flex;align-items:center;gap:10px}
.room-completeness{
  font-size:.7rem;color:var(--muted);
  display:flex;align-items:center;gap:5px;
}
.completeness-bar{
  width:48px;height:4px;
  background:rgba(192,51,77,.1);
  border-radius:2px;overflow:hidden;
}
.completeness-fill{
  height:100%;
  background:linear-gradient(90deg,var(--rose),var(--rose-l));
  border-radius:2px;
  transition:width .6s cubic-bezier(.16,1,.3,1);
}

/* ── 頁首裝飾條 ── */
.room-header{
  padding:20px 18px 0;
  display:flex;align-items:baseline;gap:10px;
}
.room-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:.68rem;letter-spacing:.12em;color:var(--muted);
  background:rgba(192,51,77,.06);
  border:1px solid var(--border);
  border-radius:20px;padding:3px 12px;
  text-transform:uppercase;
}
.room-phase{
  font-size:.68rem;color:var(--rose);letter-spacing:.1em;
}
.servant-greeting{margin:8px 18px 0;padding:12px 16px;background:linear-gradient(135deg,rgba(240,192,190,.15),rgba(232,90,114,.06));border:1px solid var(--border);border-radius:14px;font-size:.82rem;color:var(--warm2);line-height:1.6;text-align:center}

/* ══════════════════════════════
   SVG 房間場景
══════════════════════════════ */
.room-scene-wrap{
  margin:12px 16px 0;
  border-radius:24px;
  overflow:hidden;
  border:1.5px solid var(--border);
  box-shadow:var(--shadow-lg);
  background:#2a1418;
  position:relative;
  cursor:pointer;
}
.room-scene-wrap:hover .scene-hint{opacity:1}
.scene-hint{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.55);color:rgba(255,248,235,.85);
  font-size:.68rem;padding:5px 14px;border-radius:20px;
  letter-spacing:.08em;white-space:nowrap;
  opacity:0;transition:opacity .3s;pointer-events:none;
  -webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);
}

/* ── 傢具插槽浮層 ── */
.furniture-slot{cursor:pointer;transition:filter .25s}
.furniture-slot:hover{filter:brightness(1.25) drop-shadow(0 0 8px rgba(240,192,190,.6))}
.furniture-slot.occupied{cursor:default}
.furniture-slot.occupied:hover{filter:drop-shadow(0 0 6px rgba(240,192,190,.4))}
.slot-empty{opacity:.35;transition:opacity .25s}
.furniture-slot:hover .slot-empty{opacity:.6}

/* ══════════════════════════════
   今日狀態區
══════════════════════════════ */
.status-strip{
  margin:14px 16px 0;
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:8px;
}
.status-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px 10px;
  text-align:center;
}
.status-icon{font-size:18px;margin-bottom:3px;display:block}
.status-label{font-size:.62rem;color:var(--muted);letter-spacing:.06em;display:block;margin-bottom:2px}
.status-val{font-size:.88rem;font-weight:700;color:var(--warm);display:block}

/* ══════════════════════════════
   照料動作區
══════════════════════════════ */
.care-section{
  margin:14px 16px 0;
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:20px;
  padding:18px 16px;
}
.care-title{
  font-family:'Playfair Display',serif;
  font-size:.88rem;font-weight:700;color:var(--warm);
  letter-spacing:.06em;margin-bottom:14px;
  display:flex;align-items:center;gap:7px;
}
.care-title::after{content:'';flex:1;height:1px;background:var(--border)}
.care-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.care-btn{
  display:flex;flex-direction:column;align-items:center;
  gap:5px;padding:14px 8px;
  border-radius:14px;border:1.5px solid var(--border);
  background:rgba(192,51,77,.03);
  cursor:pointer;transition:all .22s;
  font-family:'Noto Serif TC',serif;
  position:relative;overflow:hidden;
}
.care-btn::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 110%,rgba(192,51,77,.12),transparent 70%);
  opacity:0;transition:opacity .3s;
}
.care-btn:hover{
  border-color:rgba(192,51,77,.35);
  background:rgba(192,51,77,.06);
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(192,51,77,.1);
}
.care-btn:hover::before{opacity:1}
.care-btn.done{
  border-color:rgba(42,138,124,.4);
  background:rgba(42,138,124,.06);
  cursor:default;opacity:.7;
}
.care-btn.done:hover{transform:none;box-shadow:none}
.care-btn-icon{font-size:22px;line-height:1}
.care-btn-label{font-size:.68rem;color:var(--warm2);font-weight:500;text-align:center;line-height:1.3}
.care-btn-done-mark{
  position:absolute;top:6px;right:6px;
  width:16px;height:16px;
  background:var(--teal);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:#fff;font-weight:700;
  opacity:0;transform:scale(0);
  transition:all .3s cubic-bezier(.16,1,.3,1);
}
.care-btn.done .care-btn-done-mark{opacity:1;transform:scale(1)}
.care-result{
  margin-top:12px;padding:12px 14px;
  background:rgba(42,138,124,.06);
  border:1px solid rgba(42,138,124,.2);
  border-radius:12px;
  font-family:'LXGW WenKai TC','Noto Serif TC',serif;
  font-size:.82rem;color:var(--warm2);line-height:1.8;
  display:none;animation:fadeSlideUp .4s ease;
}
.care-result.show{display:block}

/* ══════════════════════════════
   謎語（覺察問答）區
══════════════════════════════ */
.riddle-section{margin:14px 16px 0}
.section-label{
  font-size:.68rem;letter-spacing:.12em;color:var(--muted);
  text-transform:uppercase;margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.riddle-card{
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:20px;
  padding:20px 16px;
  box-shadow:var(--shadow);
}
.riddle-type-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:.63rem;letter-spacing:.1em;color:var(--rose);
  border:1px solid rgba(192,51,77,.2);
  border-radius:20px;padding:3px 10px;
  margin-bottom:12px;background:rgba(192,51,77,.04);
}
.riddle-q{
  font-family:'LXGW WenKai TC','Noto Serif TC',serif;
  font-size:1rem;color:var(--warm);line-height:1.75;
  margin-bottom:16px;
}
.riddle-opts{display:flex;flex-direction:column;gap:8px}
.riddle-opt{
  padding:12px 14px;
  border:1.5px solid var(--border);
  border-radius:12px;
  background:rgba(192,51,77,.02);
  cursor:pointer;
  font-size:.88rem;color:var(--warm2);
  line-height:1.55;transition:all .2s;
  position:relative;
}
.riddle-opt::before{
  content:'';position:absolute;left:0;top:0;
  width:3px;height:100%;
  background:var(--rose);
  border-radius:3px 0 0 3px;
  transform:scaleY(0);transition:transform .22s;
}
.riddle-opt:hover{
  border-color:rgba(192,51,77,.3);
  background:rgba(192,51,77,.05);
  transform:translateX(3px);
}
.riddle-opt:hover::before,.riddle-opt.sel::before{transform:scaleY(1)}
.riddle-opt.sel{
  border-color:rgba(192,51,77,.4);
  background:rgba(192,51,77,.06);
  color:var(--warm);font-weight:500;
}
/* 香氣選卡 */
.aroma-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.aroma-card{
  padding:14px 10px;
  border:1.5px solid var(--border);
  border-radius:14px;
  background:rgba(192,51,77,.02);
  cursor:pointer;text-align:center;
  transition:all .22s;
}
.aroma-card:hover{border-color:rgba(192,51,77,.3);background:rgba(192,51,77,.05);transform:translateY(-2px)}
.aroma-card.sel{border-color:rgba(42,138,124,.45);background:rgba(42,138,124,.07)}
.aroma-icon{font-size:24px;margin-bottom:5px;display:block}
.aroma-name{font-size:.75rem;font-weight:700;color:var(--warm);margin-bottom:2px}
.aroma-note{font-size:.65rem;color:var(--muted);line-height:1.4}
/* 洞見 */
.insight-box{
  margin-top:14px;padding:16px;
  background:linear-gradient(135deg,rgba(192,51,77,.04),rgba(42,138,124,.04));
  border:1px solid rgba(42,138,124,.2);
  border-radius:14px;
  display:none;animation:fadeSlideUp .5s ease;
}
.insight-box.show{display:block}
.insight-txt{
  font-family:'LXGW WenKai TC','Noto Serif TC',serif;
  font-size:.88rem;color:var(--warm2);line-height:1.9;
}
.insight-txt strong{color:var(--warm);font-weight:700}
/* 完成按鈕 */
.btn-complete{
  display:block;width:100%;
  margin-top:16px;padding:14px;
  background:linear-gradient(135deg,var(--rose),var(--rose-l));
  color:#fff;border:none;border-radius:14px;
  font-family:'Playfair Display','Noto Serif TC',serif;
  font-size:.95rem;font-weight:700;letter-spacing:.06em;
  cursor:pointer;transition:all .25s;
  position:relative;overflow:hidden;
}
.btn-complete::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
  transform:translateX(-100%);transition:transform .5s;
}
.btn-complete:hover::after{transform:translateX(100%)}
.btn-complete:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(192,51,77,.25)}
.btn-complete:disabled{opacity:.35;cursor:default;transform:none;box-shadow:none}
.btn-complete:disabled::after{display:none}

/* ══════════════════════════════
   愛之殿特色：關係覺察區
══════════════════════════════ */
.love-special-section{
  margin:14px 16px 0;
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:20px;
  padding:18px 16px;
}
.love-pattern-q{
  font-family:'LXGW WenKai TC','Noto Serif TC',serif;
  font-size:.92rem;color:var(--warm);line-height:1.7;
  margin-bottom:12px;
}
.love-pattern-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.love-pattern-opt{
  padding:10px 14px;
  border:1.5px solid var(--border);
  border-radius:12px;
  background:rgba(192,51,77,.02);
  cursor:pointer;font-size:.85rem;color:var(--warm2);
  line-height:1.5;transition:all .2s;
}
.love-pattern-opt:hover{border-color:rgba(192,51,77,.3);background:rgba(192,51,77,.05)}
.love-pattern-opt.sel{border-color:rgba(192,51,77,.4);background:rgba(192,51,77,.08);font-weight:500;color:var(--warm)}
.love-pattern-result{
  margin-top:14px;padding:14px 16px;
  background:linear-gradient(135deg,rgba(240,192,190,.12),rgba(248,216,214,.08));
  border:1px solid rgba(192,51,77,.15);
  border-radius:14px;
  font-family:'LXGW WenKai TC','Noto Serif TC',serif;
  font-size:.85rem;color:var(--warm2);line-height:1.85;
  display:none;animation:fadeSlideUp .5s ease;
}
.love-pattern-result.show{display:block}
.love-step-dots{display:flex;gap:6px;justify-content:center;margin:10px 0 14px}
.love-step-dot{
  width:8px;height:8px;border-radius:50%;
  background:rgba(192,51,77,.15);transition:all .3s;
}
.love-step-dot.active{background:var(--rose);transform:scale(1.3)}
.love-step-dot.done{background:var(--teal)}

/* ══════════════════════════════
   愛的語言提示
══════════════════════════════ */
.love-quote-section{
  margin:14px 16px 0;
  padding:18px 20px;
  background:linear-gradient(135deg,rgba(240,192,190,.15),rgba(255,255,255,.6));
  border:1px solid var(--border);
  border-radius:20px;
  text-align:center;
}
.love-quote-icon{font-size:1.6rem;margin-bottom:8px;display:block}
.love-quote-text{
  font-family:'LXGW WenKai TC','Noto Serif TC',serif;
  font-size:.92rem;color:var(--warm);line-height:1.85;
  font-style:italic;
}
.love-quote-label{
  font-size:.62rem;color:var(--muted);letter-spacing:.1em;
  margin-top:10px;display:block;
}

/* ══════════════════════════════
   精油氛圍
══════════════════════════════ */
.aroma-atmosphere{
  margin:14px 16px 0;
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:20px;
  padding:18px 16px;
  text-align:center;
}
.aroma-atm-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:12px 28px;
  border:1.5px solid rgba(192,51,77,.25);
  border-radius:28px;
  background:linear-gradient(135deg,rgba(240,192,190,.12),rgba(248,216,214,.08));
  color:var(--warm);font-size:.88rem;font-weight:600;
  cursor:pointer;transition:all .25s;
  font-family:'Noto Serif TC',serif;
}
.aroma-atm-btn:hover{
  border-color:rgba(192,51,77,.45);
  background:linear-gradient(135deg,rgba(240,192,190,.25),rgba(248,216,214,.15));
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(192,51,77,.1);
}
.aroma-atm-btn.lit{
  border-color:var(--rose);
  background:linear-gradient(135deg,rgba(192,51,77,.1),rgba(240,192,190,.2));
}
.aroma-atm-result{
  margin-top:14px;padding:14px 16px;
  background:rgba(240,192,190,.08);
  border:1px solid rgba(192,51,77,.12);
  border-radius:14px;
  text-align:left;
  font-family:'LXGW WenKai TC','Noto Serif TC',serif;
  font-size:.85rem;color:var(--warm2);line-height:1.85;
  display:none;animation:fadeSlideUp .5s ease;
}
.aroma-atm-result.show{display:block}
.aroma-atm-oil-name{
  font-size:1rem;font-weight:700;color:var(--warm);
  display:block;margin-bottom:6px;
}

/* ══════════════════════════════
   傢具清單
══════════════════════════════ */
.furniture-section{
  margin:14px 16px 0;
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:20px;
  padding:18px 16px;
}
.furniture-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.furniture-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:12px;
  background:rgba(192,51,77,.03);
  border:1px solid var(--border);
}
.furniture-item.placed{border-color:rgba(192,51,77,.25);background:rgba(192,51,77,.06)}
.furniture-item-icon{font-size:20px;flex-shrink:0}
.furniture-item-info{flex:1;min-width:0}
.furniture-item-name{font-size:.82rem;font-weight:700;color:var(--warm)}
.furniture-item-desc{font-size:.68rem;color:var(--muted);line-height:1.4;margin-top:1px}
.furniture-item-action{
  padding:5px 12px;border-radius:20px;
  font-size:.68rem;font-weight:700;
  border:1px solid;cursor:pointer;
  transition:all .2s;font-family:inherit;
}
.btn-place{border-color:var(--rose);color:var(--rose);background:transparent}
.btn-place:hover{background:var(--rose);color:#fff}
.btn-placed{border-color:rgba(42,138,124,.4);color:var(--teal);background:rgba(42,138,124,.06);cursor:default}
.furniture-empty{text-align:center;padding:20px;font-size:.78rem;color:var(--muted);line-height:1.8}

/* ══════════════════════════════
   照料完成 Overlay
══════════════════════════════ */
.care-overlay{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.45);
  align-items:center;justify-content:center;
  -webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);
}
.care-overlay.show{display:flex;animation:fadeIn .3s ease}
.care-modal{
  background:var(--bg);
  border:1.5px solid var(--border);
  border-radius:28px;
  padding:32px 24px 28px;
  max-width:340px;width:90%;
  text-align:center;
  box-shadow:var(--shadow-lg);
  animation:modalPop .5s cubic-bezier(.16,1,.3,1);
}
.care-modal-icon{font-size:3.2rem;margin-bottom:12px;display:block}
.care-modal-title{
  font-family:'Playfair Display',serif;
  font-size:1.25rem;font-weight:700;color:var(--warm);
  margin-bottom:6px;letter-spacing:.04em;
}
.care-modal-pts{
  display:inline-block;
  background:linear-gradient(135deg,var(--rose),var(--rose-l));
  color:#fff;padding:4px 16px;border-radius:20px;
  font-size:.78rem;font-weight:700;letter-spacing:.06em;
  margin-bottom:12px;
}
.care-modal-insight{
  font-family:'LXGW WenKai TC','Noto Serif TC',serif;
  font-size:.85rem;color:var(--warm2);line-height:1.85;
  margin-bottom:20px;padding:12px 14px;
  background:rgba(192,51,77,.05);
  border-radius:12px;
  border-left:3px solid var(--rose-ll);
  text-align:left;
}
.care-modal-close{
  width:100%;padding:12px;
  border:1.5px solid var(--border);border-radius:12px;
  background:transparent;color:var(--warm2);
  font-size:.88rem;cursor:pointer;
  font-family:'Noto Serif TC',serif;transition:all .2s;
}

// ── 房間謎語 ──
var _roomRiddle = null;

function todayKey(){
  var tw = new Date(new Date().getTime() + 8*3600000);
  return tw.getUTCFullYear() + '-' +
    String(tw.getUTCMonth()+1).padStart(2,'0') + '-' +
    String(tw.getUTCDate()).padStart(2,'0');
}

function seedFromStr(str){
  var s=0;
  for(var i=0;i<str.length;i++) s=((s<<5)-s)+str.charCodeAt(i);
  return Math.abs(s);
}

function getTodayRiddle(){
  if(_roomRiddle) return _roomRiddle;
  if(!window.ROOMS) return null;
  var room = ROOMS.find(function(r){ return r.id === ROOM_ID; });
  if(!room) return null;
  var seed = seedFromStr(todayKey()) + 199;
  _roomRiddle = room.riddles[seed % room.riddles.length];
  return _roomRiddle;
}

// ── 狀態管理 ──
function loadRoomState(){
  var def = {
    totalVisits: 0,
    care: {},
    riddleDone: {},
    furniture: [],
    completeness: 0,
    patternDone: {},
    aromaDone: {}
  };
  try{
    var raw = localStorage.getItem(ROOM_STORAGE);
    if(!raw) return def;
    return Object.assign(def, JSON.parse(raw));
  }catch(e){ return def; }
}
function saveRoomState(st){
  try{ localStorage.setItem(ROOM_STORAGE, JSON.stringify(st)); }catch(e){}
}

function getTodayCare(st){
  return st.care[todayKey()] || {};
}
function isCareDone(st, act){
  return !!(getTodayCare(st)[act]);
}
function isRiddleDone(st){
  return !!st.riddleDone[todayKey()];
}

// ── 完整度計算 ──
function calcCompleteness(st){
  var furniturePts = Math.min(45, st.furniture.length * 15);
  var careCount = Object.values(st.care).reduce(function(sum, day){
    return sum + Object.keys(day).length;
  }, 0);
  var carePts = Math.min(30, careCount * 2);
  var riddleCount = Object.keys(st.riddleDone).length;
  var riddlePts = Math.min(25, riddleCount * 3);
  return Math.min(100, furniturePts + carePts + riddlePts);
}

// ── 初始化 ──
var _state = null;
var _furnitureModeItem = null;

function init(){
  if(!window.ROOMS || !window.hlCastle){
    setTimeout(init, 200);
    return;
  }
  hlCastle.giveKey(ROOM_ID);
  _state = loadRoomState();
  _state.totalVisits = (_state.totalVisits || 0) + 1;
  saveRoomState(_state);

  renderStatus();
  renderCareSection();
  renderRiddle();
  renderLoveQuote();
  renderLovePattern();
  renderAromaState();
  renderFurnitureList();
  renderCompleteness();
  renderPlacedFurniture();
}

// ── 狀態列 ──
function renderStatus(){
  var today = getTodayCare(_state);
  var careCount = Object.keys(today).length;
  document.getElementById('care-status').textContent = careCount >= 3 ? '✓ 完成' : careCount + '/3 項';
  document.getElementById('riddle-status').textContent = isRiddleDone(_state) ? '✓ 完成' : '待完成';
  document.getElementById('visit-count').textContent = _state.totalVisits + ' 次';
  var c = calcCompleteness(_state);
  document.getElementById('comp-bar').style.width = c + '%';
  document.getElementById('comp-pct').textContent = c + '%';
}

// ── 照料區 ──
function renderCareSection(){
  ['rose','heart','letter'].forEach(function(act){
    var btn = document.getElementById('care-' + act);
    if(!btn) return;
    if(isCareDone(_state, act)){
      btn.classList.add('done');
    }
  });
}

function doCarAct(act){
  if(isCareDone(_state, act)) return;
  var today = todayKey();
  if(!_state.care[today]) _state.care[today] = {};
  _state.care[today][act] = true;
  saveRoomState(_state);

  var cfg = CARE_ACTS[act];
  if(!cfg) return;

  cfg.svgEffect();
  if(window.hlCastle) hlCastle.addPoints(cfg.pts);

  var seed = seedFromStr(todayKey() + act);
  var insight = cfg.insights[seed % cfg.insights.length];

  document.getElementById('co-icon').textContent = cfg.icon;
  document.getElementById('co-title').textContent = cfg.label + '完成';
  document.getElementById('co-pts').textContent = '+' + cfg.pts + ' 靈感';
  document.getElementById('co-insight').textContent = insight;
  document.getElementById('careOverlay').classList.add('show');

  var btn = document.getElementById('care-' + act);
  if(btn) btn.classList.add('done');
  renderStatus();
  renderCompleteness();
}

function closeCareOverlay(e){
  if(e && e.target !== document.getElementById('careOverlay') && e.type === 'click') return;
  document.getElementById('careOverlay').classList.remove('show');
}

// ── 愛的語言提示 ──
function renderLoveQuote(){
  var seed = seedFromStr(todayKey() + 'love_quote');
  var quote = LOVE_QUOTES[seed % LOVE_QUOTES.length];
  document.getElementById('loveQuoteText').textContent = quote;
}

// ── 謎語區 ──
function renderRiddle(){
  var rd = getTodayRiddle();
  var done = isRiddleDone(_state);
  var box = document.getElementById('riddle-content');
  if(!rd){ box.innerHTML = '<p style="color:var(--muted);font-size:.82rem">今日謎語載入中…</p>'; return; }

  var typeLabel = rd.type==='aroma' ? '🌿 認知芳療' : rd.type==='fuyu' ? '🌿 馥靈馥語' : '💭 覺察問答';
  var h = '<div class="riddle-type-badge">' + typeLabel + '</div>';
  h += '<div class="riddle-q">' + rd.q + '</div>';

  if(done){
    h += '<div class="insight-box show"><div class="insight-txt">✓ 今日覺察已完成。明天有新的問題等著您。</div></div>';
  } else if(rd.isAroma && rd.aromas){
    h += '<div class="aroma-grid">';
    rd.aromas.forEach(function(a,i){
      h += '<div class="aroma-card" onclick="selAroma('+i+')" id="a'+i+'">';
      h += '<span class="aroma-icon">'+a.icon+'</span>';
      h += '<div class="aroma-name">'+a.name+'</div>';
      h += '<div class="aroma-note">'+a.note+'</div>';
      h += '</div>';
    });
    h += '</div>';
    h += '<div class="insight-box" id="ins"></div>';
    h += '<button class="btn-complete" id="btnDone" disabled onclick="finishRiddle()">✦ 收下這份覺察</button>';
  } else {
    h += '<div class="riddle-opts">';
    rd.opts.forEach(function(o,i){
      h += '<div class="riddle-opt" onclick="selOpt('+i+')" id="o'+i+'">'+o.text+'</div>';
    });
    h += '</div>';
    h += '<div class="insight-box" id="ins"></div>';
    h += '<button class="btn-complete" id="btnDone" disabled onclick="finishRiddle()">✦ 收下這份覺察</button>';
  }
  box.innerHTML = h;
}

function selOpt(i){
  var rd = getTodayRiddle(); if(!rd||rd.isAroma) return;
  rd.opts.forEach(function(_,j){
    var e=document.getElementById('o'+j);
    if(e) e.className='riddle-opt'+(j===i?' sel':'');
  });
  showInsight(rd.opts[i].insight);
}
function selAroma(i){
  var rd = getTodayRiddle(); if(!rd||!rd.aromas) return;
  rd.aromas.forEach(function(_,j){
    var e=document.getElementById('a'+j);
    if(e) e.className='aroma-card'+(j===i?' sel':'');
  });
  showInsight(rd.aromas[i].insight);
}
function showInsight(t){
  var el=document.getElementById('ins');
  if(!el) return;
  el.innerHTML='<div class="insight-txt">'+t.replace(/\\n/g,'<br>').replace(/\n/g,'<br>')+'</div>';
  el.classList.add('show');
  var btn=document.getElementById('btnDone');
  if(btn) btn.disabled=false;
  el.scrollIntoView({behavior:'smooth',block:'center'});
}

function finishRiddle(){
  var insEl = document.getElementById('ins');
  var insight = insEl ? insEl.textContent : '';
  var qEl = document.querySelector('.riddle-q');
  var question = qEl ? qEl.textContent : '';
  var selEl = document.querySelector('.riddle-opt.sel, .aroma-card.sel');
  var answer = selEl ? selEl.textContent : '';

  if(window.hlCastle && hlCastle.hasKey(ROOM_ID)){
    hlCastle.completeRoom(ROOM_ID, question, answer, insight);
  }
  if(window.hlMaterial) hlMaterial.drop('castle_riddle');

  _state.riddleDone[todayKey()] = true;
  saveRoomState(_state);
  renderStatus();
  renderCompleteness();

  var btn = document.getElementById('btnDone');
  if(btn){ btn.disabled=true; btn.textContent='✓ 已收下'; }
  setTimeout(function(){ renderRiddle(); }, 800);
  setTimeout(function(){
    var nav = document.createElement('div');
    nav.style.cssText='text-align:center;margin-top:20px;padding:16px;background:rgba(192,51,77,.05);border:1px solid rgba(192,51,77,.12);border-radius:16px';
    nav.innerHTML='<div style="font-size:.88rem;color:var(--warm);margin-bottom:12px">✨ 今天的覺察完成了</div><div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap"><a href="castle-game.html" style="padding:10px 20px;background:var(--rose);color:#fff;border-radius:20px;text-decoration:none;font-size:.85rem;font-weight:600">🏰 回城堡看變化</a><button onclick="this.parentElement.parentElement.remove()" style="padding:10px 20px;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:20px;font-size:.85rem;cursor:pointer;font-family:inherit">留在這個房間</button></div>';
    var riddleBox = document.querySelector('.riddle-card');
    if(riddleBox) riddleBox.appendChild(nav);
  }, 2000);
}

// ── 關係覺察區 ──
var _patternStep = 0;
var _patternAnswers = [];

function renderLovePattern(){
  if(!_state.patternDone) _state.patternDone = {};
  if(_state.patternDone[todayKey()]){
    document.getElementById('lovePatternContent').innerHTML = '<div style="text-align:center;color:var(--muted);font-size:.82rem;padding:10px">✓ 今日的愛的模式覺察已完成。明天還有新的情境。</div>';
    [0,1,2].forEach(function(i){ var d=document.getElementById('dot'+i); if(d) d.className='love-step-dot done'; });
    return;
  }
  _patternStep = 0;
  _patternAnswers = [];
  renderPatternStep();
}

function renderPatternStep(){
  var seed = seedFromStr(todayKey() + 'pattern');
  var startIdx = seed % LOVE_PATTERNS.length;
  var pIdx = (startIdx + _patternStep) % LOVE_PATTERNS.length;
  var p = LOVE_PATTERNS[pIdx];

  [0,1,2].forEach(function(i){
    var d = document.getElementById('dot'+i);
    if(d) d.className = 'love-step-dot' + (i < _patternStep ? ' done' : (i === _patternStep ? ' active' : ''));
  });

  var h = '<div class="love-pattern-q">' + p.q + '</div>';
  h += '<div class="love-pattern-opts">';
  p.opts.forEach(function(o,i){
    h += '<div class="love-pattern-opt" onclick="selectPattern('+pIdx+','+i+')">' + o.text + '</div>';
  });
  h += '</div>';
  document.getElementById('lovePatternContent').innerHTML = h;
  document.getElementById('lovePatternResult').className = 'love-pattern-result';
  document.getElementById('lovePatternResult').innerHTML = '';
}

function selectPattern(pIdx, optIdx){
  var p = LOVE_PATTERNS[pIdx];
  var opt = p.opts[optIdx];
  _patternAnswers.push(opt.text);

  var opts = document.querySelectorAll('.love-pattern-opt');
  opts.forEach(function(el,i){ el.className = 'love-pattern-opt' + (i===optIdx?' sel':''); el.onclick = null; });

  var resultEl = document.getElementById('lovePatternResult');
  resultEl.innerHTML = opt.hint;
  resultEl.className = 'love-pattern-result show';

  _patternStep++;

  if(_patternStep < 3){
    setTimeout(function(){
      renderPatternStep();
    }, 2500);
  } else {
    _state.patternDone[todayKey()] = true;
    saveRoomState(_state);
    setTimeout(function(){
      [0,1,2].forEach(function(i){ var d=document.getElementById('dot'+i); if(d) d.className='love-step-dot done'; });
      resultEl.innerHTML = '✨ 三個情境都看完了。這不是測驗，沒有對錯。只是讓您看見自己在關係裡的慣性反應。\n\n看見了，就有機會選擇不同的回應方式。'.replace(/\n/g,'<br>');
      resultEl.className = 'love-pattern-result show';
    }, 2500);
  }
}

// ── 精油氛圍 ──
function renderAromaState(){
  if(!_state.aromaDone) _state.aromaDone = {};
  if(_state.aromaDone[todayKey()]){
    var seed = seedFromStr(todayKey() + 'aroma_atm');
    var oil = AROMA_OILS[seed % AROMA_OILS.length];
    var btn = document.getElementById('aromaBtn');
    btn.className = 'aroma-atm-btn lit';
    btn.innerHTML = oil.icon + ' 今日已點香：' + oil.name;
    btn.onclick = null;
    var r = document.getElementById('aromaResult');
    r.innerHTML = '<span class="aroma-atm-oil-name">' + oil.icon + ' ' + oil.name + '</span>' + oil.desc.replace(/\n/g,'<br>');
    r.className = 'aroma-atm-result show';
  }
}

function lightAroma(){
  var seed = seedFromStr(todayKey() + 'aroma_atm');
  var oil = AROMA_OILS[seed % AROMA_OILS.length];

  _state.aromaDone[todayKey()] = true;
  saveRoomState(_state);

  var btn = document.getElementById('aromaBtn');
  btn.className = 'aroma-atm-btn lit';
  btn.innerHTML = oil.icon + ' 今日已點香：' + oil.name;
  btn.onclick = null;

  var r = document.getElementById('aromaResult');
  r.innerHTML = '<span class="aroma-atm-oil-name">' + oil.icon + ' ' + oil.name + '</span>' + oil.desc.replace(/\n/g,'<br>');
  r.className = 'aroma-atm-result show';

  animateAromaGlow();
}

// ── 傢具系統 ──
function renderFurnitureList(){
  var container = document.getElementById('furniture-list');
  var loveFurniture = getLoveFurniture();
  var placed = _state.furniture.map(function(f){ return f.id; });

  if(!loveFurniture.length){
    container.innerHTML = '<div class="furniture-empty">還沒有適合愛之殿的傢具。<br>去材料庫合成傢具，就能放在這裡。</div>';
    return;
  }

  var html = '';
  loveFurniture.forEach(function(item){
    var isPlaced = placed.indexOf(item.id) > -1;
    html += '<div class="furniture-item' + (isPlaced?' placed':'') + '">';
    html += '<span class="furniture-item-icon">' + item.icon + '</span>';
    html += '<div class="furniture-item-info">';
    html += '<div class="furniture-item-name">' + item.name + '</div>';
    html += '<div class="furniture-item-desc">' + (item.desc||'') + '</div>';
    html += '</div>';
    if(isPlaced){
      html += '<button class="furniture-item-action btn-placed">✓ 已放入</button>';
    } else {
      html += '<button class="furniture-item-action btn-place" onclick="openFurniturePlace(\'' + item.id + '\')">放入房間</button>';
    }
    html += '</div>';
  });
  container.innerHTML = html;
}

function getLoveFurniture(){
  if(!window.hlMaterial) return [];
  var furniture = hlMaterial.getFurniture();
  var loveIds = ['love_lamp','rose_vase','heart_crystal'];
  return furniture.filter(function(f){ return loveIds.indexOf(f.id) > -1; });
}

function openFurniturePlace(itemId){
  if(!window.hlMaterial) return;
  var recipes = hlMaterial.getRecipes();
  var recipe = recipes.find(function(r){ return r.id === itemId; });
  if(!recipe) return;
  _furnitureModeItem = recipe;

  document.getElementById('fo-icon').textContent = recipe.icon;
  document.getElementById('fo-name').textContent = recipe.name;
  document.getElementById('fo-desc').textContent = '「' + (recipe.desc||'') + '」';

  var placedSlots = _state.furniture.map(function(f){ return f.slot; });
  var slotsHtml = '';
  [1,2,3].forEach(function(s){
    var occupied = placedSlots.indexOf(s) > -1;
    slotsHtml += '<button onclick="placeFurniture(\'' + itemId + '\',' + s + ')" ' +
      (occupied ? 'disabled style="opacity:.4;cursor:default"' : '') +
      ' style="width:100%;padding:10px;border-radius:10px;border:1.5px solid var(--border);' +
      'background:' + (occupied?'rgba(0,0,0,.04)':'rgba(192,51,77,.05)') + ';' +
      'color:var(--warm2);font-size:.82rem;cursor:pointer;font-family:inherit;transition:all .2s">' +
      (occupied ? '槽位 ' + s + '（已佔用）' : '放入槽位 ' + s) +
      '</button>';
  });
  document.getElementById('fo-slots').innerHTML = slotsHtml;
  document.getElementById('furnitureOverlay').classList.add('show');
}

function placeFurniture(itemId, slot){
  if(!_furnitureModeItem) return;
  _state.furniture = _state.furniture.filter(function(f){ return f.slot !== slot; });
  _state.furniture.push({
    id: itemId,
    slot: slot,
    icon: _furnitureModeItem.icon,
    name: _furnitureModeItem.name
  });
  saveRoomState(_state);
  closeFurnitureOverlay();
  renderFurnitureList();
  renderPlacedFurniture();
  renderCompleteness();
  renderStatus();
  showToast(_furnitureModeItem.icon + ' ' + _furnitureModeItem.name + ' 已放入愛之殿！');
}

function closeFurnitureOverlay(e){
  if(e && e.target !== document.getElementById('furnitureOverlay') && e.type === 'click') return;
  document.getElementById('furnitureOverlay').classList.remove('show');
  _furnitureModeItem = null;
}

function toggleFurnitureMode(){}

function clickSlot(slotNum){
  var placed = _state.furniture.find(function(f){ return f.slot === slotNum; });
  if(placed){
    showToast(placed.icon + ' ' + placed.name + ' 正放在這裡。');
    return;
  }
  showToast('這個位置還空著。去材料庫合成傢具，就能放在這裡。');
}

// ── SVG 動畫效果 ──
function animateRoseBloom(){
  var svg = document.getElementById('roomSvg');
  var g = document.createElementNS('http://www.w3.org/2000/svg','g');
  for(var i=0;i<5;i++){
    var petal = document.createElementNS('http://www.w3.org/2000/svg','circle');
    petal.setAttribute('cx', String(190 + Math.random()*40));
    petal.setAttribute('cy', String(100 + Math.random()*40));
    petal.setAttribute('r', String(2 + Math.random()*2));
    petal.setAttribute('fill','#e8a0a8');
    petal.setAttribute('opacity','0');
    petal.style.animation='petalFloat '+(3+Math.random()*2)+'s ease-in-out';
    g.appendChild(petal);
  }
  svg.appendChild(g);
  setTimeout(function(){ g.remove(); },5500);
}

function animateHeartbeat(){
  var svg = document.getElementById('roomSvg');
  var heart = svg.querySelector('path[d*="M210,48"]');
  if(heart){
    heart.style.transition='transform .3s, opacity .3s';
    heart.style.transformOrigin='210px 100px';
    heart.style.transform='scale(1.08)';
    heart.style.opacity='1';
    setTimeout(function(){
      heart.style.transform='scale(1)';
      heart.style.opacity='.7';
    }, 300);
    setTimeout(function(){
      heart.style.transform='scale(1.06)';
      setTimeout(function(){ heart.style.transform='scale(1)'; }, 300);
    }, 600);
  }
}

function animateLetterFloat(){
  var svg = document.getElementById('roomSvg');
  var letter = document.createElementNS('http://www.w3.org/2000/svg','text');
  letter.setAttribute('x','210');letter.setAttribute('y','200');
  letter.setAttribute('text-anchor','middle');
  letter.setAttribute('font-size','20');
  letter.textContent='💌';
  letter.style.transition='transform 1.5s ease, opacity 1.5s ease';
  letter.style.opacity='1';
  svg.appendChild(letter);
  setTimeout(function(){
    letter.style.transform='translateY(-40px)';
    letter.style.opacity='0';
  },100);
  setTimeout(function(){ letter.remove(); },1700);
}

function animateAromaGlow(){
  var svg = document.getElementById('roomSvg');
  var glow = document.createElementNS('http://www.w3.org/2000/svg','rect');
  glow.setAttribute('x','0');glow.setAttribute('y','0');
  glow.setAttribute('width','420');glow.setAttribute('height','280');
  glow.setAttribute('fill','rgba(240,192,190,.06)');
  glow.style.transition='opacity 2s';glow.style.opacity='1';
  svg.appendChild(glow);
  setTimeout(function(){ glow.style.opacity='0'; setTimeout(function(){ glow.remove(); },2000); },200);
}

// ── 已放置傢具顯示在 SVG ──
function renderPlacedFurniture(){
  _state.furniture.forEach(function(f){
    var iconEl = document.getElementById('slot' + f.slot + '-icon');
    var emptyEls = document.querySelectorAll('#slot' + f.slot + ' .slot-empty');
    if(iconEl){
      iconEl.textContent = f.icon;
      iconEl.style.display = '';
    }
    emptyEls.forEach(function(e){ e.style.display='none'; });
    var slotEl = document.getElementById('slot' + f.slot);
    if(slotEl) slotEl.classList.add('occupied');
  });
}

// ── 城堡完整度 ──
function renderCompleteness(){
  var c = calcCompleteness(_state);
  var sub = c >= 100 ? '🎉 愛之殿已完整！' :
            c >= 60  ? '繼續探索，越來越完整了' :
            c >= 30  ? '每天回來，完整度慢慢上升' :
                       '放置傢具，提升完整度';
  document.getElementById('total-pct').textContent = c + '%';
  document.getElementById('total-prog').style.width = c + '%';
  document.getElementById('total-sub').textContent = sub;
  document.getElementById('comp-bar').style.width = c + '%';
  document.getElementById('comp-pct').textContent = c + '%';
}

// ── Toast ──
var _toastTimeout = null;
function showToast(msg){
  var t = document.getElementById('hlToast');
  if(!t){
    t = document.createElement('div');
    t.id = 'hlToast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);' +
      'background:rgba(62,42,42,.97);color:#f0c0be;padding:10px 20px;' +
      'border-radius:12px;font-size:.82rem;z-index:9999;' +
      'border:1px solid rgba(192,51,77,.35);pointer-events:none;' +
      'opacity:0;transition:all .3s;white-space:nowrap;max-width:88vw;text-align:center;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1'; t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(_toastTimeout);
  _toastTimeout = setTimeout(function(){
    t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(12px)';
  }, 2600);
}

// ── 日記系統 ──
function saveDiary(text){
  try{
    var diary = JSON.parse(localStorage.getItem(DIARY_STORAGE) || '{}');
    diary[todayKey()] = text;
    localStorage.setItem(DIARY_STORAGE, JSON.stringify(diary));
  }catch(e){}
}
function loadDiary(){
  try{
    var diary = JSON.parse(localStorage.getItem(DIARY_STORAGE) || '{}');
    return diary[todayKey()] || '';
  }catch(e){ return ''; }
}

// ── 啟動 ──
document.addEventListener('DOMContentLoaded', function(){
  var tries = 0;
  var check = setInterval(function(){
    tries++;
    if((window.ROOMS && window.hlCastle) || tries > 25){
      clearInterval(check);
      init();
    }
  }, 150);
});
</script>
