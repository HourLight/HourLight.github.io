<script>
var TYPES={
rational:{name:'超級理性腦',icon:'📐',cl:'#00B4D8',sub:'數據是你的母語，分析是你的本能',
desc:'你的大腦是一台高精度的分析機器，帶著一股清涼的薄荷調。看到任何事情，你的第一反應是「拆解它」——為什麼？怎麼發生的？有沒有數據支持？你不太相信「感覺」，因為感覺不能量化。你做決定的速度可能不是最快的，但做出的決定通常很少後悔，因為每一步都是算過的。你的人際關係裡偶爾會遇到挑戰，有些人覺得你「太冷」或「不夠浪漫」，但其實你的關心方式就是幫對方把問題分析清楚。朋友崩潰的時候你會說「先別哭，我幫你列一下利弊」，然後他們會先翻你白眼，最後又承認你說得對。你最大的超能力是在混亂中找到邏輯；最大的盲點是——有些事不需要邏輯，需要的是被看見。',
oil:'🌿 迷迭香（CT 桉油醇）：滴 2 滴在掌心搓熱嗅吸，思緒更清晰、邏輯更犀利，像給大腦裝了 SSD。\n🌿 薄荷：會議前滴 1 滴在太陽穴，專注力加倍，別人還在暖機你已經完成分析。\n🌿 薰衣草：睡前擴香 3 滴，讓理性腦偶爾關機。你值得不用思考的八小時。',
awareness:'你的覺察練習：每天找一件事，刻意用「感覺」而不是「分析」去回應。比如朋友說「今天好累」，試著先說「辛苦了」而不是「你的時間管理可以優化」。你會發現，有時候一句廢話比一份分析報告更有力量。',
share:'📐 我是超級理性腦！數據是我的母語，感性是我的外語。朋友崩潰時我會說「先別哭，幫你列利弊」。你呢？'},
creative:{name:'創意煉金師',icon:'🎨',cl:'#FF6B6B',sub:'腦袋裡住著一座遊樂園，靈感是門票',
desc:'你的大腦不走直線，它走的是蜿蜒的、充滿彩色泡泡的曲線，空氣裡飄著佛手柑的甜。別人在想 A 的時候，你已經跳到 Z 了，而且那個 Z 居然還挺有道理的。你有一種天生的能力：把不相關的東西連結在一起，創造出全新的東西。開會的時候你是那個丟出「欸，如果反過來做呢？」的人，大家先愣住，然後五分鐘後說「等等，好像真的可以」。你的挑戰是執行力——你的點子多到用不完，但真正做到底的可能只有十分之一。不是你不認真，是你的大腦太容易被新的靈感吸引走了。就像一個永遠走不到結帳的人，因為每條走道都有新東西。學會在創意和執行之間找到平衡，你就是無敵的。',
oil:'🌿 佛手柑：早晨擴香 3 滴，創意更自由、框架自動碎裂。靈感像佛手柑的皮一樣，輕輕一壓就噴發。\n🌿 天竺葵：工作時滴 2 滴在手腕，想像力跟執行力找到甜蜜平衡點。\n🌿 廣藿香：收工前嗅吸，把今天最好的靈感錨定到現實——真的做出來，而不只是想出來。',
awareness:'你的覺察練習：每週選一個點子，不管它「完不完美」，先花 30 分鐘動手做。創意不是想出來的，是做出來的。你最大的敵人不是沒靈感，是太多靈感讓你選擇障礙。先完成，再完美。',
share:'🎨 我是創意煉金師！腦袋裡住著遊樂園，點子多到用不完。問題是我永遠走不到結帳，因為每條走道都有新東西。你呢？'},
balanced:{name:'全腦指揮官',icon:'🌐',cl:'#6C5CE7',sub:'左右開弓的全能選手，什麼場都接得住',
desc:'你的大腦像一台自動切換的雙系統電腦，帶著甜橙的圓融香調。需要分析的時候可以很理性，需要創意的時候也能天馬行空。你是天生的翻譯者——理性派說的你懂，感性派說的你也懂，而且你能把兩邊的話翻譯給對方聽。團隊裡有你，吵架的機率少一半。你最強的地方是「適應力」：不管在什麼場合、面對什麼類型的人，你都能找到合適的頻道。你的挑戰是——太會切換了，有時候不確定「真正的自己」偏好哪邊。你可能需要的不是更多能力，而是更清楚的自我認識。你到底享受分析，還是享受創造？答案可能是都享受，但你要允許自己承認：「我就是比較貪心，兩邊都要。」',
oil:'🌿 甜橙：隨時嗅吸，整合的愉悅感讓左右腦和諧運作，像一顆小太陽住在你的嗅覺裡。\n🌿 依蘭依蘭：靜心時滴 2 滴在心口，找到你真正的核心偏好。不是「都可以」，是「你最想要什麼」。\n🌿 檸檬草：猶豫不決時嗅吸，清晰自我認知、不再當牆頭草。選了就走，走了就不回頭。',
awareness:'你的覺察練習：這週做三個小決定的時候，注意自己第一個冒出來的是「想法」還是「感覺」。不是兩個都注意，是注意哪個先來。那個先來的，就是你的核心模式。允許自己有偏好，不代表失去平衡。',
share:'🌐 我是全腦指揮官！左右開弓，理性派和感性派的話我都聽得懂。團隊有我，吵架的機率少一半。你呢？'},
intuitive:{name:'直覺導航員',icon:'🔮',cl:'#A29BFE',sub:'你的第六感比 GPS 還準，常常跳過過程直達答案',
desc:'你的大腦有一個別人沒有的雷達：直覺。帶著快樂鼠尾草那種朦朧卻精準的氣息，你常常「就是知道」某件事會怎麼發展，說不出邏輯但結果是對的。你讀人也很準——有些人你第一眼就知道「不太對」，後來果然被你說中。你的直覺不是玄學，是你的大腦在無意識中處理了大量的微表情、語調、肢體語言等資訊，只是結論直接跳出來了，過程你沒有察覺而已。你最大的挑戰是「說服別人」——在會議室裡說「我就是覺得不對」通常不太有說服力。老闆要的是數據，不是你的第六感。但你私底下知道，那些讓你「不對勁」的感覺，準確率高得可怕。學會把直覺翻譯成邏輯和數據，你的洞察力就是真正的超能力。',
oil:'🌿 快樂鼠尾草：睡前擴香 2 滴，直覺的頻道打得更開、第六感更清晰。夢裡可能會收到訊號。\n🌿 檀香：冥想時滴在眉心，深層感知力啟動，連結那個「你就是知道」的內在。\n🌿 月桂：需要開口的時候嗅吸，自信表達、把直覺翻譯成別人聽得懂的語言。',
awareness:'你的覺察練習：每天記錄一次你的「直覺閃過」——那個第一秒冒出的念頭是什麼？一週後回頭看，你會發現它的命中率。同時練習用一句話解釋你的直覺：「我覺得這個方案有風險，因為___。」因為後面的空格，就是你直覺的翻譯。',
share:'🔮 我是直覺導航員！第六感比 GPS 還準，常常說不出為什麼但結果都是對的。老闆要數據，我只有第六感，但第六感的準確率高得可怕。你呢？'},
logic:{name:'邏輯建築師',icon:'🏗️',cl:'#1A3A5C',sub:'腦袋裡有一座藍圖，複雜的事都能拆成清楚的步驟',
desc:'你是系統思考者，帶著迷迭香的清澈與雪松的穩重。看到一個問題，你不只看到問題本身，你看到整個系統——它的結構、它的因果關係、它的漏洞在哪裡。你很擅長「搭框架」：不管是企劃案、流程設計還是規劃旅行，你都能把複雜的事情拆成清楚的步驟，而且步驟之間還有邏輯關係。你的大腦像是一位建築師，先畫藍圖再動工。同事丟給你一堆亂七八糟的需求，你能在十分鐘內整理成一張流程圖。你的挑戰是——有時候藍圖太完美了，導致遲遲不敢開工。你在等「所有條件都到位」的那一刻，但那一刻可能永遠不會來。完美的計畫不如先開始的勇氣。有時候先蓋再說，邊蓋邊改，效率反而更高。',
oil:'🌿 迷迭香：工作前嗅吸，系統思考更犀利、全局觀更清晰。你的腦內流程圖解析度直接升到 4K。\n🌿 雪松：執行階段滴 2 滴在掌心，穩定的力量從想法推進到行動，不再只是漂亮的藍圖。\n🌿 黑胡椒：拖延的時候嗅吸一下——行動力點火。別再等了，先開始，完美可以路上修。',
awareness:'你的覺察練習：下次做計畫的時候，刻意把「開始執行」設在計畫完成度 70% 的時候，而不是 100%。留 30% 給「邊做邊調整」。你會發現，那 30% 的空隙反而讓成果更好，因為現實會教你藍圖裡看不到的東西。',
share:'🏗️ 我是邏輯建築師！腦袋裡有一座藍圖，同事丟亂七八糟的需求，我十分鐘整理成流程圖。唯一的問題是藍圖太完美，永遠在等「準備好」的那天。你是哪款？'},
artistic:{name:'感性詩人',icon:'🦋',cl:'#E58E26',sub:'你用五感理解世界，別人看數據你看光影',
desc:'你的大腦不是用「想」的，是用「感覺」的，飄著依蘭依蘭和茉莉交織的花香。你走進一個空間，第一個注意到的是光線、氣味、溫度、氛圍——不是「這裡有幾張桌子」而是「這裡讓我想起小時候外婆家的下午」。你讀一段文字，先感受到的是情緒而不是資訊。你聽音樂的時候整個人會被帶走，看一部好電影會哭到不行。你的感知力是你最大的天賦——你能察覺到別人忽略的細節：一朵花瓣邊緣微微泛紅的層次、一個人笑的時候眼睛裡那一閃而過的疲倦。你的挑戰是——這個世界大部分是為「理性腦」設計的，你有時候會覺得自己格格不入。會議上大家在討論 KPI，你在想「這個辦公室的光線讓人好壓抑」。但請記得：那些最動人的作品、最深刻的連結，都來自你這種大腦。',
oil:'🌿 依蘭依蘭：隨時嗅吸，感知力的花朵綻放、五感更敏銳。世界在你的鼻尖變成一首詩。\n🌿 茉莉：創作前滴在手腕，美感的流動被啟動，把內心的感受變成別人看得見的表達。\n🌿 乳香：感覺太滿的時候，滴 2 滴在掌心深呼吸。接地、在感知的海洋裡找到錨。不是麻痹感覺，是讓感覺有著陸的地方。',
awareness:'你的覺察練習：當你因為「太敏感」而疲倦的時候，不要怪自己。那不是脆弱，是天線太強。你需要的不是關掉天線，而是學會調頻——不是所有訊號都需要接收。每天花五分鐘安靜嗅聞一支精油，專注在這一個氣味上，就是最好的調頻練習。'}
};
var QUESTIONS=[
