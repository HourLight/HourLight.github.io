<script>
/* ═══════════════════════════════════════
   合盤配對引擎
   馥靈之鑰 Hour Light © 2026
   六維度：生命靈數×日柱相性×九星×色彩×元素×節奏
   ═══════════════════════════════════════ */

// ── 生命靈數 ──
function lifePath(y,m,d){
  var s=String(y)+String(m)+String(d);
  var sum=0;
  for(var i=0;i<s.length;i++) sum+=parseInt(s[i]);
  while(sum>9&&sum!==11&&sum!==22&&sum!==33) sum=Math.floor(sum/10)+sum%10;
  return sum;
}

// ── 日柱天干（簡化：用萬年曆公式）──
function dayGan(y,m,d){
  // 蔡勒公式變體求日干支序號
  if(m<=2){y--;m+=12;}
  var C=Math.floor(y/100),Y2=y%100;
  var g=4*C+Math.floor(C/4)+5*Y2+Math.floor(Y2/4)+Math.floor(3*(m+1)/5)+d-3;
  return ((g%10)+10)%10; // 0=甲 1=乙 ... 9=癸
}
function dayZhi(y,m,d){
  if(m<=2){y--;m+=12;}
  var C=Math.floor(y/100),Y2=y%100;
  var z=8*C+Math.floor(C/4)+5*Y2+Math.floor(Y2/4)+Math.floor(3*(m+1)/5)+d+7+1;
  return ((z%12)+12)%12;
}

var TG='甲乙丙丁戊己庚辛壬癸';
var DZ='子丑寅卯辰巳午未申酉戌亥';
var WX_TG=['木','木','火','火','土','土','金','金','水','水'];

// ── 九星（年星）──
function nineStarYear(y){
  // 男：11-年份數字和，立春前用前一年
  var s=String(y);var sum=0;for(var i=0;i<s.length;i++)sum+=parseInt(s[i]);
  while(sum>9)sum=Math.floor(sum/10)+sum%10;
  var star=(11-sum);
  while(star>9)star-=9;
  if(star<=0)star+=9;
  return star;
}
var STAR_NAMES=['','一白水星','二黑土星','三碧木星','四綠木星','五黃土星','六白金星','七赤金星','八白土星','九紫火星'];

// ── 色彩能量（簡化）──
function colorNum(y,m,d){
  var lp=lifePath(y,m,d);
  return lp>9?Math.floor(lp/10)+lp%10:lp;
}
var COLORS=['','紅','橙','黃','綠','藍','靛','紫','金','白'];
var COLOR_HEX=['','#d4694a','#e8a04a','#f8dfa5','#5a9e7a','#6b8fbd','#5c5c9e','#9c6edb','#ecd098','#ffffff'];

// ── 元素 ──
function element(y,m,d){
  var g=dayGan(y,m,d);
  return WX_TG[g];
}

// ══════ 配對算法 ══════

function compatLP(a,b){
  // 生命靈數相容性
  var compat = {
    '1-1':65,'1-2':70,'1-3':85,'1-4':60,'1-5':90,'1-6':55,'1-7':80,'1-8':75,'1-9':85,
    '2-2':70,'2-3':55,'2-4':80,'2-5':60,'2-6':90,'2-7':65,'2-8':85,'2-9':75,
    '3-3':70,'3-4':55,'3-5':85,'3-6':75,'3-7':60,'3-8':65,'3-9':90,
    '4-4':70,'4-5':60,'4-6':85,'4-7':75,'4-8':80,'4-9':55,
    '5-5':70,'5-6':65,'5-7':85,'5-8':60,'5-9':80,
    '6-6':70,'6-7':55,'6-8':75,'6-9':85,
    '7-7':70,'7-8':60,'7-9':65,
    '8-8':70,'8-9':80,
    '9-9':75
  };
  var key=Math.min(a,b)+'-'+Math.max(a,b);
  return compat[key]||70;
}

function compatWX(a,b){
  // 五行相生相剋
  if(a===b) return 80; // 比和
  var sheng={'木':'火','火':'土','土':'金','金':'水','水':'木'};
  var ke={'木':'土','土':'水','水':'火','火':'金','金':'木'};
  if(sheng[a]===b||sheng[b]===a) return 90; // 相生
  if(ke[a]===b||ke[b]===a) return 50; // 相剋
  return 70;
}

function compatStar(a,b){
  // 九星相性（同組高、剋組低）
  var diff=Math.abs(a-b);
  if(diff===0) return 85;
  if(diff<=2) return 80;
  if(diff>=6) return 65;
  return 70;
}

// ══════ 主計算 ══════

function calculate(){
  var n1=document.getElementById('name1').value||'A';
  var n2=document.getElementById('name2').value||'B';
  var d1=document.getElementById('date1').value;
  var d2=document.getElementById('date2').value;
  if(!d1||!d2){alert('請輸入兩個人的生日');return}

  var p1=d1.split('-').map(Number), p2=d2.split('-').map(Number);
  var y1=p1[0],m1=p1[1],d1v=p1[2], y2=p2[0],m2=p2[1],d2v=p2[2];

  // 計算各維度
  var lp1=lifePath(y1,m1,d1v), lp2=lifePath(y2,m2,d2v);
  var wx1=element(y1,m1,d1v), wx2=element(y2,m2,d2v);
  var dg1=dayGan(y1,m1,d1v), dg2=dayGan(y2,m2,d2v);
  var st1=nineStarYear(y1), st2=nineStarYear(y2);
  var c1=colorNum(y1,m1,d1v), c2=colorNum(y2,m2,d2v);

  // 節奏差（生命靈數差距反映節奏差異）
  var rhythmDiff=Math.abs(lp1-lp2);
  var rhythmScore=100-rhythmDiff*8;if(rhythmScore<40)rhythmScore=40;

  // 六維度得分
  var dims=[
    {name:'生命靈數',score:compatLP(lp1>9?lp1%10||1:lp1, lp2>9?lp2%10||1:lp2),color:'var(--gold)'},
    {name:'五行相性',score:compatWX(wx1,wx2),color:'var(--gold)'},
    {name:'日柱共振',score:dg1===dg2?90:Math.abs(dg1-dg2)<=2?80:dg1%2===dg2%2?75:60,color:'var(--gold)'},
    {name:'九星磁場',score:compatStar(st1,st2),color:'var(--gold)'},
    {name:'色彩共振',score:c1===c2?90:Math.abs(c1-c2)<=1?85:Math.abs(c1-c2)<=3?70:55,color:'var(--gold)'},
    {name:'節奏同步',score:rhythmScore,color:'var(--gold)'}
  ];

  // 總分
  var total=Math.round(dims.reduce(function(s,d){return s+d.score;},0)/dims.length);

  var r={
    n1:n1,n2:n2,d1:d1,d2:d2,
    lp1:lp1,lp2:lp2,wx1:wx1,wx2:wx2,
    dg1:TG[dg1],dg2:TG[dg2],dz1:DZ[dayZhi(y1,m1,d1v)],dz2:DZ[dayZhi(y2,m2,d2v)],
    st1:st1,st2:st2,c1:c1,c2:c2,
    dims:dims,total:total
  };

  renderAll(r);
  document.getElementById('result').style.display='block';
  document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'});
  if(window.HLFX) HLFX.particles({color:'rgba(240,181,179,0.4)',count:30,spread:'float',duration:3000});
  window._pairResult=r;
}

// ══════ 渲染 ══════

function renderAll(r){
  // Hero
  var word='';
  if(r.total>=85) word='你們之間有一種不需要解釋的懂。';
  else if(r.total>=75) word='不完美，但互補。差異是你們最好的禮物。';
  else if(r.total>=65) word='需要多一點理解，但值得。';
  else word='挑戰很大，但成長也最大。';

  document.getElementById('heroSection').innerHTML=
    '<div class="pair-hero">'
    +'<div class="ph-label">'+r.n1+' × '+r.n2+'</div>'
    +'<div class="ph-score">'+r.total+'</div>'
    +'<div class="ph-label">COMPATIBILITY</div>'
    +'<div class="ph-word">'+word+'</div></div>';

  // 維度條
  var dh='';
  r.dims.forEach(function(d,i){
    dh+='<div class="dim-row" style="opacity:0;transform:translateX(-10px);transition:all .5s ease '+(i*150)+'ms">'
      +'<div class="dim-label">'+d.name+'</div>'
      +'<div class="dim-bar-wrap"><div class="dim-bar" style="width:0;background:linear-gradient(90deg,rgba(240,181,179,.6),rgba(92,58,99,.6))"></div></div>'
      +'<div class="dim-pct">'+d.score+'</div></div>';
  });
  document.getElementById('dimsGrid').innerHTML=dh;
  // Animate bars
  setTimeout(function(){
    document.querySelectorAll('.dim-row').forEach(function(el,i){
      el.style.opacity='1';el.style.transform='translateX(0)';
    });
    document.querySelectorAll('.dim-bar').forEach(function(bar,i){
      bar.style.width=r.dims[i].score+'%';
    });
  },300);

  // VS 對照
  var vsData=[
    {a:r.lp1,b:r.lp2,l:'生命靈數'},
    {a:r.dg1+r.dz1,b:r.dg2+r.dz2,l:'日柱'},
    {a:r.wx1,b:r.wx2,l:'五行'},
    {a:STAR_NAMES[r.st1],b:STAR_NAMES[r.st2],l:'九星'},
    {a:COLORS[r.c1]||'白',b:COLORS[r.c2]||'白',l:'色彩'}
  ];
  var vh='';
  vsData.forEach(function(v){
    vh+='<div class="vs-grid">'
      +'<div class="vs-card"><div class="vc-val">'+v.a+'</div><div class="vc-label">'+r.n1+'</div></div>'
      +'<div class="vs-mid">'+v.l+'</div>'
      +'<div class="vs-card"><div class="vc-val">'+v.b+'</div><div class="vc-label">'+r.n2+'</div></div>'
      +'</div>';
  });
  document.getElementById('vsGrid').innerHTML=vh;

  // 解讀
  var text='';
  var wxRel=r.wx1===r.wx2?'比和':compatWX(r.wx1,r.wx2)>=90?'相生':'有張力';
  text+='<strong>'+r.n1+'</strong> 的生命靈數是 '+r.lp1+'，<strong>'+r.n2+'</strong> 是 '+r.lp2+'。';
  if(r.lp1===r.lp2) text+='同步。你們用相似的節奏在感知世界，默契天生就有｜但也容易陷入同樣的盲區。';
  else if(Math.abs(r.lp1-r.lp2)<=2) text+='節奏相近。你們的節奏不完全一樣，但能互相跟上。差異剛好是調味料，不是障礙。';
  else text+='節奏差距明顯。一個快一個慢、一個深一個廣｜這不是問題，是互補的起點。但你們需要更多耐心去「翻譯」對方的語言。';
  text+='<br><br>';
  text+='五行上，'+r.n1+' 是 '+r.wx1+'，'+r.n2+' 是 '+r.wx2+'｜'+wxRel+'的關係。';
  if(wxRel==='相生') text+='一個人自然地在滋養另一個人。注意不要只有單向的給予。';
  else if(wxRel==='比和') text+='同類相聚。力量加倍，但盲點也加倍。';
  else text+='這股張力不是壞事｜它讓你們不會太舒服、太懶惰。是磨刀石，不是絆腳石。';
  document.getElementById('interpText').innerHTML=text;

  // 香氣著陸
  var oilPairs={'木木':'兩瓶迷迭香面對面。太衝了。加一瓶薰衣草在中間。',
    '木火':'迷迭香點燃甜橙。相生，但別讓火燒太旺。',
    '木土':'迷迭香遇見岩蘭草。一個往上一個往下，中間那段才是你們的交集。',
    '木金':'迷迭香碰到茶樹。清冽撞清冽｜很乾淨，但少了一點溫度。加依蘭。',
    '木水':'迷迭香和薰衣草。一個清醒一個安定。你們是彼此最好的平衡。',
    '火火':'兩顆甜橙。整個房間都是陽光味。很暖，但記得開窗｜不然會悶。',
    '火土':'甜橙和岩蘭草。一個在天上一個在地下。你們需要的是中間那層｜佛手柑。',
    '火金':'甜橙遇到茶樹。明亮碰上銳利。可以很好，也可以很傷。用雪松緩衝。',
    '火水':'甜橙和薰衣草。白天和黑夜。你們輪流照顧對方｜一個亮的時候另一個休息。',
    '土土':'兩瓶岩蘭草。穩到不行。但也可能悶到不行。需要薄荷的透氣感。',
    '土金':'岩蘭草和茶樹。沉穩遇上果斷。很好的搭配，但別忘了柔軟｜加玫瑰。',
    '土水':'岩蘭草和薰衣草。大地和流水。最古老的搭配。根深水長。',
    '金金':'兩瓶茶樹。清澈但冷。需要依蘭的甜把溫度帶回來。',
    '金水':'茶樹和薰衣草。一把刀和一條河。銳利被柔軟包裹。很美的組合。',
    '水水':'兩瓶薰衣草。安靜到極致。太沉了｜需要甜橙把你們拉回地面上的陽光裡。'
  };
  var wxKey=[r.wx1,r.wx2].sort().join('');
  var aromaText=oilPairs[wxKey]||'你們的能量組合像一首還沒有人寫過的配方。把兩個人各自的香氣放在擴香石上，聞一聞｜你的鼻子比任何配對系統都準。';

  document.getElementById('aromaArea').innerHTML=
    '<div class="al-label">🌿 馥靈香氣著陸 · '+r.wx1+'×'+r.wx2+'</div>'
    +'<div class="al-text">'+aromaText+'</div>';

  // 轉化橋
  if(window.HLBridge) HLBridge.inject('bridgeArea','calc','medium');
}

function copyText(t,l){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(function(){showToast(l+' 已複製！')}).catch(function(){fbCopy(t,l)})}else{fbCopy(t,l)}}
function fbCopy(t,l){var a=document.createElement('textarea');a.value=t;a.style.cssText='position:fixed;left:-9999px';document.body.appendChild(a);a.select();try{document.execCommand('copy');showToast(l+' 已複製！')}catch(e){alert('複製失敗')}document.body.removeChild(a)}
function showToast(m){var t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:rgba(233,194,125,.95);color: #ffffff;padding:12px 24px;border-radius:999px;font-size:.95rem;z-index:9999;transition:.3s;pointer-events:none;font-family:inherit';document.body.appendChild(t)}t.textContent=m;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';setTimeout(function(){t.style.opacity='0';t.style.transform='translateX(-50%) translateY(20px)'},2200)}
</script>
