    desc:'你的內在小孩停在三歲，不是因為你幼稚，是因為你保留了大部分人長大之後丟掉的東西：對世界毫無保留的好奇心。你會因為一朵路邊的花蹲下來看三分鐘，會因為一個新的概念興奮到睡不著，會問別人覺得「太基本了吧」的問題。你不太在意自己看起來聰不聰明，你在意的是「有不有趣」。',

    desc:'你的內在小孩停在五歲，那個年紀的你發現了一件很重要的事：做某些事情的時候，大人會笑、會拍手、會說你好棒。於是你學會了「表演」。這個表演不一定是在舞台上，可能是讓全桌的人笑、可能是永遠是最會帶氣氛的那個人、可能是把每一次發言都變成一場小表演。你很有魅力，真的，但你自己可能分不清楚：你的魅力是「你本來就閃」，還是「你很害怕不閃的時候沒人看你」。',

    desc:'你的內在小孩停在十歲，但說實話他可能比大部分大人都「大人」。你很早就學會看大人的臉色、猜大人的需求、不添麻煩。你可能在家裡是那個「不用操心的孩子」，在學校是「老師可以放心的學生」，在朋友圈是「最可靠的那個人」。你被信任，你被依賴，你從來不讓人失望。但十歲的你心裡有一句一直沒說出口的話：「我也想當小孩。」',
    detail:'在家庭系統理論裡，這叫「親職化小孩」，也就是孩子承擔了父母的情緒照顧功能。你太早就學會照顧別人了，以至於你忘了自己也需要被照顧。你的「成熟」不是天生的，是被訓練出來的。\n\n小大人的風險是：你可能從來沒有經歷過完整的童年。你跳過了那些「不懂事、不負責、耍賴皮」的階段，直接變成了一個可靠的大人。但那些被跳過的東西不會消失，它們會在某個你壓力最大的時刻突然跑出來。比如你突然很想逃、很想一個人、很想什麼都不管。那不是你脆弱，是十歲的你在說「我好累」。\n\n覺察練習：這週找一件事「讓別人照顧你」。可以是讓朋友幫你點餐、讓同事幫你處理一件小事、讓另一半替你做決定。練習「不靠自己也可以」的感覺。讓十歲的小大人也當一次小孩。',
    oil:'玫瑰草 2 滴＋甜橙 2 滴＋檀香 1 滴，在需要放下責任的時候擴香。玫瑰草讓你的心輪回到「接收」模式（不是永遠在「給」的模式），甜橙是童年的味道，檀香讓你的肩膀不再扛著全世界。',
    med:'閉上眼睛。想像十歲的你坐在一張大人的椅子上，腳懸在空中踢不到地。他很認真地在做什麼事情。吸氣四秒，看著他。吐氣六秒。大人的你走過去說：「你可以下來了。」吸氣四秒，把十歲的你從椅子上抱下來。吐氣六秒。讓他站在地上，腳踩著地面。吸氣四秒，對他說：「去玩吧。今天的事情我來就好。」吐氣六秒。重複三次。張開眼睛。',
    quote:'你照顧全世界好久了。現在換你被照顧一下。十歲的你，可以放假了。'},
  rebel:{name:'12歲的叛逆期',icon:'🔥',sub:'你心裡住著一個「都不對」的小孩',
    keys:['憤怒底層','反權威','渴望尊重'],
    desc:'你的內在小孩停在十二歲，那個開始覺得「大人說的不一定對」的年紀。你有很多憤怒。不一定是對誰，有時候是對這個世界、對規則、對那些「不公平」的事情。你可能是人群裡最敢說真話的人，也可能是最容易翻白眼的人。你的叛逆不是為了搗亂，是因為你心裡有一把很清楚的尺，量出了太多不合理。',
    detail:'十二歲前後是「青春期前期」，自我意識開始爆發式成長。如果這個階段的你感覺到「我的聲音不被聽見」「我的感覺不被重視」，那份憤怒就會留在你體內，變成你長大後的底色。你的叛逆不是沒長大，是你心裡那個十二歲的孩子還在為自己的存在抗爭。\n\n叛逆期的風險是：你可能把「反對」當成了「自我」。你習慣用「我不要」來定義自己，但你真正想要什麼呢？如果把所有你反對的東西都拿掉，剩下的那個你，是什麼樣子的？叛逆是一扇門的這邊，穿過去之後，你需要找到自己要建造什麼。\n\n覺察練習：今天遇到一件讓你想翻白眼的事情，在翻之前暫停三秒。問自己：「我生氣的真正原因是什麼？是這件事本身，還是這件事觸碰了我一個更深的傷？」叛逆是表面，底下那個被忽略、被否定的感覺才是關鍵。',
    oil:'尤加利 2 滴＋薄荷 1 滴＋雪松 2 滴，在感覺怒氣上升的時候擴香。尤加利打開你的呼吸通道（怒氣會讓你憋住），薄荷讓你的頭腦在情緒風暴裡保持清醒，雪松把你的根紮穩，不被自己的火燒掉。',
    med:'閉上眼睛。想像十二歲的你站在一面牆前面，拳頭握緊，很想打。吸氣四秒，看著他。吐氣六秒。走過去站在他旁邊。不阻止他，只是站著。吸氣四秒，問他：「你在氣什麼？」吐氣六秒。讓答案浮現。可能是一張臉、一句話、一個畫面。吸氣四秒，對他說：「我知道了。你有權利生氣。」吐氣六秒。重複三次。最後對他說：「我們不用再打牆壁了。牆壁後面沒有答案，答案在你手裡。」張開眼睛。',
    quote:'你的怒氣底下有一個很重要的東西。拆開來看看，那是你最在乎的事。'},
  glass:{name:'15歲的玻璃心',icon:'💧',sub:'你心裡住著一個隨時可能碎掉的小孩',
    keys:['敏感易碎','害怕被拒絕','情緒放大'],
    desc:'你的內在小孩停在十五歲，那個全世界最敏感的年紀。別人的一個眼神、一句話、一個已讀不回，都可能在你心裡翻起巨浪。你的感受器像調到了最大音量的收音機，所有的訊號都收得到，而且每一個都很大聲。你可能經常覺得「為什麼只有我這麼在意」，是的，因為你的敏感度確實比一般人高。',
    detail:'十五歲前後是大腦杏仁核最活躍的時期，情緒處理系統全速運轉，但前額葉（負責理性調節）還沒發育完全。如果那個階段你經歷了被排擠、被否定、被忽略，那份「碎掉」的感覺會刻進你的神經迴路。你不是脆弱，你的感受器就是比較精密。\n\n玻璃心的風險是：你可能花了太多力氣在「保護自己不要碎」，以至於你不敢靠近任何可能傷害你的東西。包括很好的機會、很好的人、很好的經驗。你的防線太前面了，連好東西都進不來。\n\n覺察練習：今天讓自己做一件「可能會被拒絕」的小事。邀請一個人吃飯、報名一個你不確定會不會被錄取的活動、說一個你平常不敢說的意見。如果被拒絕了，允許自己痛三分鐘，然後站起來。你會發現，碎了之後是可以再拼回來的，而且拼回來的你比之前更完整。',
    oil:'薰衣草 2 滴＋佛手柑 2 滴＋檀香 1 滴，在感覺要碎的時候滴在手帕上深吸三次。薰衣草接住你的杏仁核（讓它不要一直發警報），佛手柑把焦慮的音量轉小，檀香像一雙溫暖的手捧著你說：「碎了也沒關係，我在。」',
    med:'閉上眼睛。把雙手捧在胸口前面，像捧著一個很小、很輕、隨時會碎的東西。那是十五歲的你的心。吸氣四秒，感覺它在你手裡。吐氣六秒。很輕很輕地。重複三次。第四次的時候，想像你把那顆心放回自己的胸口裡。吸氣四秒，感覺它在胸口的溫度。吐氣六秒，說：「你不會碎。就算碎了，我會把你拼回來。」重複三次。感覺胸口慢慢變暖。張開眼睛。',
    quote:'你的敏感是天賦，不是缺陷。碎了可以重組，而且重組後的你更完整。'},
  prince:{name:'永遠的小王子/公主',icon:'👑',sub:'你心裡住著一個拒絕長大的小孩',
    keys:['童心未泯','任性天真','活在自己的星球'],
    desc:'你的內在小孩沒有停在某個年紀，因為他根本不打算長大。你保留了完整的童真，看世界的方式跟大部分大人不一樣。你覺得花是活的、玩具有靈魂、星星可以許願、愛情應該像童話一樣。你周圍的人可能覺得你「太天真」「不切實際」「該長大了」。但你知道，大人們丟掉的那些東西裡面，有些是最珍貴的。',
    detail:'小王子型在心理學裡接近「永恆少年（puer aeternus）」原型。你不是不懂現實，你是選擇用另一種方式跟現實相處。你的想像力、創造力、對美和愛的堅持，是很多「成熟的大人」拼命想找回來的東西。\n\n小王子的風險是：你的星球很美，但你偶爾需要降落到地球。帳單要付、關係要經營、承諾要兌現。如果你一直活在自己的星球上不落地，身邊的人會越來越難接住你。你可以保留童真，但也需要發展出一個「可以在地球上行走」的部分。\n\n覺察練習：這週做一件「很大人」的事。可以是整理一個一直拖著的帳務、做一個不有趣但必要的決定、或者兌現一個你對別人的承諾。做完之後你會發現：做大人的事情不會殺死你心裡的小王子。他還在你的星球上等你回去。',
    oil:'甜橙 3 滴＋花梨木 2 滴＋岩蘭草 1 滴，在需要「落地」的時候擴香。甜橙維護你天生的陽光和童真，花梨木讓想像力有一個木質的穩定框架，岩蘭草是地心引力的味道，溫柔地把你從雲端拉回地面。',
    med:'閉上眼睛。想像你站在一顆很小的星球上，周圍是星空。吸氣四秒，看看你的星球。很美。吐氣六秒。重複三次。然後低頭看，地球在下面，藍藍綠綠的，也很美。吸氣四秒，問自己：「我可以同時屬於兩個地方嗎？」吐氣六秒。答案是可以的。想像你的腳長出了一條很長的繩索，輕輕地繫在地球上。你還在星球上，但你跟地球有了連結。吸氣四秒，吐氣六秒。對自己說：「我可以做夢，也可以落地。」張開眼睛。',
    quote:'你的星球很美。但偶爾降落地球看看，這裡也有值得你愛的東西。'},

    desc:'你的內在小孩不是停在某個年紀，是他已經跟長大的你和好了。你允許自己有時候幼稚、有時候脆弱、有時候需要被照顧，你也可以在需要的時候堅強、負責、獨立。你不用在「小孩」和「大人」之間選邊站，因為你把兩個都帶在身上了。這不是天生的，是你走過了一段路、花了一些力氣、做了很多次和解之後到達的地方。',

    oil:'薰衣草 2 滴＋乳香 1 滴＋甜橙 2 滴，隨時都適合。薰衣草是你們之間的寧靜默契，乳香是那份「我知道我是誰」的踏實，甜橙是你心裡那個小孩的微笑。你不需要這個配方來修復什麼，你只是帶著它記得：我跟自己的關係，值得照顧。',

let answers={},currentQ=0;
function startQuiz(){document.getElementById('startArea').style.display='none';document.getElementById('progressWrap').style.display='block';renderQuestion(0);}
function renderQuestion(idx){
  const area=document.getElementById('questionsArea');area.innerHTML='';
  questions.forEach((qd,i)=>{
    const card=document.createElement('div');card.className='quiz-card'+(i===idx?' active':'');card.id='qcard-'+i;
    const sceneHTML=qd.scene?'<div class="quiz-q-scene">'+qd.scene+'</div>':'';
    const optsHTML='<div class="likert-wrap"><div class="likert-opts">'+qd.opts.map((o,oi)=>'<button class="likert-opt'+(answers[i]!==undefined&&answers[i]===oi?' selected':'')+'" onclick="selectOpt('+i+','+oi+',this)"><span class="lo-key">'+String.fromCharCode(65+oi)+'</span><span class="lo-text">'+o.t+'</span></button>').join('')+'</div></div>';
    card.innerHTML='<div class="quiz-q-num">第 '+(i+1)+' 題 / '+questions.length+'</div><div class="quiz-question">'+qd.q+'</div>'+sceneHTML+optsHTML+'<div class="quiz-nav">'+(i>0?'<button class="btn-prev" onclick="goTo('+(i-1)+')">← 上一題</button>':'<span></span>')+(i<questions.length-1?'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="goTo('+(i+1)+')">下一題 →</button>':'<button class="btn-next" id="btnNext-'+i+'" '+(answers[i]===undefined?'disabled':'')+' onclick="showResult()">去見你的內在小孩 🧒</button>')+'</div>';
    area.appendChild(card);
  });updateProgress(idx);
}
function selectOpt(qi,oi,btn){answers[qi]=oi;document.getElementById('qcard-'+qi).querySelectorAll('.likert-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');const nb=document.getElementById('btnNext-'+qi);if(nb)nb.disabled=false;}
function goTo(idx){currentQ=idx;document.querySelectorAll('.quiz-card').forEach(c=>c.classList.remove('active'));const t=document.getElementById('qcard-'+idx);if(t){t.classList.add('active');t.scrollIntoView({behavior:'smooth',block:'start'});}updateProgress(idx);}
function updateProgress(idx){const a=Object.keys(answers).length;const p=Math.round(a/questions.length*100);document.getElementById('progressText').textContent='第 '+(idx+1)+' 題，共 '+questions.length+' 題';document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%';}
function showResult(){

  document.getElementById('resultHero').innerHTML='<span class="result-hero-icon">'+f.icon+'</span><div class="result-type-label">內在小孩覺察 Inner Child</div><div class="result-combo-name">'+f.name+'</div><div class="result-subtitle">'+f.sub+'</div>';
  document.getElementById('dimBars').innerHTML=sorted.map(k=>{var pct=Math.round(dimScores[k]/maxPossible*100);return '<div class="ocean-item"><div class="ocean-top"><span class="ocean-label"><strong>'+DIMS[k]+'</strong></span><span class="ocean-score">'+pct+'%</span></div><div class="ocean-track"><div class="ocean-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#b8922a,#8b6914)"></div></div></div>';}).join('');
