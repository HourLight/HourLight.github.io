<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>馥靈之鑰 CC 雲端系統 | Claude Code 驅動中樞</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .logo span {
            margin-left: 0.5rem;
            background: linear-gradient(45deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .device-info {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card h3 {
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            font-size: 1.2rem;
        }

        .card h3 span {
            margin-right: 0.5rem;
            font-size: 1.5rem;
        }

        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            margin: 0.3rem;
            display: inline-flex;
            align-items: center;
            text-decoration: none;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background: linear-gradient(45deg, #ff6b6b, #ffa726);
        }

        .btn-success {
            background: linear-gradient(45deg, #51cf66, #37b24d);
        }

        .btn-warning {
            background: linear-gradient(45deg, #ffd43b, #fab005);
            color: #333;
        }

        .btn span {
            margin-right: 0.5rem;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 0.5rem;
        }

        .status-online {
            background: #51cf66;
            box-shadow: 0 0 10px #51cf66;
        }

        .status-warning {
            background: #ffd43b;
            box-shadow: 0 0 10px #ffd43b;
        }

        .status-offline {
            background: #ff6b6b;
            box-shadow: 0 0 10px #ff6b6b;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }

        .action-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .action-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
        }

        .action-card .icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .system-status {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }

        .status-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 10px;
            border-left: 4px solid;
        }

        .status-card.online {
            border-left-color: #51cf66;
        }

        .status-card.warning {
            border-left-color: #ffd43b;
        }

        .status-card.offline {
            border-left-color: #ff6b6b;
        }

        .activity-log {
            max-height: 300px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 1rem;
        }

        .activity-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.9rem;
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-time {
            opacity: 0.7;
            font-size: 0.8rem;
        }

        .floating-assistant {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: linear-gradient(45deg, #667eea, #764ba2);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .floating-assistant:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .notification {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1001;
        }

        .notification.show {
            transform: translateX(0);
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 1rem;
            }

            .header {
                padding: 1rem;
                flex-direction: column;
                text-align: center;
                gap: 0.5rem;
            }
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .loading {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>
    <!-- 頂部導航 -->
    <header class="header">
        <div class="logo">
            🤖 <span>馥靈之鑰 CC 雲端系統</span>
        </div>
        <div class="device-info">
            <span class="status-indicator status-online"></span>
            <span id="current-device">設備載入中...</span>
        </div>
    </header>

    <div class="container">
        <!-- 主儀表板 -->
        <div class="dashboard-grid">
            <!-- Claude Code 控制台 -->
            <div class="card">
                <h3><span>🚀</span>Claude Code 控制台</h3>
                <p style="margin-bottom: 1rem; opacity: 0.8;">啟動和管理 Claude Code 開發環境</p>

                <div style="margin-bottom: 1rem;">
                    <button id="launch-claude-code" class="btn btn-primary">
                        <span>▶️</span>啟動 Claude Code
                    </button>
                    <button id="open-terminal" class="btn">
                        <span>💻</span>開啟終端
                    </button>
                </div>

                <div class="system-status">
                    <div class="status-card warning">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span>Claude Code</span>
                            <span id="claude-status">未啟動</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 馥靈之鑰快捷工具 -->
            <div class="card">
                <h3><span>🔗</span>馥靈快捷工具</h3>
                <p style="margin-bottom: 1rem; opacity: 0.8;">一鍵存取所有馥靈之鑰服務</p>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
                    <button onclick="openURL('https://hourlightkey.com')" class="btn btn-success">
                        <span>🌐</span>官網
                    </button>
                    <button onclick="openURL('https://hourlightkey.com/admin-dashboard.html')" class="btn">
                        <span>⚙️</span>後台
                    </button>
                    <button onclick="openURL('https://github.com')" class="btn">
                        <span>📁</span>GitHub
                    </button>
                    <button onclick="openURL('https://vercel.com/dashboard')" class="btn">
                        <span>⚡</span>Vercel
                    </button>
                    <button onclick="openDiscord()" class="btn">
                        <span>💬</span>Discord
                    </button>
                    <button onclick="openNotion()" class="btn">
                        <span>📝</span>Notion
                    </button>
                </div>
            </div>
        </div>

        <!-- 快捷操作區 -->
        <div class="card" style="margin-bottom: 2rem;">
            <h3><span>⚡</span>快捷操作</h3>
            <div class="quick-actions">
                <div class="action-card" onclick="executeAction('deploy')">
                    <span class="icon">🚀</span>
                    <div>部署上線</div>
                </div>
                <div class="action-card" onclick="executeAction('sync')">
                    <span class="icon">🔄</span>
                    <div>同步狀態</div>
                </div>
                <div class="action-card" onclick="executeAction('backup')">
                    <span class="icon">💾</span>
                    <div>備份資料</div>
                </div>
                <div class="action-card" onclick="executeAction('monitor')">
                    <span class="icon">📊</span>
                    <div>系統監控</div>
                </div>
                <div class="action-card" onclick="executeAction('test')">
                    <span class="icon">🧪</span>
                    <div>執行測試</div>
                </div>
                <div class="action-card" onclick="executeAction('optimize')">
                    <span class="icon">🎯</span>
                    <div>效能優化</div>
                </div>
            </div>
        </div>

        <!-- 系統狀態與活動日誌 -->
        <div class="dashboard-grid">
            <div class="card">
                <h3><span>📊</span>系統狀態</h3>
                <div class="system-status">
                    <div class="status-card online">
                        <div style="display: flex; justify-content: space-between;">
                            <span>馥靈官網</span>
                            <span>🟢 正常</span>
                        </div>
                    </div>
                    <div class="status-card online">
                        <div style="display: flex; justify-content: space-between;">
                            <span>GitHub Pages</span>
                            <span>🟢 正常</span>
                        </div>
                    </div>
                    <div class="status-card online">
                        <div style="display: flex; justify-content: space-between;">
                            <span>Vercel API</span>
                            <span>🟢 正常</span>
                        </div>
                    </div>
                    <div class="status-card warning">
                        <div style="display: flex; justify-content: space-between;">
                            <span>本地開發</span>
                            <span id="local-dev-status">🟡 待檢測</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3><span>📝</span>活動日誌</h3>
                <div class="activity-log" id="activity-log">
                    <div class="activity-item">
                        <span>系統啟動</span>
                        <span class="activity-time" id="startup-time">載入中...</span>
                    </div>
                    <div class="activity-item">
                        <span>設備檢測完成</span>
                        <span class="activity-time">剛剛</span>
                    </div>
                    <div class="activity-item">
                        <span>連接雲端服務</span>
                        <span class="activity-time">剛剛</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 設備管理 -->
        <div class="card">
            <h3><span>📱</span>多設備管理</h3>
            <p style="margin-bottom: 1rem; opacity: 0.8;">管理您的4台電腦存取權限</p>

            <div id="device-list" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem;">
                <!-- 設備列表將動態載入 -->
            </div>

            <div style="margin-top: 1rem;">
                <button onclick="addDevice()" class="btn">
                    <span>➕</span>新增設備
                </button>
                <button onclick="syncDevices()" class="btn">
                    <span>🔄</span>同步設備
                </button>
            </div>
        </div>
    </div>

    <!-- 浮動助手 -->
    <div class="floating-assistant" onclick="toggleAssistant()">
        🤖
    </div>

    <!-- 通知系統 -->
    <div id="notification" class="notification"></div>

    <script>
        // CC雲端系統核心
        class CCCloudSystem {
            constructor() {
                this.deviceId = this.generateDeviceId();
                this.sessionId = Date.now().toString(36);
                this.activities = [];
                this.isOnline = navigator.onLine;

                this.init();
            }

            // 初始化系統
            async init() {
                console.log('🚀 CC雲端系統啟動中...');

                this.loadDeviceInfo();
                this.setupEventListeners();
                this.startHeartbeat();
                this.loadActivities();
                this.checkSystemStatus();

                this.showNotification('CC雲端系統已成功啟動！', 'success');
                this.log('系統啟動', '🚀');

                // 更新啟動時間
                document.getElementById('startup-time').textContent = new Date().toLocaleString('zh-TW');
            }

            // 生成設備ID
            generateDeviceId() {
                let deviceId = localStorage.getItem('cc_device_id');
                if (!deviceId) {
                    deviceId = 'device_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 5);
                    localStorage.setItem('cc_device_id', deviceId);
                }
                return deviceId;
            }

            // 載入設備資訊
            loadDeviceInfo() {
                const deviceInfo = {
                    id: this.deviceId,
                    name: this.getDeviceName(),
                    os: this.getOS(),
                    browser: this.getBrowser(),
                    lastAccess: new Date().toLocaleString('zh-TW')
                };

                document.getElementById('current-device').textContent = `${deviceInfo.name} (${deviceInfo.os})`;
                this.updateDeviceList();
            }

            // 獲取設備名稱
            getDeviceName() {
                const saved = localStorage.getItem('cc_device_name');
                if (saved) return saved;

                return `${this.getOS()}-${this.deviceId.slice(-4).toUpperCase()}`;
            }

            // 獲取作業系統
            getOS() {
                const ua = navigator.userAgent;
                if (ua.includes('Windows')) return 'Windows';
                if (ua.includes('Mac')) return 'macOS';
                if (ua.includes('Linux')) return 'Linux';
                if (ua.includes('Android')) return 'Android';
                if (ua.includes('iPhone')) return 'iOS';
                return 'Unknown';
            }

            // 獲取瀏覽器
            getBrowser() {
                const ua = navigator.userAgent;
                if (ua.includes('Chrome')) return 'Chrome';
                if (ua.includes('Firefox')) return 'Firefox';
                if (ua.includes('Safari')) return 'Safari';
                if (ua.includes('Edge')) return 'Edge';
                return 'Unknown';
            }

            // 設置事件監聽器
            setupEventListeners() {
                // Claude Code 啟動
                document.getElementById('launch-claude-code').addEventListener('click', () => {
                    this.launchClaudeCode();
                });

                // 終端啟動
                document.getElementById('open-terminal').addEventListener('click', () => {
                    this.openTerminal();
                });

                // 鍵盤快捷鍵
                document.addEventListener('keydown', (e) => {
                    if (e.ctrlKey || e.metaKey) {
                        switch(e.key) {
                            case '`':
                                e.preventDefault();
                                this.launchClaudeCode();
                                break;
                            case 'h':
                                e.preventDefault();
                                openURL('https://hourlightkey.com');
                                break;
                        }
                    }
                });

                // 網路狀態監控
                window.addEventListener('online', () => {
                    this.isOnline = true;
                    this.showNotification('網路連線已恢復', 'success');
                    this.log('網路狀態', '🟢 已連線');
                });

                window.addEventListener('offline', () => {
                    this.isOnline = false;
                    this.showNotification('網路連線中斷', 'error');
                    this.log('網路狀態', '🔴 已斷線');
                });
            }

            // 啟動 Claude Code
            launchClaudeCode() {
                this.showNotification('正在啟動 Claude Code...', 'info');
                this.log('Claude Code', '🚀 啟動中...');

                // 嘗試多種啟動方式
                const methods = [
                    () => window.location.href = 'claude-code://',
                    () => window.location.href = 'code://',
                    () => this.openURL('https://claude.ai/claude-code')
                ];

                let currentMethod = 0;

                const tryLaunch = () => {
                    if (currentMethod < methods.length) {
                        try {
                            methods[currentMethod]();
                            this.showNotification('Claude Code 啟動成功！', 'success');
                            this.log('Claude Code', '✅ 啟動成功');
                            document.getElementById('claude-status').textContent = '已啟動';
                        } catch (error) {
                            currentMethod++;
                            setTimeout(tryLaunch, 1000);
                        }
                    } else {
                        this.showNotification('無法啟動 Claude Code，請檢查安裝', 'error');
                        this.showInstallGuide();
                    }
                };

                setTimeout(tryLaunch, 500);
            }

            // 顯示安裝指南
            showInstallGuide() {
                const guide = `
                    Claude Code 安裝指南：

                    1. 前往 https://claude.ai/claude-code
                    2. 下載適合您作業系統的版本
                    3. 安裝完成後重新嘗試啟動

                    或者使用網頁版：https://claude.ai/claude-code
                `;

                if (confirm(guide + '\n\n是否要開啟下載頁面？')) {
                    this.openURL('https://claude.ai/claude-code');
                }
            }

            // 開啟終端
            openTerminal() {
                if (this.getOS() === 'Windows') {
                    window.location.href = 'ms-terminal:';
                } else if (this.getOS() === 'macOS') {
                    window.location.href = 'terminal://';
                } else {
                    this.showNotification('請手動開啟系統終端', 'info');
                }

                this.log('終端', '💻 已開啟');
            }

            // 系統心跳
            startHeartbeat() {
                setInterval(() => {
                    this.checkSystemStatus();
                }, 30000); // 30秒檢查一次
            }

            // 檢查系統狀態
            async checkSystemStatus() {
                try {
                    // 檢查馥靈官網
                    const websiteStatus = await this.checkURL('https://hourlightkey.com');

                    // 檢查 GitHub Pages
                    const githubStatus = await this.checkURL('https://github.com');

                    // 檢查 Vercel
                    const vercelStatus = await this.checkURL('https://vercel.com');

                    // 更新狀態顯示
                    this.updateSystemStatus({
                        website: websiteStatus,
                        github: githubStatus,
                        vercel: vercelStatus
                    });

                } catch (error) {
                    console.warn('狀態檢查失敗:', error);
                }
            }

            // 檢查URL可用性
            async checkURL(url) {
                try {
                    const response = await fetch(url, { mode: 'no-cors' });
                    return true;
                } catch {
                    return false;
                }
            }

            // 更新系統狀態顯示
            updateSystemStatus(status) {
                // 這裡可以更新狀態卡片的顯示
                console.log('系統狀態:', status);
            }

            // 更新設備列表
            updateDeviceList() {
                const devices = this.getStoredDevices();
                const container = document.getElementById('device-list');

                container.innerHTML = devices.map(device => `
                    <div class="status-card ${device.id === this.deviceId ? 'online' : 'warning'}" style="padding: 1rem;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                            <strong>${device.name}</strong>
                            <span class="status-indicator ${device.id === this.deviceId ? 'status-online' : 'status-warning'}"></span>
                        </div>
                        <div style="font-size: 0.9rem; opacity: 0.8;">
                            <div>${device.os} | ${device.browser}</div>
                            <div>上次存取: ${device.lastAccess}</div>
                        </div>
                        ${device.id === this.deviceId ? '<div style="margin-top: 0.5rem; color: #51cf66;">📍 目前設備</div>' : ''}
                    </div>
                `).join('');
            }

            // 獲取存儲的設備
            getStoredDevices() {
                const current = {
                    id: this.deviceId,
                    name: this.getDeviceName(),
                    os: this.getOS(),
                    browser: this.getBrowser(),
                    lastAccess: new Date().toLocaleString('zh-TW')
                };

                let devices = JSON.parse(localStorage.getItem('cc_devices') || '[]');

                // 更新當前設備
                const existingIndex = devices.findIndex(d => d.id === this.deviceId);
                if (existingIndex >= 0) {
                    devices[existingIndex] = current;
                } else {
                    devices.push(current);
                }

                // 保存更新
                localStorage.setItem('cc_devices', JSON.stringify(devices));

                return devices;
            }

            // 載入活動記錄
            loadActivities() {
                this.activities = JSON.parse(localStorage.getItem('cc_activities') || '[]');
                this.updateActivityLog();
            }

            // 記錄活動
            log(action, description) {
                const activity = {
                    time: new Date().toLocaleString('zh-TW'),
                    action: action,
                    description: description,
                    deviceId: this.deviceId
                };

                this.activities.unshift(activity);
                this.activities = this.activities.slice(0, 50); // 保留最新50條

                localStorage.setItem('cc_activities', JSON.stringify(this.activities));
                this.updateActivityLog();
            }

            // 更新活動日誌顯示
            updateActivityLog() {
                const container = document.getElementById('activity-log');
                if (this.activities.length === 0) return;

                const startupItem = container.querySelector('.activity-item:first-child');
                container.innerHTML = this.activities.slice(0, 10).map(activity => `
                    <div class="activity-item">
                        <span>${activity.description}</span>
                        <span class="activity-time">${activity.time}</span>
                    </div>
                `).join('');

                // 保留啟動時間項目
                if (startupItem) {
                    container.insertBefore(startupItem, container.firstChild);
                }
            }

            // 顯示通知
            showNotification(message, type = 'info') {
                const notification = document.getElementById('notification');
                notification.textContent = message;
                notification.className = `notification show`;

                setTimeout(() => {
                    notification.classList.remove('show');
                }, 3000);
            }

            // 開啟URL
            openURL(url) {
                window.open(url, '_blank');
                this.log('開啟連結', url);
            }
        }

        // 全域函數
        function openURL(url) {
            window.ccSystem.openURL(url);
        }

        function openDiscord() {
            openURL('https://discord.com/channels/@me');
        }

        function openNotion() {
            openURL('https://notion.so');
        }

        function executeAction(action) {
            const actions = {
                'deploy': '🚀 部署上線',
                'sync': '🔄 同步狀態',
                'backup': '💾 備份資料',
                'monitor': '📊 系統監控',
                'test': '🧪 執行測試',
                'optimize': '🎯 效能優化'
            };

            const description = actions[action] || action;
            window.ccSystem.showNotification(`正在執行: ${description}`, 'info');
            window.ccSystem.log('快捷操作', description);

            // 這裡可以整合實際的操作邏輯
            setTimeout(() => {
                window.ccSystem.showNotification(`${description} 完成`, 'success');
            }, 2000);
        }

        function addDevice() {
            const name = prompt('請輸入新設備名稱:');
            if (name) {
                window.ccSystem.showNotification(`設備 "${name}" 已新增`, 'success');
                window.ccSystem.log('設備管理', `➕ 新增設備: ${name}`);
            }
        }

        function syncDevices() {
            window.ccSystem.showNotification('正在同步設備狀態...', 'info');
            window.ccSystem.log('設備管理', '🔄 同步設備');

            setTimeout(() => {
                window.ccSystem.updateDeviceList();
                window.ccSystem.showNotification('設備同步完成', 'success');
            }, 1500);
        }

        function toggleAssistant() {
            window.ccSystem.showNotification('馥寶助手隨時為您服務！', 'info');
            window.ccSystem.log('助手', '🤖 喚醒馥寶');
        }

        // 系統初始化
        document.addEventListener('DOMContentLoaded', () => {
            window.ccSystem = new CCCloudSystem();
        });

        // 頁面離開時保存狀態
        window.addEventListener('beforeunload', () => {
            if (window.ccSystem) {
                window.ccSystem.log('系統', '👋 系統關閉');
            }
        });
    </script>
